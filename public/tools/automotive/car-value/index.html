<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>중고차 시세 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    .input-row input, .input-row select { flex: 1; }
    .input-unit { color: var(--text-secondary); font-size: 0.9rem; min-width: 40px; }
    .result-display { text-align: center; padding: 2rem; background: linear-gradient(135deg, #8b5cf6, #7c3aed); border-radius: 16px; color: white; margin: 1rem 0; }
    .result-value { font-size: 2.5rem; font-weight: 700; }
    .result-label { font-size: 0.9rem; opacity: 0.9; }
    .result-range { font-size: 1rem; margin-top: 0.5rem; opacity: 0.9; }
    .depreciation-chart { margin: 1rem 0; padding: 1rem; background: var(--bg-primary); border-radius: 8px; }
    .chart-bar { height: 24px; background: var(--bg-secondary); border-radius: 4px; margin-bottom: 0.5rem; overflow: hidden; }
    .chart-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #7c3aed); display: flex; align-items: center; justify-content: flex-end; padding-right: 0.5rem; color: white; font-size: 0.75rem; font-weight: 600; }
    .chart-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); }
    .factors-section { margin-top: 1rem; }
    .factor-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .factor-label { font-size: 0.9rem; }
    .factor-value { font-weight: 600; }
    .factor-value.positive { color: #22c55e; }
    .factor-value.negative { color: #ef4444; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">중고차 시세 계산기</h1>
          <p class="tool-description">차량 감가상각 예측</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="input-group">
          <label class="input-label">신차 가격</label>
          <div class="input-row">
            <input type="number" id="newPrice" class="tool-input" value="30000000" step="1000000" oninput="CarValue.calculate()">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">차량 연식</label>
          <div class="input-row">
            <input type="number" id="carYear" class="tool-input" value="2022" min="2000" max="2026" oninput="CarValue.calculate()">
            <span class="input-unit">년식</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">주행 거리</label>
          <div class="input-row">
            <input type="number" id="mileage" class="tool-input" value="50000" step="10000" oninput="CarValue.calculate()">
            <span class="input-unit">km</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">차량 상태</label>
          <select id="condition" class="tool-input" onchange="CarValue.calculate()">
            <option value="excellent">최상 (무사고, 관리 우수)</option>
            <option value="good" selected>양호 (경미한 손상)</option>
            <option value="fair">보통 (일반적인 사용감)</option>
            <option value="poor">불량 (수리 필요)</option>
          </select>
        </div>
      </div>

      <div class="result-display">
        <div class="result-label">예상 시세</div>
        <div class="result-value" id="estimatedValue">0원</div>
        <div class="result-range" id="valueRange">± 10% 범위</div>
      </div>

      <div class="factors-section">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">감가 요인</h3>
        <div class="factor-item">
          <span class="factor-label">연식 감가</span>
          <span class="factor-value negative" id="yearDepreciation">-0%</span>
        </div>
        <div class="factor-item">
          <span class="factor-label">주행거리 감가</span>
          <span class="factor-value negative" id="mileageDepreciation">-0%</span>
        </div>
        <div class="factor-item">
          <span class="factor-label">상태 보정</span>
          <span class="factor-value" id="conditionAdjust">+0%</span>
        </div>
        <div class="factor-item">
          <span class="factor-label">총 감가율</span>
          <span class="factor-value negative" id="totalDepreciation">-0%</span>
        </div>
      </div>

      <div class="depreciation-chart">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">연도별 잔존가치</h3>
        <div id="chartContainer"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">감가상각 기준</h3>
        <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8;">
          <div>• 1년차: 약 20~25% 감가</div>
          <div>• 2~3년차: 연 10~15% 추가 감가</div>
          <div>• 4년차 이후: 연 5~10% 추가 감가</div>
          <div>• 주행거리: 연 15,000km 기준</div>
          <div style="margin-top: 0.5rem; font-style: italic;">※ 실제 시세는 차종, 옵션, 시장 상황에 따라 다를 수 있습니다.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="car-value.js"></script>
</body>
</html>
