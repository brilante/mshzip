<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>엔진오일 교환 주기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    .input-row input { flex: 1; }
    .input-unit { color: var(--text-secondary); font-size: 0.9rem; min-width: 40px; }
    .status-display { text-align: center; padding: 2rem; border-radius: 16px; margin: 1rem 0; }
    .status-display.good { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
    .status-display.warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .status-display.danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .status-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .status-text { font-size: 1.5rem; font-weight: 700; }
    .status-sub { font-size: 0.9rem; opacity: 0.9; margin-top: 0.5rem; }
    .progress-section { margin: 1rem 0; }
    .progress-bar { height: 12px; background: var(--bg-primary); border-radius: 6px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 0.5rem; color: var(--text-secondary); }
    .history-list { max-height: 200px; overflow-y: auto; }
    .history-item { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">엔진오일 교환 주기</h1>
          <p class="tool-description">오일 교환 시기 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">설정</h3>
        <div class="input-group">
          <label class="input-label">교환 주기</label>
          <div class="input-row">
            <input type="number" id="intervalKm" class="tool-input" value="10000" step="1000">
            <span class="input-unit">km</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">마지막 교환일</label>
          <input type="date" id="lastChangeDate" class="tool-input">
        </div>
        <div class="input-group">
          <label class="input-label">교환 시 주행거리</label>
          <div class="input-row">
            <input type="number" id="lastChangeKm" class="tool-input" placeholder="0" aria-label="0">
            <span class="input-unit">km</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">현재 주행거리</label>
          <div class="input-row">
            <input type="number" id="currentKm" class="tool-input" placeholder="0" aria-label="0">
            <span class="input-unit">km</span>
          </div>
        </div>
        <button class="tool-btn tool-btn-primary" onclick="OilChange.save()" style="width: 100%;" aria-label="저장">저장</button>
      </div>

      <div class="status-display good" id="statusDisplay">
        <div class="status-icon"></div>
        <div class="status-text" id="statusText">양호</div>
        <div class="status-sub" id="statusSub">교환까지 7,500km 남음</div>
      </div>

      <div class="progress-section">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 25%; background: #22c55e;"></div>
        </div>
        <div class="progress-label">
          <span id="usedKm">2,500km 사용</span>
          <span id="remainKm">7,500km 남음</span>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">교환 완료</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">오일 교환을 완료했다면 현재 주행거리로 기록합니다.</p>
        <button class="tool-btn tool-btn-secondary" onclick="OilChange.recordChange()" style="width: 100%;" aria-label="교환 완료 기록">교환 완료 기록</button>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">교환 이력</h3>
        <div class="history-list" id="historyList">
          <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="oil-change.js"></script>
</body>
</html>
