<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자동차 할부 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    .input-row input { flex: 1; }
    .input-unit { color: var(--text-secondary); font-size: 0.9rem; min-width: 40px; }
    .result-display { text-align: center; padding: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; color: white; margin: 1rem 0; }
    .result-value { font-size: 2.5rem; font-weight: 700; }
    .result-label { font-size: 0.9rem; opacity: 0.9; margin-top: 0.25rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .schedule-list { max-height: 300px; overflow-y: auto; }
    .schedule-header { display: grid; grid-template-columns: 0.5fr 1fr 1fr 1fr 1fr; gap: 0.5rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; font-weight: 600; font-size: 0.8rem; text-align: center; margin-bottom: 0.5rem; }
    .schedule-row { display: grid; grid-template-columns: 0.5fr 1fr 1fr 1fr 1fr; gap: 0.5rem; padding: 0.5rem; font-size: 0.8rem; text-align: center; border-bottom: 1px solid var(--border); }
    .term-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .term-btn { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .term-btn.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">자동차 할부 계산기</h1>
          <p class="tool-description">월 납입금 및 이자 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="input-group">
          <label class="input-label">차량 가격</label>
          <div class="input-row">
            <input type="number" id="carPrice" class="tool-input" value="30000000" step="1000000" oninput="CarLoan.calculate()">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">선수금 (계약금)</label>
          <div class="input-row">
            <input type="number" id="downPayment" class="tool-input" value="5000000" step="1000000" oninput="CarLoan.calculate()">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">연 이율</label>
          <div class="input-row">
            <input type="number" id="interestRate" class="tool-input" value="5.9" step="0.1" oninput="CarLoan.calculate()">
            <span class="input-unit">%</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">할부 기간</label>
          <div class="term-selector">
            <div class="term-btn" onclick="CarLoan.setTerm(12)">12개월</div>
            <div class="term-btn" onclick="CarLoan.setTerm(24)">24개월</div>
            <div class="term-btn active" onclick="CarLoan.setTerm(36)">36개월</div>
            <div class="term-btn" onclick="CarLoan.setTerm(48)">48개월</div>
            <div class="term-btn" onclick="CarLoan.setTerm(60)">60개월</div>
          </div>
        </div>
      </div>

      <div class="result-display">
        <div class="result-label">월 납입금</div>
        <div class="result-value" id="monthlyPayment">0원</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="loanAmount">0원</div>
          <div class="stat-label">대출 원금</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalInterest">0원</div>
          <div class="stat-label">총 이자</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalPayment">0원</div>
          <div class="stat-label">총 납입금</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="interestRatio">0%</div>
          <div class="stat-label">이자 비율</div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">상환 스케줄</h3>
        <div class="schedule-header">
          <span>회차</span>
          <span>원금</span>
          <span>이자</span>
          <span>납입금</span>
          <span>잔액</span>
        </div>
        <div class="schedule-list" id="scheduleList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="car-loan.js"></script>
</body>
</html>
