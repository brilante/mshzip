<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>속도 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .speed-grid { display: grid; gap: 1rem; }
    .speed-card { background: var(--bg-primary); padding: 1.25rem; border-radius: 12px; }
    .speed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .speed-unit { font-weight: 600; }
    .speed-desc { font-size: 0.8rem; color: var(--text-secondary); }
    .speed-input { font-size: 1.5rem; font-weight: 700; width: 100%; border: none; background: transparent; text-align: right; }
    .speed-input:focus { outline: none; }
    .preset-section { margin-top: 1rem; }
    .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-top: 0.5rem; }
    .preset-btn { padding: 0.5rem; background: var(--bg-primary); border-radius: 6px; cursor: pointer; text-align: center; font-size: 0.85rem; }
    .preset-btn:hover { background: var(--primary); color: white; }
    .info-section { margin-top: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; }
    .info-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .info-row:last-child { border-bottom: none; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">속도 변환기</h1>
          <p class="tool-description">속도 단위 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="speed-grid">
        <div class="speed-card">
          <div class="speed-header">
            <span class="speed-unit">km/h</span>
            <span class="speed-desc">킬로미터/시간</span>
          </div>
          <input type="number" class="speed-input" id="kmh" value="100" oninput="SpeedConvert.convert('kmh')">
        </div>

        <div class="speed-card">
          <div class="speed-header">
            <span class="speed-unit">mph</span>
            <span class="speed-desc">마일/시간</span>
          </div>
          <input type="number" class="speed-input" id="mph" value="62.14" oninput="SpeedConvert.convert('mph')">
        </div>

        <div class="speed-card">
          <div class="speed-header">
            <span class="speed-unit">m/s</span>
            <span class="speed-desc">미터/초</span>
          </div>
          <input type="number" class="speed-input" id="ms" value="27.78" oninput="SpeedConvert.convert('ms')">
        </div>

        <div class="speed-card">
          <div class="speed-header">
            <span class="speed-unit">knot</span>
            <span class="speed-desc">노트 (해리/시)</span>
          </div>
          <input type="number" class="speed-input" id="knot" value="53.99" oninput="SpeedConvert.convert('knot')">
        </div>

        <div class="speed-card">
          <div class="speed-header">
            <span class="speed-unit">Mach</span>
            <span class="speed-desc">마하 (음속)</span>
          </div>
          <input type="number" class="speed-input" id="mach" value="0.081" step="0.001" oninput="SpeedConvert.convert('mach')">
        </div>
      </div>

      <div class="preset-section">
        <h3 style="font-weight: 600;">빠른 입력 (km/h)</h3>
        <div class="preset-grid">
          <div class="preset-btn" onclick="SpeedConvert.setKmh(30)">30</div>
          <div class="preset-btn" onclick="SpeedConvert.setKmh(50)">50</div>
          <div class="preset-btn" onclick="SpeedConvert.setKmh(80)">80</div>
          <div class="preset-btn" onclick="SpeedConvert.setKmh(100)">100</div>
          <div class="preset-btn" onclick="SpeedConvert.setKmh(110)">110</div>
          <div class="preset-btn" onclick="SpeedConvert.setKmh(120)">120</div>
          <div class="preset-btn" onclick="SpeedConvert.setKmh(200)">200</div>
          <div class="preset-btn" onclick="SpeedConvert.setKmh(300)">300</div>
        </div>
      </div>

      <div class="info-section">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">참고 속도</h3>
        <div class="info-row">
          <span>걷기</span>
          <span>~5 km/h</span>
        </div>
        <div class="info-row">
          <span>자전거</span>
          <span>~20 km/h</span>
        </div>
        <div class="info-row">
          <span>도심 주행</span>
          <span>~60 km/h</span>
        </div>
        <div class="info-row">
          <span>고속도로</span>
          <span>100~120 km/h</span>
        </div>
        <div class="info-row">
          <span>여객기</span>
          <span>~900 km/h</span>
        </div>
        <div class="info-row">
          <span>음속</span>
          <span>~1,235 km/h</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="speed-convert.js"></script>
</body>
</html>
