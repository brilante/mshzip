<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타이어 사이즈 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .tire-input-row { display: flex; gap: 0.5rem; align-items: center; }
    .tire-input-row input, .tire-input-row select { flex: 1; }
    .tire-separator { color: var(--text-secondary); font-weight: 600; }
    .compare-section { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .tire-card { background: var(--bg-primary); padding: 1rem; border-radius: 12px; }
    .tire-card h4 { font-weight: 600; margin-bottom: 0.75rem; text-align: center; }
    .tire-visual { background: #333; border-radius: 50%; margin: 1rem auto; display: flex; align-items: center; justify-content: center; color: #666; font-size: 0.8rem; }
    .tire-stats { font-size: 0.85rem; }
    .tire-stat { display: flex; justify-content: space-between; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
    .tire-stat:last-child { border-bottom: none; }
    .diff-display { text-align: center; padding: 1.5rem; background: var(--bg-primary); border-radius: 12px; margin-top: 1rem; }
    .diff-value { font-size: 2rem; font-weight: 700; }
    .diff-value.positive { color: #22c55e; }
    .diff-value.negative { color: #ef4444; }
    .diff-label { font-size: 0.9rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">타이어 사이즈 계산기</h1>
          <p class="tool-description">타이어 규격 비교</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="compare-section">
        <div class="util-panel">
          <h4>현재 타이어</h4>
          <div class="tire-input-row">
            <input type="number" id="width1" class="tool-input" value="205" min="100" max="400">
            <span class="tire-separator">/</span>
            <input type="number" id="ratio1" class="tool-input" value="55" min="20" max="90">
            <span class="tire-separator">R</span>
            <input type="number" id="rim1" class="tool-input" value="16" min="12" max="24">
          </div>
        </div>
        <div class="util-panel">
          <h4> 비교 타이어</h4>
          <div class="tire-input-row">
            <input type="number" id="width2" class="tool-input" value="215" min="100" max="400">
            <span class="tire-separator">/</span>
            <input type="number" id="ratio2" class="tool-input" value="50" min="20" max="90">
            <span class="tire-separator">R</span>
            <input type="number" id="rim2" class="tool-input" value="17" min="12" max="24">
          </div>
        </div>
      </div>

      <button class="tool-btn tool-btn-primary" onclick="TireSize.calculate()" style="width: 100%; margin-top: 1rem;" aria-label="비교하기">비교하기</button>

      <div class="compare-section" style="margin-top: 1rem;">
        <div class="tire-card">
          <h4 style="color: #3b82f6;">현재 타이어</h4>
          <div class="tire-visual" id="tireVisual1" style="width: 120px; height: 120px;">
            <span>205/55R16</span>
          </div>
          <div class="tire-stats">
            <div class="tire-stat"><span>외경</span><span id="diameter1">632mm</span></div>
            <div class="tire-stat"><span>측벽 높이</span><span id="sidewall1">113mm</span></div>
            <div class="tire-stat"><span>둘레</span><span id="circum1">1,985mm</span></div>
            <div class="tire-stat"><span>1km당 회전</span><span id="rev1">504회</span></div>
          </div>
        </div>
        <div class="tire-card">
          <h4 style="color: #22c55e;">비교 타이어</h4>
          <div class="tire-visual" id="tireVisual2" style="width: 120px; height: 120px;">
            <span>215/50R17</span>
          </div>
          <div class="tire-stats">
            <div class="tire-stat"><span>외경</span><span id="diameter2">647mm</span></div>
            <div class="tire-stat"><span>측벽 높이</span><span id="sidewall2">108mm</span></div>
            <div class="tire-stat"><span>둘레</span><span id="circum2">2,032mm</span></div>
            <div class="tire-stat"><span>1km당 회전</span><span id="rev2">492회</span></div>
          </div>
        </div>
      </div>

      <div class="diff-display">
        <div class="diff-value" id="diffValue">+2.4%</div>
        <div class="diff-label">외경 차이</div>
        <div style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary);">
          <div id="speedDiff">속도계 100km/h → 실제 102.4km/h</div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">타이어 규격 읽기</h3>
        <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8;">
          <div><strong>205</strong> - 타이어 폭 (mm)</div>
          <div><strong>55</strong> - 편평비 (측벽높이/폭 %)</div>
          <div><strong>R</strong> - 레이디얼 구조</div>
          <div><strong>16</strong> - 휠 직경 (인치)</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="tire-size.js"></script>
</body>
</html>
