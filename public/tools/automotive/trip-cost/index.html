<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 비용 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    .input-row input { flex: 1; }
    .input-unit { color: var(--text-secondary); font-size: 0.9rem; min-width: 50px; }
    .result-display { text-align: center; padding: 2rem; background: linear-gradient(135deg, #22c55e, #16a34a); border-radius: 16px; color: white; margin: 1rem 0; }
    .result-value { font-size: 2.5rem; font-weight: 700; }
    .result-label { font-size: 0.9rem; opacity: 0.9; }
    .result-sub { font-size: 1rem; margin-top: 0.5rem; opacity: 0.9; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .breakdown-section { margin-top: 1rem; }
    .breakdown-item { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .breakdown-label { display: flex; align-items: center; gap: 0.5rem; }
    .breakdown-value { font-weight: 600; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">여행 비용 계산기</h1>
          <p class="tool-description">자동차 여행 경비 산출</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">기본 정보</h3>
        <div class="input-group">
          <label class="input-label">왕복 거리</label>
          <div class="input-row">
            <input type="number" id="distance" class="tool-input" value="200" oninput="TripCost.calculate()">
            <span class="input-unit">km</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">차량 연비</label>
          <div class="input-row">
            <input type="number" id="mileage" class="tool-input" value="12" step="0.1" oninput="TripCost.calculate()">
            <span class="input-unit">km/L</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">연료 가격</label>
          <div class="input-row">
            <input type="number" id="fuelPrice" class="tool-input" value="1650" oninput="TripCost.calculate()">
            <span class="input-unit">원/L</span>
          </div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">추가 비용</h3>
        <div class="input-group">
          <label class="input-label">고속도로 통행료 (왕복)</label>
          <div class="input-row">
            <input type="number" id="tollFee" class="tool-input" value="15000" oninput="TripCost.calculate()">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">주차비</label>
          <div class="input-row">
            <input type="number" id="parkingFee" class="tool-input" value="5000" oninput="TripCost.calculate()">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">탑승 인원</label>
          <div class="input-row">
            <input type="number" id="passengers" class="tool-input" value="4" min="1" max="10" oninput="TripCost.calculate()">
            <span class="input-unit">명</span>
          </div>
        </div>
      </div>

      <div class="result-display">
        <div class="result-label">총 예상 비용</div>
        <div class="result-value" id="totalCost">0원</div>
        <div class="result-sub" id="perPerson">1인당 0원</div>
      </div>

      <div class="breakdown-section">
        <div class="breakdown-item">
          <span class="breakdown-label">연료비</span>
          <span class="breakdown-value" id="fuelCost">0원</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-label">통행료</span>
          <span class="breakdown-value" id="tollCost">0원</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-label">🅿주차비</span>
          <span class="breakdown-value" id="parkingCost">0원</span>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="fuelNeeded">0L</div>
          <div class="stat-label">필요 연료량</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="costPerKm">0원</div>
          <div class="stat-label">km당 비용</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="trip-cost.js"></script>
</body>
</html>
