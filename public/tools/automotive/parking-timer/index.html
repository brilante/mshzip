<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주차 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 500px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .timer-display { text-align: center; padding: 2.5rem; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: 16px; color: white; margin: 1rem 0; }
    .timer-display.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .timer-display.danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .timer-time { font-size: 4rem; font-weight: 700; font-family: 'Courier New', monospace; }
    .timer-label { font-size: 1rem; opacity: 0.9; margin-top: 0.5rem; }
    .timer-cost { font-size: 1.5rem; font-weight: 600; margin-top: 1rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    .input-row input { flex: 1; }
    .input-unit { color: var(--text-secondary); font-size: 0.9rem; min-width: 40px; }
    .control-row { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .ctrl-btn { padding: 1rem 1.5rem; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; flex: 1; }
    .ctrl-btn.start { background: white; color: #3b82f6; }
    .ctrl-btn.stop { background: rgba(255,255,255,0.2); color: white; }
    .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-top: 1rem; }
    .preset-btn { padding: 0.75rem 0.5rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; text-align: center; font-size: 0.85rem; }
    .preset-btn:hover { background: var(--primary); color: white; }
    .info-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; margin-top: 1rem; }
    .info-row { display: flex; justify-content: space-between; padding: 0.25rem 0; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon">🅿</div>
        <div>
          <h1 class="tool-title">주차 타이머</h1>
          <p class="tool-description">주차 시간 및 요금 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="timer-display" id="timerDisplay">
        <div class="timer-time" id="timerTime">00:00:00</div>
        <div class="timer-label" id="timerLabel">주차 시간</div>
        <div class="timer-cost" id="timerCost">예상 요금: 0원</div>
        <div class="control-row">
          <button class="ctrl-btn start" id="startBtn" onclick="ParkingTimer.toggle()" aria-label="시작">시작</button>
          <button class="ctrl-btn stop" onclick="ParkingTimer.reset()" aria-label="↺ 리셋">↺ 리셋</button>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">빠른 알림 설정</h3>
        <div class="preset-grid">
          <div class="preset-btn" onclick="ParkingTimer.setAlert(30)">30분</div>
          <div class="preset-btn" onclick="ParkingTimer.setAlert(60)">1시간</div>
          <div class="preset-btn" onclick="ParkingTimer.setAlert(90)">1시간 30분</div>
          <div class="preset-btn" onclick="ParkingTimer.setAlert(120)">2시간</div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">요금 설정</h3>
        <div class="input-group">
          <label class="input-label">기본 요금 (최초)</label>
          <div class="input-row">
            <input type="number" id="baseFee" class="tool-input" value="1000">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">기본 시간</label>
          <div class="input-row">
            <input type="number" id="baseTime" class="tool-input" value="30">
            <span class="input-unit">분</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">추가 요금</label>
          <div class="input-row">
            <input type="number" id="addFee" class="tool-input" value="500">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">추가 단위</label>
          <div class="input-row">
            <input type="number" id="addTime" class="tool-input" value="10">
            <span class="input-unit">분</span>
          </div>
        </div>
      </div>

      <div class="info-card">
        <div class="info-row">
          <span>시작 시간</span>
          <span id="startTime">-</span>
        </div>
        <div class="info-row">
          <span>알림 설정</span>
          <span id="alertTime">없음</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="parking-timer.js"></script>
</body>
</html>
