<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주행 기록장 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; }
    .input-row > * { flex: 1; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .log-list { max-height: 300px; overflow-y: auto; }
    .log-item { background: var(--bg-primary); padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; }
    .log-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .log-date { font-weight: 600; }
    .log-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); }
    .log-delete { color: #ef4444; cursor: pointer; font-size: 0.85rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">주행 기록장</h1>
          <p class="tool-description">주행 거리 및 주유 기록</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalDistance">0</div>
          <div class="stat-label">총 주행거리 (km)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgMileage">0</div>
          <div class="stat-label">평균 연비 (km/L)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalCost">0</div>
          <div class="stat-label">총 연료비 (만원)</div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">새 기록 추가</h3>
        <div class="input-row">
          <div class="input-group">
            <label class="input-label">날짜</label>
            <input type="date" id="logDate" class="tool-input">
          </div>
          <div class="input-group">
            <label class="input-label">주행거리 (km)</label>
            <input type="number" id="logDistance" class="tool-input" placeholder="0" aria-label="0">
          </div>
        </div>
        <div class="input-row">
          <div class="input-group">
            <label class="input-label">주유량 (L)</label>
            <input type="number" id="logFuel" class="tool-input" placeholder="0" aria-label="0">
          </div>
          <div class="input-group">
            <label class="input-label">연료비 (원)</label>
            <input type="number" id="logCost" class="tool-input" placeholder="0" aria-label="0">
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">메모 (선택)</label>
          <input type="text" id="logMemo" class="tool-input" placeholder="고속도로, 시내 주행 등" aria-label="고속도로, 시내 주행 등">
        </div>
        <button class="tool-btn tool-btn-primary" onclick="MileageLog.addLog()" style="width: 100%;" aria-label="+ 기록 추가">+ 기록 추가</button>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <h3 style="font-weight: 600;">기록 목록</h3>
          <button class="tool-btn tool-btn-secondary" onclick="MileageLog.clearAll()" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" aria-label="전체 삭제">전체 삭제</button>
        </div>
        <div class="log-list" id="logList">
          <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="mileage-log.js"></script>
</body>
</html>
