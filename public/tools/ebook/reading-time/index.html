<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>읽기 시간 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 700px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .result-card { background: var(--bg-primary); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .result-card-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .result-card-value { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
    .result-card-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .speed-options { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .speed-btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .speed-btn:hover { border-color: var(--primary); }
    .speed-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .breakdown-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border-color); }
    .breakdown-item:last-child { border-bottom: none; }
    .comparison-bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .comparison-label { width: 80px; font-size: 0.85rem; }
    .comparison-fill { height: 24px; border-radius: 4px; display: flex; align-items: center; padding-left: 0.5rem; color: white; font-size: 0.75rem; transition: width 0.3s; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">읽기 시간 계산기</h1>
          <p class="tool-description">텍스트 읽기 시간 추정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">텍스트 입력</h3>
        <textarea id="textInput" class="tool-input" rows="8" placeholder="읽기 시간을 계산할 텍스트를 입력하세요..." oninput="ReadingTime.calculate()"></textarea>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">읽기 속도</h3>
        <div class="speed-options">
          <button class="speed-btn" onclick="ReadingTime.setSpeed(150)" data-speed="150" aria-label="느림 (150자/분)">느림 (150자/분)</button>
          <button class="speed-btn active" onclick="ReadingTime.setSpeed(250)" data-speed="250" aria-label="보통 (250자/분)">보통 (250자/분)</button>
          <button class="speed-btn" onclick="ReadingTime.setSpeed(400)" data-speed="400" aria-label="빠름 (400자/분)">빠름 (400자/분)</button>
          <button class="speed-btn" onclick="ReadingTime.setSpeed(600)" data-speed="600" aria-label="속독 (600자/분)">속독 (600자/분)</button>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <label style="font-size: 0.85rem;">사용자 정의:</label>
          <input type="number" id="customSpeed" class="tool-input" style="width: 100px;" placeholder="자/분" oninput="ReadingTime.setCustomSpeed()" aria-label="자/분">
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">분석 결과</h3>
        <div class="result-grid">
          <div class="result-card">
            <div class="result-card-icon"></div>
            <div class="result-card-value" id="readingTime">0분</div>
            <div class="result-card-label">예상 읽기 시간</div>
          </div>
          <div class="result-card">
            <div class="result-card-icon"></div>
            <div class="result-card-value" id="charCount">0</div>
            <div class="result-card-label">총 글자 수</div>
          </div>
          <div class="result-card">
            <div class="result-card-icon"></div>
            <div class="result-card-value" id="wordCount">0</div>
            <div class="result-card-label">단어 수</div>
          </div>
          <div class="result-card">
            <div class="result-card-icon"></div>
            <div class="result-card-value" id="pageCount">0</div>
            <div class="result-card-label">예상 페이지 (A4)</div>
          </div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">상세 분석</h3>
        <div id="breakdown">
          <div class="breakdown-item">
            <span>문장 수</span>
            <span id="sentenceCount">0개</span>
          </div>
          <div class="breakdown-item">
            <span>문단 수</span>
            <span id="paragraphCount">0개</span>
          </div>
          <div class="breakdown-item">
            <span>평균 문장 길이</span>
            <span id="avgSentenceLength">0자</span>
          </div>
          <div class="breakdown-item">
            <span>한글 비율</span>
            <span id="koreanRatio">0%</span>
          </div>
          <div class="breakdown-item">
            <span>영문 비율</span>
            <span id="englishRatio">0%</span>
          </div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">속도별 비교</h3>
        <div id="comparison">
          <div class="comparison-bar">
            <span class="comparison-label">느림</span>
            <div class="comparison-fill" id="slowBar" style="background: #ef4444; width: 0;">-</div>
          </div>
          <div class="comparison-bar">
            <span class="comparison-label">보통</span>
            <div class="comparison-fill" id="normalBar" style="background: #f59e0b; width: 0;">-</div>
          </div>
          <div class="comparison-bar">
            <span class="comparison-label">빠름</span>
            <div class="comparison-fill" id="fastBar" style="background: #22c55e; width: 0;">-</div>
          </div>
          <div class="comparison-bar">
            <span class="comparison-label">속독</span>
            <div class="comparison-fill" id="speedBar" style="background: #3b82f6; width: 0;">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="reading-time.js"></script>
</body>
</html>
