<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPUB 검증기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 700px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .upload-zone:hover { border-color: var(--primary); }
    .upload-zone.dragover { border-color: var(--primary); background: var(--bg-primary); }
    .result-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .result-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
    .result-icon.pass { background: #dcfce7; color: #16a34a; }
    .result-icon.warn { background: #fef3c7; color: #d97706; }
    .result-icon.fail { background: #fee2e2; color: #dc2626; }
    .result-icon.info { background: #dbeafe; color: #2563eb; }
    .summary-box { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1rem; }
    .summary-item { text-align: center; padding: 1rem; background: var(--bg-primary); border-radius: 8px; min-width: 80px; }
    .summary-item .count { font-size: 1.5rem; font-weight: 700; }
    .checklist-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; }
    .checklist-item input { width: 18px; height: 18px; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">EPUB 검증기</h1>
          <p class="tool-description">전자책 품질 체크</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">파일 업로드</h3>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept=".epub,.html,.htm" style="display: none;" onchange="EpubValidator.handleFile(event)">
          <div style="font-size: 2rem; margin-bottom: 0.5rem;"></div>
          <p>EPUB 또는 HTML 파일을 드래그하거나 클릭하여 업로드</p>
          <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">지원 형식: .epub, .html</p>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">수동 체크리스트</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem;">전자책 출판 전 확인해야 할 항목들</p>
        <div id="checklist"></div>
        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="EpubValidator.resetChecklist()" style="flex: 1;" aria-label="초기화">초기화</button>
          <button class="tool-btn tool-btn-primary" onclick="EpubValidator.exportChecklist()" style="flex: 1;" aria-label="체크리스트 저장">체크리스트 저장</button>
        </div>
      </div>

      <div class="util-panel" id="resultPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">검증 결과</h3>
        <div class="summary-box" id="summary"></div>
        <div id="resultList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="epub-validator.js"></script>
</body>
</html>
