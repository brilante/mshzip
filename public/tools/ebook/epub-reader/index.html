<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPUB 리더 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .reader-container { background: #fefce8; border-radius: 12px; min-height: 500px; padding: 2rem; font-family: Georgia, serif; line-height: 1.8; }
    .reader-content { max-width: 600px; margin: 0 auto; }
    .reader-content h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; text-align: center; }
    .reader-content h2 { font-size: 1.25rem; font-weight: bold; margin: 1.5rem 0 0.75rem; }
    .reader-content p { margin-bottom: 1rem; text-align: justify; }
    .toc-list { max-height: 200px; overflow-y: auto; }
    .toc-item { padding: 0.5rem; border-radius: 6px; cursor: pointer; margin-bottom: 0.25rem; background: var(--bg-primary); }
    .toc-item:hover { background: var(--primary); color: white; }
    .toc-item.active { background: var(--primary); color: white; }
    .reader-controls { display: flex; gap: 0.5rem; align-items: center; justify-content: center; margin-top: 1rem; }
    .font-controls { display: flex; gap: 0.5rem; align-items: center; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .upload-zone:hover { border-color: var(--primary); }
    .upload-zone.dragover { border-color: var(--primary); background: var(--bg-primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">EPUB 리더</h1>
          <p class="tool-description">전자책 뷰어</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel" id="uploadPanel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">파일 업로드</h3>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept=".epub,.txt" style="display: none;" onchange="EpubReader.handleFile(event)">
          <div style="font-size: 2rem; margin-bottom: 0.5rem;"></div>
          <p>EPUB 또는 TXT 파일을 드래그하거나 클릭하여 업로드</p>
          <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">지원 형식: .epub, .txt</p>
        </div>
        <div style="margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="EpubReader.loadSample()" style="width: 100%;" aria-label="샘플 문서 보기">샘플 문서 보기</button>
        </div>
      </div>

      <div class="util-panel" id="tocPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">목차</h3>
        <div class="toc-list" id="tocList"></div>
      </div>

      <div class="util-panel" id="readerPanel" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;"><span id="bookTitle">문서</span></h3>
          <div class="font-controls">
            <button class="tool-btn tool-btn-secondary" onclick="EpubReader.changeFontSize(-2)" style="padding: 0.25rem 0.5rem;" aria-label="A-">A-</button>
            <span id="fontSizeDisplay" style="font-size: 0.85rem;">16px</span>
            <button class="tool-btn tool-btn-secondary" onclick="EpubReader.changeFontSize(2)" style="padding: 0.25rem 0.5rem;" aria-label="A+">A+</button>
          </div>
        </div>
        <div class="reader-container" id="readerContainer">
          <div class="reader-content" id="readerContent"></div>
        </div>
        <div class="reader-controls">
          <button class="tool-btn tool-btn-secondary" onclick="EpubReader.prevChapter()" aria-label="← 이전">← 이전</button>
          <span id="pageInfo" style="font-size: 0.85rem; color: var(--text-secondary);">1 / 1</span>
          <button class="tool-btn tool-btn-secondary" onclick="EpubReader.nextChapter()" aria-label="다음 →">다음 →</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="epub-reader.js"></script>
</body>
</html>
