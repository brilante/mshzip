<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>참고문헌 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .ref-list { max-height: 400px; overflow-y: auto; }
    .ref-item { display: flex; gap: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .ref-item-num { width: 30px; height: 30px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
    .ref-item-content { flex: 1; font-family: Georgia, serif; line-height: 1.6; }
    .ref-item-actions { display: flex; gap: 0.25rem; align-items: flex-start; }
    .ref-item-actions button { padding: 0.25rem 0.5rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .btn-edit { background: #3b82f6; color: white; }
    .btn-delete { background: #ef4444; color: white; }
    .style-select { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .style-btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .style-btn:hover { border-color: var(--primary); }
    .style-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .preview-box { background: white; border-radius: 8px; padding: 1.5rem; font-family: Georgia, serif; line-height: 1.8; white-space: pre-wrap; }
    .quick-add { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
    .quick-btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.8rem; }
    .quick-btn:hover { border-color: var(--primary); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">참고문헌 생성기</h1>
          <p class="tool-description">참고문헌 목록 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">참고문헌 목록</h3>
          <span id="refCount" style="font-size: 0.85rem; color: var(--text-secondary);">0개</span>
        </div>
        <div class="quick-add">
          <button class="quick-btn" onclick="Bibliography.openModal('book')" aria-label="도서 추가">도서 추가</button>
          <button class="quick-btn" onclick="Bibliography.openModal('journal')" aria-label="논문 추가">논문 추가</button>
          <button class="quick-btn" onclick="Bibliography.openModal('website')" aria-label="웹사이트 추가">웹사이트 추가</button>
        </div>
        <div class="ref-list" id="refList">
          <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">참고문헌을 추가해주세요</div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">인용 스타일</h3>
        <div class="style-select">
          <button class="style-btn active" onclick="Bibliography.setStyle('apa')" data-style="apa" aria-label="APA 7th">APA 7th</button>
          <button class="style-btn" onclick="Bibliography.setStyle('mla')" data-style="mla" aria-label="MLA 9th">MLA 9th</button>
          <button class="style-btn" onclick="Bibliography.setStyle('chicago')" data-style="chicago" aria-label="Chicago">Chicago</button>
          <button class="style-btn" onclick="Bibliography.setStyle('harvard')" data-style="harvard" aria-label="Harvard">Harvard</button>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem;">
          <input type="checkbox" id="sortAlpha" checked onchange="Bibliography.renderPreview()">
          <label for="sortAlpha" style="font-size: 0.85rem;">알파벳순 정렬</label>
          <input type="checkbox" id="hangingIndent" checked onchange="Bibliography.renderPreview()" style="margin-left: 1rem;">
          <label for="hangingIndent" style="font-size: 0.85rem;">내어쓰기</label>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">미리보기</h3>
        <div class="preview-box" id="preview">참고문헌을 추가하면 미리보기가 표시됩니다.</div>
        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="Bibliography.copy()" style="flex: 1;" aria-label="복사">복사</button>
          <button class="tool-btn tool-btn-secondary" onclick="Bibliography.exportTxt()" style="flex: 1;" aria-label="TXT">TXT</button>
          <button class="tool-btn tool-btn-primary" onclick="Bibliography.exportBib()" style="flex: 1;" aria-label="BibTeX">BibTeX</button>
        </div>
      </div>

      <div style="display: flex; gap: 0.5rem;">
        <button class="tool-btn tool-btn-secondary" onclick="Bibliography.clearAll()" style="flex: 1;" aria-label="전체 삭제">전체 삭제</button>
        <button class="tool-btn tool-btn-secondary" onclick="Bibliography.importBib()" style="flex: 1;" aria-label="BibTeX 가져오기">BibTeX 가져오기</button>
      </div>
    </div>
  </div>

  <!-- 참고문헌 추가/편집 모달 -->
  <div class="modal" id="refModal">
    <div class="modal-content">
      <h3 style="font-weight: 600; margin-bottom: 1rem;" id="modalTitle">도서 추가</h3>
      <input type="hidden" id="editingIndex">
      <input type="hidden" id="editingType">

      <div id="modalBookFields">
        <div class="form-group">
          <label class="form-label">저자명 *</label>
          <input type="text" id="mAuthor" class="tool-input" placeholder="홍길동" aria-label="홍길동">
        </div>
        <div class="form-group">
          <label class="form-label">출판연도 *</label>
          <input type="text" id="mYear" class="tool-input" placeholder="2024" aria-label="2024">
        </div>
        <div class="form-group">
          <label class="form-label">책 제목 *</label>
          <input type="text" id="mTitle" class="tool-input" placeholder="책 제목" aria-label="책 제목">
        </div>
        <div class="form-group">
          <label class="form-label">출판사</label>
          <input type="text" id="mPublisher" class="tool-input" placeholder="출판사명" aria-label="출판사명">
        </div>
        <div class="form-group">
          <label class="form-label">출판지</label>
          <input type="text" id="mLocation" class="tool-input" placeholder="서울" aria-label="서울">
        </div>
      </div>

      <div id="modalJournalFields" style="display: none;">
        <div class="form-group">
          <label class="form-label">저자명 *</label>
          <input type="text" id="mJAuthor" class="tool-input" placeholder="홍길동" aria-label="홍길동">
        </div>
        <div class="form-group">
          <label class="form-label">출판연도 *</label>
          <input type="text" id="mJYear" class="tool-input" placeholder="2024" aria-label="2024">
        </div>
        <div class="form-group">
          <label class="form-label">논문 제목 *</label>
          <input type="text" id="mArticleTitle" class="tool-input" placeholder="논문 제목" aria-label="논문 제목">
        </div>
        <div class="form-group">
          <label class="form-label">학술지명 *</label>
          <input type="text" id="mJournalName" class="tool-input" placeholder="한국OO학회지" aria-label="한국OO학회지">
        </div>
        <div class="form-group">
          <label class="form-label">권(Volume), 호(Issue), 페이지</label>
          <input type="text" id="mVolIssue" class="tool-input" placeholder="15(3), 45-67" aria-label="15(3), 45-67">
        </div>
      </div>

      <div id="modalWebsiteFields" style="display: none;">
        <div class="form-group">
          <label class="form-label">저자/기관명</label>
          <input type="text" id="mWAuthor" class="tool-input" placeholder="홍길동" aria-label="홍길동">
        </div>
        <div class="form-group">
          <label class="form-label">페이지 제목 *</label>
          <input type="text" id="mPageTitle" class="tool-input" placeholder="웹페이지 제목" aria-label="웹페이지 제목">
        </div>
        <div class="form-group">
          <label class="form-label">웹사이트명</label>
          <input type="text" id="mSiteName" class="tool-input" placeholder="사이트명" aria-label="사이트명">
        </div>
        <div class="form-group">
          <label class="form-label">URL *</label>
          <input type="text" id="mUrl" class="tool-input" placeholder="https://example.com" aria-label="https://example.com">
        </div>
        <div class="form-group">
          <label class="form-label">접속일</label>
          <input type="text" id="mAccessDate" class="tool-input" placeholder="2024-06-20" aria-label="2024-06-20">
        </div>
      </div>

      <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
        <button class="tool-btn tool-btn-secondary" onclick="Bibliography.closeModal()" style="flex: 1;" aria-label="취소">취소</button>
        <button class="tool-btn tool-btn-primary" onclick="Bibliography.saveRef()" style="flex: 1;" aria-label="저장">저장</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="bibliography.js"></script>
</body>
</html>
