<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인용문 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 700px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .style-options { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .style-btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .style-btn:hover { border-color: var(--primary); }
    .style-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .citation-result { background: var(--bg-primary); border-radius: 8px; padding: 1rem; font-family: Georgia, serif; line-height: 1.6; }
    .citation-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; text-transform: uppercase; }
    .source-type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .source-type-btn { padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; font-size: 0.85rem; }
    .source-type-btn:hover { border-color: var(--primary); }
    .source-type-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">인용문 생성기</h1>
          <p class="tool-description">학술 인용 형식 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">자료 유형</h3>
        <div class="source-type-grid">
          <button class="source-type-btn active" onclick="CitationGen.setSourceType('book')" data-type="book" aria-label="도서">도서</button>
          <button class="source-type-btn" onclick="CitationGen.setSourceType('journal')" data-type="journal" aria-label="학술지">학술지</button>
          <button class="source-type-btn" onclick="CitationGen.setSourceType('website')" data-type="website" aria-label="웹사이트">웹사이트</button>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">자료 정보</h3>
        <div id="bookFields">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">저자명 *</label>
              <input type="text" id="author" class="tool-input" placeholder="홍길동" aria-label="홍길동">
            </div>
            <div class="form-group">
              <label class="form-label">출판연도 *</label>
              <input type="text" id="year" class="tool-input" placeholder="2024" aria-label="2024">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">책 제목 *</label>
            <input type="text" id="title" class="tool-input" placeholder="책 제목을 입력하세요" aria-label="책 제목을 입력하세요">
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">출판사</label>
              <input type="text" id="publisher" class="tool-input" placeholder="출판사명" aria-label="출판사명">
            </div>
            <div class="form-group">
              <label class="form-label">출판지</label>
              <input type="text" id="location" class="tool-input" placeholder="서울" aria-label="서울">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">판 (Edition)</label>
            <input type="text" id="edition" class="tool-input" placeholder="2판" aria-label="2판">
          </div>
        </div>

        <div id="journalFields" style="display: none;">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">저자명 *</label>
              <input type="text" id="jAuthor" class="tool-input" placeholder="홍길동" aria-label="홍길동">
            </div>
            <div class="form-group">
              <label class="form-label">출판연도 *</label>
              <input type="text" id="jYear" class="tool-input" placeholder="2024" aria-label="2024">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">논문 제목 *</label>
            <input type="text" id="articleTitle" class="tool-input" placeholder="논문 제목" aria-label="논문 제목">
          </div>
          <div class="form-group">
            <label class="form-label">학술지명 *</label>
            <input type="text" id="journalName" class="tool-input" placeholder="한국OO학회지" aria-label="한국OO학회지">
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">권(Volume)</label>
              <input type="text" id="volume" class="tool-input" placeholder="15" aria-label="15">
            </div>
            <div class="form-group">
              <label class="form-label">호(Issue)</label>
              <input type="text" id="issue" class="tool-input" placeholder="3" aria-label="3">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">페이지</label>
            <input type="text" id="pages" class="tool-input" placeholder="45-67" aria-label="45-67">
          </div>
          <div class="form-group">
            <label class="form-label">DOI</label>
            <input type="text" id="doi" class="tool-input" placeholder="10.1234/example" aria-label="10.1234/example">
          </div>
        </div>

        <div id="websiteFields" style="display: none;">
          <div class="form-group">
            <label class="form-label">저자/기관명</label>
            <input type="text" id="wAuthor" class="tool-input" placeholder="홍길동 또는 기관명" aria-label="홍길동 또는 기관명">
          </div>
          <div class="form-group">
            <label class="form-label">페이지 제목 *</label>
            <input type="text" id="pageTitle" class="tool-input" placeholder="웹페이지 제목" aria-label="웹페이지 제목">
          </div>
          <div class="form-group">
            <label class="form-label">웹사이트명</label>
            <input type="text" id="siteName" class="tool-input" placeholder="사이트명" aria-label="사이트명">
          </div>
          <div class="form-group">
            <label class="form-label">URL *</label>
            <input type="text" id="url" class="tool-input" placeholder="https://example.com/page" aria-label="https://example.com/page">
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">게시일</label>
              <input type="text" id="publishDate" class="tool-input" placeholder="2024-01-15" aria-label="2024-01-15">
            </div>
            <div class="form-group">
              <label class="form-label">접속일</label>
              <input type="text" id="accessDate" class="tool-input" placeholder="2024-06-20" aria-label="2024-06-20">
            </div>
          </div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">인용 스타일</h3>
        <div class="style-options">
          <button class="style-btn active" onclick="CitationGen.setStyle('apa')" data-style="apa" aria-label="APA 7th">APA 7th</button>
          <button class="style-btn" onclick="CitationGen.setStyle('mla')" data-style="mla" aria-label="MLA 9th">MLA 9th</button>
          <button class="style-btn" onclick="CitationGen.setStyle('chicago')" data-style="chicago" aria-label="Chicago">Chicago</button>
          <button class="style-btn" onclick="CitationGen.setStyle('harvard')" data-style="harvard" aria-label="Harvard">Harvard</button>
          <button class="style-btn" onclick="CitationGen.setStyle('vancouver')" data-style="vancouver" aria-label="Vancouver">Vancouver</button>
        </div>
        <button class="tool-btn tool-btn-primary" onclick="CitationGen.generate()" style="width: 100%;" aria-label="인용문 생성">인용문 생성</button>
      </div>

      <div class="util-panel" id="resultPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">생성된 인용문</h3>
        <div>
          <div class="citation-label">참고문헌</div>
          <div class="citation-result" id="citationResult">-</div>
        </div>
        <div style="margin-top: 1rem;">
          <div class="citation-label">본문 내 인용</div>
          <div class="citation-result" id="inTextResult">-</div>
        </div>
        <button class="tool-btn tool-btn-secondary" onclick="CitationGen.copy()" style="width: 100%; margin-top: 1rem;" aria-label="복사하기">복사하기</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="citation-gen.js"></script>
</body>
</html>
