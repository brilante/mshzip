<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>챕터 분리기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .split-options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .chapter-preview { max-height: 400px; overflow-y: auto; }
    .chapter-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .chapter-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .chapter-card-title { font-weight: 600; }
    .chapter-card-meta { font-size: 0.8rem; color: var(--text-secondary); }
    .chapter-card-preview { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; max-height: 60px; overflow: hidden; }
    .pattern-tag { display: inline-block; background: var(--primary); color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; margin-right: 0.25rem; cursor: pointer; }
    .pattern-tag:hover { opacity: 0.8; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">챕터 분리기</h1>
          <p class="tool-description">텍스트 챕터 자동 분할</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">텍스트 입력</h3>
        <textarea id="textInput" class="tool-input" rows="8" placeholder="분리할 텍스트를 붙여넣으세요..."></textarea>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">분리 설정</h3>
        <div class="split-options">
          <div>
            <label style="font-size: 0.85rem; color: var(--text-secondary);">분리 방식</label>
            <select id="splitMethod" class="tool-input" onchange="ChapterSplitter.updatePatternVisibility()">
              <option value="pattern">패턴 매칭</option>
              <option value="lines">줄 수 기준</option>
              <option value="chars">글자 수 기준</option>
              <option value="custom">사용자 정의 구분자</option>
            </select>
          </div>
          <div id="patternOptions">
            <label style="font-size: 0.85rem; color: var(--text-secondary);">패턴 선택</label>
            <select id="splitPattern" class="tool-input">
              <option value="chapter">Chapter / 제n장</option>
              <option value="part">Part / 제n부</option>
              <option value="section">Section / n절</option>
              <option value="heading">### 마크다운 제목</option>
              <option value="number">숫자. (1. 2. 3.)</option>
            </select>
          </div>
          <div id="lineOptions" style="display: none;">
            <label style="font-size: 0.85rem; color: var(--text-secondary);">줄 수</label>
            <input type="number" id="lineCount" class="tool-input" value="50" min="10" max="500">
          </div>
          <div id="charOptions" style="display: none;">
            <label style="font-size: 0.85rem; color: var(--text-secondary);">글자 수</label>
            <input type="number" id="charCount" class="tool-input" value="3000" min="500" max="50000">
          </div>
          <div id="customOptions" style="display: none;">
            <label style="font-size: 0.85rem; color: var(--text-secondary);">구분자</label>
            <input type="text" id="customDelimiter" class="tool-input" placeholder="예: ---" aria-label="예: ---">
          </div>
        </div>
        <div style="margin-bottom: 0.75rem;">
          <label style="font-size: 0.85rem; color: var(--text-secondary);">자주 쓰는 패턴:</label>
          <div style="margin-top: 0.5rem;">
            <span class="pattern-tag" onclick="ChapterSplitter.setCustomPattern('---')">---</span>
            <span class="pattern-tag" onclick="ChapterSplitter.setCustomPattern('***')">***</span>
            <span class="pattern-tag" onclick="ChapterSplitter.setCustomPattern('===')">===</span>
            <span class="pattern-tag" onclick="ChapterSplitter.setCustomPattern('\\n\\n\\n')">빈 줄 3개</span>
          </div>
        </div>
        <button class="tool-btn tool-btn-primary" onclick="ChapterSplitter.split()" style="width: 100%;" aria-label="분리하기">분리하기</button>
      </div>

      <div class="util-panel" id="resultPanel" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">분리 결과 (<span id="chapterCount">0</span>개 챕터)</h3>
          <button class="tool-btn tool-btn-primary" onclick="ChapterSplitter.downloadAll()" aria-label="전체 다운로드">전체 다운로드</button>
        </div>
        <div class="chapter-preview" id="chapterPreview"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="chapter-splitter.js"></script>
</body>
</html>
