<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전자책 제작기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .chapter-list { max-height: 300px; overflow-y: auto; }
    .chapter-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .chapter-item-info { display: flex; align-items: center; gap: 0.75rem; }
    .chapter-num { width: 28px; height: 28px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 600; }
    .chapter-actions { display: flex; gap: 0.25rem; }
    .chapter-actions button { padding: 0.25rem 0.5rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .btn-edit { background: #3b82f6; color: white; }
    .btn-delete { background: #ef4444; color: white; }
    .preview-container { background: white; border-radius: 12px; padding: 1.5rem; min-height: 300px; font-family: Georgia, serif; line-height: 1.8; }
    .preview-cover { text-align: center; padding: 2rem; border-bottom: 1px solid #e5e7eb; margin-bottom: 1.5rem; }
    .preview-cover h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .preview-chapter { margin-bottom: 1.5rem; }
    .preview-chapter h2 { font-size: 1.25rem; margin-bottom: 0.75rem; color: #374151; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">전자책 제작기</h1>
          <p class="tool-description">EPUB 생성 도구</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">책 정보</h3>
        <div class="meta-grid">
          <div>
            <label style="font-size: 0.85rem; color: var(--text-secondary);">제목 *</label>
            <input type="text" id="bookTitle" class="tool-input" placeholder="책 제목" value="나의 첫 번째 전자책" aria-label="책 제목">
          </div>
          <div>
            <label style="font-size: 0.85rem; color: var(--text-secondary);">저자 *</label>
            <input type="text" id="bookAuthor" class="tool-input" placeholder="저자명" aria-label="저자명">
          </div>
          <div>
            <label style="font-size: 0.85rem; color: var(--text-secondary);">언어</label>
            <select id="bookLanguage" class="tool-input">
              <option value="ko">한국어</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
            </select>
          </div>
          <div>
            <label style="font-size: 0.85rem; color: var(--text-secondary);">출판일</label>
            <input type="date" id="bookDate" class="tool-input">
          </div>
        </div>
        <div style="margin-top: 1rem;">
          <label style="font-size: 0.85rem; color: var(--text-secondary);">설명</label>
          <textarea id="bookDescription" class="tool-input" rows="2" placeholder="책에 대한 간단한 설명"></textarea>
        </div>
      </div>

      <div class="util-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">챕터 목록</h3>
          <button class="tool-btn tool-btn-primary" onclick="EbookCreator.openChapterModal()" aria-label="+ 챕터 추가">+ 챕터 추가</button>
        </div>
        <div class="chapter-list" id="chapterList">
          <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">챕터를 추가해주세요</div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">미리보기</h3>
        <div class="preview-container" id="preview">
          <div style="text-align: center; color: var(--text-secondary);">책 정보와 챕터를 입력하면 미리보기가 표시됩니다</div>
        </div>
      </div>

      <div style="display: flex; gap: 0.5rem;">
        <button class="tool-btn tool-btn-secondary" onclick="EbookCreator.clearAll()" style="flex: 1;" aria-label="초기화">초기화</button>
        <button class="tool-btn tool-btn-primary" onclick="EbookCreator.exportHTML()" style="flex: 1;" aria-label="HTML 다운로드">HTML 다운로드</button>
        <button class="tool-btn tool-btn-primary" onclick="EbookCreator.exportEPUB()" style="flex: 1;" aria-label="EPUB 다운로드">EPUB 다운로드</button>
      </div>
    </div>
  </div>

  <!-- 챕터 편집 모달 -->
  <div class="modal" id="chapterModal">
    <div class="modal-content">
      <h3 style="font-weight: 600; margin-bottom: 1rem;">챕터 편집</h3>
      <input type="hidden" id="editingIndex">
      <div style="margin-bottom: 1rem;">
        <label style="font-size: 0.85rem; color: var(--text-secondary);">챕터 제목</label>
        <input type="text" id="chapterTitle" class="tool-input" placeholder="제1장: 시작" aria-label="제1장: 시작">
      </div>
      <div style="margin-bottom: 1rem;">
        <label style="font-size: 0.85rem; color: var(--text-secondary);">내용</label>
        <textarea id="chapterContent" class="tool-input" rows="10" placeholder="챕터 내용을 입력하세요..."></textarea>
      </div>
      <div style="display: flex; gap: 0.5rem;">
        <button class="tool-btn tool-btn-secondary" onclick="EbookCreator.closeChapterModal()" style="flex: 1;" aria-label="취소">취소</button>
        <button class="tool-btn tool-btn-primary" onclick="EbookCreator.saveChapter()" style="flex: 1;" aria-label="저장">저장</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ebook-creator.js"></script>
</body>
</html>
