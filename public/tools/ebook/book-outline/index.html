<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>책 목차 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .outline-tree { background: var(--bg-primary); border-radius: 8px; padding: 1rem; min-height: 300px; }
    .outline-item { margin-left: 1.5rem; margin-bottom: 0.5rem; }
    .outline-item:first-child { margin-left: 0; }
    .outline-item-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; border-radius: 6px; cursor: pointer; }
    .outline-item-header:hover { background: var(--bg-secondary); }
    .outline-item-header.selected { background: var(--primary); color: white; }
    .outline-toggle { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; }
    .outline-text { flex: 1; }
    .outline-actions { display: flex; gap: 0.25rem; opacity: 0; transition: opacity 0.2s; }
    .outline-item-header:hover .outline-actions { opacity: 1; }
    .outline-actions button { padding: 0.15rem 0.35rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.7rem; background: rgba(0,0,0,0.1); }
    .outline-children { display: none; }
    .outline-children.expanded { display: block; }
    .level-badge { font-size: 0.65rem; padding: 0.1rem 0.3rem; border-radius: 4px; background: var(--primary); color: white; }
    .template-btn { padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer; text-align: left; background: var(--bg-primary); transition: border-color 0.2s; }
    .template-btn:hover { border-color: var(--primary); }
    .template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">책 목차 생성기</h1>
          <p class="tool-description">아웃라인 편집기</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">템플릿 선택</h3>
        <div class="template-grid">
          <button class="template-btn" onclick="BookOutline.loadTemplate('novel')">
            <div style="font-weight: 500;">소설</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary);">프롤로그 → 본문 → 에필로그</div>
          </button>
          <button class="template-btn" onclick="BookOutline.loadTemplate('nonfiction')">
            <div style="font-weight: 500;">비문학</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary);">서론 → 본론 → 결론</div>
          </button>
          <button class="template-btn" onclick="BookOutline.loadTemplate('tutorial')">
            <div style="font-weight: 500;">튜토리얼</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary);">입문 → 기초 → 심화 → 실전</div>
          </button>
          <button class="template-btn" onclick="BookOutline.loadTemplate('empty')">
            <div style="font-weight: 500;">빈 문서</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary);">처음부터 시작</div>
          </button>
        </div>
      </div>

      <div class="util-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">목차 구조</h3>
          <button class="tool-btn tool-btn-primary" onclick="BookOutline.addItem(null)" aria-label="+ 최상위 항목">+ 최상위 항목</button>
        </div>
        <div class="outline-tree" id="outlineTree">
          <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">템플릿을 선택하거나 항목을 추가해주세요</div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">내보내기</h3>
        <div style="display: flex; gap: 0.5rem;">
          <button class="tool-btn tool-btn-secondary" onclick="BookOutline.exportText()" style="flex: 1;" aria-label="텍스트">텍스트</button>
          <button class="tool-btn tool-btn-secondary" onclick="BookOutline.exportMarkdown()" style="flex: 1;" aria-label="마크다운">마크다운</button>
          <button class="tool-btn tool-btn-primary" onclick="BookOutline.exportJSON()" style="flex: 1;" aria-label="JSON">JSON</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="book-outline.js"></script>
</body>
</html>
