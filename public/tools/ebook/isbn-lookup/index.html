<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISBN 조회 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 700px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .search-box { display: flex; gap: 0.5rem; }
    .isbn-info { display: grid; grid-template-columns: 150px 1fr; gap: 1rem; }
    .isbn-cover { width: 150px; height: 200px; background: var(--bg-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--text-secondary); }
    .isbn-details { display: flex; flex-direction: column; gap: 0.5rem; }
    .isbn-title { font-size: 1.25rem; font-weight: 700; }
    .isbn-meta { font-size: 0.9rem; color: var(--text-secondary); }
    .isbn-row { display: flex; gap: 0.5rem; }
    .isbn-label { font-weight: 500; min-width: 80px; }
    .format-options { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
    .format-btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .format-btn:hover { border-color: var(--primary); }
    .format-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .convert-result { background: var(--bg-primary); border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 1.1rem; text-align: center; }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background: var(--bg-primary); border-radius: 6px; margin-bottom: 0.25rem; cursor: pointer; }
    .history-item:hover { background: var(--border-color); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">ISBN 조회</h1>
          <p class="tool-description">도서 정보 검색 및 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">ISBN 조회</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem;">ISBN-10 또는 ISBN-13을 입력하세요</p>
        <div class="search-box">
          <input type="text" id="isbnInput" class="tool-input" placeholder="978-89-12345-67-8" style="flex: 1;" aria-label="978-89-12345-67-8">
          <button class="tool-btn tool-btn-primary" onclick="IsbnLookup.search()" aria-label="검색">검색</button>
        </div>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">예: 9788932919492, 978-89-329-1949-2</p>
      </div>

      <div class="util-panel" id="resultPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">도서 정보</h3>
        <div class="isbn-info">
          <div class="isbn-cover" id="bookCover"></div>
          <div class="isbn-details">
            <div class="isbn-title" id="bookTitle">-</div>
            <div class="isbn-meta" id="bookAuthor">-</div>
            <div class="isbn-row"><span class="isbn-label">출판사:</span><span id="bookPublisher">-</span></div>
            <div class="isbn-row"><span class="isbn-label">출판일:</span><span id="bookDate">-</span></div>
            <div class="isbn-row"><span class="isbn-label">ISBN-10:</span><span id="isbn10">-</span></div>
            <div class="isbn-row"><span class="isbn-label">ISBN-13:</span><span id="isbn13">-</span></div>
            <div class="isbn-row"><span class="isbn-label">페이지:</span><span id="bookPages">-</span></div>
          </div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">ISBN 변환</h3>
        <div class="format-options">
          <button class="format-btn active" onclick="IsbnLookup.setConvertMode('10to13')" data-mode="10to13" aria-label="ISBN-10 → 13">ISBN-10 → 13</button>
          <button class="format-btn" onclick="IsbnLookup.setConvertMode('13to10')" data-mode="13to10" aria-label="ISBN-13 → 10">ISBN-13 → 10</button>
        </div>
        <div class="search-box">
          <input type="text" id="convertInput" class="tool-input" placeholder="변환할 ISBN 입력" style="flex: 1;" aria-label="변환할 ISBN 입력">
          <button class="tool-btn tool-btn-secondary" onclick="IsbnLookup.convert()" aria-label="변환">변환</button>
        </div>
        <div class="convert-result" id="convertResult" style="display: none; margin-top: 0.75rem;">-</div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">ISBN 검증</h3>
        <div class="search-box">
          <input type="text" id="validateInput" class="tool-input" placeholder="검증할 ISBN 입력" style="flex: 1;" aria-label="검증할 ISBN 입력">
          <button class="tool-btn tool-btn-secondary" onclick="IsbnLookup.validate()" aria-label="검증">검증</button>
        </div>
        <div id="validateResult" style="margin-top: 0.75rem; display: none;"></div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">최근 검색</h3>
        <div id="searchHistory">
          <div style="text-align: center; color: var(--text-secondary); padding: 0.5rem;">검색 기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="isbn-lookup.js"></script>
</body>
</html>
