<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플래시카드 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .flash-container { max-width: 700px; margin: 0 auto; }
    .flash-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .mode-tab { flex: 1; padding: 0.75rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; background: var(--bg-primary); color: var(--text-secondary); transition: all 0.2s; }
    .mode-tab.active { background: var(--primary); color: white; }
    .card-wrapper { perspective: 1000px; margin: 2rem 0; }
    .flashcard { width: 100%; height: 250px; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
    .flashcard.flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; width: 100%; height: 100%; border-radius: 16px; display: flex; align-items: center; justify-content: center; padding: 2rem; font-size: 1.3rem; backface-visibility: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    .card-front { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .card-back { background: white; color: #333; transform: rotateY(180deg); border: 2px solid var(--border-color); }
    .card-nav { display: flex; justify-content: space-between; align-items: center; margin: 1rem 0; }
    .nav-btn { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; background: var(--bg-primary); }
    .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .card-counter { font-size: 1rem; color: var(--text-secondary); }
    .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; margin: 1rem 0; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
    .create-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); }
    .card-input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .cards-list { max-height: 200px; overflow-y: auto; margin: 1rem 0; }
    .card-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .card-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-item button { margin-left: 0.5rem; background: none; border: none; cursor: pointer; }
    .deck-selector { margin-bottom: 1rem; }
    @media (max-width: 500px) { .card-input-group { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">플래시카드 생성기</h1>
          <p class="tool-description">학습용 플래시카드 생성 및 암기</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="flash-container">
      <div class="flash-panel">
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="study" onclick="Flashcard.setMode('study')" aria-label="학습">학습</button>
          <button class="mode-tab" data-mode="create" onclick="Flashcard.setMode('create')" aria-label="생성">생성</button>
        </div>

        <!-- 학습 모드 -->
        <div id="studyMode">
          <div class="deck-selector">
            <select id="deckSelect" class="tool-input" onchange="Flashcard.loadDeck()">
              <option value="default">기본 덱</option>
            </select>
          </div>

          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
          </div>

          <div class="card-wrapper">
            <div class="flashcard" id="flashcard" onclick="Flashcard.flip()">
              <div class="card-face card-front" id="cardFront">
                카드를 추가해주세요
              </div>
              <div class="card-face card-back" id="cardBack">
                정답
              </div>
            </div>
          </div>

          <div class="card-nav">
            <button class="nav-btn" onclick="Flashcard.prev()" id="prevBtn" aria-label="← 이전">← 이전</button>
            <span class="card-counter"><span id="currentCard">0</span> / <span id="totalCards">0</span></span>
            <button class="nav-btn" onclick="Flashcard.next()" id="nextBtn" aria-label="다음 →">다음 →</button>
          </div>

          <div style="display: flex; gap: 0.5rem; justify-content: center;">
            <button class="tool-btn tool-btn-secondary" onclick="Flashcard.shuffle()" aria-label="셔플">셔플</button>
            <button class="tool-btn tool-btn-secondary" onclick="Flashcard.reset()" aria-label="처음부터">처음부터</button>
          </div>
        </div>

        <!-- 생성 모드 -->
        <div id="createMode" style="display: none;">
          <div class="create-section">
            <div class="card-input-group">
              <input type="text" id="frontInput" class="tool-input" placeholder="앞면 (질문)" aria-label="앞면 (질문)">
              <input type="text" id="backInput" class="tool-input" placeholder="뒷면 (정답)" aria-label="뒷면 (정답)">
            </div>
            <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="Flashcard.addCard()" aria-label="카드 추가">
              카드 추가
            </button>

            <div class="cards-list" id="cardsList">
              <div style="color: var(--text-secondary); font-size: 0.85rem; text-align: center;">아직 카드가 없습니다.</div>
            </div>

            <div style="display: flex; gap: 0.5rem;">
              <input type="text" id="deckName" class="tool-input" placeholder="덱 이름" style="flex: 1;" aria-label="덱 이름">
              <button class="tool-btn tool-btn-secondary" onclick="Flashcard.saveDeck()" aria-label="저장">저장</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="flashcard-gen.js"></script>
</body>
</html>
