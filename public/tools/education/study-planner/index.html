<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 계획표 - 학습 도구</title>
    <link rel="stylesheet" href="study-planner.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>학습 계획표</h1>
            <p>목표를 설정하고 학습 진도를 추적하세요</p>
        </header>

        <div class="main-grid">
            <div class="calendar-card">
                <div class="calendar-header">
                    <button id="prevMonth" class="nav-btn" aria-label="&lt;">&lt;</button>
                    <h3 id="currentMonth">2024년 1월</h3>
                    <button id="nextMonth" class="nav-btn" aria-label="&gt;">&gt;</button>
                </div>
                <div class="calendar-grid">
                    <div class="day-header">일</div>
                    <div class="day-header">월</div>
                    <div class="day-header">화</div>
                    <div class="day-header">수</div>
                    <div class="day-header">목</div>
                    <div class="day-header">금</div>
                    <div class="day-header">토</div>
                </div>
                <div id="calendarDays" class="calendar-days"></div>
            </div>

            <div class="plan-card">
                <h3 id="selectedDate">날짜를 선택하세요</h3>
                <div class="plan-form">
                    <input type="text" id="planSubject" placeholder="과목" aria-label="과목">
                    <input type="text" id="planTask" placeholder="학습 내용" aria-label="학습 내용">
                    <input type="time" id="planTime">
                    <button id="addPlan" class="btn-add" aria-label="추가">추가</button>
                </div>
                <div id="dayPlans" class="day-plans"></div>
            </div>
        </div>

        <div class="goals-card">
            <h3>학습 목표</h3>
            <div class="goal-form">
                <input type="text" id="goalText" placeholder="새 목표 입력" aria-label="새 목표 입력">
                <input type="date" id="goalDeadline">
                <button id="addGoal" class="btn-add" aria-label="추가">추가</button>
            </div>
            <div id="goalsList" class="goals-list"></div>
        </div>

        <div class="stats-card">
            <h3>이번 주 학습 통계</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="weeklyHours">0</span>
                    <span class="stat-label">시간</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="completedTasks">0</span>
                    <span class="stat-label">완료</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="streakDays">0</span>
                    <span class="stat-label">연속 일</span>
                </div>
            </div>
        </div>
    </div>
    <script src="study-planner.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
