<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타자 연습 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .typing-container { max-width: 800px; margin: 0 auto; }
    .typing-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .text-display { padding: 1.5rem; background: var(--bg-primary); border-radius: 12px; font-size: 1.2rem; line-height: 2; margin-bottom: 1rem; min-height: 120px; }
    .char { transition: color 0.1s; }
    .char.correct { color: #10b981; }
    .char.incorrect { color: #ef4444; background: rgba(239, 68, 68, 0.2); }
    .char.current { background: var(--primary); color: white; border-radius: 2px; }
    .typing-input { font-size: 1.1rem; padding: 1rem; }
    .options-row { display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
    .option-group { display: flex; align-items: center; gap: 0.5rem; }
    .timer-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; margin: 1rem 0; }
    .timer-progress { height: 100%; background: var(--primary); transition: width 1s linear; }
    .result-panel { display: none; text-align: center; padding: 2rem; background: var(--bg-primary); border-radius: 12px; margin-top: 1rem; }
    .result-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
    .result-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .result-stat { padding: 1rem; background: var(--bg-secondary); border-radius: 8px; }
    @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">타자 연습</h1>
          <p class="tool-description">타이핑 속도 측정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="typing-container">
      <div class="typing-panel">
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-value" id="wpmValue">0</div>
            <div class="stat-label">WPM (분당 단어)</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="cpmValue">0</div>
            <div class="stat-label">CPM (분당 문자)</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="accuracyValue">100%</div>
            <div class="stat-label">정확도</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="timeValue">60</div>
            <div class="stat-label">남은 시간 (초)</div>
          </div>
        </div>

        <div class="timer-bar">
          <div class="timer-progress" id="timerProgress" style="width: 100%;"></div>
        </div>

        <div class="options-row">
          <div class="option-group">
            <label>시간:</label>
            <select id="timeSelect" class="tool-input" style="width: auto;">
              <option value="30">30초</option>
              <option value="60" selected>1분</option>
              <option value="120">2분</option>
              <option value="300">5분</option>
            </select>
          </div>
          <div class="option-group">
            <label>언어:</label>
            <select id="langSelect" class="tool-input" style="width: auto;">
              <option value="ko">한국어</option>
              <option value="en">영어</option>
            </select>
          </div>
        </div>

        <div class="text-display" id="textDisplay"></div>

        <textarea id="typingInput" class="tool-input typing-input" placeholder="여기에 위 텍스트를 입력하세요..." rows="3"></textarea>

        <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1rem;" onclick="TypingTest.start()" id="startBtn" aria-label="시작하기">
          시작하기
        </button>

        <div class="result-panel" id="resultPanel">
          <div class="result-title">테스트 완료!</div>
          <div class="result-stats">
            <div class="result-stat">
              <div class="stat-value" id="finalWpm">0</div>
              <div class="stat-label">WPM</div>
            </div>
            <div class="result-stat">
              <div class="stat-value" id="finalAccuracy">0%</div>
              <div class="stat-label">정확도</div>
            </div>
          </div>
          <button class="tool-btn tool-btn-primary" style="margin-top: 1rem;" onclick="TypingTest.reset()" aria-label="다시 하기">다시 하기</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="typing-test.js"></script>
</body>
</html>
