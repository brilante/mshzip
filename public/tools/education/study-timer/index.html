<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스터디 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .study-container { max-width: 600px; margin: 0 auto; }
    .study-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .subject-input { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
    .time-display { font-size: 3.5rem; font-weight: 700; text-align: center; font-family: monospace; padding: 2rem; background: var(--bg-primary); border-radius: 12px; margin-bottom: 1.5rem; }
    .time-display.running { color: var(--primary); }
    .current-subject { text-align: center; font-size: 1.2rem; margin-bottom: 1rem; }
    .current-subject span { padding: 0.5rem 1rem; background: var(--primary); color: white; border-radius: 20px; }
    .control-buttons { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
    .control-btn { padding: 1rem 2rem; border-radius: 8px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .start-btn { background: #10b981; color: white; }
    .pause-btn { background: #f59e0b; color: white; }
    .subjects-section { margin-top: 1.5rem; }
    .section-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--text-secondary); }
    .subject-list { max-height: 200px; overflow-y: auto; }
    .subject-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .subject-name { font-weight: 600; }
    .subject-time { color: var(--primary); font-family: monospace; }
    .total-time { text-align: center; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-top: 1rem; }
    .total-label { font-size: 0.85rem; color: var(--text-secondary); }
    .total-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">스터디 타이머</h1>
          <p class="tool-description">과목별 공부 시간 기록</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="study-container">
      <div class="study-panel">
        <div class="subject-input">
          <input type="text" id="subjectInput" class="tool-input" placeholder="과목명 입력 (예: 수학, 영어)" style="flex: 1;" aria-label="과목명 입력 (예: 수학, 영어)">
          <button class="tool-btn tool-btn-primary" onclick="StudyTimer.setSubject()" aria-label="설정">설정</button>
        </div>

        <div class="current-subject" id="currentSubject" style="display: none;">
          현재 과목: <span id="subjectName"></span>
        </div>

        <div class="time-display" id="timeDisplay">00:00:00</div>

        <div class="control-buttons">
          <button class="control-btn start-btn" id="startBtn" onclick="StudyTimer.toggle()" aria-label="시작">시작</button>
          <button class="control-btn" style="background: var(--bg-primary);" onclick="StudyTimer.saveAndReset()" aria-label="저장">저장</button>
        </div>

        <div class="subjects-section">
          <div class="section-title">오늘의 공부 기록</div>
          <div class="subject-list" id="subjectList">
            <div style="color: var(--text-secondary); font-size: 0.85rem; text-align: center;">아직 기록이 없습니다.</div>
          </div>
          <div class="total-time">
            <div class="total-label">오늘 총 공부 시간</div>
            <div class="total-value" id="totalTime">0시간 0분</div>
          </div>
        </div>

        <button class="tool-btn tool-btn-secondary" style="width: 100%; margin-top: 1rem;" onclick="StudyTimer.clearToday()" aria-label="오늘 기록 초기화">
          오늘 기록 초기화
        </button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="study-timer.js"></script>
</body>
</html>
