<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀴즈 생성기 - 학습 도구</title>
    <link rel="stylesheet" href="quiz-generator.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>퀴즈 생성기</h1>
            <p>다양한 유형의 퀴즈를 만들고 학습 효과를 높이세요</p>
        </header>

        <div class="tabs">
            <button class="tab active" data-tab="create" aria-label="퀴즈 만들기">퀴즈 만들기</button>
            <button class="tab" data-tab="solve" aria-label="퀴즈 풀기">퀴즈 풀기</button>
            <button class="tab" data-tab="results" aria-label="결과 보기">결과 보기</button>
        </div>

        <div class="tab-content active" id="create">
            <div class="quiz-form">
                <div class="input-group">
                    <label>퀴즈 유형</label>
                    <select id="quizType">
                        <option value="multiple">객관식</option>
                        <option value="truefalse">O/X</option>
                        <option value="short">단답형</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>문제</label>
                    <textarea id="question" placeholder="문제를 입력하세요"></textarea>
                </div>
                <div id="optionsContainer">
                    <div class="input-group">
                        <label>보기 (정답에 체크)</label>
                        <div class="option-row">
                            <input type="radio" name="correct" value="0" checked>
                            <input type="text" class="option-input" placeholder="보기 1" aria-label="보기 1">
                        </div>
                        <div class="option-row">
                            <input type="radio" name="correct" value="1">
                            <input type="text" class="option-input" placeholder="보기 2" aria-label="보기 2">
                        </div>
                        <div class="option-row">
                            <input type="radio" name="correct" value="2">
                            <input type="text" class="option-input" placeholder="보기 3" aria-label="보기 3">
                        </div>
                        <div class="option-row">
                            <input type="radio" name="correct" value="3">
                            <input type="text" class="option-input" placeholder="보기 4" aria-label="보기 4">
                        </div>
                    </div>
                </div>
                <div id="shortAnswerContainer" style="display: none;">
                    <div class="input-group">
                        <label>정답</label>
                        <input type="text" id="shortAnswer" placeholder="정답을 입력하세요" aria-label="정답을 입력하세요">
                    </div>
                </div>
                <button id="addQuiz" class="btn-primary" aria-label="퀴즈 추가">퀴즈 추가</button>
            </div>

            <div class="quiz-list">
                <h3>추가된 문제 (<span id="quizCount">0</span>개)</h3>
                <div id="quizListContainer"></div>
            </div>
        </div>

        <div class="tab-content" id="solve">
            <div id="quizArea">
                <div class="quiz-progress">
                    <span id="currentQ">1</span> / <span id="totalQ">0</span>
                </div>
                <div class="quiz-question" id="quizQuestion">퀴즈를 먼저 추가하세요</div>
                <div id="quizOptions"></div>
                <div class="quiz-nav">
                    <button id="submitAnswer" class="btn-primary" aria-label="제출">제출</button>
                </div>
            </div>
        </div>

        <div class="tab-content" id="results">
            <div class="results-summary">
                <div class="score-circle" id="scoreCircle">
                    <span id="scorePercent">0%</span>
                </div>
                <div class="score-details">
                    <p>정답: <span id="correctCount">0</span>개</p>
                    <p>오답: <span id="wrongCount">0</span>개</p>
                </div>
            </div>
            <div id="resultDetails"></div>
            <button id="retryQuiz" class="btn-primary" aria-label="다시 풀기">다시 풀기</button>
        </div>
    </div>
    <script src="quiz-generator.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
