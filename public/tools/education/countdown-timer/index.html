<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카운트다운 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .countdown-container { max-width: 500px; margin: 0 auto; }
    .countdown-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; text-align: center; }
    .time-display { font-size: 4rem; font-weight: 700; font-family: 'Monaco', 'Consolas', monospace; padding: 2rem; background: var(--bg-primary); border-radius: 12px; margin-bottom: 1.5rem; }
    .time-display.warning { color: #f59e0b; }
    .time-display.danger { color: #ef4444; animation: pulse 1s infinite; }
    .time-display.finished { color: #10b981; }
    .time-inputs { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
    .time-input-group { text-align: center; }
    .time-input-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .time-input-group input { width: 70px; text-align: center; font-size: 1.5rem; font-weight: 600; }
    .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
    .preset-btn { padding: 0.5rem 1rem; border-radius: 20px; border: 2px solid var(--border-color); background: transparent; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .preset-btn:hover { border-color: var(--primary); }
    .control-buttons { display: flex; gap: 1rem; justify-content: center; }
    .control-btn { padding: 1rem 2rem; border-radius: 8px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .start-btn { background: #10b981; color: white; }
    .pause-btn { background: #f59e0b; color: white; }
    .reset-btn { background: var(--bg-primary); color: var(--text-primary); border: 2px solid var(--border-color); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">카운트다운 타이머</h1>
          <p class="tool-description">역방향 타이머</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="countdown-container">
      <div class="countdown-panel">
        <div class="time-display" id="timeDisplay">00:00:00</div>

        <div class="time-inputs" id="timeInputs">
          <div class="time-input-group">
            <label>시간</label>
            <input type="number" id="hoursInput" class="tool-input" value="0" min="0" max="23">
          </div>
          <div class="time-input-group">
            <label>분</label>
            <input type="number" id="minutesInput" class="tool-input" value="5" min="0" max="59">
          </div>
          <div class="time-input-group">
            <label>초</label>
            <input type="number" id="secondsInput" class="tool-input" value="0" min="0" max="59">
          </div>
        </div>

        <div class="presets">
          <button class="preset-btn" onclick="CountdownTimer.setPreset(1)" aria-label="1분">1분</button>
          <button class="preset-btn" onclick="CountdownTimer.setPreset(3)" aria-label="3분">3분</button>
          <button class="preset-btn" onclick="CountdownTimer.setPreset(5)" aria-label="5분">5분</button>
          <button class="preset-btn" onclick="CountdownTimer.setPreset(10)" aria-label="10분">10분</button>
          <button class="preset-btn" onclick="CountdownTimer.setPreset(15)" aria-label="15분">15분</button>
          <button class="preset-btn" onclick="CountdownTimer.setPreset(30)" aria-label="30분">30분</button>
          <button class="preset-btn" onclick="CountdownTimer.setPreset(60)" aria-label="1시간">1시간</button>
        </div>

        <div class="control-buttons">
          <button class="control-btn start-btn" id="startBtn" onclick="CountdownTimer.start()" aria-label="시작">시작</button>
          <button class="control-btn reset-btn" onclick="CountdownTimer.reset()" aria-label="리셋">리셋</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="countdown-timer.js"></script>
</body>
</html>
