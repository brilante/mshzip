<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스톱워치 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .stopwatch-container { max-width: 500px; margin: 0 auto; }
    .stopwatch-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; text-align: center; }
    .time-display { font-size: 4rem; font-weight: 700; font-family: 'Monaco', 'Consolas', monospace; padding: 2rem; background: var(--bg-primary); border-radius: 12px; margin-bottom: 1.5rem; letter-spacing: 2px; }
    .time-display.running { color: var(--primary); }
    .milliseconds { font-size: 2rem; color: var(--text-secondary); }
    .control-buttons { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
    .control-btn { width: 80px; height: 80px; border-radius: 50%; border: none; font-size: 2rem; cursor: pointer; transition: all 0.2s; }
    .control-btn:hover { transform: scale(1.05); }
    .start-btn { background: #10b981; color: white; }
    .pause-btn { background: #f59e0b; color: white; }
    .stop-btn { background: #ef4444; color: white; }
    .lap-btn { background: var(--primary); color: white; }
    .laps-section { margin-top: 1.5rem; max-height: 200px; overflow-y: auto; }
    .laps-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--text-secondary); }
    .lap-item { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-primary); border-radius: 6px; margin-bottom: 0.5rem; font-family: monospace; }
    .lap-number { color: var(--text-secondary); }
    .lap-time { font-weight: 600; }
    .lap-diff { font-size: 0.85rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">스톱워치</h1>
          <p class="tool-description">정밀 시간 측정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="stopwatch-container">
      <div class="stopwatch-panel">
        <div class="time-display" id="timeDisplay">
          <span id="mainTime">00:00:00</span><span class="milliseconds" id="msTime">.00</span>
        </div>

        <div class="control-buttons">
          <button class="control-btn start-btn" id="startBtn" onclick="Stopwatch.start()" aria-label=""></button>
          <button class="control-btn lap-btn" id="lapBtn" onclick="Stopwatch.lap()" disabled aria-label=""></button>
          <button class="control-btn stop-btn" id="resetBtn" onclick="Stopwatch.reset()" aria-label=""></button>
        </div>

        <div class="laps-section">
          <div class="laps-title">랩 타임</div>
          <div id="lapsList">
            <div style="color: var(--text-secondary); font-size: 0.85rem;">아직 기록된 랩이 없습니다.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="stopwatch.js"></script>
</body>
</html>
