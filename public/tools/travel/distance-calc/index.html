<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거리 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .travel-container { max-width: 700px; margin: 0 auto; }
    .travel-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .location-input { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .location-title { font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .coord-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .result-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 2rem; color: white; text-align: center; margin: 1.5rem 0; }
    .result-distance { font-size: 3rem; font-weight: 700; }
    .result-unit { font-size: 1.5rem; opacity: 0.9; }
    .result-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .detail-item { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 0.75rem; }
    .detail-value { font-size: 1.25rem; font-weight: 600; }
    .detail-label { font-size: 0.75rem; opacity: 0.8; }
    .preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
    .preset-btn { padding: 0.75rem; border-radius: 8px; border: none; background: var(--bg-primary); cursor: pointer; text-align: left; font-size: 0.85rem; }
    .preset-btn:hover { background: var(--primary); color: white; }
    .preset-cities { font-weight: 500; }
    .preset-distance { font-size: 0.75rem; color: var(--text-secondary); }
    .preset-btn:hover .preset-distance { color: rgba(255,255,255,0.8); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">거리 계산기</h1>
          <p class="tool-description">두 지점 간의 거리 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="travel-container">
      <div class="travel-panel">
        <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">인기 노선</label>
        <div class="preset-grid">
          <button class="preset-btn" onclick="DistanceCalc.setPreset('seoul', 'tokyo')">
            <div class="preset-cities">🇰🇷 서울 → 🇯🇵 도쿄</div>
            <div class="preset-distance">약 1,160km</div>
          </button>
          <button class="preset-btn" onclick="DistanceCalc.setPreset('seoul', 'beijing')">
            <div class="preset-cities">🇰🇷 서울 → 🇨🇳 베이징</div>
            <div class="preset-distance">약 956km</div>
          </button>
          <button class="preset-btn" onclick="DistanceCalc.setPreset('seoul', 'newyork')">
            <div class="preset-cities">🇰🇷 서울 → 🇺🇸 뉴욕</div>
            <div class="preset-distance">약 11,058km</div>
          </button>
          <button class="preset-btn" onclick="DistanceCalc.setPreset('seoul', 'london')">
            <div class="preset-cities">🇰🇷 서울 → 🇬🇧 런던</div>
            <div class="preset-distance">약 8,869km</div>
          </button>
        </div>

        <div class="location-input">
          <div class="location-title">출발지</div>
          <div style="margin-bottom: 1rem;">
            <select id="fromCity" class="tool-input" onchange="DistanceCalc.selectCity('from')">
              <option value="">직접 입력</option>
              <option value="seoul">서울 (Seoul)</option>
              <option value="busan">부산 (Busan)</option>
              <option value="tokyo">도쿄 (Tokyo)</option>
              <option value="osaka">오사카 (Osaka)</option>
              <option value="beijing">베이징 (Beijing)</option>
              <option value="shanghai">상하이 (Shanghai)</option>
              <option value="hongkong">홍콩 (Hong Kong)</option>
              <option value="singapore">싱가포르 (Singapore)</option>
              <option value="bangkok">방콕 (Bangkok)</option>
              <option value="newyork">뉴욕 (New York)</option>
              <option value="losangeles">로스앤젤레스 (Los Angeles)</option>
              <option value="london">런던 (London)</option>
              <option value="paris">파리 (Paris)</option>
              <option value="sydney">시드니 (Sydney)</option>
            </select>
          </div>
          <div class="coord-grid">
            <div>
              <label style="font-size: 0.75rem; color: var(--text-secondary);">위도 (Latitude)</label>
              <input type="number" id="fromLat" class="tool-input" placeholder="37.5665" step="0.0001" oninput="DistanceCalc.calculate()" aria-label="37.5665">
            </div>
            <div>
              <label style="font-size: 0.75rem; color: var(--text-secondary);">경도 (Longitude)</label>
              <input type="number" id="fromLng" class="tool-input" placeholder="126.9780" step="0.0001" oninput="DistanceCalc.calculate()" aria-label="126.9780">
            </div>
          </div>
        </div>

        <div style="text-align: center; margin: 0.5rem 0;">
          <button onclick="DistanceCalc.swap()" style="background: none; border: none; cursor: pointer; font-size: 1.5rem;" aria-label="⇅">⇅</button>
        </div>

        <div class="location-input">
          <div class="location-title">도착지</div>
          <div style="margin-bottom: 1rem;">
            <select id="toCity" class="tool-input" onchange="DistanceCalc.selectCity('to')">
              <option value="">직접 입력</option>
              <option value="seoul">서울 (Seoul)</option>
              <option value="busan">부산 (Busan)</option>
              <option value="tokyo">도쿄 (Tokyo)</option>
              <option value="osaka">오사카 (Osaka)</option>
              <option value="beijing">베이징 (Beijing)</option>
              <option value="shanghai">상하이 (Shanghai)</option>
              <option value="hongkong">홍콩 (Hong Kong)</option>
              <option value="singapore">싱가포르 (Singapore)</option>
              <option value="bangkok">방콕 (Bangkok)</option>
              <option value="newyork">뉴욕 (New York)</option>
              <option value="losangeles">로스앤젤레스 (Los Angeles)</option>
              <option value="london">런던 (London)</option>
              <option value="paris">파리 (Paris)</option>
              <option value="sydney">시드니 (Sydney)</option>
            </select>
          </div>
          <div class="coord-grid">
            <div>
              <label style="font-size: 0.75rem; color: var(--text-secondary);">위도 (Latitude)</label>
              <input type="number" id="toLat" class="tool-input" placeholder="35.6762" step="0.0001" oninput="DistanceCalc.calculate()" aria-label="35.6762">
            </div>
            <div>
              <label style="font-size: 0.75rem; color: var(--text-secondary);">경도 (Longitude)</label>
              <input type="number" id="toLng" class="tool-input" placeholder="139.6503" step="0.0001" oninput="DistanceCalc.calculate()" aria-label="139.6503">
            </div>
          </div>
        </div>

        <div class="result-display" id="resultDisplay">
          <div class="result-distance" id="resultKm">-</div>
          <div class="result-unit">km</div>
          <div class="result-details">
            <div class="detail-item">
              <div class="detail-value" id="resultMiles">-</div>
              <div class="detail-label">마일</div>
            </div>
            <div class="detail-item">
              <div class="detail-value" id="resultNm">-</div>
              <div class="detail-label">해리</div>
            </div>
            <div class="detail-item">
              <div class="detail-value" id="resultFlightTime">-</div>
              <div class="detail-label">예상 비행시간</div>
            </div>
          </div>
        </div>

        <button class="tool-btn tool-btn-secondary" onclick="DistanceCalc.copyResult()" style="width: 100%;" aria-label="결과 복사">결과 복사</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="distance-calc.js"></script>
</body>
</html>
