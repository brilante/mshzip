<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시차 적응 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .travel-container { max-width: 700px; margin: 0 auto; }
    .travel-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .timezone-select { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: end; margin-bottom: 1.5rem; }
    .swap-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; }
    .result-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; margin-bottom: 1.5rem; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .result-diff { font-size: 2.5rem; font-weight: 700; }
    .severity-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; }
    .severity-low { background: rgba(34, 197, 94, 0.3); }
    .severity-medium { background: rgba(234, 179, 8, 0.3); }
    .severity-high { background: rgba(239, 68, 68, 0.3); }
    .tips-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; }
    .tip-item { display: flex; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid var(--bg-secondary); }
    .tip-item:last-child { border-bottom: none; }
    .tip-icon { font-size: 1.5rem; }
    .tip-content h4 { font-weight: 600; margin-bottom: 0.25rem; }
    .tip-content p { font-size: 0.85rem; color: var(--text-secondary); }
    .schedule-section { margin-top: 1.5rem; }
    .schedule-day { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; }
    .schedule-day-header { font-weight: 600; margin-bottom: 0.5rem; }
    .schedule-item { display: flex; gap: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">시차 적응 계산기</h1>
          <p class="tool-description">시차 적응 기간 및 팁 제공</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="travel-container">
      <div class="travel-panel">
        <div class="timezone-select">
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">출발 도시</label>
            <select id="fromTimezone" class="tool-input" onchange="JetLagCalc.calculate()">
              <option value="9" data-city="서울">🇰🇷 서울 (UTC+9)</option>
              <option value="9" data-city="도쿄">🇯🇵 도쿄 (UTC+9)</option>
              <option value="8" data-city="베이징">🇨🇳 베이징 (UTC+8)</option>
              <option value="8" data-city="싱가포르">🇸🇬 싱가포르 (UTC+8)</option>
              <option value="7" data-city="방콕">🇹🇭 방콕 (UTC+7)</option>
              <option value="5.5" data-city="뉴델리">🇮🇳 뉴델리 (UTC+5:30)</option>
              <option value="4" data-city="두바이">🇦🇪 두바이 (UTC+4)</option>
              <option value="1" data-city="파리">🇫🇷 파리 (UTC+1)</option>
              <option value="0" data-city="런던">🇬🇧 런던 (UTC+0)</option>
              <option value="-5" data-city="뉴욕">🇺🇸 뉴욕 (UTC-5)</option>
              <option value="-8" data-city="로스앤젤레스">🇺🇸 LA (UTC-8)</option>
              <option value="10" data-city="시드니">🇦🇺 시드니 (UTC+10)</option>
            </select>
          </div>
          <button class="swap-btn" onclick="JetLagCalc.swap()" aria-label="⇅">⇅</button>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">도착 도시</label>
            <select id="toTimezone" class="tool-input" onchange="JetLagCalc.calculate()">
              <option value="-5" data-city="뉴욕">🇺🇸 뉴욕 (UTC-5)</option>
              <option value="9" data-city="서울">🇰🇷 서울 (UTC+9)</option>
              <option value="9" data-city="도쿄">🇯🇵 도쿄 (UTC+9)</option>
              <option value="8" data-city="베이징">🇨🇳 베이징 (UTC+8)</option>
              <option value="8" data-city="싱가포르">🇸🇬 싱가포르 (UTC+8)</option>
              <option value="7" data-city="방콕">🇹🇭 방콕 (UTC+7)</option>
              <option value="5.5" data-city="뉴델리">🇮🇳 뉴델리 (UTC+5:30)</option>
              <option value="4" data-city="두바이">🇦🇪 두바이 (UTC+4)</option>
              <option value="1" data-city="파리">🇫🇷 파리 (UTC+1)</option>
              <option value="0" data-city="런던">🇬🇧 런던 (UTC+0)</option>
              <option value="-8" data-city="로스앤젤레스">🇺🇸 LA (UTC-8)</option>
              <option value="10" data-city="시드니">🇦🇺 시드니 (UTC+10)</option>
            </select>
          </div>
        </div>

        <div>
          <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">여행 방향</label>
          <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
            <button id="dirEast" class="tool-btn tool-btn-secondary" onclick="JetLagCalc.setDirection('east')" aria-label="동쪽으로 (시간 전진)">동쪽으로 (시간 전진)</button>
            <button id="dirWest" class="tool-btn tool-btn-primary" onclick="JetLagCalc.setDirection('west')" aria-label="서쪽으로 (시간 후퇴)">서쪽으로 (시간 후퇴)</button>
          </div>
        </div>

        <div class="result-card" id="resultCard">
          <div class="result-header">
            <div>
              <div style="font-size: 0.9rem; opacity: 0.9;">시차</div>
              <div class="result-diff" id="timeDiff">14시간</div>
            </div>
            <div class="severity-badge severity-high" id="severityBadge">심함</div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
              <div style="font-size: 0.85rem; opacity: 0.8;">예상 적응 기간</div>
              <div style="font-size: 1.25rem; font-weight: 600;" id="adaptDays">7-10일</div>
            </div>
            <div>
              <div style="font-size: 0.85rem; opacity: 0.8;">권장 조절 시작</div>
              <div style="font-size: 1.25rem; font-weight: 600;" id="prepDays">3일 전</div>
            </div>
          </div>
        </div>

        <div class="tips-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">시차 적응 팁</h3>
          <div id="tipsList"></div>
        </div>

        <div class="schedule-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">권장 적응 스케줄</h3>
          <div id="scheduleList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="jet-lag-calc.js"></script>
</body>
</html>
