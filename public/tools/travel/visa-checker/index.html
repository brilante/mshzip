<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비자 정보 확인 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .travel-container { max-width: 700px; margin: 0 auto; }
    .travel-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .country-select { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: end; margin-bottom: 1.5rem; }
    .arrow-icon { font-size: 1.5rem; padding-bottom: 0.5rem; }
    .visa-result { border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .visa-free { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; }
    .visa-required { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; }
    .visa-eta { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
    .visa-status { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .visa-detail { opacity: 0.9; }
    .info-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .info-title { font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .info-item { }
    .info-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .info-value { font-weight: 500; }
    .doc-list { list-style: none; padding: 0; }
    .doc-list li { padding: 0.5rem 0; border-bottom: 1px solid var(--bg-secondary); display: flex; align-items: center; gap: 0.5rem; }
    .doc-list li:last-child { border-bottom: none; }
    .disclaimer { font-size: 0.8rem; color: var(--text-secondary); text-align: center; margin-top: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">비자 정보 확인</h1>
          <p class="tool-description">국가별 비자 요건 확인</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="travel-container">
      <div class="travel-panel">
        <div class="country-select">
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">여권 국가</label>
            <select id="passportCountry" class="tool-input" onchange="VisaChecker.check()">
              <option value="KR">🇰🇷 대한민국</option>
              <option value="JP">🇯🇵 일본</option>
              <option value="CN">🇨🇳 중국</option>
              <option value="US">🇺🇸 미국</option>
              <option value="GB">🇬🇧 영국</option>
            </select>
          </div>
          <div class="arrow-icon">→</div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">방문 국가</label>
            <select id="destCountry" class="tool-input" onchange="VisaChecker.check()">
              <option value="JP">🇯🇵 일본</option>
              <option value="US">🇺🇸 미국</option>
              <option value="GB">🇬🇧 영국</option>
              <option value="FR">🇫🇷 프랑스</option>
              <option value="DE">🇩🇪 독일</option>
              <option value="TH">🇹🇭 태국</option>
              <option value="VN">🇻🇳 베트남</option>
              <option value="SG">🇸🇬 싱가포르</option>
              <option value="AU">🇦🇺 호주</option>
              <option value="CA">🇨🇦 캐나다</option>
              <option value="CN">🇨🇳 중국</option>
              <option value="BR">🇧🇷 브라질</option>
              <option value="IN">🇮🇳 인도</option>
              <option value="RU">🇷🇺 러시아</option>
            </select>
          </div>
        </div>

        <div id="visaResult" class="visa-result visa-free">
          <div class="visa-status">무비자 입국</div>
          <div class="visa-detail">90일까지 비자 없이 체류 가능</div>
        </div>

        <div class="info-section">
          <div class="info-title">입국 요건</div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">체류 기간</div>
              <div class="info-value" id="stayDuration">90일</div>
            </div>
            <div class="info-item">
              <div class="info-label">여권 유효기간</div>
              <div class="info-value" id="passportValidity">6개월 이상</div>
            </div>
            <div class="info-item">
              <div class="info-label">입국 목적</div>
              <div class="info-value" id="purpose">관광, 상용, 방문</div>
            </div>
            <div class="info-item">
              <div class="info-label">복수 입국</div>
              <div class="info-value" id="multiEntry">가능</div>
            </div>
          </div>
        </div>

        <div class="info-section">
          <div class="info-title">필요 서류</div>
          <ul class="doc-list" id="docList">
            <li>유효한 여권</li>
            <li>왕복 항공권 (또는 출국 증빙)</li>
            <li>숙소 예약 확인서</li>
            <li>체류 경비 증빙</li>
          </ul>
        </div>

        <div class="info-section">
          <div class="info-title">참고 사항</div>
          <div id="notes" style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;"></div>
        </div>

        <div class="disclaimer">
          이 정보는 참고용이며, 실제 비자 요건은 변경될 수 있습니다.<br>
          정확한 정보는 해당 국가 대사관 또는 외교부 홈페이지를 확인하세요.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="visa-checker.js"></script>
</body>
</html>
