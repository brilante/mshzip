<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 짐 체크리스트 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .travel-container { max-width: 800px; margin: 0 auto; }
    .travel-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .trip-type-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; margin-bottom: 1.5rem; }
    .trip-type { padding: 1rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; transition: all 0.2s; border: 2px solid transparent; }
    .trip-type:hover { border-color: var(--primary); }
    .trip-type.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
    .trip-type-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .trip-type-name { font-size: 0.8rem; }
    .checklist-section { margin-top: 1.5rem; }
    .checklist-category { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; cursor: pointer; }
    .category-title { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    .category-progress { font-size: 0.8rem; color: var(--text-secondary); }
    .checklist-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; }
    .checklist-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; border-radius: 6px; background: var(--bg-secondary); }
    .checklist-item.checked { opacity: 0.6; text-decoration: line-through; }
    .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; margin-bottom: 1rem; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">여행 짐 체크리스트</h1>
          <p class="tool-description">여행 유형별 짐 체크리스트</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="travel-container">
      <div class="travel-panel">
        <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">여행 유형 선택</label>
        <div class="trip-type-grid">
          <div class="trip-type selected" data-type="business" onclick="PackingList.selectType('business')">
            <div class="trip-type-icon"></div>
            <div class="trip-type-name">출장</div>
          </div>
          <div class="trip-type" data-type="beach" onclick="PackingList.selectType('beach')">
            <div class="trip-type-icon"></div>
            <div class="trip-type-name">해변/휴양</div>
          </div>
          <div class="trip-type" data-type="city" onclick="PackingList.selectType('city')">
            <div class="trip-type-icon"></div>
            <div class="trip-type-name">도시 여행</div>
          </div>
          <div class="trip-type" data-type="hiking" onclick="PackingList.selectType('hiking')">
            <div class="trip-type-icon"></div>
            <div class="trip-type-name">등산/캠핑</div>
          </div>
          <div class="trip-type" data-type="winter" onclick="PackingList.selectType('winter')">
            <div class="trip-type-icon"></div>
            <div class="trip-type-name">겨울 여행</div>
          </div>
          <div class="trip-type" data-type="family" onclick="PackingList.selectType('family')">
            <div class="trip-type-icon"></div>
            <div class="trip-type-name">가족 여행</div>
          </div>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" id="checkedCount">0</div>
            <div class="stat-label">체크 완료</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">전체 항목</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="progressPercent">0%</div>
            <div class="stat-label">진행률</div>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="PackingList.checkAll()" aria-label="전체 체크">전체 체크</button>
          <button class="tool-btn tool-btn-secondary" onclick="PackingList.uncheckAll()" aria-label="전체 해제">전체 해제</button>
          <button class="tool-btn tool-btn-secondary" onclick="PackingList.exportList()" aria-label="내보내기">내보내기</button>
        </div>

        <div class="checklist-section" id="checklistSection"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="packing-list.js"></script>
</body>
</html>
