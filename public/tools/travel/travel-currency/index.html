<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 환율 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .travel-container { max-width: 600px; margin: 0 auto; }
    .travel-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .currency-input { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .currency-input input { flex: 1; font-size: 1.5rem; text-align: right; }
    .currency-select { width: 140px; }
    .swap-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 1.5rem; margin: 1rem auto; display: block; }
    .result-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; text-align: center; margin: 1.5rem 0; }
    .result-amount { font-size: 2.5rem; font-weight: 700; }
    .result-rate { font-size: 0.9rem; opacity: 0.9; margin-top: 0.5rem; }
    .quick-amounts { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .quick-btn { padding: 0.5rem 1rem; border-radius: 8px; border: none; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .quick-btn:hover { background: var(--primary); color: white; }
    .popular-pairs { margin-top: 1.5rem; }
    .pair-chip { display: inline-block; padding: 0.5rem 1rem; border-radius: 20px; background: var(--bg-primary); margin: 0.25rem; cursor: pointer; font-size: 0.85rem; }
    .pair-chip:hover { background: var(--primary); color: white; }
    .rate-info { font-size: 0.8rem; color: var(--text-secondary); text-align: center; margin-top: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">여행 환율 계산기</h1>
          <p class="tool-description">실시간 환율 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="travel-container">
      <div class="travel-panel">
        <div class="quick-amounts">
          <button class="quick-btn" onclick="TravelCurrency.setAmount(100)" aria-label="100">100</button>
          <button class="quick-btn" onclick="TravelCurrency.setAmount(500)" aria-label="500">500</button>
          <button class="quick-btn" onclick="TravelCurrency.setAmount(1000)" aria-label="1,000">1,000</button>
          <button class="quick-btn" onclick="TravelCurrency.setAmount(5000)" aria-label="5,000">5,000</button>
          <button class="quick-btn" onclick="TravelCurrency.setAmount(10000)" aria-label="10,000">10,000</button>
        </div>

        <div class="currency-input">
          <input type="number" id="fromAmount" class="tool-input" value="100000" oninput="TravelCurrency.convert()">
          <select id="fromCurrency" class="tool-input currency-select" onchange="TravelCurrency.convert()">
            <option value="KRW">🇰🇷 KRW</option>
            <option value="USD">🇺🇸 USD</option>
            <option value="EUR">🇪🇺 EUR</option>
            <option value="JPY">🇯🇵 JPY</option>
            <option value="CNY">🇨🇳 CNY</option>
            <option value="GBP">🇬🇧 GBP</option>
            <option value="THB">🇹🇭 THB</option>
            <option value="VND">🇻🇳 VND</option>
            <option value="PHP">🇵🇭 PHP</option>
            <option value="SGD">🇸🇬 SGD</option>
            <option value="AUD">🇦🇺 AUD</option>
            <option value="CAD">🇨🇦 CAD</option>
            <option value="CHF">🇨🇭 CHF</option>
          </select>
        </div>

        <button class="swap-btn" onclick="TravelCurrency.swap()" aria-label="⇅">⇅</button>

        <div class="currency-input">
          <input type="text" id="toAmount" class="tool-input" readonly style="background: var(--bg-primary);">
          <select id="toCurrency" class="tool-input currency-select" onchange="TravelCurrency.convert()">
            <option value="USD">🇺🇸 USD</option>
            <option value="KRW">🇰🇷 KRW</option>
            <option value="EUR">🇪🇺 EUR</option>
            <option value="JPY">🇯🇵 JPY</option>
            <option value="CNY">🇨🇳 CNY</option>
            <option value="GBP">🇬🇧 GBP</option>
            <option value="THB">🇹🇭 THB</option>
            <option value="VND">🇻🇳 VND</option>
            <option value="PHP">🇵🇭 PHP</option>
            <option value="SGD">🇸🇬 SGD</option>
            <option value="AUD">🇦🇺 AUD</option>
            <option value="CAD">🇨🇦 CAD</option>
            <option value="CHF">🇨🇭 CHF</option>
          </select>
        </div>

        <div class="result-display" id="resultDisplay">
          <div class="result-amount">-</div>
          <div class="result-rate">환율 정보를 계산 중...</div>
        </div>

        <div class="popular-pairs">
          <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">인기 통화쌍</label>
          <span class="pair-chip" onclick="TravelCurrency.setPair('KRW','USD')">🇰🇷→🇺🇸 원-달러</span>
          <span class="pair-chip" onclick="TravelCurrency.setPair('KRW','JPY')">🇰🇷→🇯🇵 원-엔</span>
          <span class="pair-chip" onclick="TravelCurrency.setPair('KRW','EUR')">🇰🇷→🇪🇺 원-유로</span>
          <span class="pair-chip" onclick="TravelCurrency.setPair('KRW','THB')">🇰🇷→🇹🇭 원-바트</span>
          <span class="pair-chip" onclick="TravelCurrency.setPair('KRW','VND')">🇰🇷→🇻🇳 원-동</span>
        </div>

        <div class="rate-info">
          ※ 환율은 참고용이며 실제 환전 시 다를 수 있습니다
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="travel-currency.js"></script>
</body>
</html>
