<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 일정 플래너 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .travel-container { max-width: 900px; margin: 0 auto; }
    .travel-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .trip-header { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .day-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; border-left: 4px solid var(--primary); }
    .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .day-title { font-weight: 600; font-size: 1.1rem; }
    .day-date { font-size: 0.85rem; color: var(--text-secondary); }
    .activity-item { display: flex; gap: 1rem; padding: 0.75rem; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 0.5rem; }
    .activity-time { width: 60px; font-weight: 500; color: var(--primary); }
    .activity-content { flex: 1; }
    .activity-name { font-weight: 500; }
    .activity-location { font-size: 0.8rem; color: var(--text-secondary); }
    .add-activity { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .add-activity input { flex: 1; }
    .summary-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; margin-top: 1.5rem; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; text-align: center; }
    .summary-value { font-size: 1.5rem; font-weight: 700; }
    .summary-label { font-size: 0.8rem; opacity: 0.9; }
    .empty-day { text-align: center; padding: 2rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">여행 일정 플래너</h1>
          <p class="tool-description">여행 일정 계획 및 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="travel-container">
      <div class="travel-panel">
        <div class="trip-header">
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.25rem;">여행명</label>
            <input type="text" id="tripName" class="tool-input" placeholder="예: 일본 도쿄 여행" oninput="ItineraryPlanner.updateTrip()" aria-label="예: 일본 도쿄 여행">
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.25rem;">시작일</label>
            <input type="date" id="startDate" class="tool-input" onchange="ItineraryPlanner.updateTrip()">
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.25rem;">종료일</label>
            <input type="date" id="endDate" class="tool-input" onchange="ItineraryPlanner.updateTrip()">
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
          <button class="tool-btn tool-btn-secondary" onclick="ItineraryPlanner.loadSample()" aria-label="샘플 불러오기">샘플 불러오기</button>
          <button class="tool-btn tool-btn-secondary" onclick="ItineraryPlanner.clearAll()" aria-label="초기화">초기화</button>
          <button class="tool-btn tool-btn-primary" onclick="ItineraryPlanner.exportItinerary()" aria-label="내보내기">내보내기</button>
        </div>

        <div id="itineraryDays"></div>

        <div class="summary-card" id="summaryCard" style="display: none;">
          <h3 style="margin-bottom: 1rem; font-weight: 600;">여행 요약</h3>
          <div class="summary-grid">
            <div>
              <div class="summary-value" id="totalDays">0</div>
              <div class="summary-label">총 일수</div>
            </div>
            <div>
              <div class="summary-value" id="totalActivities">0</div>
              <div class="summary-label">총 활동</div>
            </div>
            <div>
              <div class="summary-value" id="totalLocations">0</div>
              <div class="summary-label">방문 장소</div>
            </div>
            <div>
              <div class="summary-value" id="avgPerDay">0</div>
              <div class="summary-label">일평균 활동</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="itinerary-planner.js"></script>
</body>
</html>
