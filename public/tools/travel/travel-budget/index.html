<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 예산 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .travel-container { max-width: 800px; margin: 0 auto; }
    .travel-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .budget-header { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .category-section { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; cursor: pointer; }
    .category-title { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    .category-total { font-weight: 600; color: var(--primary); }
    .expense-item { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .expense-item input[type="text"] { flex: 1; }
    .expense-item input[type="number"] { width: 120px; }
    .add-expense { display: flex; gap: 0.5rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px dashed var(--bg-secondary); }
    .summary-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; margin-top: 1.5rem; }
    .summary-total { font-size: 2.5rem; font-weight: 700; text-align: center; margin-bottom: 1rem; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .summary-item { text-align: center; }
    .summary-value { font-size: 1.25rem; font-weight: 600; }
    .summary-label { font-size: 0.75rem; opacity: 0.9; }
    .chart-bar { height: 20px; background: var(--bg-secondary); border-radius: 10px; overflow: hidden; margin-top: 0.5rem; }
    .chart-fill { height: 100%; border-radius: 10px; transition: width 0.3s; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">여행 예산 계산기</h1>
          <p class="tool-description">여행 경비 계획 및 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="travel-container">
      <div class="travel-panel">
        <div class="budget-header">
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.25rem;">여행 목적지</label>
            <input type="text" id="destination" class="tool-input" placeholder="예: 일본 도쿄" oninput="TravelBudget.save()" aria-label="예: 일본 도쿄">
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.25rem;">여행 일수</label>
            <input type="number" id="tripDays" class="tool-input" value="4" min="1" oninput="TravelBudget.save()">
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.25rem;">인원수</label>
            <input type="number" id="travelers" class="tool-input" value="1" min="1" oninput="TravelBudget.save()">
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
          <button class="tool-btn tool-btn-secondary" onclick="TravelBudget.loadTemplate('economy')" aria-label="알뜰 여행">알뜰 여행</button>
          <button class="tool-btn tool-btn-secondary" onclick="TravelBudget.loadTemplate('standard')" aria-label="표준 여행">표준 여행</button>
          <button class="tool-btn tool-btn-secondary" onclick="TravelBudget.loadTemplate('luxury')" aria-label="럭셔리 여행">럭셔리 여행</button>
          <button class="tool-btn tool-btn-secondary" onclick="TravelBudget.clearAll()" aria-label="초기화">초기화</button>
        </div>

        <div id="categoriesSection"></div>

        <div class="summary-card">
          <div style="font-size: 0.9rem; text-align: center; opacity: 0.9; margin-bottom: 0.5rem;">총 예상 경비</div>
          <div class="summary-total" id="totalBudget">₩0</div>
          <div class="summary-grid">
            <div class="summary-item">
              <div class="summary-value" id="perDay">₩0</div>
              <div class="summary-label">1일 평균</div>
            </div>
            <div class="summary-item">
              <div class="summary-value" id="perPerson">₩0</div>
              <div class="summary-label">1인당</div>
            </div>
            <div class="summary-item">
              <div class="summary-value" id="perPersonDay">₩0</div>
              <div class="summary-label">1인 1일</div>
            </div>
            <div class="summary-item">
              <div class="summary-value" id="categoryCount">0개</div>
              <div class="summary-label">항목 수</div>
            </div>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" onclick="TravelBudget.exportBudget()" style="width: 100%; margin-top: 1rem;" aria-label="예산표 내보내기">예산표 내보내기</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="travel-budget.js"></script>
</body>
</html>
