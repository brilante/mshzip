<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비행 시간 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .travel-container { max-width: 700px; margin: 0 auto; }
    .travel-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .form-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: end; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .swap-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 1.25rem; }
    .result-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; margin-top: 1.5rem; text-align: center; }
    .result-time { font-size: 3rem; font-weight: 700; }
    .result-label { font-size: 0.9rem; opacity: 0.9; }
    .flight-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .info-item { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 1rem; text-align: center; }
    .info-value { font-size: 1.25rem; font-weight: 600; }
    .info-label { font-size: 0.75rem; opacity: 0.8; }
    .popular-routes { margin-top: 1.5rem; }
    .route-chip { display: inline-block; padding: 0.5rem 1rem; border-radius: 20px; background: var(--bg-primary); margin: 0.25rem; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .route-chip:hover { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">비행 시간 계산기</h1>
          <p class="tool-description">출발지-도착지 예상 비행 시간</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="travel-container">
      <div class="travel-panel">
        <div class="form-row">
          <div class="form-group" style="margin-bottom: 0;">
            <label>출발지</label>
            <select id="departure" class="tool-input">
              <option value="ICN">서울 인천 (ICN)</option>
              <option value="GMP">서울 김포 (GMP)</option>
              <option value="PUS">부산 김해 (PUS)</option>
              <option value="CJU">제주 (CJU)</option>
              <option value="NRT">도쿄 나리타 (NRT)</option>
              <option value="HND">도쿄 하네다 (HND)</option>
              <option value="KIX">오사카 간사이 (KIX)</option>
              <option value="PEK">베이징 (PEK)</option>
              <option value="PVG">상하이 (PVG)</option>
              <option value="HKG">홍콩 (HKG)</option>
              <option value="BKK">방콕 (BKK)</option>
              <option value="SIN">싱가포르 (SIN)</option>
              <option value="SYD">시드니 (SYD)</option>
              <option value="LAX">로스앤젤레스 (LAX)</option>
              <option value="JFK">뉴욕 JFK (JFK)</option>
              <option value="LHR">런던 히드로 (LHR)</option>
              <option value="CDG">파리 (CDG)</option>
              <option value="FRA">프랑크푸르트 (FRA)</option>
            </select>
          </div>
          <button class="swap-btn" onclick="FlightCalc.swap()" aria-label="⇄">⇄</button>
          <div class="form-group" style="margin-bottom: 0;">
            <label>도착지</label>
            <select id="arrival" class="tool-input">
              <option value="NRT">도쿄 나리타 (NRT)</option>
              <option value="HND">도쿄 하네다 (HND)</option>
              <option value="KIX">오사카 간사이 (KIX)</option>
              <option value="ICN">서울 인천 (ICN)</option>
              <option value="GMP">서울 김포 (GMP)</option>
              <option value="PUS">부산 김해 (PUS)</option>
              <option value="CJU">제주 (CJU)</option>
              <option value="PEK">베이징 (PEK)</option>
              <option value="PVG">상하이 (PVG)</option>
              <option value="HKG">홍콩 (HKG)</option>
              <option value="BKK">방콕 (BKK)</option>
              <option value="SIN">싱가포르 (SIN)</option>
              <option value="SYD">시드니 (SYD)</option>
              <option value="LAX">로스앤젤레스 (LAX)</option>
              <option value="JFK">뉴욕 JFK (JFK)</option>
              <option value="LHR">런던 히드로 (LHR)</option>
              <option value="CDG">파리 (CDG)</option>
              <option value="FRA">프랑크푸르트 (FRA)</option>
            </select>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="FlightCalc.calculate()" aria-label="비행 시간 계산">비행 시간 계산</button>

        <div id="resultContainer"></div>

        <div class="popular-routes">
          <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">인기 노선</label>
          <span class="route-chip" onclick="FlightCalc.setRoute('ICN','NRT')">🇰🇷→🇯🇵 인천-도쿄</span>
          <span class="route-chip" onclick="FlightCalc.setRoute('ICN','BKK')">🇰🇷→🇹🇭 인천-방콕</span>
          <span class="route-chip" onclick="FlightCalc.setRoute('ICN','LAX')">🇰🇷→🇺🇸 인천-LA</span>
          <span class="route-chip" onclick="FlightCalc.setRoute('ICN','LHR')">🇰🇷→🇬🇧 인천-런던</span>
          <span class="route-chip" onclick="FlightCalc.setRoute('ICN','SYD')">🇰🇷→🇦🇺 인천-시드니</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="flight-time-calc.js"></script>
</body>
</html>
