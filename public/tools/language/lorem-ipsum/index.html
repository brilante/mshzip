<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로렘 입숨 생성기 - ALLINONE</title>
    <link rel="stylesheet" href="lorem-ipsum.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>로렘 입숨 생성기</h1>
            <p class="subtitle">디자인 목업용 더미 텍스트를 쉽게 만들어보세요</p>
        </header>
        <main class="main-content">
            <div class="control-panel">
                <div class="control-group">
                    <label>언어</label>
                    <div class="toggle-group" id="languageToggle">
                        <button class="toggle-btn active" data-value="latin" aria-label="Latin">Latin</button>
                        <button class="toggle-btn" data-value="korean" aria-label="한국어">한국어</button>
                        <button class="toggle-btn" data-value="hipster" aria-label="Hipster">Hipster</button>
                        <button class="toggle-btn" data-value="office" aria-label="비즈니스">비즈니스</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>생성 단위</label>
                    <div class="toggle-group" id="unitToggle">
                        <button class="toggle-btn active" data-value="paragraphs" aria-label="문단">문단</button>
                        <button class="toggle-btn" data-value="sentences" aria-label="문장">문장</button>
                        <button class="toggle-btn" data-value="words" aria-label="단어">단어</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>개수</label>
                    <div class="count-input">
                        <button class="count-btn" onclick="changeCount(-1)" aria-label="-">-</button>
                        <input type="number" id="count" value="3" min="1" max="100">
                        <button class="count-btn" onclick="changeCount(1)" aria-label="+">+</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>옵션</label>
                    <div class="options">
                        <label><input type="checkbox" id="startWithLorem" checked> "Lorem ipsum"으로 시작</label>
                        <label><input type="checkbox" id="includeHtml"> HTML 태그 포함</label>
                    </div>
                </div>
                <button class="generate-btn" onclick="generate()" aria-label="생성하기">생성하기</button>
            </div>
            <div class="output-section">
                <div class="output-header">
                    <h3>생성된 텍스트</h3>
                    <div class="output-actions">
                        <button class="action-btn" onclick="copyText()" aria-label="복사">복사</button>
                        <button class="action-btn" onclick="downloadText()" aria-label="다운로드">다운로드</button>
                    </div>
                </div>
                <div class="output-stats">
                    <span id="statParagraphs">0 문단</span>
                    <span id="statSentences">0 문장</span>
                    <span id="statWords">0 단어</span>
                    <span id="statChars">0 글자</span>
                </div>
                <div id="output" class="output-text"></div>
            </div>
        </main>
    </div>
    <script src="lorem-ipsum.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
