<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한글 ↔ 로마자 변환 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .roman-container { max-width: 700px; margin: 0 auto; }
    .roman-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .mode-tab { flex: 1; padding: 0.75rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; background: var(--bg-primary); }
    .mode-tab.active { background: var(--primary); color: white; }
    .textarea-container { margin-bottom: 1rem; }
    .textarea-container label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .io-textarea { width: 100%; height: 120px; resize: vertical; padding: 1rem; border: 2px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); font-size: 1rem; }
    .io-textarea:focus { border-color: var(--primary); outline: none; }
    .swap-btn { display: block; margin: 0.5rem auto; padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; }
    .result-box { background: var(--bg-primary); border-radius: 8px; padding: 1rem; min-height: 100px; font-size: 1.1rem; line-height: 1.8; }
    .action-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon">🇰🇷</div>
        <div>
          <h1 class="tool-title">한글 ↔ 로마자 변환</h1>
          <p class="tool-description">한글을 로마자로 또는 로마자를 한글로 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="roman-container">
      <div class="roman-panel">
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="toRoman" onclick="Romanization.setMode('toRoman')" aria-label="한글 → 로마자">한글 → 로마자</button>
          <button class="mode-tab" data-mode="toKorean" onclick="Romanization.setMode('toKorean')" aria-label="로마자 → 한글">로마자 → 한글</button>
        </div>

        <div class="textarea-container">
          <label id="inputLabel">한글 입력</label>
          <textarea class="io-textarea" id="inputText" placeholder="변환할 텍스트를 입력하세요..." oninput="Romanization.convert()">안녕하세요</textarea>
        </div>

        <button class="swap-btn" onclick="Romanization.swap()" aria-label="⇅ 바꾸기">⇅ 바꾸기</button>

        <div class="textarea-container">
          <label>변환 결과</label>
          <div class="result-box" id="resultBox">annyeonghaseyo</div>
          <div class="action-row">
            <button class="tool-btn tool-btn-secondary" onclick="Romanization.copy()" aria-label="복사">복사</button>
            <button class="tool-btn tool-btn-secondary" onclick="Romanization.clear()" aria-label="지우기">지우기</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="romanization.js"></script>
</body>
</html>
