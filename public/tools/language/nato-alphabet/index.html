<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATO 알파벳 변환기 - ALLINONE</title>
    <link rel="stylesheet" href="nato-alphabet.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>NATO 알파벳 변환기</h1>
            <p class="subtitle">텍스트를 NATO 음성 알파벳으로 변환합니다</p>
        </header>
        <main class="main-content">
            <div class="converter-section">
                <div class="input-area">
                    <label>변환할 텍스트</label>
                    <textarea id="inputText" placeholder="텍스트를 입력하세요 (영문, 숫자)"></textarea>
                </div>
                <div class="output-area">
                    <div class="output-header">
                        <label>NATO 알파벳</label>
                        <button class="copy-btn" onclick="copyResult()" aria-label="복사">복사</button>
                    </div>
                    <div id="output" class="output-grid"></div>
                </div>
            </div>
            <div class="reference-section">
                <h3>NATO 음성 알파벳 표</h3>
                <div class="alphabet-grid" id="alphabetGrid"></div>
            </div>
        </main>
    </div>
    <script src="nato-alphabet.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
