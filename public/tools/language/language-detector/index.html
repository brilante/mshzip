<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>언어 감지기 - ALLINONE</title>
    <link rel="stylesheet" href="language-detector.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>언어 감지기</h1>
            <p class="subtitle">텍스트를 입력하면 어떤 언어인지 알려드립니다</p>
        </header>
        <main class="main-content">
            <div class="input-section">
                <textarea id="inputText" placeholder="감지할 텍스트를 입력하세요..."></textarea>
                <div class="char-count"><span id="charCount">0</span> 글자</div>
            </div>
            <div class="result-section">
                <div class="detected-language">
                    <div class="language-flag" id="languageFlag"></div>
                    <div class="language-info">
                        <div class="language-name" id="languageName">언어를 입력해주세요</div>
                        <div class="language-native" id="languageNative">-</div>
                    </div>
                    <div class="confidence">
                        <div class="confidence-label">신뢰도</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidenceFill"></div>
                        </div>
                        <div class="confidence-value" id="confidenceValue">0%</div>
                    </div>
                </div>
                <div class="other-languages">
                    <h3>다른 가능성</h3>
                    <div id="otherLanguages" class="language-list">-</div>
                </div>
                <div class="language-stats">
                    <div class="stat-item">
                        <span class="stat-label">문자 유형</span>
                        <span class="stat-value" id="scriptType">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">문장 수</span>
                        <span class="stat-value" id="sentenceCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">단어 수</span>
                        <span class="stat-value" id="wordCount">0</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="language-detector.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
