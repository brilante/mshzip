<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모스 부호 변환기 - ALLINONE</title>
    <link rel="stylesheet" href="morse-code.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>모스 부호 변환기</h1>
            <p class="subtitle">텍스트를 모스 부호로, 모스 부호를 텍스트로 변환하세요</p>
        </header>
        <main class="main-content">
            <div class="converter-section">
                <div class="input-panel">
                    <div class="panel-header">
                        <h3>텍스트</h3>
                        <button class="clear-btn" onclick="clearText()" aria-label="지우기">지우기</button>
                    </div>
                    <textarea id="textInput" placeholder="변환할 텍스트를 입력하세요..."></textarea>
                </div>
                <div class="converter-buttons">
                    <button class="convert-btn" onclick="textToMorse()" aria-label="텍스트 → 모스">
                        텍스트 → 모스
                        <span class="arrow">▼</span>
                    </button>
                    <button class="convert-btn" onclick="morseToText()" aria-label="모스 → 텍스트">
                        모스 → 텍스트
                        <span class="arrow">▲</span>
                    </button>
                </div>
                <div class="output-panel">
                    <div class="panel-header">
                        <h3>모스 부호</h3>
                        <div class="actions">
                            <button class="action-btn" onclick="playMorse()" aria-label="재생">재생</button>
                            <button class="action-btn" onclick="copyMorse()" aria-label="복사">복사</button>
                        </div>
                    </div>
                    <textarea id="morseInput" placeholder="모스 부호 (. - 사용)&#10;단어 구분: /&#10;글자 구분: 공백"></textarea>
                </div>
            </div>
            <div class="visual-section">
                <h3>시각적 표시</h3>
                <div id="visualMorse" class="visual-morse"></div>
            </div>
            <div class="reference-section">
                <h3>모스 부호 참조표</h3>
                <div class="reference-tabs">
                    <button class="ref-tab active" onclick="showReference('letters')" aria-label="알파벳">알파벳</button>
                    <button class="ref-tab" onclick="showReference('numbers')" aria-label="숫자">숫자</button>
                    <button class="ref-tab" onclick="showReference('punctuation')" aria-label="구두점">구두점</button>
                </div>
                <div id="referenceContent" class="reference-grid"></div>
            </div>
        </main>
    </div>
    <script src="morse-code.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
