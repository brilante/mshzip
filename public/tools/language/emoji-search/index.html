<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이모지 검색기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .emoji-container { max-width: 700px; margin: 0 auto; }
    .emoji-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-box input { flex: 1; }
    .category-tabs { display: flex; gap: 0.25rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .cat-tab { padding: 0.5rem 0.75rem; border-radius: 20px; border: none; cursor: pointer; font-size: 0.85rem; background: var(--bg-primary); }
    .cat-tab.active { background: var(--primary); color: white; }
    .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 0.5rem; max-height: 400px; overflow-y: auto; }
    .emoji-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
    .emoji-item:hover { transform: scale(1.2); background: rgba(59, 130, 246, 0.2); }
    .selected-emoji { text-align: center; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 1rem; }
    .selected-emoji .emoji { font-size: 4rem; }
    .selected-emoji .name { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.5rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이모지 검색기</h1>
          <p class="tool-description">이모지 검색 및 복사</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="emoji-container">
      <div class="emoji-panel">
        <div class="search-box">
          <input type="text" id="searchInput" class="tool-input" placeholder="이모지 검색 (예: 웃음, smile)..." oninput="EmojiSearch.search()" aria-label="이모지 검색 (예: 웃음, smile)...">
        </div>

        <div class="category-tabs" id="categoryTabs"></div>

        <div class="selected-emoji" id="selectedEmoji" style="display: none;">
          <div class="emoji" id="selectedEmojiChar"></div>
          <div class="name" id="selectedEmojiName"></div>
          <button class="tool-btn tool-btn-primary" style="margin-top: 0.5rem;" onclick="EmojiSearch.copy()" aria-label="복사">복사</button>
        </div>

        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="emoji-search.js"></script>
</body>
</html>
