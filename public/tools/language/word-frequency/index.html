<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 빈도 분석기 - ALLINONE</title>
    <link rel="stylesheet" href="word-frequency.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>단어 빈도 분석기</h1>
            <p class="subtitle">텍스트의 단어 사용 빈도를 분석합니다</p>
        </header>
        <main class="main-content">
            <div class="input-section">
                <textarea id="inputText" placeholder="분석할 텍스트를 입력하세요..."></textarea>
                <div class="options">
                    <label><input type="checkbox" id="ignoreCase" checked> 대소문자 무시</label>
                    <label><input type="checkbox" id="ignoreNumbers"> 숫자 제외</label>
                    <label><input type="checkbox" id="ignoreStopwords" checked> 불용어 제외</label>
                    <label>최소 글자수: <input type="number" id="minLength" value="2" min="1" max="10"></label>
                </div>
                <button class="analyze-btn" onclick="analyze()" aria-label="분석하기">분석하기</button>
            </div>
            <div class="result-section">
                <div class="stats-row">
                    <div class="stat-card">
                        <span class="stat-value" id="totalWords">0</span>
                        <span class="stat-label">총 단어 수</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="uniqueWords">0</span>
                        <span class="stat-label">고유 단어 수</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="avgLength">0</span>
                        <span class="stat-label">평균 단어 길이</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="lexicalDensity">0%</span>
                        <span class="stat-label">어휘 밀도</span>
                    </div>
                </div>
                <div class="result-grid">
                    <div class="word-list-section">
                        <h3>단어 빈도 목록</h3>
                        <div class="word-list" id="wordList"></div>
                    </div>
                    <div class="chart-section">
                        <h3>상위 20개 단어</h3>
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <div class="wordcloud-section">
                    <h3>워드클라우드</h3>
                    <div id="wordCloud" class="word-cloud"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="word-frequency.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
