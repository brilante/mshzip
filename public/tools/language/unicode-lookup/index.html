<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유니코드 검색 - ALLINONE</title>
    <link rel="stylesheet" href="unicode-lookup.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>유니코드 검색</h1>
            <p class="subtitle">문자의 유니코드 정보를 확인하세요</p>
        </header>
        <main class="main-content">
            <div class="search-section">
                <div class="search-tabs">
                    <button class="tab-btn active" onclick="switchTab('char')" aria-label="문자 입력">문자 입력</button>
                    <button class="tab-btn" onclick="switchTab('code')" aria-label="코드 입력">코드 입력</button>
                </div>
                <div id="charTab" class="tab-content">
                    <input type="text" id="charInput" placeholder="문자를 입력하세요" maxlength="10" aria-label="문자를 입력하세요">
                </div>
                <div id="codeTab" class="tab-content hidden">
                    <input type="text" id="codeInput" placeholder="유니코드 입력 (예: U+0041, 0x41, 65)" aria-label="유니코드 입력 (예: U+0041, 0x41, 65)">
                    <button class="search-btn" onclick="searchByCode()" aria-label="검색">검색</button>
                </div>
            </div>
            <div class="result-section">
                <div id="charResults" class="char-results"></div>
            </div>
            <div class="browse-section">
                <h3>유니코드 블록 탐색</h3>
                <select id="blockSelect" onchange="loadBlock()">
                    <option value="">블록 선택...</option>
                    <option value="0000-007F">Basic Latin (0000-007F)</option>
                    <option value="AC00-D7AF">한글 음절 (AC00-D7AF)</option>
                    <option value="3040-309F">히라가나 (3040-309F)</option>
                    <option value="30A0-30FF">가타카나 (30A0-30FF)</option>
                    <option value="4E00-9FFF">CJK 한자 (4E00-9FFF)</option>
                    <option value="0400-04FF">키릴 문자 (0400-04FF)</option>
                    <option value="0600-06FF">아랍 문자 (0600-06FF)</option>
                    <option value="2600-26FF">기타 기호 (2600-26FF)</option>
                    <option value="1F600-1F64F">이모티콘 (1F600-1F64F)</option>
                </select>
                <div id="blockChars" class="block-chars"></div>
            </div>
        </main>
    </div>
    <script src="unicode-lookup.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
