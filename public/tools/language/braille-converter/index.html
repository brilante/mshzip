<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>점자 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .braille-container { max-width: 700px; margin: 0 auto; }
    .braille-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-section { margin-bottom: 1.5rem; }
    .input-section label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .io-textarea { width: 100%; height: 100px; resize: vertical; padding: 1rem; border: 2px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); font-size: 1rem; }
    .io-textarea:focus { border-color: var(--primary); outline: none; }
    .braille-output { font-size: 2rem; letter-spacing: 0.1em; }
    .mode-switch { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .mode-btn { flex: 1; padding: 0.75rem; border-radius: 8px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-weight: 500; }
    .mode-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); color: var(--primary); }
    .action-btns { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .braille-chart { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 0.5rem; margin-top: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; max-height: 200px; overflow-y: auto; }
    .braille-char { text-align: center; padding: 0.5rem; border-radius: 4px; }
    .braille-char .symbol { font-size: 1.5rem; }
    .braille-char .letter { font-size: 0.75rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon">⠃</div>
        <div>
          <h1 class="tool-title">점자 변환기</h1>
          <p class="tool-description">텍스트 ↔ 점자 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="braille-container">
      <div class="braille-panel">
        <div class="mode-switch">
          <button class="mode-btn active" data-mode="encode" onclick="BrailleConverter.setMode('encode')" aria-label="텍스트 → 점자">텍스트 → 점자</button>
          <button class="mode-btn" data-mode="decode" onclick="BrailleConverter.setMode('decode')" aria-label="점자 → 텍스트">점자 → 텍스트</button>
        </div>

        <div class="input-section">
          <label id="inputLabel">텍스트 입력 (영문/숫자)</label>
          <textarea class="io-textarea" id="inputText" placeholder="변환할 텍스트를 입력하세요..." oninput="BrailleConverter.convert()">hello</textarea>
        </div>

        <div class="input-section">
          <label id="outputLabel">점자 결과</label>
          <textarea class="io-textarea braille-output" id="result" readonly></textarea>
        </div>

        <div class="action-btns">
          <button class="tool-btn tool-btn-primary" onclick="BrailleConverter.copy()" aria-label="복사">복사</button>
          <button class="tool-btn tool-btn-secondary" onclick="BrailleConverter.swap()" aria-label="전환">전환</button>
          <button class="tool-btn tool-btn-secondary" onclick="BrailleConverter.toggleChart()" aria-label="점자표">점자표</button>
        </div>

        <div class="braille-chart" id="brailleChart" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="braille-converter.js"></script>
</body>
</html>
