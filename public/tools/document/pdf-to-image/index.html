<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF → 이미지 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="pdf-to-image.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">PDF → 이미지</h1>
      <p class="tool-description">PDF 페이지를 이미지로 변환합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <!-- PDF 업로드 영역 -->
        <div class="upload-section">
          <div class="upload-dropzone" id="dropzone">
            <input type="file" id="fileInput" accept=".pdf" hidden>
            <div class="dropzone-icon"></div>
            <div class="dropzone-text">PDF 파일을 드래그하거나 클릭하여 선택</div>
            <div class="dropzone-hint">PDF 페이지를 PNG 또는 JPG로 변환</div>
          </div>
        </div>

        <!-- 파일 정보 -->
        <div class="file-info-section" id="fileInfoSection" style="display: none;">
          <div class="file-info-card">
            <div class="file-icon"></div>
            <div class="file-details">
              <div class="file-name" id="fileName"></div>
              <div class="file-meta" id="fileMeta"></div>
            </div>
            <button class="change-file-btn" onclick="PdfToImage.changeFile()" aria-label="파일 변경">파일 변경</button>
          </div>
        </div>

        <!-- 변환 설정 -->
        <div class="settings-section" id="settingsSection" style="display: none;">
          <div class="section-title">변환 설정</div>

          <div class="settings-grid">
            <div class="setting-group">
              <label class="setting-label">출력 형식</label>
              <div class="format-options">
                <label class="format-option">
                  <input type="radio" name="format" value="png" checked>
                  <span class="format-btn">PNG (무손실)</span>
                </label>
                <label class="format-option">
                  <input type="radio" name="format" value="jpeg">
                  <span class="format-btn">JPG (압축)</span>
                </label>
              </div>
            </div>

            <div class="setting-group">
              <label class="setting-label">해상도 (DPI)</label>
              <select id="dpi" class="setting-select">
                <option value="72">72 DPI (웹용)</option>
                <option value="150" selected>150 DPI (일반)</option>
                <option value="300">300 DPI (고품질)</option>
                <option value="600">600 DPI (인쇄용)</option>
              </select>
            </div>

            <div class="setting-group" id="qualityGroup" style="display: none;">
              <label class="setting-label">JPG 품질</label>
              <div class="quality-slider">
                <input type="range" id="quality" min="0.5" max="1" step="0.05" value="0.92">
                <span id="qualityValue">92%</span>
              </div>
            </div>

            <div class="setting-group">
              <label class="setting-label">페이지 선택</label>
              <select id="pageSelect" class="setting-select">
                <option value="all">전체 페이지</option>
                <option value="range">범위 지정</option>
              </select>
            </div>

            <div class="setting-group" id="rangeGroup" style="display: none;">
              <label class="setting-label">페이지 범위</label>
              <input type="text" id="pageRange" class="setting-input" placeholder="1-5, 8, 10-12" aria-label="1-5, 8, 10-12">
            </div>
          </div>

          <button class="tool-btn tool-btn-primary tool-btn-lg convert-btn" id="convertBtn" onclick="PdfToImage.convert()" aria-label="이미지로 변환">
            이미지로 변환
          </button>
        </div>

        <!-- 진행 상태 -->
        <div class="progress-section" id="progressSection" style="display: none;">
          <div class="progress-info">
            <span id="progressText">변환 중...</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <!-- 결과 -->
        <div class="result-section" id="resultSection" style="display: none;">
          <div class="section-header">
            <span class="section-title">변환 완료 (<span id="resultCount">0</span>개 이미지)</span>
            <button class="tool-btn tool-btn-sm" onclick="PdfToImage.downloadAll()" aria-label="전체 다운로드">전체 다운로드</button>
          </div>
          <div class="result-grid" id="resultGrid"></div>
          <div class="result-actions">
            <button class="tool-btn" onclick="PdfToImage.reset()" aria-label="새로 시작">새로 시작</button>
          </div>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">사용 팁</div>
          <div class="help-content">
            <ul>
              <li><strong>PNG</strong>: 투명 배경 유지, 무손실 품질 (파일 크기 큼)</li>
              <li><strong>JPG</strong>: 사진에 적합, 압축률 조절 가능 (파일 크기 작음)</li>
              <li><strong>DPI</strong>: 높을수록 선명하지만 파일 크기 증가</li>
              <li><strong>브라우저 처리</strong>: 모든 작업은 브라우저에서 처리되어 파일이 서버로 전송되지 않습니다</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pdf-to-image.js"></script>
</body>
</html>
