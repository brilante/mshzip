<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 회전 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="pdf-rotate.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">PDF 회전</h1>
      <p class="tool-description">PDF 페이지를 원하는 방향으로 회전합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <!-- PDF 업로드 영역 -->
        <div class="upload-section">
          <div class="upload-dropzone" id="dropzone">
            <input type="file" id="fileInput" accept=".pdf" hidden>
            <div class="dropzone-icon"></div>
            <div class="dropzone-text">PDF 파일을 드래그하거나 클릭하여 선택</div>
            <div class="dropzone-hint">최대 50MB까지 지원</div>
          </div>
        </div>

        <!-- 파일 정보 -->
        <div class="file-info" id="fileInfo" style="display: none;">
          <div class="file-card">
            <span class="file-icon"></span>
            <div class="file-details">
              <div class="file-name" id="fileName"></div>
              <div class="file-meta" id="fileMeta"></div>
            </div>
            <button class="file-remove" onclick="PdfRotate.removeFile()" aria-label=""></button>
          </div>
        </div>

        <!-- 회전 설정 -->
        <div class="settings-section" id="settingsSection" style="display: none;">
          <div class="section-title">회전 설정</div>

          <!-- 회전 방향 선택 -->
          <div class="rotation-selector">
            <button class="rotation-btn" data-angle="-90" onclick="PdfRotate.setRotation(-90)">
              <span class="rotation-icon">↺</span>
              <span>왼쪽 90°</span>
            </button>
            <button class="rotation-btn active" data-angle="90" onclick="PdfRotate.setRotation(90)">
              <span class="rotation-icon">↻</span>
              <span>오른쪽 90°</span>
            </button>
            <button class="rotation-btn" data-angle="180" onclick="PdfRotate.setRotation(180)">
              <span class="rotation-icon">⟳</span>
              <span>180°</span>
            </button>
          </div>

          <!-- 페이지 선택 -->
          <div class="settings-group">
            <div class="setting-row">
              <label class="setting-label">적용 대상</label>
              <select id="pageTarget" class="setting-select">
                <option value="all">모든 페이지</option>
                <option value="selected">선택한 페이지만</option>
              </select>
            </div>
          </div>

          <!-- 페이지 미리보기 -->
          <div class="pages-preview" id="pagesPreview"></div>

          <button class="tool-btn tool-btn-primary tool-btn-lg apply-btn" id="applyBtn" onclick="PdfRotate.apply()" aria-label="회전 적용">
            회전 적용
          </button>
        </div>

        <!-- 결과 -->
        <div class="result-section" id="resultSection" style="display: none;">
          <div class="section-header">
            <span class="section-title">회전 완료</span>
          </div>
          <div class="result-info" id="resultInfo"></div>
          <div class="result-actions">
            <button class="tool-btn tool-btn-primary" onclick="PdfRotate.download()" aria-label="다운로드">다운로드</button>
            <button class="tool-btn" onclick="PdfRotate.reset()" aria-label="새로 시작">새로 시작</button>
          </div>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">사용 팁</div>
          <div class="help-content">
            <ul>
              <li><strong>개별 회전</strong>: 각 페이지 카드를 클릭하여 개별적으로 회전 가능</li>
              <li><strong>일괄 회전</strong>: 모든 페이지를 선택하여 한 번에 회전</li>
              <li><strong>스캔 문서</strong>: 잘못된 방향으로 스캔된 문서 교정에 유용</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pdf-rotate.js"></script>
</body>
</html>
