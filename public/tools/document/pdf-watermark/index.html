<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 워터마크 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="pdf-watermark.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">PDF 워터마크</h1>
      <p class="tool-description">PDF 파일에 텍스트 또는 이미지 워터마크를 추가합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <!-- PDF 업로드 영역 -->
        <div class="upload-section">
          <div class="upload-dropzone" id="dropzone">
            <input type="file" id="fileInput" accept=".pdf" hidden>
            <div class="dropzone-icon"></div>
            <div class="dropzone-text">PDF 파일을 드래그하거나 클릭하여 선택</div>
            <div class="dropzone-hint">최대 50MB까지 지원</div>
          </div>
        </div>

        <!-- 파일 정보 -->
        <div class="file-info" id="fileInfo" style="display: none;">
          <div class="file-card">
            <span class="file-icon"></span>
            <div class="file-details">
              <div class="file-name" id="fileName"></div>
              <div class="file-meta" id="fileMeta"></div>
            </div>
            <button class="file-remove" onclick="PdfWatermark.removeFile()" aria-label=""></button>
          </div>
        </div>

        <!-- 워터마크 설정 -->
        <div class="settings-section" id="settingsSection" style="display: none;">
          <div class="section-title">워터마크 설정</div>

          <!-- 워터마크 타입 선택 -->
          <div class="type-selector">
            <button class="type-btn active" data-type="text" onclick="PdfWatermark.setType('text')">
              <span class="type-icon"></span>
              <span>텍스트</span>
            </button>
            <button class="type-btn" data-type="image" onclick="PdfWatermark.setType('image')">
              <span class="type-icon"></span>
              <span>이미지</span>
            </button>
          </div>

          <!-- 텍스트 워터마크 설정 -->
          <div class="settings-group" id="textSettings">
            <div class="setting-row">
              <label class="setting-label">워터마크 텍스트</label>
              <input type="text" id="watermarkText" class="setting-input" value="CONFIDENTIAL" placeholder="워터마크 텍스트 입력" aria-label="워터마크 텍스트 입력">
            </div>
            <div class="setting-row">
              <label class="setting-label">글꼴 크기</label>
              <input type="range" id="fontSize" min="12" max="120" value="48" class="setting-slider">
              <span class="slider-value" id="fontSizeValue">48px</span>
            </div>
            <div class="setting-row">
              <label class="setting-label">색상</label>
              <input type="color" id="textColor" value="#ff0000" class="setting-color">
            </div>
          </div>

          <!-- 이미지 워터마크 설정 -->
          <div class="settings-group" id="imageSettings" style="display: none;">
            <div class="setting-row">
              <label class="setting-label">워터마크 이미지</label>
              <div class="image-upload" id="imageDropzone">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <span>이미지 선택</span>
              </div>
              <div class="image-preview" id="imagePreview" style="display: none;">
                <img id="previewImg" src="" alt="Preview">
                <button class="remove-image" onclick="PdfWatermark.removeImage()" aria-label=""></button>
              </div>
            </div>
            <div class="setting-row">
              <label class="setting-label">이미지 크기</label>
              <input type="range" id="imageScale" min="10" max="100" value="30" class="setting-slider">
              <span class="slider-value" id="imageScaleValue">30%</span>
            </div>
          </div>

          <!-- 공통 설정 -->
          <div class="settings-group">
            <div class="setting-row">
              <label class="setting-label">투명도</label>
              <input type="range" id="opacity" min="5" max="100" value="30" class="setting-slider">
              <span class="slider-value" id="opacityValue">30%</span>
            </div>
            <div class="setting-row">
              <label class="setting-label">회전 각도</label>
              <input type="range" id="rotation" min="-90" max="90" value="-45" class="setting-slider">
              <span class="slider-value" id="rotationValue">-45°</span>
            </div>
            <div class="setting-row">
              <label class="setting-label">위치</label>
              <select id="position" class="setting-select">
                <option value="center">중앙</option>
                <option value="tile">타일 (반복)</option>
                <option value="top-left">좌상단</option>
                <option value="top-right">우상단</option>
                <option value="bottom-left">좌하단</option>
                <option value="bottom-right">우하단</option>
              </select>
            </div>
            <div class="setting-row">
              <label class="setting-label">적용 페이지</label>
              <select id="pages" class="setting-select">
                <option value="all">모든 페이지</option>
                <option value="first">첫 페이지만</option>
                <option value="odd">홀수 페이지</option>
                <option value="even">짝수 페이지</option>
                <option value="custom">직접 입력</option>
              </select>
            </div>
            <div class="setting-row" id="customPagesRow" style="display: none;">
              <label class="setting-label">페이지 범위</label>
              <input type="text" id="customPages" class="setting-input" placeholder="예: 1,3,5-10" aria-label="예: 1,3,5-10">
            </div>
          </div>

          <button class="tool-btn tool-btn-primary tool-btn-lg apply-btn" id="applyBtn" onclick="PdfWatermark.apply()" aria-label="워터마크 적용">
            워터마크 적용
          </button>
        </div>

        <!-- 결과 -->
        <div class="result-section" id="resultSection" style="display: none;">
          <div class="section-header">
            <span class="section-title">워터마크 적용 완료</span>
          </div>
          <div class="result-info" id="resultInfo"></div>
          <div class="result-actions">
            <button class="tool-btn tool-btn-primary" onclick="PdfWatermark.download()" aria-label="다운로드">다운로드</button>
            <button class="tool-btn" onclick="PdfWatermark.reset()" aria-label="새로 시작">새로 시작</button>
          </div>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">사용 팁</div>
          <div class="help-content">
            <ul>
              <li><strong>텍스트 워터마크</strong>: 회사명, 기밀 문서 표시 등에 적합</li>
              <li><strong>이미지 워터마크</strong>: 로고, 서명 등의 이미지 사용 가능</li>
              <li><strong>타일 배치</strong>: 전체 페이지에 반복적으로 워터마크 배치</li>
              <li><strong>보안</strong>: 모든 처리는 브라우저에서 진행됩니다</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pdf-watermark.js"></script>
</body>
</html>
