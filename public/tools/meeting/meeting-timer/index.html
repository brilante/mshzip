<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회의 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="meeting-timer.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">회의 타이머</h1>
      <p class="tool-description">안건별 시간을 관리하여 효율적인 회의를 진행합니다</p>
    </header>

    <main class="tool-content">
      <!-- 메인 타이머 -->
      <div class="timer-section">
        <div class="timer-display">
          <div class="current-agenda" id="currentAgenda">안건을 추가해주세요</div>
          <div class="timer-clock" id="timerClock">00:00</div>
          <div class="timer-progress">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="timer-status" id="timerStatus">대기 중</div>
        </div>
        <div class="timer-controls">
          <button class="control-btn start" id="startBtn" onclick="MeetingTimer.start()" aria-label="시작">시작</button>
          <button class="control-btn pause" id="pauseBtn" onclick="MeetingTimer.pause()" style="display:none" aria-label="일시정지">일시정지</button>
          <button class="control-btn resume" id="resumeBtn" onclick="MeetingTimer.resume()" style="display:none" aria-label="계속">계속</button>
          <button class="control-btn skip" onclick="MeetingTimer.skip()" aria-label="다음">다음</button>
          <button class="control-btn reset" onclick="MeetingTimer.reset()" aria-label="초기화">초기화</button>
        </div>
      </div>

      <!-- 안건 입력 -->
      <div class="agenda-input-section">
        <h3 class="section-title">안건 추가</h3>
        <div class="agenda-input">
          <input type="text" id="agendaTitle" class="form-input" placeholder="안건 제목" aria-label="안건 제목">
          <div class="time-input-group">
            <input type="number" id="agendaMinutes" class="form-input" placeholder="분" min="0" value="5" aria-label="분">
            <span>:</span>
            <input type="number" id="agendaSeconds" class="form-input" placeholder="초" min="0" max="59" value="0" aria-label="초">
          </div>
          <button class="add-btn" onclick="MeetingTimer.addAgenda()" aria-label="추가">추가</button>
        </div>
        <div class="quick-times">
          <button class="quick-btn" onclick="MeetingTimer.setQuickTime(1)" aria-label="1분">1분</button>
          <button class="quick-btn" onclick="MeetingTimer.setQuickTime(3)" aria-label="3분">3분</button>
          <button class="quick-btn" onclick="MeetingTimer.setQuickTime(5)" aria-label="5분">5분</button>
          <button class="quick-btn" onclick="MeetingTimer.setQuickTime(10)" aria-label="10분">10분</button>
          <button class="quick-btn" onclick="MeetingTimer.setQuickTime(15)" aria-label="15분">15분</button>
        </div>
      </div>

      <!-- 안건 목록 -->
      <div class="agenda-list-section">
        <div class="section-header">
          <h3 class="section-title">안건 목록</h3>
          <div class="total-time">
            총 시간: <span id="totalTime">0:00</span>
          </div>
        </div>
        <div class="agenda-list" id="agendaList">
          <div class="empty-state">안건을 추가해주세요</div>
        </div>
      </div>

      <!-- 완료된 안건 -->
      <div class="completed-section" id="completedSection" style="display: none;">
        <h3 class="section-title">완료된 안건</h3>
        <div class="completed-list" id="completedList"></div>
      </div>

      <!-- 설정 -->
      <div class="settings-section">
        <h3 class="section-title">설정</h3>
        <div class="settings-grid">
          <label class="setting-item">
            <input type="checkbox" id="soundAlert" checked>
            <span>소리 알림</span>
          </label>
          <label class="setting-item">
            <input type="checkbox" id="autoNext">
            <span>자동 다음 안건</span>
          </label>
          <label class="setting-item">
            <input type="checkbox" id="warningAlert" checked>
            <span>1분 전 경고</span>
          </label>
        </div>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">사용 방법</div>
        <div class="help-content">
          <ul>
            <li><strong>안건 추가</strong>: 제목과 시간을 입력하고 추가 버튼 클릭</li>
            <li><strong>시작</strong>: 첫 번째 안건부터 타이머 시작</li>
            <li><strong>다음</strong>: 현재 안건 종료하고 다음으로 이동</li>
            <li><strong>드래그</strong>: 안건 순서 변경 가능</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="meeting-timer.js"></script>
</body>
</html>
