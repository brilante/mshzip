<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스탠드업 트래커 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="standup-tracker.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">스탠드업 트래커</h1>
      <p class="tool-description">팀 데일리 스크럼을 기록하고 관리합니다</p>
    </header>

    <main class="tool-content">
      <!-- 날짜 선택 -->
      <div class="date-section">
        <button class="nav-btn" onclick="StandupTracker.prevDay()" aria-label=""></button>
        <input type="date" id="standupDate" class="date-input" onchange="StandupTracker.loadDay()">
        <button class="nav-btn" onclick="StandupTracker.nextDay()" aria-label=""></button>
        <button class="today-btn" onclick="StandupTracker.goToday()" aria-label="오늘">오늘</button>
      </div>

      <!-- 팀원 추가 -->
      <div class="add-member-section">
        <input type="text" id="memberName" class="form-input" placeholder="팀원 이름 추가" onkeypress="if(event.key==='Enter')StandupTracker.addMember()" aria-label="팀원 이름 추가">
        <button class="add-btn" onclick="StandupTracker.addMember()" aria-label="+ 추가">+ 추가</button>
      </div>

      <!-- 스탠드업 보드 -->
      <div class="standup-board" id="standupBoard">
        <!-- 동적 생성 -->
      </div>

      <!-- 빈 상태 -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"></div>
        <div class="empty-text">팀원을 추가해주세요</div>
        <div class="empty-sub">위 입력란에서 팀원 이름을 추가하세요</div>
      </div>

      <!-- 요약 섹션 -->
      <div class="summary-section" id="summarySection" style="display: none;">
        <h3 class="section-title">오늘의 요약</h3>
        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-icon"></div>
            <div class="summary-value" id="completedCount">0</div>
            <div class="summary-label">어제 완료</div>
          </div>
          <div class="summary-card">
            <div class="summary-icon"></div>
            <div class="summary-value" id="plannedCount">0</div>
            <div class="summary-label">오늘 계획</div>
          </div>
          <div class="summary-card blockers">
            <div class="summary-icon"></div>
            <div class="summary-value" id="blockerCount">0</div>
            <div class="summary-label">블로커</div>
          </div>
        </div>
      </div>

      <!-- 액션 버튼 -->
      <div class="action-buttons">
        <button class="action-btn" onclick="StandupTracker.exportMarkdown()" aria-label="Markdown 내보내기">Markdown 내보내기</button>
        <button class="action-btn" onclick="StandupTracker.copyToClipboard()" aria-label="복사">복사</button>
        <button class="action-btn" onclick="StandupTracker.showHistory()" aria-label="히스토리">히스토리</button>
        <button class="action-btn danger" onclick="StandupTracker.clearDay()" aria-label="오늘 기록 삭제">오늘 기록 삭제</button>
      </div>

      <!-- 히스토리 모달 -->
      <div class="modal-overlay" id="historyModal" onclick="StandupTracker.closeHistory(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
          <div class="modal-header">
            <h3>스탠드업 히스토리</h3>
            <button class="close-btn" onclick="StandupTracker.closeHistory()" aria-label=""></button>
          </div>
          <div class="modal-body" id="historyList">
            <!-- 동적 생성 -->
          </div>
        </div>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">사용 방법</div>
        <div class="help-content">
          <ul>
            <li><strong>팀원 추가</strong>: 팀원 이름을 입력하고 추가 버튼 클릭</li>
            <li><strong>어제</strong>: 어제 완료한 작업을 기록</li>
            <li><strong>오늘</strong>: 오늘 할 계획을 기록</li>
            <li><strong>블로커</strong>: 진행을 막는 장애물 기록</li>
            <li><strong>히스토리</strong>: 과거 스탠드업 기록 확인</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="standup-tracker.js"></script>
</body>
</html>
