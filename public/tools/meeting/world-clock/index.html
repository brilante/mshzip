<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계 시계 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="world-clock.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">세계 시계</h1>
      <p class="tool-description">전 세계 주요 도시의 현재 시간을 확인합니다</p>
    </header>

    <main class="tool-content">
      <!-- 내 시간대 -->
      <div class="local-time-section">
        <div class="local-time-card">
          <div class="local-label">현재 시간</div>
          <div class="local-time" id="localTime">--:--:--</div>
          <div class="local-date" id="localDate">----년 --월 --일 ---요일</div>
          <div class="local-timezone" id="localTimezone">---</div>
        </div>
      </div>

      <!-- 도시 추가 -->
      <div class="add-city-section">
        <select id="citySelect" class="city-select">
          <optgroup label="아시아">
            <option value="Asia/Seoul">🇰🇷 서울</option>
            <option value="Asia/Tokyo">🇯🇵 도쿄</option>
            <option value="Asia/Shanghai">🇨🇳 상하이</option>
            <option value="Asia/Hong_Kong">🇭🇰 홍콩</option>
            <option value="Asia/Singapore">🇸🇬 싱가포르</option>
            <option value="Asia/Bangkok">🇹🇭 방콕</option>
            <option value="Asia/Dubai">🇦🇪 두바이</option>
            <option value="Asia/Kolkata">🇮🇳 뭄바이</option>
            <option value="Asia/Jakarta">🇮🇩 자카르타</option>
            <option value="Asia/Manila">🇵🇭 마닐라</option>
          </optgroup>
          <optgroup label="유럽">
            <option value="Europe/London">🇬🇧 런던</option>
            <option value="Europe/Paris">🇫🇷 파리</option>
            <option value="Europe/Berlin">🇩🇪 베를린</option>
            <option value="Europe/Rome">🇮🇹 로마</option>
            <option value="Europe/Madrid">🇪🇸 마드리드</option>
            <option value="Europe/Amsterdam">🇳🇱 암스테르담</option>
            <option value="Europe/Zurich">🇨🇭 취리히</option>
            <option value="Europe/Stockholm">🇸🇪 스톡홀름</option>
            <option value="Europe/Moscow">🇷🇺 모스크바</option>
          </optgroup>
          <optgroup label="아메리카">
            <option value="America/New_York">🇺🇸 뉴욕</option>
            <option value="America/Los_Angeles">🇺🇸 로스앤젤레스</option>
            <option value="America/Chicago">🇺🇸 시카고</option>
            <option value="America/Toronto">🇨🇦 토론토</option>
            <option value="America/Vancouver">🇨🇦 밴쿠버</option>
            <option value="America/Mexico_City">🇲🇽 멕시코시티</option>
            <option value="America/Sao_Paulo">🇧🇷 상파울루</option>
            <option value="America/Buenos_Aires">🇦🇷 부에노스아이레스</option>
          </optgroup>
          <optgroup label="오세아니아">
            <option value="Australia/Sydney">🇦🇺 시드니</option>
            <option value="Australia/Melbourne">🇦🇺 멜버른</option>
            <option value="Pacific/Auckland">🇳🇿 오클랜드</option>
            <option value="Pacific/Honolulu">🇺🇸 호놀룰루</option>
          </optgroup>
          <optgroup label="아프리카/중동">
            <option value="Africa/Cairo">🇪🇬 카이로</option>
            <option value="Africa/Johannesburg">🇿🇦 요하네스버그</option>
            <option value="Africa/Lagos">🇳🇬 라고스</option>
            <option value="Asia/Tel_Aviv">🇮🇱 텔아비브</option>
          </optgroup>
        </select>
        <button class="add-city-btn" onclick="WorldClock.addCity()" aria-label="+ 추가">+ 추가</button>
      </div>

      <!-- 세계 시계 그리드 -->
      <div class="world-clocks" id="worldClocks">
        <!-- 동적 생성 -->
      </div>

      <!-- 빈 상태 -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"></div>
        <div class="empty-text">도시를 추가해주세요</div>
        <div class="empty-sub">위 선택 메뉴에서 도시를 선택하고 추가 버튼을 클릭하세요</div>
      </div>

      <!-- 시간대 변환기 -->
      <div class="converter-section">
        <h3 class="section-title">시간대 변환기</h3>
        <div class="converter-form">
          <div class="converter-row">
            <div class="converter-col">
              <label>시간</label>
              <input type="time" id="convertTime" class="form-input" value="09:00">
            </div>
            <div class="converter-col">
              <label>출발 시간대</label>
              <select id="fromTimezone" class="form-input">
                <!-- 동적 생성 -->
              </select>
            </div>
            <div class="converter-col">
              <label>도착 시간대</label>
              <select id="toTimezone" class="form-input">
                <!-- 동적 생성 -->
              </select>
            </div>
          </div>
          <button class="convert-btn" onclick="WorldClock.convert()" aria-label="변환">변환</button>
          <div class="convert-result" id="convertResult">
            <!-- 결과 표시 -->
          </div>
        </div>
      </div>

      <!-- 퀵 타임존 -->
      <div class="quick-section">
        <h3 class="section-title">인기 시간대</h3>
        <div class="quick-buttons">
          <button class="quick-btn" onclick="WorldClock.quickAdd(['Asia/Seoul', 'America/New_York', 'Europe/London'])" aria-label="한국-미국-영국">한국-미국-영국</button>
          <button class="quick-btn" onclick="WorldClock.quickAdd(['Asia/Seoul', 'Asia/Tokyo', 'Asia/Shanghai'])" aria-label="한중일">한중일</button>
          <button class="quick-btn" onclick="WorldClock.quickAdd(['America/New_York', 'America/Los_Angeles', 'America/Chicago'])" aria-label="미국 주요도시">미국 주요도시</button>
          <button class="quick-btn" onclick="WorldClock.quickAdd(['Europe/London', 'Europe/Paris', 'Europe/Berlin'])" aria-label="유럽 주요도시">유럽 주요도시</button>
        </div>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">사용 방법</div>
        <div class="help-content">
          <ul>
            <li><strong>도시 추가</strong>: 선택 메뉴에서 도시를 선택하고 추가 버튼 클릭</li>
            <li><strong>시간대 변환</strong>: 특정 시간을 다른 시간대로 변환</li>
            <li><strong>퀵 타임존</strong>: 자주 사용하는 시간대 조합을 빠르게 추가</li>
            <li><strong>글로벌 회의</strong>: 여러 시간대 팀원들과 회의 시간 조율에 유용</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="world-clock.js"></script>
</body>
</html>
