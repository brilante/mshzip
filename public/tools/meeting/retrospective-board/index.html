<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회고 보드 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="retrospective-board.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">회고 보드</h1>
      <p class="tool-description">팀 회고를 위한 칸반 스타일 보드입니다</p>
    </header>

    <main class="tool-content">
      <!-- 템플릿 선택 -->
      <div class="template-section">
        <h3 class="section-title">템플릿 선택</h3>
        <div class="template-buttons">
          <button class="template-btn active" onclick="RetroBoard.setTemplate('start-stop-continue')" aria-label="Start-Stop-Continue">Start-Stop-Continue</button>
          <button class="template-btn" onclick="RetroBoard.setTemplate('liked-learned-lacked')" aria-label="Liked-Learned-Lacked">Liked-Learned-Lacked</button>
          <button class="template-btn" onclick="RetroBoard.setTemplate('mad-sad-glad')" aria-label="Mad-Sad-Glad">Mad-Sad-Glad</button>
          <button class="template-btn" onclick="RetroBoard.setTemplate('4ls')" aria-label="4Ls">4Ls</button>
          <button class="template-btn" onclick="RetroBoard.setTemplate('went-well')" aria-label="Went Well / Improve">Went Well / Improve</button>
        </div>
      </div>

      <!-- 회고 보드 -->
      <div class="retro-board" id="retroBoard">
        <!-- 동적 생성 -->
      </div>

      <!-- 액션 버튼 -->
      <div class="action-buttons">
        <button class="action-btn" onclick="RetroBoard.exportMarkdown()" aria-label="Markdown 내보내기">Markdown 내보내기</button>
        <button class="action-btn" onclick="RetroBoard.copyToClipboard()" aria-label="클립보드 복사">클립보드 복사</button>
        <button class="action-btn" onclick="RetroBoard.saveBoard()" aria-label="저장">저장</button>
        <button class="action-btn" onclick="RetroBoard.loadBoard()" aria-label="불러오기">불러오기</button>
        <button class="action-btn danger" onclick="RetroBoard.clearBoard()" aria-label="초기화">초기화</button>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">회고 템플릿 설명</div>
        <div class="help-content">
          <ul>
            <li><strong>Start-Stop-Continue</strong>: 시작할 것 / 멈출 것 / 계속할 것</li>
            <li><strong>Liked-Learned-Lacked</strong>: 좋았던 점 / 배운 점 / 부족했던 점</li>
            <li><strong>Mad-Sad-Glad</strong>: 화났던 것 / 슬펐던 것 / 기뻤던 것</li>
            <li><strong>4Ls</strong>: Liked / Learned / Lacked / Longed For</li>
            <li><strong>Went Well / Improve</strong>: 잘된 점 / 개선할 점</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="retrospective-board.js"></script>
</body>
</html>
