<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>피드백 수집기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="feedback-collector.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">피드백 수집기</h1>
      <p class="tool-description">익명으로 피드백을 수집하고 분석합니다</p>
    </header>

    <main class="tool-content">
      <!-- 탭 네비게이션 -->
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="collect" onclick="FeedbackCollector.switchTab('collect')" aria-label="피드백 수집">피드백 수집</button>
        <button class="tab-btn" data-tab="results" onclick="FeedbackCollector.switchTab('results')" aria-label="결과 보기">결과 보기</button>
        <button class="tab-btn" data-tab="setup" onclick="FeedbackCollector.switchTab('setup')" aria-label="설문 설정">설문 설정</button>
      </div>

      <!-- 피드백 수집 탭 -->
      <div class="tab-content active" id="collectTab">
        <div class="survey-title" id="surveyTitleDisplay">
          <h2>회의 피드백</h2>
          <p class="survey-description" id="surveyDescDisplay">이번 회의에 대한 의견을 공유해주세요</p>
        </div>

        <!-- 평점 섹션 -->
        <div class="rating-section" id="ratingSections">
          <!-- 동적 생성 -->
        </div>

        <!-- 텍스트 피드백 -->
        <div class="text-feedback">
          <label>추가 의견 (선택)</label>
          <textarea id="feedbackText" class="feedback-textarea" placeholder="자유롭게 의견을 남겨주세요..." rows="4"></textarea>
        </div>

        <button class="submit-btn" onclick="FeedbackCollector.submitFeedback()" aria-label="피드백 제출">피드백 제출</button>
      </div>

      <!-- 결과 탭 -->
      <div class="tab-content" id="resultsTab">
        <div class="results-header">
          <div class="results-stat">
            <div class="stat-number" id="totalResponses">0</div>
            <div class="stat-label">응답 수</div>
          </div>
        </div>

        <!-- 평점 결과 -->
        <div class="rating-results" id="ratingResults">
          <!-- 동적 생성 -->
        </div>

        <!-- 텍스트 피드백 목록 -->
        <div class="text-results">
          <h3 class="results-title">추가 의견</h3>
          <div class="feedback-list" id="feedbackList">
            <!-- 동적 생성 -->
          </div>
        </div>

        <div class="results-actions">
          <button class="action-btn" onclick="FeedbackCollector.exportResults()" aria-label="내보내기">내보내기</button>
          <button class="action-btn" onclick="FeedbackCollector.copyResults()" aria-label="복사">복사</button>
          <button class="action-btn danger" onclick="FeedbackCollector.clearResults()" aria-label="초기화">초기화</button>
        </div>
      </div>

      <!-- 설정 탭 -->
      <div class="tab-content" id="setupTab">
        <div class="setup-section">
          <h3 class="setup-title">설문 정보</h3>
          <div class="setup-form">
            <div class="form-group">
              <label>설문 제목</label>
              <input type="text" id="surveyTitle" class="form-input" value="회의 피드백">
            </div>
            <div class="form-group">
              <label>설문 설명</label>
              <input type="text" id="surveyDesc" class="form-input" value="이번 회의에 대한 의견을 공유해주세요">
            </div>
          </div>
        </div>

        <div class="setup-section">
          <h3 class="setup-title">평점 항목</h3>
          <div class="rating-items" id="ratingItems">
            <!-- 동적 생성 -->
          </div>
          <button class="add-rating-btn" onclick="FeedbackCollector.addRatingItem()" aria-label="+ 평점 항목 추가">+ 평점 항목 추가</button>
        </div>

        <div class="setup-section">
          <h3 class="setup-title">빠른 템플릿</h3>
          <div class="template-grid">
            <button class="template-btn" onclick="FeedbackCollector.useTemplate('meeting')" aria-label="회의 피드백">회의 피드백</button>
            <button class="template-btn" onclick="FeedbackCollector.useTemplate('presentation')" aria-label="발표 평가">발표 평가</button>
            <button class="template-btn" onclick="FeedbackCollector.useTemplate('workshop')" aria-label="워크샵 평가">워크샵 평가</button>
            <button class="template-btn" onclick="FeedbackCollector.useTemplate('team')" aria-label="팀 평가">팀 평가</button>
          </div>
        </div>

        <button class="apply-btn" onclick="FeedbackCollector.applySettings()" aria-label="설정 적용">설정 적용</button>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">사용 방법</div>
        <div class="help-content">
          <ul>
            <li><strong>설문 설정</strong>: 설정 탭에서 평점 항목과 설문 정보를 구성</li>
            <li><strong>피드백 수집</strong>: 수집 탭에서 평점과 의견을 입력받음</li>
            <li><strong>결과 확인</strong>: 결과 탭에서 평균 점수와 피드백 확인</li>
            <li><strong>익명 보장</strong>: 모든 피드백은 익명으로 수집됨</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="feedback-collector.js"></script>
</body>
</html>
