<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브레인스톰 보드 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="brainstorm-board.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">브레인스톰 보드</h1>
      <p class="tool-description">아이디어를 자유롭게 공유하고 정리합니다</p>
    </header>

    <main class="tool-content">
      <!-- 세션 설정 -->
      <div class="session-section">
        <div class="session-header">
          <div class="session-input-group">
            <input type="text" id="sessionTopic" class="topic-input" placeholder="브레인스토밍 주제를 입력하세요" aria-label="브레인스토밍 주제를 입력하세요">
          </div>
          <div class="session-actions">
            <button class="timer-btn" onclick="BrainstormBoard.toggleTimer()">
              <span id="timerIcon"></span>
              <span id="timerDisplay">05:00</span>
            </button>
          </div>
        </div>
      </div>

      <!-- 아이디어 입력 -->
      <div class="input-section">
        <div class="input-row">
          <input type="text" id="ideaInput" class="idea-input" placeholder="아이디어를 입력하세요..." onkeypress="if(event.key==='Enter')BrainstormBoard.addIdea()" aria-label="아이디어를 입력하세요...">
          <select id="ideaCategory" class="category-select">
            <option value="general">일반</option>
            <option value="feature">기능</option>
            <option value="improvement">개선</option>
            <option value="crazy">과감한</option>
            <option value="question">질문</option>
          </select>
          <button class="add-idea-btn" onclick="BrainstormBoard.addIdea()" aria-label="추가">추가</button>
        </div>
      </div>

      <!-- 필터/정렬 -->
      <div class="filter-bar">
        <div class="filter-group">
          <span class="filter-label">필터:</span>
          <button class="filter-btn active" data-filter="all" onclick="BrainstormBoard.setFilter('all')" aria-label="전체">전체</button>
          <button class="filter-btn" data-filter="general" onclick="BrainstormBoard.setFilter('general')" aria-label=""></button>
          <button class="filter-btn" data-filter="feature" onclick="BrainstormBoard.setFilter('feature')" aria-label=""></button>
          <button class="filter-btn" data-filter="improvement" onclick="BrainstormBoard.setFilter('improvement')" aria-label=""></button>
          <button class="filter-btn" data-filter="crazy" onclick="BrainstormBoard.setFilter('crazy')" aria-label=""></button>
          <button class="filter-btn" data-filter="question" onclick="BrainstormBoard.setFilter('question')" aria-label=""></button>
        </div>
        <div class="sort-group">
          <span class="filter-label">정렬:</span>
          <select id="sortOrder" class="sort-select" onchange="BrainstormBoard.render()">
            <option value="newest">최신순</option>
            <option value="votes">투표순</option>
            <option value="category">카테고리순</option>
          </select>
        </div>
        <div class="idea-count">
          <span id="ideaCount">0</span>개 아이디어
        </div>
      </div>

      <!-- 아이디어 보드 -->
      <div class="ideas-board" id="ideasBoard">
        <!-- 동적 생성 -->
      </div>

      <!-- 빈 상태 -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"></div>
        <div class="empty-text">아이디어를 추가해주세요</div>
        <div class="empty-sub">자유롭게 아이디어를 공유하세요</div>
      </div>

      <!-- 액션 버튼 -->
      <div class="action-buttons">
        <button class="action-btn" onclick="BrainstormBoard.exportMarkdown()" aria-label="Markdown">Markdown</button>
        <button class="action-btn" onclick="BrainstormBoard.copyToClipboard()" aria-label="복사">복사</button>
        <button class="action-btn" onclick="BrainstormBoard.shuffle()" aria-label="섞기">섞기</button>
        <button class="action-btn" onclick="BrainstormBoard.group()" aria-label="그룹화">그룹화</button>
        <button class="action-btn" onclick="BrainstormBoard.saveSession()" aria-label="저장">저장</button>
        <button class="action-btn" onclick="BrainstormBoard.loadSession()" aria-label="불러오기">불러오기</button>
        <button class="action-btn danger" onclick="BrainstormBoard.clearBoard()" aria-label="전체 삭제">전체 삭제</button>
      </div>

      <!-- 그룹 모달 -->
      <div class="modal-overlay" id="groupModal" onclick="BrainstormBoard.closeGroupModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
          <div class="modal-header">
            <h3>아이디어 그룹화</h3>
            <button class="close-btn" onclick="BrainstormBoard.closeGroupModal()" aria-label=""></button>
          </div>
          <div class="modal-body" id="groupedView">
            <!-- 동적 생성 -->
          </div>
        </div>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">사용 방법</div>
        <div class="help-content">
          <ul>
            <li><strong>아이디어 추가</strong>: 텍스트 입력 후 Enter 또는 추가 버튼 클릭</li>
            <li><strong>카테고리</strong>: 일반, 기능, 개선, 과감한, 질문 중 선택</li>
            <li><strong>투표</strong>: 버튼으로 좋아요 표시</li>
            <li><strong>타이머</strong>: 5분 브레인스토밍 타이머 제공</li>
            <li><strong>그룹화</strong>: 카테고리별로 아이디어 정리</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="brainstorm-board.js"></script>
</body>
</html>
