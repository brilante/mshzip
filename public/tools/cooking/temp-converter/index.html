<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>요리 온도 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .cooking-container { max-width: 600px; margin: 0 auto; }
    .cooking-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .converter-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
    .temp-input { text-align: center; }
    .temp-input input { font-size: 2rem; font-weight: 700; text-align: center; }
    .temp-input label { font-size: 0.85rem; color: var(--text-secondary); display: block; margin-top: 0.25rem; }
    .result-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 2rem; color: white; text-align: center; margin-bottom: 1.5rem; }
    .result-value { font-size: 3rem; font-weight: 700; }
    .result-unit { font-size: 1rem; opacity: 0.9; }
    .preset-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; }
    .preset-title { font-weight: 600; margin-bottom: 1rem; }
    .preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .preset-item { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-secondary); border-radius: 8px; cursor: pointer; }
    .preset-item:hover { background: var(--primary); color: white; }
    .preset-name { font-weight: 500; }
    .preset-temp { font-size: 0.85rem; opacity: 0.8; }
    .gas-mark { margin-top: 1.5rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; text-align: center; }
    .gas-value { font-size: 1.5rem; font-weight: 600; color: var(--primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">요리 온도 변환기</h1>
          <p class="tool-description">섭씨/화씨/가스마크 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="cooking-container">
      <div class="cooking-panel">
        <div class="converter-row">
          <div class="temp-input">
            <input type="number" id="celsiusInput" class="tool-input" value="180" oninput="TempConverter.convertFromCelsius()">
            <label>섭씨 (°C)</label>
          </div>
          <div style="font-size: 2rem;">=</div>
          <div class="temp-input">
            <input type="number" id="fahrenheitInput" class="tool-input" oninput="TempConverter.convertFromFahrenheit()">
            <label>화씨 (°F)</label>
          </div>
        </div>

        <div class="result-display">
          <div class="result-value" id="resultValue">180°C = 356°F</div>
          <div class="result-unit" id="resultDesc">중간 오븐 온도</div>
        </div>

        <div class="gas-mark">
          <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem;">가스 마크</div>
          <div class="gas-value" id="gasMark">Gas Mark 4</div>
        </div>

        <div class="preset-section" style="margin-top: 1.5rem;">
          <div class="preset-title">요리별 권장 온도</div>
          <div class="preset-grid">
            <div class="preset-item" onclick="TempConverter.setTemp(100)">
              <span class="preset-name">끓는 물</span>
              <span class="preset-temp">100°C</span>
            </div>
            <div class="preset-item" onclick="TempConverter.setTemp(160)">
              <span class="preset-name">케이크</span>
              <span class="preset-temp">160°C</span>
            </div>
            <div class="preset-item" onclick="TempConverter.setTemp(180)">
              <span class="preset-name">쿠키</span>
              <span class="preset-temp">180°C</span>
            </div>
            <div class="preset-item" onclick="TempConverter.setTemp(200)">
              <span class="preset-name">피자</span>
              <span class="preset-temp">200°C</span>
            </div>
            <div class="preset-item" onclick="TempConverter.setTemp(220)">
              <span class="preset-name">로스트</span>
              <span class="preset-temp">220°C</span>
            </div>
            <div class="preset-item" onclick="TempConverter.setTemp(230)">
              <span class="preset-name">빵</span>
              <span class="preset-temp">230°C</span>
            </div>
            <div class="preset-item" onclick="TempConverter.setTemp(63)">
              <span class="preset-name">스테이크 미디엄</span>
              <span class="preset-temp">63°C</span>
            </div>
            <div class="preset-item" onclick="TempConverter.setTemp(74)">
              <span class="preset-name">닭고기 완전 익힘</span>
              <span class="preset-temp">74°C</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="temp-converter.js"></script>
</body>
</html>
