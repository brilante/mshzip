<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재료 대체 검색 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .cooking-container { max-width: 700px; margin: 0 auto; }
    .cooking-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .search-box { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .category-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; }
    .category-tab { padding: 0.5rem 1rem; border-radius: 20px; border: none; background: var(--bg-primary); cursor: pointer; white-space: nowrap; font-size: 0.85rem; }
    .category-tab.active { background: var(--primary); color: white; }
    .substitute-card { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .substitute-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .substitute-name { font-size: 1.25rem; font-weight: 600; }
    .substitute-category { font-size: 0.8rem; padding: 0.25rem 0.75rem; background: var(--bg-secondary); border-radius: 12px; }
    .substitute-list { }
    .substitute-item { display: flex; gap: 1rem; padding: 0.75rem; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 0.5rem; }
    .substitute-icon { font-size: 1.5rem; }
    .substitute-info h4 { font-weight: 600; margin-bottom: 0.25rem; }
    .substitute-info p { font-size: 0.85rem; color: var(--text-secondary); }
    .substitute-ratio { font-size: 0.8rem; color: var(--primary); font-weight: 500; margin-top: 0.25rem; }
    .no-result { text-align: center; padding: 3rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">재료 대체 검색</h1>
          <p class="tool-description">없는 재료의 대체품 찾기</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="cooking-container">
      <div class="cooking-panel">
        <div class="search-box">
          <input type="text" id="searchInput" class="tool-input" placeholder="대체할 재료를 검색하세요 (예: 버터, 달걀)" oninput="SubstitutionFinder.search()" aria-label="대체할 재료를 검색하세요 (예: 버터, 달걀)">
        </div>

        <div class="category-tabs">
          <button class="category-tab active" onclick="SubstitutionFinder.filterCategory('all')" aria-label="전체">전체</button>
          <button class="category-tab" onclick="SubstitutionFinder.filterCategory('dairy')" aria-label="유제품">유제품</button>
          <button class="category-tab" onclick="SubstitutionFinder.filterCategory('eggs')" aria-label="달걀">달걀</button>
          <button class="category-tab" onclick="SubstitutionFinder.filterCategory('flour')" aria-label="밀가루">밀가루</button>
          <button class="category-tab" onclick="SubstitutionFinder.filterCategory('sweetener')" aria-label="감미료">감미료</button>
          <button class="category-tab" onclick="SubstitutionFinder.filterCategory('oil')" aria-label="오일">오일</button>
        </div>

        <div id="resultsList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="substitution-finder.js"></script>
</body>
</html>
