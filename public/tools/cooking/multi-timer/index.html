<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>멀티 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .cooking-container { max-width: 700px; margin: 0 auto; }
    .cooking-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .timer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .timer-card { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .timer-card.running { border: 2px solid #22c55e; }
    .timer-card.finished { border: 2px solid #ef4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .timer-name { font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .timer-display { font-size: 2.5rem; font-weight: 700; font-family: monospace; margin: 1rem 0; }
    .timer-controls { display: flex; gap: 0.5rem; justify-content: center; }
    .timer-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem; }
    .timer-btn-start { background: #22c55e; color: white; }
    .timer-btn-pause { background: #f59e0b; color: white; }
    .timer-btn-reset { background: var(--bg-secondary); }
    .timer-btn-delete { background: #ef4444; color: white; }
    .add-timer { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; }
    .add-timer-row { display: flex; gap: 0.5rem; align-items: end; }
    .preset-timers { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .preset-btn { padding: 0.5rem 1rem; border-radius: 20px; border: none; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .preset-btn:hover { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">멀티 타이머</h1>
          <p class="tool-description">여러 요리 타이머 동시 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="cooking-container">
      <div class="cooking-panel">
        <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">빠른 추가</label>
        <div class="preset-timers">
          <button class="preset-btn" onclick="MultiTimer.addPreset('라면', 3)" aria-label="라면 3분">라면 3분</button>
          <button class="preset-btn" onclick="MultiTimer.addPreset('계란 반숙', 6)" aria-label="반숙 6분">반숙 6분</button>
          <button class="preset-btn" onclick="MultiTimer.addPreset('계란 완숙', 12)" aria-label="완숙 12분">완숙 12분</button>
          <button class="preset-btn" onclick="MultiTimer.addPreset('파스타', 8)" aria-label="파스타 8분">파스타 8분</button>
          <button class="preset-btn" onclick="MultiTimer.addPreset('밥', 20)" aria-label="밥 20분">밥 20분</button>
        </div>

        <div class="timer-grid" id="timerGrid">
          <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">
            타이머를 추가하세요
          </div>
        </div>

        <div class="add-timer">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">새 타이머 추가</h3>
          <div class="add-timer-row">
            <div style="flex: 1;">
              <label style="font-size: 0.75rem; color: var(--text-secondary);">이름</label>
              <input type="text" id="timerName" class="tool-input" placeholder="타이머 이름" aria-label="타이머 이름">
            </div>
            <div style="width: 70px;">
              <label style="font-size: 0.75rem; color: var(--text-secondary);">분</label>
              <input type="number" id="timerMin" class="tool-input" value="5" min="0">
            </div>
            <div style="width: 70px;">
              <label style="font-size: 0.75rem; color: var(--text-secondary);">초</label>
              <input type="number" id="timerSec" class="tool-input" value="0" min="0" max="59">
            </div>
            <button class="tool-btn tool-btn-primary" onclick="MultiTimer.addTimer()" aria-label="추가">추가</button>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="MultiTimer.stopAll()" style="flex: 1;" aria-label="모두 정지">모두 정지</button>
          <button class="tool-btn tool-btn-secondary" onclick="MultiTimer.clearAll()" style="flex: 1;" aria-label="모두 삭제">모두 삭제</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="multi-timer.js"></script>
</body>
</html>
