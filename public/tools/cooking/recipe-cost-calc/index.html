<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레시피 원가 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .cooking-container { max-width: 700px; margin: 0 auto; }
    .cooking-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .recipe-header { display: grid; grid-template-columns: 1fr 100px; gap: 1rem; margin-bottom: 1.5rem; }
    .ingredient-list { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    .ingredient-item { display: grid; grid-template-columns: 1fr 80px 80px 100px 40px; gap: 0.5rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--bg-secondary); }
    .ingredient-item:last-child { border-bottom: none; }
    .add-ingredient { display: grid; grid-template-columns: 1fr 80px 80px 100px 60px; gap: 0.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--bg-secondary); }
    .cost-summary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; }
    .cost-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; text-align: center; }
    .cost-value { font-size: 1.75rem; font-weight: 700; }
    .cost-label { font-size: 0.8rem; opacity: 0.9; }
    .cost-main { margin-bottom: 1rem; text-align: center; }
    .cost-main .cost-value { font-size: 2.5rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">레시피 원가 계산기</h1>
          <p class="tool-description">레시피 재료비 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="cooking-container">
      <div class="cooking-panel">
        <div class="recipe-header">
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.25rem;">레시피 이름</label>
            <input type="text" id="recipeName" class="tool-input" placeholder="예: 크림 파스타" aria-label="예: 크림 파스타">
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.25rem;">인분</label>
            <input type="number" id="servings" class="tool-input" value="2" min="1" onchange="RecipeCost.calculate()">
          </div>
        </div>

        <div class="ingredient-list">
          <div style="display: grid; grid-template-columns: 1fr 80px 80px 100px 40px; gap: 0.5rem; font-size: 0.75rem; color: var(--text-secondary); padding-bottom: 0.5rem; border-bottom: 1px solid var(--bg-secondary);">
            <span>재료</span>
            <span>사용량</span>
            <span>구매량</span>
            <span>구매가격</span>
            <span></span>
          </div>

          <div id="ingredientsList"></div>

          <div class="add-ingredient">
            <input type="text" id="addName" class="tool-input" placeholder="재료명" aria-label="재료명">
            <input type="text" id="addUsed" class="tool-input" placeholder="100g" aria-label="100g">
            <input type="text" id="addTotal" class="tool-input" placeholder="500g" aria-label="500g">
            <input type="number" id="addPrice" class="tool-input" placeholder="가격" aria-label="가격">
            <button class="tool-btn tool-btn-primary" onclick="RecipeCost.addIngredient()" aria-label="추가">추가</button>
          </div>
        </div>

        <div class="cost-summary">
          <div class="cost-main">
            <div class="cost-label">총 재료비</div>
            <div class="cost-value" id="totalCost">₩0</div>
          </div>
          <div class="cost-grid">
            <div>
              <div class="cost-value" id="costPerServing">₩0</div>
              <div class="cost-label">1인분 원가</div>
            </div>
            <div>
              <div class="cost-value" id="ingredientCount">0</div>
              <div class="cost-label">재료 수</div>
            </div>
            <div>
              <div class="cost-value" id="avgCost">₩0</div>
              <div class="cost-label">재료당 평균</div>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="RecipeCost.loadSample()" style="flex: 1;" aria-label="샘플 불러오기">샘플 불러오기</button>
          <button class="tool-btn tool-btn-secondary" onclick="RecipeCost.clearAll()" style="flex: 1;" aria-label="초기화">초기화</button>
          <button class="tool-btn tool-btn-primary" onclick="RecipeCost.exportCost()" style="flex: 1;" aria-label="결과 복사">결과 복사</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="recipe-cost-calc.js"></script>
</body>
</html>
