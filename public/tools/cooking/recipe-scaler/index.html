<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레시피 양 조절기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .cooking-container { max-width: 700px; margin: 0 auto; }
    .cooking-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .scale-control { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; padding: 1rem; background: var(--bg-primary); border-radius: 12px; }
    .scale-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 1.5rem; cursor: pointer; }
    .scale-value { font-size: 2rem; font-weight: 700; min-width: 80px; text-align: center; }
    .scale-label { font-size: 0.9rem; color: var(--text-secondary); }
    .ingredient-list { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; }
    .ingredient-item { display: grid; grid-template-columns: 100px 1fr 40px; gap: 1rem; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--bg-secondary); }
    .ingredient-item:last-child { border-bottom: none; }
    .ingredient-amount { font-weight: 600; color: var(--primary); font-size: 1.1rem; }
    .ingredient-name { }
    .add-ingredient { display: flex; gap: 0.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--bg-secondary); }
    .preset-recipes { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .preset-btn { padding: 0.5rem 1rem; border-radius: 20px; border: none; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .preset-btn:hover { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">레시피 양 조절기</h1>
          <p class="tool-description">레시피 재료 양 자동 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="cooking-container">
      <div class="cooking-panel">
        <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">샘플 레시피</label>
        <div class="preset-recipes">
          <button class="preset-btn" onclick="RecipeScaler.loadPreset('pancake')" aria-label="팬케이크">팬케이크</button>
          <button class="preset-btn" onclick="RecipeScaler.loadPreset('pasta')" aria-label="파스타">파스타</button>
          <button class="preset-btn" onclick="RecipeScaler.loadPreset('rice')" aria-label="볶음밥">볶음밥</button>
          <button class="preset-btn" onclick="RecipeScaler.loadPreset('cookie')" aria-label="쿠키">쿠키</button>
        </div>

        <div>
          <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">레시피 이름</label>
          <input type="text" id="recipeName" class="tool-input" placeholder="예: 초코칩 쿠키" style="margin-bottom: 1rem;" aria-label="예: 초코칩 쿠키">
        </div>

        <div class="scale-control">
          <div style="text-align: center;">
            <div class="scale-label">원본</div>
            <input type="number" id="originalServings" class="tool-input" value="4" min="1" style="width: 80px; text-align: center; font-weight: 600;" onchange="RecipeScaler.calculate()">
            <div class="scale-label">인분</div>
          </div>
          <div style="font-size: 2rem;">→</div>
          <div style="text-align: center;">
            <div class="scale-label">조절</div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <button class="scale-btn" onclick="RecipeScaler.adjustServings(-1)" aria-label="−">−</button>
              <div class="scale-value" id="targetServings">4</div>
              <button class="scale-btn" onclick="RecipeScaler.adjustServings(1)" aria-label="+">+</button>
            </div>
            <div class="scale-label">인분</div>
          </div>
        </div>

        <div class="ingredient-list">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3 style="font-weight: 600;">재료 목록</h3>
            <span style="font-size: 0.85rem; color: var(--text-secondary);" id="scaleRatio">×1.0</span>
          </div>

          <div id="ingredientsList"></div>

          <div class="add-ingredient">
            <input type="text" id="newAmount" class="tool-input" placeholder="양 (예: 200)" style="width: 80px;" aria-label="양 (예: 200)">
            <input type="text" id="newUnit" class="tool-input" placeholder="단위" style="width: 60px;" aria-label="단위">
            <input type="text" id="newName" class="tool-input" placeholder="재료명" style="flex: 1;" aria-label="재료명">
            <button class="tool-btn tool-btn-primary" onclick="RecipeScaler.addIngredient()" aria-label="추가">추가</button>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="RecipeScaler.clearAll()" style="flex: 1;" aria-label="초기화">초기화</button>
          <button class="tool-btn tool-btn-primary" onclick="RecipeScaler.exportRecipe()" style="flex: 1;" aria-label="레시피 복사">레시피 복사</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="recipe-scaler.js"></script>
</body>
</html>
