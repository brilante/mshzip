<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>식단 플래너 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .cooking-container { max-width: 900px; margin: 0 auto; }
    .cooking-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
    .day-column { background: var(--bg-primary); border-radius: 12px; padding: 1rem; min-height: 300px; }
    .day-header { font-weight: 600; text-align: center; padding-bottom: 0.75rem; border-bottom: 2px solid var(--bg-secondary); margin-bottom: 0.75rem; }
    .day-header.today { color: var(--primary); border-color: var(--primary); }
    .meal-slot { background: var(--bg-secondary); border-radius: 8px; padding: 0.5rem; margin-bottom: 0.5rem; font-size: 0.8rem; }
    .meal-label { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .meal-content { display: flex; justify-content: space-between; align-items: center; }
    .meal-name { flex: 1; }
    .meal-empty { color: var(--text-secondary); font-style: italic; }
    .add-meal-btn { width: 100%; padding: 0.5rem; border: 2px dashed var(--bg-secondary); border-radius: 8px; background: none; cursor: pointer; color: var(--text-secondary); font-size: 0.8rem; }
    .add-meal-btn:hover { border-color: var(--primary); color: var(--primary); }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 400px; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">식단 플래너</h1>
          <p class="tool-description">주간 식단 계획 및 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="cooking-container">
      <div class="cooking-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <h3 style="font-weight: 600;" id="weekTitle">이번 주 식단</h3>
          <div style="display: flex; gap: 0.5rem;">
            <button class="tool-btn tool-btn-secondary" onclick="MealPlanner.clearAll()" aria-label="초기화">초기화</button>
            <button class="tool-btn tool-btn-primary" onclick="MealPlanner.exportPlan()" aria-label="내보내기">내보내기</button>
          </div>
        </div>

        <div class="week-grid" id="weekGrid"></div>
      </div>
    </div>
  </div>

  <!-- 식사 추가 모달 -->
  <div class="modal" id="mealModal">
    <div class="modal-content">
      <h3 style="font-weight: 600; margin-bottom: 1rem;" id="modalTitle">식사 추가</h3>
      <div style="margin-bottom: 1rem;">
        <label style="font-size: 0.85rem; display: block; margin-bottom: 0.25rem;">메뉴</label>
        <input type="text" id="mealInput" class="tool-input" placeholder="예: 비빔밥, 된장찌개" aria-label="예: 비빔밥, 된장찌개">
      </div>
      <div style="display: flex; gap: 0.5rem;">
        <button class="tool-btn tool-btn-secondary" onclick="MealPlanner.closeModal()" style="flex: 1;" aria-label="취소">취소</button>
        <button class="tool-btn tool-btn-primary" onclick="MealPlanner.saveMeal()" style="flex: 1;" aria-label="저장">저장</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="meal-planner.js"></script>
</body>
</html>
