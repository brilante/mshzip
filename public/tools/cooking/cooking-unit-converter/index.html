<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>요리 단위 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .cooking-container { max-width: 600px; margin: 0 auto; }
    .cooking-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .converter-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .converter-title { font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .converter-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; }
    .converter-input { display: flex; flex-direction: column; gap: 0.5rem; }
    .result-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; text-align: center; }
    .result-value { font-size: 2.5rem; font-weight: 700; }
    .result-unit { font-size: 1rem; opacity: 0.9; }
    .quick-convert { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-top: 1rem; }
    .quick-item { background: var(--bg-secondary); padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; }
    .quick-item strong { color: var(--primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">요리 단위 변환기</h1>
          <p class="tool-description">요리 계량 단위 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="cooking-container">
      <div class="cooking-panel">
        <div class="converter-section">
          <div class="converter-title">단위 변환</div>
          <div class="converter-row">
            <div class="converter-input">
              <input type="number" id="fromValue" class="tool-input" value="1" oninput="CookingUnit.convert()">
              <select id="fromUnit" class="tool-input" onchange="CookingUnit.convert()">
                <optgroup label="부피 (Volume)">
                  <option value="cup">컵 (cup)</option>
                  <option value="tbsp">큰술 (Tbsp)</option>
                  <option value="tsp">작은술 (tsp)</option>
                  <option value="ml">밀리리터 (ml)</option>
                  <option value="l">리터 (L)</option>
                  <option value="floz">액량온스 (fl oz)</option>
                </optgroup>
                <optgroup label="무게 (Weight)">
                  <option value="g">그램 (g)</option>
                  <option value="kg">킬로그램 (kg)</option>
                  <option value="oz">온스 (oz)</option>
                  <option value="lb">파운드 (lb)</option>
                </optgroup>
              </select>
            </div>
            <div style="font-size: 1.5rem;">=</div>
            <div class="converter-input">
              <input type="text" id="toValue" class="tool-input" readonly style="background: var(--bg-secondary); font-weight: 600;">
              <select id="toUnit" class="tool-input" onchange="CookingUnit.convert()">
                <optgroup label="부피 (Volume)">
                  <option value="ml" selected>밀리리터 (ml)</option>
                  <option value="cup">컵 (cup)</option>
                  <option value="tbsp">큰술 (Tbsp)</option>
                  <option value="tsp">작은술 (tsp)</option>
                  <option value="l">리터 (L)</option>
                  <option value="floz">액량온스 (fl oz)</option>
                </optgroup>
                <optgroup label="무게 (Weight)">
                  <option value="g">그램 (g)</option>
                  <option value="kg">킬로그램 (kg)</option>
                  <option value="oz">온스 (oz)</option>
                  <option value="lb">파운드 (lb)</option>
                </optgroup>
              </select>
            </div>
          </div>
        </div>

        <div class="result-display">
          <div class="result-value" id="resultValue">240</div>
          <div class="result-unit" id="resultUnit">ml</div>
        </div>

        <div class="converter-section" style="margin-top: 1rem;">
          <div class="converter-title">빠른 참조표</div>
          <div class="quick-convert">
            <div class="quick-item"><strong>1 컵</strong> = 240 ml</div>
            <div class="quick-item"><strong>1 큰술</strong> = 15 ml</div>
            <div class="quick-item"><strong>1 작은술</strong> = 5 ml</div>
            <div class="quick-item"><strong>1 온스</strong> = 28.35 g</div>
            <div class="quick-item"><strong>1 파운드</strong> = 453.6 g</div>
            <div class="quick-item"><strong>1 액량온스</strong> = 29.57 ml</div>
          </div>
        </div>

        <div class="converter-section">
          <div class="converter-title">재료별 컵 계량 (대략)</div>
          <div class="quick-convert">
            <div class="quick-item">밀가루 1컵 ≈ <strong>120g</strong></div>
            <div class="quick-item">설탕 1컵 ≈ <strong>200g</strong></div>
            <div class="quick-item">버터 1컵 ≈ <strong>227g</strong></div>
            <div class="quick-item">쌀 1컵 ≈ <strong>185g</strong></div>
            <div class="quick-item">우유 1컵 ≈ <strong>245g</strong></div>
            <div class="quick-item">꿀 1컵 ≈ <strong>340g</strong></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="cooking-unit-converter.js"></script>
</body>
</html>
