<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모기지 계산기 - JEOGI Tools</title>
  <link rel="stylesheet" href="mortgage-calc.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>모기지 계산기</h1>
      <p class="subtitle">주택담보대출 상환액을 계산합니다</p>
    </header>

    <main class="main-content">
      <section class="input-section">
        <div class="input-group">
          <label for="loanAmount">대출 금액</label>
          <div class="input-with-unit">
            <input type="number" id="loanAmount" value="300000000" />
            <span class="unit">원</span>
          </div>
        </div>

        <div class="input-group">
          <label for="interestRate">연 이자율</label>
          <div class="input-with-unit">
            <input type="number" id="interestRate" value="4.5" step="0.1" />
            <span class="unit">%</span>
          </div>
        </div>

        <div class="input-group">
          <label for="loanTerm">대출 기간</label>
          <div class="input-with-unit">
            <input type="number" id="loanTerm" value="30" />
            <span class="unit">년</span>
          </div>
        </div>

        <div class="input-group">
          <label for="paymentType">상환 방식</label>
          <select id="paymentType">
            <option value="equal">원리금균등상환</option>
            <option value="principal">원금균등상환</option>
          </select>
        </div>

        <button class="calculate-btn" id="calculateBtn">
          <span></span> 계산하기
        </button>
      </section>

      <section class="result-section" id="resultSection">
        <div class="result-cards">
          <div class="result-card highlight">
            <div class="card-label">월 상환액</div>
            <div class="card-value" id="monthlyPayment">0</div>
            <div class="card-sub">원</div>
          </div>
          <div class="result-card">
            <div class="card-label">총 상환액</div>
            <div class="card-value" id="totalPayment">0</div>
            <div class="card-sub">원</div>
          </div>
          <div class="result-card">
            <div class="card-label">총 이자</div>
            <div class="card-value" id="totalInterest">0</div>
            <div class="card-sub">원</div>
          </div>
        </div>

        <div class="chart-section">
          <h3>상환 비율</h3>
          <div class="pie-chart" id="pieChart">
            <canvas id="chartCanvas" width="200" height="200"></canvas>
          </div>
          <div class="chart-legend">
            <div class="legend-item"><span class="dot principal"></span> 원금</div>
            <div class="legend-item"><span class="dot interest"></span> 이자</div>
          </div>
        </div>
      </section>

      <section class="schedule-section">
        <h3>상환 스케줄</h3>
        <div class="schedule-controls">
          <button class="schedule-btn active" data-view="yearly" aria-label="연간">연간</button>
          <button class="schedule-btn" data-view="monthly" aria-label="월간">월간</button>
        </div>
        <div class="schedule-table-wrap">
          <table class="schedule-table" id="scheduleTable">
            <thead>
              <tr>
                <th>회차</th>
                <th>납입원금</th>
                <th>납입이자</th>
                <th>월상환액</th>
                <th>잔액</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="mortgage-calc.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
