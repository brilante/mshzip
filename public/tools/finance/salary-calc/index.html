<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연봉 계산기 - JEOGI Tools</title>
  <link rel="stylesheet" href="salary-calc.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>연봉 계산기</h1>
      <p class="subtitle">4대보험, 세금을 제외한 실수령액을 계산합니다</p>
    </header>

    <main class="main-content">
      <section class="input-section">
        <div class="input-row">
          <div class="input-group">
            <label>연봉 (세전)</label>
            <div class="input-with-unit">
              <input type="number" id="annualSalary" value="50000000" />
              <span>원</span>
            </div>
          </div>
          <div class="input-group">
            <label>부양가족 수 (본인 포함)</label>
            <select id="dependents">
              <option value="1" selected>1명</option>
              <option value="2">2명</option>
              <option value="3">3명</option>
              <option value="4">4명</option>
              <option value="5">5명 이상</option>
            </select>
          </div>
          <div class="input-group">
            <label>20세 이하 자녀 수</label>
            <select id="children">
              <option value="0" selected>없음</option>
              <option value="1">1명</option>
              <option value="2">2명</option>
              <option value="3">3명 이상</option>
            </select>
          </div>
        </div>

        <div class="options-row">
          <label class="checkbox-label">
            <input type="checkbox" id="nonTaxable" />
            비과세 포함 (월 10만원 식대)
          </label>
        </div>

        <button class="calculate-btn" id="calculateBtn">
          <span></span> 계산하기
        </button>
      </section>

      <section class="result-section">
        <div class="main-result">
          <div class="result-label">월 실수령액</div>
          <div class="result-value" id="netMonthly">0</div>
          <div class="result-sub">원</div>
        </div>

        <div class="result-details">
          <div class="detail-card">
            <span class="label">연간 실수령액</span>
            <span class="value" id="netAnnual">0원</span>
          </div>
          <div class="detail-card">
            <span class="label">월급여 (세전)</span>
            <span class="value" id="grossMonthly">0원</span>
          </div>
          <div class="detail-card">
            <span class="label">총 공제액 (월)</span>
            <span class="value negative" id="totalDeduction">0원</span>
          </div>
        </div>
      </section>

      <section class="breakdown-section">
        <h3>공제 내역</h3>
        <div class="breakdown-table">
          <div class="breakdown-row header">
            <span>항목</span>
            <span>요율</span>
            <span>월 공제액</span>
            <span>연 공제액</span>
          </div>
          <div class="breakdown-row" id="nationalPension">
            <span>국민연금</span>
            <span>4.5%</span>
            <span>0원</span>
            <span>0원</span>
          </div>
          <div class="breakdown-row" id="healthInsurance">
            <span>건강보험</span>
            <span>3.545%</span>
            <span>0원</span>
            <span>0원</span>
          </div>
          <div class="breakdown-row" id="longTermCare">
            <span>장기요양</span>
            <span>12.81%</span>
            <span>0원</span>
            <span>0원</span>
          </div>
          <div class="breakdown-row" id="employment">
            <span>고용보험</span>
            <span>0.9%</span>
            <span>0원</span>
            <span>0원</span>
          </div>
          <div class="breakdown-row" id="incomeTax">
            <span>소득세</span>
            <span>간이세액</span>
            <span>0원</span>
            <span>0원</span>
          </div>
          <div class="breakdown-row" id="localTax">
            <span>지방소득세</span>
            <span>10%</span>
            <span>0원</span>
            <span>0원</span>
          </div>
          <div class="breakdown-row total">
            <span>합계</span>
            <span>-</span>
            <span id="totalMonthly">0원</span>
            <span id="totalAnnual">0원</span>
          </div>
        </div>
      </section>

      <section class="chart-section">
        <h3>급여 구성</h3>
        <div class="salary-bar">
          <div class="bar-segment net" id="netBar">
            <span>실수령 0%</span>
          </div>
          <div class="bar-segment tax" id="taxBar">
            <span>세금/보험 0%</span>
          </div>
        </div>
      </section>

      <section class="compare-section">
        <h3>연봉별 실수령액 비교</h3>
        <div class="compare-table" id="compareTable"></div>
      </section>
    </main>
  </div>

  <script src="salary-calc.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
