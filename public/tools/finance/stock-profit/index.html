<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 수익 계산기 - JEOGI Tools</title>
  <link rel="stylesheet" href="stock-profit.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>주식 수익 계산기</h1>
      <p class="subtitle">매수/매도 가격으로 수익률과 세금을 계산합니다</p>
    </header>

    <main class="main-content">
      <section class="input-section">
        <div class="input-grid">
          <div class="input-group">
            <label>매수 단가</label>
            <div class="input-with-unit">
              <input type="number" id="buyPrice" value="50000" />
              <span>원</span>
            </div>
          </div>
          <div class="input-group">
            <label>매수 수량</label>
            <div class="input-with-unit">
              <input type="number" id="quantity" value="100" />
              <span>주</span>
            </div>
          </div>
          <div class="input-group">
            <label>매도 단가</label>
            <div class="input-with-unit">
              <input type="number" id="sellPrice" value="65000" />
              <span>원</span>
            </div>
          </div>
          <div class="input-group">
            <label>증권사 수수료</label>
            <div class="input-with-unit">
              <input type="number" id="commission" value="0.015" step="0.001" />
              <span>%</span>
            </div>
          </div>
        </div>

        <div class="tax-options">
          <label>세금 유형:</label>
          <div class="tax-buttons">
            <button class="tax-btn active" data-tax="domestic" aria-label="🇰🇷 국내주식">🇰🇷 국내주식</button>
            <button class="tax-btn" data-tax="foreign" aria-label="해외주식">해외주식</button>
          </div>
        </div>

        <button class="calculate-btn" id="calculateBtn">
          <span></span> 수익 계산
        </button>
      </section>

      <section class="result-section">
        <div class="profit-display" id="profitDisplay">
          <div class="profit-amount">
            <span class="label">순수익</span>
            <span class="value" id="netProfit">+0</span>
            <span class="unit">원</span>
          </div>
          <div class="profit-rate">
            <span class="label">수익률</span>
            <span class="value" id="profitRate">0%</span>
          </div>
        </div>

        <div class="detail-cards">
          <div class="detail-card">
            <span class="label">매수 금액</span>
            <span class="value" id="buyTotal">0원</span>
          </div>
          <div class="detail-card">
            <span class="label">매도 금액</span>
            <span class="value" id="sellTotal">0원</span>
          </div>
          <div class="detail-card">
            <span class="label">총 수수료</span>
            <span class="value negative" id="totalFee">0원</span>
          </div>
          <div class="detail-card">
            <span class="label">세금</span>
            <span class="value negative" id="taxAmount">0원</span>
          </div>
        </div>
      </section>

      <section class="breakdown-section">
        <h3>상세 내역</h3>
        <div class="breakdown-list">
          <div class="breakdown-item">
            <span>매수 총액</span>
            <span id="detailBuy">0원</span>
          </div>
          <div class="breakdown-item">
            <span>매수 수수료</span>
            <span class="negative" id="detailBuyFee">-0원</span>
          </div>
          <div class="breakdown-item">
            <span>매도 총액</span>
            <span id="detailSell">0원</span>
          </div>
          <div class="breakdown-item">
            <span>매도 수수료</span>
            <span class="negative" id="detailSellFee">-0원</span>
          </div>
          <div class="breakdown-item">
            <span>증권거래세</span>
            <span class="negative" id="detailTradeTax">-0원</span>
          </div>
          <div class="breakdown-item" id="capitalGainRow" style="display:none;">
            <span>양도소득세</span>
            <span class="negative" id="detailCapitalTax">-0원</span>
          </div>
          <div class="breakdown-item total">
            <span>최종 순수익</span>
            <span id="detailNet">0원</span>
          </div>
        </div>
      </section>

      <section class="target-section">
        <h3>목표가 계산</h3>
        <div class="target-input">
          <label>목표 수익률:</label>
          <input type="number" id="targetRate" value="20" />
          <span>%</span>
          <button id="targetBtn" aria-label="계산">계산</button>
        </div>
        <div class="target-result" id="targetResult">
          목표 매도가: <strong>0원</strong>
        </div>
      </section>

      <section class="simulation-section">
        <h3>가격별 수익 시뮬레이션</h3>
        <div class="simulation-table" id="simulationTable"></div>
      </section>
    </main>
  </div>

  <script src="stock-profit.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
