<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브라우저 프레임 생성 | Browser Frame Generator</title>
  <link rel="stylesheet" href="browser-frame-gen.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>브라우저 프레임 생성</h1>
      <p>다양한 브라우저 스타일의 프레임으로 스크린샷을 감싸세요</p>
    </header>

    <div class="main-content">
      <div class="layout">
        <div class="controls-panel">
          <div class="upload-section">
            <label>스크린샷 업로드</label>
            <div class="upload-area" id="uploadArea">
              <input type="file" id="imageInput" accept="image/*" hidden>
              <p>클릭하거나 드래그</p>
            </div>
          </div>

          <div class="control-group">
            <label>브라우저 스타일</label>
            <select id="browserStyle">
              <option value="chrome-light">Chrome (라이트)</option>
              <option value="chrome-dark">Chrome (다크)</option>
              <option value="safari">Safari</option>
              <option value="firefox">Firefox</option>
              <option value="edge">Edge</option>
              <option value="arc">Arc</option>
            </select>
          </div>

          <div class="control-group">
            <label>URL 표시</label>
            <input type="text" id="urlText" value="https://mywebsite.com" placeholder="URL 입력" aria-label="URL 입력">
          </div>

          <div class="control-group">
            <label>탭 수</label>
            <select id="tabCount">
              <option value="1">1개</option>
              <option value="2">2개</option>
              <option value="3">3개</option>
            </select>
          </div>

          <div class="control-group">
            <label>프레임 너비</label>
            <input type="range" id="frameWidth" min="600" max="1200" value="900">
          </div>

          <button class="download-btn" onclick="downloadImage()" aria-label="이미지 다운로드">이미지 다운로드</button>
        </div>

        <div class="preview-panel">
          <div class="browser-mockup" id="browserMockup">
            <div class="browser-chrome chrome-light" id="browserChrome">
              <div class="browser-toolbar">
                <div class="traffic-lights">
                  <span class="light red"></span>
                  <span class="light yellow"></span>
                  <span class="light green"></span>
                </div>
                <div class="tabs" id="tabs">
                  <div class="tab active">
                    <span class="tab-icon"></span>
                    <span class="tab-title">New Tab</span>
                    <span class="tab-close">×</span>
                  </div>
                </div>
              </div>
              <div class="address-bar">
                <div class="nav-buttons">
                  <span>←</span>
                  <span>→</span>
                  <span>↻</span>
                </div>
                <div class="url-bar">
                  <span class="lock"></span>
                  <span class="url" id="urlDisplay">https://mywebsite.com</span>
                </div>
              </div>
              <div class="browser-content" id="browserContent">
                <div class="placeholder">스크린샷을 업로드하세요</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="browser-frame-gen.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
