<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>앱스토어 스크린샷 | App Store Screenshot</title>
  <link rel="stylesheet" href="appstore-screenshot.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>앱스토어 스크린샷</h1>
      <p>App Store, Play Store용 프로모션 스크린샷을 만드세요</p>
    </header>

    <div class="main-content">
      <div class="layout">
        <div class="controls-panel">
          <div class="upload-section">
            <label>앱 스크린샷 업로드</label>
            <div class="upload-area" id="uploadArea">
              <input type="file" id="imageInput" accept="image/*" hidden>
              <p>클릭하거나 드래그</p>
            </div>
          </div>

          <div class="control-group">
            <label>타이틀</label>
            <input type="text" id="titleText" value="최고의 앱 경험" placeholder="타이틀 입력" aria-label="타이틀 입력">
          </div>

          <div class="control-group">
            <label>서브타이틀</label>
            <input type="text" id="subtitleText" value="지금 바로 시작하세요" placeholder="서브타이틀 입력" aria-label="서브타이틀 입력">
          </div>

          <div class="control-group">
            <label>배경 그라디언트</label>
            <div class="gradient-inputs">
              <input type="color" id="gradientStart" value="#667eea">
              <input type="color" id="gradientEnd" value="#764ba2">
            </div>
          </div>

          <div class="control-group">
            <label>텍스트 색상</label>
            <input type="color" id="textColor" value="#ffffff">
          </div>

          <div class="control-group">
            <label>디바이스 표시</label>
            <input type="checkbox" id="showDevice" checked>
          </div>

          <div class="control-group">
            <label>사이즈</label>
            <select id="screenshotSize">
              <option value="1242x2688">iPhone 6.5" (1242×2688)</option>
              <option value="1284x2778">iPhone 6.7" (1284×2778)</option>
              <option value="1080x1920">Android (1080×1920)</option>
            </select>
          </div>

          <button class="download-btn" onclick="downloadImage()" aria-label="이미지 다운로드">이미지 다운로드</button>
        </div>

        <div class="preview-panel">
          <div class="preview-container" id="previewContainer">
            <div class="title-text" id="titleDisplay">최고의 앱 경험</div>
            <div class="subtitle-text" id="subtitleDisplay">지금 바로 시작하세요</div>
            <div class="device-wrapper" id="deviceWrapper">
              <div class="phone-frame">
                <div class="phone-screen" id="phoneScreen">
                  <div class="placeholder">앱 스크린샷</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="appstore-screenshot.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
