<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>디바이스 목업 | Device Mockup</title>
  <link rel="stylesheet" href="device-mockup.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>디바이스 목업</h1>
      <p>iPhone, Android 등 다양한 디바이스 프레임으로 앱 스크린샷을 표시하세요</p>
    </header>

    <div class="main-content">
      <div class="layout">
        <div class="controls-panel">
          <div class="upload-section">
            <label>스크린샷 업로드</label>
            <div class="upload-area" id="uploadArea">
              <input type="file" id="imageInput" accept="image/*" hidden>
              <p>클릭하거나 드래그</p>
            </div>
          </div>

          <div class="control-group">
            <label>디바이스</label>
            <select id="deviceType">
              <option value="iphone15">iPhone 15 Pro</option>
              <option value="iphone14">iPhone 14</option>
              <option value="iphoneSE">iPhone SE</option>
              <option value="pixel8">Google Pixel 8</option>
              <option value="galaxyS24">Samsung Galaxy S24</option>
              <option value="ipadPro">iPad Pro</option>
            </select>
          </div>

          <div class="control-group">
            <label>디바이스 색상</label>
            <select id="deviceColor">
              <option value="black">블랙</option>
              <option value="white">화이트</option>
              <option value="gold">골드</option>
              <option value="blue">블루</option>
            </select>
          </div>

          <div class="control-group">
            <label>배경색</label>
            <input type="color" id="bgColor" value="#f5f5f5">
          </div>

          <div class="control-group">
            <label>그림자</label>
            <input type="checkbox" id="showShadow" checked>
          </div>

          <div class="control-group">
            <label>회전</label>
            <select id="rotation">
              <option value="0">세로 (0°)</option>
              <option value="90">가로 (90°)</option>
              <option value="-15">기울임 (-15°)</option>
              <option value="15">기울임 (15°)</option>
            </select>
          </div>

          <button class="download-btn" onclick="downloadImage()" aria-label="이미지 다운로드">이미지 다운로드</button>
        </div>

        <div class="preview-panel">
          <div class="preview-container" id="previewContainer">
            <div class="device-frame iphone15 black" id="deviceFrame">
              <div class="device-screen" id="deviceScreen">
                <div class="placeholder">스크린샷을 업로드하세요</div>
              </div>
              <div class="device-notch"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="device-mockup.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
