<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 챗봇 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 900px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .model-btn { padding: 0.5rem 0.75rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .model-icon { font-size: 1rem; }
    .model-name { font-weight: 600; }
    .chat-container { display: flex; flex-direction: column; height: 500px; background: var(--bg-primary); border-radius: 12px; overflow: hidden; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .message { max-width: 80%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.6; }
    .message.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: var(--bg-secondary); border-bottom-left-radius: 4px; }
    .message-header { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.25rem; }
    .message-content { white-space: pre-wrap; }
    .welcome-message { text-align: center; color: var(--text-secondary); padding: 3rem 1rem; }
    .welcome-icon { font-size: 3rem; margin-bottom: 1rem; }
    .welcome-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-primary); }
    .quick-prompts { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .quick-prompt { padding: 0.5rem 1rem; background: var(--bg-secondary); border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .quick-prompt:hover { background: var(--primary); color: white; }
    .chat-input-area { padding: 1rem; border-top: 1px solid var(--border-color); display: flex; gap: 0.75rem; }
    .chat-input { flex: 1; padding: 0.75rem 1rem; border-radius: 25px; border: 1px solid var(--border-color); background: var(--bg-secondary); resize: none; font-size: 0.95rem; }
    .chat-input:focus { outline: none; border-color: var(--primary); }
    .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.2s; }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { background: var(--text-secondary); cursor: not-allowed; }
    .typing-indicator { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; background: var(--bg-secondary); border-radius: 12px; max-width: 100px; }
    .typing-dot { width: 6px; height: 6px; background: var(--text-secondary); border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    .chat-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    @media (max-width: 600px) { .message { max-width: 90%; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 챗봇</h1>
          <p class="tool-description">다양한 AI 모델과 대화하기</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="gpt-4o-mini" onclick="AIChat.selectModel('gpt-4o-mini')">
            <span class="model-icon"></span>
            <span class="model-name">GPT-4o Mini</span>
          </div>
          <div class="model-btn" data-model="claude-3-haiku" onclick="AIChat.selectModel('claude-3-haiku')">
            <span class="model-icon"></span>
            <span class="model-name">Claude 3 Haiku</span>
          </div>
          <div class="model-btn" data-model="gemini-2-flash" onclick="AIChat.selectModel('gemini-2-flash')">
            <span class="model-icon"></span>
            <span class="model-name">Gemini 2.0 Flash</span>
          </div>
          <div class="model-btn" data-model="grok-3-mini" onclick="AIChat.selectModel('grok-3-mini')">
            <span class="model-icon"></span>
            <span class="model-name">Grok 3 Mini</span>
          </div>
        </div>

        <div class="chat-container">
          <div class="chat-messages" id="chatMessages">
            <div class="welcome-message" id="welcomeMessage">
              <div class="welcome-icon"></div>
              <div class="welcome-title">AI 챗봇에 오신 것을 환영합니다!</div>
              <div>질문하거나 대화를 시작해보세요.</div>
              <div class="quick-prompts">
                <div class="quick-prompt" onclick="AIChat.quickPrompt('오늘 날씨가 어때?')">날씨 이야기</div>
                <div class="quick-prompt" onclick="AIChat.quickPrompt('재미있는 이야기 해줘')">이야기 해줘</div>
                <div class="quick-prompt" onclick="AIChat.quickPrompt('코딩 도움이 필요해')">코딩 도움</div>
                <div class="quick-prompt" onclick="AIChat.quickPrompt('오늘 할 일을 정리해줘')">할 일 정리</div>
              </div>
            </div>
          </div>
          <div class="chat-input-area">
            <textarea id="chatInput" class="chat-input" placeholder="메시지를 입력하세요..." rows="1" onkeydown="AIChat.handleKeyDown(event)"></textarea>
            <button class="send-btn" onclick="AIChat.send()" id="sendBtn" aria-label=""></button>
          </div>
        </div>

        <div class="chat-actions">
          <button class="tool-btn tool-btn-secondary" onclick="AIChat.clearChat()" aria-label="대화 지우기">대화 지우기</button>
          <button class="tool-btn tool-btn-secondary" onclick="AIChat.exportChat()" aria-label="대화 내보내기">대화 내보내기</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ai-chat.js"></script>
</body>
</html>
