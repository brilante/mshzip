<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 번역 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 1000px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .model-icon { font-size: 1.2rem; }
    .model-info { display: flex; flex-direction: column; }
    .model-name { font-weight: 600; }
    .model-desc { font-size: 0.7rem; color: var(--text-secondary); }
    .language-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .language-select-wrapper { flex: 1; }
    .language-select { width: 100%; }
    .swap-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.25rem; transition: all 0.3s; flex-shrink: 0; }
    .swap-btn:hover { transform: rotate(180deg); }
    .translate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .translate-panel { display: flex; flex-direction: column; }
    .translate-textarea { flex: 1; min-height: 250px; resize: none; }
    .output-area { flex: 1; min-height: 250px; background: var(--bg-primary); border-radius: 10px; padding: 1rem; overflow-y: auto; white-space: pre-wrap; line-height: 1.8; }
    .output-placeholder { color: var(--text-secondary); text-align: center; padding-top: 80px; }
    .char-counter { text-align: right; font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    .history-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.85rem; }
    .history-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-lang { color: var(--text-secondary); margin: 0 0.5rem; }
    .loading-indicator { display: none; align-items: center; justify-content: center; gap: 0.5rem; padding: 2rem; color: var(--text-secondary); }
    .loading-indicator.active { display: flex; }
    .typing-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    @media (max-width: 800px) { .translate-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 번역</h1>
          <p class="tool-description">AI 기반 고품질 다국어 번역</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="translategemma" onclick="AITranslator.selectModel('translategemma')">
            <span class="model-icon"></span>
            <div class="model-info">
              <span class="model-name">TranslateGemma</span>
              <span class="model-desc">55개 언어 지원 (로컬)</span>
            </div>
          </div>
          <div class="model-btn" data-model="gpt-4o" onclick="AITranslator.selectModel('gpt-4o')">
            <span class="model-icon"></span>
            <div class="model-info">
              <span class="model-name">GPT-4o</span>
              <span class="model-desc">자연스러운 번역</span>
            </div>
          </div>
          <div class="model-btn" data-model="claude-3-5-sonnet" onclick="AITranslator.selectModel('claude-3-5-sonnet')">
            <span class="model-icon"></span>
            <div class="model-info">
              <span class="model-name">Claude 3.5 Sonnet</span>
              <span class="model-desc">문맥 이해 우수</span>
            </div>
          </div>
          <div class="model-btn" data-model="gemini-2-flash" onclick="AITranslator.selectModel('gemini-2-flash')">
            <span class="model-icon"></span>
            <div class="model-info">
              <span class="model-name">Gemini 2.0 Flash</span>
              <span class="model-desc">빠른 번역</span>
            </div>
          </div>
          <div class="model-btn" data-model="deepl" onclick="AITranslator.selectModel('deepl')">
            <span class="model-icon"></span>
            <div class="model-info">
              <span class="model-name">DeepL</span>
              <span class="model-desc">전문 번역</span>
            </div>
          </div>
        </div>

        <div class="section-title">언어 선택</div>
        <div class="language-row">
          <div class="language-select-wrapper">
            <select id="sourceLang" class="tool-input language-select">
              <option value="auto">자동 감지</option>
              <option value="ko">한국어</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="ru">Русский</option>
              <option value="pt">Português</option>
              <option value="it">Italiano</option>
              <option value="vi">Tiếng Việt</option>
              <option value="th">ไทย</option>
              <option value="ar">العربية</option>
            </select>
          </div>
          <div class="swap-btn" onclick="AITranslator.swapLanguages()">⇄</div>
          <div class="language-select-wrapper">
            <select id="targetLang" class="tool-input language-select">
              <option value="en">English</option>
              <option value="ko">한국어</option>
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="ru">Русский</option>
              <option value="pt">Português</option>
              <option value="it">Italiano</option>
              <option value="vi">Tiếng Việt</option>
              <option value="th">ไทย</option>
              <option value="ar">العربية</option>
            </select>
          </div>
        </div>

        <div class="translate-grid">
          <div class="translate-panel">
            <div class="section-title">원문</div>
            <textarea id="sourceText" class="tool-input translate-textarea" placeholder="번역할 텍스트를 입력하세요..." oninput="AITranslator.updateCharCount()"></textarea>
            <div class="char-counter"><span id="charCount">0</span> / 5000</div>
          </div>
          <div class="translate-panel">
            <div class="section-title">번역 결과</div>
            <div class="output-area" id="outputArea">
              <div class="output-placeholder">번역 결과가 여기에 표시됩니다.</div>
              <div class="loading-indicator" id="loadingIndicator">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span style="margin-left: 0.5rem;">번역 중...</span>
              </div>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="AITranslator.translate()" aria-label="번역하기">
            번역하기
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="AITranslator.copy()" aria-label="복사">
            복사
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="AITranslator.speak()" aria-label="읽기">
            읽기
          </button>
        </div>

        <div class="history-section">
          <div class="section-title">최근 번역</div>
          <div id="historyList">
            <div style="color: var(--text-secondary); font-size: 0.85rem;">번역 기록이 없습니다.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ai-translator.js"></script>
</body>
</html>
