<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 문법 교정 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 1000px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .model-icon { font-size: 1.2rem; }
    .model-name { font-weight: 600; }
    .grammar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grammar-panel { display: flex; flex-direction: column; }
    .grammar-textarea { flex: 1; min-height: 300px; resize: none; }
    .output-area { flex: 1; min-height: 300px; background: var(--bg-primary); border-radius: 10px; padding: 1rem; overflow-y: auto; }
    .output-placeholder { color: var(--text-secondary); text-align: center; padding-top: 100px; }
    .correction-item { padding: 0.75rem; margin-bottom: 0.75rem; border-radius: 8px; border-left: 4px solid; }
    .correction-item.error { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
    .correction-item.warning { border-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
    .correction-item.suggestion { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    .correction-type { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.25rem; }
    .correction-type.error { color: #ef4444; }
    .correction-type.warning { color: #f59e0b; }
    .correction-type.suggestion { color: #3b82f6; }
    .correction-original { text-decoration: line-through; color: var(--text-secondary); }
    .correction-fixed { color: #22c55e; font-weight: 500; }
    .stats-row { display: flex; gap: 1rem; margin-top: 1rem; }
    .stat-box { flex: 1; background: var(--bg-primary); border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; }
    .stat-value.error { color: #ef4444; }
    .stat-value.warning { color: #f59e0b; }
    .stat-value.good { color: #22c55e; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    .loading-indicator { display: none; align-items: center; justify-content: center; gap: 0.5rem; padding: 2rem; color: var(--text-secondary); }
    .loading-indicator.active { display: flex; }
    .typing-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    @media (max-width: 800px) { .grammar-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 문법 교정</h1>
          <p class="tool-description">AI가 문법 오류를 찾아 교정합니다</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="gpt-4o-mini" onclick="AIGrammar.selectModel('gpt-4o-mini')">
            <span class="model-icon"></span>
            <span class="model-name">GPT-4o Mini</span>
          </div>
          <div class="model-btn" data-model="claude-3-haiku" onclick="AIGrammar.selectModel('claude-3-haiku')">
            <span class="model-icon"></span>
            <span class="model-name">Claude 3 Haiku</span>
          </div>
          <div class="model-btn" data-model="grammarly" onclick="AIGrammar.selectModel('grammarly')">
            <span class="model-icon"></span>
            <span class="model-name">Grammarly AI</span>
          </div>
        </div>

        <div class="grammar-grid">
          <div class="grammar-panel">
            <div class="section-title">텍스트 입력</div>
            <textarea id="inputText" class="tool-input grammar-textarea" placeholder="문법을 검사할 텍스트를 입력하세요...

예시:
- 영어: 'I has a apple.'
- 한국어: '저는 학교을 갔습니다.'"></textarea>
          </div>
          <div class="grammar-panel">
            <div class="section-title">교정 결과</div>
            <div class="output-area" id="outputArea">
              <div class="output-placeholder">문법 검사 결과가 여기에 표시됩니다.</div>
              <div class="loading-indicator" id="loadingIndicator">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span style="margin-left: 0.5rem;">검사 중...</span>
              </div>
            </div>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-value error" id="errorCount">0</div>
            <div class="stat-label">오류</div>
          </div>
          <div class="stat-box">
            <div class="stat-value warning" id="warningCount">0</div>
            <div class="stat-label">주의</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="suggestionCount" style="color: #3b82f6;">0</div>
            <div class="stat-label">제안</div>
          </div>
          <div class="stat-box">
            <div class="stat-value good" id="scoreValue">-</div>
            <div class="stat-label">점수</div>
          </div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="AIGrammar.check()" aria-label="문법 검사">
            문법 검사
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="AIGrammar.applyCorrected()" aria-label="수정 적용">
            수정 적용
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="AIGrammar.copy()" aria-label="복사">
            복사
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ai-grammar.js"></script>
</body>
</html>
