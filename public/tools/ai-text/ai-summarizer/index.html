<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 요약 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 1000px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .model-icon { font-size: 1.2rem; }
    .model-info { display: flex; flex-direction: column; }
    .model-name { font-weight: 600; }
    .model-desc { font-size: 0.7rem; color: var(--text-secondary); }
    .options-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .option-group { flex: 1; }
    .option-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .length-chips { display: flex; gap: 0.5rem; }
    .length-chip { flex: 1; padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; font-size: 0.85rem; transition: all 0.2s; }
    .length-chip:hover { border-color: var(--primary); }
    .length-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .summary-panel { display: flex; flex-direction: column; }
    .summary-textarea { flex: 1; min-height: 300px; resize: none; }
    .output-area { flex: 1; min-height: 300px; background: var(--bg-primary); border-radius: 10px; padding: 1rem; overflow-y: auto; }
    .output-placeholder { color: var(--text-secondary); text-align: center; padding-top: 100px; }
    .summary-stats { display: flex; gap: 1rem; margin-top: 1rem; }
    .stat-box { flex: 1; background: var(--bg-primary); border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    .key-points { margin-top: 1rem; }
    .key-point { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border-color); }
    .key-point:last-child { border-bottom: none; }
    .point-bullet { color: var(--primary); font-weight: 700; }
    .loading-indicator { display: none; align-items: center; justify-content: center; gap: 0.5rem; padding: 2rem; color: var(--text-secondary); }
    .loading-indicator.active { display: flex; }
    .typing-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    @media (max-width: 800px) { .summary-grid { grid-template-columns: 1fr; } .options-row { flex-direction: column; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 요약</h1>
          <p class="tool-description">긴 글을 핵심만 간결하게 요약</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="gpt-4o-mini" onclick="AISummarizer.selectModel('gpt-4o-mini')">
            <span class="model-icon"></span>
            <div class="model-info">
              <span class="model-name">GPT-4o Mini</span>
              <span class="model-desc">빠르고 경제적</span>
            </div>
          </div>
          <div class="model-btn" data-model="claude-3-haiku" onclick="AISummarizer.selectModel('claude-3-haiku')">
            <span class="model-icon"></span>
            <div class="model-info">
              <span class="model-name">Claude 3 Haiku</span>
              <span class="model-desc">초고속 요약</span>
            </div>
          </div>
          <div class="model-btn" data-model="gemini-2-flash" onclick="AISummarizer.selectModel('gemini-2-flash')">
            <span class="model-icon"></span>
            <div class="model-info">
              <span class="model-name">Gemini 2.0 Flash</span>
              <span class="model-desc">균형잡힌 성능</span>
            </div>
          </div>
        </div>

        <div class="options-row">
          <div class="option-group">
            <label class="option-label">요약 길이</label>
            <div class="length-chips">
              <div class="length-chip" data-length="short" onclick="AISummarizer.selectLength('short')">짧게</div>
              <div class="length-chip active" data-length="medium" onclick="AISummarizer.selectLength('medium')">보통</div>
              <div class="length-chip" data-length="long" onclick="AISummarizer.selectLength('long')">상세</div>
            </div>
          </div>
          <div class="option-group">
            <label class="option-label">요약 형식</label>
            <div class="length-chips">
              <div class="length-chip active" data-format="paragraph" onclick="AISummarizer.selectFormat('paragraph')">문단</div>
              <div class="length-chip" data-format="bullets" onclick="AISummarizer.selectFormat('bullets')">글머리</div>
              <div class="length-chip" data-format="keypoints" onclick="AISummarizer.selectFormat('keypoints')">핵심</div>
            </div>
          </div>
        </div>

        <div class="summary-grid">
          <div class="summary-panel">
            <div class="section-title">원문 입력</div>
            <textarea id="inputText" class="tool-input summary-textarea" placeholder="요약할 텍스트를 붙여넣으세요...

뉴스 기사, 논문, 보고서, 이메일 등 어떤 글이든 요약할 수 있습니다."></textarea>
          </div>
          <div class="summary-panel">
            <div class="section-title">요약 결과</div>
            <div class="output-area" id="outputArea">
              <div class="output-placeholder">요약 결과가 여기에 표시됩니다.</div>
              <div class="loading-indicator" id="loadingIndicator">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span style="margin-left: 0.5rem;">요약 중...</span>
              </div>
            </div>
          </div>
        </div>

        <div class="summary-stats">
          <div class="stat-box">
            <div class="stat-value" id="originalWords">0</div>
            <div class="stat-label">원문 단어</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="summaryWords">0</div>
            <div class="stat-label">요약 단어</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="compressionRate">0%</div>
            <div class="stat-label">압축률</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="timeSaved">0분</div>
            <div class="stat-label">절약 시간</div>
          </div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="AISummarizer.summarize()" aria-label="요약하기">
            요약하기
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="AISummarizer.copy()" aria-label="복사">
            복사
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ai-summarizer.js"></script>
</body>
</html>
