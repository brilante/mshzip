<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 재작성 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 1000px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .model-icon { font-size: 1.2rem; }
    .model-name { font-weight: 600; }
    .style-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .style-btn { padding: 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; transition: all 0.2s; }
    .style-btn:hover { border-color: var(--primary); }
    .style-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .style-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .style-name { font-size: 0.85rem; font-weight: 600; }
    .style-desc { font-size: 0.7rem; color: var(--text-secondary); }
    .rewrite-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .rewrite-panel { display: flex; flex-direction: column; }
    .rewrite-textarea { flex: 1; min-height: 250px; resize: none; }
    .output-area { flex: 1; min-height: 250px; background: var(--bg-primary); border-radius: 10px; padding: 1rem; overflow-y: auto; white-space: pre-wrap; line-height: 1.8; }
    .output-placeholder { color: var(--text-secondary); text-align: center; padding-top: 80px; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    .loading-indicator { display: none; align-items: center; justify-content: center; gap: 0.5rem; padding: 2rem; color: var(--text-secondary); }
    .loading-indicator.active { display: flex; }
    .typing-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    @media (max-width: 800px) { .rewrite-grid { grid-template-columns: 1fr; } .style-grid { grid-template-columns: repeat(2, 1fr); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 재작성</h1>
          <p class="tool-description">글을 다른 스타일로 다시 작성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="gpt-4o-mini" onclick="AIRewriter.selectModel('gpt-4o-mini')">
            <span class="model-icon"></span>
            <span class="model-name">GPT-4o Mini</span>
          </div>
          <div class="model-btn" data-model="claude-3-haiku" onclick="AIRewriter.selectModel('claude-3-haiku')">
            <span class="model-icon"></span>
            <span class="model-name">Claude 3 Haiku</span>
          </div>
          <div class="model-btn" data-model="gemini-2-flash" onclick="AIRewriter.selectModel('gemini-2-flash')">
            <span class="model-icon"></span>
            <span class="model-name">Gemini 2.0 Flash</span>
          </div>
        </div>

        <div class="section-title">재작성 스타일</div>
        <div class="style-grid">
          <div class="style-btn active" data-style="formal" onclick="AIRewriter.selectStyle('formal')">
            <div class="style-icon"></div>
            <div class="style-name">격식체</div>
            <div class="style-desc">공식적이고 정중한</div>
          </div>
          <div class="style-btn" data-style="casual" onclick="AIRewriter.selectStyle('casual')">
            <div class="style-icon"></div>
            <div class="style-name">캐주얼</div>
            <div class="style-desc">편안하고 친근한</div>
          </div>
          <div class="style-btn" data-style="simple" onclick="AIRewriter.selectStyle('simple')">
            <div class="style-icon"></div>
            <div class="style-name">간결하게</div>
            <div class="style-desc">짧고 명확한</div>
          </div>
          <div class="style-btn" data-style="detailed" onclick="AIRewriter.selectStyle('detailed')">
            <div class="style-icon"></div>
            <div class="style-name">상세하게</div>
            <div class="style-desc">풍부한 설명</div>
          </div>
          <div class="style-btn" data-style="creative" onclick="AIRewriter.selectStyle('creative')">
            <div class="style-icon"></div>
            <div class="style-name">창의적</div>
            <div class="style-desc">독창적인 표현</div>
          </div>
          <div class="style-btn" data-style="academic" onclick="AIRewriter.selectStyle('academic')">
            <div class="style-icon"></div>
            <div class="style-name">학술적</div>
            <div class="style-desc">논문/보고서 스타일</div>
          </div>
          <div class="style-btn" data-style="seo" onclick="AIRewriter.selectStyle('seo')">
            <div class="style-icon"></div>
            <div class="style-name">SEO 최적화</div>
            <div class="style-desc">검색엔진 친화적</div>
          </div>
          <div class="style-btn" data-style="emotional" onclick="AIRewriter.selectStyle('emotional')">
            <div class="style-icon"></div>
            <div class="style-name">감성적</div>
            <div class="style-desc">감정을 담은</div>
          </div>
        </div>

        <div class="rewrite-grid">
          <div class="rewrite-panel">
            <div class="section-title">원문</div>
            <textarea id="inputText" class="tool-input rewrite-textarea" placeholder="재작성할 텍스트를 입력하세요..."></textarea>
          </div>
          <div class="rewrite-panel">
            <div class="section-title">재작성 결과</div>
            <div class="output-area" id="outputArea">
              <div class="output-placeholder">재작성된 텍스트가 여기에 표시됩니다.</div>
              <div class="loading-indicator" id="loadingIndicator">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span style="margin-left: 0.5rem;">재작성 중...</span>
              </div>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="AIRewriter.rewrite()" aria-label="재작성하기">
            재작성하기
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="AIRewriter.copy()" aria-label="복사">
            복사
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ai-rewriter.js"></script>
</body>
</html>
