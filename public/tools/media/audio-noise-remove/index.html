<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오디오 노이즈 제거 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .noise-container { max-width: 700px; margin: 0 auto; }
    .noise-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-zone:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
    .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
    .file-info { background: var(--bg-primary); border-radius: 10px; padding: 1.5rem; margin-top: 1rem; display: none; }
    .waveform { height: 80px; background: #1a1a2e; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 2px; margin: 1rem 0; }
    .waveform-bar { width: 3px; background: var(--primary); border-radius: 2px; animation: wave 1s ease-in-out infinite; }
    @keyframes wave { 0%, 100% { height: 20%; } 50% { height: 80%; } }
    .options-panel { background: var(--bg-primary); border-radius: 10px; padding: 1.5rem; margin-top: 1rem; display: none; }
    .slider-container { margin-bottom: 1rem; }
    .slider-label { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .slider-name { font-size: 0.9rem; }
    .slider-value { font-weight: 600; color: var(--primary); }
    .noise-slider { width: 100%; height: 8px; border-radius: 4px; background: var(--bg-secondary); -webkit-appearance: none; }
    .noise-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: var(--primary); border-radius: 50%; cursor: pointer; }
    .preset-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .preset-btn { padding: 0.5rem 1rem; border: 2px solid var(--border-color); border-radius: 8px; background: var(--bg-secondary); cursor: pointer; font-size: 0.85rem; }
    .preset-btn:hover { border-color: var(--primary); }
    .progress-container { margin: 1rem 0; display: none; }
    .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #8b5cf6); transition: width 0.3s; }
    .server-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1.5rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">오디오 노이즈 제거</h1>
          <p class="tool-description">배경 소음 제거</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="noise-container">
      <div class="noise-panel">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon"></div>
          <p>오디오 파일을 드래그하거나 클릭하여 선택</p>
          <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">
            MP3, WAV, M4A, AAC
          </p>
        </div>
        <input type="file" id="fileInput" accept="audio/*" style="display: none;" onchange="AudioNoiseRemove.handleFile(this.files[0])">

        <div class="file-info" id="fileInfo">
          <div style="display: flex; align-items: center; gap: 1rem;">
            <span style="font-size: 2rem;"></span>
            <div style="flex: 1;">
              <div style="font-weight: 600;" id="fileName">-</div>
              <div style="font-size: 0.85rem; color: var(--text-secondary);" id="fileMeta">-</div>
            </div>
            <button class="tool-btn tool-btn-secondary" onclick="AudioNoiseRemove.clear()" aria-label=""></button>
          </div>
          <div class="waveform" id="waveform"></div>
        </div>

        <div class="options-panel" id="optionsPanel">
          <div class="section-title">노이즈 제거 설정</div>

          <div class="slider-container">
            <div class="slider-label">
              <span class="slider-name">노이즈 감소 강도</span>
              <span class="slider-value" id="reductionValue">50%</span>
            </div>
            <input type="range" class="noise-slider" id="reductionSlider" min="0" max="100" value="50" oninput="AudioNoiseRemove.updateSlider('reduction', this.value)">
          </div>

          <div class="slider-container">
            <div class="slider-label">
              <span class="slider-name">민감도</span>
              <span class="slider-value" id="sensitivityValue">30%</span>
            </div>
            <input type="range" class="noise-slider" id="sensitivitySlider" min="0" max="100" value="30" oninput="AudioNoiseRemove.updateSlider('sensitivity', this.value)">
          </div>

          <div class="preset-btns">
            <button class="preset-btn" onclick="AudioNoiseRemove.applyPreset('light')" aria-label="가벼운 노이즈">가벼운 노이즈</button>
            <button class="preset-btn" onclick="AudioNoiseRemove.applyPreset('moderate')" aria-label="보통 노이즈">보통 노이즈</button>
            <button class="preset-btn" onclick="AudioNoiseRemove.applyPreset('heavy')" aria-label="강한 노이즈">강한 노이즈</button>
          </div>
        </div>

        <div class="progress-container" id="progressContainer">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1rem; display: none;" id="processBtn" onclick="AudioNoiseRemove.process()" aria-label="노이즈 제거">
          노이즈 제거
        </button>

        <div class="server-notice">
          <strong>데모 모드</strong><br>
          실제 오디오 노이즈 제거는 서버 측 AI 처리가 필요합니다. 현재 시뮬레이션 모드로 작동합니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="audio-noise-remove.js"></script>
</body>
</html>
