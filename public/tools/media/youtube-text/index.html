<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 텍스트 추출 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260117">
  <style>
    .extractor-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .input-panel, .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; min-height: 450px; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }

    /* URL 입력 영역 */
    .url-input-area { margin-bottom: 1.5rem; }
    .url-input-wrapper { display: flex; gap: 0.5rem; }
    .url-input { flex: 1; padding: 0.75rem 1rem; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; }
    .url-input:focus { outline: none; border-color: var(--primary); }
    .paste-btn { padding: 0.75rem 1rem; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .paste-btn:hover { background: var(--primary); color: white; }

    /* 옵션 영역 */
    .options-section { padding-top: 1.5rem; border-top: 1px solid var(--border-color); }
    .option-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .option-label { font-size: 0.9rem; color: var(--text-secondary); }

    /* 진행 상태 */
    .progress-section { margin-top: 1.5rem; display: none; }
    .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #6366f1); transition: width 0.3s; }
    .progress-text { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; text-align: center; }

    /* 결과 패널 */
    .result-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); }
    .result-icon { font-size: 4rem; margin-bottom: 1rem; }
    .result-message { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-primary); }
    .result-detail { font-size: 0.9rem; }

    /* 텍스트 결과 */
    .text-result { display: none; height: 100%; flex-direction: column; }
    .text-result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .text-result-content { flex: 1; background: var(--bg-primary); border-radius: 10px; padding: 1rem; overflow-y: auto; max-height: 350px; white-space: pre-wrap; font-family: 'Noto Sans KR', sans-serif; line-height: 1.8; }
    .text-result-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

    /* 비디오 정보 */
    .video-info { background: var(--bg-tertiary); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; display: none; }
    .video-info-header { display: flex; gap: 1rem; align-items: flex-start; }
    .video-thumbnail { width: 120px; height: 68px; object-fit: cover; border-radius: 8px; background: var(--bg-primary); }
    .video-details { flex: 1; }
    .video-title { font-weight: 600; margin-bottom: 0.25rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .video-channel { font-size: 0.85rem; color: var(--text-secondary); }

    /* 프리미엄 뱃지 */
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1f2937; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-left: 0.5rem; }

    /* 서버 안내 */
    .server-notice { background: linear-gradient(135deg, #ddd6fe, #c4b5fd); color: #5b21b6; padding: 1rem; border-radius: 10px; margin-top: 1rem; font-size: 0.9rem; }
    .server-notice strong { display: block; margin-bottom: 0.25rem; }

    @media (max-width: 900px) { .extractor-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* 버튼 로딩 상태 */
  .extract-btn-loading {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    opacity: 0.7;
    pointer-events: none;
  }
  .btn-spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    flex-shrink: 0;
  }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container" data-tool-id="youtube-text">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">YouTube 텍스트 추출 <span class="premium-badge">PRO</span></h1>
          <p class="tool-description">로컬 Whisper AI로 유튜브 영상 텍스트 추출</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="extractor-layout">
      <div class="input-panel">
        <div class="section-title">YouTube 영상 URL</div>

        <div class="url-input-area">
          <div class="url-input-wrapper">
            <input type="text" id="youtubeUrl" class="url-input" placeholder="https://www.youtube.com/watch?v=..." / aria-label="https://www.youtube.com/watch?v=...">
            <button class="paste-btn" onclick="pasteUrl()" aria-label="붙여넣기">붙여넣기</button>
          </div>
        </div>

        <div class="video-info" id="videoInfo">
          <div class="video-info-header">
            <img id="videoThumbnail" class="video-thumbnail" src="" alt="영상 썸네일">
            <div class="video-details">
              <div class="video-title" id="videoTitle">-</div>
              <div class="video-channel" id="videoChannel">-</div>
            </div>
          </div>
        </div>

        <div class="options-section">
          <div class="section-title">추출 옵션</div>
          <div class="option-row">
            <span class="option-label">추출 방식</span>
            <select id="extractMethod" class="tool-input" style="width: 150px;">
              <option value="auto">자동 감지</option>
              <option value="subtitle">자막 추출</option>
              <option value="whisper">Whisper AI (GPU)</option>
            </select>
          </div>
          <div class="option-row">
            <span class="option-label">출력 언어</span>
            <select id="outputLanguage" class="tool-input" style="width: 150px;">
              <option value="ko">한국어</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
              <option value="auto">자동 감지</option>
            </select>
          </div>
          <div class="option-row">
            <span class="option-label">타임스탬프 포함</span>
            <select id="includeTimestamp" class="tool-input" style="width: 150px;">
              <option value="no">포함 안함</option>
              <option value="yes">포함</option>
            </select>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1.5rem;" id="extractBtn" disabled onclick="extract()" aria-label="텍스트 추출 시작">
          텍스트 추출 시작
        </button>

        <div class="progress-section" id="progressSection">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
          <div class="progress-text" id="progressText">준비 중...</div>
        </div>

        <div class="server-notice">
          <strong>프리미엄 기능</strong>
          로컬 Whisper AI를 사용하여 영상 음성을 텍스트로 변환합니다. GPU 가속을 지원하며 높은 정확도를 제공합니다.
        </div>
      </div>

      <div class="result-panel">
        <div class="section-title">추출 결과</div>

        <div class="result-placeholder" id="resultPlaceholder">
          <div class="result-icon"></div>
          <div class="result-message">YouTube URL을 입력하세요</div>
          <div class="result-detail">영상의 음성을 텍스트로 변환합니다</div>
        </div>

        <div class="text-result" id="textResult">
          <div class="text-result-header">
            <span id="resultInfo">추출된 텍스트</span>
            <span id="charCount">0자</span>
          </div>
          <div class="text-result-content" id="resultContent"></div>
          <div class="text-result-actions">
            <button class="tool-btn tool-btn-secondary" onclick="copyText()" aria-label="복사">복사</button>
            <button class="tool-btn tool-btn-secondary" onclick="downloadText('txt')" aria-label="TXT 다운로드">TXT 다운로드</button>
            <button class="tool-btn tool-btn-secondary" onclick="downloadText('srt')" aria-label="SRT 다운로드">SRT 다운로드</button>
            <button class="tool-btn tool-btn-primary" onclick="createNode()" id="createNodeBtn" aria-label="노드생성">노드생성</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tool-base.js?v=20260223"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
  <script src="youtube-text.js?v=20260223"></script>
</body>
</html>
