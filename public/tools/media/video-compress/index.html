<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비디오 압축 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .compress-container { max-width: 800px; margin: 0 auto; }
    .compress-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-zone:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
    .upload-zone.dragover { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
    .file-info { background: var(--bg-primary); border-radius: 10px; padding: 1.5rem; margin-top: 1rem; display: none; }
    .file-details { display: flex; gap: 1rem; align-items: center; }
    .file-icon { font-size: 2.5rem; }
    .file-meta { flex: 1; }
    .file-name { font-weight: 600; margin-bottom: 0.25rem; }
    .file-size { font-size: 0.85rem; color: var(--text-secondary); }
    .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1rem; }
    .option-card { background: var(--bg-primary); border-radius: 10px; padding: 1rem; }
    .option-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .compression-preview { background: var(--bg-primary); border-radius: 10px; padding: 1rem; margin-top: 1rem; display: none; }
    .preview-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .preview-label { color: var(--text-secondary); }
    .preview-value { font-weight: 600; }
    .preview-savings { color: #22c55e; font-weight: 700; }
    .progress-container { margin: 1rem 0; display: none; }
    .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #8b5cf6); transition: width 0.3s; }
    .progress-text { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; text-align: center; }
    .server-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1.5rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">비디오 압축</h1>
          <p class="tool-description">비디오 파일 크기 줄이기</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="compress-container">
      <div class="compress-panel">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon"></div>
          <p>비디오 파일을 드래그하거나 클릭하여 선택</p>
          <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">
            MP4, MOV, AVI, MKV (최대 500MB)
          </p>
        </div>
        <input type="file" id="fileInput" accept="video/*" style="display: none;" onchange="VideoCompress.handleFile(this.files[0])">

        <div class="file-info" id="fileInfo">
          <div class="file-details">
            <div class="file-icon"></div>
            <div class="file-meta">
              <div class="file-name" id="fileName">-</div>
              <div class="file-size" id="fileSize">-</div>
            </div>
            <button class="tool-btn tool-btn-secondary" onclick="VideoCompress.clear()" aria-label=""></button>
          </div>
        </div>

        <div class="options-grid" id="optionsGrid" style="display: none;">
          <div class="option-card">
            <div class="option-label">압축 수준</div>
            <select id="compressionLevel" class="tool-input" onchange="VideoCompress.updatePreview()">
              <option value="low">낮음 (고품질)</option>
              <option value="medium" selected>보통 (권장)</option>
              <option value="high">높음 (소용량)</option>
            </select>
          </div>
          <div class="option-card">
            <div class="option-label">출력 해상도</div>
            <select id="resolution" class="tool-input" onchange="VideoCompress.updatePreview()">
              <option value="original">원본 유지</option>
              <option value="1080">1080p</option>
              <option value="720">720p</option>
              <option value="480">480p</option>
            </select>
          </div>
        </div>

        <div class="compression-preview" id="compressionPreview">
          <div class="preview-row">
            <span class="preview-label">원본 크기</span>
            <span class="preview-value" id="originalSize">-</span>
          </div>
          <div class="preview-row">
            <span class="preview-label">예상 크기</span>
            <span class="preview-value" id="estimatedSize">-</span>
          </div>
          <div class="preview-row">
            <span class="preview-label">절약</span>
            <span class="preview-value preview-savings" id="savings">-</span>
          </div>
        </div>

        <div class="progress-container" id="progressContainer">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
          </div>
          <div class="progress-text" id="progressText">압축 중...</div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1rem; display: none;" id="compressBtn" onclick="VideoCompress.compress()" aria-label="압축 시작">
          압축 시작
        </button>

        <div class="server-notice">
          <strong>데모 모드</strong><br>
          실제 비디오 압축은 서버 측 처리가 필요합니다. 현재 시뮬레이션 모드로 작동합니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="video-compress.js"></script>
</body>
</html>
