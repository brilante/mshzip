<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비디오 자르기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .trim-container { max-width: 800px; margin: 0 auto; }
    .trim-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-zone:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
    .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
    .video-preview { background: #000; border-radius: 10px; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; color: #666; margin-top: 1rem; display: none; }
    .timeline-container { background: var(--bg-primary); border-radius: 10px; padding: 1.5rem; margin-top: 1rem; display: none; }
    .timeline-bar { height: 40px; background: #333; border-radius: 8px; position: relative; cursor: pointer; }
    .timeline-selection { position: absolute; top: 0; height: 100%; background: rgba(59, 130, 246, 0.5); border-radius: 8px; }
    .timeline-handle { position: absolute; top: -5px; width: 10px; height: 50px; background: var(--primary); border-radius: 4px; cursor: ew-resize; }
    .handle-start { left: 0; }
    .handle-end { right: 0; }
    .time-inputs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; margin-top: 1rem; }
    .time-input-group { text-align: center; }
    .time-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .time-display { font-size: 1.25rem; font-weight: 600; font-family: monospace; }
    .duration-info { text-align: center; padding: 1rem; background: var(--bg-secondary); border-radius: 8px; margin-top: 1rem; }
    .duration-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .progress-container { margin: 1rem 0; display: none; }
    .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #8b5cf6); transition: width 0.3s; }
    .server-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1.5rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">비디오 자르기</h1>
          <p class="tool-description">원하는 구간만 추출</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="trim-container">
      <div class="trim-panel">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon"></div>
          <p>비디오 파일을 드래그하거나 클릭하여 선택</p>
        </div>
        <input type="file" id="fileInput" accept="video/*" style="display: none;" onchange="VideoTrim.handleFile(this.files[0])">

        <div class="video-preview" id="videoPreview">미리보기</div>

        <div class="timeline-container" id="timelineContainer">
          <div class="section-title">구간 선택</div>
          <div class="timeline-bar" id="timelineBar">
            <div class="timeline-selection" id="selection" style="left: 0%; width: 100%;"></div>
            <div class="timeline-handle handle-start" id="handleStart"></div>
            <div class="timeline-handle handle-end" id="handleEnd" style="left: calc(100% - 10px);"></div>
          </div>

          <div class="time-inputs">
            <div class="time-input-group">
              <div class="time-label">시작 시간</div>
              <div class="time-display" id="startTime">00:00</div>
            </div>
            <div style="font-size: 1.5rem; color: var(--text-secondary);">→</div>
            <div class="time-input-group">
              <div class="time-label">종료 시간</div>
              <div class="time-display" id="endTime">00:00</div>
            </div>
          </div>

          <div class="duration-info">
            <div style="font-size: 0.85rem; color: var(--text-secondary);">선택된 구간</div>
            <div class="duration-value" id="selectedDuration">00:00</div>
          </div>
        </div>

        <div class="progress-container" id="progressContainer">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1rem; display: none;" id="trimBtn" onclick="VideoTrim.trim()" aria-label="구간 자르기">
          구간 자르기
        </button>

        <div class="server-notice">
          <strong>데모 모드</strong><br>
          실제 비디오 자르기는 서버 측 처리가 필요합니다. 현재 시뮬레이션 모드로 작동합니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="video-trim.js"></script>
</body>
</html>
