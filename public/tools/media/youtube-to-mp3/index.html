<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube to MP3 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .converter-container { max-width: 700px; margin: 0 auto; }
    .converter-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .youtube-icon { font-size: 3rem; text-align: center; margin-bottom: 1rem; }
    .result-box { background: var(--bg-primary); border-radius: 10px; padding: 1.5rem; margin-top: 1.5rem; display: none; }
    .video-info { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .video-thumb { width: 160px; height: 90px; background: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #666; }
    .video-details { flex: 1; }
    .video-title { font-weight: 600; margin-bottom: 0.5rem; }
    .video-meta { font-size: 0.85rem; color: var(--text-secondary); }
    .quality-options { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
    .quality-btn { padding: 0.5rem 1rem; border: 2px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); cursor: pointer; }
    .quality-btn:hover, .quality-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .progress-container { margin: 1rem 0; display: none; }
    .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #ef4444, #f97316); transition: width 0.3s; }
    .progress-text { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; text-align: center; }
    .server-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1.5rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">YouTube to MP3</h1>
          <p class="tool-description">YouTube 영상에서 오디오 추출</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="converter-container">
      <div class="converter-panel">
        <div class="youtube-icon"></div>
        <div class="section-title">YouTube URL 입력</div>
        <div style="display: flex; gap: 0.5rem;">
          <input type="text" id="urlInput" class="tool-input" placeholder="https://www.youtube.com/watch?v=..." style="flex: 1;" aria-label="https://www.youtube.com/watch?v=...">
          <button class="tool-btn tool-btn-primary" onclick="YoutubeToMp3.analyze()" aria-label="분석">분석</button>
        </div>

        <div class="result-box" id="resultBox">
          <div class="video-info">
            <div class="video-thumb" id="videoThumb">썸네일</div>
            <div class="video-details">
              <div class="video-title" id="videoTitle">-</div>
              <div class="video-meta" id="videoMeta">-</div>
            </div>
          </div>

          <div class="section-title">음질 선택</div>
          <div class="quality-options" id="qualityOptions">
            <button class="quality-btn active" data-quality="320" aria-label="320kbps">320kbps</button>
            <button class="quality-btn" data-quality="256" aria-label="256kbps">256kbps</button>
            <button class="quality-btn" data-quality="192" aria-label="192kbps">192kbps</button>
            <button class="quality-btn" data-quality="128" aria-label="128kbps">128kbps</button>
          </div>

          <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <div class="progress-text" id="progressText">변환 중...</div>
          </div>

          <button class="tool-btn tool-btn-primary" style="width: 100%;" id="convertBtn" onclick="YoutubeToMp3.convert()" aria-label="MP3 변환">
            MP3 변환
          </button>
        </div>

        <div class="server-notice">
          <strong>데모 모드</strong><br>
          실제 YouTube 변환은 서버 측 처리가 필요합니다. 현재 시뮬레이션 모드로 작동합니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="youtube-to-mp3.js"></script>
</body>
</html>
