<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 색상 생성기 - JEOGI Tools</title>
  <link rel="stylesheet" href="random-color.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>랜덤 색상 생성기</h1>
      <p class="subtitle">다양한 형식의 무작위 색상을 생성합니다</p>
    </header>

    <main class="main-content">
      <section class="color-display" id="colorDisplay">
        <div class="color-preview" id="colorPreview"></div>
        <div class="color-info">
          <div class="color-value" id="hexValue">#FFFFFF</div>
          <div class="color-formats">
            <span id="rgbValue">RGB(255, 255, 255)</span>
            <span id="hslValue">HSL(0, 0%, 100%)</span>
          </div>
        </div>
      </section>

      <section class="options-section">
        <div class="color-mode">
          <button class="mode-btn active" data-mode="any" aria-label="모든 색상">모든 색상</button>
          <button class="mode-btn" data-mode="pastel" aria-label="파스텔">파스텔</button>
          <button class="mode-btn" data-mode="vibrant" aria-label="비비드">비비드</button>
          <button class="mode-btn" data-mode="dark" aria-label="다크">다크</button>
          <button class="mode-btn" data-mode="light" aria-label="라이트">라이트</button>
        </div>

        <button class="generate-btn" id="generateBtn">
          <span></span> 색상 생성
        </button>
        <p class="hint">Space 키를 눌러도 생성됩니다</p>
      </section>

      <section class="palette-section">
        <h3>팔레트 생성</h3>
        <div class="palette-options">
          <button class="palette-btn" data-type="complementary" aria-label="보색">보색</button>
          <button class="palette-btn" data-type="analogous" aria-label="유사색">유사색</button>
          <button class="palette-btn" data-type="triadic" aria-label="삼각배색">삼각배색</button>
          <button class="palette-btn" data-type="random" aria-label="랜덤 5색">랜덤 5색</button>
        </div>
        <div class="palette-display" id="paletteDisplay"></div>
      </section>

      <section class="history-section">
        <h3>최근 색상</h3>
        <div class="color-history" id="colorHistory"></div>
      </section>
    </main>
  </div>

  <script src="random-color.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
