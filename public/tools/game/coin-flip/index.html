<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동전 던지기 - JEOGI Tools</title>
  <link rel="stylesheet" href="coin-flip.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>동전 던지기</h1>
      <p class="subtitle">앞면 또는 뒷면 - 결정하기 어려울 때!</p>
    </header>

    <main class="main-content">
      <section class="coin-section">
        <div class="coin" id="coin">
          <div class="coin-face coin-heads">앞</div>
          <div class="coin-face coin-tails">뒤</div>
        </div>

        <div class="result-text" id="resultText">동전을 던져보세요!</div>

        <button class="flip-btn" id="flipBtn">
          <span></span> 던지기!
        </button>
      </section>

      <section class="multi-flip">
        <h3>여러 개 던지기</h3>
        <div class="multi-controls">
          <input type="number" id="multiCount" value="10" min="2" max="100" />
          <button class="multi-btn" id="multiFlipBtn" aria-label="연속 던지기">연속 던지기</button>
        </div>
        <div class="multi-results" id="multiResults"></div>
      </section>

      <section class="stats-section">
        <h3>통계</h3>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon"></div>
            <div class="stat-label">앞면</div>
            <div class="stat-value" id="headsCount">0</div>
            <div class="stat-percent" id="headsPercent">0%</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"></div>
            <div class="stat-label">뒷면</div>
            <div class="stat-value" id="tailsCount">0</div>
            <div class="stat-percent" id="tailsPercent">0%</div>
          </div>
          <div class="stat-card total">
            <div class="stat-icon"></div>
            <div class="stat-label">총 횟수</div>
            <div class="stat-value" id="totalCount">0</div>
          </div>
        </div>
        <button class="reset-btn" id="resetBtn" aria-label="통계 초기화">통계 초기화</button>
      </section>

      <section class="streak-section">
        <h3>연속 기록</h3>
        <div class="streak-info">
          <div class="streak-item">
            <span class="streak-label">현재 연속</span>
            <span class="streak-value" id="currentStreak">0</span>
          </div>
          <div class="streak-item">
            <span class="streak-label">최고 기록</span>
            <span class="streak-value" id="bestStreak">0</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="coin-flip.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
