<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 이름 생성기 - JEOGI Tools</title>
  <link rel="stylesheet" href="random-name.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>랜덤 이름 생성기</h1>
      <p class="subtitle">한국어/영어 무작위 이름을 생성합니다</p>
    </header>

    <main class="main-content">
      <section class="options-section">
        <div class="language-selector">
          <button class="lang-btn active" data-lang="korean" aria-label="🇰🇷 한국어">🇰🇷 한국어</button>
          <button class="lang-btn" data-lang="english" aria-label="🇺🇸 영어">🇺🇸 영어</button>
          <button class="lang-btn" data-lang="japanese" aria-label="🇯🇵 일본어">🇯🇵 일본어</button>
        </div>

        <div class="gender-selector">
          <button class="gender-btn active" data-gender="all" aria-label="전체">전체</button>
          <button class="gender-btn" data-gender="male" aria-label="남성">남성</button>
          <button class="gender-btn" data-gender="female" aria-label="여성">여성</button>
        </div>

        <div class="count-selector">
          <label>생성 개수:</label>
          <input type="number" id="count" value="5" min="1" max="20" />
        </div>

        <button class="generate-btn" id="generateBtn">
          <span></span> 이름 생성
        </button>
      </section>

      <section class="results-section">
        <div class="results-header">
          <h3>생성된 이름</h3>
          <button class="copy-all-btn" id="copyAllBtn" aria-label="전체 복사">전체 복사</button>
        </div>
        <div class="name-list" id="nameList">
          <p class="placeholder">버튼을 눌러 이름을 생성하세요</p>
        </div>
      </section>

      <section class="favorites-section">
        <h3>즐겨찾기</h3>
        <div class="favorites-list" id="favoritesList"></div>
        <button class="clear-btn" id="clearFavBtn" style="display:none;" aria-label="즐겨찾기 삭제">즐겨찾기 삭제</button>
      </section>
    </main>
  </div>

  <script src="random-name.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
