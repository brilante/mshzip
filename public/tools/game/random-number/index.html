<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 숫자 생성기 - JEOGI Tools</title>
  <link rel="stylesheet" href="random-number.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>랜덤 숫자 생성기</h1>
      <p class="subtitle">범위를 지정하여 무작위 숫자를 생성합니다</p>
    </header>

    <main class="main-content">
      <section class="generator-section">
        <div class="range-inputs">
          <div class="input-group">
            <label for="minValue">최소값</label>
            <input type="number" id="minValue" value="1" />
          </div>
          <span class="range-separator">~</span>
          <div class="input-group">
            <label for="maxValue">최대값</label>
            <input type="number" id="maxValue" value="100" />
          </div>
        </div>

        <div class="options-row">
          <div class="input-group">
            <label for="count">생성 개수</label>
            <input type="number" id="count" value="1" min="1" max="100" />
          </div>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" id="allowDuplicates" checked />
              중복 허용
            </label>
          </div>
        </div>

        <button class="generate-btn" id="generateBtn">
          <span class="btn-icon"></span>
          숫자 생성
        </button>

        <div class="result-container" id="resultContainer">
          <div class="result-number" id="resultNumber">?</div>
          <div class="result-list" id="resultList"></div>
        </div>

        <div class="action-buttons">
          <button class="action-btn" id="copyBtn" disabled aria-label="복사">복사</button>
          <button class="action-btn" id="historyBtn" aria-label="히스토리">히스토리</button>
        </div>
      </section>

      <section class="history-section" id="historySection" style="display:none;">
        <h3>생성 기록</h3>
        <div class="history-list" id="historyList"></div>
        <button class="clear-btn" id="clearHistoryBtn" aria-label="기록 삭제">기록 삭제</button>
      </section>
    </main>
  </div>

  <script src="random-number.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
