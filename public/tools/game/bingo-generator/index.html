<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>빙고 생성기 - JEOGI Tools</title>
  <link rel="stylesheet" href="bingo-generator.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>빙고 생성기</h1>
      <p class="subtitle">나만의 빙고 카드를 만들어보세요</p>
    </header>

    <main class="main-content">
      <section class="settings-section">
        <div class="size-selector">
          <label>빙고판 크기:</label>
          <select id="gridSize">
            <option value="3">3x3</option>
            <option value="4">4x4</option>
            <option value="5" selected>5x5</option>
            <option value="6">6x6</option>
          </select>
        </div>

        <div class="mode-selector">
          <button class="mode-btn active" data-mode="numbers" aria-label="숫자 모드">숫자 모드</button>
          <button class="mode-btn" data-mode="custom" aria-label="커스텀 모드">커스텀 모드</button>
        </div>

        <div id="numbersOptions" class="mode-options">
          <div class="range-input">
            <label>범위:</label>
            <input type="number" id="minNum" value="1" min="0" /> ~
            <input type="number" id="maxNum" value="75" min="1" />
          </div>
        </div>

        <div id="customOptions" class="mode-options" style="display:none;">
          <textarea id="customItems" placeholder="항목 입력 (줄바꿈으로 구분)&#10;예:&#10;사과&#10;바나나&#10;오렌지"></textarea>
        </div>

        <div class="checkbox-options">
          <label>
            <input type="checkbox" id="freeCenter" checked />
            중앙 FREE 칸
          </label>
        </div>

        <button class="generate-btn" id="generateBtn">
          <span></span> 빙고 생성
        </button>
      </section>

      <section class="bingo-section">
        <div class="bingo-board" id="bingoBoard"></div>

        <div class="bingo-status" id="bingoStatus"></div>

        <div class="bingo-actions">
          <button id="resetBtn" aria-label="초기화">초기화</button>
          <button id="printBtn" aria-label="인쇄">인쇄</button>
          <button id="newCardBtn" aria-label="🆕 새 카드">🆕 새 카드</button>
        </div>
      </section>

      <section class="call-section" id="callSection" style="display:none;">
        <h3>숫자 호출</h3>
        <div class="called-number" id="calledNumber">-</div>
        <button class="call-btn" id="callBtn" aria-label="다음 숫자 호출">다음 숫자 호출</button>
        <div class="called-history" id="calledHistory"></div>
      </section>
    </main>
  </div>

  <script src="bingo-generator.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
