<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 도형 뷰어 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="3d-model-viewer.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">3D 도형 뷰어</h1>
      <p class="tool-description">기본 3D 도형을 와이어프레임으로 확인합니다</p>
    </header>

    <main class="tool-content">
      <div class="preview-section">
        <canvas id="canvas3d" width="600" height="400"></canvas>
        <div class="view-controls">
          <button class="view-btn" onclick="ModelViewer.resetView()" aria-label="리셋">리셋</button>
          <button class="view-btn" onclick="ModelViewer.toggleRotation()" aria-label="회전">회전</button>
        </div>
      </div>

      <div class="settings-section">
        <h3 class="section-title">도형 설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>도형 선택</label>
            <select id="shapeSelect" class="form-input" onchange="ModelViewer.changeShape()">
              <option value="cube">큐브</option>
              <option value="pyramid">피라미드</option>
              <option value="octahedron">팔면체</option>
              <option value="prism">삼각기둥</option>
            </select>
          </div>
          <div class="setting-item">
            <label>와이어프레임 색상</label>
            <input type="color" id="wireColor" class="color-input" value="#667eea" onchange="ModelViewer.render()">
          </div>
          <div class="setting-item">
            <label>배경 색상</label>
            <input type="color" id="bgColor" class="color-input" value="#1a1a2e" onchange="ModelViewer.render()">
          </div>
          <div class="setting-item">
            <label>크기</label>
            <input type="range" id="scale" class="range-input" min="50" max="200" value="100" oninput="ModelViewer.render()">
          </div>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="ModelViewer.exportImage()" aria-label="PNG 저장">PNG 저장</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="3d-model-viewer.js"></script>
</body>
</html>
