<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 큐브 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="3d-cube-gen.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">3D 큐브 생성기</h1>
      <p class="tool-description">CSS로 3D 큐브를 생성하고 커스터마이즈합니다</p>
    </header>

    <main class="tool-content">
      <div class="preview-section">
        <div class="scene" id="scene">
          <div class="cube" id="cube">
            <div class="face front">앞</div>
            <div class="face back">뒤</div>
            <div class="face right">오른쪽</div>
            <div class="face left">왼쪽</div>
            <div class="face top">위</div>
            <div class="face bottom">아래</div>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h3 class="section-title">큐브 설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>크기 (px)</label>
            <input type="range" id="cubeSize" class="range-input" min="80" max="250" value="150" oninput="Cube3D.update()">
            <span id="cubeSizeValue">150px</span>
          </div>
          <div class="setting-item">
            <label>X축 회전</label>
            <input type="range" id="rotateX" class="range-input" min="-180" max="180" value="-20" oninput="Cube3D.update()">
            <span id="rotateXValue">-20°</span>
          </div>
          <div class="setting-item">
            <label>Y축 회전</label>
            <input type="range" id="rotateY" class="range-input" min="-180" max="180" value="30" oninput="Cube3D.update()">
            <span id="rotateYValue">30°</span>
          </div>
          <div class="setting-item">
            <label>Z축 회전</label>
            <input type="range" id="rotateZ" class="range-input" min="-180" max="180" value="0" oninput="Cube3D.update()">
            <span id="rotateZValue">0°</span>
          </div>
        </div>
        <div class="color-grid">
          <div class="color-item"><label>앞</label><input type="color" id="colorFront" value="#667eea" onchange="Cube3D.update()"></div>
          <div class="color-item"><label>뒤</label><input type="color" id="colorBack" value="#764ba2" onchange="Cube3D.update()"></div>
          <div class="color-item"><label>오른쪽</label><input type="color" id="colorRight" value="#f093fb" onchange="Cube3D.update()"></div>
          <div class="color-item"><label>왼쪽</label><input type="color" id="colorLeft" value="#4facfe" onchange="Cube3D.update()"></div>
          <div class="color-item"><label>위</label><input type="color" id="colorTop" value="#43e97b" onchange="Cube3D.update()"></div>
          <div class="color-item"><label>아래</label><input type="color" id="colorBottom" value="#f5576c" onchange="Cube3D.update()"></div>
        </div>
        <div class="animation-control">
          <label><input type="checkbox" id="autoRotate" onchange="Cube3D.toggleAnimation()"> 자동 회전</label>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="Cube3D.copyCSS()" aria-label="CSS 복사">CSS 복사</button>
          <button class="export-btn" onclick="Cube3D.copyHTML()" aria-label="HTML 복사">HTML 복사</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="3d-cube-gen.js"></script>
</body>
</html>
