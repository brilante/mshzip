<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이소메트릭 그리드 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="isometric-gen.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">아이소메트릭 그리드 생성기</h1>
      <p class="tool-description">아이소메트릭 디자인용 그리드를 생성합니다</p>
    </header>

    <main class="tool-content">
      <div class="preview-section">
        <canvas id="isoCanvas" width="700" height="500"></canvas>
      </div>

      <div class="settings-section">
        <h3 class="section-title">그리드 설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>셀 크기 (px)</label>
            <input type="range" id="cellSize" class="range-input" min="20" max="80" value="40" oninput="IsometricGrid.render()">
            <span id="cellSizeValue">40px</span>
          </div>
          <div class="setting-item">
            <label>그리드 크기</label>
            <input type="range" id="gridSize" class="range-input" min="5" max="20" value="10" oninput="IsometricGrid.render()">
            <span id="gridSizeValue">10</span>
          </div>
          <div class="setting-item">
            <label>그리드 색상</label>
            <input type="color" id="gridColor" class="color-input" value="#667eea" onchange="IsometricGrid.render()">
          </div>
          <div class="setting-item">
            <label>배경 색상</label>
            <input type="color" id="bgColor" class="color-input" value="#ffffff" onchange="IsometricGrid.render()">
          </div>
          <div class="setting-item">
            <label>선 두께</label>
            <input type="range" id="lineWidth" class="range-input" min="0.5" max="3" step="0.5" value="1" oninput="IsometricGrid.render()">
            <span id="lineWidthValue">1</span>
          </div>
          <div class="setting-item">
            <label>투명도</label>
            <input type="range" id="opacity" class="range-input" min="0.1" max="1" step="0.1" value="0.5" oninput="IsometricGrid.render()">
            <span id="opacityValue">0.5</span>
          </div>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="IsometricGrid.exportPNG()" aria-label="PNG 저장">PNG 저장</button>
          <button class="export-btn secondary" onclick="IsometricGrid.exportSVG()" aria-label="SVG 저장">SVG 저장</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="isometric-gen.js"></script>
</body>
</html>
