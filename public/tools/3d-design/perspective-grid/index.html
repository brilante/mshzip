<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원근법 그리드 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="perspective-grid.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">원근법 그리드 생성기</h1>
      <p class="tool-description">1점, 2점 원근법 그리드를 생성합니다</p>
    </header>

    <main class="tool-content">
      <div class="preview-section">
        <canvas id="perspectiveCanvas" width="700" height="500"></canvas>
      </div>

      <div class="settings-section">
        <h3 class="section-title">그리드 설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>원근법 유형</label>
            <select id="perspectiveType" class="form-input" onchange="PerspectiveGrid.render()">
              <option value="1point">1점 원근법</option>
              <option value="2point">2점 원근법</option>
            </select>
          </div>
          <div class="setting-item">
            <label>선 개수</label>
            <input type="range" id="lineCount" class="range-input" min="5" max="30" value="15" oninput="PerspectiveGrid.render()">
            <span id="lineCountValue">15</span>
          </div>
          <div class="setting-item">
            <label>수평선 위치</label>
            <input type="range" id="horizonY" class="range-input" min="0.2" max="0.8" step="0.05" value="0.4" oninput="PerspectiveGrid.render()">
            <span id="horizonYValue">40%</span>
          </div>
          <div class="setting-item">
            <label>그리드 색상</label>
            <input type="color" id="gridColor" class="color-input" value="#3b82f6" onchange="PerspectiveGrid.render()">
          </div>
          <div class="setting-item">
            <label>배경 색상</label>
            <input type="color" id="bgColor" class="color-input" value="#ffffff" onchange="PerspectiveGrid.render()">
          </div>
          <div class="setting-item">
            <label>투명도</label>
            <input type="range" id="opacity" class="range-input" min="0.2" max="1" step="0.1" value="0.6" oninput="PerspectiveGrid.render()">
            <span id="opacityValue">0.6</span>
          </div>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="PerspectiveGrid.exportPNG()" aria-label="PNG 저장">PNG 저장</button>
          <button class="export-btn secondary" onclick="PerspectiveGrid.exportSVG()" aria-label="SVG 저장">SVG 저장</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="perspective-grid.js"></script>
</body>
</html>
