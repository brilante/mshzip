<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>음정 트레이너 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .trainer-display { text-align: center; padding: 2rem; }
    .play-btn { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 3rem; border: none; cursor: pointer; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
    .play-btn:hover { transform: scale(1.05); }
    .hint-text { color: var(--text-secondary); margin-top: 1rem; font-size: 0.9rem; }
    .answer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 1.5rem; }
    .answer-btn { padding: 1rem 0.5rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; transition: all 0.2s; }
    .answer-btn:hover { background: var(--primary); color: white; }
    .answer-btn.correct { background: #22c55e; color: white; }
    .answer-btn.wrong { background: #ef4444; color: white; }
    .score-display { display: flex; justify-content: center; gap: 2rem; margin-top: 1.5rem; }
    .score-item { text-align: center; }
    .score-value { font-size: 2rem; font-weight: 700; }
    .score-label { font-size: 0.85rem; color: var(--text-secondary); }
    .settings-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .settings-label { font-size: 0.85rem; color: var(--text-secondary); min-width: 80px; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">음정 트레이너</h1>
          <p class="tool-description">음정 청음 연습</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel trainer-display">
        <button class="play-btn" id="playBtn" onclick="IntervalTrainer.play()" aria-label=""></button>
        <div class="hint-text" id="hintText">버튼을 눌러 음정을 들어보세요</div>

        <div class="answer-grid" id="answerGrid"></div>

        <div class="score-display">
          <div class="score-item">
            <div class="score-value" id="correctCount" style="color: #22c55e;">0</div>
            <div class="score-label">정답</div>
          </div>
          <div class="score-item">
            <div class="score-value" id="totalCount">0</div>
            <div class="score-label">총 문제</div>
          </div>
          <div class="score-item">
            <div class="score-value" id="accuracy" style="color: var(--primary);">-</div>
            <div class="score-label">정확도</div>
          </div>
        </div>

        <button class="tool-btn tool-btn-secondary" onclick="IntervalTrainer.reset()" style="margin-top: 1rem;" aria-label="점수 리셋">점수 리셋</button>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">설정</h3>
        <div class="settings-row">
          <span class="settings-label">재생 방식:</span>
          <select id="playMode" class="tool-input" style="flex: 1;">
            <option value="harmonic">화성 (동시)</option>
            <option value="melodic-up">상행</option>
            <option value="melodic-down">하행</option>
          </select>
        </div>
        <div class="settings-row">
          <span class="settings-label">난이도:</span>
          <select id="difficulty" class="tool-input" style="flex: 1;" onchange="IntervalTrainer.setDifficulty()">
            <option value="easy">초급 (3도, 5도, 8도)</option>
            <option value="medium">중급 (2~6도)</option>
            <option value="hard">고급 (모든 음정)</option>
          </select>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">음정 가이드</h3>
        <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8;">
          <div>단2도: 반음 1개 (미파, 시도)</div>
          <div>장2도: 반음 2개 (온음)</div>
          <div>단3도: 반음 3개</div>
          <div>장3도: 반음 4개</div>
          <div>완전5도: 반음 7개</div>
          <div>완전8도: 반음 12개 (옥타브)</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="interval-trainer.js"></script>
</body>
</html>
