<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연습 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .timer-display { text-align: center; padding: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; color: white; margin: 1rem 0; }
    .timer-time { font-size: 4rem; font-weight: 700; font-family: 'Courier New', monospace; }
    .timer-label { font-size: 1rem; opacity: 0.9; margin-top: 0.5rem; }
    .session-info { font-size: 0.9rem; opacity: 0.8; margin-top: 0.25rem; }
    .control-row { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .ctrl-btn { padding: 1rem 2rem; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    .ctrl-btn.primary { background: white; color: #667eea; }
    .ctrl-btn.secondary { background: rgba(255,255,255,0.2); color: white; }
    .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 1rem; }
    .preset-btn { padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; text-align: center; }
    .preset-btn:hover { background: var(--primary); color: white; }
    .preset-btn.active { background: var(--primary); color: white; }
    .history-list { max-height: 200px; overflow-y: auto; }
    .history-item { display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .history-item:last-child { border-bottom: none; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; text-align: center; margin-top: 1rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .input-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    .input-row input { flex: 1; }
    .goal-progress { margin-top: 1rem; }
    .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">연습 타이머</h1>
          <p class="tool-description">악기 연습 시간 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="timer-display" id="timerDisplay">
        <div class="timer-time" id="timerTime">00:00:00</div>
        <div class="timer-label" id="timerLabel">연습을 시작하세요</div>
        <div class="session-info" id="sessionInfo">오늘 0분 연습</div>
        <div class="control-row">
          <button class="ctrl-btn primary" id="startBtn" onclick="PracticeTimer.toggle()" aria-label="시작">시작</button>
          <button class="ctrl-btn secondary" onclick="PracticeTimer.reset()" aria-label="↺ 리셋">↺ 리셋</button>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">목표 시간 설정</h3>
        <div class="input-row">
          <input type="number" id="goalMinutes" class="tool-input" value="30" min="5" max="180" step="5">
          <span>분</span>
          <button class="tool-btn tool-btn-primary" onclick="PracticeTimer.setGoal()" aria-label="설정">설정</button>
        </div>
        <div class="goal-progress">
          <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.25rem;">
            <span>진행률</span>
            <span id="goalPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
          </div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">빠른 설정</h3>
        <div class="preset-grid">
          <div class="preset-btn" onclick="PracticeTimer.setPreset(15)">15분</div>
          <div class="preset-btn active" onclick="PracticeTimer.setPreset(30)">30분</div>
          <div class="preset-btn" onclick="PracticeTimer.setPreset(45)">45분</div>
          <div class="preset-btn" onclick="PracticeTimer.setPreset(60)">1시간</div>
          <div class="preset-btn" onclick="PracticeTimer.setPreset(90)">1시간 30분</div>
          <div class="preset-btn" onclick="PracticeTimer.setPreset(120)">2시간</div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">통계</h3>
        <div class="stats-grid">
          <div>
            <div class="stat-value" id="todayTotal">0분</div>
            <div class="stat-label">오늘</div>
          </div>
          <div>
            <div class="stat-value" id="weekTotal">0분</div>
            <div class="stat-label">이번 주</div>
          </div>
          <div>
            <div class="stat-value" id="totalSessions">0회</div>
            <div class="stat-label">총 세션</div>
          </div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <h3 style="font-weight: 600;">연습 기록</h3>
          <button class="tool-btn tool-btn-secondary" onclick="PracticeTimer.clearHistory()" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" aria-label="초기화">초기화</button>
        </div>
        <div class="history-list" id="historyList">
          <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="practice-timer.js"></script>
</body>
</html>
