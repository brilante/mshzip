<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPM 탭 측정기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 450px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .tap-display { text-align: center; padding: 3rem 2rem; }
    .bpm-value { font-size: 6rem; font-weight: 700; font-family: monospace; line-height: 1; color: var(--primary); }
    .bpm-label { font-size: 1.5rem; color: var(--text-secondary); }
    .tap-area { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; padding: 4rem 2rem; cursor: pointer; user-select: none; transition: transform 0.1s; margin-top: 1.5rem; }
    .tap-area:active { transform: scale(0.98); }
    .tap-text { color: white; font-size: 1.5rem; font-weight: 600; }
    .tap-hint { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-top: 0.5rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1rem; }
    .stat-item { background: var(--bg-primary); border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 600; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .history-item { display: flex; justify-content: space-between; padding: 0.5rem; background: var(--bg-primary); border-radius: 6px; margin-top: 0.5rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">BPM 탭 측정기</h1>
          <p class="tool-description">탭하여 템포 측정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel tap-display">
        <div class="bpm-value" id="bpmValue">---</div>
        <div class="bpm-label">BPM</div>
        <div class="tap-area" id="tapArea" onclick="BpmTap.tap()">
          <div class="tap-text">여기를 탭하세요</div>
          <div class="tap-hint">또는 스페이스바를 누르세요</div>
        </div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="tapCount">0</div>
            <div class="stat-label">탭 횟수</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="avgInterval">-</div>
            <div class="stat-label">평균 간격 (ms)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="msPerBeat">-</div>
            <div class="stat-label">1비트 (ms)</div>
          </div>
        </div>
        <button class="tool-btn tool-btn-secondary" onclick="BpmTap.reset()" style="width: 100%; margin-top: 1rem;" aria-label="리셋">리셋</button>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <h3 style="font-weight: 600;">측정 기록</h3>
          <button class="tool-btn tool-btn-secondary" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" onclick="BpmTap.clearHistory()" aria-label="기록 삭제">기록 삭제</button>
        </div>
        <div id="historyList"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">템포 가이드</h3>
        <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8;">
          <div>Largo: 40-60 BPM</div>
          <div>Andante: 76-108 BPM</div>
          <div>Allegro: 120-156 BPM</div>
          <div>Presto: 168-200 BPM</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="bpm-tap.js"></script>
</body>
</html>
