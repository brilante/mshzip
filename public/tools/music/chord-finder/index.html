<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코드 파인더 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .chord-selector { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .selector-group { flex: 1; }
    .selector-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .note-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.25rem; }
    .note-btn { padding: 0.5rem; border-radius: 6px; background: var(--bg-primary); cursor: pointer; text-align: center; font-weight: 600; font-size: 0.9rem; }
    .note-btn.active { background: var(--primary); color: white; }
    .type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.25rem; }
    .chord-display { text-align: center; padding: 1.5rem; background: var(--bg-primary); border-radius: 12px; margin: 1rem 0; }
    .chord-name { font-size: 2.5rem; font-weight: 700; }
    .chord-notes { font-size: 1rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .fretboard { background: var(--bg-primary); border-radius: 12px; padding: 1rem; overflow-x: auto; }
    .fret-grid { display: grid; grid-template-rows: repeat(6, 30px); gap: 0; min-width: 300px; position: relative; }
    .string-row { display: flex; align-items: center; border-bottom: 2px solid var(--text-secondary); position: relative; }
    .string-row:first-child { border-bottom-width: 3px; }
    .fret-marker { width: 40px; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border-color); position: relative; }
    .fret-marker:first-child { width: 30px; border-right: 4px solid var(--text-primary); }
    .finger-dot { width: 24px; height: 24px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; position: absolute; }
    .open-marker { font-size: 1.25rem; }
    .mute-marker { font-size: 1rem; color: var(--text-secondary); }
    .fret-numbers { display: flex; padding-left: 30px; }
    .fret-num { width: 40px; text-align: center; font-size: 0.75rem; color: var(--text-secondary); }
    .play-btn { margin-top: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">코드 파인더</h1>
          <p class="tool-description">기타 코드 다이어그램</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="chord-selector">
          <div class="selector-group">
            <div class="selector-label">근음 (Root)</div>
            <div class="note-grid" id="rootNotes"></div>
          </div>
        </div>
        <div class="selector-label">코드 타입</div>
        <div class="type-grid" id="chordTypes"></div>
      </div>

      <div class="chord-display">
        <div class="chord-name" id="chordName">C</div>
        <div class="chord-notes" id="chordNotes">C - E - G</div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">기타 다이어그램</h3>
        <div class="fretboard" id="fretboard"></div>
        <div class="fret-numbers" id="fretNumbers"></div>
        <button class="tool-btn tool-btn-primary play-btn" onclick="ChordFinder.playChord()" style="width: 100%;" aria-label="코드 재생">
          코드 재생
        </button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="chord-finder.js"></script>
</body>
</html>
