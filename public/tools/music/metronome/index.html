<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메트로놈 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 450px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .metronome-display { text-align: center; padding: 2rem; }
    .bpm-display { font-size: 5rem; font-weight: 700; font-family: monospace; }
    .tempo-name { font-size: 1rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .beat-indicator { display: flex; justify-content: center; gap: 0.75rem; margin: 2rem 0; }
    .beat-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--bg-primary); transition: all 0.1s; }
    .beat-dot.active { background: var(--primary); transform: scale(1.3); }
    .beat-dot.accent { background: #f59e0b; transform: scale(1.5); }
    .bpm-slider { width: 100%; margin: 1.5rem 0; }
    .bpm-buttons { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; }
    .bpm-btn { width: 50px; height: 40px; border-radius: 8px; font-size: 1.25rem; font-weight: 600; cursor: pointer; background: var(--bg-primary); border: none; }
    .time-sig { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .sig-btn { padding: 0.5rem 1rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; }
    .sig-btn.active { background: var(--primary); color: white; }
    .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-top: 1rem; }
    .preset-btn { padding: 0.5rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; font-size: 0.8rem; text-align: center; }
    .preset-btn:hover { background: var(--primary); color: white; }
    .pendulum { width: 4px; height: 150px; background: var(--text-secondary); margin: 0 auto; transform-origin: top center; transition: transform 0.1s ease-out; }
    .pendulum-weight { width: 24px; height: 24px; border-radius: 50%; background: var(--primary); margin: -12px auto 0; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">메트로놈</h1>
          <p class="tool-description">정확한 박자 연습</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel metronome-display">
        <div class="pendulum" id="pendulum">
          <div class="pendulum-weight"></div>
        </div>
        <div class="bpm-display" id="bpmDisplay">120</div>
        <div class="tempo-name" id="tempoName">Allegro</div>
        <div class="beat-indicator" id="beatIndicator"></div>

        <div class="bpm-buttons">
          <button class="bpm-btn" onclick="Metronome.adjustBpm(-10)" aria-label="-10">-10</button>
          <button class="bpm-btn" onclick="Metronome.adjustBpm(-1)" aria-label="-1">-1</button>
          <button class="bpm-btn" onclick="Metronome.adjustBpm(1)" aria-label="+1">+1</button>
          <button class="bpm-btn" onclick="Metronome.adjustBpm(10)" aria-label="+10">+10</button>
        </div>

        <input type="range" id="bpmSlider" class="bpm-slider" min="20" max="280" value="120" oninput="Metronome.setBpm(this.value)">

        <button class="tool-btn tool-btn-primary" id="startBtn" onclick="Metronome.toggle()" style="width: 100%; font-size: 1.25rem; padding: 1rem;" aria-label="시작">
          시작
        </button>

        <div class="time-sig">
          <span style="font-size: 0.85rem; color: var(--text-secondary); margin-right: 0.5rem;">박자:</span>
          <div class="sig-btn" data-beats="2" onclick="Metronome.setBeats(2)">2/4</div>
          <div class="sig-btn" data-beats="3" onclick="Metronome.setBeats(3)">3/4</div>
          <div class="sig-btn active" data-beats="4" onclick="Metronome.setBeats(4)">4/4</div>
          <div class="sig-btn" data-beats="6" onclick="Metronome.setBeats(6)">6/8</div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">프리셋</h3>
        <div class="preset-grid">
          <div class="preset-btn" onclick="Metronome.setBpm(60)">Largo<br><small>60</small></div>
          <div class="preset-btn" onclick="Metronome.setBpm(80)">Adagio<br><small>80</small></div>
          <div class="preset-btn" onclick="Metronome.setBpm(100)">Andante<br><small>100</small></div>
          <div class="preset-btn" onclick="Metronome.setBpm(120)">Allegro<br><small>120</small></div>
          <div class="preset-btn" onclick="Metronome.setBpm(140)">Vivace<br><small>140</small></div>
          <div class="preset-btn" onclick="Metronome.setBpm(168)">Presto<br><small>168</small></div>
          <div class="preset-btn" onclick="Metronome.setBpm(200)">Prestissimo<br><small>200</small></div>
          <div class="preset-btn" onclick="Metronome.tapTempo()">TAP<br><small>템포</small></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="metronome.js"></script>
</body>
</html>
