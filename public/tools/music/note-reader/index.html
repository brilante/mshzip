<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>음표 읽기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .staff-container { background: white; border-radius: 8px; padding: 2rem; margin: 1rem 0; }
    .staff { position: relative; height: 120px; }
    .staff-line { position: absolute; left: 0; right: 0; height: 2px; background: #333; }
    .note-circle { width: 24px; height: 20px; background: #333; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }
    .note-stem { width: 2px; height: 50px; background: #333; position: absolute; left: calc(50% + 11px); }
    .clef { position: absolute; left: 10px; font-size: 4rem; top: -20px; }
    .answer-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; }
    .answer-btn { padding: 1rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; font-weight: 600; font-size: 1.25rem; }
    .answer-btn:hover { background: var(--primary); color: white; }
    .answer-btn.correct { background: #22c55e; color: white; }
    .answer-btn.wrong { background: #ef4444; color: white; }
    .score-row { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; }
    .score-item { text-align: center; }
    .score-value { font-size: 1.5rem; font-weight: 700; }
    .score-label { font-size: 0.8rem; color: var(--text-secondary); }
    .clef-select { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .clef-btn { flex: 1; padding: 0.75rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; }
    .clef-btn.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">음표 읽기</h1>
          <p class="tool-description">오선 독보 연습</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="clef-select">
          <div class="clef-btn active" data-clef="treble" onclick="NoteReader.setClef('treble')">높은음자리</div>
          <div class="clef-btn" data-clef="bass" onclick="NoteReader.setClef('bass')">𝄢 낮은음자리</div>
        </div>

        <div class="staff-container">
          <div class="staff" id="staff">
            <div class="clef" id="clefSymbol">𝄞</div>
            <div class="staff-line" style="top: 20px;"></div>
            <div class="staff-line" style="top: 40px;"></div>
            <div class="staff-line" style="top: 60px;"></div>
            <div class="staff-line" style="top: 80px;"></div>
            <div class="staff-line" style="top: 100px;"></div>
            <div class="note-circle" id="noteHead" style="top: 60px;"></div>
            <div class="note-stem" id="noteStem" style="top: 10px;"></div>
          </div>
        </div>

        <div class="answer-grid" id="answerGrid">
          <div class="answer-btn" onclick="NoteReader.answer('C')">도</div>
          <div class="answer-btn" onclick="NoteReader.answer('D')">레</div>
          <div class="answer-btn" onclick="NoteReader.answer('E')">미</div>
          <div class="answer-btn" onclick="NoteReader.answer('F')">파</div>
          <div class="answer-btn" onclick="NoteReader.answer('G')">솔</div>
          <div class="answer-btn" onclick="NoteReader.answer('A')">라</div>
          <div class="answer-btn" onclick="NoteReader.answer('B')">시</div>
        </div>

        <div class="score-row">
          <div class="score-item">
            <div class="score-value" id="correctCount" style="color: #22c55e;">0</div>
            <div class="score-label">정답</div>
          </div>
          <div class="score-item">
            <div class="score-value" id="totalCount">0</div>
            <div class="score-label">문제</div>
          </div>
          <div class="score-item">
            <div class="score-value" id="streakCount" style="color: #f59e0b;">0</div>
            <div class="score-label">연속</div>
          </div>
        </div>

        <button class="tool-btn tool-btn-secondary" onclick="NoteReader.reset()" style="width: 100%; margin-top: 1rem;" aria-label="점수 리셋">점수 리셋</button>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">높은음자리표 암기법</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6;">
          <strong>줄 위:</strong> 미(E) - 솔(G) - 시(B) - 레(D) - 파(F) → "미솔시레파"<br>
          <strong>줄 사이:</strong> 파(F) - 라(A) - 도(C) - 미(E) → "파라도미"
        </p>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="note-reader.js"></script>
</body>
</html>
