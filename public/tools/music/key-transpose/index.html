<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .transpose-control { display: flex; align-items: center; justify-content: center; gap: 1rem; margin: 1.5rem 0; }
    .transpose-value { font-size: 3rem; font-weight: 700; min-width: 100px; text-align: center; }
    .transpose-btn { width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; font-weight: 700; cursor: pointer; background: var(--bg-primary); border: none; }
    .key-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.5rem; }
    .key-btn { padding: 0.75rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; font-weight: 600; }
    .key-btn.active { background: var(--primary); color: white; }
    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1rem; }
    .result-card { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .result-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .result-key { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
    .chord-row { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .chord-item { padding: 0.5rem 1rem; background: var(--bg-secondary); border-radius: 6px; font-weight: 600; }
    .chord-item.original { background: var(--bg-primary); }
    .chord-item.transposed { background: var(--primary); color: white; }
    .arrow { font-size: 1.5rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">키 변환기</h1>
          <p class="tool-description">코드 이조 (Transpose)</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem; text-align: center;">원래 키 선택</h3>
        <div class="key-grid" id="keyGrid"></div>

        <div class="transpose-control">
          <button class="transpose-btn" onclick="KeyTranspose.adjust(-1)" aria-label="−">−</button>
          <div>
            <div class="transpose-value" id="transposeValue">0</div>
            <div style="text-align: center; font-size: 0.85rem; color: var(--text-secondary);">반음</div>
          </div>
          <button class="transpose-btn" onclick="KeyTranspose.adjust(1)" aria-label="+">+</button>
        </div>

        <div class="result-grid">
          <div class="result-card">
            <div class="result-label">원래 키</div>
            <div class="result-key" id="originalKey">C</div>
          </div>
          <div class="result-card">
            <div class="result-label">변환된 키</div>
            <div class="result-key" id="transposedKey">C</div>
          </div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">다이어토닉 코드 변환</h3>
        <div class="chord-row" id="originalChords"></div>
        <div style="text-align: center; margin: 0.75rem 0;"><span class="arrow">↓</span></div>
        <div class="chord-row" id="transposedChords"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">직접 코드 변환</h3>
        <div style="display: flex; gap: 0.5rem;">
          <input type="text" id="chordInput" class="tool-input" placeholder="코드 입력 (예: Am, G7, Dm7)" aria-label="코드 입력 (예: Am, G7, Dm7)">
          <button class="tool-btn tool-btn-primary" onclick="KeyTranspose.transposeChord()" aria-label="변환">변환</button>
        </div>
        <div id="chordResult" style="margin-top: 0.75rem; text-align: center; font-size: 1.25rem; font-weight: 600;"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="key-transpose.js"></script>
</body>
</html>
