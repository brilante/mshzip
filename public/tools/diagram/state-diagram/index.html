<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상태 다이어그램 | State Diagram</title>
  <link rel="stylesheet" href="state-diagram.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>상태 다이어그램</h1>
      <p>상태 머신을 시각화하세요</p>
    </header>

    <div class="main-content">
      <div class="quick-add">
        <h4>빠른 추가</h4>
        <div class="quick-buttons">
          <button onclick="addState()" aria-label="상태">상태</button>
          <button onclick="addTransition()" aria-label="전환">전환</button>
          <button onclick="addStart()" aria-label="[*] 시작">[*] 시작</button>
          <button onclick="addEnd()" aria-label="[*] 종료">[*] 종료</button>
          <button onclick="addNote()" aria-label="노트">노트</button>
        </div>
      </div>

      <div class="layout">
        <div class="editor-panel">
          <textarea id="codeEditor" spellcheck="false">stateDiagram-v2
    [*] --> 대기

    대기 --> 처리중 : 요청 수신
    처리중 --> 완료 : 처리 성공
    처리중 --> 오류 : 처리 실패

    완료 --> [*]
    오류 --> 대기 : 재시도

    state 처리중 {
        [*] --> 검증
        검증 --> 실행 : 검증 통과
        검증 --> [*] : 검증 실패
        실행 --> [*]
    }

    note right of 대기 : 초기 상태
    note left of 오류 : 에러 처리 필요</textarea>
        </div>

        <div class="preview-panel">
          <div class="preview-header">
            <button onclick="downloadSVG()" aria-label="SVG 다운로드">SVG 다운로드</button>
          </div>
          <div class="preview-area" id="previewArea">
            <div class="mermaid" id="mermaidOutput"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="state-diagram.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
