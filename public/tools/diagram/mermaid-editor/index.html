<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid 에디터 | Mermaid Editor</title>
  <link rel="stylesheet" href="mermaid-editor.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>Mermaid 에디터</h1>
      <p>텍스트로 다이어그램을 생성하세요</p>
    </header>

    <div class="main-content">
      <div class="layout">
        <div class="editor-panel">
          <div class="panel-header">
            <h3>코드</h3>
            <div class="templates">
              <select id="templates" onchange="loadTemplate()">
                <option value="">템플릿 선택...</option>
                <option value="flowchart">플로우차트</option>
                <option value="sequence">시퀀스 다이어그램</option>
                <option value="classDiagram">클래스 다이어그램</option>
                <option value="erDiagram">ER 다이어그램</option>
                <option value="pie">파이 차트</option>
                <option value="gantt">간트 차트</option>
              </select>
            </div>
          </div>
          <textarea id="codeEditor" spellcheck="false">flowchart TD
    A[시작] --> B{조건?}
    B -->|Yes| C[실행 1]
    B -->|No| D[실행 2]
    C --> E[종료]
    D --> E</textarea>
        </div>

        <div class="preview-panel">
          <div class="panel-header">
            <h3>미리보기</h3>
            <div class="actions">
              <button onclick="downloadSVG()" aria-label="SVG">SVG</button>
              <button onclick="downloadPNG()" aria-label="PNG">PNG</button>
            </div>
          </div>
          <div class="preview-area" id="previewArea">
            <div class="mermaid" id="mermaidOutput"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="mermaid-editor.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
