<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 해시 생성기 - ALLINONE</title>
    <link rel="stylesheet" href="sha256-hash.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>SHA-256 해시 생성기</h1>
            <p class="subtitle">가장 널리 사용되는 암호화 해시 함수</p>
        </header>
        <main class="main-content">
            <div class="input-section">
                <textarea id="inputText" placeholder="해시를 생성할 텍스트를 입력하세요..."></textarea>
                <div class="input-info">
                    <span id="charCount">0</span> 글자
                </div>
            </div>
            <div class="result-section">
                <h3>SHA-256 해시</h3>
                <div class="hash-display">
                    <div class="hash-text" id="hashResult">해시값이 여기에 표시됩니다</div>
                    <button class="copy-btn" onclick="copyHash()" aria-label="복사">복사</button>
                </div>
                <div class="hash-options">
                    <label><input type="checkbox" id="uppercase" onchange="updateDisplay()"> 대문자</label>
                    <label><input type="checkbox" id="addSpaces" onchange="updateDisplay()"> 4자리 구분</label>
                </div>
            </div>
            <div class="compare-section">
                <h3>해시 비교</h3>
                <input type="text" id="compareHash" placeholder="비교할 해시값 입력" aria-label="비교할 해시값 입력">
                <div class="compare-result" id="compareResult"></div>
            </div>
            <div class="info-section">
                <h3>SHA-256 정보</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">출력 길이</span>
                        <span class="value">256 bits (64 hex)</span>
                    </div>
                    <div class="info-item">
                        <span class="label">알고리즘</span>
                        <span class="value">SHA-2 계열</span>
                    </div>
                    <div class="info-item">
                        <span class="label">보안성</span>
                        <span class="value">매우 높음 </span>
                    </div>
                    <div class="info-item">
                        <span class="label">용도</span>
                        <span class="value">디지털 서명, 블록체인, TLS</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="sha256-hash.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
