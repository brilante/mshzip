<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데이터 유출 검사기 - ALLINONE</title>
  <link rel="stylesheet" href="breach-checker.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header>
      <h1>데이터 유출 검사기</h1>
      <p>이메일이나 비밀번호가 데이터 유출 사건에 노출되었는지 확인하세요</p>
    </header>

    <main>
      <div class="checker-card">
        <div class="tab-buttons">
          <button class="tab-btn active" data-tab="email" aria-label="이메일 검사">이메일 검사</button>
          <button class="tab-btn" data-tab="password" aria-label="비밀번호 검사">비밀번호 검사</button>
        </div>

        <div class="tab-content active" id="email-tab">
          <div class="input-group">
            <label for="emailInput">이메일 주소</label>
            <input type="email" id="emailInput" placeholder="example@email.com" aria-label="example@email.com">
          </div>
          <button id="checkEmail" class="check-btn" aria-label="유출 여부 확인">유출 여부 확인</button>
        </div>

        <div class="tab-content" id="password-tab">
          <div class="input-group">
            <label for="passwordInput">비밀번호</label>
            <div class="password-wrapper">
              <input type="password" id="passwordInput" placeholder="검사할 비밀번호 입력" aria-label="검사할 비밀번호 입력">
              <button id="togglePassword" class="toggle-btn" aria-label=""></button>
            </div>
            <small class="security-note">* 비밀번호는 SHA-1 해시로 변환되어 전송됩니다</small>
          </div>
          <button id="checkPassword" class="check-btn" aria-label="유출 여부 확인">유출 여부 확인</button>
        </div>

        <div id="result" class="result-area hidden">
          <div class="result-icon"></div>
          <div class="result-text"></div>
          <div class="result-detail"></div>
        </div>
      </div>

      <div class="info-card">
        <h3>안전한 검사 방법</h3>
        <ul>
          <li><strong>k-익명성 기법</strong>: 비밀번호의 SHA-1 해시 중 처음 5자리만 전송</li>
          <li><strong>로컬 비교</strong>: 실제 비밀번호는 서버로 전송되지 않음</li>
          <li><strong>Have I Been Pwned API</strong>: 신뢰할 수 있는 유출 데이터베이스 사용</li>
        </ul>
      </div>

      <div class="breach-info hidden" id="breachInfo">
        <h3>발견된 유출 정보</h3>
        <div id="breachList"></div>
      </div>
    </main>
  </div>
  <script src="breach-checker.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
