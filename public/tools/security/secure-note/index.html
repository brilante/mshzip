<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보안 노트 - ALLINONE</title>
    <link rel="stylesheet" href="secure-note.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>보안 노트</h1>
            <p class="subtitle">암호로 보호되는 비밀 노트</p>
        </header>
        <main class="main-content">
            <div class="note-list-section" id="noteListSection">
                <div class="section-header">
                    <h3>내 노트</h3>
                    <button class="new-btn" onclick="showNewNote()" aria-label="+ 새 노트">+ 새 노트</button>
                </div>
                <div class="note-list" id="noteList"></div>
            </div>
            <div class="note-editor-section hidden" id="noteEditorSection">
                <div class="section-header">
                    <button class="back-to-list" onclick="backToList()" aria-label="← 목록">← 목록</button>
                    <div class="note-actions">
                        <button class="save-btn" onclick="saveNote()" aria-label="저장">저장</button>
                        <button class="delete-btn" onclick="deleteNote()" aria-label="삭제">삭제</button>
                    </div>
                </div>
                <input type="text" id="noteTitle" placeholder="제목" class="note-title-input" aria-label="제목">
                <div class="password-section">
                    <input type="password" id="notePassword" placeholder="암호 (선택사항)" aria-label="암호 (선택사항)">
                    <span class="password-hint">암호를 설정하면 노트가 암호화됩니다</span>
                </div>
                <textarea id="noteContent" placeholder="내용을 입력하세요..."></textarea>
            </div>
            <div class="unlock-modal hidden" id="unlockModal">
                <div class="modal-content">
                    <h3>잠긴 노트</h3>
                    <p>이 노트는 암호로 보호되어 있습니다</p>
                    <input type="password" id="unlockPassword" placeholder="암호 입력" aria-label="암호 입력">
                    <div class="modal-buttons">
                        <button onclick="cancelUnlock()" aria-label="취소">취소</button>
                        <button onclick="attemptUnlock()" class="primary" aria-label="열기">열기</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="secure-note.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
