<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA 코드 생성기 - ALLINONE</title>
    <link rel="stylesheet" href="2fa-gen.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>2FA 코드 생성기</h1>
            <p class="subtitle">TOTP 기반 2단계 인증 코드</p>
        </header>
        <main class="main-content">
            <div class="setup-section">
                <h3>시크릿 키 설정</h3>
                <div class="input-row">
                    <input type="text" id="secretKey" placeholder="Base32 시크릿 키 입력 (예: JBSWY3DPEHPK3PXP)" aria-label="Base32 시크릿 키 입력 (예: JBSWY3DPEHPK3PXP)">
                    <button onclick="generateCode()" aria-label="설정">설정</button>
                </div>
                <button class="generate-secret" onclick="generateSecret()" aria-label="랜덤 시크릿 생성">랜덤 시크릿 생성</button>
            </div>
            <div class="code-section" id="codeSection">
                <div class="timer-ring">
                    <svg viewBox="0 0 100 100">
                        <circle class="bg" cx="50" cy="50" r="45"/>
                        <circle class="progress" id="timerRing" cx="50" cy="50" r="45"/>
                    </svg>
                    <div class="timer-text" id="timerText">30</div>
                </div>
                <div class="code-display">
                    <span class="code" id="totpCode">------</span>
                    <button class="copy-btn" onclick="copyCode()" aria-label=""></button>
                </div>
            </div>
            <div class="accounts-section">
                <div class="section-header">
                    <h3>저장된 계정</h3>
                    <button class="add-btn" onclick="showAddAccount()" aria-label="+ 추가">+ 추가</button>
                </div>
                <div class="accounts-list" id="accountsList"></div>
            </div>
            <div class="add-account-modal hidden" id="addAccountModal">
                <div class="modal-content">
                    <h3>계정 추가</h3>
                    <input type="text" id="accountName" placeholder="계정 이름 (예: Google)" aria-label="계정 이름 (예: Google)">
                    <input type="text" id="accountSecret" placeholder="시크릿 키" aria-label="시크릿 키">
                    <div class="modal-buttons">
                        <button onclick="hideAddAccount()" aria-label="취소">취소</button>
                        <button onclick="saveAccount()" class="primary" aria-label="저장">저장</button>
                    </div>
                </div>
            </div>
            <div class="info-section">
                <h3>ℹ2FA 안내</h3>
                <ul>
                    <li>TOTP (Time-based One-Time Password) 표준 사용</li>
                    <li>30초마다 새로운 6자리 코드 생성</li>
                    <li>Google Authenticator와 호환</li>
                    <li>시크릿 키는 안전하게 보관하세요</li>
                </ul>
            </div>
        </main>
    </div>
    <script src="2fa-gen.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
