<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS 누출 테스트 - ALLINONE</title>
  <link rel="stylesheet" href="dns-leak-test.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header>
      <h1>DNS 누출 테스트</h1>
      <p>VPN 사용 시 DNS 요청이 누출되는지 확인하세요</p>
    </header>

    <main>
      <div class="test-card">
        <div class="status-display">
          <div class="status-icon" id="statusIcon"></div>
          <div class="status-text" id="statusText">테스트 준비됨</div>
        </div>

        <button id="startTest" class="start-btn" aria-label="DNS 누출 테스트 시작">DNS 누출 테스트 시작</button>

        <div class="progress-container hidden" id="progressContainer">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-text" id="progressText">DNS 서버 확인 중...</div>
        </div>
      </div>

      <div class="results-card hidden" id="resultsCard">
        <h3>테스트 결과</h3>

        <div class="result-summary" id="resultSummary">
          <div class="summary-icon"></div>
          <div class="summary-text"></div>
        </div>

        <div class="dns-servers">
          <h4>검출된 DNS 서버</h4>
          <div id="serverList"></div>
        </div>

        <div class="ip-info">
          <h4>IP 정보</h4>
          <div class="info-grid" id="ipInfo"></div>
        </div>
      </div>

      <div class="info-card">
        <h3>DNS 누출이란?</h3>
        <p>VPN을 사용해도 DNS 요청이 ISP(인터넷 서비스 제공자)의 DNS 서버로 전송되는 현상입니다. 이로 인해 방문하는 웹사이트가 노출될 수 있습니다.</p>

        <h4 style="margin-top: 15px;">해결 방법:</h4>
        <ul>
          <li>VPN의 DNS 누출 방지 기능 활성화</li>
          <li>신뢰할 수 있는 공용 DNS 사용 (예: Cloudflare 1.1.1.1)</li>
          <li>운영 체제의 DNS 설정 수동 구성</li>
        </ul>
      </div>
    </main>
  </div>
  <script src="dns-leak-test.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
