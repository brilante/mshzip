<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>암호화/복호화 - ALLINONE</title>
    <link rel="stylesheet" href="encrypt-decrypt.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header class="header">
            <a href="/tools" class="back-btn">← 돌아가기</a>
            <h1>암호화/복호화</h1>
            <p class="subtitle">AES-256 암호화로 텍스트를 안전하게 보호하세요</p>
        </header>
        <main class="main-content">
            <div class="mode-toggle">
                <button class="mode-btn active" onclick="setMode('encrypt')" aria-label="암호화">암호화</button>
                <button class="mode-btn" onclick="setMode('decrypt')" aria-label="복호화">복호화</button>
            </div>
            <div class="input-section">
                <h3 id="inputLabel">암호화할 텍스트</h3>
                <textarea id="inputText" placeholder="텍스트를 입력하세요..."></textarea>
            </div>
            <div class="key-section">
                <label>암호화 키 (비밀번호)</label>
                <div class="key-input-wrapper">
                    <input type="password" id="secretKey" placeholder="암호화 키를 입력하세요" aria-label="암호화 키를 입력하세요">
                    <button class="toggle-btn" onclick="toggleKey()" aria-label=""></button>
                </div>
                <div class="key-strength" id="keyStrength"></div>
            </div>
            <button class="action-btn" id="actionBtn" onclick="process()" aria-label="암호화">암호화</button>
            <div class="output-section">
                <div class="output-header">
                    <h3 id="outputLabel">암호화된 텍스트</h3>
                    <button class="copy-btn" onclick="copyOutput()" aria-label="복사">복사</button>
                </div>
                <textarea id="outputText" readonly placeholder="결과가 여기에 표시됩니다"></textarea>
            </div>
            <div class="info-section">
                <h3>ℹ안내</h3>
                <ul>
                    <li>AES-256-CBC 암호화 알고리즘을 사용합니다</li>
                    <li>암호화 키는 반드시 기억하세요 - 분실 시 복호화 불가</li>
                    <li>암호화된 데이터는 Base64로 인코딩됩니다</li>
                    <li>민감한 정보는 안전한 환경에서만 처리하세요</li>
                </ul>
            </div>
        </main>
    </div>
    <script src="encrypt-decrypt.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
