<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSL 인증서 검사기 - ALLINONE</title>
  <link rel="stylesheet" href="ssl-checker.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header>
      <h1>SSL 인증서 검사기</h1>
      <p>웹사이트의 SSL/TLS 인증서 상태를 확인하세요</p>
    </header>

    <main>
      <div class="check-card">
        <div class="input-group">
          <input type="text" id="domainInput" placeholder="example.com" aria-label="example.com">
          <button id="checkBtn" aria-label="검사">검사</button>
        </div>
      </div>

      <div class="result-card hidden" id="resultCard">
        <div class="status-banner" id="statusBanner">
          <span class="status-icon"></span>
          <span class="status-text"></span>
        </div>

        <div class="cert-info">
          <h3>인증서 정보</h3>
          <div class="info-grid" id="certInfo"></div>
        </div>

        <div class="validity-section">
          <h3>유효 기간</h3>
          <div class="validity-bar">
            <div class="validity-progress" id="validityProgress"></div>
          </div>
          <div class="validity-dates">
            <span id="startDate"></span>
            <span id="endDate"></span>
          </div>
          <div class="days-remaining" id="daysRemaining"></div>
        </div>

        <div class="security-checks">
          <h3>보안 검사</h3>
          <div id="securityList"></div>
        </div>
      </div>

      <div class="info-card">
        <h3>SSL/TLS 인증서란?</h3>
        <p>SSL(Secure Sockets Layer)/TLS(Transport Layer Security) 인증서는 웹사이트와 방문자 간의 데이터를 암호화하여 안전한 통신을 보장합니다.</p>
        <ul>
          <li>HTTPS 연결 활성화</li>
          <li>데이터 암호화로 정보 보호</li>
          <li>웹사이트 신원 확인</li>
          <li>검색엔진 순위 향상</li>
        </ul>
      </div>
    </main>
  </div>
  <script src="ssl-checker.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
