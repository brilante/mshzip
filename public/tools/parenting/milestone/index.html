<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>발달 이정표 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .age-display { text-align: center; padding: 1.5rem; background: linear-gradient(135deg, #8b5cf6, #7c3aed); border-radius: 16px; color: white; margin: 1rem 0; }
    .age-value { font-size: 2rem; font-weight: 700; }
    .category-tabs { display: flex; gap: 0.5rem; margin: 1rem 0; overflow-x: auto; }
    .category-tab { padding: 0.5rem 1rem; border-radius: 20px; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
    .category-tab.active { background: var(--primary); color: white; }
    .milestone-list { margin: 1rem 0; }
    .milestone-item { background: var(--bg-primary); padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; display: flex; gap: 1rem; align-items: flex-start; }
    .milestone-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .milestone-check.done { background: #22c55e; border-color: #22c55e; color: white; }
    .milestone-content { flex: 1; }
    .milestone-title { font-weight: 600; }
    .milestone-desc { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .milestone-age { font-size: 0.75rem; color: var(--primary); margin-top: 0.25rem; }
    .progress-section { padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin: 1rem 0; }
    .progress-bar { height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; margin-top: 0.5rem; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #7c3aed); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">발달 이정표</h1>
          <p class="tool-description">아기 발달 단계 체크</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="input-group">
          <label class="input-label">아기 생년월일</label>
          <input type="date" id="birthDate" class="tool-input" onchange="Milestone.calculate()">
        </div>
      </div>

      <div class="age-display">
        <div class="age-value" id="ageDisplay">0개월</div>
        <div style="opacity: 0.9;">현재 발달 단계</div>
      </div>

      <div class="progress-section">
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
          <span>발달 체크 진행률</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
      </div>

      <div class="category-tabs">
        <div class="category-tab active" data-cat="all" onclick="Milestone.setCategory('all')">전체</div>
        <div class="category-tab" data-cat="motor" onclick="Milestone.setCategory('motor')">운동</div>
        <div class="category-tab" data-cat="cognitive" onclick="Milestone.setCategory('cognitive')">인지</div>
        <div class="category-tab" data-cat="language" onclick="Milestone.setCategory('language')">언어</div>
        <div class="category-tab" data-cat="social" onclick="Milestone.setCategory('social')">사회성</div>
      </div>

      <div class="milestone-list" id="milestoneList">
        <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">
          아기 생년월일을 입력하세요
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="milestone.js"></script>
</body>
</html>
