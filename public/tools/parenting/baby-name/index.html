<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아기 이름 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .gender-select { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .gender-btn { flex: 1; padding: 1rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; font-size: 1.25rem; }
    .gender-btn.active { background: var(--primary); color: white; }
    .gender-btn.male.active { background: #3b82f6; }
    .gender-btn.female.active { background: #ec4899; }
    .name-results { margin: 1rem 0; }
    .name-card { background: var(--bg-primary); padding: 1.25rem; border-radius: 12px; margin-bottom: 0.75rem; cursor: pointer; transition: transform 0.2s; }
    .name-card:hover { transform: translateX(5px); }
    .name-card.favorite { border: 2px solid #f59e0b; }
    .name-korean { font-size: 1.5rem; font-weight: 700; }
    .name-hanja { font-size: 1rem; color: var(--text-secondary); margin-left: 0.5rem; }
    .name-meaning { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .name-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .action-btn { padding: 0.25rem 0.5rem; border-radius: 4px; background: var(--bg-secondary); font-size: 0.8rem; cursor: pointer; }
    .favorites-section { margin-top: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; }
    .favorite-tag { display: inline-block; padding: 0.5rem 1rem; background: var(--bg-secondary); border-radius: 20px; margin: 0.25rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">아기 이름 생성기</h1>
          <p class="tool-description">한글 이름 추천</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="gender-select">
          <div class="gender-btn male active" data-gender="male" onclick="BabyName.setGender('male')">남아</div>
          <div class="gender-btn female" data-gender="female" onclick="BabyName.setGender('female')">여아</div>
        </div>

        <div class="input-group">
          <label class="input-label">성 (선택)</label>
          <input type="text" id="familyName" class="tool-input" placeholder="예: 김, 이, 박" aria-label="예: 김, 이, 박">
        </div>

        <div class="input-group">
          <label class="input-label">원하는 의미 (선택)</label>
          <select id="meaning" class="tool-input">
            <option value="">전체</option>
            <option value="bright">밝음/빛</option>
            <option value="wisdom">지혜/총명</option>
            <option value="nature">자연/아름다움</option>
            <option value="virtue">덕/선함</option>
            <option value="success">성공/번영</option>
            <option value="happiness">행복/복</option>
          </select>
        </div>

        <button class="tool-btn tool-btn-primary" onclick="BabyName.generate()" style="width: 100%;" aria-label="이름 추천받기">이름 추천받기</button>
      </div>

      <div class="name-results" id="nameResults">
        <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">
          버튼을 눌러 이름을 추천받으세요
        </div>
      </div>

      <div class="favorites-section">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">관심 목록</h3>
        <div id="favoritesList">
          <span style="color: var(--text-secondary); font-size: 0.9rem;">하트를 눌러 관심 이름을 저장하세요</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="baby-name.js"></script>
</body>
</html>
