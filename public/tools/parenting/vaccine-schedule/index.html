<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예방접종 스케줄 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .vaccine-list { margin: 1rem 0; }
    .vaccine-item { background: var(--bg-primary); padding: 1rem; border-radius: 8px; margin-bottom: 0.75rem; }
    .vaccine-header { display: flex; justify-content: space-between; align-items: center; }
    .vaccine-name { font-weight: 600; }
    .vaccine-status { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .vaccine-status.done { background: #22c55e; color: white; }
    .vaccine-status.due { background: #f59e0b; color: white; }
    .vaccine-status.upcoming { background: #3b82f6; color: white; }
    .vaccine-status.overdue { background: #ef4444; color: white; }
    .vaccine-details { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .vaccine-check { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
    .check-btn { padding: 0.25rem 0.75rem; border-radius: 4px; background: var(--bg-secondary); font-size: 0.8rem; cursor: pointer; }
    .check-btn:hover { background: var(--primary); color: white; }
    .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-tab { padding: 0.5rem 1rem; border-radius: 20px; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .filter-tab.active { background: var(--primary); color: white; }
    .age-badge { font-size: 0.75rem; background: var(--bg-secondary); padding: 0.25rem 0.5rem; border-radius: 4px; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">예방접종 스케줄</h1>
          <p class="tool-description">아기 예방접종 일정 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="input-group">
          <label class="input-label">아기 생년월일</label>
          <input type="date" id="birthDate" class="tool-input" onchange="VaccineSchedule.calculate()">
        </div>
      </div>

      <div class="filter-tabs">
        <div class="filter-tab active" data-filter="all" onclick="VaccineSchedule.setFilter('all')">전체</div>
        <div class="filter-tab" data-filter="due" onclick="VaccineSchedule.setFilter('due')">접종 예정</div>
        <div class="filter-tab" data-filter="done" onclick="VaccineSchedule.setFilter('done')">완료</div>
        <div class="filter-tab" data-filter="overdue" onclick="VaccineSchedule.setFilter('overdue')">미접종</div>
      </div>

      <div class="vaccine-list" id="vaccineList">
        <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">
          아기 생년월일을 입력하세요
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="vaccine-schedule.js"></script>
</body>
</html>
