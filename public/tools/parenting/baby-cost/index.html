<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아기 비용 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    .input-row input { flex: 1; }
    .result-display { text-align: center; padding: 2rem; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 16px; color: white; margin: 1rem 0; }
    .result-value { font-size: 2.5rem; font-weight: 700; }
    .result-label { font-size: 0.9rem; opacity: 0.9; }
    .category-section { margin: 1rem 0; }
    .category-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px 8px 0 0; border-bottom: 1px solid var(--border); }
    .category-name { font-weight: 600; }
    .category-total { color: var(--primary); font-weight: 600; }
    .category-items { background: var(--bg-primary); border-radius: 0 0 8px 8px; padding: 0.5rem; }
    .cost-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid var(--border); }
    .cost-item:last-child { border-bottom: none; }
    .cost-item-name { font-size: 0.9rem; }
    .cost-item-value { display: flex; align-items: center; gap: 0.5rem; }
    .cost-item-value input { width: 100px; text-align: right; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .tip-box { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 1rem; border-radius: 0 8px 8px 0; margin: 1rem 0; }
    .tip-box-dark { background: #78350f; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">아기 비용 계산기</h1>
          <p class="tool-description">출산 및 육아 비용 추정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="input-group">
          <label class="input-label">계산 기간</label>
          <select id="period" class="tool-input" onchange="BabyCost.calculate()">
            <option value="1">첫 1년</option>
            <option value="2">첫 2년</option>
            <option value="3" selected>첫 3년</option>
            <option value="5">첫 5년</option>
          </select>
        </div>
      </div>

      <div class="result-display">
        <div class="result-label">총 예상 비용</div>
        <div class="result-value" id="totalCost">0원</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="monthlyCost">0원</div>
          <div class="stat-label">월평균 비용</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="dailyCost">0원</div>
          <div class="stat-label">일평균 비용</div>
        </div>
      </div>

      <!-- 출산 준비 -->
      <div class="category-section">
        <div class="category-header">
          <span class="category-name">출산 준비</span>
          <span class="category-total" id="birthTotal">0원</span>
        </div>
        <div class="category-items">
          <div class="cost-item">
            <span class="cost-item-name">산전 검사/출산비</span>
            <div class="cost-item-value">
              <input type="number" id="birthMedical" class="tool-input" value="1500000" step="100000" oninput="BabyCost.calculate()">
              <span>원</span>
            </div>
          </div>
          <div class="cost-item">
            <span class="cost-item-name">유모차/카시트</span>
            <div class="cost-item-value">
              <input type="number" id="birthGear" class="tool-input" value="1000000" step="100000" oninput="BabyCost.calculate()">
              <span>원</span>
            </div>
          </div>
          <div class="cost-item">
            <span class="cost-item-name">아기 침대/가구</span>
            <div class="cost-item-value">
              <input type="number" id="birthFurniture" class="tool-input" value="500000" step="50000" oninput="BabyCost.calculate()">
              <span>원</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 월간 고정 지출 -->
      <div class="category-section">
        <div class="category-header">
          <span class="category-name">월간 고정 지출</span>
          <span class="category-total" id="monthlyTotal">0원</span>
        </div>
        <div class="category-items">
          <div class="cost-item">
            <span class="cost-item-name">분유/이유식</span>
            <div class="cost-item-value">
              <input type="number" id="monthlyFood" class="tool-input" value="150000" step="10000" oninput="BabyCost.calculate()">
              <span>원/월</span>
            </div>
          </div>
          <div class="cost-item">
            <span class="cost-item-name">기저귀/물티슈</span>
            <div class="cost-item-value">
              <input type="number" id="monthlyDiaper" class="tool-input" value="100000" step="10000" oninput="BabyCost.calculate()">
              <span>원/월</span>
            </div>
          </div>
          <div class="cost-item">
            <span class="cost-item-name">의류/용품</span>
            <div class="cost-item-value">
              <input type="number" id="monthlyClothes" class="tool-input" value="50000" step="10000" oninput="BabyCost.calculate()">
              <span>원/월</span>
            </div>
          </div>
          <div class="cost-item">
            <span class="cost-item-name">의료비/보험</span>
            <div class="cost-item-value">
              <input type="number" id="monthlyMedical" class="tool-input" value="100000" step="10000" oninput="BabyCost.calculate()">
              <span>원/월</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 교육/돌봄 -->
      <div class="category-section">
        <div class="category-header">
          <span class="category-name">교육/돌봄</span>
          <span class="category-total" id="eduTotal">0원</span>
        </div>
        <div class="category-items">
          <div class="cost-item">
            <span class="cost-item-name">어린이집/유치원</span>
            <div class="cost-item-value">
              <input type="number" id="eduDaycare" class="tool-input" value="300000" step="50000" oninput="BabyCost.calculate()">
              <span>원/월</span>
            </div>
          </div>
          <div class="cost-item">
            <span class="cost-item-name">교재/장난감</span>
            <div class="cost-item-value">
              <input type="number" id="eduToys" class="tool-input" value="50000" step="10000" oninput="BabyCost.calculate()">
              <span>원/월</span>
            </div>
          </div>
        </div>
      </div>

      <div class="tip-box">
        <strong>절약 팁</strong>
        <ul style="margin: 0.5rem 0 0; padding-left: 1.2rem; font-size: 0.85rem;">
          <li>중고 유모차/카시트 활용</li>
          <li>육아용품 공동구매 참여</li>
          <li>정부 지원금 활용 (첫만남이용권, 부모급여 등)</li>
          <li>온라인 할인/쿠폰 적극 활용</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="baby-cost.js"></script>
</body>
</html>
