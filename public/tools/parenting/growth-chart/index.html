<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성장 차트 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    .input-row input, .input-row select { flex: 1; }
    .input-unit { color: var(--text-secondary); font-size: 0.9rem; min-width: 30px; }
    .result-card { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; color: white; padding: 1.5rem; margin: 1rem 0; }
    .result-row { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .result-row:last-child { border-bottom: none; }
    .result-label { opacity: 0.9; }
    .result-value { font-weight: 700; font-size: 1.1rem; }
    .percentile-bar { height: 24px; background: rgba(255,255,255,0.2); border-radius: 12px; margin-top: 0.5rem; position: relative; overflow: hidden; }
    .percentile-fill { height: 100%; border-radius: 12px; background: white; transition: width 0.5s; }
    .percentile-marker { position: absolute; top: 0; bottom: 0; width: 4px; background: #f59e0b; transform: translateX(-50%); }
    .gender-select { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .gender-btn { flex: 1; padding: 0.75rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; }
    .gender-btn.active { background: var(--primary); color: white; }
    .history-section { margin-top: 1rem; }
    .history-item { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">성장 차트</h1>
          <p class="tool-description">아이 성장 백분위 확인</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="gender-select">
          <div class="gender-btn active" data-gender="male" onclick="GrowthChart.setGender('male')">남아</div>
          <div class="gender-btn" data-gender="female" onclick="GrowthChart.setGender('female')">여아</div>
        </div>

        <div class="input-row">
          <div class="input-group" style="flex: 1;">
            <label class="input-label">나이 (년)</label>
            <input type="number" id="ageYears" class="tool-input" value="2" min="0" max="18" oninput="GrowthChart.calculate()">
          </div>
          <div class="input-group" style="flex: 1;">
            <label class="input-label">개월</label>
            <input type="number" id="ageMonths" class="tool-input" value="0" min="0" max="11" oninput="GrowthChart.calculate()">
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">키</label>
          <div class="input-row">
            <input type="number" id="height" class="tool-input" value="87" step="0.1" oninput="GrowthChart.calculate()">
            <span class="input-unit">cm</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">몸무게</label>
          <div class="input-row">
            <input type="number" id="weight" class="tool-input" value="12" step="0.1" oninput="GrowthChart.calculate()">
            <span class="input-unit">kg</span>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" onclick="GrowthChart.saveRecord()" style="width: 100%;" aria-label="기록 저장">기록 저장</button>
      </div>

      <div class="result-card">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">성장 백분위</h3>

        <div class="result-row">
          <span class="result-label">키 백분위</span>
          <span class="result-value" id="heightPercentile">50%</span>
        </div>
        <div class="percentile-bar">
          <div class="percentile-fill" id="heightBar" style="width: 50%;"></div>
        </div>

        <div class="result-row" style="margin-top: 1rem;">
          <span class="result-label">몸무게 백분위</span>
          <span class="result-value" id="weightPercentile">50%</span>
        </div>
        <div class="percentile-bar">
          <div class="percentile-fill" id="weightBar" style="width: 50%;"></div>
        </div>

        <div class="result-row" style="margin-top: 1rem;">
          <span class="result-label">BMI</span>
          <span class="result-value" id="bmiValue">15.8</span>
        </div>

        <div class="result-row">
          <span class="result-label">성장 상태</span>
          <span class="result-value" id="growthStatus">정상</span>
        </div>
      </div>

      <div class="history-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">성장 기록</h3>
          <button class="tool-btn tool-btn-secondary" onclick="GrowthChart.clearHistory()" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" aria-label="초기화">초기화</button>
        </div>
        <div id="historyList">
          <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="growth-chart.js"></script>
</body>
</html>
