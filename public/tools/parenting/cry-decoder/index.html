<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>울음 해석기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .cry-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin: 1rem 0; }
    .cry-option { padding: 1rem; background: var(--bg-primary); border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .cry-option:hover { border-color: var(--primary); }
    .cry-option.selected { border-color: var(--primary); background: rgba(124, 58, 237, 0.1); }
    .cry-option-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .cry-option-name { font-weight: 600; font-size: 0.9rem; }
    .cry-option-time { font-size: 0.75rem; color: var(--text-secondary); }
    .result-panel { background: linear-gradient(135deg, #ec4899, #db2777); border-radius: 16px; padding: 1.5rem; color: white; margin: 1rem 0; display: none; }
    .result-panel.show { display: block; }
    .result-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .result-desc { opacity: 0.9; line-height: 1.6; }
    .solution-section { margin: 1rem 0; }
    .solution-title { font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .solution-list { list-style: none; padding: 0; margin: 0; }
    .solution-list li { padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; display: flex; align-items: flex-start; gap: 0.75rem; }
    .solution-num { width: 24px; height: 24px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; flex-shrink: 0; }
    .solution-text { flex: 1; font-size: 0.9rem; }
    .warning-box { background: #fef2f2; border-left: 4px solid #ef4444; padding: 1rem; border-radius: 0 8px 8px 0; margin: 1rem 0; font-size: 0.85rem; }
    .log-section { margin-top: 1.5rem; }
    .log-item { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.85rem; }
    .log-empty { text-align: center; padding: 1.5rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">울음 해석기</h1>
          <p class="tool-description">아기 울음 원인 파악 도우미</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">울음 유형 선택</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary);">아기의 울음 특징을 선택하세요</p>
      </div>

      <div class="cry-selector">
        <div class="cry-option" data-type="hungry" onclick="CryDecoder.select('hungry')">
          <div class="cry-option-icon"></div>
          <div class="cry-option-name">배고픔</div>
          <div class="cry-option-time">리듬있는 울음</div>
        </div>
        <div class="cry-option" data-type="tired" onclick="CryDecoder.select('tired')">
          <div class="cry-option-icon"></div>
          <div class="cry-option-name">피곤함</div>
          <div class="cry-option-time">보채는 울음</div>
        </div>
        <div class="cry-option" data-type="diaper" onclick="CryDecoder.select('diaper')">
          <div class="cry-option-icon"></div>
          <div class="cry-option-name">기저귀</div>
          <div class="cry-option-time">갑작스런 울음</div>
        </div>
        <div class="cry-option" data-type="pain" onclick="CryDecoder.select('pain')">
          <div class="cry-option-icon"></div>
          <div class="cry-option-name">불편/통증</div>
          <div class="cry-option-time">날카로운 울음</div>
        </div>
        <div class="cry-option" data-type="attention" onclick="CryDecoder.select('attention')">
          <div class="cry-option-icon"></div>
          <div class="cry-option-name">관심 요구</div>
          <div class="cry-option-time">끊기는 울음</div>
        </div>
        <div class="cry-option" data-type="colic" onclick="CryDecoder.select('colic')">
          <div class="cry-option-icon"></div>
          <div class="cry-option-name">영아산통</div>
          <div class="cry-option-time">격렬한 울음</div>
        </div>
        <div class="cry-option" data-type="hot" onclick="CryDecoder.select('hot')">
          <div class="cry-option-icon"></div>
          <div class="cry-option-name">더움</div>
          <div class="cry-option-time">불편한 울음</div>
        </div>
        <div class="cry-option" data-type="cold" onclick="CryDecoder.select('cold')">
          <div class="cry-option-icon"></div>
          <div class="cry-option-name">추움</div>
          <div class="cry-option-time">떨리는 울음</div>
        </div>
      </div>

      <div class="result-panel" id="resultPanel">
        <div class="result-title" id="resultTitle"></div>
        <div class="result-desc" id="resultDesc"></div>
      </div>

      <div class="solution-section" id="solutionSection" style="display: none;">
        <div class="solution-title">대처 방법</div>
        <ul class="solution-list" id="solutionList"></ul>
      </div>

      <div class="warning-box">
        <strong>주의사항</strong><br>
        이 도구는 참고용이며 정확한 진단을 대체하지 않습니다.<br>
        아기가 계속 울거나 열이 나면 반드시 소아과를 방문하세요.
      </div>

      <div class="util-panel log-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">울음 기록</h3>
          <button class="tool-btn tool-btn-secondary" onclick="CryDecoder.clearLog()" style="font-size: 0.75rem; padding: 0.25rem 0.5rem;" aria-label="초기화">초기화</button>
        </div>
        <div id="logList">
          <div class="log-empty">기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="cry-decoder.js"></script>
</body>
</html>
