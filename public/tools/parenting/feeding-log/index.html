<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수유 기록 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .type-selector { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .type-btn { flex: 1; padding: 0.75rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; }
    .type-btn.active { background: var(--primary); color: white; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    .log-list { max-height: 300px; overflow-y: auto; }
    .log-item { background: var(--bg-primary); padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; }
    .log-header { display: flex; justify-content: space-between; margin-bottom: 0.25rem; }
    .log-type { font-weight: 600; }
    .log-time { color: var(--text-secondary); font-size: 0.85rem; }
    .log-details { font-size: 0.9rem; color: var(--text-secondary); }
    .log-delete { color: #ef4444; font-size: 0.8rem; cursor: pointer; }
    .timer-display { text-align: center; padding: 1.5rem; background: linear-gradient(135deg, #ec4899, #f472b6); border-radius: 12px; color: white; margin: 1rem 0; }
    .timer-time { font-size: 2.5rem; font-weight: 700; font-family: monospace; }
    .timer-label { font-size: 0.9rem; opacity: 0.9; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">수유 기록</h1>
          <p class="tool-description">모유/분유 수유 기록</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="todayCount">0</div>
          <div class="stat-label">오늘 수유</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalAmount">0ml</div>
          <div class="stat-label">오늘 총량</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="lastFeed">-</div>
          <div class="stat-label">마지막 수유</div>
        </div>
      </div>

      <div class="timer-display">
        <div class="timer-label">수유 타이머</div>
        <div class="timer-time" id="timerDisplay">00:00</div>
        <div style="display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem;">
          <button class="tool-btn" style="background: white; color: #ec4899;" onclick="FeedingLog.toggleTimer()" id="timerBtn" aria-label="시작">시작</button>
          <button class="tool-btn" style="background: rgba(255,255,255,0.2); color: white;" onclick="FeedingLog.resetTimer()" aria-label="↺ 리셋">↺ 리셋</button>
        </div>
      </div>

      <div class="util-panel">
        <div class="type-selector">
          <div class="type-btn active" data-type="breast" onclick="FeedingLog.setType('breast')">모유</div>
          <div class="type-btn" data-type="formula" onclick="FeedingLog.setType('formula')">분유</div>
          <div class="type-btn" data-type="pumped" onclick="FeedingLog.setType('pumped')">유축</div>
        </div>

        <div id="formulaInput" style="display: none;">
          <div class="input-group">
            <label class="input-label">수유량</label>
            <div class="input-row">
              <input type="number" id="amount" class="tool-input" value="120" step="10">
              <span style="color: var(--text-secondary);">ml</span>
            </div>
          </div>
        </div>

        <div id="breastInput">
          <div class="input-group">
            <label class="input-label">수유 시간</label>
            <div class="input-row">
              <input type="number" id="duration" class="tool-input" value="15" min="1">
              <span style="color: var(--text-secondary);">분</span>
            </div>
          </div>
          <div class="input-group">
            <label class="input-label">수유 위치</label>
            <select id="side" class="tool-input">
              <option value="left">왼쪽</option>
              <option value="right">오른쪽</option>
              <option value="both">양쪽</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">메모 (선택)</label>
          <input type="text" id="memo" class="tool-input" placeholder="특이사항" aria-label="특이사항">
        </div>

        <button class="tool-btn tool-btn-primary" onclick="FeedingLog.addRecord()" style="width: 100%;" aria-label="+ 기록 추가">+ 기록 추가</button>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">수유 기록</h3>
          <button class="tool-btn tool-btn-secondary" onclick="FeedingLog.clearAll()" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" aria-label="전체 삭제">전체 삭제</button>
        </div>
        <div class="log-list" id="logList">
          <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="feeding-log.js"></script>
</body>
</html>
