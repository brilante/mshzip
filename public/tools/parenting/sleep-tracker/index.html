<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수면 추적기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .sleep-status { text-align: center; padding: 2rem; border-radius: 16px; margin: 1rem 0; }
    .sleep-status.awake { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .sleep-status.sleeping { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
    .status-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .status-text { font-size: 1.5rem; font-weight: 700; }
    .status-time { font-size: 2rem; font-family: monospace; margin-top: 0.5rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .log-list { max-height: 250px; overflow-y: auto; }
    .log-item { background: var(--bg-primary); padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .sleep-bar { display: flex; height: 40px; border-radius: 8px; overflow: hidden; margin: 1rem 0; background: var(--bg-primary); }
    .sleep-segment { display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: white; }
    .sleep-segment.sleep { background: #6366f1; }
    .sleep-segment.awake { background: #f59e0b; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">수면 추적기</h1>
          <p class="tool-description">아기 수면 패턴 기록</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="sleep-status awake" id="sleepStatus">
        <div class="status-icon" id="statusIcon"></div>
        <div class="status-text" id="statusText">깨어있음</div>
        <div class="status-time" id="statusTime">00:00:00</div>
        <button class="tool-btn" style="background: white; color: #6366f1; margin-top: 1rem;" onclick="SleepTracker.toggle()" id="toggleBtn" aria-label="재우기">재우기</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="todaySleep">0시간</div>
          <div class="stat-label">오늘 총 수면</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="napCount">0회</div>
          <div class="stat-label">낮잠 횟수</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgDuration">-</div>
          <div class="stat-label">평균 수면</div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">오늘의 수면 패턴</h3>
        <div class="sleep-bar" id="sleepBar">
          <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 0.85rem;">기록이 없습니다</div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary);">
          <span>00:00</span>
          <span>12:00</span>
          <span>24:00</span>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">수면 기록</h3>
          <button class="tool-btn tool-btn-secondary" onclick="SleepTracker.clearAll()" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" aria-label="초기화">초기화</button>
        </div>
        <div class="log-list" id="logList">
          <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="sleep-tracker.js"></script>
</body>
</html>
