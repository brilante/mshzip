<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출산 예정일 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .result-display { text-align: center; padding: 2rem; background: linear-gradient(135deg, #ec4899, #f472b6); border-radius: 16px; color: white; margin: 1rem 0; }
    .result-value { font-size: 2rem; font-weight: 700; }
    .result-label { font-size: 0.9rem; opacity: 0.9; margin-top: 0.25rem; }
    .result-sub { font-size: 1.25rem; margin-top: 1rem; font-weight: 600; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .progress-section { margin: 1rem 0; padding: 1rem; background: var(--bg-primary); border-radius: 8px; }
    .progress-bar { height: 16px; background: var(--bg-secondary); border-radius: 8px; overflow: hidden; margin: 0.5rem 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #ec4899, #f472b6); border-radius: 8px; }
    .trimester-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 1rem; }
    .trimester { padding: 0.75rem; background: var(--bg-secondary); border-radius: 8px; text-align: center; font-size: 0.85rem; }
    .trimester.active { background: #ec4899; color: white; }
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .mode-tab { flex: 1; padding: 0.75rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; }
    .mode-tab.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">출산 예정일 계산기</h1>
          <p class="tool-description">임신 주수 및 출산일 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="mode-tabs">
          <div class="mode-tab active" data-mode="lmp" onclick="DueDate.setMode('lmp')">마지막 생리일</div>
          <div class="mode-tab" data-mode="conception" onclick="DueDate.setMode('conception')">수정일</div>
        </div>

        <div id="lmpMode">
          <div class="input-group">
            <label class="input-label">마지막 생리 시작일 (LMP)</label>
            <input type="date" id="lmpDate" class="tool-input" onchange="DueDate.calculate()">
          </div>
        </div>

        <div id="conceptionMode" style="display: none;">
          <div class="input-group">
            <label class="input-label">수정일 (배란일)</label>
            <input type="date" id="conceptionDate" class="tool-input" onchange="DueDate.calculate()">
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">생리 주기 (일)</label>
          <input type="number" id="cycleLength" class="tool-input" value="28" min="21" max="35" onchange="DueDate.calculate()">
        </div>
      </div>

      <div class="result-display">
        <div class="result-label">출산 예정일</div>
        <div class="result-value" id="dueDate">-</div>
        <div class="result-sub" id="weeksPregnant">임신 0주 0일</div>
      </div>

      <div class="progress-section">
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
          <span>임신 진행률</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
        <div class="trimester-info">
          <div class="trimester" id="tri1">1분기<br><small>1-12주</small></div>
          <div class="trimester" id="tri2">2분기<br><small>13-27주</small></div>
          <div class="trimester" id="tri3">3분기<br><small>28-40주</small></div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="daysLeft">-</div>
          <div class="stat-label">남은 일수</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="daysPassed">-</div>
          <div class="stat-label">경과 일수</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="conceptionEst">-</div>
          <div class="stat-label">추정 수정일</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="babySize">-</div>
          <div class="stat-label">아기 크기</div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">참고 사항</h3>
        <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8;">
          <div>• 출산 예정일은 마지막 생리일 기준 280일(40주) 후입니다</div>
          <div>• 정상 출산 범위: 37주 ~ 42주</div>
          <div>• 정확한 예정일은 초음파 검사로 확인하세요</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="due-date.js"></script>
</body>
</html>
