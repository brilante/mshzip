<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계 시계 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .clock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .clock-card {
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      transition: all 0.3s;
    }
    .clock-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
      border-color: var(--tools-primary);
    }
    .city-flag {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .city-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 4px;
    }
    .city-country {
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 16px;
    }
    .clock-time {
      font-size: 42px;
      font-weight: 700;
      color: var(--tools-primary);
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      margin-bottom: 8px;
    }
    .clock-date {
      font-size: 14px;
      color: var(--tools-text-secondary);
      margin-bottom: 12px;
    }
    .clock-offset {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 20px;
      font-size: 12px;
      color: var(--tools-primary);
    }
    .day-night {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 24px;
    }
    .clock-card {
      position: relative;
    }
    .local-indicator {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 8px;
      background: var(--tools-primary);
      color: white;
      font-size: 10px;
      font-weight: 600;
      border-radius: 4px;
    }
    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .search-input {
      flex: 1;
      padding: 14px 20px;
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 10px;
      color: var(--tools-text);
      font-size: 16px;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .add-city-btn {
      padding: 14px 24px;
      background: var(--tools-primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-city-btn:hover {
      background: #2563eb;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">세계 시계</h1>
          <p class="tool-description">전 세계 주요 도시의 현재 시간을 실시간으로 확인</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="search-box">
        <input type="text" class="search-input" id="citySearch" placeholder="도시 검색..." oninput="WorldClock.filterCities(this.value)" aria-label="도시 검색...">
      </div>

      <div class="clock-grid" id="clockGrid">
        <!-- 시계 카드들이 여기에 생성됨 -->
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">세계 시계 안내</div>
      <div class="help-content">
        <ul>
          <li>전 세계 주요 도시의 현재 시간을 실시간으로 표시</li>
          <li>일광절약시간(DST) 자동 적용</li>
          <li>/ 아이콘으로 낮/밤 구분</li>
          <li>현지 시간과의 시차 표시</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="world-clock.js"></script>
</body>
</html>
