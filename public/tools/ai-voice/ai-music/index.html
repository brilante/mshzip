<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 음악 생성 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 900px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .genre-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin: 1rem 0; }
    .genre-card { padding: 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; transition: all 0.2s; }
    .genre-card:hover { border-color: var(--primary); }
    .genre-card.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .genre-icon { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .genre-name { font-size: 0.85rem; font-weight: 600; }
    .mood-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
    .mood-tag { padding: 0.5rem 1rem; border-radius: 20px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .mood-tag:hover { border-color: var(--primary); }
    .mood-tag.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .settings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
    .setting-item { background: var(--bg-primary); padding: 1rem; border-radius: 8px; }
    .setting-label { font-size: 0.85rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
    .prompt-input { min-height: 80px; resize: vertical; }
    .result-area { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1rem; }
    .music-player { background: var(--bg-secondary); padding: 1.5rem; border-radius: 12px; }
    .player-title { font-weight: 600; margin-bottom: 0.5rem; }
    .player-info { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    @media (max-width: 700px) { .genre-grid { grid-template-columns: repeat(2, 1fr); } .settings-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 음악 생성</h1>
          <p class="tool-description">AI로 맞춤형 음악 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="suno" onclick="AIMusic.selectModel('suno')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Suno AI</span>
          </div>
          <div class="model-btn" data-model="udio" onclick="AIMusic.selectModel('udio')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Udio</span>
          </div>
          <div class="model-btn" data-model="musicgen" onclick="AIMusic.selectModel('musicgen')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">MusicGen</span>
          </div>
        </div>

        <div class="section-title">장르 선택</div>
        <div class="genre-grid">
          <div class="genre-card active" data-genre="pop" onclick="AIMusic.selectGenre('pop')">
            <div class="genre-icon"></div>
            <div class="genre-name">팝</div>
          </div>
          <div class="genre-card" data-genre="rock" onclick="AIMusic.selectGenre('rock')">
            <div class="genre-icon"></div>
            <div class="genre-name">록</div>
          </div>
          <div class="genre-card" data-genre="electronic" onclick="AIMusic.selectGenre('electronic')">
            <div class="genre-icon"></div>
            <div class="genre-name">일렉트로닉</div>
          </div>
          <div class="genre-card" data-genre="jazz" onclick="AIMusic.selectGenre('jazz')">
            <div class="genre-icon"></div>
            <div class="genre-name">재즈</div>
          </div>
          <div class="genre-card" data-genre="classical" onclick="AIMusic.selectGenre('classical')">
            <div class="genre-icon"></div>
            <div class="genre-name">클래식</div>
          </div>
          <div class="genre-card" data-genre="hiphop" onclick="AIMusic.selectGenre('hiphop')">
            <div class="genre-icon"></div>
            <div class="genre-name">힙합</div>
          </div>
          <div class="genre-card" data-genre="lofi" onclick="AIMusic.selectGenre('lofi')">
            <div class="genre-icon"></div>
            <div class="genre-name">Lo-Fi</div>
          </div>
          <div class="genre-card" data-genre="ambient" onclick="AIMusic.selectGenre('ambient')">
            <div class="genre-icon"></div>
            <div class="genre-name">앰비언트</div>
          </div>
        </div>

        <div class="section-title">분위기</div>
        <div class="mood-tags">
          <div class="mood-tag active" data-mood="happy" onclick="AIMusic.toggleMood('happy')">밝은</div>
          <div class="mood-tag" data-mood="sad" onclick="AIMusic.toggleMood('sad')">슬픈</div>
          <div class="mood-tag" data-mood="energetic" onclick="AIMusic.toggleMood('energetic')">에너지</div>
          <div class="mood-tag" data-mood="calm" onclick="AIMusic.toggleMood('calm')">차분한</div>
          <div class="mood-tag" data-mood="epic" onclick="AIMusic.toggleMood('epic')">웅장한</div>
          <div class="mood-tag" data-mood="romantic" onclick="AIMusic.toggleMood('romantic')">로맨틱</div>
          <div class="mood-tag" data-mood="mysterious" onclick="AIMusic.toggleMood('mysterious')">신비로운</div>
          <div class="mood-tag" data-mood="dark" onclick="AIMusic.toggleMood('dark')">어두운</div>
        </div>

        <div class="section-title">추가 설명 (선택사항)</div>
        <textarea id="promptInput" class="tool-input prompt-input" placeholder="원하는 음악 스타일을 자세히 설명해보세요..."></textarea>

        <div class="settings-grid">
          <div class="setting-item">
            <div class="setting-label"><span>길이</span><span id="durationValue">30초</span></div>
            <input type="range" id="durationSlider" min="15" max="180" step="15" value="30" style="width: 100%;" oninput="document.getElementById('durationValue').textContent = this.value + '초'">
          </div>
          <div class="setting-item">
            <div class="setting-label"><span>템포 (BPM)</span><span id="tempoValue">120</span></div>
            <input type="range" id="tempoSlider" min="60" max="180" step="5" value="120" style="width: 100%;" oninput="document.getElementById('tempoValue').textContent = this.value">
          </div>
        </div>

        <div class="result-area" id="resultArea">
          <div style="text-align: center; color: var(--text-secondary);">생성된 음악이 여기에 표시됩니다.</div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="AIMusic.generate()" aria-label="음악 생성">
            음악 생성
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="AIMusic.download()" id="downloadBtn" disabled aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ai-music.js"></script>
</body>
</html>
