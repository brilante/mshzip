<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팟캐스트 생성 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 900px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .format-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
    .format-card { padding: 1.5rem; border-radius: 12px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; transition: all 0.2s; }
    .format-card:hover { border-color: var(--primary); }
    .format-card.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .format-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .format-name { font-weight: 600; }
    .format-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .script-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin: 1rem 0; }
    .script-item { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: flex-start; }
    .script-speaker { min-width: 100px; }
    .script-speaker select { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-secondary); }
    .script-text { flex: 1; }
    .script-text textarea { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-color); min-height: 60px; resize: vertical; }
    .add-script-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem; border: 2px dashed var(--border-color); border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; }
    .add-script-btn:hover { border-color: var(--primary); color: var(--primary); }
    .settings-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
    .setting-item { background: var(--bg-primary); padding: 1rem; border-radius: 8px; }
    .setting-label { font-size: 0.85rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
    .result-area { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1rem; text-align: center; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    @media (max-width: 700px) { .format-grid { grid-template-columns: 1fr; } .settings-row { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">팟캐스트 생성</h1>
          <p class="tool-description">AI로 팟캐스트 에피소드 제작</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="notebooklm" onclick="PodcastGen.selectModel('notebooklm')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">NotebookLM</span>
          </div>
          <div class="model-btn" data-model="elevenlabs" onclick="PodcastGen.selectModel('elevenlabs')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">ElevenLabs</span>
          </div>
          <div class="model-btn" data-model="descript" onclick="PodcastGen.selectModel('descript')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Descript</span>
          </div>
        </div>

        <div class="section-title">팟캐스트 형식</div>
        <div class="format-grid">
          <div class="format-card active" data-format="interview" onclick="PodcastGen.selectFormat('interview')">
            <div class="format-icon"></div>
            <div class="format-name">인터뷰</div>
            <div class="format-desc">호스트 + 게스트 대화</div>
          </div>
          <div class="format-card" data-format="discussion" onclick="PodcastGen.selectFormat('discussion')">
            <div class="format-icon"></div>
            <div class="format-name">토론</div>
            <div class="format-desc">다자간 의견 교환</div>
          </div>
          <div class="format-card" data-format="narration" onclick="PodcastGen.selectFormat('narration')">
            <div class="format-icon"></div>
            <div class="format-name">내레이션</div>
            <div class="format-desc">1인 스토리텔링</div>
          </div>
        </div>

        <div class="section-title">스크립트</div>
        <div class="script-section" id="scriptSection">
          <div class="script-item">
            <div class="script-speaker">
              <select>
                <option value="host">호스트</option>
                <option value="guest1">게스트 1</option>
                <option value="guest2">게스트 2</option>
                <option value="narrator">내레이터</option>
              </select>
            </div>
            <div class="script-text">
              <textarea placeholder="대사를 입력하세요...">안녕하세요, 오늘의 팟캐스트에 오신 것을 환영합니다!</textarea>
            </div>
          </div>
          <div class="script-item">
            <div class="script-speaker">
              <select>
                <option value="host">호스트</option>
                <option value="guest1" selected>게스트 1</option>
                <option value="guest2">게스트 2</option>
                <option value="narrator">내레이터</option>
              </select>
            </div>
            <div class="script-text">
              <textarea placeholder="대사를 입력하세요...">네, 초대해 주셔서 감사합니다!</textarea>
            </div>
          </div>
          <div class="add-script-btn" onclick="PodcastGen.addScript()">
            <span></span>
            <span>대사 추가</span>
          </div>
        </div>

        <div class="settings-row">
          <div class="setting-item">
            <div class="setting-label"><span>배경 음악</span></div>
            <select id="bgmSelect" style="width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-color);">
              <option value="none">없음</option>
              <option value="upbeat">밝은 분위기</option>
              <option value="calm">차분한 분위기</option>
              <option value="corporate">비즈니스</option>
              <option value="tech">테크/미래</option>
            </select>
          </div>
          <div class="setting-item">
            <div class="setting-label"><span>예상 길이</span><span id="durationValue">5분</span></div>
            <input type="range" id="durationSlider" min="1" max="30" step="1" value="5" style="width: 100%;" oninput="document.getElementById('durationValue').textContent = this.value + '분'">
          </div>
        </div>

        <div class="result-area" id="resultArea">
          <div style="color: var(--text-secondary);">생성된 팟캐스트가 여기에 표시됩니다.</div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="PodcastGen.generate()" aria-label="팟캐스트 생성">
            팟캐스트 생성
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="PodcastGen.download()" id="downloadBtn" disabled aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="podcast-gen.js"></script>
</body>
</html>
