<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speech-to-Text - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 900px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .upload-area { border: 2px dashed var(--border-color); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg-primary); }
    .upload-area:hover { border-color: var(--primary); }
    .record-section { text-align: center; padding: 2rem; }
    .record-btn { width: 100px; height: 100px; border-radius: 50%; background: #ef4444; color: white; border: none; cursor: pointer; font-size: 2.5rem; transition: all 0.2s; margin: 1rem; }
    .record-btn:hover { transform: scale(1.05); }
    .record-btn.recording { animation: pulse 1.5s infinite; background: #dc2626; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
    .record-status { font-size: 0.9rem; color: var(--text-secondary); margin-top: 1rem; }
    .record-time { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .divider { text-align: center; color: var(--text-secondary); margin: 1.5rem 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border-color); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .result-area { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; min-height: 200px; margin-top: 1.5rem; }
    .result-text { line-height: 1.8; white-space: pre-wrap; }
    .result-placeholder { color: var(--text-secondary); text-align: center; padding: 3rem; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    .lang-select { padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-primary); margin-bottom: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">Speech-to-Text</h1>
          <p class="tool-description">음성을 텍스트로 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="whisper" onclick="STT.selectModel('whisper')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Whisper</span>
          </div>
          <div class="model-btn" data-model="google-stt" onclick="STT.selectModel('google-stt')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Google STT</span>
          </div>
          <div class="model-btn" data-model="azure-stt" onclick="STT.selectModel('azure-stt')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Azure STT</span>
          </div>
        </div>

        <div class="section-title">언어 선택</div>
        <select id="langSelect" class="lang-select">
          <option value="ko-KR">한국어</option>
          <option value="en-US">English</option>
          <option value="ja-JP">日本語</option>
          <option value="zh-CN">中文</option>
        </select>

        <div class="record-section">
          <div style="font-weight: 600; margin-bottom: 1rem;">실시간 녹음</div>
          <button class="record-btn" id="recordBtn" onclick="STT.toggleRecord()" aria-label=""></button>
          <div class="record-status" id="recordStatus">버튼을 클릭하여 녹음 시작</div>
          <div class="record-time" id="recordTime">00:00</div>
        </div>

        <div class="divider">또는</div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
          <div style="font-size: 2.5rem; margin-bottom: 0.5rem;"></div>
          <div style="font-size: 1rem; font-weight: 500;">오디오 파일 업로드</div>
          <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.5rem;">MP3, WAV, M4A 지원</div>
          <input type="file" id="fileInput" accept="audio/*" style="display: none;" onchange="STT.handleFile(event)">
        </div>

        <div class="result-area">
          <div class="section-title">변환 결과</div>
          <div id="resultContent">
            <div class="result-placeholder">변환된 텍스트가 여기에 표시됩니다.</div>
          </div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-secondary" style="flex: 1;" onclick="STT.copy()" id="copyBtn" disabled aria-label="텍스트 복사">
            텍스트 복사
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="STT.download()" id="downloadBtn" disabled aria-label="TXT 다운로드">
            TXT 다운로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="stt.js"></script>
</body>
</html>
