<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 보이스 생성 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 900px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .voice-type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
    .voice-type-card { padding: 1.5rem; border-radius: 12px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; transition: all 0.2s; }
    .voice-type-card:hover { border-color: var(--primary); }
    .voice-type-card.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .voice-type-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .voice-type-name { font-weight: 600; }
    .voice-type-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .text-input { min-height: 120px; resize: vertical; }
    .settings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
    .setting-item { background: var(--bg-primary); padding: 1rem; border-radius: 8px; }
    .setting-label { font-size: 0.85rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
    .result-area { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1rem; text-align: center; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    @media (max-width: 700px) { .voice-type-grid { grid-template-columns: 1fr; } .settings-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 보이스 생성</h1>
          <p class="tool-description">다양한 AI 음성 캐릭터 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="elevenlabs" onclick="AIVoiceGen.selectModel('elevenlabs')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">ElevenLabs</span>
          </div>
          <div class="model-btn" data-model="playht" onclick="AIVoiceGen.selectModel('playht')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Play.ht</span>
          </div>
          <div class="model-btn" data-model="murf" onclick="AIVoiceGen.selectModel('murf')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Murf AI</span>
          </div>
        </div>

        <div class="section-title">음성 유형</div>
        <div class="voice-type-grid">
          <div class="voice-type-card active" data-type="narrator" onclick="AIVoiceGen.selectType('narrator')">
            <div class="voice-type-icon"></div>
            <div class="voice-type-name">내레이터</div>
            <div class="voice-type-desc">다큐멘터리, 오디오북</div>
          </div>
          <div class="voice-type-card" data-type="character" onclick="AIVoiceGen.selectType('character')">
            <div class="voice-type-icon"></div>
            <div class="voice-type-name">캐릭터</div>
            <div class="voice-type-desc">애니메이션, 게임</div>
          </div>
          <div class="voice-type-card" data-type="commercial" onclick="AIVoiceGen.selectType('commercial')">
            <div class="voice-type-icon"></div>
            <div class="voice-type-name">광고</div>
            <div class="voice-type-desc">CM, 프로모션</div>
          </div>
        </div>

        <div class="section-title">스크립트</div>
        <textarea id="textInput" class="tool-input text-input" placeholder="음성으로 생성할 텍스트를 입력하세요..."></textarea>

        <div class="settings-grid">
          <div class="setting-item">
            <div class="setting-label"><span>감정</span><span id="emotionValue">중립</span></div>
            <select id="emotionSelect" style="width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-color);" onchange="document.getElementById('emotionValue').textContent = this.options[this.selectedIndex].text">
              <option value="neutral">중립</option>
              <option value="happy">행복</option>
              <option value="sad">슬픔</option>
              <option value="excited">흥분</option>
              <option value="calm">차분</option>
            </select>
          </div>
          <div class="setting-item">
            <div class="setting-label"><span>속도</span><span id="speedValue">1.0x</span></div>
            <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1" style="width: 100%;" oninput="document.getElementById('speedValue').textContent = this.value + 'x'">
          </div>
        </div>

        <div class="result-area" id="resultArea">
          <div style="color: var(--text-secondary);">생성된 음성이 여기에 표시됩니다.</div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="AIVoiceGen.generate()" aria-label="음성 생성">
            음성 생성
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="AIVoiceGen.download()" id="downloadBtn" disabled aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ai-voice-gen.js"></script>
</body>
</html>
