<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오디오 향상 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 900px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .upload-area { border: 2px dashed var(--border-color); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg-primary); }
    .upload-area:hover { border-color: var(--primary); }
    .enhance-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1.5rem 0; }
    .enhance-option { background: var(--bg-primary); padding: 1rem; border-radius: 10px; display: flex; align-items: center; gap: 1rem; }
    .enhance-checkbox { width: 20px; height: 20px; cursor: pointer; }
    .enhance-info { flex: 1; }
    .enhance-name { font-weight: 600; font-size: 0.9rem; }
    .enhance-desc { font-size: 0.75rem; color: var(--text-secondary); }
    .audio-preview { margin: 1.5rem 0; }
    .audio-preview audio { width: 100%; }
    .preview-label { font-size: 0.85rem; margin-bottom: 0.5rem; font-weight: 500; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    @media (max-width: 600px) { .enhance-options { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">오디오 향상</h1>
          <p class="tool-description">AI로 오디오 품질 향상</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="adobe-podcast" onclick="AudioEnhance.selectModel('adobe-podcast')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Adobe Podcast</span>
          </div>
          <div class="model-btn" data-model="descript" onclick="AudioEnhance.selectModel('descript')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Descript</span>
          </div>
          <div class="model-btn" data-model="auphonic" onclick="AudioEnhance.selectModel('auphonic')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Auphonic</span>
          </div>
        </div>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <div style="font-size: 3rem; margin-bottom: 1rem;"></div>
          <div style="font-size: 1.1rem; font-weight: 500;">오디오 파일 업로드</div>
          <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.5rem;">MP3, WAV, M4A 지원</div>
          <input type="file" id="fileInput" accept="audio/*" style="display: none;" onchange="AudioEnhance.handleFile(event)">
        </div>

        <div class="section-title" style="margin-top: 1.5rem;">향상 옵션</div>
        <div class="enhance-options">
          <div class="enhance-option">
            <input type="checkbox" id="noiseReduce" class="enhance-checkbox" checked>
            <div class="enhance-info">
              <div class="enhance-name">노이즈 제거</div>
              <div class="enhance-desc">배경 소음 제거</div>
            </div>
          </div>
          <div class="enhance-option">
            <input type="checkbox" id="voiceEnhance" class="enhance-checkbox" checked>
            <div class="enhance-info">
              <div class="enhance-name">음성 향상</div>
              <div class="enhance-desc">목소리 선명도 개선</div>
            </div>
          </div>
          <div class="enhance-option">
            <input type="checkbox" id="volumeNorm" class="enhance-checkbox" checked>
            <div class="enhance-info">
              <div class="enhance-name">볼륨 정규화</div>
              <div class="enhance-desc">일정한 볼륨 유지</div>
            </div>
          </div>
          <div class="enhance-option">
            <input type="checkbox" id="echoRemove" class="enhance-checkbox">
            <div class="enhance-info">
              <div class="enhance-name">에코 제거</div>
              <div class="enhance-desc">반향 효과 제거</div>
            </div>
          </div>
        </div>

        <div class="audio-preview" id="audioPreview" style="display: none;">
          <div class="preview-label">원본</div>
          <audio id="originalAudio" controls></audio>
          <div class="preview-label" style="margin-top: 1rem;">향상된 오디오</div>
          <audio id="enhancedAudio" controls></audio>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="AudioEnhance.process()" id="processBtn" disabled aria-label="오디오 향상">
            오디오 향상
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="AudioEnhance.download()" id="downloadBtn" disabled aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="audio-enhance.js"></script>
</body>
</html>
