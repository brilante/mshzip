<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키워드 리서치 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .search-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .search-row { display: flex; gap: 1rem; }
    .search-row input { flex: 1; }
    .results-section { display: none; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg-secondary); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .keywords-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .keyword-row { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .keyword-text { flex: 1; font-weight: 500; }
    .keyword-stats { display: flex; gap: 1rem; font-size: 0.8rem; }
    .stat-item { color: var(--text-secondary); }
    .copy-keyword { background: transparent; border: none; cursor: pointer; font-size: 1rem; opacity: 0.6; }
    .copy-keyword:hover { opacity: 1; }
    .loading-indicator { display: none; justify-content: center; align-items: center; padding: 3rem; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .main-keyword-badge { background: var(--primary); color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.9rem; margin-left: 0.5rem; }
    .export-row { display: flex; justify-content: flex-end; margin-top: 1rem; }
    @media (max-width: 768px) { .stats-row { grid-template-columns: 1fr; } .keyword-stats { flex-wrap: wrap; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">키워드 리서치</h1>
          <p class="tool-description">키워드 분석 및 제안</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="search-panel">
      <div class="search-row">
        <input type="text" id="mainKeyword" class="tool-input" placeholder="분석할 키워드를 입력하세요..." onkeypress="if(event.key==='Enter')KeywordResearch.analyze()" aria-label="분석할 키워드를 입력하세요...">
        <button class="tool-btn tool-btn-primary" onclick="KeywordResearch.analyze()" aria-label="분석">분석</button>
      </div>
    </div>

    <div class="loading-indicator" id="loadingIndicator">
      <div class="loading-spinner"></div>
    </div>

    <div class="results-section" id="resultsSection">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="totalKeywords">0</div>
          <div class="stat-label">발견된 키워드</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgVolume">0</div>
          <div class="stat-label">평균 검색량</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgDifficulty">0%</div>
          <div class="stat-label">평균 난이도</div>
        </div>
      </div>

      <div class="keywords-panel">
        <div class="section-title">관련 키워드 <span class="main-keyword-badge" id="mainKeywordResult"></span></div>
        <div id="relatedKeywords"></div>
      </div>

      <div class="keywords-panel">
        <div class="section-title">롱테일 키워드</div>
        <div id="longTailKeywords"></div>
      </div>

      <div class="keywords-panel">
        <div class="section-title">질문 키워드</div>
        <div id="questionKeywords"></div>
      </div>

      <div class="export-row">
        <button class="tool-btn tool-btn-secondary" onclick="KeywordResearch.exportCSV()" aria-label="CSV 내보내기">CSV 내보내기</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="keyword-research.js"></script>
</body>
</html>
