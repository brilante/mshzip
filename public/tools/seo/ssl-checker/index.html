<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSL 인증서 검사 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .search-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .search-row { display: flex; gap: 1rem; }
    .search-row input { flex: 1; }
    .results-section { display: none; }
    .header-row { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem; }
    .checked-domain { font-size: 1.5rem; font-weight: 700; }
    .grade-badge { font-size: 2rem; font-weight: 700; padding: 0.5rem 1rem; border-radius: 12px; }
    .grade-A-plus, .grade-A { background: #dcfce7; color: #16a34a; }
    .grade-B { background: #fef9c3; color: #ca8a04; }
    .grade-C, .grade-D { background: #fed7aa; color: #ea580c; }
    .grade-F { background: #fecaca; color: #dc2626; }
    .status-badge { padding: 0.5rem 1rem; border-radius: 8px; font-weight: 500; }
    .status-badge.valid { background: #dcfce7; color: #16a34a; }
    .status-badge.warning { background: #fef3c7; color: #d97706; }
    .status-badge.invalid { background: #fecaca; color: #dc2626; }
    .content-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
    .panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .info-row { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color); }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-secondary); font-size: 0.9rem; }
    .info-value { font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }
    .check-item { padding: 0.5rem; font-size: 0.9rem; }
    .check-item.pass { color: var(--success); }
    .check-item.fail { color: var(--error); }
    .loading-indicator { display: none; justify-content: center; align-items: center; padding: 3rem; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 1000px) { .content-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">SSL 인증서 검사</h1>
          <p class="tool-description">SSL/TLS 인증서 정보 확인</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="search-panel">
      <div class="search-row">
        <input type="text" id="domainInput" class="tool-input" placeholder="도메인을 입력하세요 (예: example.com)" onkeypress="if(event.key==='Enter')SSLChecker.check()" aria-label="도메인을 입력하세요 (예: example.com)">
        <button class="tool-btn tool-btn-primary" onclick="SSLChecker.check()" aria-label="검사">검사</button>
      </div>
    </div>

    <div class="loading-indicator" id="loadingIndicator">
      <div class="loading-spinner"></div>
    </div>

    <div class="results-section" id="resultsSection">
      <div class="header-row">
        <div class="grade-badge" id="sslGrade">A+</div>
        <div>
          <div class="checked-domain" id="checkedDomain"></div>
          <div class="status-badge" id="sslStatus"></div>
        </div>
      </div>

      <div class="content-grid">
        <div class="panel">
          <div class="section-title">인증서 정보</div>
          <div class="info-row">
            <span class="info-label">발급 기관</span>
            <span class="info-value" id="issuer">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">발급일</span>
            <span class="info-value" id="issuedDate">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">만료일</span>
            <span class="info-value" id="expiryDate">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">남은 기간</span>
            <span class="info-value" id="daysUntilExpiry">-</span>
          </div>
        </div>

        <div class="panel">
          <div class="section-title">기술 세부사항</div>
          <div class="info-row">
            <span class="info-label">프로토콜</span>
            <span class="info-value" id="protocol">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">암호화 방식</span>
            <span class="info-value" id="cipher">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">키 크기</span>
            <span class="info-value" id="keySize">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">서명 알고리즘</span>
            <span class="info-value" id="signatureAlgorithm">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">시리얼 번호</span>
            <span class="info-value" id="serialNumber" style="font-size: 0.7rem;">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">SAN</span>
            <span class="info-value" id="san">-</span>
          </div>
        </div>

        <div class="panel">
          <div class="section-title">보안 체크리스트</div>
          <div id="securityChecks"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ssl-checker.js"></script>
</body>
</html>
