<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Tag 생성 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .og-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .form-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; margin-top: 1.5rem; }
    .section-title:first-child { margin-top: 0; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .code-output { font-family: monospace; font-size: 0.8rem; background: var(--bg-primary); border-radius: 8px; padding: 1rem; white-space: pre-wrap; max-height: 200px; overflow-y: auto; margin-bottom: 1rem; }
    .preview-card { border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; background: #fff; max-width: 500px; }
    .preview-image { width: 100%; height: 260px; object-fit: cover; background: #f3f4f6; display: none; }
    .preview-content { padding: 1rem; }
    .preview-sitename { font-size: 0.75rem; color: #65676b; text-transform: uppercase; }
    .preview-title { font-size: 1rem; font-weight: 600; color: #1c1e21; margin: 0.25rem 0; }
    .preview-desc { font-size: 0.85rem; color: #606770; margin-bottom: 0.25rem; }
    .preview-url { font-size: 0.75rem; color: #65676b; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 900px) { .og-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">OG Tag 생성</h1>
          <p class="tool-description">Open Graph 메타 태그 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="og-layout">
      <div class="form-panel">
        <div class="section-title">기본 정보</div>
        <div class="control-group">
          <label>페이지 제목 *</label>
          <input type="text" id="ogTitle" class="tool-input" placeholder="My Awesome Page" oninput="OGTagGen.generate()" aria-label="My Awesome Page">
        </div>
        <div class="control-group">
          <label>페이지 설명 *</label>
          <textarea id="ogDescription" class="tool-input" rows="3" placeholder="페이지에 대한 설명..." oninput="OGTagGen.generate()"></textarea>
        </div>
        <div class="control-group">
          <label>페이지 URL *</label>
          <input type="url" id="ogUrl" class="tool-input" placeholder="https://example.com/page" oninput="OGTagGen.generate()" aria-label="https://example.com/page">
        </div>
        <div class="control-group">
          <label>이미지 URL</label>
          <input type="url" id="ogImage" class="tool-input" placeholder="https://example.com/image.jpg" oninput="OGTagGen.generate()" aria-label="https://example.com/image.jpg">
        </div>

        <div class="section-title">추가 설정</div>
        <div class="row-2">
          <div class="control-group">
            <label>사이트 이름</label>
            <input type="text" id="ogSiteName" class="tool-input" placeholder="My Website" oninput="OGTagGen.generate()" aria-label="My Website">
          </div>
          <div class="control-group">
            <label>콘텐츠 유형</label>
            <select id="ogType" class="tool-input" onchange="OGTagGen.generate()">
              <option value="website">website</option>
              <option value="article">article</option>
              <option value="product">product</option>
              <option value="profile">profile</option>
              <option value="video.movie">video</option>
              <option value="music.song">music</option>
            </select>
          </div>
        </div>
        <div class="row-2">
          <div class="control-group">
            <label>언어/지역</label>
            <select id="ogLocale" class="tool-input" onchange="OGTagGen.generate()">
              <option value="ko_KR">한국어 (ko_KR)</option>
              <option value="en_US">English (en_US)</option>
              <option value="ja_JP">日本語 (ja_JP)</option>
              <option value="zh_CN">中文 (zh_CN)</option>
            </select>
          </div>
          <div class="control-group">
            <label>Twitter 카드</label>
            <select id="twitterCard" class="tool-input" onchange="OGTagGen.generate()">
              <option value="summary_large_image">Large Image</option>
              <option value="summary">Summary</option>
              <option value="player">Player</option>
            </select>
          </div>
        </div>
        <div class="control-group">
          <label>Twitter 계정 (@username)</label>
          <input type="text" id="twitterSite" class="tool-input" placeholder="@mysite" oninput="OGTagGen.generate()" aria-label="@mysite">
        </div>
      </div>

      <div class="result-panel">
        <div class="section-title">생성된 코드</div>
        <pre class="code-output" id="outputCode"></pre>
        <button class="tool-btn tool-btn-primary" onclick="OGTagGen.copy()" aria-label="코드 복사">코드 복사</button>

        <div class="section-title">미리보기 (Facebook)</div>
        <div class="preview-card">
          <img id="previewImage" class="preview-image" src="" alt="Preview">
          <div class="preview-content">
            <div class="preview-sitename" id="previewSiteName">example.com</div>
            <div class="preview-title" id="previewTitle">페이지 제목</div>
            <div class="preview-desc" id="previewDesc">페이지 설명</div>
            <div class="preview-url" id="previewUrl">example.com</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="og-tag-gen.js"></script>
</body>
</html>
