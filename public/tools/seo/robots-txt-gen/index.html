<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>robots.txt 생성 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .robots-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .form-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; margin-top: 1.5rem; }
    .section-title:first-child { margin-top: 0; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .rule-block { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .rule-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-weight: 600; }
    .remove-btn { background: transparent; border: none; color: var(--error); font-size: 1.5rem; cursor: pointer; line-height: 1; }
    .template-btns { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .template-btn { padding: 0.5rem 0.75rem; font-size: 0.8rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-primary); cursor: pointer; }
    .template-btn:hover { border-color: var(--primary); }
    .code-output { font-family: monospace; font-size: 0.85rem; background: var(--bg-primary); border-radius: 8px; padding: 1rem; white-space: pre-wrap; min-height: 300px; max-height: 400px; overflow-y: auto; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    @media (max-width: 900px) { .robots-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">robots.txt 생성</h1>
          <p class="tool-description">검색 엔진 크롤러 설정 파일</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="robots-layout">
      <div class="form-panel">
        <div class="section-title">빠른 템플릿</div>
        <div class="template-btns">
          <button class="template-btn" onclick="RobotsTxtGen.useTemplate('allow-all')" aria-label="모두 허용">모두 허용</button>
          <button class="template-btn" onclick="RobotsTxtGen.useTemplate('block-all')" aria-label="모두 차단">모두 차단</button>
          <button class="template-btn" onclick="RobotsTxtGen.useTemplate('standard')" aria-label="표준 설정">표준 설정</button>
          <button class="template-btn" onclick="RobotsTxtGen.useTemplate('wordpress')" aria-label="WordPress">WordPress</button>
        </div>

        <div class="section-title">크롤러 규칙</div>
        <div id="rulesContainer"></div>
        <button class="tool-btn tool-btn-secondary" onclick="RobotsTxtGen.addRule()" aria-label="+ 규칙 추가">+ 규칙 추가</button>

        <div class="section-title">추가 설정</div>
        <div class="control-group">
          <label>Sitemap URL</label>
          <input type="url" id="sitemapUrl" class="tool-input" placeholder="https://example.com/sitemap.xml" oninput="RobotsTxtGen.generate()" aria-label="https://example.com/sitemap.xml">
        </div>
        <div class="control-group">
          <label>Host (기본 도메인)</label>
          <input type="text" id="hostUrl" class="tool-input" placeholder="https://example.com" oninput="RobotsTxtGen.generate()" aria-label="https://example.com">
        </div>
        <div class="control-group">
          <label>Crawl-delay (초)</label>
          <select id="crawlDelay" class="tool-input" onchange="RobotsTxtGen.generate()">
            <option value="0">없음</option>
            <option value="1">1초</option>
            <option value="5">5초</option>
            <option value="10">10초</option>
            <option value="30">30초</option>
          </select>
        </div>
      </div>

      <div class="result-panel">
        <div class="section-title">생성된 robots.txt</div>
        <pre class="code-output" id="outputCode"></pre>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" onclick="RobotsTxtGen.copy()" aria-label="복사">복사</button>
          <button class="tool-btn tool-btn-secondary" onclick="RobotsTxtGen.download()" aria-label="다운로드">다운로드</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="robots-txt-gen.js"></script>
</body>
</html>
