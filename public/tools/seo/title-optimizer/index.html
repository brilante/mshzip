<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제목 최적화 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .title-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .input-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; margin-top: 1.5rem; }
    .section-title:first-child { margin-top: 0; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .length-info { display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 0.5rem; }
    .length-bar-bg { height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; margin-top: 0.5rem; }
    .length-bar { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; }
    .score-card { text-align: center; padding: 1.5rem; background: var(--bg-primary); border-radius: 12px; margin-bottom: 1.5rem; }
    .score-value { font-size: 3rem; font-weight: 700; }
    .score-label { color: var(--text-secondary); }
    .check-item { padding: 0.5rem; font-size: 0.9rem; }
    .check-item.pass { color: var(--success); }
    .check-item.fail { color: var(--warning); }
    .feedback-item { padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .feedback-item.issue { border-left: 3px solid var(--warning); }
    .feedback-item.suggestion { border-left: 3px solid var(--primary); }
    .google-preview { background: #fff; border-radius: 8px; padding: 1rem; font-family: Arial, sans-serif; }
    .preview-title { color: #1a0dab; font-size: 1.1rem; margin-bottom: 0.25rem; cursor: pointer; }
    .preview-title:hover { text-decoration: underline; }
    .preview-url { color: #006621; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .preview-desc { color: #545454; font-size: 0.85rem; line-height: 1.4; }
    .suggestions-panel { display: none; margin-top: 1.5rem; background: var(--bg-primary); border-radius: 12px; padding: 1rem; }
    .suggestion-item { display: flex; justify-content: space-between; padding: 0.75rem; border-radius: 8px; cursor: pointer; margin-bottom: 0.5rem; }
    .suggestion-item:hover { background: var(--bg-secondary); }
    .char-count { color: var(--text-secondary); font-size: 0.85rem; }
    @media (max-width: 900px) { .title-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">제목 최적화</h1>
          <p class="tool-description">SEO 제목 분석 및 최적화</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="title-layout">
      <div class="input-panel">
        <div class="section-title">제목 입력</div>
        <div class="control-group">
          <label>페이지 제목 *</label>
          <input type="text" id="titleInput" class="tool-input" placeholder="SEO에 최적화된 페이지 제목을 입력하세요" oninput="TitleOptimizer.analyze()" aria-label="SEO에 최적화된 페이지 제목을 입력하세요">
          <div class="length-info">
            <span><span id="charCount">0</span>자 / 60자 권장</span>
            <span><span id="wordCount">0</span>개 단어</span>
          </div>
          <div class="length-bar-bg">
            <div class="length-bar" id="lengthBar" style="width: 0%; background: #22c55e;"></div>
          </div>
        </div>

        <div class="control-group">
          <label>주요 키워드</label>
          <input type="text" id="keywordInput" class="tool-input" placeholder="타겟 키워드" oninput="TitleOptimizer.analyze()" aria-label="타겟 키워드">
        </div>

        <div class="control-group">
          <label>페이지 URL</label>
          <input type="text" id="urlInput" class="tool-input" placeholder="https://example.com/page" oninput="TitleOptimizer.updatePreview()" aria-label="https://example.com/page">
        </div>

        <div class="control-group">
          <label>메타 설명</label>
          <textarea id="descInput" class="tool-input" rows="3" placeholder="페이지 설명..." oninput="TitleOptimizer.updatePreview()"></textarea>
        </div>

        <button class="tool-btn tool-btn-primary" style="width:100%" onclick="TitleOptimizer.generateSuggestions()" aria-label="제목 제안 받기">제목 제안 받기</button>

        <div class="suggestions-panel" id="suggestionsPanel">
          <div class="section-title">제안된 제목</div>
          <div id="suggestionsList"></div>
        </div>
      </div>

      <div class="result-panel">
        <div class="score-card">
          <div class="score-value" id="scoreValue">0</div>
          <div class="score-label">SEO 점수</div>
        </div>

        <div class="section-title">체크리스트</div>
        <div id="checksList"></div>

        <div class="section-title">피드백</div>
        <div id="feedbackList"></div>

        <div class="section-title">Google 미리보기</div>
        <div class="google-preview">
          <div class="preview-title" id="previewTitle">페이지 제목</div>
          <div class="preview-url" id="previewUrl">https://example.com/page</div>
          <div class="preview-desc" id="previewDesc">페이지 설명이 여기에 표시됩니다.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="title-optimizer.js"></script>
</body>
</html>
