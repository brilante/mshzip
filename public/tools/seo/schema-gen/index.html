<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schema.org 생성 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .schema-layout { display: grid; grid-template-columns: 400px 1fr; gap: 1.5rem; }
    .form-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .type-selector { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .type-btn { padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .type-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .schema-form { display: none; }
    .schema-form[data-type="Article"] { display: block; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; margin-top: 1.5rem; }
    .section-title:first-child { margin-top: 0; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .code-output { font-family: monospace; font-size: 0.75rem; background: var(--bg-primary); border-radius: 8px; padding: 1rem; white-space: pre-wrap; max-height: 300px; overflow-y: auto; margin-bottom: 1rem; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    @media (max-width: 900px) { .schema-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">Schema.org 생성</h1>
          <p class="tool-description">구조화된 데이터 마크업</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="schema-layout">
      <div class="form-panel">
        <div class="type-selector">
          <button class="type-btn active" data-type="Article" onclick="SchemaGen.setType('Article')" aria-label="Article">Article</button>
          <button class="type-btn" data-type="Product" onclick="SchemaGen.setType('Product')" aria-label="Product">Product</button>
          <button class="type-btn" data-type="LocalBusiness" onclick="SchemaGen.setType('LocalBusiness')" aria-label="LocalBusiness">LocalBusiness</button>
          <button class="type-btn" data-type="FAQ" onclick="SchemaGen.setType('FAQ')" aria-label="FAQ">FAQ</button>
          <button class="type-btn" data-type="Organization" onclick="SchemaGen.setType('Organization')" aria-label="Organization">Organization</button>
        </div>

        <!-- Article Form -->
        <div class="schema-form" data-type="Article">
          <div class="control-group">
            <label>제목 *</label>
            <input type="text" id="articleTitle" class="tool-input" placeholder="기사 제목" oninput="SchemaGen.generate()" aria-label="기사 제목">
          </div>
          <div class="control-group">
            <label>설명</label>
            <textarea id="articleDesc" class="tool-input" rows="2" placeholder="기사 설명" oninput="SchemaGen.generate()"></textarea>
          </div>
          <div class="control-group">
            <label>이미지 URL</label>
            <input type="url" id="articleImage" class="tool-input" placeholder="https://..." oninput="SchemaGen.generate()" aria-label="https://...">
          </div>
          <div class="row-2">
            <div class="control-group">
              <label>저자</label>
              <input type="text" id="articleAuthor" class="tool-input" placeholder="저자명" oninput="SchemaGen.generate()" aria-label="저자명">
            </div>
            <div class="control-group">
              <label>발행사</label>
              <input type="text" id="articlePublisher" class="tool-input" placeholder="발행사명" oninput="SchemaGen.generate()" aria-label="발행사명">
            </div>
          </div>
          <div class="control-group">
            <label>발행사 로고 URL</label>
            <input type="url" id="articleLogo" class="tool-input" placeholder="https://..." oninput="SchemaGen.generate()" aria-label="https://...">
          </div>
          <div class="row-2">
            <div class="control-group">
              <label>발행일</label>
              <input type="date" id="articleDate" class="tool-input" oninput="SchemaGen.generate()">
            </div>
            <div class="control-group">
              <label>수정일</label>
              <input type="date" id="articleModified" class="tool-input" oninput="SchemaGen.generate()">
            </div>
          </div>
        </div>

        <!-- Product Form -->
        <div class="schema-form" data-type="Product">
          <div class="control-group">
            <label>제품명 *</label>
            <input type="text" id="productName" class="tool-input" placeholder="제품명" oninput="SchemaGen.generate()" aria-label="제품명">
          </div>
          <div class="control-group">
            <label>설명</label>
            <textarea id="productDesc" class="tool-input" rows="2" placeholder="제품 설명" oninput="SchemaGen.generate()"></textarea>
          </div>
          <div class="control-group">
            <label>이미지 URL</label>
            <input type="url" id="productImage" class="tool-input" placeholder="https://..." oninput="SchemaGen.generate()" aria-label="https://...">
          </div>
          <div class="control-group">
            <label>브랜드</label>
            <input type="text" id="productBrand" class="tool-input" placeholder="브랜드명" oninput="SchemaGen.generate()" aria-label="브랜드명">
          </div>
          <div class="row-2">
            <div class="control-group">
              <label>가격</label>
              <input type="number" id="productPrice" class="tool-input" placeholder="10000" oninput="SchemaGen.generate()" aria-label="10000">
            </div>
            <div class="control-group">
              <label>통화</label>
              <select id="productCurrency" class="tool-input" onchange="SchemaGen.generate()">
                <option value="KRW">KRW (원)</option>
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="JPY">JPY (¥)</option>
              </select>
            </div>
          </div>
          <div class="control-group">
            <label>재고 상태</label>
            <select id="productAvailability" class="tool-input" onchange="SchemaGen.generate()">
              <option value="InStock">재고 있음</option>
              <option value="OutOfStock">품절</option>
              <option value="PreOrder">예약 주문</option>
            </select>
          </div>
          <div class="row-2">
            <div class="control-group">
              <label>평점 (1-5)</label>
              <input type="number" id="productRating" class="tool-input" placeholder="4.5" min="1" max="5" step="0.1" oninput="SchemaGen.generate()" aria-label="4.5">
            </div>
            <div class="control-group">
              <label>리뷰 수</label>
              <input type="number" id="productReviews" class="tool-input" placeholder="100" oninput="SchemaGen.generate()" aria-label="100">
            </div>
          </div>
        </div>

        <!-- LocalBusiness Form -->
        <div class="schema-form" data-type="LocalBusiness">
          <div class="control-group">
            <label>비즈니스명 *</label>
            <input type="text" id="bizName" class="tool-input" placeholder="비즈니스명" oninput="SchemaGen.generate()" aria-label="비즈니스명">
          </div>
          <div class="control-group">
            <label>설명</label>
            <textarea id="bizDesc" class="tool-input" rows="2" placeholder="비즈니스 설명" oninput="SchemaGen.generate()"></textarea>
          </div>
          <div class="control-group">
            <label>이미지 URL</label>
            <input type="url" id="bizImage" class="tool-input" placeholder="https://..." oninput="SchemaGen.generate()" aria-label="https://...">
          </div>
          <div class="control-group">
            <label>전화번호</label>
            <input type="tel" id="bizPhone" class="tool-input" placeholder="+82-10-1234-5678" oninput="SchemaGen.generate()" aria-label="+82-10-1234-5678">
          </div>
          <div class="control-group">
            <label>거리 주소</label>
            <input type="text" id="bizStreet" class="tool-input" placeholder="도로명 주소" oninput="SchemaGen.generate()" aria-label="도로명 주소">
          </div>
          <div class="row-2">
            <div class="control-group">
              <label>도시</label>
              <input type="text" id="bizCity" class="tool-input" placeholder="서울" oninput="SchemaGen.generate()" aria-label="서울">
            </div>
            <div class="control-group">
              <label>지역</label>
              <input type="text" id="bizRegion" class="tool-input" placeholder="서울특별시" oninput="SchemaGen.generate()" aria-label="서울특별시">
            </div>
          </div>
          <div class="row-2">
            <div class="control-group">
              <label>우편번호</label>
              <input type="text" id="bizPostal" class="tool-input" placeholder="12345" oninput="SchemaGen.generate()" aria-label="12345">
            </div>
            <div class="control-group">
              <label>국가 코드</label>
              <input type="text" id="bizCountry" class="tool-input" placeholder="KR" maxlength="2" oninput="SchemaGen.generate()" aria-label="KR">
            </div>
          </div>
          <div class="row-2">
            <div class="control-group">
              <label>위도</label>
              <input type="text" id="bizLat" class="tool-input" placeholder="37.5665" oninput="SchemaGen.generate()" aria-label="37.5665">
            </div>
            <div class="control-group">
              <label>경도</label>
              <input type="text" id="bizLng" class="tool-input" placeholder="126.9780" oninput="SchemaGen.generate()" aria-label="126.9780">
            </div>
          </div>
          <div class="control-group">
            <label>영업시간</label>
            <input type="text" id="bizHours" class="tool-input" placeholder="Mo-Fr 09:00-18:00" oninput="SchemaGen.generate()" aria-label="Mo-Fr 09:00-18:00">
          </div>
        </div>

        <!-- FAQ Form -->
        <div class="schema-form" data-type="FAQ">
          <div class="control-group">
            <label>FAQ 항목 (Q: 질문 / A: 답변)</label>
            <textarea id="faqItems" class="tool-input" rows="10" placeholder="Q: 첫 번째 질문?&#10;A: 첫 번째 답변&#10;&#10;Q: 두 번째 질문?&#10;A: 두 번째 답변" oninput="SchemaGen.generate()"></textarea>
          </div>
        </div>

        <!-- Organization Form -->
        <div class="schema-form" data-type="Organization">
          <div class="control-group">
            <label>조직명 *</label>
            <input type="text" id="orgName" class="tool-input" placeholder="조직명" oninput="SchemaGen.generate()" aria-label="조직명">
          </div>
          <div class="control-group">
            <label>웹사이트 URL</label>
            <input type="url" id="orgUrl" class="tool-input" placeholder="https://..." oninput="SchemaGen.generate()" aria-label="https://...">
          </div>
          <div class="control-group">
            <label>로고 URL</label>
            <input type="url" id="orgLogo" class="tool-input" placeholder="https://..." oninput="SchemaGen.generate()" aria-label="https://...">
          </div>
          <div class="control-group">
            <label>설명</label>
            <textarea id="orgDesc" class="tool-input" rows="2" placeholder="조직 설명" oninput="SchemaGen.generate()"></textarea>
          </div>
          <div class="control-group">
            <label>전화번호</label>
            <input type="tel" id="orgPhone" class="tool-input" placeholder="+82-10-1234-5678" oninput="SchemaGen.generate()" aria-label="+82-10-1234-5678">
          </div>
          <div class="control-group">
            <label>소셜 미디어 URL (쉼표로 구분)</label>
            <input type="text" id="orgSocial" class="tool-input" placeholder="https://twitter.com/..., https://facebook.com/..." oninput="SchemaGen.generate()" aria-label="https://twitter.com/..., https://facebook.com/...">
          </div>
        </div>
      </div>

      <div class="result-panel">
        <div class="section-title">JSON-LD</div>
        <pre class="code-output" id="schemaOutput"></pre>
        <button class="tool-btn tool-btn-primary" onclick="SchemaGen.copySchema()" aria-label="JSON 복사">JSON 복사</button>

        <div class="section-title">HTML 스크립트 태그</div>
        <pre class="code-output" id="htmlPreview"></pre>
        <button class="tool-btn tool-btn-secondary" onclick="SchemaGen.copyHTML()" aria-label="HTML 복사">HTML 복사</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="schema-gen.js"></script>
</body>
</html>
