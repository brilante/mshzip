<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지 속도 분석 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .search-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .search-row { display: flex; gap: 1rem; }
    .search-row input { flex: 1; }
    .results-section { display: none; }
    .analyzed-url { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1.5rem; word-break: break-all; }
    .score-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; text-align: center; margin-bottom: 1.5rem; }
    .score-value { font-size: 4rem; font-weight: 700; }
    .score-value.good { color: #22c55e; }
    .score-value.needs-improvement { color: #f59e0b; }
    .score-value.poor { color: #ef4444; }
    .score-label { font-size: 1rem; color: var(--text-secondary); }
    .cwv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .cwv-card { background: var(--bg-secondary); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .cwv-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .cwv-name { font-size: 0.75rem; color: var(--text-secondary); }
    .metric-value { font-size: 1.5rem; font-weight: 700; }
    .metric-value.good { color: #22c55e; }
    .metric-value.needs-improvement { color: #f59e0b; }
    .metric-value.poor { color: #ef4444; }
    .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; }
    .panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .metric-item { background: var(--bg-primary); padding: 1rem; border-radius: 8px; }
    .metric-label { font-size: 0.8rem; color: var(--text-secondary); }
    .metric-val { font-size: 1.25rem; font-weight: 600; margin-top: 0.25rem; }
    .diagnostic-item { display: flex; gap: 0.75rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .diagnostic-icon { font-size: 1rem; }
    .diagnostic-title { font-weight: 500; }
    .diagnostic-savings { font-size: 0.8rem; color: var(--text-secondary); }
    .passed-item { padding: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); }
    .loading-indicator { display: none; justify-content: center; align-items: center; padding: 3rem; flex-direction: column; gap: 1rem; }
    .loading-spinner { width: 50px; height: 50px; border: 4px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    .loading-text { color: var(--text-secondary); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 900px) { .cwv-grid, .content-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">페이지 속도 분석</h1>
          <p class="tool-description">웹 페이지 성능 분석</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="search-panel">
      <div class="search-row">
        <input type="url" id="urlInput" class="tool-input" placeholder="분석할 URL을 입력하세요 (예: https://example.com)" onkeypress="if(event.key==='Enter')PageSpeed.analyze()" aria-label="분석할 URL을 입력하세요 (예: https://example.com)">
        <button class="tool-btn tool-btn-primary" onclick="PageSpeed.analyze()" aria-label="분석">분석</button>
      </div>
    </div>

    <div class="loading-indicator" id="loadingIndicator">
      <div class="loading-spinner"></div>
      <div class="loading-text">페이지 성능 분석 중...</div>
    </div>

    <div class="results-section" id="resultsSection">
      <div class="analyzed-url" id="analyzedUrl"></div>

      <div class="score-panel">
        <div class="score-value" id="performanceScore">0</div>
        <div class="score-label">성능 점수</div>
      </div>

      <div class="cwv-grid">
        <div class="cwv-card">
          <div class="cwv-label">LCP</div>
          <div class="metric-value" id="lcpValue">-</div>
          <div class="cwv-name">Largest Contentful Paint</div>
        </div>
        <div class="cwv-card">
          <div class="cwv-label">FID</div>
          <div class="metric-value" id="fidValue">-</div>
          <div class="cwv-name">First Input Delay</div>
        </div>
        <div class="cwv-card">
          <div class="cwv-label">CLS</div>
          <div class="metric-value" id="clsValue">-</div>
          <div class="cwv-name">Cumulative Layout Shift</div>
        </div>
      </div>

      <div class="content-grid">
        <div class="panel">
          <div class="section-title">상세 메트릭</div>
          <div class="metrics-grid">
            <div class="metric-item">
              <div class="metric-label">First Contentful Paint</div>
              <div class="metric-val" id="fcpValue">-</div>
            </div>
            <div class="metric-item">
              <div class="metric-label">Speed Index</div>
              <div class="metric-val" id="siValue">-</div>
            </div>
            <div class="metric-item">
              <div class="metric-label">Time to Interactive</div>
              <div class="metric-val" id="ttiValue">-</div>
            </div>
            <div class="metric-item">
              <div class="metric-label">Total Blocking Time</div>
              <div class="metric-val" id="tbtValue">-</div>
            </div>
          </div>

          <div class="section-title">개선 권장 사항</div>
          <div id="diagnosticsList"></div>
        </div>

        <div class="panel">
          <div class="section-title">통과한 감사</div>
          <div id="passedAudits"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="page-speed.js"></script>
</body>
</html>
