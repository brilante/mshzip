<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이력서 빌더 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .resume-layout { display: grid; grid-template-columns: 400px 1fr; gap: 1.5rem; }
    .form-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; max-height: 85vh; overflow-y: auto; }
    .preview-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; margin-top: 1.5rem; }
    .section-title:first-child { margin-top: 0; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    .entry-block { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; font-weight: 500; }
    .remove-btn { background: none; border: none; color: var(--error); font-size: 1.25rem; cursor: pointer; }
    .resume-preview { background: #fff; border-radius: 8px; padding: 2rem; color: #333; min-height: 600px; }
    .resume-header { text-align: center; margin-bottom: 1.5rem; }
    .resume-name { font-size: 1.75rem; font-weight: 700; margin: 0; }
    .resume-jobtitle { color: #666; font-size: 1rem; margin: 0.25rem 0; }
    .resume-contact { font-size: 0.8rem; color: #888; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .resume-section { margin-bottom: 1.5rem; }
    .section-heading { font-size: 0.9rem; font-weight: 600; border-bottom: 2px solid #333; padding-bottom: 0.5rem; margin-bottom: 0.75rem; text-transform: uppercase; }
    .resume-entry { margin-bottom: 0.75rem; }
    .entry-title { font-size: 0.9rem; }
    .entry-date { font-size: 0.75rem; color: #666; margin: 0.25rem 0; }
    .entry-desc { font-size: 0.8rem; margin: 0.25rem 0; color: #555; }
    .skills-container { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .skill-tag { background: #f0f0f0; padding: 0.2rem 0.6rem; border-radius: 15px; font-size: 0.75rem; }
    .empty { color: #aaa; font-size: 0.85rem; font-style: italic; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    @media (max-width: 1000px) { .resume-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이력서 빌더</h1>
          <p class="tool-description">전문적인 이력서 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="resume-layout">
      <div class="form-panel">
        <div class="section-title">기본 정보</div>
        <div class="control-group">
          <input type="text" id="fullName" class="tool-input" placeholder="이름" oninput="ResumeBuilder.updatePreview()" aria-label="이름">
        </div>
        <div class="control-group">
          <input type="text" id="jobTitle" class="tool-input" placeholder="직책/직함" oninput="ResumeBuilder.updatePreview()" aria-label="직책/직함">
        </div>
        <div class="row-2">
          <input type="email" id="email" class="tool-input" placeholder="이메일" oninput="ResumeBuilder.updatePreview()" aria-label="이메일">
          <input type="tel" id="phone" class="tool-input" placeholder="전화번호" oninput="ResumeBuilder.updatePreview()" aria-label="전화번호">
        </div>
        <div class="control-group">
          <input type="text" id="location" class="tool-input" placeholder="위치 (예: 서울, 대한민국)" oninput="ResumeBuilder.updatePreview()" aria-label="위치 (예: 서울, 대한민국)">
        </div>
        <div class="control-group">
          <label>자기소개</label>
          <textarea id="summary" class="tool-input" rows="3" placeholder="간단한 자기소개..." oninput="ResumeBuilder.updatePreview()"></textarea>
        </div>

        <div class="section-title">경력</div>
        <div id="experiencesList"></div>
        <button class="tool-btn tool-btn-secondary" onclick="ResumeBuilder.addExperience()" aria-label="+ 경력 추가">+ 경력 추가</button>

        <div class="section-title">학력</div>
        <div id="educationsList"></div>
        <button class="tool-btn tool-btn-secondary" onclick="ResumeBuilder.addEducation()" aria-label="+ 학력 추가">+ 학력 추가</button>

        <div class="section-title">스킬</div>
        <div class="control-group">
          <input type="text" id="skills" class="tool-input" placeholder="JavaScript, React, Node.js (쉼표로 구분)" oninput="ResumeBuilder.updatePreview()" aria-label="JavaScript, React, Node.js (쉼표로 구분)">
        </div>
      </div>

      <div class="preview-panel">
        <div class="resume-preview" id="resumePreview">
          <div class="resume-header">
            <h1 class="resume-name" id="previewName">홍길동</h1>
            <p class="resume-jobtitle" id="previewTitle">직책</p>
            <div class="resume-contact">
              <span id="previewEmail">email@example.com</span>
              <span id="previewPhone">010-1234-5678</span>
              <span id="previewLocation">서울, 대한민국</span>
            </div>
          </div>

          <div class="resume-section">
            <div class="section-heading">소개</div>
            <p id="previewSummary" class="entry-desc"></p>
          </div>

          <div class="resume-section">
            <div class="section-heading">경력</div>
            <div id="previewExperience"></div>
          </div>

          <div class="resume-section">
            <div class="section-heading">학력</div>
            <div id="previewEducation"></div>
          </div>

          <div class="resume-section">
            <div class="section-heading">스킬</div>
            <div class="skills-container" id="previewSkills"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" onclick="ResumeBuilder.printResume()" aria-label="인쇄/PDF">인쇄/PDF</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="resume-builder.js"></script>
</body>
</html>
