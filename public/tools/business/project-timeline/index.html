<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로젝트 타임라인 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .timeline-layout { display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; }
    .form-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .main-panel { display: flex; flex-direction: column; gap: 1.5rem; }
    .timeline-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .list-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .stats-row { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .stat-badge { background: var(--bg-primary); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; }
    .stat-badge span { font-weight: 600; }
    .progress-container { margin-bottom: 1rem; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .progress-bg { height: 20px; background: var(--bg-primary); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--success); border-radius: 10px; transition: width 0.3s; }
    .timeline-view { position: relative; min-height: 200px; overflow-x: auto; padding: 20px 0; }
    .timeline-months { position: relative; height: 30px; border-bottom: 1px solid var(--border-color); margin-bottom: 10px; }
    .month-label { position: absolute; font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; }
    .timeline-bars { position: relative; min-height: 150px; }
    .timeline-row { height: 40px; position: relative; margin-bottom: 8px; }
    .timeline-bar { position: absolute; height: 30px; border-radius: 6px; display: flex; align-items: center; padding: 0 10px; font-size: 0.8rem; color: white; font-weight: 500; min-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .timeline-bar.completed { opacity: 0.7; }
    .timeline-bar.pending { opacity: 0.5; }
    .bar-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--error); }
    .today-line span { position: absolute; top: -20px; left: -15px; font-size: 0.7rem; color: var(--error); }
    .empty-timeline { text-align: center; color: var(--text-secondary); padding: 3rem; }
    .milestone-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 10px; margin-bottom: 0.5rem; }
    .milestone-color { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .milestone-info { flex: 1; }
    .milestone-name { font-weight: 500; }
    .milestone-dates { font-size: 0.8rem; color: var(--text-secondary); }
    .milestone-description { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .status-select { padding: 0.25rem 0.5rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-secondary); font-size: 0.8rem; }
    .delete-btn { background: none; border: none; cursor: pointer; font-size: 1.25rem; color: var(--text-secondary); opacity: 0.5; }
    .delete-btn:hover { opacity: 1; color: var(--error); }
    .color-picker { display: flex; align-items: center; gap: 0.5rem; }
    .color-picker input[type="color"] { width: 40px; height: 36px; border: none; border-radius: 8px; cursor: pointer; }
    @media (max-width: 1000px) { .timeline-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">프로젝트 타임라인</h1>
          <p class="tool-description">프로젝트 일정 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="timeline-layout">
      <div class="form-panel">
        <div class="section-title">마일스톤 추가</div>
        <div class="control-group">
          <label>이름 *</label>
          <input type="text" id="milestoneName" class="tool-input" placeholder="마일스톤 이름" aria-label="마일스톤 이름">
        </div>
        <div class="row-2">
          <div class="control-group">
            <label>시작일 *</label>
            <input type="date" id="milestoneStart" class="tool-input">
          </div>
          <div class="control-group">
            <label>종료일 *</label>
            <input type="date" id="milestoneEnd" class="tool-input">
          </div>
        </div>
        <div class="row-2">
          <div class="control-group">
            <label>상태</label>
            <select id="milestoneStatus" class="tool-input">
              <option value="pending">대기</option>
              <option value="in-progress">진행중</option>
              <option value="completed">완료</option>
            </select>
          </div>
          <div class="control-group">
            <label>색상</label>
            <div class="color-picker">
              <input type="color" id="milestoneColor" value="#3b82f6">
            </div>
          </div>
        </div>
        <div class="control-group">
          <label>설명</label>
          <textarea id="milestoneDesc" class="tool-input" rows="2" placeholder="마일스톤 설명..."></textarea>
        </div>
        <button class="tool-btn tool-btn-primary" style="width:100%" onclick="ProjectTimeline.addMilestone()" aria-label="+ 마일스톤 추가">+ 마일스톤 추가</button>
      </div>

      <div class="main-panel">
        <div class="timeline-panel">
          <div class="section-title">프로젝트 진행률</div>
          <div class="progress-container">
            <div class="progress-label">
              <span>완료율</span>
              <span id="progressText">0%</span>
            </div>
            <div class="progress-bg">
              <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>
          </div>
          <div class="stats-row">
            <div class="stat-badge">전체 <span id="totalMilestones">0</span></div>
            <div class="stat-badge" style="color: var(--success)">완료 <span id="completedCount">0</span></div>
            <div class="stat-badge" style="color: var(--primary)">진행중 <span id="inProgressCount">0</span></div>
            <div class="stat-badge" style="color: var(--text-secondary)">대기 <span id="pendingCount">0</span></div>
          </div>

          <div class="section-title">타임라인</div>
          <div class="timeline-view" id="timelineView"></div>
        </div>

        <div class="list-panel">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <div class="section-title" style="margin:0">마일스톤 목록</div>
            <button class="tool-btn tool-btn-secondary" onclick="ProjectTimeline.clearAll()" aria-label="전체 삭제">전체 삭제</button>
          </div>
          <div id="milestoneList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="project-timeline.js"></script>
</body>
</html>
