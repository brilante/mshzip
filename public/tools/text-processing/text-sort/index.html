<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>텍스트 정렬 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">텍스트 정렬</h1>
          <p class="tool-description">줄 단위로 텍스트 정렬</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="tool-options">
      <div class="tool-option">
        <label for="sortOrder">정렬 순서:</label>
        <select id="sortOrder">
          <option value="asc">오름차순 (A → Z)</option>
          <option value="desc">내림차순 (Z → A)</option>
        </select>
      </div>
      <div class="tool-option">
        <label for="sortType">정렬 방식:</label>
        <select id="sortType">
          <option value="alpha">알파벳순</option>
          <option value="natural">자연순 (숫자 인식)</option>
          <option value="length">길이순</option>
          <option value="random">랜덤 셔플</option>
        </select>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="ignoreCase"> 대소문자 무시
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="trimLines" checked> 앞뒤 공백 제거
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="removeEmpty" checked> 빈 줄 제거
        </label>
      </div>
    </div>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 입력 패널 -->
      <div class="input-panel">
        <div class="panel-title">입력 텍스트</div>
        <textarea
          id="textInput"
          class="tool-textarea"
          placeholder="정렬할 텍스트를 입력하세요...&#10;&#10;각 줄이 하나의 항목으로 처리됩니다.&#10;예시:&#10;바나나&#10;사과&#10;오렌지&#10;포도"
          spellcheck="false"
          oninput="TextSort.liveSort()"
        ></textarea>
        <div class="tool-actions">
          <label class="tool-btn tool-btn-secondary" style="cursor: pointer;">
            파일 선택
            <input type="file" accept=".txt,.md,.csv" style="display: none;" onchange="TextSort.loadFile(this)">
          </label>
          <button class="tool-btn tool-btn-primary" onclick="TextSort.sort()" aria-label="정렬 →">
            정렬 →
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="TextSort.clear()" aria-label="초기화">
            초기화
          </button>
        </div>
      </div>

      <!-- 출력 패널 -->
      <div class="output-panel" style="position: relative;">
        <div class="panel-title">정렬 결과</div>
        <button class="copy-btn" onclick="TextSort.copyOutput()" aria-label="복사">복사</button>
        <textarea
          id="textOutput"
          class="tool-textarea"
          placeholder="정렬 결과가 여기에 표시됩니다..."
          spellcheck="false"
          readonly
        ></textarea>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-secondary" onclick="TextSort.download()" aria-label="다운로드">
            다운로드
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="TextSort.reverse()" aria-label="↕역순">
            ↕역순
          </button>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="tool-stats">
      <div class="tool-stat">
        <div class="tool-stat-value" id="statInputLines">0</div>
        <div class="tool-stat-label">입력 줄 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statOutputLines">0</div>
        <div class="tool-stat-label">출력 줄 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statRemoved">0</div>
        <div class="tool-stat-label">제거됨</div>
      </div>
    </div>

    <!-- 도움말 -->
    <div class="input-panel" style="margin-top: 16px;">
      <div class="panel-title">정렬 방식 설명</div>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; font-size: 14px; color: var(--tools-text-secondary);">
        <div>
          <strong>알파벳순</strong>
          <p style="margin: 4px 0;">유니코드 순서로 정렬<br>예: a, b, c, 가, 나, 다</p>
        </div>
        <div>
          <strong>자연순</strong>
          <p style="margin: 4px 0;">숫자를 자연스럽게 정렬<br>예: item1, item2, item10</p>
        </div>
        <div>
          <strong>길이순</strong>
          <p style="margin: 4px 0;">문자열 길이로 정렬<br>짧은 것부터 긴 것 순서</p>
        </div>
        <div>
          <strong>랜덤 셔플</strong>
          <p style="margin: 4px 0;">무작위 순서로 섞기<br>매번 다른 결과</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="text-sort.js"></script>
</body>
</html>
