<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>텍스트 역순 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">텍스트 역순</h1>
          <p class="tool-description">텍스트를 다양한 방식으로 뒤집기</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="tool-options">
      <div class="tool-option">
        <label for="reverseMode">역순 방식:</label>
        <select id="reverseMode">
          <option value="lines">줄 순서 뒤집기</option>
          <option value="chars">문자 순서 뒤집기</option>
          <option value="words">단어 순서 뒤집기</option>
          <option value="lineChars">각 줄의 문자 뒤집기</option>
          <option value="lineWords">각 줄의 단어 뒤집기</option>
        </select>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="trimLines"> 앞뒤 공백 제거
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="removeEmpty"> 빈 줄 제거
        </label>
      </div>
    </div>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 입력 패널 -->
      <div class="input-panel">
        <div class="panel-title">입력 텍스트</div>
        <textarea
          id="textInput"
          class="tool-textarea"
          placeholder="뒤집을 텍스트를 입력하세요...&#10;&#10;예시:&#10;Hello World&#10;안녕하세요&#10;1234567890"
          spellcheck="false"
          oninput="TextReverse.liveProcess()"
        ></textarea>
        <div class="tool-actions">
          <label class="tool-btn tool-btn-secondary" style="cursor: pointer;">
            파일 선택
            <input type="file" accept=".txt,.md,.csv" style="display: none;" onchange="TextReverse.loadFile(this)">
          </label>
          <button class="tool-btn tool-btn-primary" onclick="TextReverse.process()" aria-label="뒤집기 →">
            뒤집기 →
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="TextReverse.clear()" aria-label="초기화">
            초기화
          </button>
        </div>
      </div>

      <!-- 출력 패널 -->
      <div class="output-panel" style="position: relative;">
        <div class="panel-title">결과</div>
        <button class="copy-btn" onclick="TextReverse.copyOutput()" aria-label="복사">복사</button>
        <textarea
          id="textOutput"
          class="tool-textarea"
          placeholder="처리 결과가 여기에 표시됩니다..."
          spellcheck="false"
          readonly
        ></textarea>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-secondary" onclick="TextReverse.download()" aria-label="다운로드">
            다운로드
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="TextReverse.doubleReverse()" aria-label="↩다시 뒤집기">
            ↩다시 뒤집기
          </button>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="tool-stats">
      <div class="tool-stat">
        <div class="tool-stat-value" id="statLines">0</div>
        <div class="tool-stat-label">줄 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statWords">0</div>
        <div class="tool-stat-label">단어 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statChars">0</div>
        <div class="tool-stat-label">문자 수</div>
      </div>
    </div>

    <!-- 도움말 -->
    <div class="input-panel" style="margin-top: 16px;">
      <div class="panel-title">역순 방식 설명</div>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; font-size: 14px; color: var(--tools-text-secondary);">
        <div>
          <strong>줄 순서 뒤집기</strong>
          <p style="margin: 4px 0;">1, 2, 3 → 3, 2, 1<br>전체 줄의 순서를 뒤집음</p>
        </div>
        <div>
          <strong>문자 순서 뒤집기</strong>
          <p style="margin: 4px 0;">Hello → olleH<br>전체 텍스트의 모든 문자 뒤집기</p>
        </div>
        <div>
          <strong>단어 순서 뒤집기</strong>
          <p style="margin: 4px 0;">Hello World → World Hello<br>전체 텍스트의 단어 순서 뒤집기</p>
        </div>
        <div>
          <strong>각 줄의 문자 뒤집기</strong>
          <p style="margin: 4px 0;">각 줄 내에서만 문자 뒤집기<br>줄 순서는 유지</p>
        </div>
        <div>
          <strong>각 줄의 단어 뒤집기</strong>
          <p style="margin: 4px 0;">각 줄 내에서만 단어 뒤집기<br>줄 순서는 유지</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="text-reverse.js"></script>
</body>
</html>
