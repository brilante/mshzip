<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>텍스트 비교 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diff-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .diff-container {
        grid-template-columns: 1fr;
      }
    }
    .diff-result {
      background: var(--tools-bg-secondary);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      padding: 16px;
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .diff-line {
      display: block;
      padding: 2px 8px;
      margin: 1px 0;
      border-radius: 3px;
    }
    .diff-added {
      background: rgba(34, 197, 94, 0.2);
      border-left: 3px solid #22c55e;
    }
    .diff-removed {
      background: rgba(239, 68, 68, 0.2);
      border-left: 3px solid #ef4444;
    }
    .diff-unchanged {
      color: var(--tools-text-secondary);
    }
    .diff-header {
      background: var(--tools-bg-secondary);
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .inline-diff {
      display: inline;
    }
    .inline-added {
      background: rgba(34, 197, 94, 0.3);
      padding: 0 2px;
    }
    .inline-removed {
      background: rgba(239, 68, 68, 0.3);
      text-decoration: line-through;
      padding: 0 2px;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">텍스트 비교</h1>
          <p class="tool-description">두 텍스트의 차이점을 비교</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="tool-options">
      <div class="tool-option">
        <label for="diffMode">비교 모드:</label>
        <select id="diffMode">
          <option value="line">줄 단위</option>
          <option value="word">단어 단위</option>
          <option value="char">문자 단위</option>
        </select>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="ignoreCase"> 대소문자 무시
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="ignoreWhitespace"> 공백 무시
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="trimLines"> 줄 끝 공백 제거
        </label>
      </div>
    </div>

    <!-- 입력 패널 -->
    <div class="diff-container">
      <div class="input-panel">
        <div class="panel-title">원본 텍스트</div>
        <textarea
          id="textOriginal"
          class="tool-textarea"
          placeholder="원본 텍스트를 입력하세요..."
          spellcheck="false"
        ></textarea>
        <div class="tool-actions">
          <label class="tool-btn tool-btn-secondary" style="cursor: pointer;">
            파일 선택
            <input type="file" accept=".txt,.md,.json,.js,.html,.css" style="display: none;" onchange="TextDiff.loadFile(this, 'textOriginal')">
          </label>
          <button class="tool-btn tool-btn-secondary" onclick="TextDiff.paste('textOriginal')" aria-label="붙여넣기">
            붙여넣기
          </button>
        </div>
      </div>

      <div class="input-panel">
        <div class="panel-title">수정된 텍스트</div>
        <textarea
          id="textModified"
          class="tool-textarea"
          placeholder="수정된 텍스트를 입력하세요..."
          spellcheck="false"
        ></textarea>
        <div class="tool-actions">
          <label class="tool-btn tool-btn-secondary" style="cursor: pointer;">
            파일 선택
            <input type="file" accept=".txt,.md,.json,.js,.html,.css" style="display: none;" onchange="TextDiff.loadFile(this, 'textModified')">
          </label>
          <button class="tool-btn tool-btn-secondary" onclick="TextDiff.paste('textModified')" aria-label="붙여넣기">
            붙여넣기
          </button>
        </div>
      </div>
    </div>

    <!-- 액션 버튼 -->
    <div style="text-align: center; margin: 16px 0;">
      <button class="tool-btn tool-btn-primary" onclick="TextDiff.compare()" style="padding: 12px 32px; font-size: 16px;" aria-label="비교하기">
        비교하기
      </button>
      <button class="tool-btn tool-btn-secondary" onclick="TextDiff.swap()" aria-label="↔텍스트 교환">
        ↔텍스트 교환
      </button>
      <button class="tool-btn tool-btn-secondary" onclick="TextDiff.clear()" aria-label="초기화">
        초기화
      </button>
    </div>

    <!-- 결과 -->
    <div class="output-panel">
      <div class="panel-title">비교 결과</div>
      <div id="diffResult" class="diff-result">
        <span style="color: var(--tools-text-secondary);">두 텍스트를 입력하고 비교하기 버튼을 클릭하세요.</span>
      </div>
    </div>

    <!-- 통계 -->
    <div class="tool-stats">
      <div class="tool-stat">
        <div class="tool-stat-value" id="statAdded">0</div>
        <div class="tool-stat-label">추가됨</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statRemoved">0</div>
        <div class="tool-stat-label">삭제됨</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statUnchanged">0</div>
        <div class="tool-stat-label">변경없음</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statSimilarity">-</div>
        <div class="tool-stat-label">유사도</div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="text-diff.js"></script>
</body>
</html>
