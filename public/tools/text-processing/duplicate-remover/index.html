<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>중복 제거 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .duplicate-highlight {
      background: rgba(239, 68, 68, 0.2);
      padding: 2px 4px;
      border-radius: 3px;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">중복 제거</h1>
          <p class="tool-description">중복된 줄 찾기 및 제거</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="tool-options">
      <div class="tool-option">
        <label for="outputMode">출력 모드:</label>
        <select id="outputMode">
          <option value="unique">중복 제거 (고유 항목만)</option>
          <option value="duplicates">중복된 항목만</option>
          <option value="first">첫 번째 발생만 유지</option>
        </select>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="ignoreCase"> 대소문자 무시
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="trimLines" checked> 앞뒤 공백 제거
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="removeEmpty" checked> 빈 줄 제거
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="sortResult"> 결과 정렬
        </label>
      </div>
    </div>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 입력 패널 -->
      <div class="input-panel">
        <div class="panel-title">입력 텍스트</div>
        <textarea
          id="textInput"
          class="tool-textarea"
          placeholder="중복을 제거할 텍스트를 입력하세요...&#10;&#10;각 줄이 하나의 항목으로 처리됩니다.&#10;예시:&#10;사과&#10;바나나&#10;사과&#10;오렌지&#10;바나나"
          spellcheck="false"
          oninput="DuplicateRemover.liveProcess()"
        ></textarea>
        <div class="tool-actions">
          <label class="tool-btn tool-btn-secondary" style="cursor: pointer;">
            파일 선택
            <input type="file" accept=".txt,.md,.csv" style="display: none;" onchange="DuplicateRemover.loadFile(this)">
          </label>
          <button class="tool-btn tool-btn-primary" onclick="DuplicateRemover.process()" aria-label="중복 제거 →">
            중복 제거 →
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="DuplicateRemover.clear()" aria-label="초기화">
            초기화
          </button>
        </div>
      </div>

      <!-- 출력 패널 -->
      <div class="output-panel" style="position: relative;">
        <div class="panel-title">결과</div>
        <button class="copy-btn" onclick="DuplicateRemover.copyOutput()" aria-label="복사">복사</button>
        <textarea
          id="textOutput"
          class="tool-textarea"
          placeholder="처리 결과가 여기에 표시됩니다..."
          spellcheck="false"
          readonly
        ></textarea>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-secondary" onclick="DuplicateRemover.download()" aria-label="다운로드">
            다운로드
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="DuplicateRemover.showDuplicateDetails()" aria-label="중복 상세">
            중복 상세
          </button>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="tool-stats">
      <div class="tool-stat">
        <div class="tool-stat-value" id="statInputLines">0</div>
        <div class="tool-stat-label">입력 줄 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statOutputLines">0</div>
        <div class="tool-stat-label">출력 줄 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statDuplicates">0</div>
        <div class="tool-stat-label">중복 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statReduction">0%</div>
        <div class="tool-stat-label">감소율</div>
      </div>
    </div>

    <!-- 중복 상세 패널 (숨김) -->
    <div id="duplicateDetails" class="input-panel" style="margin-top: 16px; display: none;">
      <div class="panel-title">중복 상세 정보</div>
      <div id="duplicateList" style="font-size: 14px; color: var(--tools-text-secondary); max-height: 200px; overflow-y: auto;"></div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="duplicate-remover.js"></script>
</body>
</html>
