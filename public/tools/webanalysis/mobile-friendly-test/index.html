<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모바일 친화성 테스트 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .device-preview { display: flex; justify-content: center; gap: 2rem; margin: 1.5rem 0; flex-wrap: wrap; }
    .device-frame { background: #1f2937; border-radius: 20px; padding: 8px; }
    .device-frame.phone { width: 200px; }
    .device-frame.tablet { width: 300px; }
    .device-screen { background: white; border-radius: 12px; overflow: hidden; }
    .device-screen.phone { height: 350px; }
    .device-screen.tablet { height: 400px; }
    .device-label { text-align: center; margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); }
    .check-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .check-icon { font-size: 1.25rem; flex-shrink: 0; }
    .check-content { flex: 1; }
    .check-title { font-weight: 500; margin-bottom: 0.25rem; }
    .check-desc { font-size: 0.85rem; color: var(--text-secondary); }
    .result-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border-radius: 30px; font-weight: 600; font-size: 1.1rem; }
    .result-badge.pass { background: #d1fae5; color: #047857; }
    .result-badge.fail { background: #fee2e2; color: #b91c1c; }
    .tip-box { background: #fef3c7; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">모바일 친화성 테스트</h1>
          <p class="tool-description">반응형 디자인 체크</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">URL 입력</h3>
        <div style="display: flex; gap: 0.5rem;">
          <input type="url" id="urlInput" class="tool-input" placeholder="https://example.com" style="flex: 1;" aria-label="https://example.com">
          <button class="tool-btn tool-btn-primary" onclick="MobileFriendlyTest.test()" aria-label="테스트">테스트</button>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">HTML/CSS 검사 (선택)</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem;">
          HTML 코드를 붙여넣으면 모바일 친화성 요소를 검사합니다.
        </p>
        <textarea id="htmlInput" class="tool-input" rows="5" placeholder="<!DOCTYPE html>
<html>
<head>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
..."></textarea>
        <button class="tool-btn tool-btn-secondary" onclick="MobileFriendlyTest.analyzeHtml()" style="width: 100%; margin-top: 0.5rem;" aria-label="HTML 분석">HTML 분석</button>
      </div>

      <div id="resultPanel" style="display: none;">
        <div class="util-panel" style="text-align: center;">
          <div class="result-badge" id="resultBadge">
            <span id="resultIcon"></span>
            <span id="resultText">모바일 친화적</span>
          </div>
          <p style="margin-top: 0.75rem; color: var(--text-secondary);" id="resultDesc"></p>
        </div>

        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">디바이스 미리보기</h3>
          <div class="device-preview">
            <div>
              <div class="device-frame phone">
                <div class="device-screen phone" id="phonePreview" style="display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #666;">
                  URL을 입력하면 미리보기가 표시됩니다
                </div>
              </div>
              <div class="device-label">스마트폰 (375px)</div>
            </div>
            <div>
              <div class="device-frame tablet">
                <div class="device-screen tablet" id="tabletPreview" style="display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #666;">
                  URL을 입력하면 미리보기가 표시됩니다
                </div>
              </div>
              <div class="device-label">태블릿 (768px)</div>
            </div>
          </div>
        </div>

        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">체크리스트</h3>
          <div id="checkList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="mobile-friendly-test.js"></script>
</body>
</html>
