<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO 분석기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .check-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .check-icon { font-size: 1.25rem; flex-shrink: 0; }
    .check-content { flex: 1; }
    .check-title { font-weight: 500; margin-bottom: 0.25rem; }
    .check-desc { font-size: 0.85rem; color: var(--text-secondary); }
    .score-overview { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1rem; }
    .score-big { font-size: 3rem; font-weight: bold; }
    .score-big.good { color: #10b981; }
    .score-big.average { color: #f59e0b; }
    .score-big.poor { color: #ef4444; }
    .category-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .category-tab { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .category-tab:hover { border-color: var(--primary); }
    .category-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .meta-preview { background: white; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .meta-title { color: #1a0dab; font-size: 1.1rem; margin-bottom: 0.25rem; cursor: pointer; }
    .meta-url { color: #006621; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .meta-desc { color: #545454; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">SEO 분석기</h1>
          <p class="tool-description">검색 엔진 최적화 점검</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">HTML 메타 정보 분석</h3>
        <div style="margin-bottom: 0.75rem;">
          <label style="font-size: 0.85rem; color: var(--text-secondary);">페이지 제목 (title)</label>
          <input type="text" id="pageTitle" class="tool-input" placeholder="페이지 제목을 입력하세요 (권장: 50-60자)" aria-label="페이지 제목을 입력하세요 (권장: 50-60자)">
        </div>
        <div style="margin-bottom: 0.75rem;">
          <label style="font-size: 0.85rem; color: var(--text-secondary);">메타 설명 (description)</label>
          <textarea id="metaDesc" class="tool-input" rows="2" placeholder="메타 설명을 입력하세요 (권장: 150-160자)"></textarea>
        </div>
        <div style="margin-bottom: 0.75rem;">
          <label style="font-size: 0.85rem; color: var(--text-secondary);">URL (선택)</label>
          <input type="text" id="pageUrl" class="tool-input" placeholder="https://example.com/page" aria-label="https://example.com/page">
        </div>
        <div style="margin-bottom: 0.75rem;">
          <label style="font-size: 0.85rem; color: var(--text-secondary);">타겟 키워드 (쉼표로 구분)</label>
          <input type="text" id="keywords" class="tool-input" placeholder="키워드1, 키워드2, 키워드3" aria-label="키워드1, 키워드2, 키워드3">
        </div>
        <button class="tool-btn tool-btn-primary" onclick="SeoAnalyzer.analyze()" style="width: 100%;" aria-label="SEO 분석">SEO 분석</button>
      </div>

      <div id="resultPanel" style="display: none;">
        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">검색 결과 미리보기</h3>
          <div class="meta-preview">
            <div class="meta-title" id="previewTitle">페이지 제목</div>
            <div class="meta-url" id="previewUrl">https://example.com</div>
            <div class="meta-desc" id="previewDesc">메타 설명이 여기에 표시됩니다...</div>
          </div>
        </div>

        <div class="util-panel">
          <div class="score-overview">
            <div class="score-big" id="seoScore">0</div>
            <div>
              <div style="font-weight: 600; margin-bottom: 0.25rem;">SEO 점수</div>
              <div style="font-size: 0.85rem; color: var(--text-secondary);" id="scoreDesc">분석 결과</div>
            </div>
          </div>
        </div>

        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">체크리스트</h3>
          <div class="category-tabs">
            <button class="category-tab active" onclick="SeoAnalyzer.setCategory('all')" data-cat="all" aria-label="전체">전체</button>
            <button class="category-tab" onclick="SeoAnalyzer.setCategory('title')" data-cat="title" aria-label="제목">제목</button>
            <button class="category-tab" onclick="SeoAnalyzer.setCategory('description')" data-cat="description" aria-label="설명">설명</button>
            <button class="category-tab" onclick="SeoAnalyzer.setCategory('keywords')" data-cat="keywords" aria-label="키워드">키워드</button>
          </div>
          <div id="checkList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="seo-analyzer.js"></script>
</body>
</html>
