<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지 속도 테스트 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1rem; }
    .score-card { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .score-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; font-size: 1.5rem; font-weight: bold; color: white; }
    .score-circle.good { background: linear-gradient(135deg, #10b981, #059669); }
    .score-circle.average { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .score-circle.poor { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .score-label { font-size: 0.85rem; color: var(--text-secondary); }
    .metric-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .metric-name { font-weight: 500; }
    .metric-value { font-weight: bold; }
    .metric-value.good { color: #10b981; }
    .metric-value.average { color: #f59e0b; }
    .metric-value.poor { color: #ef4444; }
    .tip-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; border-left: 3px solid var(--primary); }
    .loading { text-align: center; padding: 2rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">페이지 속도 테스트</h1>
          <p class="tool-description">웹사이트 로딩 성능 분석</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">URL 입력</h3>
        <div style="display: flex; gap: 0.5rem;">
          <input type="url" id="urlInput" class="tool-input" placeholder="https://example.com" style="flex: 1;" aria-label="https://example.com">
          <button class="tool-btn tool-btn-primary" onclick="PageSpeedTest.analyze()" aria-label="분석">분석</button>
        </div>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">
          실제 Lighthouse 분석을 위해서는 Google PageSpeed Insights API가 필요합니다. 이 도구는 데모 결과를 제공합니다.
        </p>
      </div>

      <div class="util-panel loading" id="loadingPanel" style="display: none;">
        <div class="spinner"></div>
        <p>페이지 분석 중...</p>
      </div>

      <div id="resultPanel" style="display: none;">
        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">성능 점수</h3>
          <div class="score-grid">
            <div class="score-card">
              <div class="score-circle" id="perfScore">0</div>
              <div class="score-label">성능</div>
            </div>
            <div class="score-card">
              <div class="score-circle" id="accessScore">0</div>
              <div class="score-label">접근성</div>
            </div>
            <div class="score-card">
              <div class="score-circle" id="bpScore">0</div>
              <div class="score-label">모범 사례</div>
            </div>
            <div class="score-card">
              <div class="score-circle" id="seoScore">0</div>
              <div class="score-label">SEO</div>
            </div>
          </div>
        </div>

        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">핵심 성능 지표 (Core Web Vitals)</h3>
          <div id="metricsPanel"></div>
        </div>

        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">개선 제안</h3>
          <div id="suggestionsPanel"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="page-speed-test.js"></script>
</body>
</html>
