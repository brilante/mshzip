<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업타임 모니터 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="uptime-monitor.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">업타임 모니터</h1>
      <p class="tool-description">웹사이트의 가용성과 응답 시간을 모니터링합니다</p>
    </header>

    <main class="tool-content">
      <!-- URL 입력 -->
      <div class="input-section">
        <div class="url-input-group">
          <input type="url" id="urlInput" class="form-input" placeholder="https://example.com" aria-label="https://example.com">
          <button class="add-btn" onclick="UptimeMonitor.addSite()" aria-label="추가">추가</button>
        </div>
        <p class="input-hint">모니터링할 웹사이트 URL을 입력하세요</p>
      </div>

      <!-- 모니터링 목록 -->
      <div class="monitor-section">
        <div class="section-header">
          <h3 class="section-title">모니터링 사이트</h3>
          <div class="header-actions">
            <button class="action-btn" onclick="UptimeMonitor.checkAll()" aria-label="전체 확인">전체 확인</button>
            <button class="action-btn secondary" onclick="UptimeMonitor.clearAll()" aria-label="전체 삭제">전체 삭제</button>
          </div>
        </div>

        <div class="sites-list" id="sitesList">
          <div class="empty-state">
            <span class="empty-icon"></span>
            <p>모니터링할 사이트를 추가하세요</p>
          </div>
        </div>
      </div>

      <!-- 통계 요약 -->
      <div class="stats-section" id="statsSection" style="display: none;">
        <h3 class="section-title">전체 통계</h3>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-icon"></span>
            <span class="stat-value" id="totalSites">0</span>
            <span class="stat-label">사이트</span>
          </div>
          <div class="stat-card online">
            <span class="stat-icon"></span>
            <span class="stat-value" id="onlineSites">0</span>
            <span class="stat-label">온라인</span>
          </div>
          <div class="stat-card offline">
            <span class="stat-icon"></span>
            <span class="stat-value" id="offlineSites">0</span>
            <span class="stat-label">오프라인</span>
          </div>
          <div class="stat-card">
            <span class="stat-icon"></span>
            <span class="stat-value" id="avgResponseTime">0</span>
            <span class="stat-label">평균 응답(ms)</span>
          </div>
        </div>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">사용 방법</div>
        <div class="help-content">
          <ul>
            <li><strong>사이트 추가</strong>: URL을 입력하고 추가 버튼 클릭</li>
            <li><strong>상태 확인</strong>: 개별 또는 전체 사이트 상태 체크</li>
            <li><strong>응답 시간</strong>: 서버 응답까지 걸린 시간 측정</li>
            <li><strong>저장</strong>: 모니터링 목록은 브라우저에 자동 저장됩니다</li>
            <li><strong>제한</strong>: CORS 정책으로 일부 사이트는 정확한 확인이 어려울 수 있습니다</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="uptime-monitor.js"></script>
</body>
</html>
