<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>깨진 링크 검사 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="broken-link-checker.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">깨진 링크 검사</h1>
      <p class="tool-description">웹페이지의 깨진 링크(404)를 찾아냅니다</p>
    </header>

    <main class="tool-content">
      <!-- 입력 영역 -->
      <div class="input-section">
        <div class="input-tabs">
          <button class="tab-btn active" data-tab="html" onclick="BrokenLinkChecker.switchTab('html')" aria-label="HTML 검사">HTML 검사</button>
          <button class="tab-btn" data-tab="manual" onclick="BrokenLinkChecker.switchTab('manual')" aria-label="URL 목록 검사">URL 목록 검사</button>
        </div>

        <div class="tab-content active" id="htmlTab">
          <textarea id="htmlInput" class="form-textarea" placeholder="검사할 HTML 코드를 붙여넣으세요..." rows="8"></textarea>
          <button class="analyze-btn full-width" onclick="BrokenLinkChecker.analyzeHtml()" aria-label="링크 추출 및 검사">링크 추출 및 검사</button>
        </div>

        <div class="tab-content" id="manualTab">
          <textarea id="urlListInput" class="form-textarea" placeholder="검사할 URL을 한 줄에 하나씩 입력하세요...&#10;https://example.com/page1&#10;https://example.com/page2" rows="8"></textarea>
          <button class="analyze-btn full-width" onclick="BrokenLinkChecker.checkUrls()" aria-label="URL 검사">URL 검사</button>
        </div>
      </div>

      <!-- 진행 상태 -->
      <div class="progress-section" id="progressSection" style="display: none;">
        <div class="progress-header">
          <span class="progress-text" id="progressText">검사 중...</span>
          <span class="progress-count" id="progressCount">0 / 0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- 결과 영역 -->
      <div class="result-section" id="resultSection" style="display: none;">
        <!-- 요약 -->
        <div class="summary-cards">
          <div class="summary-card">
            <div class="summary-icon"></div>
            <div class="summary-value" id="totalLinks">0</div>
            <div class="summary-label">전체 링크</div>
          </div>
          <div class="summary-card success">
            <div class="summary-icon"></div>
            <div class="summary-value" id="validLinks">0</div>
            <div class="summary-label">정상</div>
          </div>
          <div class="summary-card error">
            <div class="summary-icon"></div>
            <div class="summary-value" id="brokenLinks">0</div>
            <div class="summary-label">깨진 링크</div>
          </div>
          <div class="summary-card warning">
            <div class="summary-icon"></div>
            <div class="summary-value" id="redirectLinks">0</div>
            <div class="summary-label">리다이렉트</div>
          </div>
        </div>

        <!-- 필터 -->
        <div class="filter-section">
          <button class="filter-btn active" data-filter="all" onclick="BrokenLinkChecker.filter('all')" aria-label="전체">전체</button>
          <button class="filter-btn" data-filter="broken" onclick="BrokenLinkChecker.filter('broken')" aria-label="깨진 링크만">깨진 링크만</button>
          <button class="filter-btn" data-filter="redirect" onclick="BrokenLinkChecker.filter('redirect')" aria-label="리다이렉트만">리다이렉트만</button>
          <button class="filter-btn" data-filter="valid" onclick="BrokenLinkChecker.filter('valid')" aria-label="정상만">정상만</button>
        </div>

        <!-- 링크 목록 -->
        <div class="links-list" id="linksList">
          <!-- 동적 생성 -->
        </div>

        <!-- 내보내기 -->
        <div class="export-section">
          <button class="tool-btn" onclick="BrokenLinkChecker.exportCSV()" aria-label="CSV 내보내기">CSV 내보내기</button>
          <button class="tool-btn" onclick="BrokenLinkChecker.copyBrokenLinks()" aria-label="깨진 링크 복사">깨진 링크 복사</button>
        </div>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">사용 팁</div>
        <div class="help-content">
          <ul>
            <li><strong>HTML 검사</strong>: 페이지 HTML에서 모든 링크를 추출하여 검사합니다</li>
            <li><strong>URL 목록</strong>: 직접 URL 목록을 입력하여 검사합니다</li>
            <li><strong>CORS 제한</strong>: 일부 외부 URL은 브라우저 보안 정책으로 검사가 제한될 수 있습니다</li>
            <li><strong>상태 코드</strong>: 4xx는 클라이언트 오류, 5xx는 서버 오류를 의미합니다</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="broken-link-checker.js"></script>
</body>
</html>
