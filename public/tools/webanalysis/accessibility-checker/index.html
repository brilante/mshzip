<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>접근성 검사기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="accessibility-checker.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">접근성 검사기</h1>
      <p class="tool-description">웹사이트의 WCAG 접근성 준수 여부를 검사합니다</p>
    </header>

    <main class="tool-content">
      <!-- 입력 영역 -->
      <div class="input-section">
        <div class="input-tabs">
          <button class="tab-btn active" data-tab="url" onclick="AccessibilityChecker.switchTab('url')" aria-label="URL 검사">URL 검사</button>
          <button class="tab-btn" data-tab="html" onclick="AccessibilityChecker.switchTab('html')" aria-label="HTML 검사">HTML 검사</button>
        </div>

        <div class="tab-content active" id="urlTab">
          <div class="url-input-group">
            <input type="url" id="urlInput" class="form-input" placeholder="https://example.com" aria-label="https://example.com">
            <button class="analyze-btn" onclick="AccessibilityChecker.analyzeUrl()" aria-label="검사">검사</button>
          </div>
          <p class="input-hint">※ CORS 제한으로 일부 사이트는 검사가 제한될 수 있습니다</p>
        </div>

        <div class="tab-content" id="htmlTab">
          <textarea id="htmlInput" class="form-textarea" placeholder="검사할 HTML 코드를 붙여넣으세요..." rows="10"></textarea>
          <button class="analyze-btn full-width" onclick="AccessibilityChecker.analyzeHtml()" aria-label="HTML 검사">HTML 검사</button>
        </div>
      </div>

      <!-- 결과 영역 -->
      <div class="result-section" id="resultSection" style="display: none;">
        <!-- 점수 요약 -->
        <div class="score-summary">
          <div class="score-circle">
            <svg viewBox="0 0 100 100">
              <circle class="score-bg" cx="50" cy="50" r="45"/>
              <circle class="score-fill" cx="50" cy="50" r="45" id="scoreCircle"/>
            </svg>
            <div class="score-value" id="scoreValue">0</div>
          </div>
          <div class="score-details">
            <div class="score-label">접근성 점수</div>
            <div class="score-grade" id="scoreGrade">검사 중...</div>
            <div class="score-summary-text" id="scoreSummary"></div>
          </div>
        </div>

        <!-- 카테고리별 결과 -->
        <div class="category-results" id="categoryResults">
          <!-- 동적 생성 -->
        </div>

        <!-- 상세 이슈 목록 -->
        <div class="issues-section">
          <div class="issues-header">
            <h3>발견된 이슈</h3>
            <div class="filter-btns">
              <button class="filter-btn active" data-level="all" onclick="AccessibilityChecker.filterIssues('all')" aria-label="전체">전체</button>
              <button class="filter-btn" data-level="error" onclick="AccessibilityChecker.filterIssues('error')" aria-label="오류">오류</button>
              <button class="filter-btn" data-level="warning" onclick="AccessibilityChecker.filterIssues('warning')" aria-label="경고">경고</button>
              <button class="filter-btn" data-level="notice" onclick="AccessibilityChecker.filterIssues('notice')" aria-label="알림">알림</button>
            </div>
          </div>
          <div class="issues-list" id="issuesList">
            <!-- 동적 생성 -->
          </div>
        </div>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">WCAG 가이드라인</div>
        <div class="help-content">
          <ul>
            <li><strong>인식 가능</strong>: 모든 콘텐츠는 사용자가 인식할 수 있어야 합니다 (대체 텍스트, 자막 등)</li>
            <li><strong>운용 가능</strong>: 인터페이스는 키보드로 조작 가능해야 합니다</li>
            <li><strong>이해 가능</strong>: 콘텐츠는 읽고 이해할 수 있어야 합니다</li>
            <li><strong>견고함</strong>: 다양한 보조 기술과 호환되어야 합니다</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="accessibility-checker.js"></script>
</body>
</html>
