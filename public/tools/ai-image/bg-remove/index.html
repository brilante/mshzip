<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 배경 제거 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 1000px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .model-icon { font-size: 1.2rem; }
    .model-name { font-weight: 600; }
    .upload-area { border: 2px dashed var(--border-color); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg-primary); }
    .upload-area:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
    .upload-area.drag-over { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
    .upload-text { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.5rem; }
    .upload-hint { color: var(--text-secondary); font-size: 0.85rem; }
    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
    .preview-panel { background: var(--bg-primary); border-radius: 12px; overflow: hidden; }
    .preview-header { padding: 0.75rem 1rem; background: var(--bg-secondary); font-weight: 600; font-size: 0.9rem; }
    .preview-content { height: 300px; display: flex; align-items: center; justify-content: center; position: relative; }
    .preview-content img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .preview-placeholder { color: var(--text-secondary); text-align: center; }
    .checkerboard { background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; }
    .bg-options { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .bg-option { width: 40px; height: 40px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .bg-option:hover { transform: scale(1.1); }
    .bg-option.active { border-color: var(--primary); }
    .bg-transparent { background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 10px 10px; background-position: 0 0, 0 5px, 5px -5px, -5px 0px; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; color: white; border-radius: 12px; }
    .loading-overlay.active { display: flex; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stats-row { display: flex; gap: 1rem; margin-top: 1rem; }
    .stat-item { flex: 1; background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    @media (max-width: 700px) { .preview-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }

</style>
</head>
<body>
  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 배경 제거</h1>
          <p class="tool-description">AI가 자동으로 이미지 배경 제거</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="removebg" onclick="BGRemove.selectModel('removebg')">
            <span class="model-icon"></span>
            <span class="model-name">Remove.bg</span>
          </div>
          <div class="model-btn" data-model="rembg" onclick="BGRemove.selectModel('rembg')">
            <span class="model-icon"></span>
            <span class="model-name">Rembg (U2Net)</span>
          </div>
          <div class="model-btn" data-model="photoroom" onclick="BGRemove.selectModel('photoroom')">
            <span class="model-icon"></span>
            <span class="model-name">PhotoRoom AI</span>
          </div>
        </div>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon"></div>
          <div class="upload-text">이미지를 드래그하거나 클릭하여 업로드</div>
          <div class="upload-hint">PNG, JPG, WEBP 지원 (최대 10MB)</div>
          <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="BGRemove.handleFile(event)">
        </div>

        <div class="preview-grid" id="previewGrid" style="display: none;">
          <div class="preview-panel">
            <div class="preview-header">원본 이미지</div>
            <div class="preview-content">
              <img id="originalImage" src="" alt="Original">
            </div>
          </div>
          <div class="preview-panel">
            <div class="preview-header">배경 제거 결과</div>
            <div class="preview-content checkerboard" id="resultContainer">
              <div class="preview-placeholder" id="resultPlaceholder">
                <div style="font-size: 2rem; margin-bottom: 0.5rem;"></div>
                <div>처리 대기 중</div>
              </div>
              <img id="resultImage" src="" alt="Result" style="display: none;">
              <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div>배경 제거 중...</div>
              </div>
            </div>
          </div>
        </div>

        <div class="section-title" style="margin-top: 1.5rem;">새 배경 선택</div>
        <div class="bg-options">
          <div class="bg-option bg-transparent active" data-bg="transparent" onclick="BGRemove.selectBg('transparent')" title="투명"></div>
          <div class="bg-option" data-bg="#ffffff" style="background: #ffffff;" onclick="BGRemove.selectBg('#ffffff')" title="흰색"></div>
          <div class="bg-option" data-bg="#000000" style="background: #000000;" onclick="BGRemove.selectBg('#000000')" title="검정"></div>
          <div class="bg-option" data-bg="#3b82f6" style="background: #3b82f6;" onclick="BGRemove.selectBg('#3b82f6')" title="파랑"></div>
          <div class="bg-option" data-bg="#ef4444" style="background: #ef4444;" onclick="BGRemove.selectBg('#ef4444')" title="빨강"></div>
          <div class="bg-option" data-bg="#22c55e" style="background: #22c55e;" onclick="BGRemove.selectBg('#22c55e')" title="초록"></div>
          <div class="bg-option" data-bg="#f59e0b" style="background: #f59e0b;" onclick="BGRemove.selectBg('#f59e0b')" title="주황"></div>
          <div class="bg-option" data-bg="gradient" style="background: linear-gradient(135deg, #667eea, #764ba2);" onclick="BGRemove.selectBg('gradient')" title="그라디언트"></div>
        </div>

        <div class="stats-row" id="statsRow" style="display: none;">
          <div class="stat-item">
            <div class="stat-value" id="processingTime">0ms</div>
            <div class="stat-label">처리 시간</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="originalSize">0 KB</div>
            <div class="stat-label">원본 크기</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="resultSize">0 KB</div>
            <div class="stat-label">결과 크기</div>
          </div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="BGRemove.process()" id="processBtn" disabled aria-label="배경 제거">
            배경 제거
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="BGRemove.download()" id="downloadBtn" disabled aria-label="다운로드">
            다운로드
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="BGRemove.reset()" aria-label="초기화">
            초기화
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="bg-remove.js"></script>
</body>
</html>
