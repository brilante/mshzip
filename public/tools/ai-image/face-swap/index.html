<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 얼굴 교체 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 1000px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .upload-panel { background: var(--bg-primary); border-radius: 12px; overflow: hidden; }
    .upload-header { padding: 0.75rem 1rem; background: var(--bg-secondary); font-weight: 600; font-size: 0.9rem; }
    .upload-area { height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 2px dashed transparent; transition: all 0.2s; }
    .upload-area:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
    .upload-area.has-image { border: none; }
    .upload-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .result-panel { margin-top: 1.5rem; background: var(--bg-primary); border-radius: 12px; overflow: hidden; }
    .result-content { height: 350px; display: flex; align-items: center; justify-content: center; position: relative; }
    .result-content img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; color: white; }
    .loading-overlay.active { display: flex; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .warning-box { background: rgba(245, 158, 11, 0.1); border: 1px solid #f59e0b; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: #b45309; }
    @media (max-width: 700px) { .upload-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }

</style>
</head>
<body>
  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 얼굴 교체</h1>
          <p class="tool-description">AI로 이미지 속 얼굴 교체</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="warning-box">
          <strong>주의:</strong> 이 도구는 교육 및 엔터테인먼트 목적으로만 사용하세요. 타인의 동의 없이 사용하거나 불법적인 목적으로 사용하는 것은 금지됩니다.
        </div>

        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="insightface" onclick="FaceSwap.selectModel('insightface')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">InsightFace</span>
          </div>
          <div class="model-btn" data-model="simswap" onclick="FaceSwap.selectModel('simswap')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">SimSwap</span>
          </div>
          <div class="model-btn" data-model="facefusion" onclick="FaceSwap.selectModel('facefusion')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">FaceFusion</span>
          </div>
        </div>

        <div class="upload-grid">
          <div class="upload-panel">
            <div class="upload-header">원본 이미지 (얼굴이 교체될 이미지)</div>
            <div class="upload-area" id="sourceArea" onclick="document.getElementById('sourceInput').click()">
              <div style="font-size: 2.5rem; margin-bottom: 0.5rem;"></div>
              <div style="font-size: 0.9rem;">클릭하여 업로드</div>
              <input type="file" id="sourceInput" accept="image/*" style="display: none;" onchange="FaceSwap.handleSource(event)">
            </div>
          </div>
          <div class="upload-panel">
            <div class="upload-header">교체할 얼굴 이미지</div>
            <div class="upload-area" id="targetArea" onclick="document.getElementById('targetInput').click()">
              <div style="font-size: 2.5rem; margin-bottom: 0.5rem;"></div>
              <div style="font-size: 0.9rem;">클릭하여 업로드</div>
              <input type="file" id="targetInput" accept="image/*" style="display: none;" onchange="FaceSwap.handleTarget(event)">
            </div>
          </div>
        </div>

        <div class="result-panel" id="resultPanel" style="display: none;">
          <div class="upload-header">결과</div>
          <div class="result-content" id="resultContent">
            <div style="color: var(--text-secondary); text-align: center;">
              <div style="font-size: 2rem; margin-bottom: 0.5rem;"></div>
              <div>처리 대기 중</div>
            </div>
            <img id="resultImage" src="" alt="Result" style="display: none;">
            <div class="loading-overlay" id="loadingOverlay">
              <div class="loading-spinner"></div>
              <div>얼굴 교체 중...</div>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="FaceSwap.process()" id="processBtn" disabled aria-label="얼굴 교체">
            얼굴 교체
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="FaceSwap.download()" id="downloadBtn" disabled aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="face-swap.js"></script>
</body>
</html>
