<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 사진 향상 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 1000px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .upload-area { border: 2px dashed var(--border-color); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg-primary); }
    .upload-area:hover { border-color: var(--primary); }
    .enhance-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin: 1.5rem 0; }
    .enhance-btn { padding: 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; transition: all 0.2s; }
    .enhance-btn:hover { border-color: var(--primary); }
    .enhance-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .enhance-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .enhance-name { font-size: 0.85rem; font-weight: 600; }
    .preview-container { position: relative; margin-top: 1.5rem; border-radius: 12px; overflow: hidden; background: var(--bg-primary); }
    .preview-image { width: 100%; height: 400px; object-fit: contain; }
    .compare-slider { position: absolute; inset: 0; overflow: hidden; }
    .compare-before, .compare-after { position: absolute; inset: 0; }
    .compare-before img, .compare-after img { width: 100%; height: 100%; object-fit: contain; }
    .compare-before { clip-path: inset(0 50% 0 0); }
    .compare-divider { position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; background: white; transform: translateX(-50%); cursor: ew-resize; z-index: 10; }
    .compare-divider::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 0.5rem; border-radius: 50%; font-size: 0.6rem; color: #333; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; color: white; z-index: 20; }
    .loading-overlay.active { display: flex; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 700px) { .enhance-options { grid-template-columns: repeat(2, 1fr); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }

</style>
</head>
<body>
  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 사진 향상</h1>
          <p class="tool-description">AI로 사진 품질 자동 향상</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="remini" onclick="PhotoEnhance.selectModel('remini')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Remini AI</span>
          </div>
          <div class="model-btn" data-model="luminar" onclick="PhotoEnhance.selectModel('luminar')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Luminar Neo</span>
          </div>
          <div class="model-btn" data-model="pixelmator" onclick="PhotoEnhance.selectModel('pixelmator')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Pixelmator Pro</span>
          </div>
        </div>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <div style="font-size: 3rem; margin-bottom: 1rem;"></div>
          <div style="font-size: 1.1rem; font-weight: 500; margin-bottom: 0.5rem;">이미지를 드래그하거나 클릭하여 업로드</div>
          <div style="color: var(--text-secondary); font-size: 0.85rem;">PNG, JPG, WEBP 지원</div>
          <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="PhotoEnhance.handleFile(event)">
        </div>

        <div class="section-title" style="margin-top: 1.5rem;">향상 옵션</div>
        <div class="enhance-options">
          <div class="enhance-btn active" data-enhance="auto" onclick="PhotoEnhance.selectEnhance('auto')">
            <div class="enhance-icon"></div>
            <div class="enhance-name">자동 향상</div>
          </div>
          <div class="enhance-btn" data-enhance="denoise" onclick="PhotoEnhance.selectEnhance('denoise')">
            <div class="enhance-icon"></div>
            <div class="enhance-name">노이즈 제거</div>
          </div>
          <div class="enhance-btn" data-enhance="sharpen" onclick="PhotoEnhance.selectEnhance('sharpen')">
            <div class="enhance-icon"></div>
            <div class="enhance-name">선명하게</div>
          </div>
          <div class="enhance-btn" data-enhance="color" onclick="PhotoEnhance.selectEnhance('color')">
            <div class="enhance-icon"></div>
            <div class="enhance-name">색상 보정</div>
          </div>
          <div class="enhance-btn" data-enhance="portrait" onclick="PhotoEnhance.selectEnhance('portrait')">
            <div class="enhance-icon"></div>
            <div class="enhance-name">인물 보정</div>
          </div>
          <div class="enhance-btn" data-enhance="hdr" onclick="PhotoEnhance.selectEnhance('hdr')">
            <div class="enhance-icon"></div>
            <div class="enhance-name">HDR 효과</div>
          </div>
          <div class="enhance-btn" data-enhance="restore" onclick="PhotoEnhance.selectEnhance('restore')">
            <div class="enhance-icon"></div>
            <div class="enhance-name">오래된 사진 복원</div>
          </div>
          <div class="enhance-btn" data-enhance="deblur" onclick="PhotoEnhance.selectEnhance('deblur')">
            <div class="enhance-icon"></div>
            <div class="enhance-name">흐림 제거</div>
          </div>
        </div>

        <div class="preview-container" id="previewContainer" style="display: none;">
          <div class="compare-slider" id="compareSlider">
            <div class="compare-after"><img id="afterImage" src="" alt="After"></div>
            <div class="compare-before"><img id="beforeImage" src="" alt="Before"></div>
            <div class="compare-divider" id="compareDivider"></div>
          </div>
          <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div>향상 처리 중...</div>
          </div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="PhotoEnhance.process()" id="processBtn" disabled aria-label="사진 향상">
            사진 향상
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="PhotoEnhance.download()" id="downloadBtn" disabled aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="photo-enhance.js"></script>
</body>
</html>
