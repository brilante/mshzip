<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 스타일 변환 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .ai-container { max-width: 1000px; margin: 0 auto; }
    .ai-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .model-btn { padding: 0.6rem 1rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .model-btn:hover { border-color: var(--primary); }
    .model-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .upload-area { border: 2px dashed var(--border-color); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg-primary); }
    .upload-area:hover { border-color: var(--primary); }
    .style-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin: 1.5rem 0; }
    .style-card { border-radius: 12px; overflow: hidden; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; background: var(--bg-primary); }
    .style-card:hover { transform: scale(1.02); }
    .style-card.active { border-color: var(--primary); }
    .style-preview { height: 80px; background-size: cover; background-position: center; }
    .style-name { padding: 0.5rem; text-align: center; font-size: 0.8rem; font-weight: 500; }
    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
    .preview-panel { background: var(--bg-primary); border-radius: 12px; overflow: hidden; }
    .preview-header { padding: 0.75rem 1rem; background: var(--bg-secondary); font-weight: 600; font-size: 0.9rem; }
    .preview-content { height: 300px; display: flex; align-items: center; justify-content: center; position: relative; }
    .preview-content img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .strength-slider { margin-top: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; }
    .action-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .premium-badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
    .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; color: white; }
    .loading-overlay.active { display: flex; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 700px) { .preview-grid { grid-template-columns: 1fr; } .style-grid { grid-template-columns: repeat(2, 1fr); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }

</style>
</head>
<body>
  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">AI 스타일 변환</h1>
          <p class="tool-description">사진을 예술 작품 스타일로 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <span class="premium-badge">Premium</span>
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="ai-container">
      <div class="ai-panel">
        <div class="section-title">AI 모델 선택</div>
        <div class="model-selector">
          <div class="model-btn active" data-model="neural-style" onclick="StyleTransfer.selectModel('neural-style')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Neural Style</span>
          </div>
          <div class="model-btn" data-model="arbitrary-style" onclick="StyleTransfer.selectModel('arbitrary-style')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">Arbitrary Style</span>
          </div>
          <div class="model-btn" data-model="clip-styler" onclick="StyleTransfer.selectModel('clip-styler')">
            <span style="font-size: 1.2rem;"></span>
            <span style="font-weight: 600;">CLIP Styler</span>
          </div>
        </div>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <div style="font-size: 3rem; margin-bottom: 1rem;"></div>
          <div style="font-size: 1.1rem; font-weight: 500; margin-bottom: 0.5rem;">이미지를 드래그하거나 클릭하여 업로드</div>
          <div style="color: var(--text-secondary); font-size: 0.85rem;">PNG, JPG, WEBP 지원</div>
          <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="StyleTransfer.handleFile(event)">
        </div>

        <div class="section-title" style="margin-top: 1.5rem;">스타일 선택</div>
        <div class="style-grid">
          <div class="style-card active" data-style="vangogh" onclick="StyleTransfer.selectStyle('vangogh')">
            <div class="style-preview" style="background: linear-gradient(45deg, #1a4b8e, #f4d03f, #2980b9);"></div>
            <div class="style-name">반 고흐</div>
          </div>
          <div class="style-card" data-style="picasso" onclick="StyleTransfer.selectStyle('picasso')">
            <div class="style-preview" style="background: linear-gradient(135deg, #e74c3c, #3498db, #f39c12);"></div>
            <div class="style-name">피카소</div>
          </div>
          <div class="style-card" data-style="monet" onclick="StyleTransfer.selectStyle('monet')">
            <div class="style-preview" style="background: linear-gradient(to right, #a8e6cf, #dcedc1, #ffd3b6);"></div>
            <div class="style-name">모네</div>
          </div>
          <div class="style-card" data-style="ukiyoe" onclick="StyleTransfer.selectStyle('ukiyoe')">
            <div class="style-preview" style="background: linear-gradient(to bottom, #2c3e50, #3498db, #ecf0f1);"></div>
            <div class="style-name">우키요에</div>
          </div>
          <div class="style-card" data-style="anime" onclick="StyleTransfer.selectStyle('anime')">
            <div class="style-preview" style="background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb);"></div>
            <div class="style-name">애니메</div>
          </div>
          <div class="style-card" data-style="sketch" onclick="StyleTransfer.selectStyle('sketch')">
            <div class="style-preview" style="background: linear-gradient(45deg, #dfe6e9, #b2bec3, #636e72);"></div>
            <div class="style-name">스케치</div>
          </div>
          <div class="style-card" data-style="watercolor" onclick="StyleTransfer.selectStyle('watercolor')">
            <div class="style-preview" style="background: linear-gradient(to right, #74b9ff, #a29bfe, #fd79a8);"></div>
            <div class="style-name">수채화</div>
          </div>
          <div class="style-card" data-style="cyberpunk" onclick="StyleTransfer.selectStyle('cyberpunk')">
            <div class="style-preview" style="background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);"></div>
            <div class="style-name">사이버펑크</div>
          </div>
        </div>

        <div class="strength-slider">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 0.9rem; font-weight: 600;">스타일 강도</span>
            <span id="strengthValue">70%</span>
          </div>
          <input type="range" id="strengthSlider" min="10" max="100" value="70" style="width: 100%; margin-top: 0.5rem;" oninput="document.getElementById('strengthValue').textContent = this.value + '%'">
        </div>

        <div class="preview-grid" id="previewGrid" style="display: none;">
          <div class="preview-panel">
            <div class="preview-header">원본</div>
            <div class="preview-content">
              <img id="originalImage" src="" alt="Original">
            </div>
          </div>
          <div class="preview-panel">
            <div class="preview-header">스타일 적용</div>
            <div class="preview-content" id="resultContainer">
              <div style="color: var(--text-secondary); text-align: center;">
                <div style="font-size: 2rem; margin-bottom: 0.5rem;"></div>
                <div>처리 대기 중</div>
              </div>
              <img id="resultImage" src="" alt="Result" style="display: none;">
              <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div>스타일 변환 중...</div>
              </div>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="StyleTransfer.process()" id="processBtn" disabled aria-label="스타일 변환">
            스타일 변환
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="StyleTransfer.download()" id="downloadBtn" disabled aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="style-transfer.js"></script>
</body>
</html>
