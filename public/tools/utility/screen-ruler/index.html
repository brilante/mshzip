<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화면 눈금자 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .ruler-container { position: relative; margin-top: 1rem; }
    .ruler-horizontal { height: 60px; background: var(--bg-primary); border-radius: 8px; position: relative; overflow: hidden; }
    .ruler-vertical { width: 60px; height: 300px; background: var(--bg-primary); border-radius: 8px; position: relative; overflow: hidden; margin-top: 1rem; }
    .ruler-marks { position: absolute; width: 100%; height: 100%; }
    .ruler-mark { position: absolute; background: var(--text-secondary); }
    .ruler-label { position: absolute; font-size: 10px; color: var(--text-secondary); }
    .measure-area { border: 2px dashed var(--primary); border-radius: 8px; margin-top: 1rem; position: relative; min-height: 200px; display: flex; align-items: center; justify-content: center; }
    .measure-info { text-align: center; }
    .measure-size { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .measure-unit { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .screen-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .info-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; text-align: center; }
    .info-value { font-size: 1.25rem; font-weight: 600; color: var(--primary); }
    .info-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .unit-selector { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .unit-btn { padding: 0.5rem 1rem; border-radius: 6px; background: var(--bg-primary); cursor: pointer; transition: all 0.2s; }
    .unit-btn.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">화면 눈금자</h1>
          <p class="tool-description">화면 크기 및 픽셀 측정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">화면 정보</h3>
        <div class="screen-info" id="screenInfo"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">수평 눈금자</h3>
        <div class="unit-selector">
          <div class="unit-btn active" data-unit="px" onclick="ScreenRuler.setUnit('px')">픽셀 (px)</div>
          <div class="unit-btn" data-unit="cm" onclick="ScreenRuler.setUnit('cm')">센티미터 (cm)</div>
          <div class="unit-btn" data-unit="in" onclick="ScreenRuler.setUnit('in')">인치 (in)</div>
        </div>
        <div class="ruler-horizontal" id="rulerHorizontal"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">측정 영역</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
          아래 영역 크기를 드래그하여 조절할 수 있습니다
        </p>
        <div class="measure-area" id="measureArea" style="width: 300px; height: 200px; resize: both; overflow: auto;">
          <div class="measure-info">
            <div class="measure-size" id="measureSize">300 × 200</div>
            <div class="measure-unit" id="measureUnit">픽셀 (px)</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="screen-ruler.js"></script>
</body>
</html>
