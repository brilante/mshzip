<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클립보드 관리자 - 유틸리티</title>
    <link rel="stylesheet" href="clipboard-manager.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>클립보드 관리자</h1>
            <p>자주 사용하는 텍스트를 저장하고 관리하세요</p>
        </header>

        <div class="add-section card">
            <textarea id="newClip" placeholder="저장할 텍스트를 입력하세요"></textarea>
            <div class="add-row">
                <input type="text" id="clipLabel" placeholder="라벨 (선택)" aria-label="라벨 (선택)">
                <button id="addClip" aria-label="저장">저장</button>
                <button id="pasteFromClipboard" class="btn-secondary" aria-label="클립보드에서 붙여넣기">클립보드에서 붙여넣기</button>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchClip" placeholder="클립 검색..." aria-label="클립 검색...">
        </div>

        <div class="clips-section">
            <div class="section-header">
                <h3>저장된 클립 (<span id="clipCount">0</span>개)</h3>
                <button id="clearAll" class="btn-danger" aria-label="전체 삭제">전체 삭제</button>
            </div>
            <div id="clipsList"></div>
        </div>
    </div>
    <script src="clipboard-manager.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
