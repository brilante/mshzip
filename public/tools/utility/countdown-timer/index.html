<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운트다운 타이머 - 유틸리티</title>
    <link rel="stylesheet" href="countdown-timer.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>카운트다운 타이머</h1>
            <p>중요한 날까지 남은 시간을 확인하세요</p>
        </header>

        <div class="add-timer card">
            <h3>새 타이머 추가</h3>
            <div class="form-row">
                <input type="text" id="timerName" placeholder="이벤트 이름" aria-label="이벤트 이름">
                <input type="datetime-local" id="timerDate">
            </div>
            <button id="addTimer" aria-label="타이머 추가">타이머 추가</button>
        </div>

        <div id="timersList" class="timers-list"></div>
    </div>
    <script src="countdown-timer.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
