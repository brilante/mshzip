<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나이 계산기 - 유틸리티</title>
    <link rel="stylesheet" href="age-calculator.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>나이 계산기</h1>
            <p>생년월일로 정확한 나이를 계산하세요</p>
        </header>

        <div class="input-card card">
            <label>생년월일</label>
            <input type="date" id="birthDate">
            <button id="calculateBtn" aria-label="계산하기">계산하기</button>
        </div>

        <div class="results" id="results" style="display: none;">
            <div class="result-card card main-result">
                <h3>만 나이</h3>
                <div class="big-number" id="ageYears">0</div>
                <div class="detail" id="ageDetail">0년 0개월 0일</div>
            </div>

            <div class="result-grid">
                <div class="result-card card">
                    <h4>한국 나이</h4>
                    <div class="number" id="koreanAge">0</div>
                    <div class="label">세</div>
                </div>
                <div class="result-card card">
                    <h4>살아온 날</h4>
                    <div class="number" id="daysLived">0</div>
                    <div class="label">일</div>
                </div>
                <div class="result-card card">
                    <h4>살아온 주</h4>
                    <div class="number" id="weeksLived">0</div>
                    <div class="label">주</div>
                </div>
                <div class="result-card card">
                    <h4>살아온 시간</h4>
                    <div class="number" id="hoursLived">0</div>
                    <div class="label">시간</div>
                </div>
            </div>

            <div class="result-card card">
                <h3>다음 생일까지</h3>
                <div class="birthday-countdown">
                    <span id="daysUntilBirthday">0</span>일 남음
                </div>
                <div class="next-birthday" id="nextBirthday">2025년 1월 1일</div>
            </div>

            <div class="result-card card">
                <h3>탄생 정보</h3>
                <div class="birth-info">
                    <p><strong>탄생 요일:</strong> <span id="birthDay">월요일</span></p>
                    <p><strong>띠:</strong> <span id="zodiacChinese">용띠</span></p>
                    <p><strong>별자리:</strong> <span id="zodiacWestern">양자리</span></p>
                </div>
            </div>
        </div>
    </div>
    <script src="age-calculator.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
