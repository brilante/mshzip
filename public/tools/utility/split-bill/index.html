<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; margin-top: 0.5rem; }
    .person-badge { background: var(--bg-primary); border-radius: 8px; padding: 0.5rem 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .person-remove { opacity: 0.5; cursor: pointer; font-size: 0.75rem; }
    .person-remove:hover { opacity: 1; }
    .result-panel { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; margin-top: 1rem; }
    .result-total { font-size: 0.9rem; opacity: 0.9; margin-bottom: 0.5rem; }
    .result-amount { font-size: 2rem; font-weight: 700; }
    .result-note { font-size: 0.85rem; opacity: 0.8; margin-top: 0.5rem; }
    .people-section { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color); }
    .add-person-row { display: flex; gap: 0.5rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">더치페이 계산기</h1>
          <p class="tool-description">N분의 1 정산 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="input-group">
          <div class="input-label">총 금액 (원)</div>
          <input type="number" id="totalAmount" class="tool-input" placeholder="예: 50000" min="0" oninput="SplitBill.calculate()" aria-label="예: 50000">
        </div>

        <div class="input-group">
          <div class="input-label">인원 수</div>
          <input type="number" id="peopleCount" class="tool-input" placeholder="예: 4" min="1" oninput="SplitBill.calculate()" aria-label="예: 4">
        </div>

        <div class="people-section">
          <div class="input-label">참여자 (선택)</div>
          <div class="add-person-row">
            <input type="text" id="personName" class="tool-input" placeholder="이름 입력" onkeypress="if(event.key==='Enter') SplitBill.addPerson()" aria-label="이름 입력">
            <button class="tool-btn tool-btn-secondary" onclick="SplitBill.addPerson()" aria-label="추가">추가</button>
          </div>
          <div class="people-grid" id="peopleGrid"></div>
        </div>
      </div>

      <div class="result-panel" id="resultPanel" style="display: none;">
        <div class="result-total">총 금액: <span id="resultTotal">0</span>원 ÷ <span id="resultPeople">0</span>명</div>
        <div class="result-amount">1인당 <span id="resultAmount">0</span>원</div>
        <div class="result-note" id="resultNote"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <button class="tool-btn tool-btn-primary" onclick="SplitBill.copyResult()" style="width: 100%;" aria-label="결과 복사">결과 복사</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="split-bill.js"></script>
</body>
</html>
