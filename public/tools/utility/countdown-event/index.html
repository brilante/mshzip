<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이벤트 카운트다운 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 700px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .event-form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .event-form input[type="text"] { grid-column: 1 / -1; }
    .event-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
    .event-card { background: var(--bg-primary); border-radius: 12px; padding: 1.25rem; position: relative; }
    .event-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .event-date { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem; }
    .countdown-display { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; text-align: center; }
    .countdown-unit { background: var(--bg-secondary); border-radius: 8px; padding: 0.75rem; }
    .countdown-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .countdown-label { font-size: 0.75rem; color: var(--text-secondary); }
    .event-delete { position: absolute; top: 0.75rem; right: 0.75rem; opacity: 0.5; cursor: pointer; }
    .event-delete:hover { opacity: 1; }
    .event-past { opacity: 0.6; }
    .event-past .countdown-value { color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이벤트 카운트다운</h1>
          <p class="tool-description">D-Day 및 기념일 카운트다운</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">새 이벤트 추가</h3>
        <div class="event-form">
          <input type="text" id="eventTitle" class="tool-input" placeholder="이벤트 이름 (예: 생일, 여행)" aria-label="이벤트 이름 (예: 생일, 여행)">
          <input type="date" id="eventDate" class="tool-input">
          <input type="time" id="eventTime" class="tool-input" value="00:00">
          <button class="tool-btn tool-btn-primary" onclick="CountdownEvent.add()" aria-label="추가">추가</button>
        </div>
      </div>

      <div class="event-list" id="eventList"></div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="countdown-event.js"></script>
</body>
</html>
