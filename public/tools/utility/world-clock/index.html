<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 시계 - 유틸리티</title>
    <link rel="stylesheet" href="world-clock.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>세계 시계</h1>
            <p>세계 주요 도시의 현재 시간을 확인하세요</p>
        </header>

        <div class="local-time card">
            <h3>현재 위치</h3>
            <div class="big-time" id="localTime">00:00:00</div>
            <div class="date" id="localDate">2024년 1월 1일 월요일</div>
        </div>

        <div class="add-city">
            <select id="citySelect">
                <option value="">도시 선택</option>
            </select>
            <button id="addCity" aria-label="추가">추가</button>
        </div>

        <div id="clocksList" class="clocks-grid"></div>
    </div>
    <script src="world-clock.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
