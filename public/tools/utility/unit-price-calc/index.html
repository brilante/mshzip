<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단가 비교 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 700px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .item-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
    .item-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; position: relative; }
    .item-row { display: grid; grid-template-columns: 1fr 100px 100px; gap: 0.75rem; align-items: center; }
    .item-name { font-weight: 600; }
    .item-price-info { display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border-color); }
    .unit-price { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .unit-label { font-size: 0.8rem; color: var(--text-secondary); }
    .best-deal { border: 2px solid #22c55e; }
    .best-deal .unit-price { color: #22c55e; }
    .best-badge { position: absolute; top: -8px; right: 12px; background: #22c55e; color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .item-delete { position: absolute; top: 0.5rem; right: 0.5rem; opacity: 0.4; cursor: pointer; font-size: 0.8rem; }
    .item-delete:hover { opacity: 1; }
    .add-form { display: grid; grid-template-columns: 1fr 100px 100px auto; gap: 0.5rem; align-items: center; }
    @media (max-width: 640px) {
      .add-form { grid-template-columns: 1fr 1fr; }
      .item-row { grid-template-columns: 1fr; gap: 0.5rem; }
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">단가 비교 계산기</h1>
          <p class="tool-description">상품별 단위당 가격 비교</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">상품 추가</h3>
        <div class="add-form">
          <input type="text" id="itemName" class="tool-input" placeholder="상품명" aria-label="상품명">
          <input type="number" id="itemPrice" class="tool-input" placeholder="가격" min="0" aria-label="가격">
          <input type="number" id="itemQuantity" class="tool-input" placeholder="수량/용량" min="0" step="any" aria-label="수량/용량">
          <button class="tool-btn tool-btn-primary" onclick="UnitPriceCalc.add()" aria-label="추가">추가</button>
        </div>
        <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem; align-items: center;">
          <span style="font-size: 0.85rem; color: var(--text-secondary);">단위:</span>
          <select id="unitType" class="tool-input" style="width: auto;" onchange="UnitPriceCalc.render()">
            <option value="개">개</option>
            <option value="g">g (그램)</option>
            <option value="kg">kg (킬로그램)</option>
            <option value="ml">ml (밀리리터)</option>
            <option value="L">L (리터)</option>
            <option value="장">장</option>
            <option value="매">매</option>
          </select>
        </div>
      </div>

      <div class="item-list" id="itemList"></div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="unit-price-calc.js"></script>
</body>
</html>
