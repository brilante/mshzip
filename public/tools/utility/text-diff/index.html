<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 비교 - 유틸리티</title>
    <link rel="stylesheet" href="text-diff.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>텍스트 비교</h1>
            <p>두 텍스트의 차이점을 한눈에 확인하세요</p>
        </header>

        <div class="input-section">
            <div class="text-input">
                <label>원본 텍스트</label>
                <textarea id="text1" placeholder="원본 텍스트를 입력하세요"></textarea>
            </div>
            <div class="text-input">
                <label>수정된 텍스트</label>
                <textarea id="text2" placeholder="수정된 텍스트를 입력하세요"></textarea>
            </div>
        </div>

        <div class="controls">
            <button id="compareBtn" aria-label="비교하기">비교하기</button>
            <button id="clearBtn" class="btn-secondary" aria-label="지우기">지우기</button>
            <label class="option">
                <input type="checkbox" id="ignoreCase"> 대소문자 무시
            </label>
            <label class="option">
                <input type="checkbox" id="ignoreWhitespace"> 공백 무시
            </label>
        </div>

        <div class="stats" id="stats"></div>

        <div class="result-section">
            <h3>비교 결과</h3>
            <div class="result-container">
                <div class="result-panel">
                    <h4>원본</h4>
                    <div id="result1" class="result-content"></div>
                </div>
                <div class="result-panel">
                    <h4>수정됨</h4>
                    <div id="result2" class="result-content"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="text-diff.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
