<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum 생성기 - 유틸리티</title>
    <link rel="stylesheet" href="lorem-ipsum.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>Lorem Ipsum 생성기</h1>
            <p>디자인과 개발을 위한 더미 텍스트</p>
        </header>

        <div class="options card">
            <div class="option-row">
                <div class="option-group">
                    <label>유형</label>
                    <select id="textType">
                        <option value="paragraphs">단락</option>
                        <option value="sentences">문장</option>
                        <option value="words">단어</option>
                    </select>
                </div>
                <div class="option-group">
                    <label>개수</label>
                    <input type="number" id="count" value="3" min="1" max="100">
                </div>
                <div class="option-group">
                    <label>언어</label>
                    <select id="language">
                        <option value="lorem">Lorem Ipsum (라틴어)</option>
                        <option value="korean">한국어</option>
                        <option value="hipster">Hipster Ipsum</option>
                    </select>
                </div>
            </div>
            <div class="option-row">
                <label class="checkbox-option">
                    <input type="checkbox" id="startLorem" checked> "Lorem ipsum"으로 시작
                </label>
                <label class="checkbox-option">
                    <input type="checkbox" id="htmlTags"> HTML 태그 포함
                </label>
            </div>
            <button id="generateBtn" aria-label="생성하기">생성하기</button>
        </div>

        <div class="result card">
            <div class="result-header">
                <h3>생성된 텍스트</h3>
                <div class="stats">
                    <span id="wordCount">0 단어</span>
                    <span id="charCount">0 자</span>
                </div>
            </div>
            <div id="output" class="output"></div>
            <button id="copyBtn" class="btn-copy" aria-label="복사하기">복사하기</button>
        </div>
    </div>
    <script src="lorem-ipsum.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
