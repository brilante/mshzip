<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>간편 메모장 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .note-editor { width: 100%; min-height: 400px; resize: vertical; font-family: inherit; line-height: 1.6; }
    .note-toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .note-info { display: flex; justify-content: space-between; margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary); }
    .note-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; }
    .note-tab { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; }
    .note-tab.active { background: var(--primary); color: white; }
    .note-tab .close { margin-left: 0.5rem; opacity: 0.7; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">간편 메모장</h1>
          <p class="tool-description">빠른 메모 작성 및 저장</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="note-tabs" id="noteTabs"></div>

        <div class="note-toolbar">
          <button class="tool-btn tool-btn-secondary" onclick="NotePad.newNote()" aria-label="+ 새 메모">+ 새 메모</button>
          <button class="tool-btn tool-btn-secondary" onclick="NotePad.save()" aria-label="저장">저장</button>
          <button class="tool-btn tool-btn-secondary" onclick="NotePad.download()" aria-label="다운로드">다운로드</button>
          <button class="tool-btn tool-btn-secondary" onclick="NotePad.copy()" aria-label="복사">복사</button>
          <button class="tool-btn tool-btn-secondary" onclick="NotePad.clear()" aria-label="지우기">지우기</button>
        </div>

        <textarea id="noteEditor" class="tool-input note-editor" placeholder="여기에 메모를 작성하세요..." oninput="NotePad.autoSave()"></textarea>

        <div class="note-info">
          <span id="charCount">0자 / 0단어 / 0줄</span>
          <span id="lastSaved">자동 저장됨</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="note-pad.js"></script>
</body>
</html>
