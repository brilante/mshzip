<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 선택기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .items-input { width: 100%; min-height: 150px; resize: vertical; }
    .pick-result { text-align: center; padding: 2rem; }
    .result-label { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .result-value { font-size: 2.5rem; font-weight: 700; color: var(--primary); animation: popIn 0.3s ease-out; }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .history-list { margin-top: 1rem; }
    .history-item { display: flex; justify-content: space-between; padding: 0.5rem; background: var(--bg-primary); border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .history-time { color: var(--text-secondary); font-size: 0.8rem; }
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .mode-tab { flex: 1; padding: 0.75rem; border-radius: 8px; background: var(--bg-primary); text-align: center; cursor: pointer; transition: all 0.2s; }
    .mode-tab.active { background: var(--primary); color: white; }
    .number-range { display: flex; gap: 0.5rem; align-items: center; }
    .pick-count { display: flex; gap: 0.5rem; align-items: center; margin-top: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">랜덤 선택기</h1>
          <p class="tool-description">무작위 항목/숫자 선택</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="mode-tabs">
          <div class="mode-tab active" data-mode="list" onclick="RandomPicker.setMode('list')">목록에서 선택</div>
          <div class="mode-tab" data-mode="number" onclick="RandomPicker.setMode('number')">숫자 범위</div>
        </div>

        <div id="listMode">
          <textarea id="itemsInput" class="tool-input items-input" placeholder="선택할 항목을 한 줄에 하나씩 입력하세요&#10;&#10;예:&#10;짜장면&#10;짬뽕&#10;볶음밥"></textarea>
        </div>

        <div id="numberMode" style="display: none;">
          <div class="number-range">
            <input type="number" id="minNumber" class="tool-input" placeholder="최소" value="1" aria-label="최소">
            <span>~</span>
            <input type="number" id="maxNumber" class="tool-input" placeholder="최대" value="100" aria-label="최대">
          </div>
        </div>

        <div class="pick-count">
          <span style="font-size: 0.9rem; color: var(--text-secondary);">선택 개수:</span>
          <input type="number" id="pickCount" class="tool-input" style="width: 80px;" value="1" min="1">
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1rem;" onclick="RandomPicker.pick()" aria-label="랜덤 선택">
          랜덤 선택
        </button>
      </div>

      <div class="util-panel pick-result" id="resultPanel" style="display: none;">
        <div class="result-label">선택 결과</div>
        <div class="result-value" id="resultValue"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <h3 style="font-weight: 600;">선택 기록</h3>
          <button class="tool-btn tool-btn-secondary" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" onclick="RandomPicker.clearHistory()" aria-label="기록 삭제">기록 삭제</button>
        </div>
        <div class="history-list" id="historyList">
          <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="random-picker.js"></script>
</body>
</html>
