<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 배경 제거 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="bg-remove.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">AI 배경 제거</h1>
      <p class="tool-description">이미지에서 배경을 자동으로 제거합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <!-- 업로드 영역 -->
        <div class="upload-section" id="uploadSection">
          <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*" hidden>
            <div class="upload-content">
              <div class="upload-icon"></div>
              <div class="upload-title">이미지를 드래그하거나 클릭하여 업로드</div>
              <div class="upload-hint">PNG, JPG, WEBP 지원 (최대 10MB)</div>
            </div>
          </div>
        </div>

        <!-- 편집 영역 -->
        <div class="editor-section" id="editorSection" style="display: none;">
          <div class="editor-layout">
            <!-- 원본 이미지 -->
            <div class="image-panel">
              <div class="panel-header">
                <span class="panel-title">원본 이미지</span>
              </div>
              <div class="image-container">
                <img id="originalImage" src="" alt="원본">
              </div>
            </div>

            <!-- 결과 이미지 -->
            <div class="image-panel">
              <div class="panel-header">
                <span class="panel-title">결과 이미지</span>
                <span id="statusBadge" class="status-badge">대기 중</span>
              </div>
              <div class="image-container checkered" id="resultContainer">
                <img id="resultImage" src="" alt="결과" style="display: none;">
                <div id="processingOverlay" class="processing-overlay" style="display: none;">
                  <div class="spinner"></div>
                  <div class="processing-text">AI가 배경을 제거하고 있습니다...</div>
                </div>
                <div id="placeholderText" class="placeholder-text">
                  배경 제거 버튼을 클릭하세요
                </div>
              </div>
            </div>
          </div>

          <!-- 컨트롤 -->
          <div class="controls-section">
            <div class="control-row">
              <button class="tool-btn tool-btn-secondary" onclick="BgRemove.reset()" aria-label="다른 이미지">
                다른 이미지
              </button>
              <button class="tool-btn tool-btn-primary" onclick="BgRemove.process()" id="processBtn" aria-label="배경 제거">
                배경 제거
              </button>
              <button class="tool-btn tool-btn-success" onclick="BgRemove.download()" id="downloadBtn" disabled aria-label="다운로드">
                다운로드
              </button>
            </div>
          </div>

          <!-- 배경색 선택 -->
          <div class="options-section">
            <div class="section-title">배경 옵션</div>
            <div class="bg-options">
              <button class="bg-option active" data-bg="transparent" onclick="BgRemove.setBg('transparent')">
                <span class="bg-preview checkered-small"></span>
                <span>투명</span>
              </button>
              <button class="bg-option" data-bg="#ffffff" onclick="BgRemove.setBg('#ffffff')">
                <span class="bg-preview" style="background: #ffffff;"></span>
                <span>흰색</span>
              </button>
              <button class="bg-option" data-bg="#000000" onclick="BgRemove.setBg('#000000')">
                <span class="bg-preview" style="background: #000000;"></span>
                <span>검정</span>
              </button>
              <button class="bg-option" data-bg="#ff0000" onclick="BgRemove.setBg('#ff0000')">
                <span class="bg-preview" style="background: #ff0000;"></span>
                <span>빨강</span>
              </button>
              <button class="bg-option" data-bg="#00ff00" onclick="BgRemove.setBg('#00ff00')">
                <span class="bg-preview" style="background: #00ff00;"></span>
                <span>초록</span>
              </button>
              <button class="bg-option" data-bg="#0000ff" onclick="BgRemove.setBg('#0000ff')">
                <span class="bg-preview" style="background: #0000ff;"></span>
                <span>파랑</span>
              </button>
              <div class="bg-option custom">
                <input type="color" id="customBgColor" value="#667eea" onchange="BgRemove.setBg(this.value)">
                <span>커스텀</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">사용 팁</div>
          <div class="help-content">
            <p>• 사람, 제품, 동물 등 다양한 피사체의 배경을 제거할 수 있습니다</p>
            <p>• 최상의 결과를 위해 피사체와 배경의 대비가 명확한 이미지를 사용하세요</p>
            <p>• 투명 배경은 PNG 형식으로 저장됩니다</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="bg-remove.js"></script>
</body>
</html>
