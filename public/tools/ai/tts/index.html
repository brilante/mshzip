<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text-to-Speech - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="tts.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">Text-to-Speech</h1>
      <p class="tool-description">텍스트를 음성으로 변환합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <div class="tts-layout">
          <!-- 입력 섹션 -->
          <div class="input-section">
            <div class="input-card">
              <div class="card-header">
                <div class="card-title">텍스트 입력</div>
                <div class="char-info">
                  <span id="charCount">0</span> / 5000자
                </div>
              </div>
              <textarea id="textInput" class="text-input" placeholder="읽어줄 텍스트를 입력하세요..." maxlength="5000"></textarea>
              <div class="quick-texts">
                <button class="quick-btn" onclick="TTS.insertSample('greeting')" aria-label="인사말">인사말</button>
                <button class="quick-btn" onclick="TTS.insertSample('lorem')" aria-label="Lorem">Lorem</button>
                <button class="quick-btn" onclick="TTS.insertSample('korean')" aria-label="🇰🇷 한글 샘플">🇰🇷 한글 샘플</button>
              </div>
            </div>

            <!-- 음성 설정 -->
            <div class="settings-card">
              <div class="card-title">음성 설정</div>

              <div class="form-group">
                <label class="form-label">음성 선택</label>
                <select id="voiceSelect" class="form-select">
                  <option value="">음성 로딩 중...</option>
                </select>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">언어 필터</label>
                  <select id="langFilter" class="form-select" onchange="TTS.filterVoices()">
                    <option value="">전체</option>
                    <option value="ko">한국어</option>
                    <option value="en">영어</option>
                    <option value="ja">일본어</option>
                    <option value="zh">중국어</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">성별 필터</label>
                  <select id="genderFilter" class="form-select" onchange="TTS.filterVoices()">
                    <option value="">전체</option>
                    <option value="female">여성</option>
                    <option value="male">남성</option>
                  </select>
                </div>
              </div>

              <div class="slider-group">
                <div class="slider-item">
                  <label class="form-label">
                    속도
                    <span class="slider-value" id="rateValue">1.0x</span>
                  </label>
                  <input type="range" id="rateSlider" class="slider" min="0.5" max="2" step="0.1" value="1">
                </div>
                <div class="slider-item">
                  <label class="form-label">
                    음높이
                    <span class="slider-value" id="pitchValue">1.0</span>
                  </label>
                  <input type="range" id="pitchSlider" class="slider" min="0.5" max="2" step="0.1" value="1">
                </div>
                <div class="slider-item">
                  <label class="form-label">
                    볼륨
                    <span class="slider-value" id="volumeValue">100%</span>
                  </label>
                  <input type="range" id="volumeSlider" class="slider" min="0" max="1" step="0.1" value="1">
                </div>
              </div>
            </div>
          </div>

          <!-- 플레이어 섹션 -->
          <div class="player-section">
            <div class="player-card">
              <div class="player-visual">
                <div id="waveform" class="waveform">
                  <div class="wave-bar"></div>
                  <div class="wave-bar"></div>
                  <div class="wave-bar"></div>
                  <div class="wave-bar"></div>
                  <div class="wave-bar"></div>
                  <div class="wave-bar"></div>
                  <div class="wave-bar"></div>
                </div>
                <div id="playerStatus" class="player-status">재생 준비</div>
              </div>

              <div class="player-controls">
                <button class="control-btn" onclick="TTS.stop()" title="정지">
                  <span class="btn-icon"></span>
                </button>
                <button class="control-btn play-btn" onclick="TTS.toggle()" id="playBtn" title="재생">
                  <span class="btn-icon" id="playIcon"></span>
                </button>
                <button class="control-btn" onclick="TTS.pause()" title="일시정지">
                  <span class="btn-icon"></span>
                </button>
              </div>

              <div class="progress-bar">
                <div class="progress-track">
                  <div id="progressFill" class="progress-fill"></div>
                </div>
              </div>
            </div>

            <!-- 지원 정보 -->
            <div class="info-card">
              <div class="info-item">
                <span class="info-label">지원 음성</span>
                <span id="voiceCount" class="info-value">0개</span>
              </div>
              <div class="info-item">
                <span class="info-label">브라우저 지원</span>
                <span id="browserSupport" class="info-value">확인 중...</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">사용 팁</div>
          <div class="help-content">
            <p>• Web Speech API를 사용하여 브라우저에서 직접 음성을 생성합니다</p>
            <p>• 사용 가능한 음성은 브라우저와 운영체제에 따라 다릅니다</p>
            <p>• Chrome, Edge, Safari에서 가장 많은 음성을 지원합니다</p>
            <p>• 긴 텍스트는 문장 단위로 나누어 처리됩니다</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="tts.js"></script>
</body>
</html>
