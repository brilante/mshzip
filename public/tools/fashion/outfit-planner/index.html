<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코디 플래너 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .calendar-nav { display: flex; gap: 0.5rem; }
    .calendar-btn { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.25rem; }
    .calendar-day-header { text-align: center; font-size: 0.75rem; color: var(--text-secondary); padding: 0.5rem; }
    .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 0.85rem; background: var(--bg-primary); }
    .calendar-day:hover { background: var(--bg-secondary); }
    .calendar-day.today { border: 2px solid var(--primary); }
    .calendar-day.has-outfit { background: rgba(124, 58, 237, 0.2); }
    .calendar-day.selected { background: var(--primary); color: white; }
    .calendar-day .outfit-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; margin-top: 2px; }
    .outfit-form { margin-top: 1.5rem; }
    .outfit-item { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    .outfit-item label { width: 60px; font-size: 0.85rem; color: var(--text-secondary); }
    .outfit-item input, .outfit-item select { flex: 1; }
    .saved-outfits { margin-top: 1.5rem; }
    .outfit-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; }
    .outfit-card-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .outfit-card-date { font-weight: 600; }
    .outfit-card-delete { color: #ef4444; cursor: pointer; font-size: 0.85rem; }
    .outfit-card-items { font-size: 0.85rem; color: var(--text-secondary); }
    .weather-section { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .weather-btn { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .weather-btn.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">코디 플래너</h1>
          <p class="tool-description">일별 옷차림 계획</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="calendar-header">
          <span id="currentMonth" style="font-weight: 600;"></span>
          <div class="calendar-nav">
            <div class="calendar-btn" onclick="OutfitPlanner.prevMonth()"></div>
            <div class="calendar-btn" onclick="OutfitPlanner.nextMonth()"></div>
          </div>
        </div>
        <div class="calendar-grid">
          <div class="calendar-day-header">일</div>
          <div class="calendar-day-header">월</div>
          <div class="calendar-day-header">화</div>
          <div class="calendar-day-header">수</div>
          <div class="calendar-day-header">목</div>
          <div class="calendar-day-header">금</div>
          <div class="calendar-day-header">토</div>
        </div>
        <div class="calendar-grid" id="calendarDays"></div>
      </div>

      <div class="util-panel outfit-form" id="outfitForm" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 1rem;"><span id="selectedDateText"></span> 코디</h3>

        <div class="weather-section">
          <div class="weather-btn" data-weather="sunny" onclick="OutfitPlanner.setWeather('sunny')">맑음</div>
          <div class="weather-btn" data-weather="cloudy" onclick="OutfitPlanner.setWeather('cloudy')">흐림</div>
          <div class="weather-btn" data-weather="rainy" onclick="OutfitPlanner.setWeather('rainy')">비</div>
          <div class="weather-btn" data-weather="cold" onclick="OutfitPlanner.setWeather('cold')">추움</div>
        </div>

        <div class="outfit-item">
          <label>상의</label>
          <input type="text" id="outfitTop" class="tool-input" placeholder="예: 흰색 셔츠" aria-label="예: 흰색 셔츠">
        </div>
        <div class="outfit-item">
          <label>하의</label>
          <input type="text" id="outfitBottom" class="tool-input" placeholder="예: 청바지" aria-label="예: 청바지">
        </div>
        <div class="outfit-item">
          <label>아우터</label>
          <input type="text" id="outfitOuter" class="tool-input" placeholder="예: 가죽 자켓" aria-label="예: 가죽 자켓">
        </div>
        <div class="outfit-item">
          <label>신발</label>
          <input type="text" id="outfitShoes" class="tool-input" placeholder="예: 흰색 스니커즈" aria-label="예: 흰색 스니커즈">
        </div>
        <div class="outfit-item">
          <label>액세서리</label>
          <input type="text" id="outfitAcc" class="tool-input" placeholder="예: 실버 목걸이" aria-label="예: 실버 목걸이">
        </div>
        <div class="outfit-item">
          <label>메모</label>
          <input type="text" id="outfitNote" class="tool-input" placeholder="예: 면접용" aria-label="예: 면접용">
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-primary" onclick="OutfitPlanner.saveOutfit()" style="flex: 1;" aria-label="저장">저장</button>
          <button class="tool-btn tool-btn-secondary" onclick="OutfitPlanner.deleteOutfit()" aria-label="삭제">삭제</button>
        </div>
      </div>

      <div class="saved-outfits">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">이번 주 코디</h3>
        <div id="weekOutfits"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="outfit-planner.js"></script>
</body>
</html>
