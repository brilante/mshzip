<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체형 분석기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    .input-row input { flex: 1; }
    .result-display { text-align: center; padding: 2rem; background: linear-gradient(135deg, #8b5cf6, #7c3aed); border-radius: 16px; color: white; margin: 1rem 0; display: none; }
    .result-display.show { display: block; }
    .result-icon { font-size: 4rem; margin-bottom: 0.5rem; }
    .result-type { font-size: 1.5rem; font-weight: 700; }
    .result-desc { opacity: 0.9; margin-top: 0.5rem; }
    .style-section { margin: 1rem 0; }
    .style-title { font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .style-list { list-style: none; padding: 0; margin: 0; }
    .style-list li { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; display: flex; gap: 0.5rem; align-items: flex-start; }
    .style-list li:last-child { border-bottom: none; }
    .body-visual { display: flex; justify-content: center; gap: 2rem; margin: 1.5rem 0; }
    .body-shape { text-align: center; cursor: pointer; padding: 1rem; border-radius: 12px; border: 2px solid transparent; }
    .body-shape:hover { border-color: var(--border); }
    .body-shape.selected { border-color: var(--primary); background: rgba(124, 58, 237, 0.1); }
    .body-shape-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .body-shape-name { font-size: 0.85rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">체형 분석기</h1>
          <p class="tool-description">체형별 스타일링 가이드</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="input-group">
          <label class="input-label">성별</label>
          <select id="gender" class="tool-input" onchange="BodyType.calculate()">
            <option value="women">여성</option>
            <option value="men">남성</option>
          </select>
        </div>

        <div class="input-group">
          <label class="input-label">어깨 너비</label>
          <div class="input-row">
            <input type="number" id="shoulder" class="tool-input" placeholder="40" oninput="BodyType.calculate()" aria-label="40">
            <span>cm</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">가슴둘레</label>
          <div class="input-row">
            <input type="number" id="bust" class="tool-input" placeholder="88" oninput="BodyType.calculate()" aria-label="88">
            <span>cm</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">허리둘레</label>
          <div class="input-row">
            <input type="number" id="waist" class="tool-input" placeholder="66" oninput="BodyType.calculate()" aria-label="66">
            <span>cm</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">엉덩이둘레</label>
          <div class="input-row">
            <input type="number" id="hip" class="tool-input" placeholder="94" oninput="BodyType.calculate()" aria-label="94">
            <span>cm</span>
          </div>
        </div>
      </div>

      <p style="text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin: 1rem 0;">또는 직접 체형을 선택하세요</p>

      <div class="body-visual" id="bodyShapes">
        <!-- 동적으로 생성됨 -->
      </div>

      <div class="result-display" id="resultPanel">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-type" id="resultType"></div>
        <div class="result-desc" id="resultDesc"></div>
      </div>

      <div id="styleGuide" style="display: none;">
        <div class="util-panel style-section">
          <div class="style-title">추천 스타일</div>
          <ul class="style-list" id="recommendStyle"></ul>
        </div>

        <div class="util-panel style-section">
          <div class="style-title">피해야 할 스타일</div>
          <ul class="style-list" id="avoidStyle"></ul>
        </div>

        <div class="util-panel style-section">
          <div class="style-title">스타일링 팁</div>
          <p id="styleTip" style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="body-type.js"></script>
</body>
</html>
