<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>컬러 매칭 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .color-picker-section { text-align: center; margin: 1rem 0; }
    .main-color { width: 120px; height: 120px; border-radius: 16px; margin: 0 auto 1rem; cursor: pointer; border: 3px solid var(--border); }
    .color-input-row { display: flex; gap: 0.5rem; justify-content: center; align-items: center; }
    .match-section { margin: 1.5rem 0; }
    .match-title { font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .match-colors { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .match-color { width: 60px; height: 60px; border-radius: 8px; cursor: pointer; position: relative; border: 2px solid transparent; transition: all 0.2s; }
    .match-color:hover { transform: scale(1.1); }
    .match-color-name { font-size: 0.7rem; text-align: center; margin-top: 0.25rem; color: var(--text-secondary); }
    .outfit-preview { display: flex; gap: 1rem; justify-content: center; margin: 1.5rem 0; flex-wrap: wrap; }
    .outfit-item { width: 80px; text-align: center; }
    .outfit-color { width: 80px; height: 80px; border-radius: 12px; margin-bottom: 0.5rem; }
    .outfit-label { font-size: 0.75rem; color: var(--text-secondary); }
    .harmony-types { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin: 1rem 0; }
    .harmony-btn { padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; text-align: center; font-size: 0.85rem; border: 2px solid transparent; }
    .harmony-btn.active { border-color: var(--primary); background: rgba(124, 58, 237, 0.1); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">컬러 매칭</h1>
          <p class="tool-description">패션 색상 조합 추천</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="color-picker-section">
          <div class="main-color" id="mainColor" onclick="document.getElementById('colorPicker').click()"></div>
          <div class="color-input-row">
            <input type="color" id="colorPicker" style="width: 50px; height: 36px;" onchange="ColorMatch.setColor(this.value)">
            <input type="text" id="colorHex" class="tool-input" style="width: 100px;" placeholder="#000000" oninput="ColorMatch.setColorFromHex(this.value)" aria-label="#000000">
          </div>
        </div>
      </div>

      <div class="harmony-types">
        <div class="harmony-btn active" data-type="complementary" onclick="ColorMatch.setHarmony('complementary')">보색 조합</div>
        <div class="harmony-btn" data-type="analogous" onclick="ColorMatch.setHarmony('analogous')">유사색 조합</div>
        <div class="harmony-btn" data-type="triadic" onclick="ColorMatch.setHarmony('triadic')">삼색 조합</div>
        <div class="harmony-btn" data-type="monochromatic" onclick="ColorMatch.setHarmony('monochromatic')">단색 조합</div>
      </div>

      <div class="util-panel">
        <div class="match-title">추천 매칭 컬러</div>
        <div class="match-colors" id="matchColors"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div class="match-title">코디 예시</div>
        <div class="outfit-preview" id="outfitPreview">
          <div class="outfit-item">
            <div class="outfit-color" id="outfitTop"></div>
            <div class="outfit-label">상의</div>
          </div>
          <div class="outfit-item">
            <div class="outfit-color" id="outfitBottom"></div>
            <div class="outfit-label">하의</div>
          </div>
          <div class="outfit-item">
            <div class="outfit-color" id="outfitAcc"></div>
            <div class="outfit-label">액세서리</div>
          </div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div class="match-title">스타일링 팁</div>
        <p id="styleTip" style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;"></p>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="color-match.js"></script>
</body>
</html>
