<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>섬유 관리 가이드 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .fabric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin: 1rem 0; }
    .fabric-btn { padding: 0.75rem 0.5rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; text-align: center; border: 2px solid transparent; font-size: 0.85rem; }
    .fabric-btn:hover { border-color: var(--border); }
    .fabric-btn.selected { border-color: var(--primary); background: rgba(124, 58, 237, 0.1); }
    .fabric-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .care-section { margin: 1.5rem 0; display: none; }
    .care-section.show { display: block; }
    .care-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .care-icon { font-size: 2rem; }
    .care-title { font-size: 1.25rem; font-weight: 700; }
    .care-subtitle { font-size: 0.85rem; color: var(--text-secondary); }
    .care-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin: 1rem 0; }
    .care-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; }
    .care-card-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .care-card-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .care-card-desc { font-size: 0.8rem; color: var(--text-secondary); }
    .symbols-section { margin: 1rem 0; }
    .symbol-row { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .symbol-icon { font-size: 1.5rem; width: 40px; text-align: center; }
    .symbol-text { flex: 1; font-size: 0.9rem; }
    .warning-box { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 1rem; border-radius: 0 8px 8px 0; margin: 1rem 0; font-size: 0.85rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">섬유 관리 가이드</h1>
          <p class="tool-description">소재별 세탁 및 관리법</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">소재 선택</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary);">관리법을 확인할 소재를 선택하세요</p>
      </div>

      <div class="fabric-grid" id="fabricGrid">
        <!-- 동적으로 생성됨 -->
      </div>

      <div class="care-section" id="careSection">
        <div class="util-panel">
          <div class="care-header">
            <div class="care-icon" id="careIcon"></div>
            <div>
              <div class="care-title" id="careTitle"></div>
              <div class="care-subtitle" id="careSubtitle"></div>
            </div>
          </div>

          <div class="care-grid" id="careGrid"></div>
        </div>

        <div class="util-panel" style="margin-top: 1rem;">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">세탁 기호</h3>
          <div class="symbols-section" id="symbolsSection"></div>
        </div>

        <div class="warning-box" id="warningBox"></div>

        <div class="util-panel" style="margin-top: 1rem;">
          <h3 style="font-weight: 600; margin-bottom: 0.5rem;">관리 팁</h3>
          <p id="careTip" style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="fabric-care.js"></script>
</body>
</html>
