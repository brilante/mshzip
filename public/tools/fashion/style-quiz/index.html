<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스타일 퀴즈 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .quiz-progress { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; }
    .quiz-step { flex: 1; height: 4px; background: var(--bg-secondary); border-radius: 2px; }
    .quiz-step.done { background: var(--primary); }
    .quiz-step.current { background: rgba(124, 58, 237, 0.5); }
    .question-num { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
    .answer-options { display: grid; gap: 0.75rem; }
    .answer-option { padding: 1rem; background: var(--bg-primary); border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 1rem; }
    .answer-option:hover { border-color: var(--border); transform: translateX(4px); }
    .answer-option.selected { border-color: var(--primary); background: rgba(124, 58, 237, 0.1); }
    .answer-icon { font-size: 1.5rem; }
    .answer-text { flex: 1; }
    .answer-label { font-weight: 500; }
    .answer-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .result-panel { display: none; }
    .result-panel.show { display: block; }
    .result-header { text-align: center; padding: 2rem; border-radius: 16px; color: white; margin-bottom: 1.5rem; }
    .result-style { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .result-desc { opacity: 0.9; }
    .style-trait { display: flex; gap: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; align-items: center; }
    .trait-icon { font-size: 1.5rem; }
    .trait-text { flex: 1; font-size: 0.9rem; }
    .brand-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    .brand-tag { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 20px; font-size: 0.85rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">스타일 퀴즈</h1>
          <p class="tool-description">나의 패션 스타일 찾기</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div id="quizSection">
        <div class="quiz-progress" id="quizProgress"></div>

        <div class="util-panel">
          <div class="question-num" id="questionNum"></div>
          <div class="question-text" id="questionText"></div>
          <div class="answer-options" id="answerOptions"></div>
        </div>
      </div>

      <div class="result-panel" id="resultPanel">
        <div class="result-header" id="resultHeader">
          <div class="result-style" id="resultStyle"></div>
          <div class="result-desc" id="resultDesc"></div>
        </div>

        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">스타일 특징</h3>
          <div id="styleTraits"></div>
        </div>

        <div class="util-panel" style="margin-top: 1rem;">
          <h3 style="font-weight: 600; margin-bottom: 0.5rem;">추천 브랜드</h3>
          <div class="brand-list" id="brandList"></div>
        </div>

        <div class="util-panel" style="margin-top: 1rem;">
          <h3 style="font-weight: 600; margin-bottom: 0.5rem;">스타일링 팁</h3>
          <p id="styleTip" style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;"></p>
        </div>

        <button class="tool-btn tool-btn-secondary" onclick="StyleQuiz.restart()" style="width: 100%; margin-top: 1rem;" aria-label="다시 테스트하기">다시 테스트하기</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="style-quiz.js"></script>
</body>
</html>
