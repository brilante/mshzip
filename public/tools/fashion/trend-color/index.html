<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>트렌드 컬러 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .season-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .season-tab { padding: 0.5rem 1rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; font-size: 0.9rem; }
    .season-tab.active { background: var(--primary); color: white; }
    .hero-color { text-align: center; padding: 2.5rem; border-radius: 16px; color: white; margin: 1rem 0; }
    .hero-name { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    .hero-code { font-family: monospace; opacity: 0.9; cursor: pointer; }
    .color-palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; margin: 1rem 0; }
    .palette-item { aspect-ratio: 1; border-radius: 8px; cursor: pointer; position: relative; transition: transform 0.2s; }
    .palette-item:hover { transform: scale(1.1); z-index: 1; }
    .palette-item.selected { ring: 3px solid white; box-shadow: 0 0 0 3px var(--primary); }
    .color-detail { margin: 1.5rem 0; }
    .color-detail-header { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
    .color-preview { width: 60px; height: 60px; border-radius: 12px; }
    .color-info { flex: 1; }
    .color-name { font-weight: 700; font-size: 1.1rem; }
    .color-codes { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .usage-section { margin: 1rem 0; }
    .usage-title { font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .usage-list { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8; }
    .combination-section { margin: 1rem 0; }
    .combination-title { font-weight: 600; margin-bottom: 0.75rem; }
    .combination-colors { display: flex; gap: 0.5rem; }
    .combo-color { width: 50px; height: 50px; border-radius: 8px; cursor: pointer; }
    .trend-tip { background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(236, 72, 153, 0.1)); padding: 1rem; border-radius: 8px; margin: 1rem 0; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">트렌드 컬러</h1>
          <p class="tool-description">시즌별 유행 컬러 가이드</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="season-tabs">
        <div class="season-tab active" data-season="2026ss" onclick="TrendColor.setSeason('2026ss')">2026 S/S</div>
        <div class="season-tab" data-season="2025fw" onclick="TrendColor.setSeason('2025fw')">2025 F/W</div>
        <div class="season-tab" data-season="2025ss" onclick="TrendColor.setSeason('2025ss')">2025 S/S</div>
      </div>

      <div class="hero-color" id="heroColor">
        <div class="hero-name" id="heroName"></div>
        <div class="hero-code" id="heroCode" onclick="TrendColor.copyColor()"></div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">시즌 컬러 팔레트</h3>
        <div class="color-palette" id="colorPalette"></div>
      </div>

      <div class="util-panel color-detail" id="colorDetail" style="display: none;">
        <div class="color-detail-header">
          <div class="color-preview" id="colorPreview"></div>
          <div class="color-info">
            <div class="color-name" id="colorName"></div>
            <div class="color-codes" id="colorCodes"></div>
          </div>
        </div>

        <div class="usage-section">
          <div class="usage-title">활용 팁</div>
          <div class="usage-list" id="usageList"></div>
        </div>

        <div class="combination-section">
          <div class="combination-title">추천 조합</div>
          <div class="combination-colors" id="combinationColors"></div>
        </div>
      </div>

      <div class="trend-tip">
        <strong>트렌드 인사이트</strong>
        <p id="trendInsight" style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.5rem; line-height: 1.6;"></p>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="trend-color.js"></script>
</body>
</html>
