<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퍼스널 컬러 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .question-card { margin-bottom: 1.5rem; }
    .question-title { font-weight: 600; margin-bottom: 0.75rem; }
    .question-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .question-option { padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; text-align: center; border: 2px solid transparent; font-size: 0.9rem; }
    .question-option:hover { border-color: var(--border); }
    .question-option.selected { border-color: var(--primary); background: rgba(124, 58, 237, 0.1); }
    .result-panel { text-align: center; padding: 2rem; border-radius: 16px; margin: 1rem 0; color: white; display: none; }
    .result-panel.show { display: block; }
    .result-season { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .result-type { font-size: 1.2rem; opacity: 0.9; }
    .color-palette { margin: 1.5rem 0; }
    .palette-title { font-weight: 600; margin-bottom: 0.75rem; }
    .palette-colors { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .palette-color { width: 50px; height: 50px; border-radius: 8px; cursor: pointer; }
    .avoid-colors { margin: 1rem 0; }
    .celebrity-section { margin: 1rem 0; }
    .progress-bar { height: 8px; background: var(--bg-secondary); border-radius: 4px; margin-bottom: 1.5rem; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.3s; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">퍼스널 컬러</h1>
          <p class="tool-description">피부톤 분석 및 컬러 추천</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
      </div>

      <div id="questionsContainer">
        <!-- 질문들이 동적으로 추가됨 -->
      </div>

      <div class="util-panel" style="text-align: center;">
        <button class="tool-btn tool-btn-primary" id="analyzeBtn" onclick="SkinTone.analyze()" disabled aria-label="퍼스널 컬러 분석">퍼스널 컬러 분석</button>
        <button class="tool-btn tool-btn-secondary" onclick="SkinTone.reset()" style="margin-left: 0.5rem;" aria-label="다시 하기">다시 하기</button>
      </div>

      <div class="result-panel" id="resultPanel">
        <div class="result-season" id="resultSeason"></div>
        <div class="result-type" id="resultType"></div>
      </div>

      <div id="resultDetails" style="display: none;">
        <div class="util-panel color-palette">
          <div class="palette-title">추천 컬러</div>
          <div class="palette-colors" id="recommendColors"></div>
        </div>

        <div class="util-panel avoid-colors">
          <div class="palette-title">피해야 할 컬러</div>
          <div class="palette-colors" id="avoidColors"></div>
        </div>

        <div class="util-panel celebrity-section">
          <div class="palette-title">같은 타입 연예인</div>
          <p id="celebrities" style="font-size: 0.9rem; color: var(--text-secondary);"></p>
        </div>

        <div class="util-panel">
          <div class="palette-title">메이크업 팁</div>
          <p id="makeupTip" style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="skin-tone.js"></script>
</body>
</html>
