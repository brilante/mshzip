<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>액세서리 매칭 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .outfit-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin: 1rem 0; }
    .outfit-option { padding: 1rem; background: var(--bg-primary); border-radius: 12px; cursor: pointer; text-align: center; border: 2px solid transparent; }
    .outfit-option:hover { border-color: var(--border); }
    .outfit-option.selected { border-color: var(--primary); background: rgba(124, 58, 237, 0.1); }
    .outfit-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .outfit-name { font-weight: 500; font-size: 0.9rem; }
    .occasion-tabs { display: flex; gap: 0.5rem; margin: 1rem 0; overflow-x: auto; }
    .occasion-tab { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 20px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
    .occasion-tab.active { background: var(--primary); color: white; }
    .recommend-section { margin: 1.5rem 0; display: none; }
    .recommend-section.show { display: block; }
    .recommend-title { font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .accessory-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .accessory-card { background: var(--bg-primary); padding: 1rem; border-radius: 12px; text-align: center; }
    .accessory-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .accessory-name { font-weight: 600; font-size: 0.9rem; }
    .accessory-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .match-level { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; margin-top: 0.5rem; }
    .match-perfect { background: #dcfce7; color: #166534; }
    .match-good { background: #fef3c7; color: #92400e; }
    .tip-section { margin-top: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; }
    .tip-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .tip-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">액세서리 매칭</h1>
          <p class="tool-description">의상에 맞는 액세서리 추천</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">의상 스타일 선택</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary);">오늘의 의상 스타일을 선택하세요</p>
      </div>

      <div class="outfit-selector" id="outfitSelector">
        <!-- 동적으로 생성됨 -->
      </div>

      <div class="occasion-tabs">
        <div class="occasion-tab active" data-occasion="daily" onclick="AccessoryMatch.setOccasion('daily')">일상</div>
        <div class="occasion-tab" data-occasion="office" onclick="AccessoryMatch.setOccasion('office')">오피스</div>
        <div class="occasion-tab" data-occasion="date" onclick="AccessoryMatch.setOccasion('date')">데이트</div>
        <div class="occasion-tab" data-occasion="party" onclick="AccessoryMatch.setOccasion('party')">파티</div>
      </div>

      <div class="recommend-section" id="recommendSection">
        <div class="util-panel">
          <div class="recommend-title">추천 액세서리</div>
          <div class="accessory-grid" id="accessoryGrid"></div>
        </div>

        <div class="tip-section">
          <div class="tip-title">스타일링 팁</div>
          <div class="tip-text" id="stylingTip"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="accessory-match.js"></script>
</body>
</html>
