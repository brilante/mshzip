<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계약서 분석기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .legal-container { max-width: 900px; margin: 0 auto; }
    .legal-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .analyzer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .input-section, .result-section { min-height: 400px; }
    .input-section h3, .result-section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .contract-input { width: 100%; height: 350px; resize: none; font-family: inherit; }
    .analysis-results { background: var(--bg-primary); border-radius: 8px; padding: 1rem; height: 350px; overflow-y: auto; }
    .result-item { padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; }
    .result-warning { background: rgba(239, 68, 68, 0.1); border-left: 3px solid #ef4444; }
    .result-caution { background: rgba(234, 179, 8, 0.1); border-left: 3px solid #eab308; }
    .result-info { background: rgba(59, 130, 246, 0.1); border-left: 3px solid #3b82f6; }
    .result-ok { background: rgba(34, 197, 94, 0.1); border-left: 3px solid #22c55e; }
    .result-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .result-desc { font-size: 0.85rem; color: var(--text-secondary); }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .stat-card { background: var(--bg-primary); border-radius: 8px; padding: 0.75rem; text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    @media (max-width: 768px) {
      .analyzer-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">계약서 분석기</h1>
          <p class="tool-description">계약서 주요 조항 분석</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="legal-container">
      <div class="legal-panel">
        <div class="stats-row" id="statsRow">
          <div class="stat-card">
            <div class="stat-value" id="totalClauses">0</div>
            <div class="stat-label">총 조항</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color: #ef4444;" id="warningCount">0</div>
            <div class="stat-label">주의 필요</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color: #eab308;" id="cautionCount">0</div>
            <div class="stat-label">검토 권장</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color: #22c55e;" id="okCount">0</div>
            <div class="stat-label">양호</div>
          </div>
        </div>

        <div class="analyzer-grid">
          <div class="input-section">
            <h3>계약서 내용</h3>
            <textarea id="contractText" class="tool-input contract-input" placeholder="분석할 계약서 내용을 붙여넣으세요..."></textarea>
            <button class="tool-btn tool-btn-primary" style="margin-top: 0.5rem; width: 100%;" onclick="ContractAnalyzer.analyze()" aria-label="분석하기">분석하기</button>
          </div>

          <div class="result-section">
            <h3>분석 결과</h3>
            <div class="analysis-results" id="analysisResults">
              <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">
                계약서를 입력하고 분석하기를 클릭하세요
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="contract-analyzer.js"></script>
</body>
</html>
