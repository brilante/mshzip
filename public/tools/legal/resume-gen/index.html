<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이력서 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="resume-gen.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">이력서 생성기</h1>
      <p class="tool-description">깔끔한 이력서를 빠르게 작성합니다</p>
    </header>

    <main class="tool-content">
      <div class="form-section">
        <h3 class="section-title">정보 입력</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>이름</label>
            <input type="text" id="name" class="form-input" placeholder="홍길동" aria-label="홍길동">
          </div>
          <div class="form-group">
            <label>연락처</label>
            <input type="text" id="phone" class="form-input" placeholder="010-0000-0000" aria-label="010-0000-0000">
          </div>
          <div class="form-group">
            <label>이메일</label>
            <input type="email" id="email" class="form-input" placeholder="email@example.com" aria-label="email@example.com">
          </div>
          <div class="form-group">
            <label>주소</label>
            <input type="text" id="address" class="form-input" placeholder="서울시 강남구" aria-label="서울시 강남구">
          </div>
          <div class="form-group full-width">
            <label>학력 (학교:전공:졸업년도, 줄바꿈으로 구분)</label>
            <textarea id="education" class="form-input" placeholder="OO대학교:컴퓨터공학:2020">OO대학교:컴퓨터공학:2020</textarea>
          </div>
          <div class="form-group full-width">
            <label>경력 (회사:직책:기간:업무내용, 줄바꿈으로 구분)</label>
            <textarea id="experience" class="form-input" placeholder="OO회사:개발자:2020-2023:웹 서비스 개발">OO회사:프론트엔드 개발자:2020-2023:웹 서비스 개발 및 유지보수</textarea>
          </div>
          <div class="form-group full-width">
            <label>기술 스택 (쉼표로 구분)</label>
            <input type="text" id="skills" class="form-input" placeholder="JavaScript, React, Node.js" value="JavaScript, React, Node.js, TypeScript" aria-label="JavaScript, React, Node.js">
          </div>
        </div>
        <button class="generate-btn" onclick="resumegenGen.generate()" aria-label="문서 생성">문서 생성</button>
      </div>

      <div class="preview-section">
        <h3 class="section-title">미리보기</h3>
        <div class="document-preview" id="preview"></div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="resumegenGen.copyText()" aria-label="텍스트 복사">텍스트 복사</button>
          <button class="export-btn secondary" onclick="resumegenGen.downloadTxt()" aria-label="TXT 다운로드">TXT 다운로드</button>
          <button class="export-btn secondary" onclick="resumegenGen.print()" aria-label="인쇄">인쇄</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="resume-gen.js"></script>
</body>
</html>
