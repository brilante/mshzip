<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쿠키 정책 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .legal-container { max-width: 800px; margin: 0 auto; }
    .legal-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .cookie-types { margin-bottom: 1rem; }
    .cookie-type { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .cookie-type input { margin-top: 0.25rem; }
    .cookie-type-info h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.25rem; }
    .cookie-type-info p { font-size: 0.8rem; color: var(--text-secondary); }
    .policy-preview { background: white; color: #333; border-radius: 8px; padding: 1.5rem; margin-top: 1.5rem; font-family: 'Malgun Gothic', sans-serif; line-height: 1.8; max-height: 500px; overflow-y: auto; }
    .policy-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; text-align: center; }
    .policy-section { margin-bottom: 1.25rem; }
    .policy-section h4 { font-weight: 600; margin-bottom: 0.5rem; }
    .cookie-table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; }
    .cookie-table th, .cookie-table td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
    .cookie-table th { background: #f3f4f6; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">쿠키 정책 생성기</h1>
          <p class="tool-description">웹사이트 쿠키 정책 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="legal-container">
      <div class="legal-panel">
        <div class="form-row">
          <div class="form-group">
            <label>웹사이트명</label>
            <input type="text" id="siteName" class="tool-input" placeholder="MyWebsite" aria-label="MyWebsite">
          </div>
          <div class="form-group">
            <label>웹사이트 URL</label>
            <input type="text" id="siteUrl" class="tool-input" placeholder="https://example.com" aria-label="https://example.com">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>회사/운영자명</label>
            <input type="text" id="companyName" class="tool-input" placeholder="주식회사 ABC" aria-label="주식회사 ABC">
          </div>
          <div class="form-group">
            <label>연락처 이메일</label>
            <input type="email" id="contactEmail" class="tool-input" placeholder="privacy@example.com" aria-label="privacy@example.com">
          </div>
        </div>

        <div class="form-group">
          <label>사용하는 쿠키 유형</label>
          <div class="cookie-types">
            <div class="cookie-type">
              <input type="checkbox" id="cookieEssential" checked disabled>
              <div class="cookie-type-info">
                <h4>필수 쿠키</h4>
                <p>웹사이트 기본 기능 작동에 필수 (로그인 상태, 장바구니 등)</p>
              </div>
            </div>
            <div class="cookie-type">
              <input type="checkbox" id="cookieAnalytics" checked>
              <div class="cookie-type-info">
                <h4>분석 쿠키</h4>
                <p>방문자 통계 및 사이트 이용 패턴 분석 (Google Analytics 등)</p>
              </div>
            </div>
            <div class="cookie-type">
              <input type="checkbox" id="cookieMarketing">
              <div class="cookie-type-info">
                <h4>마케팅 쿠키</h4>
                <p>맞춤 광고 제공 및 광고 효과 측정 (Facebook Pixel 등)</p>
              </div>
            </div>
            <div class="cookie-type">
              <input type="checkbox" id="cookieFunctional" checked>
              <div class="cookie-type-info">
                <h4>기능 쿠키</h4>
                <p>사용자 설정 저장 (언어, 테마, 글꼴 크기 등)</p>
              </div>
            </div>
            <div class="cookie-type">
              <input type="checkbox" id="cookieThirdParty">
              <div class="cookie-type-info">
                <h4>제3자 쿠키</h4>
                <p>외부 서비스 연동 (소셜 미디어, 유튜브 임베드 등)</p>
              </div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>GDPR 적용 여부</label>
          <select id="gdprApply" class="tool-input">
            <option value="no">적용 안 함 (국내 전용)</option>
            <option value="yes">GDPR 적용 (EU 사용자 포함)</option>
          </select>
        </div>

        <div style="display: flex; gap: 0.5rem;">
          <button class="tool-btn tool-btn-primary" onclick="CookiePolicy.generate()" aria-label="정책 생성">정책 생성</button>
          <button class="tool-btn tool-btn-secondary" onclick="CookiePolicy.copy()" aria-label="복사">복사</button>
          <button class="tool-btn tool-btn-secondary" onclick="CookiePolicy.download()" aria-label="다운로드">다운로드</button>
        </div>

        <div id="previewContainer"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="cookie-policy.js"></script>
</body>
</html>
