<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>청구서/인보이스 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="invoice-gen.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">청구서/인보이스 생성기</h1>
      <p class="tool-description">세금계산서 형태의 청구서를 생성합니다</p>
    </header>

    <main class="tool-content">
      <div class="form-section">
        <h3 class="section-title">정보 입력</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>발행자 (공급자)</label>
            <input type="text" id="seller" class="form-input" placeholder="회사명" aria-label="회사명">
          </div>
          <div class="form-group">
            <label>사업자등록번호</label>
            <input type="text" id="sellerBizNum" class="form-input" placeholder="000-00-00000" aria-label="000-00-00000">
          </div>
          <div class="form-group">
            <label>구매자</label>
            <input type="text" id="buyer" class="form-input" placeholder="구매자명" aria-label="구매자명">
          </div>
          <div class="form-group">
            <label>발행일</label>
            <input type="date" id="invoiceDate" class="form-input">
          </div>
          <div class="form-group full-width">
            <label>품목 (품목명:수량:단가 형식, 줄바꿈으로 구분)</label>
            <textarea id="items" class="form-input" placeholder="웹사이트 제작:1:3000000&#10;유지보수:3:500000">웹사이트 제작:1:3000000
유지보수 (월):3:500000</textarea>
          </div>
        </div>
        <button class="generate-btn" onclick="invoicegenGen.generate()" aria-label="문서 생성">문서 생성</button>
      </div>

      <div class="preview-section">
        <h3 class="section-title">미리보기</h3>
        <div class="document-preview" id="preview"></div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="invoicegenGen.copyText()" aria-label="텍스트 복사">텍스트 복사</button>
          <button class="export-btn secondary" onclick="invoicegenGen.downloadTxt()" aria-label="TXT 다운로드">TXT 다운로드</button>
          <button class="export-btn secondary" onclick="invoicegenGen.print()" aria-label="인쇄">인쇄</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="invoice-gen.js"></script>
</body>
</html>
