<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀유지계약서 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="nda-gen.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">비밀유지계약서 생성기</h1>
      <p class="tool-description">NDA 비밀유지계약서를 쉽게 작성합니다</p>
    </header>

    <main class="tool-content">
      <div class="form-section">
        <h3 class="section-title">정보 입력</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>공개자 (갑)</label>
            <input type="text" id="partyA" class="form-input" placeholder="회사명 또는 이름" aria-label="회사명 또는 이름">
          </div>
          <div class="form-group">
            <label>수령자 (을)</label>
            <input type="text" id="partyB" class="form-input" placeholder="회사명 또는 이름" aria-label="회사명 또는 이름">
          </div>
          <div class="form-group">
            <label>계약일</label>
            <input type="date" id="contractDate" class="form-input">
          </div>
          <div class="form-group">
            <label>유효기간 (년)</label>
            <input type="number" id="duration" class="form-input" value="2" min="1" max="10">
          </div>
          <div class="form-group full-width">
            <label>비밀정보 범위</label>
            <textarea id="scopeInfo" class="form-input" placeholder="비밀유지 대상 정보의 범위를 기재해주세요">기술 자료, 영업 정보, 고객 데이터, 제품 설계 등 업무 수행 과정에서 취득하는 모든 비공개 정보</textarea>
          </div>
        </div>
        <button class="generate-btn" onclick="ndagenGen.generate()" aria-label="문서 생성">문서 생성</button>
      </div>

      <div class="preview-section">
        <h3 class="section-title">미리보기</h3>
        <div class="document-preview" id="preview"></div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="ndagenGen.copyText()" aria-label="텍스트 복사">텍스트 복사</button>
          <button class="export-btn secondary" onclick="ndagenGen.downloadTxt()" aria-label="TXT 다운로드">TXT 다운로드</button>
          <button class="export-btn secondary" onclick="ndagenGen.print()" aria-label="인쇄">인쇄</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="nda-gen.js"></script>
</body>
</html>
