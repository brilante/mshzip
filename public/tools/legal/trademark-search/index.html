<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상표 검색기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .legal-container { max-width: 800px; margin: 0 auto; }
    .legal-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .search-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .search-form input { flex: 1; }
    .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.5rem; margin-bottom: 1.5rem; max-height: 200px; overflow-y: auto; }
    .class-item { padding: 0.5rem; border-radius: 8px; background: var(--bg-primary); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .class-item:hover { background: var(--primary); color: white; }
    .class-item.selected { background: var(--primary); color: white; }
    .search-results { margin-top: 1.5rem; }
    .result-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .result-name { font-weight: 600; font-size: 1.1rem; }
    .result-status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .status-registered { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .status-pending { background: rgba(234, 179, 8, 0.2); color: #eab308; }
    .status-rejected { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .result-details { font-size: 0.85rem; color: var(--text-secondary); }
    .info-box { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
    .info-box h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; }
    .external-links { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon">®</div>
        <div>
          <h1 class="tool-title">상표 검색기</h1>
          <p class="tool-description">상표 등록 가능성 확인</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="legal-container">
      <div class="legal-panel">
        <div class="info-box">
          <h4>상표 검색 안내</h4>
          <p style="font-size: 0.85rem; color: var(--text-secondary);">
            이 도구는 유사 상표 검색 시뮬레이션을 제공합니다.<br>
            실제 상표 등록 여부 확인은 특허청 키프리스(KIPRIS)를 이용해주세요.
          </p>
          <div class="external-links">
            <a href="https://www.kipris.or.kr" target="_blank" class="tool-btn tool-btn-secondary" style="font-size: 0.85rem;">KIPRIS 바로가기</a>
            <a href="https://www.kipo.go.kr" target="_blank" class="tool-btn tool-btn-secondary" style="font-size: 0.85rem;">특허청</a>
          </div>
        </div>

        <div class="search-form">
          <input type="text" id="trademarkQuery" class="tool-input" placeholder="검색할 상표명 입력" aria-label="검색할 상표명 입력">
          <button class="tool-btn tool-btn-primary" onclick="TrademarkSearch.search()" aria-label="검색">검색</button>
        </div>

        <div style="margin-bottom: 1rem;">
          <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">상품/서비스 분류 선택 (다중 선택 가능)</label>
          <div class="class-grid" id="classGrid"></div>
        </div>

        <div class="search-results" id="searchResults">
          <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">
            상표명을 입력하고 검색하세요
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="trademark-search.js"></script>
</body>
</html>
