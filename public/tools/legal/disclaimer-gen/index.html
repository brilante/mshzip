<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>면책조항 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .legal-container { max-width: 800px; margin: 0 auto; }
    .legal-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .type-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .type-option { padding: 0.75rem 1rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; font-size: 0.85rem; }
    .type-option:hover { border-color: var(--primary); }
    .type-option.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
    .checkbox-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
    .disclaimer-preview { background: white; color: #333; border-radius: 8px; padding: 1.5rem; margin-top: 1.5rem; font-family: 'Malgun Gothic', sans-serif; line-height: 1.8; max-height: 500px; overflow-y: auto; }
    .disclaimer-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; text-align: center; }
    .disclaimer-section { margin-bottom: 1rem; }
    .disclaimer-section h4 { font-weight: 600; margin-bottom: 0.5rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">면책조항 생성기</h1>
          <p class="tool-description">웹사이트/서비스 면책조항 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="legal-container">
      <div class="legal-panel">
        <div class="form-row">
          <div class="form-group">
            <label>웹사이트/서비스명</label>
            <input type="text" id="siteName" class="tool-input" placeholder="MyService" aria-label="MyService">
          </div>
          <div class="form-group">
            <label>회사/운영자명</label>
            <input type="text" id="companyName" class="tool-input" placeholder="주식회사 ABC" aria-label="주식회사 ABC">
          </div>
        </div>

        <div class="form-group">
          <label>면책조항 유형</label>
          <div class="type-options">
            <div class="type-option selected" data-type="general" onclick="DisclaimerGen.selectType('general')">일반 면책조항</div>
            <div class="type-option" data-type="blog" onclick="DisclaimerGen.selectType('blog')">블로그/콘텐츠</div>
            <div class="type-option" data-type="ecommerce" onclick="DisclaimerGen.selectType('ecommerce')">전자상거래</div>
            <div class="type-option" data-type="financial" onclick="DisclaimerGen.selectType('financial')">금융/투자 정보</div>
            <div class="type-option" data-type="health" onclick="DisclaimerGen.selectType('health')">건강/의료 정보</div>
            <div class="type-option" data-type="affiliate" onclick="DisclaimerGen.selectType('affiliate')">제휴 마케팅</div>
          </div>
        </div>

        <div class="form-group">
          <label>포함할 항목</label>
          <div class="checkbox-group">
            <label class="checkbox-item">
              <input type="checkbox" id="incAccuracy" checked> 정보 정확성
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="incExternal" checked> 외부 링크
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="incAvailability"> 서비스 가용성
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="incDamages" checked> 손해 책임 제한
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="incChanges"> 내용 변경 권한
            </label>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem;">
          <button class="tool-btn tool-btn-primary" onclick="DisclaimerGen.generate()" aria-label="생성">생성</button>
          <button class="tool-btn tool-btn-secondary" onclick="DisclaimerGen.copy()" aria-label="복사">복사</button>
          <button class="tool-btn tool-btn-secondary" onclick="DisclaimerGen.download()" aria-label="다운로드">다운로드</button>
        </div>

        <div id="previewContainer"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="disclaimer-gen.js"></script>
</body>
</html>
