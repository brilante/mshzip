<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전자서명 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .legal-container { max-width: 700px; margin: 0 auto; }
    .legal-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .signature-canvas-container { background: white; border-radius: 12px; padding: 1rem; margin: 1rem 0; }
    #signatureCanvas { border: 2px dashed #ccc; border-radius: 8px; cursor: crosshair; touch-action: none; }
    .style-options { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .style-btn { padding: 0.5rem 1rem; border-radius: 20px; border: none; cursor: pointer; background: var(--bg-primary); font-size: 0.85rem; transition: all 0.2s; }
    .style-btn.active { background: var(--primary); color: white; }
    .color-options { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
    .color-btn.active { border-color: var(--primary); transform: scale(1.1); }
    .text-signature { font-size: 2.5rem; padding: 1rem; text-align: center; min-height: 100px; display: flex; align-items: center; justify-content: center; }
    .preview-section { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-top: 1rem; }
    .preview-section h4 { font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--text-secondary); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">전자서명 생성기</h1>
          <p class="tool-description">손글씨/텍스트 서명 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="legal-container">
      <div class="legal-panel">
        <div class="style-options">
          <button class="style-btn active" data-mode="draw" onclick="SignatureMaker.setMode('draw')" aria-label="직접 그리기">직접 그리기</button>
          <button class="style-btn" data-mode="text" onclick="SignatureMaker.setMode('text')" aria-label="텍스트 서명">텍스트 서명</button>
        </div>

        <!-- 그리기 모드 -->
        <div id="drawMode">
          <div class="color-options">
            <button class="color-btn active" style="background: #000000;" data-color="#000000" onclick="SignatureMaker.setColor('#000000')"></button>
            <button class="color-btn" style="background: #1e40af;" data-color="#1e40af" onclick="SignatureMaker.setColor('#1e40af')"></button>
            <button class="color-btn" style="background: #dc2626;" data-color="#dc2626" onclick="SignatureMaker.setColor('#dc2626')"></button>
            <button class="color-btn" style="background: #166534;" data-color="#166534" onclick="SignatureMaker.setColor('#166534')"></button>
          </div>
          <div class="signature-canvas-container">
            <canvas id="signatureCanvas" width="600" height="200"></canvas>
          </div>
          <button class="tool-btn tool-btn-secondary" onclick="SignatureMaker.clear()" aria-label="지우기">지우기</button>
        </div>

        <!-- 텍스트 모드 -->
        <div id="textMode" style="display: none;">
          <div class="form-group">
            <label>서명 이름</label>
            <input type="text" id="signatureName" class="tool-input" placeholder="홍길동" oninput="SignatureMaker.updateTextSignature()" aria-label="홍길동">
          </div>
          <div class="form-group">
            <label>폰트 스타일</label>
            <select id="fontStyle" class="tool-input" onchange="SignatureMaker.updateTextSignature()">
              <option value="'Nanum Pen Script', cursive">나눔펜스크립트</option>
              <option value="'Gaegu', cursive">개구</option>
              <option value="'Dancing Script', cursive">Dancing Script</option>
              <option value="'Great Vibes', cursive">Great Vibes</option>
              <option value="cursive">기본 필기체</option>
            </select>
          </div>
          <div class="color-options">
            <button class="color-btn active" style="background: #000000;" data-color="#000000" onclick="SignatureMaker.setTextColor('#000000')"></button>
            <button class="color-btn" style="background: #1e40af;" data-color="#1e40af" onclick="SignatureMaker.setTextColor('#1e40af')"></button>
            <button class="color-btn" style="background: #dc2626;" data-color="#dc2626" onclick="SignatureMaker.setTextColor('#dc2626')"></button>
          </div>
          <div class="signature-canvas-container">
            <div id="textSignaturePreview" class="text-signature">서명을 입력하세요</div>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-primary" onclick="SignatureMaker.download('png')" aria-label="PNG 다운로드">PNG 다운로드</button>
          <button class="tool-btn tool-btn-secondary" onclick="SignatureMaker.download('svg')" aria-label="SVG 다운로드">SVG 다운로드</button>
        </div>

        <div class="preview-section">
          <h4>사용 안내</h4>
          <p style="font-size: 0.85rem; color: var(--text-secondary);">
            생성된 서명은 문서 서명, 이메일 서명 등에 활용할 수 있습니다.<br>
            법적 효력이 필요한 경우 공인전자서명을 사용하세요.
          </p>
        </div>
      </div>
    </div>
  </div>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Gaegu:wght@700&family=Great+Vibes&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="signature-maker.js"></script>
</body>
</html>
