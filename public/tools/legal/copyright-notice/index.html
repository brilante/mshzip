<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저작권 고지 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .legal-container { max-width: 700px; margin: 0 auto; }
    .legal-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .license-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .license-option { padding: 1rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
    .license-option:hover { border-color: var(--primary); }
    .license-option.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
    .license-option h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.25rem; }
    .license-option p { font-size: 0.75rem; color: var(--text-secondary); }
    .notice-preview { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; font-family: monospace; white-space: pre-wrap; font-size: 0.9rem; line-height: 1.6; }
    .format-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .format-tab { padding: 0.5rem 1rem; border-radius: 8px; border: none; cursor: pointer; background: var(--bg-primary); font-size: 0.85rem; }
    .format-tab.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon">©</div>
        <div>
          <h1 class="tool-title">저작권 고지 생성기</h1>
          <p class="tool-description">저작권 표시 및 라이선스 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="legal-container">
      <div class="legal-panel">
        <div class="form-row">
          <div class="form-group">
            <label>저작권자명</label>
            <input type="text" id="holderName" class="tool-input" placeholder="홍길동 또는 회사명" aria-label="홍길동 또는 회사명">
          </div>
          <div class="form-group">
            <label>저작권 년도</label>
            <input type="text" id="copyrightYear" class="tool-input" placeholder="2024 또는 2020-2024" aria-label="2024 또는 2020-2024">
          </div>
        </div>

        <div class="form-group">
          <label>작품/프로젝트명 (선택)</label>
          <input type="text" id="workName" class="tool-input" placeholder="My Project" aria-label="My Project">
        </div>

        <div class="form-group">
          <label>라이선스 유형</label>
          <div class="license-options">
            <div class="license-option selected" data-license="all-rights" onclick="CopyrightNotice.selectLicense('all-rights')">
              <h4>All Rights Reserved</h4>
              <p>모든 권리 보유 (기본)</p>
            </div>
            <div class="license-option" data-license="cc-by" onclick="CopyrightNotice.selectLicense('cc-by')">
              <h4>CC BY 4.0</h4>
              <p>저작자 표시</p>
            </div>
            <div class="license-option" data-license="cc-by-sa" onclick="CopyrightNotice.selectLicense('cc-by-sa')">
              <h4>CC BY-SA 4.0</h4>
              <p>저작자 표시 + 동일조건</p>
            </div>
            <div class="license-option" data-license="cc-by-nc" onclick="CopyrightNotice.selectLicense('cc-by-nc')">
              <h4>CC BY-NC 4.0</h4>
              <p>저작자 표시 + 비영리</p>
            </div>
            <div class="license-option" data-license="mit" onclick="CopyrightNotice.selectLicense('mit')">
              <h4>MIT License</h4>
              <p>소프트웨어용 오픈소스</p>
            </div>
            <div class="license-option" data-license="apache" onclick="CopyrightNotice.selectLicense('apache')">
              <h4>Apache 2.0</h4>
              <p>소프트웨어용 오픈소스</p>
            </div>
          </div>
        </div>

        <div class="format-tabs">
          <button class="format-tab active" data-format="text" onclick="CopyrightNotice.setFormat('text')" aria-label="텍스트">텍스트</button>
          <button class="format-tab" data-format="html" onclick="CopyrightNotice.setFormat('html')" aria-label="HTML">HTML</button>
          <button class="format-tab" data-format="markdown" onclick="CopyrightNotice.setFormat('markdown')" aria-label="Markdown">Markdown</button>
        </div>

        <div style="display: flex; gap: 0.5rem;">
          <button class="tool-btn tool-btn-primary" onclick="CopyrightNotice.generate()" aria-label="생성">생성</button>
          <button class="tool-btn tool-btn-secondary" onclick="CopyrightNotice.copy()" aria-label="복사">복사</button>
        </div>

        <div class="notice-preview" id="noticePreview">
          저작권 정보를 입력하고 생성 버튼을 클릭하세요
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="copyright-notice.js"></script>
</body>
</html>
