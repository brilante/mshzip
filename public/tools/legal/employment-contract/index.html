<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>근로계약서 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="employment-contract.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">근로계약서 생성기</h1>
      <p class="tool-description">표준 근로계약서를 생성합니다</p>
    </header>

    <main class="tool-content">
      <div class="form-section">
        <h3 class="section-title">정보 입력</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>사업장명</label>
            <input type="text" id="companyName" class="form-input" placeholder="회사명" aria-label="회사명">
          </div>
          <div class="form-group">
            <label>대표자</label>
            <input type="text" id="ceoName" class="form-input" placeholder="대표자명" aria-label="대표자명">
          </div>
          <div class="form-group">
            <label>근로자 성명</label>
            <input type="text" id="employeeName" class="form-input" placeholder="근로자 이름" aria-label="근로자 이름">
          </div>
          <div class="form-group">
            <label>근무 부서/직위</label>
            <input type="text" id="position" class="form-input" placeholder="개발팀 / 사원" aria-label="개발팀 / 사원">
          </div>
          <div class="form-group">
            <label>계약 시작일</label>
            <input type="date" id="startDate" class="form-input">
          </div>
          <div class="form-group">
            <label>계약 종료일 (정규직 시 비움)</label>
            <input type="date" id="endDate" class="form-input">
          </div>
          <div class="form-group">
            <label>근무 장소</label>
            <input type="text" id="workPlace" class="form-input" placeholder="서울시 강남구..." aria-label="서울시 강남구...">
          </div>
          <div class="form-group">
            <label>업무 내용</label>
            <input type="text" id="jobDesc" class="form-input" placeholder="소프트웨어 개발" aria-label="소프트웨어 개발">
          </div>
          <div class="form-group">
            <label>근무 시간</label>
            <input type="text" id="workHours" class="form-input" placeholder="09:00 ~ 18:00" value="09:00 ~ 18:00" aria-label="09:00 ~ 18:00">
          </div>
          <div class="form-group">
            <label>휴게 시간</label>
            <input type="text" id="breakTime" class="form-input" placeholder="12:00 ~ 13:00" value="12:00 ~ 13:00" aria-label="12:00 ~ 13:00">
          </div>
          <div class="form-group">
            <label>월 급여 (원)</label>
            <input type="number" id="salary" class="form-input" placeholder="3000000" aria-label="3000000">
          </div>
          <div class="form-group">
            <label>급여일</label>
            <input type="text" id="payDay" class="form-input" placeholder="매월 25일" value="매월 25일" aria-label="매월 25일">
          </div>
        </div>
        <button class="generate-btn" onclick="EmploymentGen.generate()" aria-label="계약서 생성">계약서 생성</button>
      </div>

      <div class="preview-section">
        <h3 class="section-title">미리보기</h3>
        <div class="document-preview" id="preview"></div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="EmploymentGen.copyText()" aria-label="복사">복사</button>
          <button class="export-btn secondary" onclick="EmploymentGen.print()" aria-label="인쇄">인쇄</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="employment-contract.js"></script>
</body>
</html>
