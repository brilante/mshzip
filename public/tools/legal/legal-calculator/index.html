<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>법률 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .legal-container { max-width: 700px; margin: 0 auto; }
    .legal-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .calc-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .calc-tab { padding: 0.75rem 1rem; border-radius: 8px; border: none; cursor: pointer; background: var(--bg-primary); font-size: 0.9rem; transition: all 0.2s; }
    .calc-tab.active { background: var(--primary); color: white; }
    .calc-section { display: none; }
    .calc-section.active { display: block; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .result-box { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
    .result-title { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .result-value { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
    .result-details { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .detail-row { display: flex; justify-content: space-between; padding: 0.5rem 0; font-size: 0.9rem; }
    .info-text { font-size: 0.8rem; color: var(--text-secondary); margin-top: 1rem; padding: 1rem; background: rgba(59, 130, 246, 0.1); border-radius: 8px; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">법률 계산기</h1>
          <p class="tool-description">지연이자, 인지대 등 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="legal-container">
      <div class="legal-panel">
        <div class="calc-tabs">
          <button class="calc-tab active" onclick="LegalCalculator.showTab('delay')" aria-label="지연이자">지연이자</button>
          <button class="calc-tab" onclick="LegalCalculator.showTab('stamp')" aria-label="인지대">인지대</button>
          <button class="calc-tab" onclick="LegalCalculator.showTab('severance')" aria-label="퇴직금">퇴직금</button>
        </div>

        <!-- 지연이자 계산기 -->
        <div id="delaySection" class="calc-section active">
          <div class="form-row">
            <div class="form-group">
              <label>원금 (원)</label>
              <input type="number" id="delayPrincipal" class="tool-input" placeholder="10000000" aria-label="10000000">
            </div>
            <div class="form-group">
              <label>연이율 (%)</label>
              <input type="number" id="delayRate" class="tool-input" value="12" step="0.1">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>시작일</label>
              <input type="date" id="delayStart" class="tool-input">
            </div>
            <div class="form-group">
              <label>종료일</label>
              <input type="date" id="delayEnd" class="tool-input">
            </div>
          </div>
          <button class="tool-btn tool-btn-primary" onclick="LegalCalculator.calcDelay()" aria-label="계산하기">계산하기</button>
          <div id="delayResult"></div>
          <div class="info-text">
            ℹ상사법정이율: 연 6%, 민사법정이율: 연 5%, 소송촉진법 지연이자: 연 12%
          </div>
        </div>

        <!-- 인지대 계산기 -->
        <div id="stampSection" class="calc-section">
          <div class="form-group">
            <label>소가 (원)</label>
            <input type="number" id="stampAmount" class="tool-input" placeholder="50000000" aria-label="50000000">
          </div>
          <div class="form-group">
            <label>소송 종류</label>
            <select id="stampType" class="tool-input">
              <option value="civil">민사소송</option>
              <option value="appeal">항소심</option>
              <option value="supreme">상고심</option>
            </select>
          </div>
          <button class="tool-btn tool-btn-primary" onclick="LegalCalculator.calcStamp()" aria-label="계산하기">계산하기</button>
          <div id="stampResult"></div>
        </div>

        <!-- 퇴직금 계산기 -->
        <div id="severanceSection" class="calc-section">
          <div class="form-row">
            <div class="form-group">
              <label>입사일</label>
              <input type="date" id="sevStart" class="tool-input">
            </div>
            <div class="form-group">
              <label>퇴사일</label>
              <input type="date" id="sevEnd" class="tool-input">
            </div>
          </div>
          <div class="form-group">
            <label>최근 3개월 총 급여 (원)</label>
            <input type="number" id="sevSalary" class="tool-input" placeholder="9000000" aria-label="9000000">
          </div>
          <button class="tool-btn tool-btn-primary" onclick="LegalCalculator.calcSeverance()" aria-label="계산하기">계산하기</button>
          <div id="severanceResult"></div>
          <div class="info-text">
            ℹ퇴직금 = (1일 평균임금 × 30일) × (재직일수 ÷ 365)
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="legal-calculator.js"></script>
</body>
</html>
