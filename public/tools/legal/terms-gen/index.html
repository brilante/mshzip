<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이용약관 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="terms-gen.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">이용약관 생성기</h1>
      <p class="tool-description">서비스 이용약관을 쉽게 작성합니다</p>
    </header>

    <main class="tool-content">
      <div class="form-section">
        <h3 class="section-title">정보 입력</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>서비스명</label>
            <input type="text" id="serviceName" class="form-input" placeholder="서비스 이름" aria-label="서비스 이름">
          </div>
          <div class="form-group">
            <label>운영자/회사명</label>
            <input type="text" id="companyName" class="form-input" placeholder="회사명" aria-label="회사명">
          </div>
          <div class="form-group">
            <label>서비스 URL</label>
            <input type="text" id="serviceUrl" class="form-input" placeholder="https://example.com" aria-label="https://example.com">
          </div>
          <div class="form-group">
            <label>연락처 이메일</label>
            <input type="email" id="contactEmail" class="form-input" placeholder="support@example.com" aria-label="support@example.com">
          </div>
          <div class="form-group full-width">
            <label>서비스 설명</label>
            <textarea id="serviceDesc" class="form-input" placeholder="서비스에 대한 간단한 설명">온라인 플랫폼 서비스를 제공합니다.</textarea>
          </div>
        </div>
        <button class="generate-btn" onclick="TermsGen.generate()" aria-label="이용약관 생성">이용약관 생성</button>
      </div>

      <div class="preview-section">
        <h3 class="section-title">미리보기</h3>
        <div class="document-preview" id="preview"></div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="TermsGen.copyText()" aria-label="복사">복사</button>
          <button class="export-btn secondary" onclick="TermsGen.downloadTxt()" aria-label="다운로드">다운로드</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="terms-gen.js"></script>
</body>
</html>
