<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비즈니스 편지 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="business-letter.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">비즈니스 편지 생성기</h1>
      <p class="tool-description">공식적인 비즈니스 편지를 작성합니다</p>
    </header>

    <main class="tool-content">
      <div class="form-section">
        <h3 class="section-title">정보 입력</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>발신자</label>
            <input type="text" id="sender" class="form-input" placeholder="이름 또는 회사명" aria-label="이름 또는 회사명">
          </div>
          <div class="form-group">
            <label>발신자 직책</label>
            <input type="text" id="senderTitle" class="form-input" placeholder="대표이사" aria-label="대표이사">
          </div>
          <div class="form-group">
            <label>수신자</label>
            <input type="text" id="recipient" class="form-input" placeholder="받는 분 성함" aria-label="받는 분 성함">
          </div>
          <div class="form-group">
            <label>수신자 직책</label>
            <input type="text" id="recipientTitle" class="form-input" placeholder="부장님" aria-label="부장님">
          </div>
          <div class="form-group">
            <label>편지 유형</label>
            <select id="letterType" class="form-input">
              <option value="thanks">감사 편지</option>
              <option value="inquiry">문의 편지</option>
              <option value="proposal">제안 편지</option>
              <option value="apology">사과 편지</option>
              <option value="invitation">초대 편지</option>
            </select>
          </div>
          <div class="form-group">
            <label>날짜</label>
            <input type="date" id="letterDate" class="form-input">
          </div>
          <div class="form-group full-width">
            <label>편지 제목</label>
            <input type="text" id="subject" class="form-input" placeholder="편지 제목" aria-label="편지 제목">
          </div>
          <div class="form-group full-width">
            <label>본문 내용</label>
            <textarea id="content" class="form-input" style="min-height: 150px;" placeholder="편지 본문 내용을 입력하세요..."></textarea>
          </div>
        </div>
        <button class="generate-btn" onclick="LetterGen.generate()" aria-label="편지 생성">편지 생성</button>
      </div>

      <div class="preview-section">
        <h3 class="section-title">미리보기</h3>
        <div class="document-preview" id="preview"></div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="LetterGen.copyText()" aria-label="복사">복사</button>
          <button class="export-btn secondary" onclick="LetterGen.print()" aria-label="인쇄">인쇄</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="business-letter.js"></script>
</body>
</html>
