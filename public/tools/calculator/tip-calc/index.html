<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팁 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .calc-section {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 16px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 16px 20px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 24px;
      text-align: center;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .tip-buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    @media (max-width: 640px) {
      .tip-buttons { grid-template-columns: repeat(3, 1fr); }
    }
    .tip-btn {
      padding: 16px 8px;
      background: var(--tools-bg);
      border: 2px solid var(--tools-border);
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tip-btn:hover {
      border-color: var(--tools-primary);
      color: var(--tools-primary);
    }
    .tip-btn.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .custom-tip {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .custom-tip input {
      flex: 1;
      padding: 12px 16px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 16px;
      text-align: center;
    }
    .custom-tip span {
      color: var(--tools-text-secondary);
      font-size: 16px;
    }
    .people-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .people-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--tools-bg);
      border: 2px solid var(--tools-border);
      font-size: 24px;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .people-btn:hover {
      border-color: var(--tools-primary);
      color: var(--tools-primary);
    }
    .people-count {
      font-size: 32px;
      font-weight: 700;
      color: var(--tools-text);
      min-width: 60px;
      text-align: center;
    }
    .result-section {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(147, 51, 234, 0.1));
      border-radius: 12px;
      padding: 24px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 640px) {
      .result-grid { grid-template-columns: 1fr; }
    }
    .result-item {
      background: var(--tools-card-bg);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .result-item.main {
      grid-column: span 2;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }
    @media (max-width: 640px) {
      .result-item.main { grid-column: span 1; }
    }
    .result-label {
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 8px;
    }
    .result-item.main .result-label {
      color: rgba(255, 255, 255, 0.8);
    }
    .result-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--tools-text);
    }
    .result-item.main .result-value {
      font-size: 36px;
      color: white;
    }
    .result-sub {
      font-size: 12px;
      color: var(--tools-text-secondary);
      margin-top: 4px;
    }
    .result-item.main .result-sub {
      color: rgba(255, 255, 255, 0.7);
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .currency-select {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .currency-btn {
      padding: 8px 16px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 6px;
      font-size: 14px;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .currency-btn:hover {
      border-color: var(--tools-primary);
    }
    .currency-btn.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">팁 계산기</h1>
          <p class="tool-description">팁과 인당 금액 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="calc-section">
        <div class="section-title">통화 선택</div>
        <div class="currency-select">
          <button class="currency-btn active" data-currency="KRW" onclick="TipCalc.setCurrency('KRW')" aria-label="🇰🇷 원 (₩)">🇰🇷 원 (₩)</button>
          <button class="currency-btn" data-currency="USD" onclick="TipCalc.setCurrency('USD')" aria-label="🇺🇸 달러 ($)">🇺🇸 달러 ($)</button>
          <button class="currency-btn" data-currency="EUR" onclick="TipCalc.setCurrency('EUR')" aria-label="🇪🇺 유로 (€)">🇪🇺 유로 (€)</button>
          <button class="currency-btn" data-currency="JPY" onclick="TipCalc.setCurrency('JPY')" aria-label="🇯🇵 엔 (¥)">🇯🇵 엔 (¥)</button>
        </div>

        <div class="section-title">금액 입력</div>
        <div class="input-group">
          <input type="number" id="billAmount" placeholder="0" min="0" oninput="TipCalc.calculate()" aria-label="0">
        </div>

        <div class="section-title">팁 비율</div>
        <div class="tip-buttons">
          <button class="tip-btn" data-tip="10" onclick="TipCalc.setTip(10)" aria-label="10%">10%</button>
          <button class="tip-btn active" data-tip="15" onclick="TipCalc.setTip(15)" aria-label="15%">15%</button>
          <button class="tip-btn" data-tip="18" onclick="TipCalc.setTip(18)" aria-label="18%">18%</button>
          <button class="tip-btn" data-tip="20" onclick="TipCalc.setTip(20)" aria-label="20%">20%</button>
          <button class="tip-btn" data-tip="25" onclick="TipCalc.setTip(25)" aria-label="25%">25%</button>
        </div>
        <div class="custom-tip">
          <span>직접 입력:</span>
          <input type="number" id="customTip" placeholder="15" min="0" max="100" oninput="TipCalc.setCustomTip()" aria-label="15">
          <span>%</span>
        </div>

        <div class="section-title" style="margin-top: 24px;">인원 수</div>
        <div class="people-selector">
          <button class="people-btn" onclick="TipCalc.adjustPeople(-1)" aria-label="−">−</button>
          <span class="people-count" id="peopleCount">2</span>
          <button class="people-btn" onclick="TipCalc.adjustPeople(1)" aria-label="+">+</button>
        </div>
      </div>

      <div class="result-section" id="resultSection">
        <div class="result-grid">
          <div class="result-item main">
            <div class="result-label">1인당 금액</div>
            <div class="result-value" id="perPerson">₩0</div>
            <div class="result-sub">팁 포함</div>
          </div>
          <div class="result-item">
            <div class="result-label">팁 금액</div>
            <div class="result-value" id="tipAmount">₩0</div>
          </div>
          <div class="result-item">
            <div class="result-label">총 금액</div>
            <div class="result-value" id="totalAmount">₩0</div>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="tool-btn tool-btn-primary" onclick="TipCalc.calculate()" aria-label="계산하기">계산하기</button>
        <button class="tool-btn tool-btn-secondary" onclick="TipCalc.reset()" aria-label="초기화">초기화</button>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">팁 계산기 안내</div>
      <div class="help-content">
        <ul>
          <li>해외 식당, 호텔, 서비스업 이용 시 팁 계산에 유용</li>
          <li>인원 수에 따른 1인당 금액 자동 계산</li>
          <li>미국: 15-20%, 유럽: 5-15%, 아시아: 팁 불필요 또는 5-10%</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="/tools/common/tool-base.js?v=20260124"></script>
  <script src="tip-calc.js"></script>
</body>
</html>
