<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날짜 차이 계산 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .calc-section {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 16px;
    }
    .date-inputs {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: end;
    }
    @media (max-width: 640px) {
      .date-inputs { grid-template-columns: 1fr; }
      .arrow-icon { transform: rotate(90deg); }
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 16px;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .arrow-icon {
      font-size: 24px;
      color: var(--tools-primary);
      text-align: center;
      padding-bottom: 12px;
    }
    .result-section {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(147, 51, 234, 0.1));
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    .result-main {
      font-size: 48px;
      font-weight: 700;
      color: var(--tools-primary);
      margin-bottom: 8px;
    }
    .result-unit {
      font-size: 18px;
      color: var(--tools-text-secondary);
    }
    .result-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .detail-item {
      background: var(--tools-card-bg);
      border-radius: 8px;
      padding: 16px;
    }
    .detail-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--tools-text);
    }
    .detail-label {
      font-size: 12px;
      color: var(--tools-text-secondary);
      margin-top: 4px;
    }
    .quick-dates {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .quick-btn {
      padding: 8px 14px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-btn:hover {
      border-color: var(--tools-primary);
      color: var(--tools-primary);
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">날짜 차이 계산</h1>
          <p class="tool-description">두 날짜 사이의 차이를 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="calc-section">
        <div class="section-title">날짜 입력</div>
        <div class="date-inputs">
          <div class="input-group">
            <label>시작 날짜</label>
            <input type="date" id="startDate" onchange="DateDiff.calculate()">
          </div>
          <div class="arrow-icon">→</div>
          <div class="input-group">
            <label>종료 날짜</label>
            <input type="date" id="endDate" onchange="DateDiff.calculate()">
          </div>
        </div>
        <div class="quick-dates">
          <button class="quick-btn" onclick="DateDiff.setQuick('today')" aria-label="오늘">오늘</button>
          <button class="quick-btn" onclick="DateDiff.setQuick('birthday')" aria-label="생일까지">생일까지</button>
          <button class="quick-btn" onclick="DateDiff.setQuick('newyear')" aria-label="새해까지">새해까지</button>
          <button class="quick-btn" onclick="DateDiff.setQuick('christmas')" aria-label="크리스마스까지">크리스마스까지</button>
          <button class="quick-btn" onclick="DateDiff.swap()" aria-label="날짜 교환">날짜 교환</button>
        </div>
      </div>

      <div class="result-section" id="resultSection" style="display: none;">
        <div class="result-main" id="resultDays">0</div>
        <div class="result-unit">일</div>
        <div class="result-details">
          <div class="detail-item">
            <div class="detail-value" id="resultYears">0</div>
            <div class="detail-label">년</div>
          </div>
          <div class="detail-item">
            <div class="detail-value" id="resultMonths">0</div>
            <div class="detail-label">개월</div>
          </div>
          <div class="detail-item">
            <div class="detail-value" id="resultWeeks">0</div>
            <div class="detail-label">주</div>
          </div>
          <div class="detail-item">
            <div class="detail-value" id="resultHours">0</div>
            <div class="detail-label">시간</div>
          </div>
          <div class="detail-item">
            <div class="detail-value" id="resultMinutes">0</div>
            <div class="detail-label">분</div>
          </div>
          <div class="detail-item">
            <div class="detail-value" id="resultSeconds">0</div>
            <div class="detail-label">초</div>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="tool-btn tool-btn-primary" onclick="DateDiff.calculate()" aria-label="계산하기">계산하기</button>
        <button class="tool-btn tool-btn-secondary" onclick="DateDiff.reset()" aria-label="초기화">초기화</button>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">날짜 차이 계산 안내</div>
      <div class="help-content">
        <ul>
          <li>두 날짜 사이의 정확한 차이를 다양한 단위로 표시</li>
          <li>빠른 설정으로 자주 사용하는 날짜 계산 가능</li>
          <li>날짜 교환 버튼으로 시작/종료 날짜 바꾸기</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="/tools/common/tool-base.js?v=20260124"></script>
  <script src="date-diff.js"></script>
</body>
</html>
