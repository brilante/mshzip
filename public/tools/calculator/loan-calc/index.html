<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대출 이자 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .calc-section {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 16px;
    }
    .input-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 640px) {
      .input-grid { grid-template-columns: 1fr; }
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 6px;
    }
    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px 16px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 16px;
    }
    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .input-suffix {
      position: relative;
    }
    .input-suffix span {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--tools-text-secondary);
      font-size: 14px;
    }
    .input-suffix input {
      padding-right: 50px;
    }
    .result-section {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(147, 51, 234, 0.1));
      border-radius: 12px;
      padding: 24px;
    }
    .result-header {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) {
      .result-header { grid-template-columns: 1fr; }
    }
    .result-item {
      text-align: center;
      padding: 16px;
      background: var(--tools-card-bg);
      border-radius: 10px;
    }
    .result-label {
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 8px;
    }
    .result-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--tools-primary);
    }
    .result-value.total {
      color: #10b981;
    }
    .result-value.interest {
      color: #f59e0b;
    }
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    .schedule-table th,
    .schedule-table td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid var(--tools-border);
      font-size: 13px;
    }
    .schedule-table th {
      background: var(--tools-bg);
      color: var(--tools-text-secondary);
      font-weight: 500;
    }
    .schedule-table td {
      color: var(--tools-text);
    }
    .schedule-table td:first-child,
    .schedule-table th:first-child {
      text-align: center;
    }
    .schedule-wrapper {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--tools-border);
      border-radius: 8px;
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .method-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .method-tab {
      flex: 1;
      padding: 12px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      color: var(--tools-text);
    }
    .method-tab:hover {
      border-color: var(--tools-primary);
    }
    .method-tab.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">대출 이자 계산기</h1>
          <p class="tool-description">대출 상환액과 이자를 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="calc-section">
        <div class="section-title">대출 정보 입력</div>
        <div class="input-grid">
          <div class="input-group">
            <label>대출 원금</label>
            <div class="input-suffix">
              <input type="number" id="principal" value="100000000" min="0" step="1000000" onchange="LoanCalc.calculate()">
              <span>원</span>
            </div>
          </div>
          <div class="input-group">
            <label>연 이자율</label>
            <div class="input-suffix">
              <input type="number" id="interestRate" value="4.5" min="0" max="100" step="0.1" onchange="LoanCalc.calculate()">
              <span>%</span>
            </div>
          </div>
          <div class="input-group">
            <label>대출 기간</label>
            <div class="input-suffix">
              <input type="number" id="loanTerm" value="30" min="1" max="50" onchange="LoanCalc.calculate()">
              <span>년</span>
            </div>
          </div>
          <div class="input-group">
            <label>상환 주기</label>
            <select id="paymentFrequency" onchange="LoanCalc.calculate()">
              <option value="12">매월</option>
              <option value="4">분기별</option>
              <option value="1">연간</option>
            </select>
          </div>
        </div>
        <div class="method-tabs" style="margin-top: 16px;">
          <div class="method-tab active" data-method="equal" onclick="LoanCalc.setMethod('equal')">원리금균등</div>
          <div class="method-tab" data-method="principal" onclick="LoanCalc.setMethod('principal')">원금균등</div>
          <div class="method-tab" data-method="bullet" onclick="LoanCalc.setMethod('bullet')">만기일시</div>
        </div>
      </div>

      <div class="result-section" id="resultSection" style="display: none;">
        <div class="result-header">
          <div class="result-item">
            <div class="result-label">월 상환액</div>
            <div class="result-value" id="monthlyPayment">0원</div>
          </div>
          <div class="result-item">
            <div class="result-label">총 상환액</div>
            <div class="result-value total" id="totalPayment">0원</div>
          </div>
          <div class="result-item">
            <div class="result-label">총 이자</div>
            <div class="result-value interest" id="totalInterest">0원</div>
          </div>
        </div>

        <div class="section-title">상환 스케줄</div>
        <div class="schedule-wrapper">
          <table class="schedule-table">
            <thead>
              <tr>
                <th>회차</th>
                <th>상환금</th>
                <th>원금</th>
                <th>이자</th>
                <th>잔액</th>
              </tr>
            </thead>
            <tbody id="scheduleBody">
            </tbody>
          </table>
        </div>
      </div>

      <div class="action-buttons">
        <button class="tool-btn tool-btn-primary" onclick="LoanCalc.calculate()" aria-label="계산하기">계산하기</button>
        <button class="tool-btn tool-btn-secondary" onclick="LoanCalc.reset()" aria-label="초기화">초기화</button>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">대출 계산기 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>원리금균등</strong>: 매월 동일 금액 상환 (원금+이자)</li>
          <li><strong>원금균등</strong>: 매월 동일 원금 상환, 이자는 점차 감소</li>
          <li><strong>만기일시</strong>: 매월 이자만 상환, 만기에 원금 일시 상환</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="/tools/common/tool-base.js?v=20260124"></script>
  <script src="loan-calc.js"></script>
</body>
</html>
