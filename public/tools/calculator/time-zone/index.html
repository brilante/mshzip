<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시간대 변환 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .calc-section {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 16px;
    }
    .time-input-row {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 640px) {
      .time-input-row { grid-template-columns: 1fr; }
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 6px;
    }
    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px 16px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 16px;
    }
    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .timezone-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .timezone-card {
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 10px;
      padding: 16px;
      transition: all 0.2s;
    }
    .timezone-card:hover {
      border-color: var(--tools-primary);
    }
    .timezone-card.selected {
      border-color: var(--tools-primary);
      background: rgba(59, 130, 246, 0.1);
    }
    .tz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .tz-name {
      font-weight: 600;
      color: var(--tools-text);
    }
    .tz-offset {
      font-size: 12px;
      color: var(--tools-text-secondary);
      background: var(--tools-card-bg);
      padding: 4px 8px;
      border-radius: 4px;
    }
    .tz-time {
      font-size: 28px;
      font-weight: 700;
      color: var(--tools-primary);
      margin: 8px 0;
    }
    .tz-date {
      font-size: 13px;
      color: var(--tools-text-secondary);
    }
    .quick-zones {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .quick-btn {
      padding: 8px 14px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-btn:hover {
      border-color: var(--tools-primary);
      color: var(--tools-primary);
    }
    .quick-btn.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .current-time {
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(147, 51, 234, 0.1));
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .current-time-label {
      font-size: 14px;
      color: var(--tools-text-secondary);
      margin-bottom: 8px;
    }
    .current-time-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--tools-primary);
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">시간대 변환</h1>
          <p class="tool-description">세계 각 도시의 현재 시간 확인</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="current-time">
        <div class="current-time-label">현재 로컬 시간</div>
        <div class="current-time-value" id="localTime">--:--:--</div>
      </div>

      <div class="calc-section">
        <div class="section-title">기준 시간 설정</div>
        <div class="time-input-row">
          <div class="input-group">
            <label>날짜/시간</label>
            <input type="datetime-local" id="baseDateTime" onchange="TimeZone.convert()">
          </div>
          <div class="input-group">
            <label>기준 시간대</label>
            <select id="baseTimezone" onchange="TimeZone.convert()">
              <option value="Asia/Seoul">서울 (KST, UTC+9)</option>
              <option value="Asia/Tokyo">도쿄 (JST, UTC+9)</option>
              <option value="Asia/Shanghai">상하이 (CST, UTC+8)</option>
              <option value="Asia/Singapore">싱가포르 (SGT, UTC+8)</option>
              <option value="Europe/London">런던 (GMT/BST)</option>
              <option value="Europe/Paris">파리 (CET/CEST)</option>
              <option value="Europe/Berlin">베를린 (CET/CEST)</option>
              <option value="America/New_York">뉴욕 (EST/EDT)</option>
              <option value="America/Los_Angeles">로스앤젤레스 (PST/PDT)</option>
              <option value="America/Chicago">시카고 (CST/CDT)</option>
              <option value="Australia/Sydney">시드니 (AEST/AEDT)</option>
              <option value="Pacific/Auckland">오클랜드 (NZST/NZDT)</option>
              <option value="UTC">UTC</option>
            </select>
          </div>
        </div>
        <div class="quick-zones">
          <button class="quick-btn" onclick="TimeZone.setNow()" aria-label="현재 시간">현재 시간</button>
          <button class="quick-btn" onclick="TimeZone.addHours(1)" aria-label="+1시간">+1시간</button>
          <button class="quick-btn" onclick="TimeZone.addHours(-1)" aria-label="-1시간">-1시간</button>
          <button class="quick-btn" onclick="TimeZone.addHours(12)" aria-label="+12시간">+12시간</button>
        </div>
      </div>

      <div class="calc-section">
        <div class="section-title">세계 시간</div>
        <div class="timezone-grid" id="timezoneGrid">
          <!-- 시간대 카드들이 여기에 생성됨 -->
        </div>
      </div>

      <div class="action-buttons">
        <button class="tool-btn tool-btn-primary" onclick="TimeZone.convert()" aria-label="변환하기">변환하기</button>
        <button class="tool-btn tool-btn-secondary" onclick="TimeZone.reset()" aria-label="초기화">초기화</button>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">시간대 변환 안내</div>
      <div class="help-content">
        <ul>
          <li>기준 시간대의 시간을 입력하면 다른 시간대로 자동 변환</li>
          <li>일광절약시간(DST) 자동 적용</li>
          <li>실시간 현지 시간 표시</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="/tools/common/tool-base.js?v=20260124"></script>
  <script src="time-zone.js"></script>
</body>
</html>
