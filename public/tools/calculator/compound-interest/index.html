<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>복리 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .calc-section {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 16px;
    }
    .input-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 640px) {
      .input-grid { grid-template-columns: 1fr; }
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 6px;
    }
    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px 16px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 16px;
    }
    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .input-suffix {
      position: relative;
    }
    .input-suffix span {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--tools-text-secondary);
      font-size: 14px;
    }
    .input-suffix input {
      padding-right: 50px;
    }
    .result-section {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(16, 185, 129, 0.1));
      border-radius: 12px;
      padding: 24px;
    }
    .result-main {
      text-align: center;
      margin-bottom: 24px;
    }
    .result-main-value {
      font-size: 48px;
      font-weight: 700;
      color: #10b981;
    }
    .result-main-label {
      font-size: 14px;
      color: var(--tools-text-secondary);
      margin-top: 8px;
    }
    .result-breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) {
      .result-breakdown { grid-template-columns: 1fr; }
    }
    .breakdown-item {
      background: var(--tools-card-bg);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .breakdown-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--tools-text);
    }
    .breakdown-label {
      font-size: 12px;
      color: var(--tools-text-secondary);
      margin-top: 4px;
    }
    .chart-container {
      height: 200px;
      position: relative;
      margin-top: 24px;
    }
    .chart-bar {
      position: absolute;
      bottom: 0;
      border-radius: 4px 4px 0 0;
      transition: height 0.5s ease;
    }
    .chart-label {
      position: absolute;
      bottom: -24px;
      font-size: 11px;
      color: var(--tools-text-secondary);
      transform: translateX(-50%);
    }
    .chart-value {
      position: absolute;
      top: -20px;
      font-size: 10px;
      color: var(--tools-text);
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 40px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--tools-text-secondary);
    }
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .yearly-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    .yearly-table th,
    .yearly-table td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid var(--tools-border);
      font-size: 13px;
    }
    .yearly-table th {
      background: var(--tools-bg);
      color: var(--tools-text-secondary);
      font-weight: 500;
    }
    .yearly-table td:first-child,
    .yearly-table th:first-child {
      text-align: center;
    }
    .table-wrapper {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--tools-border);
      border-radius: 8px;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">복리 계산기</h1>
          <p class="tool-description">복리 이자로 자산 성장 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="calc-section">
        <div class="section-title">투자 정보 입력</div>
        <div class="input-grid">
          <div class="input-group">
            <label>초기 투자금</label>
            <div class="input-suffix">
              <input type="number" id="principal" value="10000000" min="0" step="1000000" onchange="CompoundInterest.calculate()">
              <span>원</span>
            </div>
          </div>
          <div class="input-group">
            <label>월 적립금</label>
            <div class="input-suffix">
              <input type="number" id="monthlyDeposit" value="500000" min="0" step="100000" onchange="CompoundInterest.calculate()">
              <span>원</span>
            </div>
          </div>
          <div class="input-group">
            <label>연 수익률</label>
            <div class="input-suffix">
              <input type="number" id="interestRate" value="7" min="0" max="100" step="0.5" onchange="CompoundInterest.calculate()">
              <span>%</span>
            </div>
          </div>
          <div class="input-group">
            <label>투자 기간</label>
            <div class="input-suffix">
              <input type="number" id="years" value="20" min="1" max="50" onchange="CompoundInterest.calculate()">
              <span>년</span>
            </div>
          </div>
          <div class="input-group">
            <label>복리 주기</label>
            <select id="compoundFrequency" onchange="CompoundInterest.calculate()">
              <option value="12">매월</option>
              <option value="4">분기별</option>
              <option value="1">연간</option>
              <option value="365">매일</option>
            </select>
          </div>
          <div class="input-group">
            <label>세금 (수익에 대한)</label>
            <div class="input-suffix">
              <input type="number" id="taxRate" value="15.4" min="0" max="100" step="0.1" onchange="CompoundInterest.calculate()">
              <span>%</span>
            </div>
          </div>
        </div>
      </div>

      <div class="result-section" id="resultSection" style="display: none;">
        <div class="result-main">
          <div class="result-main-value" id="finalAmount">0원</div>
          <div class="result-main-label">최종 자산 (세후)</div>
        </div>

        <div class="result-breakdown">
          <div class="breakdown-item">
            <div class="breakdown-value" id="totalDeposit">0원</div>
            <div class="breakdown-label">총 투자 원금</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-value" id="totalInterest">0원</div>
            <div class="breakdown-label">총 이자 수익</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-value" id="totalTax">0원</div>
            <div class="breakdown-label">세금</div>
          </div>
        </div>

        <div class="chart-container" id="chartContainer"></div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-color" style="background: #3b82f6;"></div>
            <span>원금</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #10b981;"></div>
            <span>이자</span>
          </div>
        </div>

        <div class="section-title" style="margin-top: 24px;">연도별 상세</div>
        <div class="table-wrapper">
          <table class="yearly-table">
            <thead>
              <tr>
                <th>년차</th>
                <th>총 원금</th>
                <th>이자</th>
                <th>잔액</th>
              </tr>
            </thead>
            <tbody id="yearlyTable"></tbody>
          </table>
        </div>
      </div>

      <div class="action-buttons">
        <button class="tool-btn tool-btn-primary" onclick="CompoundInterest.calculate()" aria-label="계산하기">계산하기</button>
        <button class="tool-btn tool-btn-secondary" onclick="CompoundInterest.reset()" aria-label="초기화">초기화</button>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">복리 계산기 안내</div>
      <div class="help-content">
        <ul>
          <li>복리 효과로 장기 투자 시 자산이 기하급수적으로 증가</li>
          <li>세금은 수익(이자)에만 적용됩니다</li>
          <li>실제 투자 수익률은 변동될 수 있습니다</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="/tools/common/tool-base.js?v=20260124"></script>
  <script src="compound-interest.js"></script>
</body>
</html>
