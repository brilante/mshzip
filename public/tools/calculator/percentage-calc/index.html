<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퍼센트 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="percentage-calc.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">퍼센트 계산기</h1>
      <p class="tool-description">다양한 퍼센트 계산을 쉽게 합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <!-- 계산 유형 1: X의 Y%는? -->
        <div class="calc-card">
          <div class="calc-title">A의 B%는 얼마?</div>
          <div class="calc-description">특정 값의 퍼센트 계산</div>
          <div class="calc-row">
            <input type="number" id="calc1_value" class="calc-input" placeholder="100" aria-label="100">
            <span class="calc-text">의</span>
            <input type="number" id="calc1_percent" class="calc-input small" placeholder="20" aria-label="20">
            <span class="calc-text">%는</span>
            <input type="text" id="calc1_result" class="calc-result" readonly>
          </div>
          <button class="calc-btn" onclick="PercentageCalc.calculate1()" aria-label="계산">계산</button>
        </div>

        <!-- 계산 유형 2: X는 Y의 몇 %? -->
        <div class="calc-card">
          <div class="calc-title">A는 B의 몇 %?</div>
          <div class="calc-description">비율을 퍼센트로 계산</div>
          <div class="calc-row">
            <input type="number" id="calc2_part" class="calc-input" placeholder="25" aria-label="25">
            <span class="calc-text">는</span>
            <input type="number" id="calc2_total" class="calc-input" placeholder="100" aria-label="100">
            <span class="calc-text">의</span>
            <input type="text" id="calc2_result" class="calc-result" readonly>
            <span class="calc-text">%</span>
          </div>
          <button class="calc-btn" onclick="PercentageCalc.calculate2()" aria-label="계산">계산</button>
        </div>

        <!-- 계산 유형 3: X%가 Y이면 전체는? -->
        <div class="calc-card">
          <div class="calc-title">A%가 B이면 전체는?</div>
          <div class="calc-description">퍼센트에서 전체 값 역산</div>
          <div class="calc-row">
            <input type="number" id="calc3_percent" class="calc-input small" placeholder="20" aria-label="20">
            <span class="calc-text">%가</span>
            <input type="number" id="calc3_value" class="calc-input" placeholder="50" aria-label="50">
            <span class="calc-text">이면 전체는</span>
            <input type="text" id="calc3_result" class="calc-result" readonly>
          </div>
          <button class="calc-btn" onclick="PercentageCalc.calculate3()" aria-label="계산">계산</button>
        </div>

        <!-- 계산 유형 4: 증감율 계산 -->
        <div class="calc-card">
          <div class="calc-title">증감율 계산</div>
          <div class="calc-description">두 값 사이의 변화율 계산</div>
          <div class="calc-row">
            <input type="number" id="calc4_from" class="calc-input" placeholder="80" aria-label="80">
            <span class="calc-text">→</span>
            <input type="number" id="calc4_to" class="calc-input" placeholder="100" aria-label="100">
            <span class="calc-text">=</span>
            <input type="text" id="calc4_result" class="calc-result" readonly>
            <span class="calc-text">%</span>
          </div>
          <button class="calc-btn" onclick="PercentageCalc.calculate4()" aria-label="계산">계산</button>
        </div>

        <!-- 계산 유형 5: 할인/할증 계산 -->
        <div class="calc-card">
          <div class="calc-title">할인/할증 계산</div>
          <div class="calc-description">원가에서 할인 또는 할증된 금액 계산</div>
          <div class="calc-row">
            <input type="number" id="calc5_original" class="calc-input" placeholder="50000" aria-label="50000">
            <span class="calc-text">원</span>
            <select id="calc5_type" class="calc-select">
              <option value="discount">할인</option>
              <option value="markup">할증</option>
            </select>
            <input type="number" id="calc5_rate" class="calc-input small" placeholder="20" aria-label="20">
            <span class="calc-text">%</span>
          </div>
          <div class="calc-row result-row">
            <span class="result-label">결과:</span>
            <input type="text" id="calc5_result" class="calc-result large" readonly>
            <span class="calc-text">원</span>
          </div>
          <button class="calc-btn" onclick="PercentageCalc.calculate5()" aria-label="계산">계산</button>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">사용 팁</div>
          <div class="help-content">
            <p>• 각 계산 유형에 맞는 값을 입력하고 계산 버튼을 클릭하세요</p>
            <p>• 증감율: 양수는 증가, 음수는 감소를 의미합니다</p>
            <p>• 결과 값을 클릭하면 클립보드에 복사됩니다</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="/tools/common/tool-base.js?v=20260124"></script>
  <script src="percentage-calc.js"></script>
</body>
</html>
