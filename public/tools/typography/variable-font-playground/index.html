<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가변 폰트 플레이그라운드 | Variable Font Playground</title>
  <link rel="stylesheet" href="variable-font-playground.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Recursive';
      src: url('https://fonts.gstatic.com/s/recursive/v38/8vJN7wMr0mhh-RQChyHEH06TlXhq_gukbYrFMk1QuAIcyEwG_X-dpEfaE5YaERmK-CImKsvxvU-MXGX2fSqasNfUvz2xbXfn1uEQadCCk3.woff2') format('woff2');
      font-weight: 300 1000;
      font-style: oblique 0deg 15deg;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>가변 폰트 플레이그라운드</h1>
      <p>가변 폰트의 다양한 축을 조절해보세요</p>
    </header>

    <div class="main-content">
      <div class="controls-panel">
        <h3>폰트 축 조절</h3>

        <div class="axis-control">
          <label>Weight (wght): <span id="wghtValue">400</span></label>
          <input type="range" id="wght" min="100" max="900" value="400">
        </div>

        <div class="axis-control">
          <label>Width (wdth): <span id="wdthValue">100</span></label>
          <input type="range" id="wdth" min="75" max="125" value="100">
        </div>

        <div class="axis-control">
          <label>Slant (slnt): <span id="slntValue">0</span></label>
          <input type="range" id="slnt" min="-15" max="0" value="0">
        </div>

        <div class="axis-control">
          <label>글자 크기: <span id="sizeValue">48</span>px</label>
          <input type="range" id="fontSize" min="16" max="120" value="48">
        </div>

        <div class="text-input">
          <label>미리보기 텍스트</label>
          <textarea id="previewText" rows="2">가변 폰트 Variable Font 1234567890</textarea>
        </div>

        <div class="css-output">
          <label>CSS 코드</label>
          <pre id="cssOutput">font-variation-settings: 'wght' 400;</pre>
          <button onclick="copyCSS()" aria-label="복사">복사</button>
        </div>
      </div>

      <div class="preview-panel">
        <div class="preview-text" id="preview">
          가변 폰트 Variable Font 1234567890
        </div>

        <div class="presets">
          <h4>프리셋</h4>
          <div class="preset-buttons">
            <button onclick="applyPreset(100, 100, 0)" aria-label="Thin">Thin</button>
            <button onclick="applyPreset(300, 100, 0)" aria-label="Light">Light</button>
            <button onclick="applyPreset(400, 100, 0)" aria-label="Regular">Regular</button>
            <button onclick="applyPreset(700, 100, 0)" aria-label="Bold">Bold</button>
            <button onclick="applyPreset(900, 100, 0)" aria-label="Black">Black</button>
            <button onclick="applyPreset(400, 100, -12)" aria-label="Italic">Italic</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="variable-font-playground.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
