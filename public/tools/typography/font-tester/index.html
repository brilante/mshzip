<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>폰트 테스터 | Font Tester</title>
  <link rel="stylesheet" href="font-tester.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>폰트 테스터</h1>
      <p>다양한 크기와 스타일로 폰트를 테스트하세요</p>
    </header>

    <div class="main-content">
      <div class="settings-panel">
        <div class="setting-group">
          <label>Google Fonts 이름</label>
          <div class="font-input-group">
            <input type="text" id="fontName" placeholder="예: Roboto, Noto Sans KR" value="Noto Sans KR" aria-label="예: Roboto, Noto Sans KR">
            <button onclick="loadFont()" aria-label="로드">로드</button>
          </div>
        </div>

        <div class="setting-group">
          <label>테스트 텍스트</label>
          <textarea id="testText" rows="2">가나다라마바사 ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz 0123456789 !@#$%^&*()</textarea>
        </div>

        <div class="style-options">
          <label><input type="checkbox" id="showItalic"> 이탤릭 표시</label>
          <label><input type="checkbox" id="showUppercase"> 대문자 변환</label>
        </div>
      </div>

      <div class="test-results" id="testResults">
        <div class="loading">폰트를 로드하세요...</div>
      </div>
    </div>
  </div>
  <script src="font-tester.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
