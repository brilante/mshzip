<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Fonts 탐색기 | Google Fonts Browser</title>
  <link rel="stylesheet" href="google-fonts-browser.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>Google Fonts 탐색기</h1>
      <p>Google Fonts 라이브러리를 검색하고 미리보세요</p>
    </header>

    <div class="main-content">
      <div class="search-section">
        <input type="text" id="searchInput" placeholder="폰트 이름으로 검색..." class="search-input" aria-label="폰트 이름으로 검색...">
        <div class="filters">
          <select id="categoryFilter">
            <option value="all">모든 카테고리</option>
            <option value="sans-serif">Sans Serif</option>
            <option value="serif">Serif</option>
            <option value="display">Display</option>
            <option value="handwriting">Handwriting</option>
            <option value="monospace">Monospace</option>
          </select>
          <input type="text" id="previewTextInput" placeholder="미리볼 텍스트" value="가나다라 ABCD 1234" aria-label="미리볼 텍스트">
        </div>
      </div>

      <div class="fonts-list" id="fontsList">
        <div class="loading">폰트 목록을 불러오는 중...</div>
      </div>
    </div>
  </div>
  <script src="google-fonts-browser.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
