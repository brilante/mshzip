<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>폰트 미리보기 | Font Preview</title>
  <link rel="stylesheet" href="font-preview.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Roboto:wght@100;300;400;500;700;900&family=Open+Sans:wght@300;400;600;700&family=Lato:wght@100;300;400;700;900&family=Montserrat:wght@100;300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Merriweather:wght@300;400;700;900&family=Source+Code+Pro:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>폰트 미리보기</h1>
      <p>다양한 폰트로 텍스트를 미리보고 비교하세요</p>
    </header>

    <div class="main-content">
      <div class="input-section">
        <label>미리볼 텍스트</label>
        <textarea id="previewText" rows="3" placeholder="미리볼 텍스트를 입력하세요...">가나다라마바사 ABCDEFG 1234567890</textarea>

        <div class="controls-row">
          <div class="control-group">
            <label>글자 크기</label>
            <input type="range" id="fontSize" min="12" max="96" value="32">
            <span id="fontSizeValue">32px</span>
          </div>
          <div class="control-group">
            <label>글자 굵기</label>
            <select id="fontWeight">
              <option value="100">Thin (100)</option>
              <option value="300">Light (300)</option>
              <option value="400" selected>Regular (400)</option>
              <option value="500">Medium (500)</option>
              <option value="600">SemiBold (600)</option>
              <option value="700">Bold (700)</option>
              <option value="900">Black (900)</option>
            </select>
          </div>
          <div class="control-group">
            <label>텍스트 색상</label>
            <input type="color" id="textColor" value="#333333">
          </div>
        </div>
      </div>

      <div class="fonts-grid" id="fontsGrid">
        <!-- 폰트 카드가 여기에 생성됩니다 -->
      </div>
    </div>
  </div>
  <script src="font-preview.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
