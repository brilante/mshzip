<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>폰트 식별기 | Font Identifier</title>
  <link rel="stylesheet" href="font-identifier.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>폰트 식별기</h1>
      <p>이미지에서 폰트를 분석하고 유사한 폰트를 찾아보세요</p>
    </header>

    <div class="main-content">
      <div class="upload-section">
        <div class="upload-area" id="uploadArea">
          <input type="file" id="imageInput" accept="image/*" hidden>
          <div class="upload-icon"></div>
          <p>이미지를 드래그하거나 클릭하여 업로드</p>
          <span class="upload-hint">JPG, PNG, GIF 지원</span>
        </div>

        <div class="preview-area" id="previewArea" style="display: none;">
          <img id="previewImage" src="" alt="Preview">
          <button class="remove-btn" onclick="removeImage()" aria-label="×">×</button>
        </div>
      </div>

      <div class="analysis-section" id="analysisSection" style="display: none;">
        <h3>폰트 분석 결과</h3>
        <div class="analysis-info">
          <p><strong>참고:</strong> 이 도구는 이미지 특성을 기반으로 유사한 폰트를 추천합니다. 정확한 식별을 위해서는 <a href="https://www.myfonts.com/WhatTheFont/" target="_blank">WhatTheFont</a>나 <a href="https://www.fontsquirrel.com/matcherator" target="_blank">Font Squirrel Matcherator</a>를 사용해 보세요.</p>
        </div>

        <div class="characteristics" id="characteristics">
          <!-- 특성 분석이 여기에 표시됩니다 -->
        </div>

        <h4>추천 폰트</h4>
        <div class="recommendations" id="recommendations">
          <!-- 추천 폰트가 여기에 표시됩니다 -->
        </div>
      </div>
    </div>
  </div>
  <script src="font-identifier.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
