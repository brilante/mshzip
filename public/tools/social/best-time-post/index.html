<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>최적 포스팅 시간 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .social-container { max-width: 700px; margin: 0 auto; }
    .social-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .platform-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .platform-tab { padding: 0.75rem 1rem; border-radius: 8px; border: none; cursor: pointer; background: var(--bg-primary); font-weight: 500; transition: all 0.2s; }
    .platform-tab.active { background: var(--primary); color: white; }
    .time-grid { display: grid; grid-template-columns: auto repeat(7, 1fr); gap: 2px; margin-top: 1rem; }
    .time-header { padding: 0.5rem; text-align: center; font-weight: 600; font-size: 0.75rem; background: var(--bg-primary); }
    .time-cell { padding: 0.5rem 0.25rem; text-align: center; font-size: 0.7rem; border-radius: 2px; }
    .time-cell.hour-label { background: var(--bg-primary); font-weight: 500; }
    .time-cell.low { background: rgba(239, 68, 68, 0.2); }
    .time-cell.medium { background: rgba(251, 191, 36, 0.3); }
    .time-cell.high { background: rgba(34, 197, 94, 0.3); }
    .time-cell.best { background: rgba(34, 197, 94, 0.6); font-weight: 700; }
    .legend { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; font-size: 0.8rem; }
    .legend-item { display: flex; align-items: center; gap: 0.25rem; }
    .legend-color { width: 16px; height: 16px; border-radius: 2px; }
    .best-times { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-top: 1.5rem; }
    .best-times h3 { font-weight: 600; margin-bottom: 0.75rem; }
    .best-time-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border-color); }
    .best-time-item:last-child { border-bottom: none; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">최적 포스팅 시간</h1>
          <p class="tool-description">플랫폼별 최적의 게시 시간 분석</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="social-container">
      <div class="social-panel">
        <div class="platform-tabs" id="platformTabs"></div>

        <div class="time-grid" id="timeGrid"></div>

        <div class="legend">
          <div class="legend-item"><div class="legend-color" style="background: rgba(239, 68, 68, 0.2);"></div> 낮음</div>
          <div class="legend-item"><div class="legend-color" style="background: rgba(251, 191, 36, 0.3);"></div> 보통</div>
          <div class="legend-item"><div class="legend-color" style="background: rgba(34, 197, 94, 0.3);"></div> 높음</div>
          <div class="legend-item"><div class="legend-color" style="background: rgba(34, 197, 94, 0.6);"></div> 최적</div>
        </div>

        <div class="best-times" id="bestTimes"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="best-time-post.js"></script>
</body>
</html>
