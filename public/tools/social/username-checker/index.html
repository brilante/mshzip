<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자명 체크 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .username-container { max-width: 800px; margin: 0 auto; }
    .username-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .search-box { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
    .search-box input { flex: 1; }
    .results-grid { display: grid; gap: 0.75rem; margin-top: 1.5rem; display: none; }
    .result-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; background: var(--bg-primary); border-radius: 10px; transition: all 0.2s; }
    .result-item:hover { transform: translateX(5px); }
    .result-left { display: flex; align-items: center; gap: 1rem; }
    .platform-icon { font-size: 1.5rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); border-radius: 10px; }
    .platform-info { }
    .platform-name { font-weight: 600; font-size: 0.95rem; }
    .platform-url { font-size: 0.8rem; color: var(--text-secondary); }
    .result-status { display: flex; align-items: center; gap: 0.5rem; }
    .status-badge { padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .status-badge.available { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
    .status-badge.taken { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .status-badge.checking { background: rgba(59, 130, 246, 0.1); color: var(--primary); }
    .status-badge.unknown { background: rgba(156, 163, 175, 0.1); color: #9ca3af; }
    .visit-btn { padding: 0.4rem 0.8rem; border-radius: 6px; background: var(--bg-secondary); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--text-primary); }
    .visit-btn:hover { background: var(--primary); color: white; }
    .summary-card { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; padding: 1.5rem; color: white; margin-top: 1.5rem; display: none; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; text-align: center; }
    .summary-value { font-size: 2rem; font-weight: 700; }
    .summary-label { font-size: 0.85rem; opacity: 0.9; }
    .suggestions-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); }
    .suggestions-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .suggestion-chip { padding: 0.5rem 1rem; border-radius: 20px; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .suggestion-chip:hover { background: var(--primary); color: white; }
    .demo-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1.5rem; font-size: 0.85rem; }
    .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--primary); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">사용자명 체크</h1>
          <p class="tool-description">여러 SNS 플랫폼에서 사용자명 사용 가능 여부 확인</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="username-container">
      <div class="username-panel">
        <div class="section-title">사용자명 입력</div>
        <div class="search-box">
          <input type="text" id="username" class="tool-input" placeholder="확인할 사용자명을 입력하세요" onkeypress="if(event.key==='Enter') UsernameChecker.check()" aria-label="확인할 사용자명을 입력하세요">
          <button class="tool-btn tool-btn-primary" onclick="UsernameChecker.check()" aria-label="확인">
            확인
          </button>
        </div>

        <div class="summary-card" id="summaryCard">
          <div class="summary-grid">
            <div>
              <div class="summary-value" id="availableCount">0</div>
              <div class="summary-label">사용 가능</div>
            </div>
            <div>
              <div class="summary-value" id="takenCount">0</div>
              <div class="summary-label">사용 중</div>
            </div>
            <div>
              <div class="summary-value" id="unknownCount">0</div>
              <div class="summary-label">확인 불가</div>
            </div>
          </div>
        </div>

        <div class="results-grid" id="resultsGrid"></div>

        <div class="suggestions-section">
          <div class="section-title">추천 사용자명 변형</div>
          <div class="suggestions-list" id="suggestionsList">
            <span style="color: var(--text-secondary); font-size: 0.9rem;">사용자명을 입력하면 추천이 표시됩니다.</span>
          </div>
        </div>

        <div class="demo-notice">
          <strong>데모 모드</strong><br>
          실제 API 연동 없이 시뮬레이션 결과를 표시합니다. 실제 사용 가능 여부는 각 플랫폼에서 직접 확인하세요.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="username-checker.js"></script>
</body>
</html>
