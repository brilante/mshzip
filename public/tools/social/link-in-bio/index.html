<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>링크인바이오 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .social-container { max-width: 900px; margin: 0 auto; }
    .social-panel { display: grid; grid-template-columns: 1fr 320px; gap: 2rem; }
    .editor-section { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .preview-section { background: #1a1a1a; border-radius: 24px; padding: 1rem; }
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .link-list { margin-top: 1rem; }
    .link-item { background: var(--bg-primary); border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .link-item input { flex: 1; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-secondary); font-size: 0.85rem; }
    .link-item button { padding: 0.5rem; background: none; border: none; cursor: pointer; font-size: 1rem; }
    .preview-phone { background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); border-radius: 16px; padding: 2rem 1rem; min-height: 500px; color: white; text-align: center; }
    .preview-avatar { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .preview-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; }
    .preview-bio { font-size: 0.9rem; opacity: 0.9; margin-bottom: 1.5rem; }
    .preview-link { display: block; background: white; color: #333; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; text-decoration: none; font-weight: 500; transition: transform 0.2s; }
    .preview-link:hover { transform: scale(1.02); }
    .add-link-btn { width: 100%; padding: 0.75rem; border: 2px dashed var(--border-color); border-radius: 8px; background: none; cursor: pointer; color: var(--text-secondary); }
    .add-link-btn:hover { border-color: var(--primary); color: var(--primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">링크인바이오 생성기</h1>
          <p class="tool-description">소셜 미디어용 링크 페이지 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="social-container">
      <div class="social-panel">
        <div class="editor-section">
          <div class="input-group">
            <label>프로필 이름</label>
            <input type="text" id="profileName" class="tool-input" placeholder="이름" value="My Profile" oninput="LinkInBio.updatePreview()" aria-label="이름">
          </div>
          <div class="input-group">
            <label>소개</label>
            <input type="text" id="profileBio" class="tool-input" placeholder="한 줄 소개" value="Welcome to my links!" oninput="LinkInBio.updatePreview()" aria-label="한 줄 소개">
          </div>
          <div class="input-group">
            <label>링크 목록</label>
            <div class="link-list" id="linkList"></div>
            <button class="add-link-btn" onclick="LinkInBio.addLink()" aria-label="+ 링크 추가">+ 링크 추가</button>
          </div>
          <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1rem;" onclick="LinkInBio.exportHTML()" aria-label="HTML 다운로드">HTML 다운로드</button>
        </div>

        <div class="preview-section">
          <div class="preview-phone" id="previewPhone">
            <div class="preview-avatar" id="previewAvatar"></div>
            <div class="preview-name" id="previewName">My Profile</div>
            <div class="preview-bio" id="previewBio">Welcome to my links!</div>
            <div id="previewLinks"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="link-in-bio.js"></script>
</body>
</html>
