<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>해시태그 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .hashtag-container { max-width: 900px; margin: 0 auto; }
    .hashtag-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .platform-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .platform-btn { padding: 0.75rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; transition: all 0.2s; }
    .platform-btn:hover { border-color: var(--primary); }
    .platform-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .platform-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .platform-name { font-size: 0.8rem; }
    .category-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .category-chip { padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .category-chip:hover { border-color: var(--primary); }
    .category-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .hashtag-output { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; min-height: 150px; display: none; }
    .hashtag-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .hashtag-item { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 20px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; font-size: 0.9rem; cursor: pointer; transition: transform 0.2s; }
    .hashtag-item:hover { transform: scale(1.05); }
    .hashtag-item.copied { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .stats-row { display: flex; gap: 1.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color); }
    .stat-item { text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .copy-all-btn { margin-top: 1rem; }
    .trending-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); }
    .trending-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .trending-item { padding: 0.4rem 0.8rem; border-radius: 15px; background: rgba(249, 115, 22, 0.1); color: #f97316; font-size: 0.85rem; cursor: pointer; }
    .trending-item:hover { background: rgba(249, 115, 22, 0.2); }
    @media (max-width: 600px) { .platform-grid { grid-template-columns: repeat(2, 1fr); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon">#</div>
        <div>
          <h1 class="tool-title">해시태그 생성기</h1>
          <p class="tool-description">SNS 플랫폼별 최적의 해시태그 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="hashtag-container">
      <div class="hashtag-panel">
        <div class="section-title">플랫폼 선택</div>
        <div class="platform-grid">
          <div class="platform-btn active" data-platform="instagram" onclick="HashtagGen.selectPlatform('instagram')">
            <div class="platform-icon"></div>
            <div class="platform-name">Instagram</div>
          </div>
          <div class="platform-btn" data-platform="tiktok" onclick="HashtagGen.selectPlatform('tiktok')">
            <div class="platform-icon"></div>
            <div class="platform-name">TikTok</div>
          </div>
          <div class="platform-btn" data-platform="twitter" onclick="HashtagGen.selectPlatform('twitter')">
            <div class="platform-icon"></div>
            <div class="platform-name">Twitter/X</div>
          </div>
          <div class="platform-btn" data-platform="youtube" onclick="HashtagGen.selectPlatform('youtube')">
            <div class="platform-icon"></div>
            <div class="platform-name">YouTube</div>
          </div>
        </div>

        <div class="section-title">키워드 입력</div>
        <input type="text" id="keyword" class="tool-input" placeholder="주제나 키워드를 입력하세요 (예: 여행, 음식, 패션)" style="margin-bottom: 1rem;" aria-label="주제나 키워드를 입력하세요 (예: 여행, 음식, 패션)">

        <div class="section-title">카테고리 선택</div>
        <div class="category-chips">
          <span class="category-chip active" data-category="general" onclick="HashtagGen.selectCategory('general')">일반</span>
          <span class="category-chip" data-category="travel" onclick="HashtagGen.selectCategory('travel')">여행</span>
          <span class="category-chip" data-category="food" onclick="HashtagGen.selectCategory('food')">음식</span>
          <span class="category-chip" data-category="fashion" onclick="HashtagGen.selectCategory('fashion')">패션</span>
          <span class="category-chip" data-category="fitness" onclick="HashtagGen.selectCategory('fitness')">피트니스</span>
          <span class="category-chip" data-category="beauty" onclick="HashtagGen.selectCategory('beauty')">뷰티</span>
          <span class="category-chip" data-category="tech" onclick="HashtagGen.selectCategory('tech')">테크</span>
          <span class="category-chip" data-category="business" onclick="HashtagGen.selectCategory('business')">비즈니스</span>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="HashtagGen.generate()" aria-label="해시태그 생성">
          해시태그 생성
        </button>

        <div class="hashtag-output" id="hashtagOutput">
          <div class="section-title">생성된 해시태그 (클릭하여 복사)</div>
          <div class="hashtag-list" id="hashtagList"></div>
          <div class="stats-row">
            <div class="stat-item">
              <div class="stat-value" id="totalCount">0</div>
              <div class="stat-label">총 개수</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="charCount">0</div>
              <div class="stat-label">총 글자수</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="reachScore">0</div>
              <div class="stat-label">도달 점수</div>
            </div>
          </div>
          <button class="tool-btn tool-btn-primary copy-all-btn" onclick="HashtagGen.copyAll()" aria-label="전체 복사">
            전체 복사
          </button>
        </div>

        <div class="trending-section">
          <div class="section-title">실시간 트렌딩 해시태그</div>
          <div class="trending-list" id="trendingList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="hashtag-gen.js"></script>
</body>
</html>
