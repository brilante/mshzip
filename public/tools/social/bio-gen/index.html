<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로필 바이오 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .bio-container { max-width: 900px; margin: 0 auto; }
    .bio-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .platform-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .platform-btn { padding: 0.75rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; transition: all 0.2s; }
    .platform-btn:hover { border-color: var(--primary); }
    .platform-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .platform-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .platform-name { font-size: 0.8rem; }
    .style-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .style-chip { padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .style-chip:hover { border-color: var(--primary); }
    .style-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .bio-output { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; display: none; }
    .bio-card { background: var(--bg-secondary); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid var(--border-color); }
    .bio-preview { font-size: 0.95rem; line-height: 1.6; margin-bottom: 1rem; white-space: pre-wrap; }
    .bio-meta { display: flex; justify-content: space-between; align-items: center; }
    .char-count { font-size: 0.8rem; color: var(--text-secondary); }
    .char-count.warning { color: #f97316; }
    .char-count.over { color: #ef4444; }
    .bio-actions { display: flex; gap: 0.5rem; }
    .bio-action { padding: 0.4rem 0.8rem; border-radius: 6px; background: var(--bg-primary); cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
    .bio-action:hover { background: var(--primary); color: white; }
    .tips-section { margin-top: 2rem; padding: 1.5rem; background: rgba(59, 130, 246, 0.05); border-radius: 12px; border: 1px solid rgba(59, 130, 246, 0.2); }
    .tip-item { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.75rem; font-size: 0.9rem; }
    .tip-item:last-child { margin-bottom: 0; }
    .tip-icon { font-size: 1rem; }
    @media (max-width: 600px) { .platform-grid { grid-template-columns: repeat(2, 1fr); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">프로필 바이오 생성기</h1>
          <p class="tool-description">SNS 프로필에 맞는 매력적인 바이오 작성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="bio-container">
      <div class="bio-panel">
        <div class="section-title">플랫폼 선택</div>
        <div class="platform-grid">
          <div class="platform-btn active" data-platform="instagram" onclick="BioGen.selectPlatform('instagram')">
            <div class="platform-icon"></div>
            <div class="platform-name">Instagram</div>
            <div style="font-size: 0.7rem; color: var(--text-secondary);">150자</div>
          </div>
          <div class="platform-btn" data-platform="twitter" onclick="BioGen.selectPlatform('twitter')">
            <div class="platform-icon"></div>
            <div class="platform-name">Twitter/X</div>
            <div style="font-size: 0.7rem; color: var(--text-secondary);">160자</div>
          </div>
          <div class="platform-btn" data-platform="tiktok" onclick="BioGen.selectPlatform('tiktok')">
            <div class="platform-icon"></div>
            <div class="platform-name">TikTok</div>
            <div style="font-size: 0.7rem; color: var(--text-secondary);">80자</div>
          </div>
          <div class="platform-btn" data-platform="linkedin" onclick="BioGen.selectPlatform('linkedin')">
            <div class="platform-icon"></div>
            <div class="platform-name">LinkedIn</div>
            <div style="font-size: 0.7rem; color: var(--text-secondary);">220자</div>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">이름 또는 닉네임</label>
          <input type="text" id="name" class="tool-input" placeholder="예: 김민수, Mike" aria-label="예: 김민수, Mike">
        </div>

        <div class="input-group">
          <label class="input-label">직업/역할</label>
          <input type="text" id="role" class="tool-input" placeholder="예: 개발자, 포토그래퍼, 마케터" aria-label="예: 개발자, 포토그래퍼, 마케터">
        </div>

        <div class="input-group">
          <label class="input-label">관심사/키워드 (쉼표로 구분)</label>
          <input type="text" id="interests" class="tool-input" placeholder="예: 여행, 커피, 사진, 독서" aria-label="예: 여행, 커피, 사진, 독서">
        </div>

        <div class="section-title">스타일 선택</div>
        <div class="style-chips">
          <span class="style-chip active" data-style="professional" onclick="BioGen.selectStyle('professional')">전문적</span>
          <span class="style-chip" data-style="creative" onclick="BioGen.selectStyle('creative')">크리에이티브</span>
          <span class="style-chip" data-style="casual" onclick="BioGen.selectStyle('casual')">캐주얼</span>
          <span class="style-chip" data-style="funny" onclick="BioGen.selectStyle('funny')">유머러스</span>
          <span class="style-chip" data-style="minimalist" onclick="BioGen.selectStyle('minimalist')">미니멀</span>
          <span class="style-chip" data-style="emoji" onclick="BioGen.selectStyle('emoji')">이모지 중심</span>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="BioGen.generate()" aria-label="바이오 생성">
          바이오 생성
        </button>

        <div class="bio-output" id="bioOutput">
          <div class="section-title">생성된 바이오</div>
          <div id="bioList"></div>
        </div>

        <div class="tips-section">
          <div class="section-title">좋은 바이오 작성 팁</div>
          <div class="tip-item">
            <span class="tip-icon"></span>
            <span>첫 문장에 핵심 정보를 담으세요</span>
          </div>
          <div class="tip-item">
            <span class="tip-icon"></span>
            <span>행동 유도 문구(CTA)를 포함하세요</span>
          </div>
          <div class="tip-item">
            <span class="tip-icon"></span>
            <span>이모지로 시각적 흥미를 더하세요</span>
          </div>
          <div class="tip-item">
            <span class="tip-icon"></span>
            <span>관련 키워드로 검색에 노출되게 하세요</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="bio-gen.js"></script>
</body>
</html>
