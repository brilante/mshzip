<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>썸네일 메이커 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .thumbnail-container { max-width: 1100px; margin: 0 auto; }
    .thumbnail-grid { display: grid; grid-template-columns: 1fr 400px; gap: 1.5rem; }
    .editor-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .preview-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .canvas-wrapper { background: #1a1a2e; border-radius: 12px; overflow: hidden; position: relative; }
    .canvas-container { width: 100%; aspect-ratio: 16/9; position: relative; display: flex; align-items: center; justify-content: center; }
    #thumbnailCanvas { max-width: 100%; max-height: 100%; }
    .size-presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
    .size-btn { padding: 0.6rem; border-radius: 8px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; font-size: 0.8rem; transition: all 0.2s; }
    .size-btn:hover { border-color: var(--primary); }
    .size-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .size-label { font-weight: 600; }
    .size-dim { font-size: 0.7rem; color: var(--text-secondary); }
    .control-group { margin-bottom: 1.25rem; }
    .control-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; }
    .color-row { display: flex; gap: 0.5rem; }
    .color-preset { width: 32px; height: 32px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .color-preset:hover { transform: scale(1.1); }
    .color-preset.active { border-color: white; box-shadow: 0 0 0 2px var(--primary); }
    .gradient-presets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-top: 0.5rem; }
    .gradient-preset { height: 40px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .gradient-preset:hover { transform: scale(1.05); }
    .gradient-preset.active { border-color: white; }
    .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
    .template-btn { aspect-ratio: 16/9; border-radius: 8px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; overflow: hidden; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--text-secondary); }
    .template-btn:hover { border-color: var(--primary); }
    .template-btn.active { border-color: var(--primary); }
    .font-select { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .font-btn { padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .font-btn:hover { border-color: var(--primary); }
    .font-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .action-buttons { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    @media (max-width: 900px) { .thumbnail-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">썸네일 메이커</h1>
          <p class="tool-description">YouTube, Instagram용 썸네일 제작</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="thumbnail-container">
      <div class="thumbnail-grid">
        <div class="editor-panel">
          <div class="section-title">크기 선택</div>
          <div class="size-presets">
            <div class="size-btn active" data-size="youtube" onclick="ThumbnailMaker.selectSize('youtube')">
              <div class="size-label">YouTube</div>
              <div class="size-dim">1280×720</div>
            </div>
            <div class="size-btn" data-size="instagram-post" onclick="ThumbnailMaker.selectSize('instagram-post')">
              <div class="size-label">Insta 포스트</div>
              <div class="size-dim">1080×1080</div>
            </div>
            <div class="size-btn" data-size="instagram-story" onclick="ThumbnailMaker.selectSize('instagram-story')">
              <div class="size-label">Insta 스토리</div>
              <div class="size-dim">1080×1920</div>
            </div>
            <div class="size-btn" data-size="twitter" onclick="ThumbnailMaker.selectSize('twitter')">
              <div class="size-label">Twitter</div>
              <div class="size-dim">1200×675</div>
            </div>
            <div class="size-btn" data-size="facebook" onclick="ThumbnailMaker.selectSize('facebook')">
              <div class="size-label">Facebook</div>
              <div class="size-dim">1200×630</div>
            </div>
            <div class="size-btn" data-size="tiktok" onclick="ThumbnailMaker.selectSize('tiktok')">
              <div class="size-label">TikTok</div>
              <div class="size-dim">1080×1920</div>
            </div>
          </div>

          <div class="control-group">
            <label class="control-label">배경색</label>
            <div class="color-row">
              <div class="color-preset active" style="background: #1a1a2e;" data-color="#1a1a2e" onclick="ThumbnailMaker.selectColor('#1a1a2e')"></div>
              <div class="color-preset" style="background: #ff6b6b;" data-color="#ff6b6b" onclick="ThumbnailMaker.selectColor('#ff6b6b')"></div>
              <div class="color-preset" style="background: #4ecdc4;" data-color="#4ecdc4" onclick="ThumbnailMaker.selectColor('#4ecdc4')"></div>
              <div class="color-preset" style="background: #ffe66d;" data-color="#ffe66d" onclick="ThumbnailMaker.selectColor('#ffe66d')"></div>
              <div class="color-preset" style="background: #95e1d3;" data-color="#95e1d3" onclick="ThumbnailMaker.selectColor('#95e1d3')"></div>
              <div class="color-preset" style="background: #f38181;" data-color="#f38181" onclick="ThumbnailMaker.selectColor('#f38181')"></div>
              <input type="color" id="customColor" value="#1a1a2e" style="width: 32px; height: 32px; border: none; cursor: pointer;" onchange="ThumbnailMaker.selectColor(this.value)">
            </div>
            <div class="gradient-presets">
              <div class="gradient-preset" style="background: linear-gradient(135deg, #667eea, #764ba2);" onclick="ThumbnailMaker.selectGradient('linear-gradient(135deg, #667eea, #764ba2)')"></div>
              <div class="gradient-preset" style="background: linear-gradient(135deg, #f093fb, #f5576c);" onclick="ThumbnailMaker.selectGradient('linear-gradient(135deg, #f093fb, #f5576c)')"></div>
              <div class="gradient-preset" style="background: linear-gradient(135deg, #4facfe, #00f2fe);" onclick="ThumbnailMaker.selectGradient('linear-gradient(135deg, #4facfe, #00f2fe)')"></div>
              <div class="gradient-preset" style="background: linear-gradient(135deg, #43e97b, #38f9d7);" onclick="ThumbnailMaker.selectGradient('linear-gradient(135deg, #43e97b, #38f9d7)')"></div>
            </div>
          </div>

          <div class="control-group">
            <label class="control-label">제목 텍스트</label>
            <input type="text" id="titleText" class="tool-input" placeholder="썸네일 제목을 입력하세요" value="썸네일 제목" oninput="ThumbnailMaker.updateCanvas()" aria-label="썸네일 제목을 입력하세요">
          </div>

          <div class="control-group">
            <label class="control-label">부제목 (선택)</label>
            <input type="text" id="subtitleText" class="tool-input" placeholder="부제목 입력 (선택)" oninput="ThumbnailMaker.updateCanvas()" aria-label="부제목 입력 (선택)">
          </div>

          <div class="control-group">
            <label class="control-label">텍스트 색상</label>
            <div class="color-row">
              <div class="color-preset active" style="background: #ffffff;" data-textcolor="#ffffff" onclick="ThumbnailMaker.selectTextColor('#ffffff')"></div>
              <div class="color-preset" style="background: #000000;" data-textcolor="#000000" onclick="ThumbnailMaker.selectTextColor('#000000')"></div>
              <div class="color-preset" style="background: #ffe66d;" data-textcolor="#ffe66d" onclick="ThumbnailMaker.selectTextColor('#ffe66d')"></div>
              <div class="color-preset" style="background: #ff6b6b;" data-textcolor="#ff6b6b" onclick="ThumbnailMaker.selectTextColor('#ff6b6b')"></div>
            </div>
          </div>

          <div class="control-group">
            <label class="control-label">폰트 크기</label>
            <input type="range" id="fontSize" class="tool-input" min="24" max="120" value="64" oninput="ThumbnailMaker.updateCanvas()">
          </div>

          <div class="action-buttons">
            <button class="tool-btn tool-btn-primary" style="flex: 1;" onclick="ThumbnailMaker.download()" aria-label="다운로드">
              다운로드
            </button>
            <button class="tool-btn tool-btn-secondary" onclick="ThumbnailMaker.reset()" aria-label="초기화">
              초기화
            </button>
          </div>
        </div>

        <div class="preview-panel">
          <div class="section-title">미리보기</div>
          <div class="canvas-wrapper">
            <div class="canvas-container">
              <canvas id="thumbnailCanvas" width="1280" height="720"></canvas>
            </div>
          </div>
          <div style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary); text-align: center;">
            <span id="currentSize">1280 × 720</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="thumbnail-maker.js"></script>
</body>
</html>
