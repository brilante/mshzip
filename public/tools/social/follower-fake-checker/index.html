<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팔로워 품질 체커 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .social-container { max-width: 600px; margin: 0 auto; }
    .social-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .input-row { display: flex; gap: 0.5rem; }
    .input-row input { flex: 1; }
    .result-card { border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; text-align: center; }
    .result-card.good { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
    .result-card.warning { background: linear-gradient(135deg, #f5af19 0%, #f12711 100%); color: white; }
    .result-card.bad { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: white; }
    .score-circle { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.2); margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; }
    .score-label { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .score-desc { opacity: 0.9; }
    .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .metric-card { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 1rem; }
    .metric-label { font-size: 0.8rem; opacity: 0.8; }
    .metric-value { font-size: 1.25rem; font-weight: 600; }
    .info-box { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.85rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">팔로워 품질 체커</h1>
          <p class="tool-description">가짜 팔로워 비율 분석</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="social-container">
      <div class="social-panel">
        <div class="input-group">
          <label>Instagram 사용자명</label>
          <div class="input-row">
            <input type="text" id="username" class="tool-input" placeholder="@username" aria-label="@username">
            <button class="tool-btn tool-btn-primary" onclick="FollowerChecker.analyze()" aria-label="분석">분석</button>
          </div>
        </div>

        <div id="result"></div>

        <div class="info-box">
          <strong>참고:</strong> 이 도구는 시뮬레이션입니다. 실제 분석은 Instagram API 접근이 필요합니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="follower-fake-checker.js"></script>
</body>
</html>
