<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>트위터 스레드 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .social-container { max-width: 700px; margin: 0 auto; }
    .social-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-group { margin-bottom: 1.25rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .io-textarea { width: 100%; height: 200px; resize: vertical; padding: 1rem; border: 2px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); font-size: 1rem; }
    .io-textarea:focus { border-color: var(--primary); outline: none; }
    .thread-preview { margin-top: 1.5rem; }
    .tweet-card { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 12px; padding: 1rem; margin-bottom: 0.5rem; }
    .tweet-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .tweet-avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
    .tweet-name { font-weight: 600; }
    .tweet-handle { color: var(--text-secondary); font-size: 0.9rem; }
    .tweet-content { line-height: 1.5; }
    .tweet-counter { text-align: right; font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .tweet-counter.warning { color: #f59e0b; }
    .tweet-counter.error { color: #ef4444; }
    .thread-number { background: var(--primary); color: white; font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 4px; margin-left: auto; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">트위터 스레드 생성기</h1>
          <p class="tool-description">긴 텍스트를 트윗 스레드로 분할</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="social-container">
      <div class="social-panel">
        <div class="input-group">
          <label>텍스트 입력</label>
          <textarea class="io-textarea" id="inputText" placeholder="스레드로 변환할 긴 텍스트를 입력하세요..." oninput="TwitterThread.generate()"></textarea>
        </div>

        <div class="input-group">
          <label>사용자명</label>
          <input type="text" id="username" class="tool-input" placeholder="@username" value="@user" oninput="TwitterThread.generate()" aria-label="@username">
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="TwitterThread.copyAll()" aria-label="전체 복사">전체 복사</button>

        <div class="thread-preview" id="threadPreview"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="twitter-thread-gen.js"></script>
</body>
</html>
