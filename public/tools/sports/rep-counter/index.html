<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세트/횟수 카운터 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 500px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .counter-display { text-align: center; padding: 2rem; }
    .rep-count { font-size: 6rem; font-weight: 700; line-height: 1; color: var(--primary); }
    .set-info { font-size: 1.25rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .counter-buttons { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
    .count-btn { width: 80px; height: 80px; border-radius: 50%; font-size: 2rem; font-weight: 700; cursor: pointer; border: none; transition: transform 0.1s; }
    .count-btn:active { transform: scale(0.95); }
    .count-btn.plus { background: #22c55e; color: white; }
    .count-btn.minus { background: #ef4444; color: white; }
    .exercise-list { margin-top: 1rem; }
    .exercise-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .exercise-item.active { border: 2px solid var(--primary); }
    .exercise-name { font-weight: 600; }
    .exercise-progress { font-size: 0.85rem; color: var(--text-secondary); }
    .add-exercise { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .quick-presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .preset-chip { padding: 0.25rem 0.75rem; border-radius: 16px; background: var(--bg-primary); font-size: 0.8rem; cursor: pointer; }
    .preset-chip:hover { background: var(--primary); color: white; }
    .target-setting { display: flex; gap: 0.5rem; align-items: center; justify-content: center; margin-top: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">세트/횟수 카운터</h1>
          <p class="tool-description">운동 횟수 기록</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel counter-display">
        <div class="rep-count" id="repCount">0</div>
        <div class="set-info">세트 <span id="currentSet">1</span> / <span id="targetReps">10</span>회</div>
        <div class="counter-buttons">
          <button class="count-btn minus" onclick="RepCounter.decrement()" aria-label="−">−</button>
          <button class="count-btn plus" onclick="RepCounter.increment()" aria-label="+">+</button>
        </div>
        <div class="target-setting">
          <span style="font-size: 0.85rem; color: var(--text-secondary);">목표:</span>
          <input type="number" id="targetInput" class="tool-input" style="width: 60px; text-align: center;" value="10" min="1" onchange="RepCounter.setTarget()">
          <span style="font-size: 0.85rem; color: var(--text-secondary);">회</span>
        </div>
        <div style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center;">
          <button class="tool-btn tool-btn-secondary" onclick="RepCounter.nextSet()" aria-label="다음 세트">다음 세트</button>
          <button class="tool-btn tool-btn-secondary" onclick="RepCounter.resetSet()" aria-label="리셋">리셋</button>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">운동 목록</h3>
        <div class="quick-presets">
          <span class="preset-chip" onclick="RepCounter.addExercise('푸시업')">푸시업</span>
          <span class="preset-chip" onclick="RepCounter.addExercise('스쿼트')">스쿼트</span>
          <span class="preset-chip" onclick="RepCounter.addExercise('런지')">런지</span>
          <span class="preset-chip" onclick="RepCounter.addExercise('버피')">버피</span>
          <span class="preset-chip" onclick="RepCounter.addExercise('플랭크')">플랭크</span>
        </div>
        <div class="add-exercise">
          <input type="text" id="exerciseName" class="tool-input" placeholder="운동 이름" aria-label="운동 이름">
          <button class="tool-btn tool-btn-primary" onclick="RepCounter.addExercise()" aria-label="추가">추가</button>
        </div>
        <div class="exercise-list" id="exerciseList"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">오늘의 기록</h3>
        <div id="todaySummary" style="text-align: center; color: var(--text-secondary);">
          기록이 없습니다
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="rep-counter.js"></script>
</body>
</html>
