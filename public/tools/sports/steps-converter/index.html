<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>걸음 수 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .input-row { display: flex; gap: 1rem; }
    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1rem; }
    .result-card { background: var(--bg-primary); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .result-value { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
    .result-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .goal-progress { margin-top: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; }
    .progress-bar { height: 12px; background: var(--bg-secondary); border-radius: 6px; overflow: hidden; margin-top: 0.5rem; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); transition: width 0.3s; }
    .goal-text { display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 0.5rem; }
    .quick-input { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .quick-btn { padding: 0.5rem 1rem; border-radius: 20px; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .quick-btn:hover { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">걸음 수 변환기</h1>
          <p class="tool-description">걸음 → 거리/칼로리 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="input-group">
          <div class="input-label">걸음 수</div>
          <input type="number" id="steps" class="tool-input" placeholder="10000" min="0" oninput="StepsConverter.calculate()" aria-label="10000">
          <div class="quick-input">
            <span class="quick-btn" onclick="StepsConverter.setSteps(1000)">1,000</span>
            <span class="quick-btn" onclick="StepsConverter.setSteps(5000)">5,000</span>
            <span class="quick-btn" onclick="StepsConverter.setSteps(10000)">10,000</span>
            <span class="quick-btn" onclick="StepsConverter.setSteps(15000)">15,000</span>
          </div>
        </div>

        <div class="input-row">
          <div class="input-group">
            <div class="input-label">키 (cm)</div>
            <input type="number" id="height" class="tool-input" placeholder="170" value="170" min="100" max="250" oninput="StepsConverter.calculate()" aria-label="170">
          </div>
          <div class="input-group">
            <div class="input-label">체중 (kg)</div>
            <input type="number" id="weight" class="tool-input" placeholder="70" value="70" min="30" max="200" oninput="StepsConverter.calculate()" aria-label="70">
          </div>
        </div>

        <div class="goal-progress">
          <div style="font-weight: 600;">일일 목표 달성률</div>
          <div class="progress-bar">
            <div class="progress-fill" id="goalProgress" style="width: 0%"></div>
          </div>
          <div class="goal-text">
            <span id="currentSteps">0 걸음</span>
            <span>목표: <input type="number" id="goalSteps" value="10000" style="width: 70px; text-align: right; border: none; background: transparent; font-weight: 600;" onchange="StepsConverter.calculate()"> 걸음</span>
          </div>
        </div>
      </div>

      <div class="result-grid" id="resultGrid">
        <div class="result-card">
          <div class="result-value" id="distanceKm">0</div>
          <div class="result-label">킬로미터 (km)</div>
        </div>
        <div class="result-card">
          <div class="result-value" id="distanceMi">0</div>
          <div class="result-label">마일 (mi)</div>
        </div>
        <div class="result-card">
          <div class="result-value" id="calories">0</div>
          <div class="result-label">소모 칼로리 (kcal)</div>
        </div>
        <div class="result-card">
          <div class="result-value" id="walkTime">0</div>
          <div class="result-label">예상 시간 (분)</div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">참고 정보</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6;">
          • 보폭은 키의 약 40%로 계산됩니다<br>
          • 칼로리 소모량은 체중과 거리에 따라 추정됩니다<br>
          • 평균 걸음 속도는 분당 100보로 계산됩니다<br>
          • WHO 권장: 하루 10,000보 (약 8km)
        </p>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="steps-converter.js"></script>
</body>
</html>
