<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수분 섭취 트래커 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 500px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .water-display { text-align: center; padding: 2rem; }
    .water-icon { font-size: 4rem; margin-bottom: 1rem; }
    .water-amount { font-size: 3rem; font-weight: 700; color: #3b82f6; }
    .water-goal { font-size: 1rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .progress-container { margin-top: 1.5rem; }
    .progress-bar { height: 24px; background: var(--bg-primary); border-radius: 12px; overflow: hidden; position: relative; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #0ea5e9); transition: width 0.3s; border-radius: 12px; }
    .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.85rem; font-weight: 600; }
    .quick-add { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-top: 1.5rem; }
    .add-btn { padding: 1rem 0.5rem; border-radius: 12px; background: var(--bg-primary); text-align: center; cursor: pointer; transition: all 0.2s; }
    .add-btn:hover { background: #3b82f6; color: white; }
    .add-btn-amount { font-size: 1.25rem; font-weight: 600; }
    .add-btn-label { font-size: 0.75rem; opacity: 0.7; }
    .history-list { margin-top: 1rem; max-height: 200px; overflow-y: auto; }
    .history-item { display: flex; justify-content: space-between; padding: 0.5rem; background: var(--bg-primary); border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.85rem; }
    .goal-setting { display: flex; gap: 0.5rem; align-items: center; }
    .cups-display { display: flex; gap: 0.25rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .cup-icon { font-size: 1.5rem; opacity: 0.3; transition: opacity 0.2s; }
    .cup-icon.filled { opacity: 1; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">수분 섭취 트래커</h1>
          <p class="tool-description">하루 물 섭취량 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel water-display">
        <div class="water-icon"></div>
        <div class="water-amount"><span id="currentAmount">0</span>ml</div>
        <div class="water-goal">목표: <span id="goalAmount">2000</span>ml</div>
        <div class="cups-display" id="cupsDisplay"></div>
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            <div class="progress-text" id="progressText">0%</div>
          </div>
        </div>
        <div class="quick-add">
          <div class="add-btn" onclick="WaterIntake.add(200)">
            <div class="add-btn-amount">+200</div>
            <div class="add-btn-label">한 컵</div>
          </div>
          <div class="add-btn" onclick="WaterIntake.add(350)">
            <div class="add-btn-amount">+350</div>
            <div class="add-btn-label">텀블러</div>
          </div>
          <div class="add-btn" onclick="WaterIntake.add(500)">
            <div class="add-btn-amount">+500</div>
            <div class="add-btn-label">물병</div>
          </div>
          <div class="add-btn" onclick="WaterIntake.addCustom()">
            <div class="add-btn-amount">+?</div>
            <div class="add-btn-label">직접 입력</div>
          </div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <h3 style="font-weight: 600;">오늘의 기록</h3>
          <button class="tool-btn tool-btn-secondary" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" onclick="WaterIntake.reset()" aria-label="리셋">리셋</button>
        </div>
        <div class="history-list" id="historyList">
          <div style="text-align: center; color: var(--text-secondary);">기록이 없습니다</div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">목표 설정</h3>
        <div class="goal-setting">
          <input type="number" id="goalInput" class="tool-input" placeholder="2000" min="500" max="5000" aria-label="2000">
          <span>ml</span>
          <button class="tool-btn tool-btn-primary" onclick="WaterIntake.setGoal()" aria-label="설정">설정</button>
        </div>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">
          권장량: 체중(kg) × 30ml (예: 70kg = 2100ml)
        </p>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="water-intake.js"></script>
</body>
</html>
