<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운동 기록장 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 700px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .add-form { display: grid; gap: 0.75rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .input-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .log-list { margin-top: 1rem; }
    .log-item { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; position: relative; }
    .log-date { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .log-exercise { font-weight: 600; font-size: 1.1rem; }
    .log-details { display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); }
    .log-detail { display: flex; align-items: center; gap: 0.25rem; }
    .log-notes { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; font-style: italic; }
    .log-delete { position: absolute; top: 0.5rem; right: 0.5rem; opacity: 0.4; cursor: pointer; font-size: 0.8rem; }
    .log-delete:hover { opacity: 1; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .stat-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .filter-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .filter-btn { padding: 0.5rem 1rem; border-radius: 20px; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .filter-btn.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">운동 기록장</h1>
          <p class="tool-description">운동 일지 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">이번 주 요약</h3>
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-value" id="weekWorkouts">0</div>
            <div class="stat-label">운동 횟수</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="weekDuration">0</div>
            <div class="stat-label">총 시간 (분)</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="weekCalories">0</div>
            <div class="stat-label">소모 칼로리</div>
          </div>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">운동 기록 추가</h3>
        <div class="add-form">
          <div>
            <div class="input-label">운동 종류</div>
            <input type="text" id="exerciseType" class="tool-input" placeholder="예: 러닝, 웨이트, 요가" aria-label="예: 러닝, 웨이트, 요가">
          </div>
          <div class="form-row">
            <div>
              <div class="input-label">시간 (분)</div>
              <input type="number" id="duration" class="tool-input" placeholder="30" min="1" aria-label="30">
            </div>
            <div>
              <div class="input-label">소모 칼로리 (선택)</div>
              <input type="number" id="calories" class="tool-input" placeholder="200" aria-label="200">
            </div>
          </div>
          <div>
            <div class="input-label">메모 (선택)</div>
            <input type="text" id="notes" class="tool-input" placeholder="오늘의 컨디션, 느낀 점 등" aria-label="오늘의 컨디션, 느낀 점 등">
          </div>
          <button class="tool-btn tool-btn-primary" onclick="ExerciseLog.add()" aria-label="기록 추가">기록 추가</button>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <h3 style="font-weight: 600;">운동 기록</h3>
          <button class="tool-btn tool-btn-secondary" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" onclick="ExerciseLog.exportData()" aria-label="내보내기">내보내기</button>
        </div>
        <div class="filter-row" id="filterRow"></div>
        <div class="log-list" id="logList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="exercise-log.js"></script>
</body>
</html>
