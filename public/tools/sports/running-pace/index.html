<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>러닝 페이스 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .calc-mode { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .mode-btn { flex: 1; padding: 0.75rem; text-align: center; border-radius: 8px; background: var(--bg-primary); cursor: pointer; }
    .mode-btn.active { background: var(--primary); color: white; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .time-inputs { display: flex; gap: 0.5rem; align-items: center; }
    .time-inputs input { width: 70px; text-align: center; }
    .result-panel { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); border-radius: 12px; padding: 1.5rem; color: white; margin-top: 1rem; }
    .result-main { font-size: 2rem; font-weight: 700; }
    .result-label { font-size: 0.9rem; opacity: 0.9; }
    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1rem; }
    .result-item { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 0.75rem; text-align: center; }
    .result-item-value { font-size: 1.1rem; font-weight: 600; }
    .result-item-label { font-size: 0.75rem; opacity: 0.8; }
    .pace-table { margin-top: 1rem; }
    .pace-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 0.5rem; font-size: 0.85rem; }
    .pace-row:nth-child(odd) { background: var(--bg-primary); border-radius: 4px; }
    .pace-header { font-weight: 600; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">러닝 페이스 계산기</h1>
          <p class="tool-description">거리, 시간, 페이스 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="calc-mode">
          <div class="mode-btn active" data-mode="pace" onclick="RunningPace.setMode('pace')">페이스 계산</div>
          <div class="mode-btn" data-mode="time" onclick="RunningPace.setMode('time')">시간 계산</div>
          <div class="mode-btn" data-mode="distance" onclick="RunningPace.setMode('distance')">거리 계산</div>
        </div>

        <div id="inputPace">
          <div class="input-group">
            <div class="input-label">거리</div>
            <div style="display: flex; gap: 0.5rem;">
              <input type="number" id="distance" class="tool-input" placeholder="거리" min="0" step="0.01" oninput="RunningPace.calculate()" aria-label="거리">
              <select id="distanceUnit" class="tool-input" style="width: 80px;" onchange="RunningPace.calculate()">
                <option value="km">km</option>
                <option value="mi">mi</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <div class="input-label">시간</div>
            <div class="time-inputs">
              <input type="number" id="hours" class="tool-input" placeholder="시" min="0" oninput="RunningPace.calculate()" aria-label="시">
              <span>:</span>
              <input type="number" id="minutes" class="tool-input" placeholder="분" min="0" max="59" oninput="RunningPace.calculate()" aria-label="분">
              <span>:</span>
              <input type="number" id="seconds" class="tool-input" placeholder="초" min="0" max="59" oninput="RunningPace.calculate()" aria-label="초">
            </div>
          </div>
        </div>

        <div id="inputTime" style="display: none;">
          <div class="input-group">
            <div class="input-label">거리 (km)</div>
            <input type="number" id="distance2" class="tool-input" placeholder="거리" min="0" step="0.01" oninput="RunningPace.calculate()" aria-label="거리">
          </div>
          <div class="input-group">
            <div class="input-label">페이스 (분:초/km)</div>
            <div class="time-inputs">
              <input type="number" id="paceMin" class="tool-input" placeholder="분" min="0" oninput="RunningPace.calculate()" aria-label="분">
              <span>:</span>
              <input type="number" id="paceSec" class="tool-input" placeholder="초" min="0" max="59" oninput="RunningPace.calculate()" aria-label="초">
            </div>
          </div>
        </div>

        <div id="inputDistance" style="display: none;">
          <div class="input-group">
            <div class="input-label">시간</div>
            <div class="time-inputs">
              <input type="number" id="hours2" class="tool-input" placeholder="시" min="0" oninput="RunningPace.calculate()" aria-label="시">
              <span>:</span>
              <input type="number" id="minutes2" class="tool-input" placeholder="분" min="0" max="59" oninput="RunningPace.calculate()" aria-label="분">
              <span>:</span>
              <input type="number" id="seconds2" class="tool-input" placeholder="초" min="0" max="59" oninput="RunningPace.calculate()" aria-label="초">
            </div>
          </div>
          <div class="input-group">
            <div class="input-label">페이스 (분:초/km)</div>
            <div class="time-inputs">
              <input type="number" id="paceMin2" class="tool-input" placeholder="분" min="0" oninput="RunningPace.calculate()" aria-label="분">
              <span>:</span>
              <input type="number" id="paceSec2" class="tool-input" placeholder="초" min="0" max="59" oninput="RunningPace.calculate()" aria-label="초">
            </div>
          </div>
        </div>
      </div>

      <div class="result-panel" id="resultPanel" style="display: none;">
        <div class="result-label" id="resultLabel">페이스</div>
        <div class="result-main" id="resultMain">-</div>
        <div class="result-grid" id="resultGrid"></div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">대회 거리별 예상 기록</h3>
        <div class="pace-table" id="paceTable">
          <div class="pace-row pace-header">
            <div>거리</div>
            <div>예상 시간</div>
            <div>페이스</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="running-pace.js"></script>
</body>
</html>
