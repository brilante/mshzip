<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스포츠 점수판 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .scoreboard { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 16px; padding: 2rem; color: white; }
    .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; }
    .team { text-align: center; }
    .team-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; cursor: pointer; }
    .team-name input { background: transparent; border: none; text-align: center; color: white; font-size: 1.1rem; font-weight: 600; width: 100%; }
    .team-score { font-size: 5rem; font-weight: 700; font-family: monospace; line-height: 1; }
    .team-home .team-score { color: #3b82f6; }
    .team-away .team-score { color: #ef4444; }
    .vs-divider { font-size: 1.5rem; opacity: 0.5; }
    .score-buttons { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .score-btn { width: 40px; height: 40px; border-radius: 50%; font-size: 1.25rem; font-weight: 700; cursor: pointer; border: none; }
    .score-btn.plus { background: #22c55e; color: white; }
    .score-btn.minus { background: #ef4444; color: white; }
    .game-info { display: flex; justify-content: space-between; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; opacity: 0.8; }
    .period-controls { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .sport-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .sport-btn { padding: 0.5rem 1rem; border-radius: 20px; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .sport-btn.active { background: var(--primary); color: white; }
    .controls-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .controls-row button { flex: 1; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">스포츠 점수판</h1>
          <p class="tool-description">간편 점수 기록</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="sport-selector" id="sportSelector"></div>
      </div>

      <div class="scoreboard">
        <div class="teams-row">
          <div class="team team-home">
            <div class="team-name">
              <input type="text" id="homeTeam" value="홈팀" onchange="SportsScore.save()">
            </div>
            <div class="team-score" id="homeScore">0</div>
            <div class="score-buttons">
              <button class="score-btn minus" onclick="SportsScore.changeScore('home', -1)" aria-label="−">−</button>
              <button class="score-btn plus" onclick="SportsScore.changeScore('home', 1)" aria-label="+">+</button>
            </div>
          </div>
          <div class="vs-divider">VS</div>
          <div class="team team-away">
            <div class="team-name">
              <input type="text" id="awayTeam" value="원정팀" onchange="SportsScore.save()">
            </div>
            <div class="team-score" id="awayScore">0</div>
            <div class="score-buttons">
              <button class="score-btn minus" onclick="SportsScore.changeScore('away', -1)" aria-label="−">−</button>
              <button class="score-btn plus" onclick="SportsScore.changeScore('away', 1)" aria-label="+">+</button>
            </div>
          </div>
        </div>
        <div class="game-info">
          <span id="periodInfo">1쿼터</span>
          <span id="timeInfo">00:00</span>
        </div>
        <div class="period-controls">
          <button class="tool-btn tool-btn-secondary" onclick="SportsScore.prevPeriod()" style="background: rgba(255,255,255,0.1); color: white; border: none;" aria-label="이전">이전</button>
          <button class="tool-btn tool-btn-secondary" onclick="SportsScore.nextPeriod()" style="background: rgba(255,255,255,0.1); color: white; border: none;" aria-label="다음">다음</button>
          <button class="tool-btn tool-btn-secondary" onclick="SportsScore.toggleTimer()" id="timerBtn" style="background: rgba(255,255,255,0.1); color: white; border: none;" aria-label="시작">시작</button>
        </div>
      </div>

      <div class="controls-row">
        <button class="tool-btn tool-btn-secondary" onclick="SportsScore.reset()" aria-label="리셋">리셋</button>
        <button class="tool-btn tool-btn-secondary" onclick="SportsScore.swapTeams()" aria-label="팀 교체">팀 교체</button>
        <button class="tool-btn tool-btn-primary" onclick="SportsScore.share()" aria-label="결과 공유">결과 공유</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="sports-score.js"></script>
</body>
</html>
