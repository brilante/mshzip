<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>휴식 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 450px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .timer-display { text-align: center; padding: 3rem 2rem; }
    .timer-time { font-size: 6rem; font-weight: 700; font-family: monospace; line-height: 1; }
    .timer-label { font-size: 1.1rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .timer-ring { width: 250px; height: 250px; margin: 0 auto; position: relative; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-ring-bg { fill: none; stroke: var(--bg-primary); stroke-width: 8; }
    .timer-ring-progress { fill: none; stroke: #3b82f6; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.1s; }
    .timer-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 1rem; }
    .preset-btn { padding: 1rem; border-radius: 12px; background: var(--bg-primary); text-align: center; cursor: pointer; transition: all 0.2s; }
    .preset-btn:hover, .preset-btn.active { background: #3b82f6; color: white; }
    .preset-time { font-size: 1.25rem; font-weight: 600; }
    .preset-label { font-size: 0.75rem; opacity: 0.7; }
    .controls { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; }
    .controls button { min-width: 100px; }
    .custom-time { display: flex; gap: 0.5rem; align-items: center; justify-content: center; margin-top: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">휴식 타이머</h1>
          <p class="tool-description">세트 간 휴식 시간 측정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel timer-display" id="timerDisplay">
        <div class="timer-ring">
          <svg width="250" height="250">
            <circle class="timer-ring-bg" cx="125" cy="125" r="110"></circle>
            <circle class="timer-ring-progress" id="timerRing" cx="125" cy="125" r="110" stroke-dasharray="691" stroke-dashoffset="0"></circle>
          </svg>
          <div class="timer-center">
            <div class="timer-time" id="timerTime">1:00</div>
            <div class="timer-label" id="timerLabel">휴식</div>
          </div>
        </div>
        <div class="controls">
          <button class="tool-btn tool-btn-primary" id="startBtn" onclick="RestTimer.toggle()" aria-label="시작">시작</button>
          <button class="tool-btn tool-btn-secondary" onclick="RestTimer.reset()" aria-label="리셋">리셋</button>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">빠른 설정</h3>
        <div class="preset-grid" id="presetGrid"></div>
        <div class="custom-time">
          <input type="number" id="customSeconds" class="tool-input" style="width: 80px; text-align: center;" placeholder="초" min="1" max="600" aria-label="초">
          <button class="tool-btn tool-btn-secondary" onclick="RestTimer.setCustom()" aria-label="설정">설정</button>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.5rem;">휴식 시간 가이드</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6;">
          <strong>30초</strong>: 근지구력/고반복 훈련<br>
          <strong>60초</strong>: 일반적인 웨이트 트레이닝<br>
          <strong>90초</strong>: 중량 운동/복합 운동<br>
          <strong>2~3분</strong>: 고중량 파워리프팅<br>
          <strong>3~5분</strong>: 최대 근력 훈련
        </p>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="rest-timer.js"></script>
</body>
</html>
