<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스트레칭 가이드 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .stretch-categories { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .category-btn { padding: 0.5rem 1rem; border-radius: 20px; background: var(--bg-primary); cursor: pointer; font-size: 0.9rem; }
    .category-btn.active { background: var(--primary); color: white; }
    .stretch-card { background: var(--bg-primary); border-radius: 12px; padding: 1.25rem; margin-bottom: 0.75rem; cursor: pointer; }
    .stretch-card.active { border: 2px solid var(--primary); }
    .stretch-header { display: flex; justify-content: space-between; align-items: center; }
    .stretch-name { font-weight: 600; font-size: 1.1rem; }
    .stretch-duration { color: var(--text-secondary); font-size: 0.85rem; }
    .stretch-body-part { font-size: 0.8rem; color: var(--primary); margin-top: 0.25rem; }
    .stretch-desc { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.5rem; display: none; }
    .stretch-card.expanded .stretch-desc { display: block; }
    .timer-panel { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); border-radius: 12px; padding: 1.5rem; color: white; text-align: center; margin-top: 1rem; }
    .timer-stretch-name { font-size: 1.1rem; opacity: 0.9; }
    .timer-time { font-size: 4rem; font-weight: 700; font-family: monospace; }
    .timer-controls { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .timer-controls button { background: rgba(255,255,255,0.2); color: white; border: none; }
    .routine-info { display: flex; justify-content: space-between; margin-top: 1rem; font-size: 0.85rem; opacity: 0.8; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">스트레칭 가이드</h1>
          <p class="tool-description">부위별 스트레칭 안내</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="timer-panel" id="timerPanel">
        <div class="timer-stretch-name" id="timerStretchName">스트레칭을 선택하세요</div>
        <div class="timer-time" id="timerTime">00:30</div>
        <div class="timer-controls">
          <button class="tool-btn" onclick="StretchGuide.startTimer()" aria-label="시작">시작</button>
          <button class="tool-btn" onclick="StretchGuide.pauseTimer()" aria-label="일시정지">일시정지</button>
          <button class="tool-btn" onclick="StretchGuide.nextStretch()" aria-label="다음">다음</button>
        </div>
        <div class="routine-info">
          <span id="routineProgress">0 / 0</span>
          <span id="routineTime">총 0분</span>
        </div>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <div class="stretch-categories" id="categoryList"></div>
        <div id="stretchList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="stretch-guide.js"></script>
</body>
</html>
