<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목업 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="mockup-gen.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">목업 생성기</h1>
          <p class="tool-description">디바이스 목업에 스크린샷 삽입</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <div class="mockup-layout">
      <!-- 컨트롤 패널 -->
      <div class="controls-panel">
        <div class="section-title">이미지 업로드</div>
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon"></div>
          <div class="upload-text">이미지를 드래그하거나 클릭</div>
          <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>

        <div class="section-title">디바이스 선택</div>
        <div class="device-grid">
          <button class="device-btn active" data-device="iphone" onclick="MockupGen.setDevice('iphone')" aria-label="iPhone">
            iPhone
          </button>
          <button class="device-btn" data-device="android" onclick="MockupGen.setDevice('android')" aria-label="Android">
            Android
          </button>
          <button class="device-btn" data-device="macbook" onclick="MockupGen.setDevice('macbook')" aria-label="MacBook">
            MacBook
          </button>
          <button class="device-btn" data-device="ipad" onclick="MockupGen.setDevice('ipad')" aria-label="iPad">
            iPad
          </button>
          <button class="device-btn" data-device="browser" onclick="MockupGen.setDevice('browser')" aria-label="브라우저">
            브라우저
          </button>
          <button class="device-btn" data-device="monitor" onclick="MockupGen.setDevice('monitor')" aria-label="모니터">
            모니터
          </button>
        </div>

        <div class="section-title">옵션</div>
        <div class="option-group">
          <label>배경색</label>
          <input type="color" id="bgColor" value="#f5f5f5" onchange="MockupGen.updateBackground()">
        </div>
        <div class="option-group">
          <label>
            <input type="checkbox" id="showShadow" checked onchange="MockupGen.updateShadow()">
            그림자 표시
          </label>
        </div>

        <button class="tool-btn tool-btn-primary download-btn" onclick="MockupGen.download()" aria-label="목업 다운로드">
          목업 다운로드
        </button>
      </div>

      <!-- 프리뷰 패널 -->
      <div class="preview-panel">
        <div class="mockup-preview" id="mockupPreview">
          <div class="device-frame" id="deviceFrame">
            <div class="device-screen" id="deviceScreen">
              <div class="screen-placeholder">이미지를 업로드하세요</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="mockup-gen.js"></script>
</body>
</html>
