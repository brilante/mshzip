<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>컬러 팔레트 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .palette-preview {
      display: flex;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
      min-height: 150px;
    }
    .palette-color {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 16px 8px;
      cursor: pointer;
      transition: flex 0.3s ease;
      position: relative;
    }
    .palette-color:hover {
      flex: 1.5;
    }
    .palette-color-info {
      background: rgba(255,255,255,0.9);
      color: #333;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .palette-color:hover .palette-color-info {
      opacity: 1;
    }
    .base-color-picker {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .base-color-picker input[type="color"] {
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .base-color-picker input[type="text"] {
      width: 120px;
      font-family: monospace;
    }
    .harmony-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .harmony-btn {
      padding: 16px 12px;
      border: 2px solid var(--tools-border);
      background: var(--tools-bg-secondary);
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .harmony-btn:hover {
      border-color: var(--tools-primary);
    }
    .harmony-btn.active {
      border-color: var(--tools-primary);
      background: var(--tools-primary-light);
    }
    .harmony-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .harmony-preview {
      display: flex;
      gap: 4px;
      justify-content: center;
    }
    .harmony-preview-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }
    .export-colors {
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      white-space: pre;
      overflow-x: auto;
    }
    .saved-palettes {
      display: grid;
      gap: 12px;
    }
    .saved-palette {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      height: 50px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .saved-palette:hover {
      border-color: var(--tools-primary);
    }
    .saved-palette-color {
      flex: 1;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">컬러 팔레트 생성기</h1>
          <p class="tool-description">조화로운 색상 팔레트 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 팔레트 미리보기 -->
    <div class="input-panel">
      <div class="panel-title">팔레트 미리보기</div>
      <div class="palette-preview" id="palettePreview"></div>

      <div class="tool-actions">
        <button class="tool-btn tool-btn-primary" onclick="ColorPalette.randomize()" aria-label="랜덤 생성">랜덤 생성</button>
        <button class="tool-btn tool-btn-secondary" onclick="ColorPalette.savePalette()" aria-label="저장">저장</button>
      </div>
    </div>

    <!-- 기준 색상 -->
    <div class="input-panel">
      <div class="panel-title">기준 색상</div>
      <div class="base-color-picker">
        <input type="color" id="baseColor" value="#667eea" onchange="ColorPalette.setBaseColor(this.value)">
        <input type="text" id="baseColorHex" class="tool-input" value="#667eea"
               oninput="ColorPalette.setBaseColorFromHex(this.value)">
        <button class="tool-btn tool-btn-secondary" onclick="ColorPalette.pickRandom()" aria-label="랜덤">랜덤</button>
      </div>
    </div>

    <!-- 색상 조화 선택 -->
    <div class="input-panel">
      <div class="panel-title">색상 조화</div>
      <div class="harmony-grid" id="harmonyGrid"></div>
    </div>

    <!-- 내보내기 -->
    <div class="output-panel" style="position: relative;">
      <div class="panel-title">CSS 코드</div>
      <button class="copy-btn" onclick="ColorPalette.copyCode()" aria-label="복사">복사</button>
      <div class="export-colors" id="exportCode"></div>
    </div>

    <!-- 저장된 팔레트 -->
    <div class="input-panel">
      <div class="panel-title">저장된 팔레트</div>
      <div class="saved-palettes" id="savedPalettes">
        <div style="text-align: center; color: var(--tools-text-secondary); padding: 20px;">
          저장된 팔레트가 없습니다.
        </div>
      </div>
      <button class="tool-btn tool-btn-secondary" onclick="ColorPalette.clearSaved()" style="width: 100%; margin-top: 12px;" aria-label="저장 목록 삭제">
        저장 목록 삭제
      </button>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="color-palette.js"></script>
</body>
</html>
