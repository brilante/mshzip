<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>패턴 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="pattern-gen.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">패턴 생성기</h1>
          <p class="tool-description">CSS 배경 패턴 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <div class="pattern-layout">
      <!-- 컨트롤 패널 -->
      <div class="controls-panel">
        <div class="section-title">패턴 선택</div>
        <div class="pattern-grid" id="patternGrid"></div>

        <div class="section-title">색상</div>
        <div class="color-controls">
          <div class="control-group">
            <label>배경색</label>
            <input type="color" id="bgColor" value="#ffffff" oninput="PatternGen.update()">
          </div>
          <div class="control-group">
            <label>패턴색</label>
            <input type="color" id="patternColor" value="#e5e7eb" oninput="PatternGen.update()">
          </div>
        </div>

        <div class="section-title">크기</div>
        <div class="control-group">
          <input type="range" id="patternSize" min="5" max="100" value="20" oninput="PatternGen.update()">
          <span id="patternSizeValue">20px</span>
        </div>

        <div class="section-title">불투명도</div>
        <div class="control-group">
          <input type="range" id="opacity" min="0" max="100" value="100" oninput="PatternGen.update()">
          <span id="opacityValue">100%</span>
        </div>
      </div>

      <!-- 프리뷰 패널 -->
      <div class="preview-panel">
        <div class="pattern-preview" id="patternPreview"></div>

        <!-- CSS 코드 -->
        <div class="code-output">
          <div class="code-header">
            <span>CSS 코드</span>
            <button class="copy-btn" onclick="PatternGen.copyCode()" aria-label="복사">복사</button>
          </div>
          <pre id="cssCode"></pre>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pattern-gen.js"></script>
</body>
</html>
