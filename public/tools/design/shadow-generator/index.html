<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 그림자 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .shadow-preview-area {
      background: var(--tools-bg-secondary);
      border-radius: 12px;
      padding: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      min-height: 300px;
    }
    .shadow-preview-box {
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 12px;
      transition: box-shadow 0.3s ease;
    }
    .shadow-type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .shadow-type-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--tools-border);
      background: var(--tools-bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .shadow-type-btn.active {
      border-color: var(--tools-primary);
      background: var(--tools-primary);
      color: white;
    }
    .shadow-control {
      margin-bottom: 20px;
    }
    .shadow-control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .shadow-control-name {
      font-size: 14px;
      color: var(--tools-text-secondary);
    }
    .shadow-control-value {
      font-weight: 600;
      color: var(--tools-primary);
      min-width: 60px;
      text-align: right;
    }
    .shadow-layer {
      background: var(--tools-bg-secondary);
      border: 1px solid var(--tools-border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .shadow-layer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .shadow-layer-title {
      font-weight: 600;
    }
    .shadow-layer-remove {
      background: var(--tools-error);
      color: white;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
    }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
    }
    .preset-item {
      aspect-ratio: 1;
      background: var(--tools-bg-secondary);
      border: 2px solid var(--tools-border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .preset-item:hover {
      border-color: var(--tools-primary);
    }
    .preset-inner {
      width: 50%;
      height: 50%;
      background: white;
      border-radius: 6px;
    }
    .code-output {
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'Consolas', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .color-input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .color-input-wrapper input[type="color"] {
      width: 40px;
      height: 32px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">CSS 그림자 생성기</h1>
          <p class="tool-description">box-shadow와 text-shadow 시각적 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 미리보기 -->
    <div class="input-panel">
      <div class="panel-title">미리보기</div>

      <!-- 타입 선택 -->
      <div class="shadow-type-toggle">
        <button class="shadow-type-btn active" onclick="ShadowGen.setType('box')" id="typeBox" aria-label="Box Shadow">Box Shadow</button>
        <button class="shadow-type-btn" onclick="ShadowGen.setType('text')" id="typeText" aria-label="Text Shadow">Text Shadow</button>
      </div>

      <div class="shadow-preview-area" id="previewArea">
        <div class="shadow-preview-box" id="previewBox">
          <div id="previewText" style="display: none; font-size: 48px; font-weight: bold; text-align: center; padding-top: 70px;">Aa</div>
        </div>
      </div>
    </div>

    <!-- 그림자 레이어 -->
    <div class="input-panel">
      <div class="panel-title">그림자 설정</div>
      <div id="shadowLayers"></div>
      <button class="tool-btn tool-btn-secondary" onclick="ShadowGen.addLayer()" style="width: 100%; margin-top: 12px;" aria-label="+ 레이어 추가">
        + 레이어 추가
      </button>
    </div>

    <!-- 프리셋 -->
    <div class="input-panel">
      <div class="panel-title">프리셋</div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>

    <!-- CSS 코드 출력 -->
    <div class="output-panel" style="position: relative;">
      <div class="panel-title">CSS 코드</div>
      <button class="copy-btn" onclick="ShadowGen.copyCode()" aria-label="복사">복사</button>
      <div class="code-output" id="codeOutput"></div>

      <div class="tool-actions" style="margin-top: 16px;">
        <button class="tool-btn tool-btn-secondary" onclick="ShadowGen.reset()" aria-label="초기화">초기화</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="shadow-generator.js"></script>
</body>
</html>
