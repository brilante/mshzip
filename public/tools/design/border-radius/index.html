<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테두리 둥글기 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .preview-box {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, var(--tools-primary), var(--tools-secondary));
      margin: 24px auto;
      transition: border-radius 0.3s ease;
    }
    .corner-control {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .corner-item {
      background: var(--tools-bg-secondary);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--tools-border);
    }
    .corner-label {
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .corner-icon {
      width: 16px;
      height: 16px;
      border: 2px solid var(--tools-primary);
    }
    .corner-tl { border-radius: 8px 0 0 0; }
    .corner-tr { border-radius: 0 8px 0 0; }
    .corner-bl { border-radius: 0 0 0 8px; }
    .corner-br { border-radius: 0 0 8px 0; }
    .slider-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slider-group input[type="range"] {
      flex: 1;
    }
    .slider-value {
      min-width: 50px;
      text-align: right;
      font-weight: 600;
      color: var(--tools-primary);
    }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .preset-item {
      aspect-ratio: 1;
      background: var(--tools-bg-secondary);
      border: 2px solid var(--tools-border);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preset-item:hover {
      border-color: var(--tools-primary);
      transform: scale(1.05);
    }
    .preset-item.active {
      border-color: var(--tools-primary);
      background: var(--tools-primary-light);
    }
    .preset-inner {
      width: 50%;
      height: 50%;
      background: var(--tools-primary);
    }
    .code-output {
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'Consolas', monospace;
      font-size: 14px;
      position: relative;
    }
    .code-line {
      margin: 4px 0;
    }
    .code-property {
      color: #9b59b6;
    }
    .code-value {
      color: #27ae60;
    }
    .unit-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .unit-btn {
      padding: 6px 16px;
      border: 1px solid var(--tools-border);
      background: var(--tools-bg-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .unit-btn.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon">◰</div>
        <div>
          <h1 class="tool-title">테두리 둥글기 생성기</h1>
          <p class="tool-description">CSS border-radius 값을 시각적으로 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 미리보기 -->
    <div class="input-panel">
      <div class="panel-title">미리보기</div>
      <div class="preview-box" id="previewBox"></div>

      <!-- 단위 선택 -->
      <div class="unit-toggle">
        <button class="unit-btn active" onclick="BorderRadius.setUnit('px')" id="unitPx" aria-label="px">px</button>
        <button class="unit-btn" onclick="BorderRadius.setUnit('%')" id="unitPercent" aria-label="%">%</button>
      </div>

      <!-- 전체 조절 -->
      <div style="margin-bottom: 24px;">
        <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
          <input type="checkbox" id="linkCorners" checked onchange="BorderRadius.toggleLink()">
          <span>모든 모서리 동일하게</span>
        </label>
        <div class="slider-group" id="allCornersSlider">
          <input type="range" min="0" max="100" value="20" id="allCorners" oninput="BorderRadius.updateAll(this.value)">
          <span class="slider-value" id="allCornersValue">20px</span>
        </div>
      </div>

      <!-- 개별 모서리 조절 -->
      <div class="corner-control" id="individualControls" style="display: none;">
        <div class="corner-item">
          <div class="corner-label">
            <div class="corner-icon corner-tl"></div>
            좌상단
          </div>
          <div class="slider-group">
            <input type="range" min="0" max="100" value="20" id="topLeft" oninput="BorderRadius.update()">
            <span class="slider-value" id="topLeftValue">20px</span>
          </div>
        </div>
        <div class="corner-item">
          <div class="corner-label">
            <div class="corner-icon corner-tr"></div>
            우상단
          </div>
          <div class="slider-group">
            <input type="range" min="0" max="100" value="20" id="topRight" oninput="BorderRadius.update()">
            <span class="slider-value" id="topRightValue">20px</span>
          </div>
        </div>
        <div class="corner-item">
          <div class="corner-label">
            <div class="corner-icon corner-bl"></div>
            좌하단
          </div>
          <div class="slider-group">
            <input type="range" min="0" max="100" value="20" id="bottomLeft" oninput="BorderRadius.update()">
            <span class="slider-value" id="bottomLeftValue">20px</span>
          </div>
        </div>
        <div class="corner-item">
          <div class="corner-label">
            <div class="corner-icon corner-br"></div>
            우하단
          </div>
          <div class="slider-group">
            <input type="range" min="0" max="100" value="20" id="bottomRight" oninput="BorderRadius.update()">
            <span class="slider-value" id="bottomRightValue">20px</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 프리셋 -->
    <div class="input-panel">
      <div class="panel-title">프리셋</div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>

    <!-- CSS 코드 출력 -->
    <div class="output-panel" style="position: relative;">
      <div class="panel-title">CSS 코드</div>
      <button class="copy-btn" onclick="BorderRadius.copyCode()" aria-label="복사">복사</button>
      <div class="code-output" id="codeOutput">
        <div class="code-line"><span class="code-property">border-radius:</span> <span class="code-value" id="codeValue">20px</span>;</div>
      </div>

      <div class="tool-actions" style="margin-top: 16px;">
        <button class="tool-btn tool-btn-secondary" onclick="BorderRadius.reset()" aria-label="초기화">초기화</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="border-radius.js"></script>
</body>
</html>
