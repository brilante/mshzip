<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="glassmorphism-gen.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">Glassmorphism 생성기</h1>
          <p class="tool-description">유리 효과 CSS를 쉽게 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <div class="generator-layout">
      <!-- 컨트롤 패널 -->
      <div class="controls-panel">
        <div class="section-title">설정</div>

        <div class="control-group">
          <label>투명도</label>
          <input type="range" id="opacity" min="0" max="100" value="25" oninput="GlassmorphismGen.update()">
          <span id="opacityValue">25%</span>
        </div>

        <div class="control-group">
          <label>블러</label>
          <input type="range" id="blur" min="0" max="30" value="10" oninput="GlassmorphismGen.update()">
          <span id="blurValue">10px</span>
        </div>

        <div class="control-group">
          <label>테두리 투명도</label>
          <input type="range" id="borderOpacity" min="0" max="100" value="30" oninput="GlassmorphismGen.update()">
          <span id="borderOpacityValue">30%</span>
        </div>

        <div class="control-group">
          <label>그림자 강도</label>
          <input type="range" id="shadowIntensity" min="0" max="50" value="20" oninput="GlassmorphismGen.update()">
          <span id="shadowIntensityValue">20</span>
        </div>

        <div class="control-group">
          <label>둥글기</label>
          <input type="range" id="borderRadius" min="0" max="50" value="16" oninput="GlassmorphismGen.update()">
          <span id="borderRadiusValue">16px</span>
        </div>

        <div class="color-controls">
          <div class="control-group">
            <label>배경 색상</label>
            <input type="color" id="bgColor" value="#3b82f6" oninput="GlassmorphismGen.update()">
          </div>
          <div class="control-group">
            <label>유리 색상</label>
            <input type="color" id="glassColor" value="#ffffff" oninput="GlassmorphismGen.update()">
          </div>
        </div>
      </div>

      <!-- 프리뷰 패널 -->
      <div class="preview-panel">
        <div class="section-title">미리보기</div>
        <div class="preview-area" id="previewArea">
          <div class="bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
          </div>
          <div class="glass-card" id="glassCard">
            <h3>Glassmorphism</h3>
            <p>반투명 유리 효과로 모던하고 세련된 UI를 만들어보세요.</p>
          </div>
        </div>

        <!-- CSS 코드 -->
        <div class="code-output">
          <div class="code-header">
            <span>CSS 코드</span>
            <button class="copy-btn" onclick="GlassmorphismGen.copyCode()" aria-label="복사">복사</button>
          </div>
          <pre id="cssCode"></pre>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="glassmorphism-gen.js"></script>
</body>
</html>
