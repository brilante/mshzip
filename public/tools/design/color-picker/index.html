<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>색상 추출기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="color-picker.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">색상 추출기</h1>
          <p class="tool-description">이미지에서 색상을 추출하거나 색상 팔레트 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 메인 컨텐츠 -->
    <div class="picker-container">
      <!-- 색상 피커 -->
      <div class="picker-section">
        <div class="section-title">색상 선택</div>
        <div class="color-picker-wrapper">
          <input type="color" id="colorPicker" value="#3b82f6">
          <div class="color-preview" id="colorPreview"></div>
        </div>

        <!-- 색상 슬라이더 -->
        <div class="color-sliders">
          <div class="slider-group">
            <label>R <span id="redValue">59</span></label>
            <input type="range" id="redSlider" min="0" max="255" value="59">
          </div>
          <div class="slider-group">
            <label>G <span id="greenValue">130</span></label>
            <input type="range" id="greenSlider" min="0" max="255" value="130">
          </div>
          <div class="slider-group">
            <label>B <span id="blueValue">246</span></label>
            <input type="range" id="blueSlider" min="0" max="255" value="246">
          </div>
        </div>
      </div>

      <!-- 색상 값 표시 -->
      <div class="values-section">
        <div class="section-title">색상 값</div>
        <div class="color-values">
          <div class="value-row">
            <span class="value-label">HEX</span>
            <input type="text" id="hexValue" value="#3b82f6" readonly>
            <button class="copy-btn-sm" onclick="ColorPicker.copyValue('hex')" aria-label="복사">복사</button>
          </div>
          <div class="value-row">
            <span class="value-label">RGB</span>
            <input type="text" id="rgbValue" value="rgb(59, 130, 246)" readonly>
            <button class="copy-btn-sm" onclick="ColorPicker.copyValue('rgb')" aria-label="복사">복사</button>
          </div>
          <div class="value-row">
            <span class="value-label">HSL</span>
            <input type="text" id="hslValue" value="hsl(217, 91%, 60%)" readonly>
            <button class="copy-btn-sm" onclick="ColorPicker.copyValue('hsl')" aria-label="복사">복사</button>
          </div>
          <div class="value-row">
            <span class="value-label">RGBA</span>
            <input type="text" id="rgbaValue" value="rgba(59, 130, 246, 1)" readonly>
            <button class="copy-btn-sm" onclick="ColorPicker.copyValue('rgba')" aria-label="복사">복사</button>
          </div>
        </div>
      </div>

      <!-- 이미지에서 추출 -->
      <div class="extract-section">
        <div class="section-title">이미지에서 색상 추출</div>
        <div class="image-drop-zone" id="dropZone">
          <div class="drop-zone-content">
            <div class="drop-zone-icon"></div>
            <div class="drop-zone-text">이미지를 드래그하거나 클릭하여 선택</div>
          </div>
          <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>
        <div id="imageContainer" style="display: none;">
          <canvas id="imageCanvas"></canvas>
          <p class="extract-hint">이미지를 클릭하여 색상 추출</p>
          <button class="tool-btn tool-btn-secondary" onclick="ColorPicker.removeImage()" aria-label="이미지 제거">이미지 제거</button>
        </div>
      </div>

      <!-- 추출된 팔레트 -->
      <div class="palette-section">
        <div class="section-title">추출된 색상 팔레트</div>
        <div class="palette-grid" id="paletteGrid">
          <div class="palette-empty">이미지에서 색상을 클릭하여 추출하세요</div>
        </div>
        <div class="palette-actions" id="paletteActions" style="display: none;">
          <button class="tool-btn tool-btn-secondary" onclick="ColorPicker.clearPalette()" aria-label="팔레트 초기화">팔레트 초기화</button>
          <button class="tool-btn tool-btn-primary" onclick="ColorPicker.exportPalette()" aria-label="팔레트 내보내기">팔레트 내보내기</button>
        </div>
      </div>

      <!-- 색상 조화 -->
      <div class="harmony-section">
        <div class="section-title">색상 조화</div>
        <div class="harmony-type">
          <button class="harmony-btn active" data-type="complementary" aria-label="보색">보색</button>
          <button class="harmony-btn" data-type="analogous" aria-label="유사색">유사색</button>
          <button class="harmony-btn" data-type="triadic" aria-label="삼색조화">삼색조화</button>
          <button class="harmony-btn" data-type="split" aria-label="분열보색">분열보색</button>
        </div>
        <div class="harmony-colors" id="harmonyColors"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="color-picker.js"></script>
</body>
</html>
