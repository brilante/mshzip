<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지출 추적기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .productivity-container { max-width: 700px; margin: 0 auto; }
    .productivity-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .summary-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; text-align: center; }
    .summary-value { font-size: 1.5rem; font-weight: 700; }
    .summary-label { font-size: 0.8rem; color: var(--text-secondary); }
    .expense-card { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; }
    .income-card { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; }
    .add-form { display: grid; grid-template-columns: 1fr 120px 120px auto; gap: 0.5rem; margin-bottom: 1.5rem; }
    .transaction-list { max-height: 400px; overflow-y: auto; }
    .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .transaction-info { display: flex; align-items: center; gap: 0.75rem; }
    .transaction-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
    .transaction-expense { background: rgba(239, 68, 68, 0.2); }
    .transaction-income { background: rgba(34, 197, 94, 0.2); }
    .transaction-amount { font-weight: 600; }
    .amount-expense { color: #ef4444; }
    .amount-income { color: #22c55e; }
    .category-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .category-pill { padding: 0.5rem 1rem; border-radius: 20px; border: none; cursor: pointer; background: var(--bg-primary); font-size: 0.85rem; transition: all 0.2s; }
    .category-pill.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">지출 추적기</h1>
          <p class="tool-description">수입/지출 기록 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="productivity-container">
      <div class="productivity-panel">
        <div class="summary-cards">
          <div class="summary-card income-card">
            <div class="summary-value" id="totalIncome">₩0</div>
            <div class="summary-label">총 수입</div>
          </div>
          <div class="summary-card expense-card">
            <div class="summary-value" id="totalExpense">₩0</div>
            <div class="summary-label">총 지출</div>
          </div>
          <div class="summary-card">
            <div class="summary-value" id="balance">₩0</div>
            <div class="summary-label">잔액</div>
          </div>
        </div>

        <div class="category-pills">
          <button class="category-pill active" data-type="expense" onclick="ExpenseTracker.setType('expense')" aria-label="지출">지출</button>
          <button class="category-pill" data-type="income" onclick="ExpenseTracker.setType('income')" aria-label="수입">수입</button>
        </div>

        <div class="add-form">
          <input type="text" id="description" class="tool-input" placeholder="내용" aria-label="내용">
          <input type="number" id="amount" class="tool-input" placeholder="금액" aria-label="금액">
          <select id="category" class="tool-input">
            <option value="food">식비</option>
            <option value="transport">교통</option>
            <option value="shopping">쇼핑</option>
            <option value="entertainment">여가</option>
            <option value="bills">공과금</option>
            <option value="salary">급여</option>
            <option value="other">기타</option>
          </select>
          <button class="tool-btn tool-btn-primary" onclick="ExpenseTracker.add()" aria-label="추가">추가</button>
        </div>

        <div class="transaction-list" id="transactionList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="expense-tracker.js"></script>
</body>
</html>
