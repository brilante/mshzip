<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV 편집기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="csv-editor.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">CSV 편집기</h1>
      <p class="tool-description">CSV 파일을 온라인에서 편집하고 저장합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel-full">
        <!-- 툴바 -->
        <div class="toolbar" id="toolbar" style="display: none;">
          <div class="toolbar-group">
            <button class="toolbar-btn" onclick="CsvEditor.addRow()" title="행 추가">
              <span>행</span>
            </button>
            <button class="toolbar-btn" onclick="CsvEditor.addColumn()" title="열 추가">
              <span>열</span>
            </button>
            <button class="toolbar-btn" onclick="CsvEditor.deleteSelectedRow()" title="선택한 행 삭제">
              <span>행</span>
            </button>
            <button class="toolbar-btn" onclick="CsvEditor.deleteSelectedColumn()" title="선택한 열 삭제">
              <span>열</span>
            </button>
          </div>
          <div class="toolbar-group">
            <button class="toolbar-btn" onclick="CsvEditor.undo()" title="실행 취소">
              <span>↩</span>
            </button>
            <button class="toolbar-btn" onclick="CsvEditor.redo()" title="다시 실행">
              <span>↪</span>
            </button>
          </div>
          <div class="toolbar-group">
            <button class="toolbar-btn" onclick="CsvEditor.sortAsc()" title="오름차순 정렬">
              <span></span>
            </button>
            <button class="toolbar-btn" onclick="CsvEditor.sortDesc()" title="내림차순 정렬">
              <span></span>
            </button>
          </div>
          <div class="toolbar-group">
            <input type="text" id="searchInput" class="search-input" placeholder="검색..." oninput="CsvEditor.search(this.value)" aria-label="검색...">
          </div>
          <div class="toolbar-group toolbar-right">
            <button class="toolbar-btn toolbar-btn-primary" onclick="CsvEditor.download()">
              <span>다운로드</span>
            </button>
            <button class="toolbar-btn" onclick="CsvEditor.reset()">
              <span>새 파일</span>
            </button>
          </div>
        </div>

        <!-- 업로드 영역 -->
        <div class="upload-section" id="uploadSection">
          <div class="upload-dropzone" id="dropzone">
            <input type="file" id="fileInput" accept=".csv,.tsv,.txt" hidden>
            <div class="dropzone-icon"></div>
            <div class="dropzone-text">CSV 파일을 드래그하거나 클릭하여 선택</div>
            <div class="dropzone-hint">또는</div>
            <button class="tool-btn tool-btn-primary" onclick="CsvEditor.createNew()" aria-label="새 CSV 만들기">새 CSV 만들기</button>
          </div>
        </div>

        <!-- 편집 영역 -->
        <div class="editor-section" id="editorSection" style="display: none;">
          <div class="table-wrapper">
            <table class="csv-table" id="csvTable">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div class="status-bar">
            <span id="cellCount">0개 셀</span>
            <span id="selectedInfo"></span>
          </div>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">사용 팁</div>
          <div class="help-content">
            <ul>
              <li><strong>셀 편집</strong>: 셀을 더블클릭하여 직접 편집</li>
              <li><strong>행/열 선택</strong>: 행 번호나 열 헤더 클릭으로 선택</li>
              <li><strong>복사/붙여넣기</strong>: Ctrl+C, Ctrl+V로 셀 복사</li>
              <li><strong>키보드 탐색</strong>: 방향키로 셀 간 이동, Tab으로 다음 셀</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="csv-editor.js"></script>
</body>
</html>
