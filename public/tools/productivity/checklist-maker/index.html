<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체크리스트 생성기 - 생산성 도구</title>
    <link rel="stylesheet" href="checklist-maker.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>체크리스트 생성기</h1>
            <p>체계적인 체크리스트로 일을 완벽하게</p>
        </header>

        <div class="main-content">
            <div class="checklist-creator card">
                <h3>새 체크리스트</h3>
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" id="checklistTitle" placeholder="예: 여행 준비물" aria-label="예: 여행 준비물">
                </div>
                <div class="form-group">
                    <label>템플릿 선택</label>
                    <select id="templateSelect">
                        <option value="">직접 작성</option>
                        <option value="travel">여행 준비</option>
                        <option value="meeting">회의 준비</option>
                        <option value="project">프로젝트 시작</option>
                        <option value="moving">이사 체크리스트</option>
                        <option value="event">이벤트 기획</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>항목 추가</label>
                    <div class="add-item-row">
                        <input type="text" id="newItem" placeholder="새 항목 입력" aria-label="새 항목 입력">
                        <button id="addItem" aria-label="추가">추가</button>
                    </div>
                </div>
                <div id="itemsList" class="items-list"></div>
                <button id="saveChecklist" class="btn-save" aria-label="체크리스트 저장">체크리스트 저장</button>
            </div>

            <div class="saved-checklists card">
                <h3>저장된 체크리스트</h3>
                <div id="checklistsList"></div>
            </div>
        </div>
    </div>
    <script src="checklist-maker.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
