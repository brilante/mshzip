<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>습관 추적기 - 생산성 도구</title>
    <link rel="stylesheet" href="habit-tracker.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>습관 추적기</h1>
            <p>작은 습관이 큰 변화를 만듭니다</p>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <span class="stat-value" id="totalHabits">0</span>
                <span class="stat-label">습관</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="todayComplete">0</span>
                <span class="stat-label">오늘 완료</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="bestStreak">0</span>
                <span class="stat-label">최고 연속</span>
            </div>
        </div>

        <div class="add-habit">
            <input type="text" id="habitInput" placeholder="새 습관 입력 (예: 물 8잔 마시기)" aria-label="새 습관 입력 (예: 물 8잔 마시기)">
            <select id="habitFreq">
                <option value="daily">매일</option>
                <option value="weekdays">평일만</option>
                <option value="weekends">주말만</option>
            </select>
            <button id="addHabit" aria-label="추가">추가</button>
        </div>

        <div class="week-nav">
            <button id="prevWeek" aria-label="&lt;">&lt;</button>
            <span id="weekRange">2024년 1월 1일 - 7일</span>
            <button id="nextWeek" aria-label="&gt;">&gt;</button>
        </div>

        <div class="habit-table">
            <div class="table-header">
                <div class="habit-name-col">습관</div>
                <div class="day-cols" id="dayHeaders"></div>
            </div>
            <div id="habitList"></div>
        </div>
    </div>
    <script src="habit-tracker.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
