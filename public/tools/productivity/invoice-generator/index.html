<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인보이스 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .productivity-container { max-width: 900px; margin: 0 auto; }
    .productivity-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .items-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .items-table th, .items-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color); }
    .items-table th { background: var(--bg-primary); font-weight: 600; font-size: 0.85rem; }
    .items-table input { width: 100%; }
    .invoice-preview { background: white; border-radius: 8px; padding: 2rem; margin-top: 1.5rem; color: #333; }
    .invoice-header { display: flex; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 1rem; margin-bottom: 1.5rem; }
    .invoice-title { font-size: 2rem; font-weight: 700; color: #333; }
    .invoice-info { text-align: right; font-size: 0.9rem; }
    .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 1.5rem; }
    .party-section h3 { font-weight: 600; margin-bottom: 0.5rem; color: #666; }
    .total-section { text-align: right; margin-top: 1.5rem; padding-top: 1rem; border-top: 2px solid #333; }
    .total-row { display: flex; justify-content: flex-end; gap: 2rem; margin: 0.25rem 0; }
    .grand-total { font-size: 1.25rem; font-weight: 700; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">인보이스 생성기</h1>
          <p class="tool-description">전문적인 청구서 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="productivity-container">
      <div class="productivity-panel">
        <div class="form-grid">
          <div>
            <h3 style="font-weight: 600; margin-bottom: 1rem;">발신자 정보</h3>
            <div class="input-group">
              <label>회사/이름</label>
              <input type="text" id="fromName" class="tool-input" value="내 회사">
            </div>
            <div class="input-group">
              <label>주소</label>
              <input type="text" id="fromAddress" class="tool-input" placeholder="주소" aria-label="주소">
            </div>
            <div class="input-group">
              <label>이메일</label>
              <input type="email" id="fromEmail" class="tool-input" placeholder="email@example.com" aria-label="email@example.com">
            </div>
          </div>
          <div>
            <h3 style="font-weight: 600; margin-bottom: 1rem;">수신자 정보</h3>
            <div class="input-group">
              <label>회사/이름</label>
              <input type="text" id="toName" class="tool-input" placeholder="고객사명" aria-label="고객사명">
            </div>
            <div class="input-group">
              <label>주소</label>
              <input type="text" id="toAddress" class="tool-input" placeholder="주소" aria-label="주소">
            </div>
            <div class="input-group">
              <label>이메일</label>
              <input type="email" id="toEmail" class="tool-input" placeholder="client@example.com" aria-label="client@example.com">
            </div>
          </div>
        </div>

        <div class="form-grid" style="margin-top: 1rem;">
          <div class="input-group">
            <label>인보이스 번호</label>
            <input type="text" id="invoiceNo" class="tool-input" value="INV-001">
          </div>
          <div class="input-group">
            <label>발행일</label>
            <input type="date" id="invoiceDate" class="tool-input">
          </div>
        </div>

        <h3 style="font-weight: 600; margin: 1.5rem 0 0.5rem;">항목</h3>
        <table class="items-table">
          <thead>
            <tr>
              <th>설명</th>
              <th style="width: 80px;">수량</th>
              <th style="width: 120px;">단가 (원)</th>
              <th style="width: 120px;">금액</th>
              <th style="width: 40px;"></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
        <button class="tool-btn tool-btn-secondary" style="margin-top: 0.5rem;" onclick="InvoiceGenerator.addItem()" aria-label="+ 항목 추가">+ 항목 추가</button>

        <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem;">
          <button class="tool-btn tool-btn-primary" onclick="InvoiceGenerator.preview()" aria-label="미리보기">미리보기</button>
          <button class="tool-btn tool-btn-secondary" onclick="InvoiceGenerator.print()" aria-label="인쇄">인쇄</button>
        </div>

        <div id="previewContainer"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="invoice-generator.js"></script>
</body>
</html>
