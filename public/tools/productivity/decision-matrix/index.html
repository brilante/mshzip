<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의사결정 매트릭스 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .productivity-container { max-width: 900px; margin: 0 auto; }
    .productivity-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .matrix-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .matrix-table th, .matrix-table td { padding: 0.75rem; text-align: center; border: 1px solid var(--border-color); }
    .matrix-table th { background: var(--bg-primary); font-weight: 600; }
    .matrix-table input[type="number"] { width: 60px; text-align: center; }
    .criteria-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    .option-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    .result-card { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; text-align: center; }
    .winner-name { font-size: 1.5rem; font-weight: 700; }
    .winner-score { font-size: 2rem; font-weight: 700; margin: 0.5rem 0; }
    .ranking { margin-top: 1rem; background: var(--bg-primary); border-radius: 8px; padding: 1rem; }
    .ranking-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border-color); }
    .ranking-item:last-child { border-bottom: none; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">의사결정 매트릭스</h1>
          <p class="tool-description">가중치 기반 옵션 비교</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="productivity-container">
      <div class="productivity-panel">
        <div class="input-group">
          <label>평가 기준 (가중치 포함)</label>
          <div id="criteriaList"></div>
          <button class="tool-btn tool-btn-secondary" onclick="DecisionMatrix.addCriteria()" aria-label="+ 기준 추가">+ 기준 추가</button>
        </div>

        <div class="input-group">
          <label>옵션 (비교 대상)</label>
          <div id="optionList"></div>
          <button class="tool-btn tool-btn-secondary" onclick="DecisionMatrix.addOption()" aria-label="+ 옵션 추가">+ 옵션 추가</button>
        </div>

        <div id="matrixContainer"></div>

        <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1rem;" onclick="DecisionMatrix.calculate()" aria-label="결과 계산">결과 계산</button>

        <div id="result"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="decision-matrix.js"></script>
</body>
</html>
