<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스티키 노트 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="sticky-notes.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">스티키 노트</h1>
      <p class="tool-description">간단한 메모를 포스트잇처럼 관리하세요</p>
    </header>

    <main class="tool-content">
      <!-- 툴바 -->
      <div class="notes-toolbar">
        <button class="tool-btn tool-btn-primary" onclick="StickyNotes.addNote()" aria-label="새 노트">
          새 노트
        </button>
        <div class="color-picker">
          <span class="picker-label">색상:</span>
          <button class="color-btn active" data-color="yellow" onclick="StickyNotes.setDefaultColor('yellow')" style="background: #fef08a;"></button>
          <button class="color-btn" data-color="pink" onclick="StickyNotes.setDefaultColor('pink')" style="background: #fecdd3;"></button>
          <button class="color-btn" data-color="blue" onclick="StickyNotes.setDefaultColor('blue')" style="background: #bfdbfe;"></button>
          <button class="color-btn" data-color="green" onclick="StickyNotes.setDefaultColor('green')" style="background: #bbf7d0;"></button>
          <button class="color-btn" data-color="purple" onclick="StickyNotes.setDefaultColor('purple')" style="background: #ddd6fe;"></button>
          <button class="color-btn" data-color="orange" onclick="StickyNotes.setDefaultColor('orange')" style="background: #fed7aa;"></button>
        </div>
        <div class="toolbar-right">
          <input type="text" id="searchInput" class="search-input" placeholder="노트 검색..." oninput="StickyNotes.search(this.value)" aria-label="노트 검색...">
          <button class="tool-btn" onclick="StickyNotes.clearAll()" aria-label="전체 삭제">전체 삭제</button>
        </div>
      </div>

      <!-- 노트 보드 -->
      <div class="notes-board" id="notesBoard">
        <!-- 노트들이 여기에 렌더링됩니다 -->
      </div>

      <!-- 빈 상태 -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon"></div>
        <div class="empty-text">노트가 없습니다</div>
        <div class="empty-hint">'새 노트' 버튼을 클릭하여 메모를 추가하세요</div>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">사용 팁</div>
        <div class="help-content">
          <ul>
            <li><strong>노트 추가</strong>: '새 노트' 버튼 클릭 또는 더블클릭으로 추가</li>
            <li><strong>노트 이동</strong>: 드래그하여 원하는 위치로 이동</li>
            <li><strong>색상 변경</strong>: 노트의 색상 버튼 클릭</li>
            <li><strong>자동 저장</strong>: 모든 변경사항은 자동으로 저장됩니다</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="sticky-notes.js"></script>
</body>
</html>
