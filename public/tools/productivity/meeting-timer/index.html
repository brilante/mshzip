<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회의 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .productivity-container { max-width: 600px; margin: 0 auto; }
    .productivity-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .timer-display { text-align: center; padding: 2rem; }
    .timer-time { font-size: 4rem; font-weight: 700; font-family: monospace; }
    .timer-label { font-size: 1rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .timer-controls { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
    .agenda-list { margin-top: 1.5rem; }
    .agenda-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .agenda-item.active { border-left: 4px solid var(--primary); background: rgba(99, 102, 241, 0.1); }
    .agenda-item.completed { opacity: 0.5; text-decoration: line-through; }
    .agenda-time { font-weight: 600; min-width: 60px; }
    .agenda-title { flex: 1; }
    .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; margin-top: 1rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">회의 타이머</h1>
          <p class="tool-description">효율적인 회의 시간 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="productivity-container">
      <div class="productivity-panel">
        <div class="timer-display">
          <div class="timer-time" id="timerDisplay">00:00:00</div>
          <div class="timer-label" id="timerLabel">회의 시작 전</div>
          <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width: 0%;"></div></div>
        </div>

        <div class="timer-controls">
          <button class="tool-btn tool-btn-primary" id="startBtn" onclick="MeetingTimer.start()" aria-label="시작">시작</button>
          <button class="tool-btn tool-btn-secondary" onclick="MeetingTimer.pause()" aria-label="일시정지">일시정지</button>
          <button class="tool-btn tool-btn-secondary" onclick="MeetingTimer.reset()" aria-label="초기화">초기화</button>
          <button class="tool-btn tool-btn-secondary" onclick="MeetingTimer.nextAgenda()" aria-label="다음 안건">다음 안건</button>
        </div>

        <div class="agenda-list" id="agendaList">
          <div style="font-weight: 600; margin-bottom: 0.75rem;">회의 안건</div>
          <div id="agendaItems"></div>
          <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
            <input type="text" id="newAgenda" class="tool-input" placeholder="안건 추가" style="flex: 1;" aria-label="안건 추가">
            <input type="number" id="newMinutes" class="tool-input" placeholder="분" style="width: 80px;" value="5" aria-label="분">
            <button class="tool-btn tool-btn-primary" onclick="MeetingTimer.addAgenda()" aria-label="추가">추가</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="meeting-timer.js"></script>
</body>
</html>
