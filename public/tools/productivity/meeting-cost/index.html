<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회의 비용 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="meeting-cost.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">회의 비용 계산기</h1>
      <p class="tool-description">회의에 드는 실제 비용을 계산해보세요</p>
    </header>

    <main class="tool-content">
      <div class="calculator-layout">
        <!-- 입력 영역 -->
        <div class="input-section">
          <div class="section-card">
            <h3 class="section-title">참석자</h3>
            <div class="attendees-list" id="attendeesList">
              <!-- 참석자 목록 -->
            </div>
            <button class="add-attendee-btn" onclick="MeetingCost.addAttendee()" aria-label="+ 참석자 추가">
              + 참석자 추가
            </button>
          </div>

          <div class="section-card">
            <h3 class="section-title">회의 시간</h3>
            <div class="time-input">
              <div class="time-group">
                <label>시간</label>
                <input type="number" id="meetingHours" class="form-input" value="1" min="0" max="24" onchange="MeetingCost.calculate()">
              </div>
              <div class="time-group">
                <label>분</label>
                <input type="number" id="meetingMinutes" class="form-input" value="0" min="0" max="59" onchange="MeetingCost.calculate()">
              </div>
            </div>
            <div class="quick-times">
              <button class="quick-time-btn" onclick="MeetingCost.setTime(0.5)" aria-label="30분">30분</button>
              <button class="quick-time-btn active" onclick="MeetingCost.setTime(1)" aria-label="1시간">1시간</button>
              <button class="quick-time-btn" onclick="MeetingCost.setTime(1.5)" aria-label="1.5시간">1.5시간</button>
              <button class="quick-time-btn" onclick="MeetingCost.setTime(2)" aria-label="2시간">2시간</button>
            </div>
          </div>

          <div class="section-card">
            <h3 class="section-title">추가 비용</h3>
            <div class="form-group">
              <label>회의실 비용 (시간당)</label>
              <div class="input-with-unit">
                <input type="number" id="roomCost" class="form-input" value="0" min="0" onchange="MeetingCost.calculate()">
                <span class="unit">원</span>
              </div>
            </div>
            <div class="form-group">
              <label>다과/식사 비용</label>
              <div class="input-with-unit">
                <input type="number" id="refreshmentCost" class="form-input" value="0" min="0" onchange="MeetingCost.calculate()">
                <span class="unit">원</span>
              </div>
            </div>
            <div class="form-group">
              <label>기타 비용</label>
              <div class="input-with-unit">
                <input type="number" id="otherCost" class="form-input" value="0" min="0" onchange="MeetingCost.calculate()">
                <span class="unit">원</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 결과 영역 -->
        <div class="result-section">
          <div class="total-cost-card">
            <div class="total-label">총 회의 비용</div>
            <div class="total-value" id="totalCost">₩0</div>
            <div class="total-subtext" id="costPerMinute">분당 ₩0</div>
          </div>

          <div class="cost-breakdown">
            <h3 class="breakdown-title">비용 분석</h3>
            <div class="breakdown-item">
              <span class="breakdown-label">인건비</span>
              <span class="breakdown-value" id="laborCost">₩0</span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">회의실</span>
              <span class="breakdown-value" id="roomCostResult">₩0</span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">다과/식사</span>
              <span class="breakdown-value" id="refreshmentCostResult">₩0</span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">기타</span>
              <span class="breakdown-value" id="otherCostResult">₩0</span>
            </div>
          </div>

          <div class="insights">
            <h3 class="insights-title">인사이트</h3>
            <div class="insight-item" id="insightItem">
              <!-- 동적으로 생성 -->
            </div>
          </div>

          <!-- 실시간 카운터 -->
          <div class="live-counter" id="liveCounter" style="display: none;">
            <div class="counter-label">실시간 비용</div>
            <div class="counter-value" id="liveValue">₩0</div>
            <div class="counter-elapsed" id="elapsedTime">00:00</div>
            <div class="counter-buttons">
              <button class="counter-btn start" id="startBtn" onclick="MeetingCost.startCounter()" aria-label="시작">시작</button>
              <button class="counter-btn stop" id="stopBtn" onclick="MeetingCost.stopCounter()" style="display: none;" aria-label="정지">정지</button>
              <button class="counter-btn reset" onclick="MeetingCost.resetCounter()" aria-label="↺ 초기화">↺ 초기화</button>
            </div>
          </div>
          <button class="toggle-counter-btn" onclick="MeetingCost.toggleCounter()" aria-label="실시간 카운터">
            실시간 카운터 <span id="counterToggleText">열기</span>
          </button>
        </div>
      </div>

      <!-- 도움말 -->
      <div class="tool-help">
        <div class="help-title">사용 팁</div>
        <div class="help-content">
          <ul>
            <li><strong>참석자 추가</strong>: 참석자별 시급(또는 예상 연봉)을 입력하세요</li>
            <li><strong>빠른 시간</strong>: 자주 사용하는 회의 시간을 빠르게 선택</li>
            <li><strong>실시간 카운터</strong>: 회의 중 실시간으로 비용을 확인</li>
            <li><strong>비용 절감</strong>: 불필요한 참석자를 줄이거나 회의 시간을 단축해보세요</li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="meeting-cost.js"></script>
</body>
</html>
