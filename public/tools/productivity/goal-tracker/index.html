<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목표 추적기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .productivity-container { max-width: 700px; margin: 0 auto; }
    .productivity-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .goal-card { background: var(--bg-primary); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .goal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .goal-title { font-weight: 700; font-size: 1.1rem; }
    .goal-category { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 4px; background: var(--bg-secondary); }
    .goal-progress { margin: 1rem 0; }
    .progress-bar { height: 12px; background: var(--bg-secondary); border-radius: 6px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
    .progress-text { display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 0.5rem; }
    .milestone-list { margin-top: 1rem; }
    .milestone-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0; font-size: 0.9rem; }
    .milestone-item.completed { color: var(--text-secondary); text-decoration: line-through; }
    .add-goal-form { background: var(--bg-primary); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">목표 추적기</h1>
          <p class="tool-description">목표 설정 및 진행률 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="productivity-container">
      <div class="productivity-panel">
        <div class="add-goal-form">
          <div style="font-weight: 600; margin-bottom: 1rem;">새 목표 추가</div>
          <input type="text" id="goalTitle" class="tool-input" placeholder="목표 제목" style="margin-bottom: 1rem;" aria-label="목표 제목">
          <div class="form-row">
            <select id="goalCategory" class="tool-input">
              <option value="career">커리어</option>
              <option value="health">건강</option>
              <option value="finance">재정</option>
              <option value="education">학습</option>
              <option value="personal">개인</option>
            </select>
            <input type="date" id="goalDeadline" class="tool-input">
          </div>
          <input type="text" id="goalMilestones" class="tool-input" placeholder="마일스톤 (쉼표로 구분)" style="margin-bottom: 1rem;" aria-label="마일스톤 (쉼표로 구분)">
          <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="GoalTracker.addGoal()" aria-label="목표 추가">목표 추가</button>
        </div>

        <div id="goalsList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="goal-tracker.js"></script>
</body>
</html>
