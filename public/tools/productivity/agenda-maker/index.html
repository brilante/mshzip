<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회의 안건 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .productivity-container { max-width: 700px; margin: 0 auto; }
    .productivity-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .input-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .agenda-preview { background: var(--bg-primary); border-radius: 8px; padding: 1.5rem; margin-top: 1.5rem; }
    .agenda-header { text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem; }
    .agenda-title { font-size: 1.25rem; font-weight: 700; }
    .agenda-meta { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .agenda-section { margin-bottom: 1rem; }
    .agenda-section-title { font-weight: 600; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .agenda-item { padding: 0.5rem 0; padding-left: 1.5rem; border-left: 2px solid var(--primary); margin-left: 0.5rem; }
    .time-badge { font-size: 0.75rem; background: var(--bg-secondary); padding: 0.25rem 0.5rem; border-radius: 4px; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">회의 안건 생성기</h1>
          <p class="tool-description">체계적인 회의 안건 작성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="productivity-container">
      <div class="productivity-panel">
        <div class="input-group">
          <label>회의 제목</label>
          <input type="text" id="meetingTitle" class="tool-input" placeholder="예: 2026년 1분기 마케팅 전략 회의" aria-label="예: 2026년 1분기 마케팅 전략 회의">
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>날짜</label>
            <input type="date" id="meetingDate" class="tool-input">
          </div>
          <div class="input-group">
            <label>시간</label>
            <input type="time" id="meetingTime" class="tool-input" value="14:00">
          </div>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>장소</label>
            <input type="text" id="meetingLocation" class="tool-input" placeholder="예: 회의실 A" aria-label="예: 회의실 A">
          </div>
          <div class="input-group">
            <label>총 시간 (분)</label>
            <input type="number" id="totalMinutes" class="tool-input" value="60">
          </div>
        </div>

        <div class="input-group">
          <label>참석자 (쉼표로 구분)</label>
          <input type="text" id="attendees" class="tool-input" placeholder="예: 홍길동, 김철수, 이영희" aria-label="예: 홍길동, 김철수, 이영희">
        </div>

        <div class="input-group">
          <label>회의 유형</label>
          <select id="meetingType" class="tool-input">
            <option value="regular">정기 회의</option>
            <option value="kickoff">프로젝트 킥오프</option>
            <option value="review">리뷰/회고</option>
            <option value="brainstorm">브레인스토밍</option>
            <option value="decision">의사결정</option>
          </select>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="AgendaMaker.generate()" aria-label="안건 생성">안건 생성</button>

        <div id="result"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="agenda-maker.js"></script>
</body>
</html>
