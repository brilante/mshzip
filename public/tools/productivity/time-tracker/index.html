<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간 추적기 - 생산성 도구</title>
    <link rel="stylesheet" href="time-tracker.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>시간 추적기</h1>
            <p>생산적인 시간을 측정하고 관리하세요</p>
        </header>

        <div class="timer-card">
            <div class="current-task">
                <input type="text" id="taskName" placeholder="작업명을 입력하세요" aria-label="작업명을 입력하세요">
                <select id="taskCategory">
                    <option value="work">업무</option>
                    <option value="study">학습</option>
                    <option value="project">프로젝트</option>
                    <option value="meeting">회의</option>
                    <option value="other">기타</option>
                </select>
            </div>
            <div class="timer-display">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
            </div>
            <div class="timer-controls">
                <button id="startBtn" class="btn-start" aria-label="시작">시작</button>
                <button id="pauseBtn" class="btn-pause" disabled aria-label="일시정지">일시정지</button>
                <button id="stopBtn" class="btn-stop" disabled aria-label="정지">정지</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-value" id="todayTotal">0h 0m</span>
                <span class="stat-label">오늘 총 시간</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="weekTotal">0h 0m</span>
                <span class="stat-label">이번 주</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="taskCount">0</span>
                <span class="stat-label">완료 작업</span>
            </div>
        </div>

        <div class="history-section">
            <h3>기록</h3>
            <div id="historyList"></div>
        </div>
    </div>
    <script src="time-tracker.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
