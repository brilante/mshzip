<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목표 설정기 - 생산성 도구</title>
    <link rel="stylesheet" href="goal-setter.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>목표 설정기</h1>
            <p>SMART 목표로 꿈을 현실로 만드세요</p>
        </header>

        <div class="goal-form card">
            <h3>새 목표 추가</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>목표 제목</label>
                    <input type="text" id="goalTitle" placeholder="예: 체중 10kg 감량" aria-label="예: 체중 10kg 감량">
                </div>
                <div class="form-group">
                    <label>카테고리</label>
                    <select id="goalCategory">
                        <option value="health">건강</option>
                        <option value="career">커리어</option>
                        <option value="finance">재정</option>
                        <option value="education">교육</option>
                        <option value="personal">개인</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>상세 설명</label>
                <textarea id="goalDesc" placeholder="목표에 대한 상세 설명"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>시작일</label>
                    <input type="date" id="startDate">
                </div>
                <div class="form-group">
                    <label>목표일</label>
                    <input type="date" id="endDate">
                </div>
            </div>
            <button id="addGoal" class="btn-add" aria-label="목표 추가">목표 추가</button>
        </div>

        <div class="goals-section">
            <div class="section-header">
                <h3>내 목표</h3>
                <select id="filterCategory">
                    <option value="">전체</option>
                    <option value="health">건강</option>
                    <option value="career">커리어</option>
                    <option value="finance">재정</option>
                    <option value="education">교육</option>
                    <option value="personal">개인</option>
                </select>
            </div>
            <div id="goalsList"></div>
        </div>
    </div>
    <script src="goal-setter.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
