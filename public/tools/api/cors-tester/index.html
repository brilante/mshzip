<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORS 테스터 | CORS Tester</title>
  <link rel="stylesheet" href="cors-tester.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>CORS 테스터</h1>
      <p>Cross-Origin Resource Sharing 설정을 테스트하세요</p>
    </header>

    <div class="main-content">
      <div class="input-section">
        <div class="input-group">
          <label>테스트할 URL</label>
          <input type="text" id="testUrl" placeholder="https://api.example.com/endpoint" value="https://jsonplaceholder.typicode.com/posts" aria-label="https://api.example.com/endpoint">
        </div>
        <div class="input-group">
          <label>요청 메서드</label>
          <select id="testMethod">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="OPTIONS">OPTIONS (Preflight)</option>
          </select>
        </div>
        <button onclick="testCORS()" aria-label="CORS 테스트">CORS 테스트</button>
      </div>

      <div class="result-section" id="resultSection">
        <div class="result-card">
          <div class="result-header">
            <span class="result-icon" id="resultIcon"></span>
            <span class="result-status" id="resultStatus">테스트 대기 중</span>
          </div>
          <div class="result-details" id="resultDetails">
            URL을 입력하고 테스트 버튼을 클릭하세요.
          </div>
        </div>

        <div class="headers-card">
          <h4>CORS 관련 헤더</h4>
          <div class="headers-list" id="headersList">
            <!-- 헤더 목록이 여기에 표시됩니다 -->
          </div>
        </div>
      </div>

      <div class="info-section">
        <h4>CORS 헤더 설명</h4>
        <div class="info-grid">
          <div class="info-item">
            <strong>Access-Control-Allow-Origin</strong>
            <p>허용된 출처 (도메인)</p>
          </div>
          <div class="info-item">
            <strong>Access-Control-Allow-Methods</strong>
            <p>허용된 HTTP 메서드</p>
          </div>
          <div class="info-item">
            <strong>Access-Control-Allow-Headers</strong>
            <p>허용된 요청 헤더</p>
          </div>
          <div class="info-item">
            <strong>Access-Control-Allow-Credentials</strong>
            <p>자격 증명 허용 여부</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="cors-tester.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
