<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAPI 편집기 | OpenAPI Editor</title>
  <link rel="stylesheet" href="openapi-editor.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header class="header">
      <h1>OpenAPI 편집기</h1>
      <p>Swagger/OpenAPI 스펙을 작성하고 검증하세요</p>
    </header>

    <div class="main-content">
      <div class="toolbar">
        <button onclick="loadTemplate('basic')" aria-label="기본 템플릿">기본 템플릿</button>
        <button onclick="loadTemplate('crud')" aria-label="CRUD API">CRUD API</button>
        <button onclick="validateSpec()" aria-label="검증">검증</button>
        <button onclick="downloadSpec()" aria-label="다운로드">다운로드</button>
      </div>

      <div class="editor-layout">
        <div class="editor-panel">
          <h3>OpenAPI Spec (YAML)</h3>
          <textarea id="specEditor" spellcheck="false">openapi: 3.0.3
info:
  title: My API
  description: API 설명
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /users:
    get:
      summary: 사용자 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: 사용자 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: 생성됨
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
    UserInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string</textarea>
        </div>

        <div class="preview-panel">
          <h3>미리보기</h3>
          <div class="preview-content" id="previewContent">
            <!-- 미리보기가 여기에 표시됩니다 -->
          </div>
        </div>
      </div>

      <div class="validation-result" id="validationResult"></div>
    </div>
  </div>
  <script src="openapi-editor.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
