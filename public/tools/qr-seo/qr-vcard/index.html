<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명함 QR 코드 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    .qr-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px;
      background: white;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .qr-preview canvas {
      border-radius: 8px;
    }
    .vcard-info {
      margin-top: 16px;
      text-align: center;
      color: #333;
    }
    .vcard-info .name {
      font-size: 18px;
      font-weight: 700;
    }
    .vcard-info .title {
      font-size: 13px;
      color: #666;
    }
    .form-grid {
      display: grid;
      gap: 16px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-field label {
      font-size: 14px;
      color: var(--tools-text-secondary);
    }
    .form-field.full-width {
      grid-column: 1 / -1;
    }
    .qr-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    .color-option {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .color-option input[type="color"] {
      width: 40px;
      height: 32px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .section-divider {
      border-top: 1px solid var(--tools-border);
      margin: 20px 0;
      padding-top: 20px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tools-text-secondary);
      margin-bottom: 16px;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">명함 QR 코드 생성기</h1>
          <p class="tool-description">vCard 형식의 명함 QR 코드 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- QR 미리보기 -->
    <div class="input-panel">
      <div class="panel-title">QR 코드</div>
      <div class="qr-preview" id="qrPreview">
        <canvas id="qrCanvas"></canvas>
        <div class="vcard-info" id="vcardInfo">
          <div class="name">이름</div>
          <div class="title">직함</div>
        </div>
      </div>
      <div class="tool-actions">
        <button class="tool-btn tool-btn-primary" onclick="QRVCard.download()" aria-label="다운로드">다운로드</button>
        <button class="tool-btn tool-btn-secondary" onclick="QRVCard.downloadVCard()" aria-label="vCard 저장">vCard 저장</button>
      </div>
    </div>

    <!-- 개인 정보 -->
    <div class="input-panel">
      <div class="panel-title">개인 정보</div>
      <div class="form-grid">
        <div class="form-row">
          <div class="form-field">
            <label>성 *</label>
            <input type="text" id="lastName" class="tool-input" placeholder="홍"
                   oninput="QRVCard.generate()" aria-label="홍">
          </div>
          <div class="form-field">
            <label>이름 *</label>
            <input type="text" id="firstName" class="tool-input" placeholder="길동"
                   oninput="QRVCard.generate()" aria-label="길동">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>회사</label>
            <input type="text" id="company" class="tool-input" placeholder="(주) 회사명"
                   oninput="QRVCard.generate()" aria-label="(주) 회사명">
          </div>
          <div class="form-field">
            <label>직함</label>
            <input type="text" id="title" class="tool-input" placeholder="대표이사"
                   oninput="QRVCard.generate()" aria-label="대표이사">
          </div>
        </div>

        <div class="section-divider">
          <div class="section-title">연락처</div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>휴대전화</label>
            <input type="tel" id="mobile" class="tool-input" placeholder="010-1234-5678"
                   oninput="QRVCard.generate()" aria-label="010-1234-5678">
          </div>
          <div class="form-field">
            <label>직장 전화</label>
            <input type="tel" id="workPhone" class="tool-input" placeholder="02-1234-5678"
                   oninput="QRVCard.generate()" aria-label="02-1234-5678">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>이메일</label>
            <input type="email" id="email" class="tool-input" placeholder="email@example.com"
                   oninput="QRVCard.generate()" aria-label="email@example.com">
          </div>
          <div class="form-field">
            <label>웹사이트</label>
            <input type="url" id="website" class="tool-input" placeholder="https://example.com"
                   oninput="QRVCard.generate()" aria-label="https://example.com">
          </div>
        </div>

        <div class="section-divider">
          <div class="section-title">주소</div>
        </div>

        <div class="form-field full-width">
          <label>주소</label>
          <input type="text" id="address" class="tool-input" placeholder="서울시 강남구 테헤란로 123"
                 oninput="QRVCard.generate()" aria-label="서울시 강남구 테헤란로 123">
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>우편번호</label>
            <input type="text" id="postalCode" class="tool-input" placeholder="06000"
                   oninput="QRVCard.generate()" aria-label="06000">
          </div>
          <div class="form-field">
            <label>국가</label>
            <input type="text" id="country" class="tool-input" placeholder="대한민국" value="대한민국"
                   oninput="QRVCard.generate()" aria-label="대한민국">
          </div>
        </div>

        <div class="section-divider">
          <div class="section-title">추가 정보</div>
        </div>

        <div class="form-field full-width">
          <label>메모</label>
          <textarea id="note" class="tool-textarea" rows="2" placeholder="추가 정보..."
                    oninput="QRVCard.generate()"></textarea>
        </div>
      </div>
    </div>

    <!-- QR 옵션 -->
    <div class="input-panel">
      <div class="panel-title">QR 코드 옵션</div>
      <div class="qr-options">
        <div class="form-field">
          <label>크기</label>
          <select id="qrSize" class="tool-input" onchange="QRVCard.generate()">
            <option value="128">128 x 128</option>
            <option value="256" selected>256 x 256</option>
            <option value="512">512 x 512</option>
          </select>
        </div>
        <div class="form-field">
          <label>오류 정정</label>
          <select id="errorLevel" class="tool-input" onchange="QRVCard.generate()">
            <option value="L">낮음 (L)</option>
            <option value="M" selected>중간 (M)</option>
            <option value="Q">높음 (Q)</option>
            <option value="H">최고 (H)</option>
          </select>
        </div>
        <div class="color-option">
          <label>전경색</label>
          <input type="color" id="fgColor" value="#000000" onchange="QRVCard.generate()">
        </div>
        <div class="color-option">
          <label>배경색</label>
          <input type="color" id="bgColor" value="#ffffff" onchange="QRVCard.generate()">
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="qr-vcard.js"></script>
</body>
</html>
