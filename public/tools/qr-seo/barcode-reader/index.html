<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바코드 읽기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
  <style>
    .reader-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.3s; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .upload-zone:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
    .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
    .preview-image { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 1rem; }
    .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .result-title { font-weight: 600; margin-bottom: 1rem; }
    .result-content { background: var(--bg-primary); border-radius: 8px; padding: 1rem; min-height: 100px; word-break: break-all; font-family: monospace; font-size: 1.2rem; }
    .result-format { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .camera-section { margin-top: 1.5rem; }
    #cameraContainer { position: relative; width: 100%; max-height: 300px; overflow: hidden; border-radius: 8px; background: #000; display: none; }
    #cameraContainer video, #cameraContainer canvas { width: 100%; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .history-section { margin-top: 1.5rem; }
    .history-item { display: flex; justify-content: space-between; padding: 0.5rem; background: var(--bg-primary); border-radius: 4px; margin-bottom: 0.5rem; font-size: 0.85rem; }
    @media (max-width: 768px) { .reader-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">바코드 읽기</h1>
          <p class="tool-description">이미지 또는 카메라로 바코드 스캔</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="reader-layout">
      <div>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" hidden onchange="BarcodeReader.handleFile(this)">
          <div class="upload-icon"></div>
          <div>바코드 이미지를 클릭하여 업로드</div>
          <img id="previewImage" class="preview-image" style="display:none">
        </div>

        <div class="camera-section">
          <button class="tool-btn tool-btn-primary" onclick="BarcodeReader.toggleCamera()" id="cameraBtn" aria-label="카메라 스캔">카메라 스캔</button>
          <div id="cameraContainer"></div>
        </div>
      </div>

      <div class="result-panel">
        <div class="result-title">스캔 결과</div>
        <div class="result-content" id="resultContent">바코드를 스캔하세요</div>
        <div class="result-format" id="resultFormat">형식: -</div>
        <div class="btn-row">
          <button class="tool-btn tool-btn-secondary" onclick="BarcodeReader.copyResult()" aria-label="복사">복사</button>
          <button class="tool-btn tool-btn-secondary" onclick="BarcodeReader.clear()" aria-label="초기화">초기화</button>
        </div>

        <div class="history-section">
          <div class="result-title">스캔 기록</div>
          <div id="historyList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="barcode-reader.js"></script>
</body>
</html>
