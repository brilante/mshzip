<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바코드 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <style>
    .barcode-layout { display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; }
    .controls-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .control-group input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; }
    .preview-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .barcode-preview { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    #barcodeCanvas { display: block; max-width: 100%; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
    .format-info { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; padding: 0.5rem; background: var(--bg-primary); border-radius: 4px; }
    @media (max-width: 768px) { .barcode-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">바코드 생성기</h1>
          <p class="tool-description">다양한 형식의 바코드 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="barcode-layout">
      <div class="controls-panel">
        <div class="section-title">바코드 형식</div>
        <div class="control-group">
          <label>형식</label>
          <select id="barcodeFormat" class="tool-select" onchange="BarcodeGen.updateInfo(); BarcodeGen.generate()">
            <option value="CODE128">CODE128 (범용)</option>
            <option value="EAN13">EAN-13 (상품)</option>
            <option value="EAN8">EAN-8 (소형 상품)</option>
            <option value="UPC">UPC-A (미국 상품)</option>
            <option value="CODE39">CODE39 (산업용)</option>
            <option value="ITF14">ITF-14 (물류)</option>
            <option value="MSI">MSI (재고관리)</option>
            <option value="pharmacode">Pharmacode (제약)</option>
          </select>
          <div class="format-info" id="formatInfo">범용 바코드, 숫자와 문자 모두 지원</div>
        </div>

        <div class="section-title">데이터</div>
        <div class="control-group">
          <label>바코드 값</label>
          <input type="text" id="barcodeData" class="tool-input" value="1234567890" oninput="BarcodeGen.generate()">
        </div>

        <div class="section-title">스타일</div>
        <div class="color-row">
          <div class="control-group">
            <label>바코드 색상</label>
            <input type="color" id="lineColor" value="#000000" onchange="BarcodeGen.generate()">
          </div>
          <div class="control-group">
            <label>배경색</label>
            <input type="color" id="bgColor" value="#ffffff" onchange="BarcodeGen.generate()">
          </div>
        </div>

        <div class="control-group">
          <label>너비: <span id="widthValue">2</span></label>
          <input type="range" id="barWidth" min="1" max="4" value="2" oninput="document.getElementById('widthValue').textContent=this.value; BarcodeGen.generate()">
        </div>

        <div class="control-group">
          <label>높이: <span id="heightValue">100</span>px</label>
          <input type="range" id="barHeight" min="50" max="200" value="100" oninput="document.getElementById('heightValue').textContent=this.value; BarcodeGen.generate()">
        </div>

        <div class="control-group">
          <label><input type="checkbox" id="showText" checked onchange="BarcodeGen.generate()"> 숫자 표시</label>
        </div>
      </div>

      <div class="preview-panel">
        <div class="barcode-preview">
          <svg id="barcodeCanvas"></svg>
        </div>
        <div id="errorMessage" style="color: var(--tools-error); margin-top: 1rem; display: none;"></div>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" onclick="BarcodeGen.download('png')" aria-label="PNG 다운로드">PNG 다운로드</button>
          <button class="tool-btn tool-btn-secondary" onclick="BarcodeGen.download('svg')" aria-label="SVG 다운로드">SVG 다운로드</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="barcode-generate.js"></script>
</body>
</html>
