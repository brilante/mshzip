<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맞춤형 QR 코드 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    .qr-layout { display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; }
    .controls-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-primary); }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .control-group input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; }
    .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .logo-upload { border: 2px dashed var(--border-color); border-radius: 8px; padding: 1rem; text-align: center; cursor: pointer; }
    .logo-upload:hover { border-color: var(--primary); }
    .logo-preview { max-width: 60px; max-height: 60px; margin-top: 0.5rem; border-radius: 4px; }
    .preview-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .qr-preview { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    #qrCanvas { display: block; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
    @media (max-width: 768px) { .qr-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">맞춤형 QR 코드</h1>
          <p class="tool-description">로고와 색상을 적용한 커스텀 QR 코드</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="qr-layout">
      <div class="controls-panel">
        <div class="section-title">콘텐츠</div>
        <div class="control-group">
          <label>데이터 (URL, 텍스트 등)</label>
          <textarea id="qrData" class="tool-input" rows="3" placeholder="https://example.com" oninput="QrCustom.generate()">https://example.com</textarea>
        </div>

        <div class="section-title">색상</div>
        <div class="color-row">
          <div class="control-group">
            <label>QR 색상</label>
            <input type="color" id="fgColor" value="#000000" onchange="QrCustom.generate()">
          </div>
          <div class="control-group">
            <label>배경색</label>
            <input type="color" id="bgColor" value="#ffffff" onchange="QrCustom.generate()">
          </div>
        </div>

        <div class="section-title">크기</div>
        <div class="control-group">
          <label>QR 코드 크기</label>
          <select id="qrSize" class="tool-select" onchange="QrCustom.generate()">
            <option value="200">200 x 200</option>
            <option value="300" selected>300 x 300</option>
            <option value="400">400 x 400</option>
            <option value="500">500 x 500</option>
          </select>
        </div>

        <div class="control-group">
          <label>오류 수정 레벨</label>
          <select id="errorLevel" class="tool-select" onchange="QrCustom.generate()">
            <option value="L">L (7%)</option>
            <option value="M" selected>M (15%)</option>
            <option value="Q">Q (25%)</option>
            <option value="H">H (30%) - 로고용</option>
          </select>
        </div>

        <div class="section-title">로고 (선택)</div>
        <div class="logo-upload" onclick="document.getElementById('logoInput').click()">
          <input type="file" id="logoInput" accept="image/*" hidden onchange="QrCustom.loadLogo(this)">
          <div>로고 이미지 업로드</div>
          <img id="logoPreview" class="logo-preview" style="display:none">
        </div>
        <div class="control-group" style="margin-top: 0.5rem">
          <label>로고 크기: <span id="logoSizeValue">20</span>%</label>
          <input type="range" id="logoSize" min="10" max="30" value="20" oninput="document.getElementById('logoSizeValue').textContent=this.value; QrCustom.generate()">
        </div>
        <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="QrCustom.removeLogo()" aria-label="로고 제거">로고 제거</button>
      </div>

      <div class="preview-panel">
        <div class="qr-preview">
          <canvas id="qrCanvas"></canvas>
        </div>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" onclick="QrCustom.download('png')" aria-label="PNG 다운로드">PNG 다운로드</button>
          <button class="tool-btn tool-btn-secondary" onclick="QrCustom.download('svg')" aria-label="SVG 다운로드">SVG 다운로드</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="qr-custom.js"></script>
</body>
</html>
