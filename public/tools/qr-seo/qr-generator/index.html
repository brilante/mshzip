<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 코드 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="qr-generator.css">
  <!-- QRCode.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">QR 코드 생성기</h1>
      <p class="tool-description">텍스트, URL, WiFi 등 다양한 QR 코드를 생성합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <div class="qr-layout">
          <!-- 입력 섹션 -->
          <div class="input-section">
            <!-- 타입 선택 -->
            <div class="type-tabs">
              <button class="type-tab active" data-type="text" onclick="QRGenerator.setType('text')" aria-label="텍스트/URL">텍스트/URL</button>
              <button class="type-tab" data-type="wifi" onclick="QRGenerator.setType('wifi')" aria-label="WiFi">WiFi</button>
              <button class="type-tab" data-type="vcard" onclick="QRGenerator.setType('vcard')" aria-label="연락처">연락처</button>
              <button class="type-tab" data-type="email" onclick="QRGenerator.setType('email')" aria-label="이메일">이메일</button>
            </div>

            <!-- 텍스트/URL 입력 -->
            <div id="textInput" class="input-form">
              <div class="form-group">
                <label class="form-label">텍스트 또는 URL</label>
                <textarea id="textContent" class="form-textarea" placeholder="QR 코드로 변환할 텍스트 또는 URL을 입력하세요..." oninput="QRGenerator.generate()"></textarea>
              </div>
            </div>

            <!-- WiFi 입력 -->
            <div id="wifiInput" class="input-form" style="display: none;">
              <div class="form-group">
                <label class="form-label">네트워크 이름 (SSID)</label>
                <input type="text" id="wifiSsid" class="form-input" placeholder="WiFi 이름" oninput="QRGenerator.generate()" aria-label="WiFi 이름">
              </div>
              <div class="form-group">
                <label class="form-label">비밀번호</label>
                <input type="password" id="wifiPassword" class="form-input" placeholder="WiFi 비밀번호" oninput="QRGenerator.generate()" aria-label="WiFi 비밀번호">
              </div>
              <div class="form-group">
                <label class="form-label">암호화 방식</label>
                <select id="wifiEncryption" class="form-select" onchange="QRGenerator.generate()">
                  <option value="WPA">WPA/WPA2</option>
                  <option value="WEP">WEP</option>
                  <option value="nopass">암호 없음</option>
                </select>
              </div>
            </div>

            <!-- 연락처 입력 -->
            <div id="vcardInput" class="input-form" style="display: none;">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">이름</label>
                  <input type="text" id="vcardName" class="form-input" placeholder="홍길동" oninput="QRGenerator.generate()" aria-label="홍길동">
                </div>
                <div class="form-group">
                  <label class="form-label">전화번호</label>
                  <input type="tel" id="vcardPhone" class="form-input" placeholder="010-1234-5678" oninput="QRGenerator.generate()" aria-label="010-1234-5678">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">이메일</label>
                <input type="email" id="vcardEmail" class="form-input" placeholder="email@example.com" oninput="QRGenerator.generate()" aria-label="email@example.com">
              </div>
              <div class="form-group">
                <label class="form-label">회사</label>
                <input type="text" id="vcardOrg" class="form-input" placeholder="회사명" oninput="QRGenerator.generate()" aria-label="회사명">
              </div>
            </div>

            <!-- 이메일 입력 -->
            <div id="emailInput" class="input-form" style="display: none;">
              <div class="form-group">
                <label class="form-label">받는 사람</label>
                <input type="email" id="emailTo" class="form-input" placeholder="recipient@example.com" oninput="QRGenerator.generate()" aria-label="recipient@example.com">
              </div>
              <div class="form-group">
                <label class="form-label">제목</label>
                <input type="text" id="emailSubject" class="form-input" placeholder="이메일 제목" oninput="QRGenerator.generate()" aria-label="이메일 제목">
              </div>
              <div class="form-group">
                <label class="form-label">내용</label>
                <textarea id="emailBody" class="form-textarea small" placeholder="이메일 내용" oninput="QRGenerator.generate()"></textarea>
              </div>
            </div>

            <!-- 옵션 -->
            <div class="options-section">
              <div class="section-title">스타일 옵션</div>
              <div class="options-grid">
                <div class="form-group">
                  <label class="form-label">크기</label>
                  <select id="qrSize" class="form-select" onchange="QRGenerator.generate()">
                    <option value="128">128 x 128</option>
                    <option value="200" selected>200 x 200</option>
                    <option value="256">256 x 256</option>
                    <option value="300">300 x 300</option>
                    <option value="400">400 x 400</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">전경색</label>
                  <input type="color" id="qrFgColor" class="form-color" value="#000000" onchange="QRGenerator.generate()">
                </div>
                <div class="form-group">
                  <label class="form-label">배경색</label>
                  <input type="color" id="qrBgColor" class="form-color" value="#ffffff" onchange="QRGenerator.generate()">
                </div>
              </div>
            </div>
          </div>

          <!-- 미리보기 섹션 -->
          <div class="preview-section">
            <div class="preview-card">
              <div class="preview-title">미리보기</div>
              <div id="qrPreview" class="qr-preview">
                <div class="qr-placeholder">
                  <span></span>
                  <p>텍스트를 입력하면<br>QR 코드가 생성됩니다</p>
                </div>
              </div>
              <div class="preview-actions">
                <button class="tool-btn tool-btn-primary" onclick="QRGenerator.download('png')" aria-label="PNG 다운로드">PNG 다운로드</button>
                <button class="tool-btn tool-btn-secondary" onclick="QRGenerator.download('svg')" aria-label="SVG 다운로드">SVG 다운로드</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">사용 팁</div>
          <div class="help-content">
            <p>• URL을 입력하면 웹사이트로 바로 연결되는 QR 코드가 생성됩니다</p>
            <p>• WiFi QR 코드는 스마트폰으로 스캔하면 자동으로 WiFi에 연결됩니다</p>
            <p>• 연락처 QR 코드는 스캔 시 주소록에 바로 저장할 수 있습니다</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="qr-generator.js"></script>
</body>
</html>
