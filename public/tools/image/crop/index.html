<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 자르기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .crop-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    .ratio-btn {
      padding: 10px 20px;
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ratio-btn:hover,
    .ratio-btn.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .crop-inputs {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 16px 0;
      padding: 16px;
      background: var(--tools-card-bg);
      border-radius: 8px;
    }
    .crop-input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .crop-input-group label {
      font-size: 14px;
      color: var(--tools-text);
    }
    .crop-input-group input {
      width: 80px;
      padding: 6px 10px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 4px;
      color: var(--tools-text);
      text-align: center;
    }
    .canvas-container {
      position: relative;
      display: flex;
      justify-content: center;
      margin: 20px 0;
      padding: 20px;
      background: var(--tools-card-bg);
      border-radius: 8px;
      overflow: auto;
    }
    #cropCanvas {
      max-width: 100%;
      cursor: crosshair;
      border: 1px solid var(--tools-border);
    }
    .preview-section {
      text-align: center;
      margin-top: 20px;
    }
    .preview-label {
      font-size: 14px;
      color: var(--tools-text-secondary);
      margin-bottom: 8px;
    }
    .preview-image {
      max-width: 300px;
      max-height: 300px;
      margin: 0 auto;
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      padding: 8px;
    }
    .preview-image img {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
    }
    .preview-info {
      font-size: 12px;
      color: var(--tools-text-secondary);
      margin-top: 8px;
    }
    .upload-dropzone {
      border: 2px dashed var(--tools-border);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--tools-card-bg);
    }
    .upload-dropzone:hover,
    .upload-dropzone.dragover {
      border-color: var(--tools-primary);
      background: rgba(59, 130, 246, 0.05);
    }
    .dropzone-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .dropzone-text {
      font-size: 16px;
      color: var(--tools-text);
      margin-bottom: 8px;
    }
    .dropzone-hint {
      font-size: 13px;
      color: var(--tools-text-secondary);
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .crop-hint {
      text-align: center;
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이미지 자르기</h1>
          <p class="tool-description">이미지의 원하는 영역을 선택하여 자르기</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()">← 뒤로</button>
      </div>
    </div>
    <script>
      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 파일 업로드 -->
      <div class="upload-section" id="uploadSection">
        <div class="upload-dropzone" id="dropzone">
          <div class="dropzone-icon"></div>
          <div class="dropzone-text">이미지를 드래그하거나 클릭하여 선택</div>
          <div class="dropzone-hint">PNG, JPG, WebP, GIF 지원</div>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>

      <!-- 자르기 컨트롤 -->
      <div id="controlSection" style="display: none;">
        <!-- 비율 선택 -->
        <div class="crop-controls">
          <button class="ratio-btn active" data-ratio="free" onclick="ImageCrop.setRatio('free')">
            자유 비율
          </button>
          <button class="ratio-btn" data-ratio="1:1" onclick="ImageCrop.setRatio('1:1')">
            1:1 (정사각형)
          </button>
          <button class="ratio-btn" data-ratio="4:3" onclick="ImageCrop.setRatio('4:3')">
            4:3
          </button>
          <button class="ratio-btn" data-ratio="16:9" onclick="ImageCrop.setRatio('16:9')">
            16:9
          </button>
          <button class="ratio-btn" data-ratio="3:2" onclick="ImageCrop.setRatio('3:2')">
            3:2
          </button>
        </div>

        <!-- 직접 입력 -->
        <div class="crop-inputs">
          <div class="crop-input-group">
            <label>X:</label>
            <input type="number" id="cropX" value="0" min="0" onchange="ImageCrop.updateFromInputs()">
          </div>
          <div class="crop-input-group">
            <label>Y:</label>
            <input type="number" id="cropY" value="0" min="0" onchange="ImageCrop.updateFromInputs()">
          </div>
          <div class="crop-input-group">
            <label>너비:</label>
            <input type="number" id="cropW" value="100" min="1" onchange="ImageCrop.updateFromInputs()">
          </div>
          <div class="crop-input-group">
            <label>높이:</label>
            <input type="number" id="cropH" value="100" min="1" onchange="ImageCrop.updateFromInputs()">
          </div>
        </div>

        <!-- 캔버스 -->
        <div class="crop-hint">마우스로 드래그하여 자를 영역을 선택하세요</div>
        <div class="canvas-container">
          <canvas id="cropCanvas"></canvas>
        </div>

        <!-- 미리보기 -->
        <div class="preview-section">
          <div class="preview-label">자르기 미리보기</div>
          <div class="preview-image">
            <img id="previewImage" src="" alt="미리보기">
          </div>
          <div class="preview-info" id="previewInfo"></div>
        </div>

        <!-- 액션 버튼 -->
        <div class="action-buttons">
          <button class="tool-btn tool-btn-primary" onclick="ImageCrop.crop()">
            자르기
          </button>
          <button class="tool-btn tool-btn-primary" onclick="ImageCrop.download()">
            다운로드
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="ImageCrop.resetSelection()">
            ↩선택 초기화
          </button>
          <button class="tool-btn tool-btn-danger" onclick="ImageCrop.clear()">
            새 이미지
          </button>
        </div>
      </div>
    </div>

    <!-- 도움말 -->
    <div class="tool-help">
      <div class="help-title">이미지 자르기 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>드래그</strong>: 이미지 위에서 마우스를 드래그하여 영역 선택</li>
          <li><strong>비율 선택</strong>: 원하는 비율 버튼을 클릭하여 고정 비율 적용</li>
          <li><strong>직접 입력</strong>: X, Y, 너비, 높이를 직접 입력하여 정확한 자르기</li>
          <li>자르기 버튼을 눌러 선택한 영역만 추출</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="image-crop.js"></script>
</body>
</html>
