<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 리사이즈 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="image-resize.css">
</head>
<body>
  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이미지 리사이즈</h1>
          <p class="tool-description">이미지 크기를 원하는 사이즈로 조절</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()">← 뒤로</button>
      </div>
    </div>
    <script>
      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel image-panel">
      <!-- 업로드 -->
      <div class="upload-section">
        <div class="upload-dropzone" id="dropzone">
          <div class="dropzone-icon"></div>
          <div class="dropzone-text">이미지를 드래그하거나 클릭하여 선택</div>
          <div class="dropzone-hint">PNG, JPG, WebP, GIF 지원</div>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>

      <!-- 설정 -->
      <div class="settings-section" id="settingsSection" style="display: none;">
        <div class="section-title">리사이즈 설정</div>
        <div class="original-size" id="originalSize"></div>
        <div class="size-inputs">
          <div class="size-input-group">
            <label>너비</label>
            <input type="number" id="widthInput" min="1" max="10000" placeholder="너비">
            <span>px</span>
          </div>
          <div class="size-link" id="sizeLink" title="비율 유지"></div>
          <div class="size-input-group">
            <label>높이</label>
            <input type="number" id="heightInput" min="1" max="10000" placeholder="높이">
            <span>px</span>
          </div>
        </div>
        <div class="preset-sizes">
          <button class="preset-btn" data-size="1920">1920px</button>
          <button class="preset-btn" data-size="1280">1280px</button>
          <button class="preset-btn" data-size="800">800px</button>
          <button class="preset-btn" data-size="640">640px</button>
          <button class="preset-btn" data-size="50%">50%</button>
          <button class="preset-btn" data-size="25%">25%</button>
        </div>
        <button class="tool-btn tool-btn-primary resize-btn" onclick="ImageResize.resize()">
          리사이즈
        </button>
      </div>

      <!-- 결과 -->
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="section-header">
          <div class="section-title">리사이즈 결과</div>
          <button class="tool-btn tool-btn-sm tool-btn-danger" onclick="ImageResize.clear()">초기화</button>
        </div>
        <div class="comparison-view">
          <div class="compare-item">
            <div class="compare-label">원본</div>
            <div class="compare-image"><img id="originalImage" src="" alt="원본"></div>
            <div class="compare-info" id="originalInfo"></div>
          </div>
          <div class="compare-arrow">→</div>
          <div class="compare-item">
            <div class="compare-label">리사이즈</div>
            <div class="compare-image"><img id="resizedImage" src="" alt="리사이즈"></div>
            <div class="compare-info" id="resizedInfo"></div>
          </div>
        </div>
        <div class="download-actions">
          <button class="tool-btn tool-btn-primary" onclick="ImageResize.download()">다운로드</button>
        </div>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">리사이즈 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>비율 유지</strong>: 아이콘 클릭으로 가로세로 비율 고정/해제</li>
          <li><strong>프리셋</strong>: 자주 사용하는 크기로 빠르게 설정</li>
          <li><strong>퍼센트</strong>: 50%, 25%로 원본 대비 축소</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="image-resize.js"></script>
</body>
</html>
