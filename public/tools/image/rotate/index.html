<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 회전 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .rotate-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    .rotate-btn {
      padding: 12px 24px;
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rotate-btn:hover {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .rotate-btn.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .custom-angle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
    }
    .custom-angle input {
      width: 80px;
      padding: 6px 10px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 4px;
      color: var(--tools-text);
      text-align: center;
    }
    .preview-container {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .preview-box {
      text-align: center;
    }
    .preview-label {
      font-size: 14px;
      color: var(--tools-text-secondary);
      margin-bottom: 8px;
    }
    .preview-image {
      max-width: 400px;
      max-height: 400px;
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-image img {
      max-width: 100%;
      max-height: 380px;
      object-fit: contain;
    }
    .preview-info {
      font-size: 12px;
      color: var(--tools-text-secondary);
      margin-top: 8px;
    }
    .upload-dropzone {
      border: 2px dashed var(--tools-border);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--tools-card-bg);
    }
    .upload-dropzone:hover,
    .upload-dropzone.dragover {
      border-color: var(--tools-primary);
      background: rgba(59, 130, 246, 0.05);
    }
    .dropzone-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .dropzone-text {
      font-size: 16px;
      color: var(--tools-text);
      margin-bottom: 8px;
    }
    .dropzone-hint {
      font-size: 13px;
      color: var(--tools-text-secondary);
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이미지 회전</h1>
          <p class="tool-description">이미지를 원하는 각도로 회전</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()">← 뒤로</button>
      </div>
    </div>
    <script>
      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 파일 업로드 -->
      <div class="upload-section" id="uploadSection">
        <div class="upload-dropzone" id="dropzone">
          <div class="dropzone-icon"></div>
          <div class="dropzone-text">이미지를 드래그하거나 클릭하여 선택</div>
          <div class="dropzone-hint">PNG, JPG, WebP, GIF 지원</div>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>

      <!-- 회전 컨트롤 -->
      <div id="controlSection" style="display: none;">
        <div class="rotate-controls">
          <button class="rotate-btn" onclick="ImageRotate.rotate(-90)">
            ↺ 90° 왼쪽
          </button>
          <button class="rotate-btn" onclick="ImageRotate.rotate(90)">
            ↻ 90° 오른쪽
          </button>
          <button class="rotate-btn" onclick="ImageRotate.rotate(180)">
            ↕ 180°
          </button>
          <div class="custom-angle">
            <span>직접 입력:</span>
            <input type="number" id="customAngle" value="0" min="-360" max="360" step="1">
            <span>°</span>
            <button class="rotate-btn" onclick="ImageRotate.applyCustomAngle()">적용</button>
          </div>
        </div>

        <!-- 미리보기 -->
        <div class="preview-container">
          <div class="preview-box">
            <div class="preview-label">원본</div>
            <div class="preview-image">
              <img id="originalImage" src="" alt="원본">
            </div>
            <div class="preview-info" id="originalInfo"></div>
          </div>
          <div class="preview-box">
            <div class="preview-label">회전 결과 (현재: <span id="currentAngle">0</span>°)</div>
            <div class="preview-image">
              <img id="rotatedImage" src="" alt="회전">
            </div>
            <div class="preview-info" id="rotatedInfo"></div>
          </div>
        </div>

        <!-- 액션 버튼 -->
        <div class="action-buttons">
          <button class="tool-btn tool-btn-primary" onclick="ImageRotate.download()">
            다운로드
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="ImageRotate.reset()">
            ↩초기화
          </button>
          <button class="tool-btn tool-btn-danger" onclick="ImageRotate.clear()">
            새 이미지
          </button>
        </div>
      </div>
    </div>

    <!-- 도움말 -->
    <div class="tool-help">
      <div class="help-title">이미지 회전 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>90° 회전</strong>: 왼쪽 또는 오른쪽으로 90도 회전</li>
          <li><strong>180° 회전</strong>: 상하 반전 효과</li>
          <li><strong>직접 입력</strong>: -360° ~ 360° 범위에서 자유롭게 회전</li>
          <li>회전은 누적됩니다. 초기화 버튼으로 원본 상태로 복원 가능</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="image-rotate.js"></script>
</body>
</html>
