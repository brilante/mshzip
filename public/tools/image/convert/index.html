<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 포맷 변환 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="image-convert.css">
</head>
<body>
  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이미지 포맷 변환</h1>
          <p class="tool-description">PNG, JPG, WebP 간 이미지 포맷 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()">← 뒤로</button>
      </div>
    </div>
    <script>
      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel image-panel">
      <!-- 업로드 -->
      <div class="upload-section">
        <div class="upload-dropzone" id="dropzone">
          <div class="dropzone-icon"></div>
          <div class="dropzone-text">이미지를 드래그하거나 클릭하여 선택</div>
          <div class="dropzone-hint">PNG, JPG, WebP, GIF, BMP 지원</div>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>

      <!-- 설정 -->
      <div class="settings-section" id="settingsSection" style="display: none;">
        <div class="section-title">변환 설정</div>
        <div class="original-info" id="originalInfo"></div>

        <div class="format-selector">
          <label class="format-label">변환할 포맷 선택</label>
          <div class="format-options">
            <button class="format-btn" data-format="png">
              <span class="format-icon"></span>
              <span class="format-name">PNG</span>
              <span class="format-desc">무손실, 투명 지원</span>
            </button>
            <button class="format-btn" data-format="jpeg">
              <span class="format-icon"></span>
              <span class="format-name">JPG</span>
              <span class="format-desc">작은 용량, 사진용</span>
            </button>
            <button class="format-btn" data-format="webp">
              <span class="format-icon"></span>
              <span class="format-name">WebP</span>
              <span class="format-desc">최신 포맷, 고효율</span>
            </button>
          </div>
        </div>

        <div class="quality-setting" id="qualitySetting" style="display: none;">
          <label class="quality-label">품질: <span id="qualityValue">92</span>%</label>
          <input type="range" id="qualitySlider" min="10" max="100" value="92">
          <div class="quality-hints">
            <span>저품질 (작은 파일)</span>
            <span>고품질 (큰 파일)</span>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary convert-btn" onclick="ImageConvert.convert()" disabled id="convertBtn">
          변환하기
        </button>
      </div>

      <!-- 결과 -->
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="section-header">
          <div class="section-title">변환 결과</div>
          <button class="tool-btn tool-btn-sm tool-btn-danger" onclick="ImageConvert.clear()">초기화</button>
        </div>
        <div class="comparison-view">
          <div class="compare-item">
            <div class="compare-label">원본</div>
            <div class="compare-image"><img id="originalImage" src="" alt="원본"></div>
            <div class="compare-info" id="originalCompareInfo"></div>
          </div>
          <div class="compare-arrow">→</div>
          <div class="compare-item">
            <div class="compare-label">변환됨</div>
            <div class="compare-image"><img id="convertedImage" src="" alt="변환됨"></div>
            <div class="compare-info" id="convertedInfo"></div>
          </div>
        </div>
        <div class="size-comparison" id="sizeComparison"></div>
        <div class="download-actions">
          <button class="tool-btn tool-btn-primary" onclick="ImageConvert.download()">다운로드</button>
        </div>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">포맷별 특징</div>
      <div class="help-content">
        <ul>
          <li><strong>PNG</strong>: 무손실 압축, 투명 배경 지원, 로고/아이콘에 적합</li>
          <li><strong>JPG</strong>: 손실 압축, 파일 크기 작음, 사진에 적합</li>
          <li><strong>WebP</strong>: 차세대 포맷, PNG/JPG보다 25-35% 작은 용량</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="image-convert.js"></script>
</body>
</html>
