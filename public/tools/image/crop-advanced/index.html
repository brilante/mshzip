<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 자르기 (고급) - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .crop-layout { display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; }
    .controls-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; margin-bottom: 1rem; }
    .upload-zone:hover { border-color: var(--primary); }
    .ratio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .ratio-btn { padding: 0.5rem; font-size: 0.75rem; }
    .ratio-btn.active { background: var(--primary); color: white; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .coord-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .preview-panel { position: relative; }
    .canvas-container { position: relative; background: #f0f0f0; border-radius: 12px; overflow: hidden; }
    #sourceCanvas { max-width: 100%; display: block; cursor: crosshair; }
    .crop-overlay { position: absolute; border: 2px dashed #3b82f6; background: rgba(59,130,246,0.1); pointer-events: none; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    @media (max-width: 768px) { .crop-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이미지 자르기 (고급)</h1>
          <p class="tool-description">비율 프리셋과 정밀 좌표 설정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="crop-layout">
      <div class="controls-panel">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" hidden onchange="CropAdv.loadImage(this)">
          이미지 업로드
        </div>

        <div class="section-title">비율 프리셋</div>
        <div class="ratio-grid">
          <button class="tool-btn tool-btn-secondary ratio-btn" onclick="CropAdv.setRatio(null)" aria-label="자유">자유</button>
          <button class="tool-btn tool-btn-secondary ratio-btn" onclick="CropAdv.setRatio(1)" aria-label="1:1">1:1</button>
          <button class="tool-btn tool-btn-secondary ratio-btn" onclick="CropAdv.setRatio(4/3)" aria-label="4:3">4:3</button>
          <button class="tool-btn tool-btn-secondary ratio-btn" onclick="CropAdv.setRatio(16/9)" aria-label="16:9">16:9</button>
          <button class="tool-btn tool-btn-secondary ratio-btn" onclick="CropAdv.setRatio(3/2)" aria-label="3:2">3:2</button>
          <button class="tool-btn tool-btn-secondary ratio-btn" onclick="CropAdv.setRatio(9/16)" aria-label="9:16">9:16</button>
        </div>

        <div class="section-title">좌표 설정</div>
        <div class="coord-inputs">
          <div class="control-group">
            <label>X</label>
            <input type="number" id="cropX" class="tool-input" value="0" oninput="CropAdv.updateFromInputs()">
          </div>
          <div class="control-group">
            <label>Y</label>
            <input type="number" id="cropY" class="tool-input" value="0" oninput="CropAdv.updateFromInputs()">
          </div>
          <div class="control-group">
            <label>너비</label>
            <input type="number" id="cropW" class="tool-input" value="100" oninput="CropAdv.updateFromInputs()">
          </div>
          <div class="control-group">
            <label>높이</label>
            <input type="number" id="cropH" class="tool-input" value="100" oninput="CropAdv.updateFromInputs()">
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width:100%; margin-top:1rem" onclick="CropAdv.crop()" aria-label="자르기 적용">자르기 적용</button>
      </div>

      <div class="preview-panel">
        <div class="canvas-container" id="canvasContainer">
          <canvas id="sourceCanvas"></canvas>
          <div class="crop-overlay" id="cropOverlay" style="display:none"></div>
        </div>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" onclick="CropAdv.download()" aria-label="다운로드">다운로드</button>
          <button class="tool-btn tool-btn-secondary" onclick="CropAdv.reset()" aria-label="초기화">초기화</button>
        </div>
      </div>
    </div>
    <canvas id="resultCanvas" style="display:none"></canvas>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="crop-advanced.js"></script>
</body>
</html>
