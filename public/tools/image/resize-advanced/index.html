<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 리사이즈 (고급) - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .resize-layout { display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; }
    .controls-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; margin-bottom: 1.5rem; }
    .upload-zone:hover { border-color: var(--primary); }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .size-inputs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.5rem; align-items: center; }
    .presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .preset-btn { padding: 0.5rem; font-size: 0.75rem; }
    .preview-panel { display: flex; flex-direction: column; align-items: center; }
    .preview-container { background: #f0f0f0; border-radius: 12px; padding: 1rem; max-width: 100%; overflow: hidden; }
    #previewCanvas { max-width: 100%; max-height: 400px; }
    .info-row { display: flex; gap: 2rem; margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary); }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    @media (max-width: 768px) { .resize-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이미지 리사이즈 (고급)</h1>
          <p class="tool-description">다양한 리사이즈 옵션과 프리셋</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="resize-layout">
      <div class="controls-panel">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" hidden onchange="ResizeAdv.loadImage(this)">
          이미지 업로드
        </div>

        <div class="section-title">프리셋</div>
        <div class="presets">
          <button class="tool-btn tool-btn-secondary preset-btn" onclick="ResizeAdv.setPreset(1920,1080)" aria-label="1920×1080">1920×1080</button>
          <button class="tool-btn tool-btn-secondary preset-btn" onclick="ResizeAdv.setPreset(1280,720)" aria-label="1280×720">1280×720</button>
          <button class="tool-btn tool-btn-secondary preset-btn" onclick="ResizeAdv.setPreset(800,600)" aria-label="800×600">800×600</button>
          <button class="tool-btn tool-btn-secondary preset-btn" onclick="ResizeAdv.setPreset(1080,1080)" aria-label="1080×1080">1080×1080</button>
          <button class="tool-btn tool-btn-secondary preset-btn" onclick="ResizeAdv.setPreset(1200,630)" aria-label="OG Image">OG Image</button>
          <button class="tool-btn tool-btn-secondary preset-btn" onclick="ResizeAdv.setPreset(500,500)" aria-label="500×500">500×500</button>
        </div>

        <div class="section-title">크기 설정</div>
        <div class="size-inputs">
          <input type="number" id="targetWidth" class="tool-input" placeholder="너비" oninput="ResizeAdv.onWidthChange()" aria-label="너비">
          <span>×</span>
          <input type="number" id="targetHeight" class="tool-input" placeholder="높이" oninput="ResizeAdv.onHeightChange()" aria-label="높이">
        </div>

        <div class="control-group" style="margin-top: 0.5rem">
          <label><input type="checkbox" id="lockRatio" checked> 비율 유지</label>
        </div>

        <div class="control-group">
          <label>비율로 조정</label>
          <select id="scalePercent" class="tool-select" onchange="ResizeAdv.scaleByPercent()">
            <option value="">선택...</option>
            <option value="200">200%</option>
            <option value="150">150%</option>
            <option value="100">100% (원본)</option>
            <option value="75">75%</option>
            <option value="50">50%</option>
            <option value="25">25%</option>
          </select>
        </div>

        <div class="control-group">
          <label>리샘플링 방식</label>
          <select id="resampleMethod" class="tool-select">
            <option value="pixelated">Pixelated (빠름)</option>
            <option value="smooth" selected>Smooth (부드럽게)</option>
            <option value="high-quality">High Quality (고품질)</option>
          </select>
        </div>

        <div class="control-group">
          <label>출력 형식</label>
          <select id="outputFormat" class="tool-select">
            <option value="image/png">PNG</option>
            <option value="image/jpeg">JPEG</option>
            <option value="image/webp">WebP</option>
          </select>
        </div>

        <div class="control-group" id="qualityGroup" style="display:none">
          <label>품질: <span id="qualityValue">90</span>%</label>
          <input type="range" id="quality" min="10" max="100" value="90" oninput="document.getElementById('qualityValue').textContent=this.value">
        </div>

        <button class="tool-btn tool-btn-primary" style="width:100%; margin-top:1rem" onclick="ResizeAdv.resize()" aria-label="리사이즈 적용">리사이즈 적용</button>
      </div>

      <div class="preview-panel">
        <div class="preview-container">
          <canvas id="previewCanvas"></canvas>
        </div>
        <div class="info-row">
          <span>원본: <span id="originalSize">-</span></span>
          <span>결과: <span id="resultSize">-</span></span>
        </div>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" onclick="ResizeAdv.download()" aria-label="다운로드">다운로드</button>
          <button class="tool-btn tool-btn-secondary" onclick="ResizeAdv.clear()" aria-label="초기화">초기화</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="resize-advanced.js"></script>
</body>
</html>
