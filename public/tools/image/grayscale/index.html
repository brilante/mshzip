<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>흑백 변환 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .filter-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    .filter-btn {
      padding: 12px 24px;
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .slider-control {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin: 16px 0;
      padding: 16px;
      background: var(--tools-card-bg);
      border-radius: 8px;
    }
    .slider-control label {
      font-size: 14px;
      color: var(--tools-text);
    }
    .slider-control input[type="range"] {
      width: 200px;
    }
    .slider-value {
      min-width: 50px;
      text-align: center;
      font-weight: 600;
    }
    .preview-container {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .preview-box {
      text-align: center;
    }
    .preview-label {
      font-size: 14px;
      color: var(--tools-text-secondary);
      margin-bottom: 8px;
    }
    .preview-image {
      max-width: 400px;
      max-height: 400px;
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-image img {
      max-width: 100%;
      max-height: 380px;
      object-fit: contain;
    }
    .preview-info {
      font-size: 12px;
      color: var(--tools-text-secondary);
      margin-top: 8px;
    }
    .upload-dropzone {
      border: 2px dashed var(--tools-border);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--tools-card-bg);
    }
    .upload-dropzone:hover,
    .upload-dropzone.dragover {
      border-color: var(--tools-primary);
      background: rgba(59, 130, 246, 0.05);
    }
    .dropzone-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .dropzone-text {
      font-size: 16px;
      color: var(--tools-text);
      margin-bottom: 8px;
    }
    .dropzone-hint {
      font-size: 13px;
      color: var(--tools-text-secondary);
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">흑백 변환</h1>
          <p class="tool-description">이미지를 흑백 또는 다양한 톤으로 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()">← 뒤로</button>
      </div>
    </div>
    <script>
      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 파일 업로드 -->
      <div class="upload-section" id="uploadSection">
        <div class="upload-dropzone" id="dropzone">
          <div class="dropzone-icon"></div>
          <div class="dropzone-text">이미지를 드래그하거나 클릭하여 선택</div>
          <div class="dropzone-hint">PNG, JPG, WebP, GIF 지원</div>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>

      <!-- 필터 컨트롤 -->
      <div id="controlSection" style="display: none;">
        <div class="filter-controls">
          <button class="filter-btn active" data-filter="grayscale" onclick="ImageGrayscale.setFilter('grayscale')">
            흑백 (Grayscale)
          </button>
          <button class="filter-btn" data-filter="sepia" onclick="ImageGrayscale.setFilter('sepia')">
            세피아 (Sepia)
          </button>
          <button class="filter-btn" data-filter="invert" onclick="ImageGrayscale.setFilter('invert')">
            반전 (Invert)
          </button>
          <button class="filter-btn" data-filter="brightness" onclick="ImageGrayscale.setFilter('brightness')">
            밝기 조절
          </button>
          <button class="filter-btn" data-filter="contrast" onclick="ImageGrayscale.setFilter('contrast')">
            대비 조절
          </button>
        </div>

        <!-- 강도 슬라이더 -->
        <div class="slider-control">
          <label>강도:</label>
          <input type="range" id="intensitySlider" min="0" max="100" value="100"
                 oninput="ImageGrayscale.updateIntensity(this.value)">
          <span class="slider-value" id="intensityValue">100%</span>
          <button class="tool-btn tool-btn-sm tool-btn-primary" onclick="ImageGrayscale.apply()">
            적용
          </button>
        </div>

        <!-- 미리보기 -->
        <div class="preview-container">
          <div class="preview-box">
            <div class="preview-label">원본</div>
            <div class="preview-image">
              <img id="originalImage" src="" alt="원본">
            </div>
            <div class="preview-info" id="originalInfo"></div>
          </div>
          <div class="preview-box">
            <div class="preview-label">결과 (<span id="currentFilter">흑백</span>)</div>
            <div class="preview-image">
              <img id="filteredImage" src="" alt="결과">
            </div>
            <div class="preview-info" id="filteredInfo"></div>
          </div>
        </div>

        <!-- 액션 버튼 -->
        <div class="action-buttons">
          <button class="tool-btn tool-btn-primary" onclick="ImageGrayscale.download()">
            다운로드
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="ImageGrayscale.reset()">
            ↩초기화
          </button>
          <button class="tool-btn tool-btn-danger" onclick="ImageGrayscale.clear()">
            새 이미지
          </button>
        </div>
      </div>
    </div>

    <!-- 도움말 -->
    <div class="tool-help">
      <div class="help-title">흑백 변환 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>흑백</strong>: 표준 그레이스케일 변환</li>
          <li><strong>세피아</strong>: 빈티지 느낌의 갈색 톤</li>
          <li><strong>반전</strong>: 색상을 반전시켜 네거티브 효과</li>
          <li><strong>밝기/대비</strong>: 이미지의 밝기와 대비 조절</li>
          <li>강도 슬라이더로 효과의 강도를 조절할 수 있습니다</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="image-grayscale.js"></script>
</body>
</html>
