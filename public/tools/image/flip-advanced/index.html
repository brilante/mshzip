<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 뒤집기 (고급) - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .flip-layout { display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; }
    .controls-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; margin-bottom: 1rem; }
    .upload-zone:hover { border-color: var(--primary); }
    .flip-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
    .flip-btn { padding: 1rem; font-size: 1.5rem; }
    .flip-btn.active { background: var(--primary); color: white; }
    .combo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .combo-btn { padding: 0.75rem; font-size: 0.8rem; }
    .preview-panel { display: flex; flex-direction: column; align-items: center; }
    .canvas-container { background: #f0f0f0; border-radius: 12px; padding: 1rem; position: relative; }
    #previewCanvas { max-width: 100%; max-height: 400px; }
    .comparison { display: flex; gap: 1rem; margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary); }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    @media (max-width: 768px) { .flip-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이미지 뒤집기 (고급)</h1>
          <p class="tool-description">수평/수직 뒤집기 및 조합</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="flip-layout">
      <div class="controls-panel">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" hidden onchange="FlipAdv.loadImage(this)">
          이미지 업로드
        </div>

        <div class="section-title">뒤집기</div>
        <div class="flip-buttons">
          <button class="tool-btn tool-btn-secondary flip-btn" id="hFlipBtn" onclick="FlipAdv.toggleFlip('h')" aria-label="↔">↔<br><small>수평</small></button>
          <button class="tool-btn tool-btn-secondary flip-btn" id="vFlipBtn" onclick="FlipAdv.toggleFlip('v')" aria-label="↕">↕<br><small>수직</small></button>
        </div>

        <div class="section-title">프리셋 조합</div>
        <div class="combo-grid">
          <button class="tool-btn tool-btn-secondary combo-btn" onclick="FlipAdv.setCombo(false, false)" aria-label="원본">원본</button>
          <button class="tool-btn tool-btn-secondary combo-btn" onclick="FlipAdv.setCombo(true, false)" aria-label="수평만">수평만</button>
          <button class="tool-btn tool-btn-secondary combo-btn" onclick="FlipAdv.setCombo(false, true)" aria-label="수직만">수직만</button>
          <button class="tool-btn tool-btn-secondary combo-btn" onclick="FlipAdv.setCombo(true, true)" aria-label="둘 다">둘 다</button>
        </div>

        <div class="section-title" style="margin-top: 1.5rem">추가 회전</div>
        <div class="combo-grid">
          <button class="tool-btn tool-btn-secondary combo-btn" onclick="FlipAdv.addRotation(90)" aria-label="+90°">+90°</button>
          <button class="tool-btn tool-btn-secondary combo-btn" onclick="FlipAdv.addRotation(-90)" aria-label="-90°">-90°</button>
        </div>
      </div>

      <div class="preview-panel">
        <div class="canvas-container">
          <canvas id="previewCanvas"></canvas>
        </div>
        <div class="comparison">
          <span>수평: <span id="hStatus">OFF</span></span>
          <span>수직: <span id="vStatus">OFF</span></span>
          <span>회전: <span id="rotStatus">0°</span></span>
        </div>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" onclick="FlipAdv.download()" aria-label="다운로드">다운로드</button>
          <button class="tool-btn tool-btn-secondary" onclick="FlipAdv.reset()" aria-label="초기화">초기화</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="flip-advanced.js"></script>
</body>
</html>
