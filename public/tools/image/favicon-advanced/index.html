<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파비콘 생성 (고급) - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .favicon-layout { display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; }
    .controls-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; margin-bottom: 1rem; }
    .upload-zone:hover { border-color: var(--primary); }
    .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .size-btn { padding: 0.5rem; font-size: 0.75rem; text-align: center; }
    .size-btn.active { background: var(--primary); color: white; }
    .preview-panel { }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem; }
    .preview-item { background: var(--bg-secondary); border-radius: 8px; padding: 1rem; text-align: center; }
    .preview-item canvas { background: #fff; border: 1px solid var(--border-color); }
    .preview-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .download-all { margin-top: 1.5rem; }
    .format-options { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .html-code { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-family: monospace; font-size: 0.8rem; overflow-x: auto; }
    @media (max-width: 768px) { .favicon-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">파비콘 생성 (고급)</h1>
          <p class="tool-description">다양한 크기의 파비콘 일괄 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="favicon-layout">
      <div class="controls-panel">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" hidden onchange="FaviconAdv.loadImage(this)">
          이미지 업로드 (정사각형 권장)
        </div>

        <div class="section-title">생성할 크기 선택</div>
        <div class="size-grid">
          <button class="tool-btn tool-btn-secondary size-btn active" data-size="16" onclick="FaviconAdv.toggleSize(this)" aria-label="16×16">16×16</button>
          <button class="tool-btn tool-btn-secondary size-btn active" data-size="32" onclick="FaviconAdv.toggleSize(this)" aria-label="32×32">32×32</button>
          <button class="tool-btn tool-btn-secondary size-btn active" data-size="48" onclick="FaviconAdv.toggleSize(this)" aria-label="48×48">48×48</button>
          <button class="tool-btn tool-btn-secondary size-btn active" data-size="64" onclick="FaviconAdv.toggleSize(this)" aria-label="64×64">64×64</button>
          <button class="tool-btn tool-btn-secondary size-btn active" data-size="128" onclick="FaviconAdv.toggleSize(this)" aria-label="128×128">128×128</button>
          <button class="tool-btn tool-btn-secondary size-btn active" data-size="180" onclick="FaviconAdv.toggleSize(this)" aria-label="180×180">180×180</button>
          <button class="tool-btn tool-btn-secondary size-btn active" data-size="192" onclick="FaviconAdv.toggleSize(this)" aria-label="192×192">192×192</button>
          <button class="tool-btn tool-btn-secondary size-btn active" data-size="512" onclick="FaviconAdv.toggleSize(this)" aria-label="512×512">512×512</button>
        </div>

        <div class="section-title">출력 형식</div>
        <div class="format-options">
          <label><input type="checkbox" id="formatPng" checked> PNG</label>
          <label><input type="checkbox" id="formatIco"> ICO (16,32,48)</label>
        </div>

        <button class="tool-btn tool-btn-primary download-all" style="width:100%" onclick="FaviconAdv.downloadAll()" aria-label="전체 다운로드 (ZIP)">전체 다운로드 (ZIP)</button>
      </div>

      <div class="preview-panel">
        <div class="section-title">미리보기</div>
        <div class="preview-grid" id="previewGrid"></div>

        <div class="section-title" style="margin-top: 1.5rem">HTML 코드</div>
        <div class="html-code" id="htmlCode">이미지를 업로드하면 HTML 코드가 생성됩니다.</div>
        <button class="tool-btn tool-btn-secondary" style="margin-top: 0.5rem" onclick="FaviconAdv.copyHtml()" aria-label="HTML 복사">HTML 복사</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="favicon-advanced.js"></script>
</body>
</html>
