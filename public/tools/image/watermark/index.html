<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>워터마크 추가 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .upload-dropzone {
      border: 2px dashed var(--tools-border);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--tools-card-bg);
    }
    .upload-dropzone:hover, .upload-dropzone.dragover {
      border-color: var(--tools-primary);
      background: rgba(59, 130, 246, 0.05);
    }
    .dropzone-icon { font-size: 48px; margin-bottom: 12px; }
    .dropzone-text { font-size: 16px; color: var(--tools-text); margin-bottom: 8px; }
    .dropzone-hint { font-size: 13px; color: var(--tools-text-secondary); }
    .watermark-settings {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin: 16px 0;
      padding: 16px;
      background: var(--tools-card-bg);
      border-radius: 8px;
    }
    .setting-item label {
      display: block;
      font-size: 14px;
      color: var(--tools-text);
      margin-bottom: 6px;
    }
    .setting-item input, .setting-item select {
      width: 100%;
      padding: 8px 12px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 6px;
      color: var(--tools-text);
    }
    .preview-container {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .preview-box {
      text-align: center;
    }
    .preview-label {
      font-size: 14px;
      color: var(--tools-text-secondary);
      margin-bottom: 8px;
    }
    .preview-image {
      max-width: 400px;
      max-height: 400px;
      background: var(--tools-card-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      padding: 8px;
    }
    .preview-image img, .preview-image canvas {
      max-width: 100%;
      max-height: 380px;
      object-fit: contain;
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .position-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      width: 100%;
    }
    .position-btn {
      padding: 8px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .position-btn:hover, .position-btn.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">워터마크 추가</h1>
          <p class="tool-description">이미지에 텍스트 또는 이미지 워터마크 추가</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="upload-section" id="uploadSection">
        <div class="upload-dropzone" id="dropzone">
          <div class="dropzone-icon"></div>
          <div class="dropzone-text">이미지를 드래그하거나 클릭하여 선택</div>
          <div class="dropzone-hint">PNG, JPG, WebP 지원</div>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>

      <div id="controlSection" style="display: none;">
        <div class="watermark-settings">
          <div class="setting-item">
            <label>워터마크 텍스트</label>
            <input type="text" id="watermarkText" value="© MyMind3" placeholder="워터마크 텍스트" aria-label="워터마크 텍스트">
          </div>
          <div class="setting-item">
            <label>폰트 크기</label>
            <input type="number" id="fontSize" value="24" min="10" max="200">
          </div>
          <div class="setting-item">
            <label>폰트 색상</label>
            <input type="color" id="fontColor" value="#ffffff">
          </div>
          <div class="setting-item">
            <label>투명도</label>
            <input type="range" id="opacity" min="0" max="100" value="50">
          </div>
          <div class="setting-item">
            <label>위치</label>
            <div class="position-grid">
              <button class="position-btn" data-pos="top-left" aria-label="↖">↖</button>
              <button class="position-btn" data-pos="top-center" aria-label="↑">↑</button>
              <button class="position-btn" data-pos="top-right" aria-label="↗">↗</button>
              <button class="position-btn" data-pos="middle-left" aria-label="←">←</button>
              <button class="position-btn" data-pos="middle-center" aria-label="●">●</button>
              <button class="position-btn" data-pos="middle-right" aria-label="→">→</button>
              <button class="position-btn" data-pos="bottom-left" aria-label="↙">↙</button>
              <button class="position-btn active" data-pos="bottom-right" aria-label="↘">↘</button>
              <button class="position-btn" data-pos="bottom-center" aria-label="↓">↓</button>
            </div>
          </div>
          <div class="setting-item">
            <label>회전 (도)</label>
            <input type="number" id="rotation" value="0" min="-180" max="180">
          </div>
        </div>

        <div class="preview-container">
          <div class="preview-box">
            <div class="preview-label">미리보기</div>
            <div class="preview-image">
              <canvas id="previewCanvas"></canvas>
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="tool-btn tool-btn-primary" onclick="Watermark.apply()" aria-label="워터마크 적용">워터마크 적용</button>
          <button class="tool-btn tool-btn-primary" onclick="Watermark.download()" aria-label="다운로드">다운로드</button>
          <button class="tool-btn tool-btn-danger" onclick="Watermark.clear()" aria-label="새 이미지">새 이미지</button>
        </div>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">워터마크 추가 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>텍스트</strong>: 원하는 워터마크 문구 입력</li>
          <li><strong>투명도</strong>: 0% = 완전 투명, 100% = 불투명</li>
          <li><strong>위치</strong>: 9개 위치 중 선택</li>
          <li>실시간 미리보기로 확인 후 다운로드</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="watermark.js"></script>
</body>
</html>
