<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 포맷 변환 (고급) - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .convert-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; margin-bottom: 1rem; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .upload-zone:hover { border-color: var(--primary); }
    .preview-img { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 1rem; }
    .format-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .format-btn { padding: 0.75rem 0.5rem; font-size: 0.8rem; border: 2px solid var(--border-color); background: var(--bg-primary); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .format-btn:hover { border-color: var(--primary); }
    .format-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .file-info { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .compare-row { display: flex; gap: 2rem; margin-top: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 8px; }
    .compare-item { text-align: center; }
    .compare-label { font-size: 0.8rem; color: var(--text-secondary); }
    .compare-value { font-weight: 600; margin-top: 0.25rem; }
    @media (max-width: 768px) { .convert-layout { grid-template-columns: 1fr; } .format-grid { grid-template-columns: repeat(2, 1fr); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이미지 포맷 변환 (고급)</h1>
          <p class="tool-description">다양한 포맷으로 변환 및 품질 설정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="convert-layout">
      <div class="panel">
        <div class="section-title">원본 이미지</div>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" hidden onchange="ConvertAdv.loadImage(this)">
          <div>이미지 업로드</div>
          <img id="previewImage" class="preview-img" style="display:none">
        </div>
        <div class="file-info" id="fileInfo">-</div>
      </div>

      <div class="panel">
        <div class="section-title">출력 형식 선택</div>
        <div class="format-grid">
          <button class="format-btn active" data-format="image/png" onclick="ConvertAdv.setFormat(this)" aria-label="PNG">PNG</button>
          <button class="format-btn" data-format="image/jpeg" onclick="ConvertAdv.setFormat(this)" aria-label="JPEG">JPEG</button>
          <button class="format-btn" data-format="image/webp" onclick="ConvertAdv.setFormat(this)" aria-label="WebP">WebP</button>
          <button class="format-btn" data-format="image/gif" onclick="ConvertAdv.setFormat(this)" aria-label="GIF">GIF</button>
          <button class="format-btn" data-format="image/bmp" onclick="ConvertAdv.setFormat(this)" aria-label="BMP">BMP</button>
          <button class="format-btn" data-format="image/ico" onclick="ConvertAdv.setFormat(this)" aria-label="ICO">ICO</button>
          <button class="format-btn" data-format="image/avif" onclick="ConvertAdv.setFormat(this)" aria-label="AVIF">AVIF</button>
          <button class="format-btn" data-format="image/tiff" onclick="ConvertAdv.setFormat(this)" aria-label="TIFF">TIFF</button>
        </div>

        <div class="control-group" id="qualityGroup">
          <label>품질: <span id="qualityValue">90</span>%</label>
          <input type="range" id="quality" min="10" max="100" value="90" style="width:100%" oninput="document.getElementById('qualityValue').textContent=this.value; ConvertAdv.updatePreview()">
        </div>

        <div class="control-group">
          <label><input type="checkbox" id="preserveTransparency" checked> 투명도 유지 (PNG/WebP)</label>
        </div>

        <button class="tool-btn tool-btn-primary" style="width:100%" onclick="ConvertAdv.convert()" aria-label="변환 및 다운로드">변환 및 다운로드</button>

        <div class="compare-row" id="compareRow" style="display:none">
          <div class="compare-item">
            <div class="compare-label">원본 크기</div>
            <div class="compare-value" id="originalFileSize">-</div>
          </div>
          <div class="compare-item">
            <div class="compare-label">변환 후</div>
            <div class="compare-value" id="convertedFileSize">-</div>
          </div>
          <div class="compare-item">
            <div class="compare-label">변화율</div>
            <div class="compare-value" id="sizeChange">-</div>
          </div>
        </div>
      </div>
    </div>
    <canvas id="convertCanvas" style="display:none"></canvas>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="convert-advanced.js"></script>
</body>
</html>
