<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 압축 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="image-compress.css">
</head>
<body>
  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이미지 압축</h1>
          <p class="tool-description">이미지 파일 용량을 줄여 최적화</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()">
          ← 뒤로
        </button>
      </div>
    </div>
    <script>
      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 메인 패널 -->
    <div class="tool-panel image-panel">
      <!-- 파일 업로드 -->
      <div class="upload-section">
        <div class="upload-dropzone" id="dropzone">
          <div class="dropzone-icon"></div>
          <div class="dropzone-text">이미지를 드래그하거나 클릭하여 선택</div>
          <div class="dropzone-hint">PNG, JPG, WebP 지원 (최대 20MB)</div>
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden>
        </div>
      </div>

      <!-- 압축 설정 -->
      <div class="settings-section" id="settingsSection" style="display: none;">
        <div class="section-title">압축 설정</div>
        <div class="settings-grid">
          <div class="setting-item">
            <label>품질</label>
            <div class="quality-slider">
              <input type="range" id="qualitySlider" min="10" max="100" value="80">
              <span id="qualityValue">80%</span>
            </div>
          </div>
          <div class="setting-item">
            <label>출력 포맷</label>
            <select id="outputFormat">
              <option value="auto">자동 (원본 유지)</option>
              <option value="jpeg">JPEG</option>
              <option value="png">PNG</option>
              <option value="webp">WebP</option>
            </select>
          </div>
          <div class="setting-item">
            <label>최대 크기 (선택)</label>
            <select id="maxSize">
              <option value="0">제한 없음</option>
              <option value="1920">1920px</option>
              <option value="1280">1280px</option>
              <option value="800">800px</option>
              <option value="640">640px</option>
            </select>
          </div>
        </div>
        <button class="tool-btn tool-btn-primary compress-btn" onclick="ImageCompress.compress()">
          압축하기
        </button>
      </div>

      <!-- 결과 비교 -->
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="section-header">
          <div class="section-title">압축 결과</div>
          <button class="tool-btn tool-btn-sm tool-btn-danger" onclick="ImageCompress.clear()">
            초기화
          </button>
        </div>
        <div class="comparison-view">
          <div class="compare-item">
            <div class="compare-label">원본</div>
            <div class="compare-image">
              <img id="originalImage" src="" alt="원본">
            </div>
            <div class="compare-info" id="originalInfo"></div>
          </div>
          <div class="compare-arrow">→</div>
          <div class="compare-item">
            <div class="compare-label">압축</div>
            <div class="compare-image">
              <img id="compressedImage" src="" alt="압축">
            </div>
            <div class="compare-info" id="compressedInfo"></div>
          </div>
        </div>
        <div class="savings-info" id="savingsInfo"></div>
        <div class="download-actions">
          <button class="tool-btn tool-btn-primary" onclick="ImageCompress.download()">
            다운로드
          </button>
        </div>
      </div>
    </div>

    <!-- 도움말 -->
    <div class="tool-help">
      <div class="help-title">이미지 압축 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>품질</strong>: 낮을수록 파일 크기 감소, 화질 저하</li>
          <li><strong>WebP</strong>: 가장 효율적인 압축 포맷 (브라우저 지원 필요)</li>
          <li><strong>PNG</strong>: 투명 배경 유지, 무손실 압축</li>
          <li><strong>JPEG</strong>: 사진에 적합, 손실 압축</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="image-compress.js"></script>
</body>
</html>
