<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTR 예측기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .marketing-container { max-width: 700px; margin: 0 auto; }
    .marketing-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .preview-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
    .preview-title { color: #1a0dab; font-size: 1.1rem; margin-bottom: 0.25rem; }
    .preview-url { color: #006621; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .preview-desc { color: #545454; font-size: 0.9rem; }
    .result-card { border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; text-align: center; }
    .result-high { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; }
    .result-medium { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
    .result-low { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; }
    .ctr-value { font-size: 3rem; font-weight: 700; }
    .ctr-label { font-size: 1rem; opacity: 0.9; }
    .factors-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .factor-card { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 0.75rem; }
    .factor-score { font-size: 1.25rem; font-weight: 600; }
    .factor-label { font-size: 0.75rem; opacity: 0.8; }
    .suggestions { margin-top: 1.5rem; background: var(--bg-primary); border-radius: 8px; padding: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">CTR 예측기</h1>
          <p class="tool-description">클릭률 예측 분석</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="marketing-container">
      <div class="marketing-panel">
        <div class="input-group">
          <label>제목 (Title Tag)</label>
          <input type="text" id="title" class="tool-input" placeholder="매력적인 제목을 입력하세요" maxlength="60" oninput="CTRPredictor.updatePreview()" aria-label="매력적인 제목을 입력하세요">
          <div style="text-align: right; font-size: 0.75rem; color: var(--text-secondary);"><span id="titleCount">0</span>/60</div>
        </div>

        <div class="input-group">
          <label>URL</label>
          <input type="text" id="url" class="tool-input" placeholder="https://example.com/page" oninput="CTRPredictor.updatePreview()" aria-label="https://example.com/page">
        </div>

        <div class="input-group">
          <label>설명 (Meta Description)</label>
          <textarea id="description" class="tool-input" rows="3" placeholder="검색 결과에 표시될 설명" maxlength="160" oninput="CTRPredictor.updatePreview()"></textarea>
          <div style="text-align: right; font-size: 0.75rem; color: var(--text-secondary);"><span id="descCount">0</span>/160</div>
        </div>

        <div class="preview-card">
          <div style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">검색 결과 미리보기</div>
          <div class="preview-title" id="previewTitle">제목이 여기에 표시됩니다</div>
          <div class="preview-url" id="previewUrl">https://example.com</div>
          <div class="preview-desc" id="previewDesc">설명이 여기에 표시됩니다...</div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="CTRPredictor.predict()" aria-label="CTR 예측">CTR 예측</button>

        <div id="result"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ctr-predictor.js"></script>
</body>
</html>
