<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>광고 문구 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .marketing-container { max-width: 700px; margin: 0 auto; }
    .marketing-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .template-card { padding: 1rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .template-card:hover { border-color: var(--primary); }
    .template-card.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
    .template-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .template-name { font-weight: 600; font-size: 0.9rem; }
    .template-desc { font-size: 0.75rem; color: var(--text-secondary); }
    .results { margin-top: 1.5rem; }
    .copy-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .copy-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .copy-type { font-size: 0.75rem; color: var(--text-secondary); }
    .copy-text { font-size: 1rem; line-height: 1.6; }
    .copy-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">광고 문구 생성기</h1>
          <p class="tool-description">마케팅 카피 자동 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="marketing-container">
      <div class="marketing-panel">
        <div class="input-group">
          <label>제품/서비스명</label>
          <input type="text" id="productName" class="tool-input" placeholder="예: MyMind3 마인드맵" aria-label="예: MyMind3 마인드맵">
        </div>

        <div class="input-group">
          <label>핵심 혜택 (쉼표로 구분)</label>
          <input type="text" id="benefits" class="tool-input" placeholder="예: 빠른 속도, 무료 사용, AI 기능" aria-label="예: 빠른 속도, 무료 사용, AI 기능">
        </div>

        <div class="input-group">
          <label>타겟 고객</label>
          <input type="text" id="target" class="tool-input" placeholder="예: 창업자, 기획자, 학생" aria-label="예: 창업자, 기획자, 학생">
        </div>

        <label style="font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; display: block;">광고 유형</label>
        <div class="template-grid" id="templateGrid"></div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="AdCopyGen.generate()" aria-label="광고 문구 생성">광고 문구 생성</button>

        <div id="results" class="results"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ad-copy-gen.js"></script>
</body>
</html>
