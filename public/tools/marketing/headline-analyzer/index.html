<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>헤드라인 분석기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .marketing-container { max-width: 700px; margin: 0 auto; }
    .marketing-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .score-circle { width: 150px; height: 150px; border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .score-excellent { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
    .score-good { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    .score-average { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .score-poor { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
    .score-value { font-size: 2.5rem; font-weight: 700; color: white; }
    .score-label { font-size: 0.9rem; color: rgba(255,255,255,0.9); }
    .analysis-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .analysis-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; }
    .analysis-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .analysis-title { font-weight: 600; font-size: 0.9rem; }
    .analysis-score { font-weight: 700; }
    .progress-bar { height: 6px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .word-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .word-tag { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
    .word-power { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .word-emotion { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .word-common { background: rgba(107, 114, 128, 0.2); color: #6b7280; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">헤드라인 분석기</h1>
          <p class="tool-description">제목 효과 분석</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="marketing-container">
      <div class="marketing-panel">
        <div class="input-group">
          <label>헤드라인 입력</label>
          <input type="text" id="headline" class="tool-input" placeholder="분석할 헤드라인을 입력하세요" aria-label="분석할 헤드라인을 입력하세요">
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="HeadlineAnalyzer.analyze()" aria-label="분석">분석</button>

        <div id="result"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="headline-analyzer.js"></script>
</body>
</html>
