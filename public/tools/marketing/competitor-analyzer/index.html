<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경쟁사 분석 도구 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .marketing-container { max-width: 800px; margin: 0 auto; }
    .marketing-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .url-list { margin-top: 0.5rem; }
    .url-item { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .url-item input { flex: 1; }
    .comparison-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    .comparison-table th, .comparison-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color); }
    .comparison-table th { background: var(--bg-primary); font-weight: 600; font-size: 0.85rem; }
    .comparison-table td { font-size: 0.9rem; }
    .score-badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
    .score-high { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .score-medium { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
    .score-low { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .insights { margin-top: 1.5rem; background: var(--bg-primary); border-radius: 8px; padding: 1rem; }
    .insight-item { display: flex; gap: 0.5rem; padding: 0.5rem 0; }
    .insight-icon { font-size: 1.25rem; }
    .radar-placeholder { height: 200px; background: var(--bg-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-top: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">경쟁사 분석 도구</h1>
          <p class="tool-description">경쟁 웹사이트 비교 분석</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="marketing-container">
      <div class="marketing-panel">
        <div class="input-group">
          <label>내 웹사이트 URL</label>
          <input type="url" id="myUrl" class="tool-input" placeholder="https://mysite.com" aria-label="https://mysite.com">
        </div>

        <div class="input-group">
          <label>경쟁사 URL (최대 3개)</label>
          <div class="url-list" id="competitorList">
            <div class="url-item">
              <input type="url" class="tool-input competitor-url" placeholder="https://competitor1.com" aria-label="https://competitor1.com">
            </div>
            <div class="url-item">
              <input type="url" class="tool-input competitor-url" placeholder="https://competitor2.com" aria-label="https://competitor2.com">
            </div>
            <div class="url-item">
              <input type="url" class="tool-input competitor-url" placeholder="https://competitor3.com" aria-label="https://competitor3.com">
            </div>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="CompetitorAnalyzer.analyze()" aria-label="분석 시작">분석 시작</button>

        <div id="result"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="competitor-analyzer.js"></script>
</body>
</html>
