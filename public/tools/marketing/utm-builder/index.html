<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM 빌더 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .marketing-container { max-width: 700px; margin: 0 auto; }
    .marketing-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .input-group .hint { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .required::after { content: ' *'; color: #ef4444; }
    .result-box { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-top: 1.5rem; }
    .result-url { font-family: monospace; word-break: break-all; padding: 1rem; background: var(--bg-secondary); border-radius: 6px; margin: 0.5rem 0; font-size: 0.9rem; }
    .param-list { margin-top: 1rem; font-size: 0.85rem; }
    .param-item { display: flex; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border-color); }
    .param-item:last-child { border-bottom: none; }
    .param-name { font-weight: 600; min-width: 120px; color: var(--primary); }
    .preset-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .preset-btn { padding: 0.5rem 1rem; border-radius: 20px; border: none; cursor: pointer; background: var(--bg-primary); font-size: 0.85rem; transition: all 0.2s; }
    .preset-btn:hover { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">UTM 빌더</h1>
          <p class="tool-description">캠페인 추적 URL 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="marketing-container">
      <div class="marketing-panel">
        <div style="margin-bottom: 1rem; font-weight: 600;">빠른 프리셋</div>
        <div class="preset-btns">
          <button class="preset-btn" onclick="UTMBuilder.applyPreset('facebook')" aria-label="Facebook">Facebook</button>
          <button class="preset-btn" onclick="UTMBuilder.applyPreset('google')" aria-label="Google Ads">Google Ads</button>
          <button class="preset-btn" onclick="UTMBuilder.applyPreset('instagram')" aria-label="Instagram">Instagram</button>
          <button class="preset-btn" onclick="UTMBuilder.applyPreset('email')" aria-label="이메일">이메일</button>
          <button class="preset-btn" onclick="UTMBuilder.applyPreset('twitter')" aria-label="Twitter">Twitter</button>
        </div>

        <div class="input-group">
          <label class="required">웹사이트 URL</label>
          <input type="url" id="baseUrl" class="tool-input" placeholder="https://example.com/page" aria-label="https://example.com/page">
          <div class="hint">추적할 페이지의 전체 URL</div>
        </div>

        <div class="input-group">
          <label class="required">utm_source (소스)</label>
          <input type="text" id="utmSource" class="tool-input" placeholder="예: google, facebook, newsletter" aria-label="예: google, facebook, newsletter">
          <div class="hint">트래픽이 오는 플랫폼/사이트</div>
        </div>

        <div class="input-group">
          <label class="required">utm_medium (매체)</label>
          <input type="text" id="utmMedium" class="tool-input" placeholder="예: cpc, email, social, banner" aria-label="예: cpc, email, social, banner">
          <div class="hint">마케팅 채널 유형</div>
        </div>

        <div class="input-group">
          <label class="required">utm_campaign (캠페인)</label>
          <input type="text" id="utmCampaign" class="tool-input" placeholder="예: spring_sale, product_launch" aria-label="예: spring_sale, product_launch">
          <div class="hint">캠페인 이름</div>
        </div>

        <div class="input-group">
          <label>utm_term (선택)</label>
          <input type="text" id="utmTerm" class="tool-input" placeholder="예: 유료 검색 키워드" aria-label="예: 유료 검색 키워드">
          <div class="hint">유료 검색 키워드 (선택사항)</div>
        </div>

        <div class="input-group">
          <label>utm_content (선택)</label>
          <input type="text" id="utmContent" class="tool-input" placeholder="예: logolink, textlink" aria-label="예: logolink, textlink">
          <div class="hint">A/B 테스트나 콘텐츠 구분용 (선택사항)</div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="UTMBuilder.generate()" aria-label="URL 생성">URL 생성</button>

        <div id="result"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="utm-builder.js"></script>
</body>
</html>
