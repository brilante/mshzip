<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체지방률 계산기 - 건강 도구</title>
    <link rel="stylesheet" href="body-fat-calc.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>체지방률 계산기</h1>
            <p>Navy 공식을 이용한 체지방률 측정</p>
        </header>

        <div class="calculator card">
            <div class="gender-select">
                <button class="gender-btn active" data-gender="male" aria-label="남성">남성</button>
                <button class="gender-btn" data-gender="female" aria-label="여성">여성</button>
            </div>

            <div class="inputs">
                <div class="input-group">
                    <label>키 (cm)</label>
                    <input type="number" id="height" placeholder="170" aria-label="170">
                </div>
                <div class="input-group">
                    <label>허리 둘레 (cm)</label>
                    <input type="number" id="waist" placeholder="배꼽 높이에서 측정" aria-label="배꼽 높이에서 측정">
                </div>
                <div class="input-group">
                    <label>목 둘레 (cm)</label>
                    <input type="number" id="neck" placeholder="목 아래 가장 좁은 부분" aria-label="목 아래 가장 좁은 부분">
                </div>
                <div class="input-group female-only" style="display: none;">
                    <label>엉덩이 둘레 (cm)</label>
                    <input type="number" id="hip" placeholder="엉덩이 가장 넓은 부분" aria-label="엉덩이 가장 넓은 부분">
                </div>
            </div>

            <button id="calculateBtn" aria-label="계산하기">계산하기</button>
        </div>

        <div class="result card" id="result" style="display: none;">
            <div class="bf-display">
                <div class="bf-value" id="bfValue">0</div>
                <div class="bf-unit">%</div>
            </div>
            <div class="bf-category" id="bfCategory">-</div>
            <div class="bf-bar">
                <div class="bar-fill" id="barFill"></div>
            </div>
            <div class="bar-labels">
                <span>필수지방</span>
                <span>운동선수</span>
                <span>건강</span>
                <span>표준</span>
                <span>비만</span>
            </div>
            <div class="info-box" id="infoBox"></div>
        </div>

        <div class="guide card">
            <h3>체지방률 기준 (성인)</h3>
            <table>
                <tr><th>분류</th><th>남성</th><th>여성</th></tr>
                <tr><td>필수 지방</td><td>2-5%</td><td>10-13%</td></tr>
                <tr><td>운동선수</td><td>6-13%</td><td>14-20%</td></tr>
                <tr><td>건강</td><td>14-17%</td><td>21-24%</td></tr>
                <tr><td>표준</td><td>18-24%</td><td>25-31%</td></tr>
                <tr><td>비만</td><td>25%+</td><td>32%+</td></tr>
            </table>
        </div>
    </div>
    <script src="body-fat-calc.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
