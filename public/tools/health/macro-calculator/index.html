<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매크로 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .macro-container { max-width: 600px; margin: 0 auto; }
    .macro-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .gender-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .gender-btn { flex: 1; padding: 0.75rem; border: 2px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); cursor: pointer; }
    .gender-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .calorie-card { background: linear-gradient(135deg, #f59e0b, #fbbf24); border-radius: 12px; padding: 1.5rem; color: white; text-align: center; margin: 1.5rem 0; }
    .calorie-value { font-size: 3rem; font-weight: 700; }
    .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .macro-card { background: var(--bg-primary); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .macro-value { font-size: 1.75rem; font-weight: 700; }
    .macro-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .macro-percent { font-size: 0.75rem; color: var(--text-secondary); }
    .protein { color: #ef4444; }
    .carbs { color: #3b82f6; }
    .fat { color: #f59e0b; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">매크로 계산기</h1>
          <p class="tool-description">일일 칼로리 및 영양소 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="macro-container">
      <div class="macro-panel">
        <div class="gender-row">
          <button class="gender-btn active" data-gender="male" onclick="MacroCalc.setGender('male')" aria-label="남성">남성</button>
          <button class="gender-btn" data-gender="female" onclick="MacroCalc.setGender('female')" aria-label="여성">여성</button>
        </div>

        <div class="input-grid">
          <div class="input-group">
            <label>나이</label>
            <input type="number" id="age" class="tool-input" value="30" min="15" max="80">
          </div>
          <div class="input-group">
            <label>키 (cm)</label>
            <input type="number" id="height" class="tool-input" value="175" min="100" max="250">
          </div>
          <div class="input-group">
            <label>체중 (kg)</label>
            <input type="number" id="weight" class="tool-input" value="70" min="30" max="200">
          </div>
          <div class="input-group">
            <label>활동량</label>
            <select id="activity" class="tool-input">
              <option value="1.2">좌식 생활</option>
              <option value="1.375" selected>가벼운 활동</option>
              <option value="1.55">보통 활동</option>
              <option value="1.725">활발한 활동</option>
              <option value="1.9">매우 활발</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label>목표</label>
          <select id="goal" class="tool-input">
            <option value="-500">체중 감량 (-500 kcal)</option>
            <option value="-250">완만한 감량 (-250 kcal)</option>
            <option value="0" selected>유지</option>
            <option value="250">완만한 증량 (+250 kcal)</option>
            <option value="500">체중 증가 (+500 kcal)</option>
          </select>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="MacroCalc.calculate()" aria-label="계산하기">계산하기</button>

        <div id="result"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="macro-calculator.js"></script>
</body>
</html>
