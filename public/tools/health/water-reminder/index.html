<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물 마시기 알림 - 건강 도구</title>
    <link rel="stylesheet" href="water-reminder.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>물 마시기 알림</h1>
            <p>규칙적인 수분 섭취로 건강을 지키세요</p>
        </header>

        <div class="water-tracker card">
            <div class="bottle">
                <div class="water-fill" id="waterFill"></div>
                <div class="bottle-marks">
                    <span>2L</span>
                    <span>1.5L</span>
                    <span>1L</span>
                    <span>0.5L</span>
                </div>
            </div>
            <div class="intake-display">
                <span id="currentIntake">0</span>
                <small>/ <span id="goalIntake">2000</span> ml</small>
            </div>
        </div>

        <div class="quick-add card">
            <h3>물 추가</h3>
            <div class="add-buttons">
                <button onclick="addWater(200)" aria-label="200ml">200ml</button>
                <button onclick="addWater(250)" aria-label="250ml">250ml</button>
                <button onclick="addWater(300)" aria-label="300ml">300ml</button>
                <button onclick="addWater(500)" aria-label="500ml">500ml</button>
            </div>
            <div class="custom-add">
                <input type="number" id="customAmount" placeholder="직접 입력 (ml)" aria-label="직접 입력 (ml)">
                <button onclick="addCustom()" aria-label="추가">추가</button>
            </div>
        </div>

        <div class="settings card">
            <h3>설정</h3>
            <div class="setting-row">
                <label>일일 목표 (ml)</label>
                <input type="number" id="waterGoal" value="2000" min="1000" max="5000" step="100">
            </div>
            <div class="setting-row">
                <label>알림 간격 (분)</label>
                <input type="number" id="reminderInterval" value="60" min="15" max="180">
            </div>
            <div class="setting-row">
                <label>
                    <input type="checkbox" id="enableReminder"> 브라우저 알림 활성화
                </label>
            </div>
        </div>

        <div class="history card">
            <h3>오늘 기록</h3>
            <div id="historyList"></div>
        </div>
    </div>
    <script src="water-reminder.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
