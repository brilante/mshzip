<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운동 타이머 - 건강 도구</title>
    <link rel="stylesheet" href="workout-timer.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>운동 타이머</h1>
            <p>인터벌 트레이닝을 위한 타이머</p>
        </header>

        <div class="timer-card card">
            <div class="phase-indicator" id="phaseIndicator">준비</div>
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="round-info">
                라운드 <span id="currentRound">0</span> / <span id="totalRounds">0</span>
            </div>
            <div class="timer-controls">
                <button id="startBtn" aria-label="시작">시작</button>
                <button id="pauseBtn" disabled aria-label="일시정지">일시정지</button>
                <button id="resetBtn" aria-label="리셋">리셋</button>
            </div>
        </div>

        <div class="settings card">
            <h3>설정</h3>
            <div class="setting-row">
                <label>운동 시간 (초)</label>
                <input type="number" id="workTime" value="30" min="5" max="300">
            </div>
            <div class="setting-row">
                <label>휴식 시간 (초)</label>
                <input type="number" id="restTime" value="10" min="5" max="120">
            </div>
            <div class="setting-row">
                <label>라운드 수</label>
                <input type="number" id="rounds" value="8" min="1" max="50">
            </div>
            <div class="setting-row">
                <label>준비 시간 (초)</label>
                <input type="number" id="prepTime" value="10" min="3" max="30">
            </div>
        </div>

        <div class="presets card">
            <h3>프리셋</h3>
            <div class="preset-buttons">
                <button onclick="loadPreset(20, 10, 8)" aria-label="타바타 (20/10 x8)">타바타 (20/10 x8)</button>
                <button onclick="loadPreset(30, 30, 10)" aria-label="EMOM (30/30 x10)">EMOM (30/30 x10)</button>
                <button onclick="loadPreset(45, 15, 12)" aria-label="HIIT (45/15 x12)">HIIT (45/15 x12)</button>
            </div>
        </div>
    </div>
    <script src="workout-timer.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
