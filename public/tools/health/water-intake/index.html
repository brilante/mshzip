<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수분 섭취 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .water-container { max-width: 500px; margin: 0 auto; }
    .water-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .result-card { background: linear-gradient(135deg, #3b82f6, #06b6d4); border-radius: 12px; padding: 2rem; text-align: center; color: white; margin: 1.5rem 0; }
    .result-amount { font-size: 3rem; font-weight: 700; }
    .result-label { font-size: 0.9rem; opacity: 0.9; }
    .water-glass { display: flex; justify-content: center; gap: 0.25rem; flex-wrap: wrap; margin-top: 1rem; }
    .glass { width: 30px; height: 40px; background: rgba(255,255,255,0.3); border-radius: 4px; border: 2px solid rgba(255,255,255,0.5); }
    .glass.filled { background: rgba(255,255,255,0.8); }
    .tips-box { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.85rem; }
    .tip-item { padding: 0.5rem 0; border-bottom: 1px solid var(--border-color); }
    .tip-item:last-child { border-bottom: none; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">수분 섭취 계산기</h1>
          <p class="tool-description">하루 권장 수분 섭취량 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="water-container">
      <div class="water-panel">
        <div class="input-row">
          <div class="input-group">
            <label>체중 (kg)</label>
            <input type="number" id="weight" class="tool-input" value="70" min="30" max="200">
          </div>
          <div class="input-group">
            <label>활동량</label>
            <select id="activity" class="tool-input">
              <option value="1.0">낮음 (앉아서 생활)</option>
              <option value="1.2" selected>보통 (가벼운 운동)</option>
              <option value="1.4">높음 (매일 운동)</option>
              <option value="1.6">매우 높음 (격렬한 운동)</option>
            </select>
          </div>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>기후</label>
            <select id="climate" class="tool-input">
              <option value="1.0">온화한 기후</option>
              <option value="1.1" selected>보통</option>
              <option value="1.2">더운 기후</option>
            </select>
          </div>
          <div class="input-group">
            <label>카페인 섭취</label>
            <select id="caffeine" class="tool-input">
              <option value="0">안 마심</option>
              <option value="1" selected>1-2잔</option>
              <option value="2">3잔 이상</option>
            </select>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="WaterCalc.calculate()" aria-label="계산하기">계산하기</button>

        <div id="result"></div>

        <div class="tips-box">
          <strong>수분 섭취 팁</strong>
          <div class="tip-item">아침에 일어나자마자 물 한 잔</div>
          <div class="tip-item">식사 30분 전에 물 한 잔</div>
          <div class="tip-item">운동 전후로 추가 섭취</div>
          <div class="tip-item">취침 전 과도한 섭취는 피하기</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="water-intake.js"></script>
</body>
</html>
