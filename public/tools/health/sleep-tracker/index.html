<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수면 추적기 - 건강 도구</title>
    <link rel="stylesheet" href="sleep-tracker.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

    <div class="container">
        <header>
            <h1>수면 추적기</h1>
            <p>좋은 수면 습관을 만들어가세요</p>
        </header>

        <div class="log-sleep card">
            <h3>수면 기록</h3>
            <div class="time-inputs">
                <div class="time-group">
                    <label>취침 시간</label>
                    <input type="time" id="bedtime" value="23:00">
                </div>
                <div class="time-group">
                    <label>기상 시간</label>
                    <input type="time" id="waketime" value="07:00">
                </div>
            </div>
            <div class="quality-rating">
                <label>수면 품질</label>
                <div class="rating-buttons">
                    <button class="rating-btn" data-rating="1" aria-label=""></button>
                    <button class="rating-btn" data-rating="2" aria-label=""></button>
                    <button class="rating-btn" data-rating="3" aria-label=""></button>
                    <button class="rating-btn" data-rating="4" aria-label=""></button>
                    <button class="rating-btn active" data-rating="5" aria-label=""></button>
                </div>
            </div>
            <button id="logSleep" aria-label="기록하기">기록하기</button>
        </div>

        <div class="stats card">
            <h3>이번 주 평균</h3>
            <div class="stats-grid">
                <div class="stat">
                    <span class="stat-value" id="avgDuration">0h 0m</span>
                    <span class="stat-label">수면 시간</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="avgQuality">-</span>
                    <span class="stat-label">수면 품질</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="avgBedtime">-</span>
                    <span class="stat-label">평균 취침</span>
                </div>
            </div>
        </div>

        <div class="history card">
            <h3>최근 기록</h3>
            <div id="historyList"></div>
        </div>
    </div>
    <script src="sleep-tracker.js"></script>
  <script src="/tools/common/tools-common.js?v=20260117"></script>
</body>
</html>
