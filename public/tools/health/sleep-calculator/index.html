<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수면 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .sleep-container { max-width: 600px; margin: 0 auto; }
    .sleep-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .mode-tab { flex: 1; padding: 0.75rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; background: var(--bg-primary); color: var(--text-secondary); }
    .mode-tab.active { background: var(--primary); color: white; }
    .time-input-group { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1.5rem; }
    .time-input { flex: 1; padding: 0.75rem; border: 2px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); }
    .cycle-card { background: var(--bg-primary); border-radius: 12px; padding: 1.25rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
    .cycle-card:hover { border-color: var(--primary); }
    .cycle-card.recommended { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .cycle-time { font-size: 1.5rem; font-weight: 700; }
    .cycle-info { text-align: right; }
    .cycle-duration { font-size: 0.85rem; color: var(--text-secondary); }
    .cycle-badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-top: 0.25rem; }
    .badge-optimal { background: #10b981; color: white; }
    .badge-good { background: #3b82f6; color: white; }
    .badge-ok { background: #f59e0b; color: white; }
    .info-box { background: rgba(59, 130, 246, 0.1); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.85rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">수면 계산기</h1>
          <p class="tool-description">수면 주기 기반 최적 기상/취침 시간 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="sleep-container">
      <div class="sleep-panel">
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="wakeup" onclick="SleepCalc.setMode('wakeup')" aria-label="기상 시간으로">기상 시간으로</button>
          <button class="mode-tab" data-mode="sleep" onclick="SleepCalc.setMode('sleep')" aria-label="취침 시간으로">취침 시간으로</button>
        </div>

        <div id="wakeupMode">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">언제 일어나야 하나요?</label>
          <div class="time-input-group">
            <input type="time" id="wakeupTime" class="time-input" value="07:00">
            <button class="tool-btn tool-btn-primary" onclick="SleepCalc.calculateFromWakeup()" aria-label="계산">계산</button>
          </div>
        </div>

        <div id="sleepMode" style="display: none;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">언제 잠들 예정인가요?</label>
          <div class="time-input-group">
            <input type="time" id="sleepTime" class="time-input" value="23:00">
            <button class="tool-btn tool-btn-primary" onclick="SleepCalc.calculateFromSleep()" aria-label="계산">계산</button>
          </div>
        </div>

        <div id="results"></div>

        <div class="info-box">
          <strong>수면 주기란?</strong><br>
          한 번의 수면 주기는 약 90분입니다. 주기 사이에 깨면 개운하게 일어날 수 있습니다.
          잠들기까지 약 15분이 소요됩니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="sleep-calculator.js"></script>
</body>
</html>
