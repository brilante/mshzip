<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>심박수 존 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .hr-container { max-width: 600px; margin: 0 auto; }
    .hr-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .input-row .input-group { flex: 1; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .max-hr { text-align: center; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 1.5rem; }
    .max-hr-value { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
    .zone-card { display: flex; align-items: center; padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; }
    .zone-color { width: 8px; height: 100%; min-height: 50px; border-radius: 4px; margin-right: 1rem; }
    .zone-info { flex: 1; }
    .zone-name { font-weight: 600; }
    .zone-desc { font-size: 0.8rem; color: var(--text-secondary); }
    .zone-range { text-align: right; font-weight: 600; }
    .zone-bpm { font-size: 0.8rem; color: var(--text-secondary); }
    .zone1 { background: rgba(156, 163, 175, 0.2); }
    .zone1 .zone-color { background: #9ca3af; }
    .zone2 { background: rgba(59, 130, 246, 0.2); }
    .zone2 .zone-color { background: #3b82f6; }
    .zone3 { background: rgba(16, 185, 129, 0.2); }
    .zone3 .zone-color { background: #10b981; }
    .zone4 { background: rgba(245, 158, 11, 0.2); }
    .zone4 .zone-color { background: #f59e0b; }
    .zone5 { background: rgba(239, 68, 68, 0.2); }
    .zone5 .zone-color { background: #ef4444; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">심박수 존 계산기</h1>
          <p class="tool-description">운동 강도별 목표 심박수 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="hr-container">
      <div class="hr-panel">
        <div class="input-row">
          <div class="input-group">
            <label>나이</label>
            <input type="number" id="age" class="tool-input" value="30" min="10" max="100">
          </div>
          <div class="input-group">
            <label>안정시 심박수 (선택)</label>
            <input type="number" id="restingHR" class="tool-input" placeholder="60-80" min="40" max="120" aria-label="60-80">
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="HRZone.calculate()" aria-label="계산하기">계산하기</button>

        <div class="max-hr" id="maxHR" style="display: none;">
          <div style="font-size: 0.85rem; color: var(--text-secondary);">최대 심박수</div>
          <div class="max-hr-value" id="maxHRValue">190</div>
          <div style="font-size: 0.85rem; color: var(--text-secondary);">bpm</div>
        </div>

        <div id="zones"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="heart-rate-zone.js"></script>
</body>
</html>
