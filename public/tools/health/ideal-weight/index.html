<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이상 체중 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .iw-container { max-width: 500px; margin: 0 auto; }
    .iw-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .gender-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .gender-tab { flex: 1; padding: 0.75rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; background: var(--bg-primary); }
    .gender-tab.active { background: var(--primary); color: white; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
    .formula-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .formula-name { font-weight: 600; margin-bottom: 0.25rem; }
    .formula-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .formula-range { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .avg-card { background: linear-gradient(135deg, var(--primary), #06b6d4); border-radius: 12px; padding: 1.5rem; text-align: center; color: white; margin-bottom: 1rem; }
    .avg-value { font-size: 2.5rem; font-weight: 700; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이상 체중 계산기</h1>
          <p class="tool-description">다양한 공식으로 이상 체중 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="iw-container">
      <div class="iw-panel">
        <div class="gender-tabs">
          <button class="gender-tab active" data-gender="male" onclick="IdealWeight.setGender('male')" aria-label="남성">남성</button>
          <button class="gender-tab" data-gender="female" onclick="IdealWeight.setGender('female')" aria-label="여성">여성</button>
        </div>

        <div class="input-group">
          <label>키 (cm)</label>
          <input type="number" id="height" class="tool-input" value="175" min="100" max="250">
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%;" onclick="IdealWeight.calculate()" aria-label="계산하기">계산하기</button>

        <div id="result" style="margin-top: 1.5rem;"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ideal-weight.js"></script>
</body>
</html>
