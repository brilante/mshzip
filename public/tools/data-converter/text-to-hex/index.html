<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>텍스트 ↔ HEX 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">텍스트 ↔ HEX 변환기</h1>
          <p class="tool-description">텍스트를 16진수로, 16진수를 텍스트로 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="tool-options">
      <div class="tool-option">
        <label for="convertMode">변환 방향:</label>
        <select id="convertMode" onchange="TextToHex.updatePlaceholders()">
          <option value="textToHex">텍스트 → HEX</option>
          <option value="hexToText">HEX → 텍스트</option>
        </select>
      </div>
      <div class="tool-option">
        <label for="separator">구분자:</label>
        <select id="separator">
          <option value=" ">공백</option>
          <option value="">없음</option>
          <option value="-">하이픈 (-)</option>
          <option value=":">콜론 (:)</option>
          <option value="0x">0x 접두사</option>
        </select>
      </div>
      <div class="tool-option">
        <label for="hexCase">대소문자:</label>
        <select id="hexCase">
          <option value="upper">대문자 (A-F)</option>
          <option value="lower">소문자 (a-f)</option>
        </select>
      </div>
    </div>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 입력 패널 -->
      <div class="input-panel">
        <div class="panel-title">입력</div>
        <textarea
          id="inputText"
          class="tool-textarea"
          placeholder="텍스트를 입력하세요...&#10;예: Hello World"
          spellcheck="false"
        ></textarea>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-primary" onclick="TextToHex.convert()" aria-label="변환 →">
            변환 →
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="TextToHex.swap()" aria-label="↕ 스왑">
            ↕ 스왑
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="TextToHex.clear()" aria-label="초기화">
            초기화
          </button>
        </div>
      </div>

      <!-- 출력 패널 -->
      <div class="output-panel" style="position: relative;">
        <div class="panel-title">출력</div>
        <button class="copy-btn" onclick="TextToHex.copyOutput()" aria-label="복사">복사</button>
        <textarea
          id="outputText"
          class="tool-textarea"
          placeholder="변환 결과가 여기에 표시됩니다..."
          spellcheck="false"
          readonly
        ></textarea>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-secondary" onclick="TextToHex.download()" aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="tool-stats">
      <div class="tool-stat">
        <div class="tool-stat-value" id="statChars">0</div>
        <div class="tool-stat-label">문자 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statBytes">0</div>
        <div class="tool-stat-label">바이트</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statHexChars">0</div>
        <div class="tool-stat-label">HEX 문자</div>
      </div>
    </div>

    <!-- HEX 테이블 참조 -->
    <div class="tool-help" style="margin-top: 1rem;">
      <div class="help-title">HEX 예시</div>
      <div class="help-content" style="font-family: monospace; font-size: 0.85rem;">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem;">
          <span>A = 41</span>
          <span>B = 42</span>
          <span>Z = 5A</span>
          <span>a = 61</span>
          <span>z = 7A</span>
          <span>0 = 30</span>
          <span>9 = 39</span>
          <span>공백 = 20</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="text-to-hex.js"></script>
</body>
</html>
