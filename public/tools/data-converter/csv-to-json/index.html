<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV → JSON 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">CSV → JSON 변환기</h1>
          <p class="tool-description">CSV 데이터를 JSON 형식으로 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="tool-options">
      <div class="tool-option">
        <label for="delimiter">구분자:</label>
        <select id="delimiter">
          <option value=",">쉼표 (,)</option>
          <option value=";">세미콜론 (;)</option>
          <option value="\t">탭</option>
          <option value="|">파이프 (|)</option>
        </select>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="hasHeader" checked> 첫 행이 헤더
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="trimValues" checked> 공백 제거
        </label>
      </div>
    </div>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 입력 패널 -->
      <div class="input-panel">
        <div class="panel-title">CSV 입력</div>
        <textarea
          id="csvInput"
          class="tool-textarea"
          placeholder="CSV 데이터를 입력하세요...&#10;예:&#10;이름,나이,도시&#10;홍길동,30,서울&#10;김철수,25,부산"
          spellcheck="false"
        ></textarea>
        <div class="tool-actions">
          <label class="tool-btn tool-btn-secondary" style="cursor: pointer;">
            파일 선택
            <input type="file" accept=".csv,.txt" style="display: none;" onchange="CsvToJson.loadFile(this)">
          </label>
          <button class="tool-btn tool-btn-primary" onclick="CsvToJson.convert()" aria-label="변환 →">
            변환 →
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="CsvToJson.clear()" aria-label="초기화">
            초기화
          </button>
        </div>
      </div>

      <!-- 출력 패널 -->
      <div class="output-panel" style="position: relative;">
        <div class="panel-title">JSON 출력</div>
        <button class="copy-btn" onclick="CsvToJson.copyOutput()" aria-label="복사">복사</button>
        <textarea
          id="jsonOutput"
          class="tool-textarea"
          placeholder="변환 결과가 여기에 표시됩니다..."
          spellcheck="false"
          readonly
        ></textarea>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-secondary" onclick="CsvToJson.download()" aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="tool-stats">
      <div class="tool-stat">
        <div class="tool-stat-value" id="statRows">0</div>
        <div class="tool-stat-label">행 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statCols">0</div>
        <div class="tool-stat-label">열 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statSize">0 B</div>
        <div class="tool-stat-label">출력 크기</div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="csv-to-json.js"></script>
</body>
</html>
