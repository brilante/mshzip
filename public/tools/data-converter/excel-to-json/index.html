<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel → JSON 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="excel-to-json.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">Excel → JSON 변환기</h1>
          <p class="tool-description">Excel 파일(.xlsx, .xls)을 JSON으로 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="tool-options">
      <div class="tool-option">
        <label for="sheetSelect">시트 선택:</label>
        <select id="sheetSelect" disabled>
          <option value="">파일을 먼저 선택하세요</option>
        </select>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="hasHeader" checked> 첫 행이 헤더
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="trimValues" checked> 공백 제거
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="skipEmpty"> 빈 행 무시
        </label>
      </div>
    </div>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 입력 패널 -->
      <div class="input-panel">
        <div class="panel-title">Excel 파일 입력</div>
        <div class="file-drop-zone" id="dropZone">
          <div class="drop-zone-content">
            <div class="drop-zone-icon"></div>
            <div class="drop-zone-text">Excel 파일을 드래그하거나 클릭하여 선택</div>
            <div class="drop-zone-hint">.xlsx, .xls 파일 지원</div>
          </div>
          <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
        </div>
        <div id="fileInfo" class="file-info" style="display: none;">
          <div class="file-name" id="fileName"></div>
          <button class="tool-btn tool-btn-secondary" onclick="ExcelToJson.removeFile()" aria-label=""></button>
        </div>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-primary" onclick="ExcelToJson.convert()" id="convertBtn" disabled aria-label="변환 →">
            변환 →
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="ExcelToJson.clear()" aria-label="초기화">
            초기화
          </button>
        </div>
      </div>

      <!-- 출력 패널 -->
      <div class="output-panel" style="position: relative;">
        <div class="panel-title">JSON 출력</div>
        <button class="copy-btn" onclick="ExcelToJson.copyOutput()" aria-label="복사">복사</button>
        <textarea
          id="jsonOutput"
          class="tool-textarea"
          placeholder="변환 결과가 여기에 표시됩니다..."
          spellcheck="false"
          readonly
        ></textarea>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-secondary" onclick="ExcelToJson.download()" aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="tool-stats">
      <div class="tool-stat">
        <div class="tool-stat-value" id="statSheets">0</div>
        <div class="tool-stat-label">시트 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statRows">0</div>
        <div class="tool-stat-label">행 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statCols">0</div>
        <div class="tool-stat-label">열 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statSize">0 B</div>
        <div class="tool-stat-label">출력 크기</div>
      </div>
    </div>
  </div>

  <!-- SheetJS 라이브러리 -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="excel-to-json.js"></script>
</body>
</html>
