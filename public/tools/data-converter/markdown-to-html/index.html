<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown → HTML 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    .preview-container {
      background: white;
      color: #333;
      padding: 20px;
      border-radius: 8px;
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--tools-border);
    }
    .preview-container h1 { font-size: 2em; font-weight: bold; margin: 0.5em 0; border-bottom: 1px solid #eee; }
    .preview-container h2 { font-size: 1.5em; font-weight: bold; margin: 0.5em 0; }
    .preview-container h3 { font-size: 1.17em; font-weight: bold; margin: 0.5em 0; }
    .preview-container p { margin: 1em 0; line-height: 1.6; }
    .preview-container ul, .preview-container ol { margin: 1em 0; padding-left: 2em; }
    .preview-container li { margin: 0.5em 0; }
    .preview-container code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
    .preview-container pre { background: #f4f4f4; padding: 12px; border-radius: 6px; overflow-x: auto; }
    .preview-container pre code { background: none; padding: 0; }
    .preview-container blockquote { border-left: 4px solid #ddd; margin: 1em 0; padding: 0.5em 1em; color: #666; }
    .preview-container a { color: #0066cc; }
    .preview-container table { border-collapse: collapse; margin: 1em 0; width: 100%; }
    .preview-container th, .preview-container td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .preview-container th { background: #f5f5f5; }
    .preview-container img { max-width: 100%; }
    .preview-container hr { border: none; border-top: 1px solid #ddd; margin: 2em 0; }
    .tab-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      padding: 8px 16px;
      border: 1px solid var(--tools-border);
      background: var(--tools-bg-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">Markdown → HTML 변환기</h1>
          <p class="tool-description">Markdown을 HTML로 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="tool-options">
      <div class="tool-option">
        <label>
          <input type="checkbox" id="gfm" checked> GitHub Flavored Markdown
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="breaks"> 줄바꿈 유지
        </label>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="sanitize" checked> XSS 방지 (권장)
        </label>
      </div>
    </div>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 입력 패널 -->
      <div class="input-panel">
        <div class="panel-title">Markdown 입력</div>
        <textarea
          id="markdownInput"
          class="tool-textarea"
          placeholder="Markdown을 입력하세요...&#10;&#10;# 제목&#10;## 부제목&#10;&#10;**굵게** _기울임_ ~~취소선~~&#10;&#10;- 리스트 1&#10;- 리스트 2&#10;&#10;[링크](https://example.com)&#10;&#10;```javascript&#10;console.log('Hello');&#10;```"
          spellcheck="false"
          oninput="MarkdownToHtml.liveConvert()"
        ></textarea>
        <div class="tool-actions">
          <label class="tool-btn tool-btn-secondary" style="cursor: pointer;">
            파일 선택
            <input type="file" accept=".md,.markdown,.txt" style="display: none;" onchange="MarkdownToHtml.loadFile(this)">
          </label>
          <button class="tool-btn tool-btn-primary" onclick="MarkdownToHtml.convert()" aria-label="변환 →">
            변환 →
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="MarkdownToHtml.clear()" aria-label="초기화">
            초기화
          </button>
        </div>
      </div>

      <!-- 출력 패널 -->
      <div class="output-panel" style="position: relative;">
        <div class="panel-title">출력</div>
        <button class="copy-btn" onclick="MarkdownToHtml.copyOutput()" aria-label="복사">복사</button>

        <div class="tab-buttons">
          <button class="tab-btn active" onclick="MarkdownToHtml.showTab('preview')" id="tabPreview" aria-label="미리보기">미리보기</button>
          <button class="tab-btn" onclick="MarkdownToHtml.showTab('html')" id="tabHtml" aria-label="HTML 코드">HTML 코드</button>
        </div>

        <div id="previewPanel" class="preview-container"></div>
        <textarea
          id="htmlOutput"
          class="tool-textarea"
          placeholder="HTML 코드가 여기에 표시됩니다..."
          spellcheck="false"
          readonly
          style="display: none;"
        ></textarea>

        <div class="tool-actions">
          <button class="tool-btn tool-btn-secondary" onclick="MarkdownToHtml.download()" aria-label="HTML 다운로드">
            HTML 다운로드
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="MarkdownToHtml.downloadFull()" aria-label="전체 HTML 다운로드">
            전체 HTML 다운로드
          </button>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="tool-stats">
      <div class="tool-stat">
        <div class="tool-stat-value" id="statChars">0</div>
        <div class="tool-stat-label">문자 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statWords">0</div>
        <div class="tool-stat-label">단어 수</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statLines">0</div>
        <div class="tool-stat-label">줄 수</div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="markdown-to-html.js"></script>
</body>
</html>
