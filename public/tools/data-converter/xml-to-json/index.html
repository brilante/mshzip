<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XML ↔ JSON - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .converter-container {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: stretch;
    }
    @media (max-width: 768px) {
      .converter-container {
        grid-template-columns: 1fr;
      }
      .arrow-section { flex-direction: row !important; }
    }
    .code-panel {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 20px;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--tools-text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-badge {
      padding: 2px 8px;
      background: var(--tools-primary);
      color: white;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .panel-badge.json { background: #f59e0b; }
    .panel-badge.xml { background: #10b981; }
    .panel-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      padding: 6px 12px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .code-area {
      width: 100%;
      min-height: 350px;
      padding: 14px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-family: 'Consolas', monospace;
      font-size: 13px;
      resize: vertical;
      line-height: 1.5;
      tab-size: 2;
    }
    .code-area:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .arrow-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    .convert-btn {
      padding: 12px 20px;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .convert-btn.to-json {
      background: #f59e0b;
    }
    .convert-btn.to-json:hover {
      background: #d97706;
    }
    .convert-btn.to-xml {
      background: #10b981;
    }
    .convert-btn.to-xml:hover {
      background: #059669;
    }
    .stats-bar {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: var(--tools-text-secondary);
    }
    .sample-section {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }
    .sample-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 12px;
    }
    .sample-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .sample-btn {
      padding: 8px 14px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .sample-btn:hover {
      border-color: var(--tools-primary);
      color: var(--tools-primary);
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">XML ↔ JSON</h1>
          <p class="tool-description">XML과 JSON 상호 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="converter-container">
        <!-- XML 패널 -->
        <div class="code-panel">
          <div class="panel-header">
            <span class="panel-title">
              <span class="panel-badge xml">XML</span>
              XML 입력
            </span>
            <div class="panel-actions">
              <button class="action-btn" onclick="XmlJson.paste('xml')" aria-label="붙여넣기">붙여넣기</button>
              <button class="action-btn" onclick="XmlJson.copy('xml')" aria-label="복사">복사</button>
            </div>
          </div>
          <textarea
            class="code-area"
            id="xmlInput"
            placeholder="XML 코드를 입력하세요..."
            oninput="XmlJson.updateStats()"
          ></textarea>
          <div class="stats-bar">
            <span id="xmlStats">0자</span>
          </div>
        </div>

        <!-- 변환 버튼 -->
        <div class="arrow-section">
          <button class="convert-btn to-json" onclick="XmlJson.toJson()" aria-label="→ JSON">
            → JSON
          </button>
          <button class="convert-btn to-xml" onclick="XmlJson.toXml()" aria-label="← XML">
            ← XML
          </button>
        </div>

        <!-- JSON 패널 -->
        <div class="code-panel">
          <div class="panel-header">
            <span class="panel-title">
              <span class="panel-badge json">JSON</span>
              JSON 출력
            </span>
            <div class="panel-actions">
              <button class="action-btn" onclick="XmlJson.paste('json')" aria-label="붙여넣기">붙여넣기</button>
              <button class="action-btn" onclick="XmlJson.copy('json')" aria-label="복사">복사</button>
            </div>
          </div>
          <textarea
            class="code-area"
            id="jsonInput"
            placeholder="JSON 코드를 입력하세요..."
            oninput="XmlJson.updateStats()"
          ></textarea>
          <div class="stats-bar">
            <span id="jsonStats">0자</span>
          </div>
        </div>
      </div>

      <!-- 샘플 -->
      <div class="sample-section">
        <div class="sample-title">샘플 데이터</div>
        <div class="sample-btns">
          <button class="sample-btn" onclick="XmlJson.loadSample('simple')" aria-label="간단한 XML">간단한 XML</button>
          <button class="sample-btn" onclick="XmlJson.loadSample('nested')" aria-label="중첩 XML">중첩 XML</button>
          <button class="sample-btn" onclick="XmlJson.loadSample('attributes')" aria-label="속성 포함">속성 포함</button>
          <button class="sample-btn" onclick="XmlJson.loadSample('json')" aria-label="JSON 샘플">JSON 샘플</button>
        </div>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">XML ↔ JSON 변환 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>XML → JSON</strong>: XML 요소가 JSON 객체로 변환</li>
          <li><strong>JSON → XML</strong>: JSON 객체가 XML 요소로 변환</li>
          <li>XML 속성은 <code>@속성명</code> 형태로 변환됩니다</li>
          <li>텍스트 내용은 <code>#text</code>로 표현됩니다</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="xml-to-json.js"></script>
</body>
</html>
