<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 인코더/디코더 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">URL 인코더/디코더</h1>
          <p class="tool-description">URL 인코딩 및 디코딩 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="tool-options">
      <div class="tool-option">
        <label for="encodeMode">모드:</label>
        <select id="encodeMode">
          <option value="component">encodeURIComponent (권장)</option>
          <option value="uri">encodeURI</option>
          <option value="escape">escape (레거시)</option>
        </select>
      </div>
      <div class="tool-option">
        <label>
          <input type="checkbox" id="autoConvert"> 자동 변환
        </label>
      </div>
    </div>

    <!-- 메인 패널 -->
    <div class="tool-panel">
      <!-- 입력 패널 -->
      <div class="input-panel">
        <div class="panel-title">원본 텍스트</div>
        <textarea
          id="urlInput"
          class="tool-textarea"
          placeholder="인코딩/디코딩할 URL 또는 텍스트를 입력하세요...&#10;예: https://example.com/path?name=홍길동&city=서울"
          spellcheck="false"
        ></textarea>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-primary" onclick="UrlEncoder.encode()" aria-label="인코딩 →">
            인코딩 →
          </button>
          <button class="tool-btn tool-btn-primary" onclick="UrlEncoder.decode()" aria-label="← 디코딩">
            ← 디코딩
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="UrlEncoder.clear()" aria-label="초기화">
            초기화
          </button>
        </div>
      </div>

      <!-- 출력 패널 -->
      <div class="output-panel" style="position: relative;">
        <div class="panel-title">결과</div>
        <button class="copy-btn" onclick="UrlEncoder.copyOutput()" aria-label="복사">복사</button>
        <textarea
          id="urlOutput"
          class="tool-textarea"
          placeholder="결과가 여기에 표시됩니다..."
          spellcheck="false"
          readonly
        ></textarea>
        <div class="tool-actions">
          <button class="tool-btn tool-btn-secondary" onclick="UrlEncoder.swap()" aria-label="↔ 입출력 교체">
            ↔ 입출력 교체
          </button>
          <button class="tool-btn tool-btn-secondary" onclick="UrlEncoder.download()" aria-label="다운로드">
            다운로드
          </button>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="tool-stats" id="urlStats">
      <div class="tool-stat">
        <div class="tool-stat-value" id="statOriginal">0</div>
        <div class="tool-stat-label">원본 길이</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statEncoded">0</div>
        <div class="tool-stat-label">변환 후 길이</div>
      </div>
      <div class="tool-stat">
        <div class="tool-stat-value" id="statDiff">0%</div>
        <div class="tool-stat-label">크기 변화</div>
      </div>
    </div>

    <!-- URL 분석 -->
    <div class="input-panel" style="margin-top: 16px;">
      <div class="panel-title">URL 파라미터 분석</div>
      <div id="urlAnalysis" style="font-family: monospace; font-size: 13px; padding: 12px; background: var(--tools-bg); border-radius: 8px; min-height: 100px;">
        URL을 입력하면 파라미터가 분석됩니다.
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="url-encoder.js"></script>
</body>
</html>
