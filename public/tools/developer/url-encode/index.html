<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 인코딩 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .encode-container {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: stretch;
    }
    @media (max-width: 768px) {
      .encode-container {
        grid-template-columns: 1fr;
      }
      .arrow-section {
        transform: rotate(90deg);
      }
    }
    .text-panel {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 20px;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--tools-text);
    }
    .panel-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      padding: 6px 12px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .text-area {
      width: 100%;
      min-height: 300px;
      padding: 14px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-family: 'Consolas', monospace;
      font-size: 14px;
      resize: vertical;
      line-height: 1.5;
    }
    .text-area:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .arrow-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    .convert-btn {
      padding: 12px 20px;
      background: var(--tools-primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .convert-btn:hover {
      background: #2563eb;
      transform: scale(1.05);
    }
    .convert-btn.reverse {
      background: var(--tools-secondary);
    }
    .convert-btn.reverse:hover {
      background: #7c3aed;
    }
    .options-section {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }
    .options-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 12px;
    }
    .options-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .option-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--tools-primary);
    }
    .option-item label {
      font-size: 14px;
      color: var(--tools-text);
      cursor: pointer;
    }
    .stats-bar {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: var(--tools-text-secondary);
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">URL 인코딩</h1>
          <p class="tool-description">URL 인코딩 및 디코딩 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="encode-container">
        <!-- 입력 패널 -->
        <div class="text-panel">
          <div class="panel-header">
            <span class="panel-title">원본 텍스트</span>
            <div class="panel-actions">
              <button class="action-btn" onclick="UrlEncode.paste('input')" aria-label="붙여넣기">붙여넣기</button>
              <button class="action-btn" onclick="UrlEncode.clear('input')" aria-label="지우기">지우기</button>
            </div>
          </div>
          <textarea
            class="text-area"
            id="inputText"
            placeholder="인코딩할 텍스트나 URL을 입력하세요..."
            oninput="UrlEncode.updateStats('input')"
          ></textarea>
          <div class="stats-bar">
            <span id="inputStats">0자</span>
          </div>
        </div>

        <!-- 변환 버튼 -->
        <div class="arrow-section">
          <button class="convert-btn" onclick="UrlEncode.encode()" aria-label="인코딩 →">
            인코딩 →
          </button>
          <button class="convert-btn reverse" onclick="UrlEncode.decode()" aria-label="← 디코딩">
            ← 디코딩
          </button>
        </div>

        <!-- 출력 패널 -->
        <div class="text-panel">
          <div class="panel-header">
            <span class="panel-title">결과</span>
            <div class="panel-actions">
              <button class="action-btn" onclick="UrlEncode.copy()" aria-label="복사">복사</button>
              <button class="action-btn" onclick="UrlEncode.swap()" aria-label="교환">교환</button>
            </div>
          </div>
          <textarea
            class="text-area"
            id="outputText"
            placeholder="결과가 여기에 표시됩니다..."
            readonly
          ></textarea>
          <div class="stats-bar">
            <span id="outputStats">0자</span>
          </div>
        </div>
      </div>

      <!-- 옵션 -->
      <div class="options-section">
        <div class="options-title">인코딩 옵션</div>
        <div class="options-grid">
          <div class="option-item">
            <input type="checkbox" id="encodeAll" checked>
            <label for="encodeAll">전체 인코딩 (모든 특수문자)</label>
          </div>
          <div class="option-item">
            <input type="checkbox" id="encodeSpaces">
            <label for="encodeSpaces">공백을 + 로 변환</label>
          </div>
          <div class="option-item">
            <input type="checkbox" id="componentMode">
            <label for="componentMode">URI 컴포넌트 모드</label>
          </div>
        </div>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">URL 인코딩 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>인코딩</strong>: 특수문자를 %XX 형식으로 변환</li>
          <li><strong>디코딩</strong>: %XX 형식을 원래 문자로 복원</li>
          <li><strong>URI 컴포넌트</strong>: 쿼리 파라미터 인코딩에 적합</li>
          <li>한글, 특수문자, 공백 등이 안전하게 변환됩니다</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="url-encode.js"></script>
</body>
</html>
