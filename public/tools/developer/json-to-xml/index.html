<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON ↔ XML 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .converter-layout {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: stretch;
    }
    .editor-panel {
      display: flex;
      flex-direction: column;
    }
    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .editor-title {
      font-weight: 600;
      color: var(--text-primary);
    }
    .editor-actions {
      display: flex;
      gap: 0.5rem;
    }
    .editor-textarea {
      flex: 1;
      min-height: 400px;
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: vertical;
    }
    .swap-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
    }
    .swap-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .options-row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .option-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .stats-row {
      display: flex;
      gap: 2rem;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .stat-item {
      display: flex;
      gap: 0.5rem;
    }
    .stat-label {
      color: var(--text-secondary);
    }
    @media (max-width: 900px) {
      .converter-layout {
        grid-template-columns: 1fr;
      }
      .swap-panel {
        flex-direction: row;
        padding: 1rem 0;
      }
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">JSON ↔ XML 변환기</h1>
          <p class="tool-description">JSON과 XML 형식 상호 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="options-row">
      <div class="option-group">
        <label>들여쓰기:</label>
        <select id="indent" class="tool-select">
          <option value="2" selected>2 spaces</option>
          <option value="4">4 spaces</option>
        </select>
      </div>
      <div class="option-group">
        <label>루트 태그:</label>
        <input type="text" id="rootTag" class="tool-input" value="root" style="width: 100px">
      </div>
      <div class="option-group">
        <input type="checkbox" id="includeDeclaration" checked>
        <label for="includeDeclaration">XML 선언 포함</label>
      </div>
    </div>

    <!-- 변환기 레이아웃 -->
    <div class="converter-layout">
      <!-- JSON 입력 -->
      <div class="editor-panel">
        <div class="editor-header">
          <span class="editor-title">JSON</span>
          <div class="editor-actions">
            <input type="file" id="jsonFile" accept=".json" hidden onchange="JsonToXml.loadFile(this, 'json')">
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="document.getElementById('jsonFile').click()" aria-label="파일">파일</button>
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="JsonToXml.copyOutput('json')" aria-label="복사">복사</button>
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="JsonToXml.downloadJson()" aria-label="저장">저장</button>
          </div>
        </div>
        <textarea id="jsonInput" class="tool-input editor-textarea" placeholder='{"name": "홍길동", "age": 30}'></textarea>
        <button class="tool-btn tool-btn-primary" style="margin-top: 0.5rem" onclick="JsonToXml.convertToXml()" aria-label="JSON → XML 변환 ">
          JSON → XML 변환 </button>
      </div>

      <!-- 교체 버튼 -->
      <div class="swap-panel">
        <button class="tool-btn tool-btn-secondary swap-btn" onclick="JsonToXml.swap()" title="입출력 교체" aria-label="⇄">⇄</button>
      </div>

      <!-- XML 출력 -->
      <div class="editor-panel">
        <div class="editor-header">
          <span class="editor-title">XML</span>
          <div class="editor-actions">
            <input type="file" id="xmlFile" accept=".xml" hidden onchange="JsonToXml.loadFile(this, 'xml')">
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="document.getElementById('xmlFile').click()" aria-label="파일">파일</button>
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="JsonToXml.copyOutput('xml')" aria-label="복사">복사</button>
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="JsonToXml.downloadXml()" aria-label="저장">저장</button>
          </div>
        </div>
        <textarea id="xmlOutput" class="tool-input editor-textarea" placeholder="<root>&#10;  <name>홍길동</name>&#10;  <age>30</age>&#10;</root>"></textarea>
        <button class="tool-btn tool-btn-primary" style="margin-top: 0.5rem" onclick="JsonToXml.convertToJson()" aria-label="XML → JSON 변환">
          XML → JSON 변환
        </button>
      </div>
    </div>

    <!-- 통계 -->
    <div class="stats-row" style="margin-top: 1rem">
      <div class="stat-item">
        <span class="stat-label">JSON 크기:</span>
        <span id="statJsonSize">0 B</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">XML 크기:</span>
        <span id="statXmlSize">0 B</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">상태:</span>
        <span id="statStatus">-</span>
      </div>
      <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="JsonToXml.clear()" style="margin-left: auto" aria-label="초기화">초기화</button>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="json-to-xml.js"></script>
</body>
</html>
