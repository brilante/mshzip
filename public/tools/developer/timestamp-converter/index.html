<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타임스탬프 변환 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .converter-section {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .input-field {
      flex: 1;
      min-width: 200px;
    }
    .input-field label {
      display: block;
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 6px;
    }
    .input-field input, .input-field select {
      width: 100%;
      padding: 10px 14px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-size: 14px;
      font-family: 'Consolas', monospace;
    }
    .input-field input:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .result-box {
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--tools-border);
    }
    .result-row:last-child {
      border-bottom: none;
    }
    .result-label {
      font-size: 13px;
      color: var(--tools-text-secondary);
    }
    .result-value {
      font-family: 'Consolas', monospace;
      font-size: 14px;
      color: var(--tools-text);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .result-value:hover {
      background: rgba(59, 130, 246, 0.1);
    }
    .current-time {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(147, 51, 234, 0.1));
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .current-time-label {
      font-size: 13px;
      color: var(--tools-text-secondary);
      margin-bottom: 8px;
    }
    .current-time-value {
      font-size: 32px;
      font-weight: 700;
      font-family: 'Consolas', monospace;
      color: var(--tools-primary);
    }
    .current-date {
      font-size: 14px;
      color: var(--tools-text);
      margin-top: 8px;
    }
    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .quick-btn {
      padding: 6px 12px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-btn:hover {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .timezone-info {
      font-size: 12px;
      color: var(--tools-text-secondary);
      margin-top: 8px;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">타임스탬프 변환</h1>
          <p class="tool-description">Unix Timestamp와 날짜/시간 상호 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <!-- 현재 시간 -->
    <div class="current-time">
      <div class="current-time-label">현재 Unix Timestamp</div>
      <div class="current-time-value" id="currentTimestamp">0</div>
      <div class="current-date" id="currentDate"></div>
      <div class="quick-actions">
        <button class="quick-btn" onclick="TimestampConverter.copyCurrentTimestamp()" aria-label="복사">복사</button>
        <button class="quick-btn" onclick="TimestampConverter.useCurrentTimestamp()" aria-label="변환기에 사용">변환기에 사용</button>
      </div>
    </div>

    <div class="tool-panel">
      <!-- Timestamp → 날짜 변환 -->
      <div class="converter-section">
        <div class="section-title">Timestamp → 날짜</div>
        <div class="input-group">
          <div class="input-field" style="flex: 2;">
            <label>Unix Timestamp</label>
            <input type="text" id="timestampInput" placeholder="예: 1704067200" oninput="TimestampConverter.convertToDate()" aria-label="예: 1704067200">
          </div>
          <div class="input-field">
            <label>단위</label>
            <select id="timestampUnit" onchange="TimestampConverter.convertToDate()">
              <option value="s">초 (Seconds)</option>
              <option value="ms">밀리초 (Milliseconds)</option>
            </select>
          </div>
        </div>
        <div class="result-box" id="toDateResult" style="display: none;">
          <div class="result-row">
            <span class="result-label">로컬 시간</span>
            <span class="result-value" id="localTime" onclick="TimestampConverter.copy(this)"></span>
          </div>
          <div class="result-row">
            <span class="result-label">UTC 시간</span>
            <span class="result-value" id="utcTime" onclick="TimestampConverter.copy(this)"></span>
          </div>
          <div class="result-row">
            <span class="result-label">ISO 8601</span>
            <span class="result-value" id="isoTime" onclick="TimestampConverter.copy(this)"></span>
          </div>
          <div class="result-row">
            <span class="result-label">상대 시간</span>
            <span class="result-value" id="relativeTime" onclick="TimestampConverter.copy(this)"></span>
          </div>
        </div>
      </div>

      <!-- 날짜 → Timestamp 변환 -->
      <div class="converter-section">
        <div class="section-title">날짜 → Timestamp</div>
        <div class="input-group">
          <div class="input-field">
            <label>날짜</label>
            <input type="date" id="dateInput" onchange="TimestampConverter.convertToTimestamp()">
          </div>
          <div class="input-field">
            <label>시간</label>
            <input type="time" id="timeInput" step="1" value="00:00:00" onchange="TimestampConverter.convertToTimestamp()">
          </div>
          <div class="input-field">
            <label>타임존</label>
            <select id="timezone" onchange="TimestampConverter.convertToTimestamp()">
              <option value="local">로컬 (KST)</option>
              <option value="utc">UTC</option>
            </select>
          </div>
        </div>
        <div class="result-box" id="toTimestampResult" style="display: none;">
          <div class="result-row">
            <span class="result-label">초 (Seconds)</span>
            <span class="result-value" id="resultSeconds" onclick="TimestampConverter.copy(this)"></span>
          </div>
          <div class="result-row">
            <span class="result-label">밀리초 (Milliseconds)</span>
            <span class="result-value" id="resultMillis" onclick="TimestampConverter.copy(this)"></span>
          </div>
        </div>
        <div class="timezone-info" id="timezoneInfo"></div>
      </div>

      <!-- 빠른 참조 -->
      <div class="converter-section">
        <div class="section-title">빠른 참조</div>
        <div class="quick-actions">
          <button class="quick-btn" onclick="TimestampConverter.quickRef('start-today')" aria-label="오늘 시작">오늘 시작</button>
          <button class="quick-btn" onclick="TimestampConverter.quickRef('end-today')" aria-label="오늘 끝">오늘 끝</button>
          <button class="quick-btn" onclick="TimestampConverter.quickRef('start-week')" aria-label="이번 주 시작">이번 주 시작</button>
          <button class="quick-btn" onclick="TimestampConverter.quickRef('start-month')" aria-label="이번 달 시작">이번 달 시작</button>
          <button class="quick-btn" onclick="TimestampConverter.quickRef('start-year')" aria-label="올해 시작">올해 시작</button>
          <button class="quick-btn" onclick="TimestampConverter.quickRef('1hour')" aria-label="+1시간">+1시간</button>
          <button class="quick-btn" onclick="TimestampConverter.quickRef('1day')" aria-label="+1일">+1일</button>
          <button class="quick-btn" onclick="TimestampConverter.quickRef('1week')" aria-label="+1주">+1주</button>
        </div>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">타임스탬프 변환 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>Unix Timestamp</strong>: 1970년 1월 1일 00:00:00 UTC 이후 경과 시간</li>
          <li><strong>초/밀리초</strong>: JavaScript는 밀리초, 대부분의 시스템은 초 단위 사용</li>
          <li>결과값을 클릭하면 클립보드에 복사됩니다</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="timestamp-converter.js"></script>
</body>
</html>
