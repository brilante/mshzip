<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코드 비교 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="diff-checker.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">코드 비교</h1>
          <p class="tool-description">두 텍스트/코드 간 차이점 비교</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 옵션 -->
    <div class="options-row">
      <div class="option-group">
        <input type="checkbox" id="ignoreWhitespace">
        <label for="ignoreWhitespace">공백 무시</label>
      </div>
      <div class="option-group">
        <input type="checkbox" id="ignoreCase">
        <label for="ignoreCase">대소문자 무시</label>
      </div>
      <div class="option-group">
        <label>비교 모드:</label>
        <select id="diffMode" class="tool-select">
          <option value="line" selected>줄 단위</option>
          <option value="word">단어 단위</option>
          <option value="char">문자 단위</option>
        </select>
      </div>
      <button class="tool-btn tool-btn-primary" onclick="DiffChecker.compare()" aria-label="비교">비교</button>
      <button class="tool-btn tool-btn-secondary" onclick="DiffChecker.swap()" aria-label="⇄ 교체">⇄ 교체</button>
      <button class="tool-btn tool-btn-secondary" onclick="DiffChecker.clear()" aria-label="초기화">초기화</button>
    </div>

    <!-- 입력 영역 -->
    <div class="diff-input-layout">
      <div class="input-panel">
        <div class="input-header">
          <span class="input-title">원본 (Original)</span>
          <div class="input-actions">
            <input type="file" id="file1" hidden onchange="DiffChecker.loadFile(this, 'original')">
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="document.getElementById('file1').click()" aria-label=""></button>
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="DiffChecker.paste('original')" aria-label=""></button>
          </div>
        </div>
        <textarea id="originalInput" class="tool-input diff-textarea" placeholder="원본 텍스트를 입력하세요..."></textarea>
      </div>

      <div class="input-panel">
        <div class="input-header">
          <span class="input-title">수정본 (Modified)</span>
          <div class="input-actions">
            <input type="file" id="file2" hidden onchange="DiffChecker.loadFile(this, 'modified')">
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="document.getElementById('file2').click()" aria-label=""></button>
            <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="DiffChecker.paste('modified')" aria-label=""></button>
          </div>
        </div>
        <textarea id="modifiedInput" class="tool-input diff-textarea" placeholder="수정된 텍스트를 입력하세요..."></textarea>
      </div>
    </div>

    <!-- 결과 영역 -->
    <div class="diff-result-section">
      <div class="result-header">
        <span class="result-title">비교 결과</span>
        <div class="result-stats">
          <span class="stat-added">+ 추가: <span id="addedCount">0</span></span>
          <span class="stat-removed">- 삭제: <span id="removedCount">0</span></span>
          <span class="stat-unchanged">= 동일: <span id="unchangedCount">0</span></span>
        </div>
        <button class="tool-btn tool-btn-secondary tool-btn-sm" onclick="DiffChecker.copyResult()" aria-label="복사">복사</button>
      </div>
      <div id="diffResult" class="diff-result"></div>
    </div>

    <!-- 범례 -->
    <div class="legend">
      <span class="legend-item"><span class="legend-color added"></span> 추가됨</span>
      <span class="legend-item"><span class="legend-color removed"></span> 삭제됨</span>
      <span class="legend-item"><span class="legend-color unchanged"></span> 동일</span>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="diff-checker.js"></script>
</body>
</html>
