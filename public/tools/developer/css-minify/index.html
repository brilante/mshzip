<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 압축 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .minify-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .minify-container { grid-template-columns: 1fr; }
    }
    .code-panel {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 20px;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--tools-text);
    }
    .panel-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      padding: 6px 12px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--tools-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: var(--tools-primary);
      color: white;
      border-color: var(--tools-primary);
    }
    .code-area {
      width: 100%;
      min-height: 350px;
      padding: 14px;
      background: var(--tools-bg);
      border: 1px solid var(--tools-border);
      border-radius: 8px;
      color: var(--tools-text);
      font-family: 'Consolas', monospace;
      font-size: 13px;
      resize: vertical;
      line-height: 1.5;
      tab-size: 2;
    }
    .code-area:focus {
      outline: none;
      border-color: var(--tools-primary);
    }
    .stats-bar {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: var(--tools-text-secondary);
    }
    .control-section {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .minify-btn {
      padding: 12px 28px;
      background: #f59e0b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .minify-btn:hover {
      background: #d97706;
      transform: translateY(-2px);
    }
    .beautify-btn {
      padding: 12px 28px;
      background: #8b5cf6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .beautify-btn:hover {
      background: #7c3aed;
      transform: translateY(-2px);
    }
    .options-section {
      background: var(--tools-card-bg);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }
    .options-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tools-text);
      margin-bottom: 12px;
    }
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .option-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #f59e0b;
    }
    .option-item label {
      font-size: 14px;
      color: var(--tools-text);
      cursor: pointer;
    }
    .savings-badge {
      display: inline-block;
      padding: 4px 10px;
      background: #10b981;
      color: white;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">CSS 압축</h1>
          <p class="tool-description">CSS 코드 압축 및 정리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() {
        if (window.self !== window.top) window.parent.postMessage('tools:back', '*');
        else window.history.back();
      }
    </script>

    <div class="tool-panel">
      <div class="minify-container">
        <div class="code-panel">
          <div class="panel-header">
            <span class="panel-title">입력 CSS</span>
            <div class="panel-actions">
              <button class="action-btn" onclick="CssMinify.paste()" aria-label="붙여넣기">붙여넣기</button>
              <button class="action-btn" onclick="CssMinify.loadSample()" aria-label="샘플">샘플</button>
            </div>
          </div>
          <textarea
            class="code-area"
            id="inputCode"
            placeholder="CSS 코드를 입력하세요..."
            oninput="CssMinify.updateStats()"
          ></textarea>
          <div class="stats-bar">
            <span id="inputStats">0자 / 0 bytes</span>
          </div>
        </div>

        <div class="code-panel">
          <div class="panel-header">
            <span class="panel-title">결과</span>
            <div class="panel-actions">
              <button class="action-btn" onclick="CssMinify.copy()" aria-label="복사">복사</button>
              <button class="action-btn" onclick="CssMinify.download()" aria-label="다운로드">다운로드</button>
            </div>
          </div>
          <textarea
            class="code-area"
            id="outputCode"
            placeholder="압축된 코드가 여기에 표시됩니다..."
            readonly
          ></textarea>
          <div class="stats-bar">
            <span id="outputStats">0자 / 0 bytes</span>
            <span id="savingsInfo"></span>
          </div>
        </div>
      </div>

      <div class="control-section">
        <button class="minify-btn" onclick="CssMinify.minify()" aria-label="압축하기">압축하기</button>
        <button class="beautify-btn" onclick="CssMinify.beautify()" aria-label="정리하기">정리하기</button>
      </div>

      <div class="options-section">
        <div class="options-title">압축 옵션</div>
        <div class="options-grid">
          <div class="option-item">
            <input type="checkbox" id="removeComments" checked>
            <label for="removeComments">주석 제거</label>
          </div>
          <div class="option-item">
            <input type="checkbox" id="removeWhitespace" checked>
            <label for="removeWhitespace">불필요한 공백 제거</label>
          </div>
          <div class="option-item">
            <input type="checkbox" id="removeLastSemicolon" checked>
            <label for="removeLastSemicolon">마지막 세미콜론 제거</label>
          </div>
          <div class="option-item">
            <input type="checkbox" id="shortenColors">
            <label for="shortenColors">색상 코드 축약 (#ffffff → #fff)</label>
          </div>
          <div class="option-item">
            <input type="checkbox" id="removeZeroUnits">
            <label for="removeZeroUnits">0 단위 제거 (0px → 0)</label>
          </div>
        </div>
      </div>
    </div>

    <div class="tool-help">
      <div class="help-title">CSS 압축 안내</div>
      <div class="help-content">
        <ul>
          <li><strong>압축</strong>: 주석, 공백을 제거하여 파일 크기 감소</li>
          <li><strong>정리</strong>: 코드를 읽기 쉽게 들여쓰기 적용</li>
          <li>프로덕션에서는 압축된 CSS 사용 권장</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="css-minify.js"></script>
</body>
</html>
