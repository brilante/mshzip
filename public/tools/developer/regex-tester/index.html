<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정규식 테스터 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="regex-tester.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <!-- 헤더 -->
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">정규식 테스터</h1>
          <p class="tool-description">정규표현식 패턴 테스트 및 매칭 확인</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">
          ← 뒤로
        </button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) {
        document.querySelector('.tool-header').style.display = 'none';
      }
      function goBack() {
        if (window.self !== window.top) {
          window.parent.postMessage('tools:back', '*');
        } else {
          window.history.back();
        }
      }
    </script>

    <!-- 메인 패널 -->
    <div class="tool-panel regex-panel">
      <!-- 정규식 입력 -->
      <div class="regex-input-section">
        <div class="input-label">
          <span class="format-name">정규식 패턴</span>
          <button class="copy-btn" onclick="RegexTester.copyPattern()" title="복사" aria-label=""></button>
        </div>
        <div class="regex-input-row">
          <span class="regex-delimiter">/</span>
          <input type="text" id="regexPattern" class="regex-input"
                 placeholder="[a-z]+@[a-z]+\.[a-z]+"
                 oninput="RegexTester.onPatternChange()" aria-label="[a-z]+@[a-z]+\.[a-z]+">
          <span class="regex-delimiter">/</span>
          <input type="text" id="regexFlags" class="regex-flags"
                 placeholder="g" maxlength="6"
                 oninput="RegexTester.onPatternChange()" aria-label="g">
        </div>

        <!-- 플래그 체크박스 -->
        <div class="flags-section">
          <label class="flag-checkbox">
            <input type="checkbox" id="flagG" checked onchange="RegexTester.updateFlags()">
            <span class="flag-label">g</span>
            <span class="flag-desc">전역 검색</span>
          </label>
          <label class="flag-checkbox">
            <input type="checkbox" id="flagI" onchange="RegexTester.updateFlags()">
            <span class="flag-label">i</span>
            <span class="flag-desc">대소문자 무시</span>
          </label>
          <label class="flag-checkbox">
            <input type="checkbox" id="flagM" onchange="RegexTester.updateFlags()">
            <span class="flag-label">m</span>
            <span class="flag-desc">여러 줄</span>
          </label>
          <label class="flag-checkbox">
            <input type="checkbox" id="flagS" onchange="RegexTester.updateFlags()">
            <span class="flag-label">s</span>
            <span class="flag-desc">점(.)이 줄바꿈 매칭</span>
          </label>
          <label class="flag-checkbox">
            <input type="checkbox" id="flagU" onchange="RegexTester.updateFlags()">
            <span class="flag-label">u</span>
            <span class="flag-desc">유니코드</span>
          </label>
        </div>

        <!-- 에러 메시지 -->
        <div id="regexError" class="regex-error" style="display: none;"></div>
      </div>

      <!-- 테스트 문자열 입력 -->
      <div class="test-input-section">
        <div class="input-label">
          <span class="format-name">테스트 문자열</span>
          <span class="match-count" id="matchCount"></span>
        </div>
        <div class="test-input-wrapper">
          <textarea id="testString" class="test-input" rows="6"
                    placeholder="테스트할 문자열을 입력하세요..."
                    oninput="RegexTester.onTestChange()"></textarea>
          <div id="highlightOverlay" class="highlight-overlay"></div>
        </div>
      </div>

      <!-- 매칭 결과 -->
      <div class="matches-section">
        <div class="section-header">
          <div class="section-title">매칭 결과</div>
          <button class="tool-btn tool-btn-sm" onclick="RegexTester.copyMatches()" aria-label="결과 복사">
            결과 복사
          </button>
        </div>
        <div id="matchesResult" class="matches-result">
          <div class="no-matches">정규식을 입력하고 테스트 문자열에서 매칭을 확인하세요.</div>
        </div>
      </div>

      <!-- 그룹 캡처 결과 -->
      <div class="groups-section" id="groupsSection" style="display: none;">
        <div class="section-header">
          <div class="section-title">캡처 그룹</div>
        </div>
        <div id="groupsResult" class="groups-result"></div>
      </div>

      <!-- 일반 패턴 라이브러리 -->
      <div class="patterns-section">
        <div class="section-header">
          <div class="section-title">자주 사용하는 패턴</div>
        </div>
        <div class="patterns-grid" id="patternsGrid">
          <!-- JS로 생성 -->
        </div>
      </div>
    </div>

    <!-- 도움말 -->
    <div class="tool-help">
      <div class="help-title">정규식 기본 문법</div>
      <div class="help-content">
        <div class="help-grid">
          <div class="help-item"><code>.</code> 아무 문자 1개</div>
          <div class="help-item"><code>\d</code> 숫자 [0-9]</div>
          <div class="help-item"><code>\w</code> 단어 문자 [a-zA-Z0-9_]</div>
          <div class="help-item"><code>\s</code> 공백 문자</div>
          <div class="help-item"><code>^</code> 문자열 시작</div>
          <div class="help-item"><code>$</code> 문자열 끝</div>
          <div class="help-item"><code>*</code> 0회 이상</div>
          <div class="help-item"><code>+</code> 1회 이상</div>
          <div class="help-item"><code>?</code> 0 또는 1회</div>
          <div class="help-item"><code>{n,m}</code> n~m회</div>
          <div class="help-item"><code>[abc]</code> a, b, c 중 하나</div>
          <div class="help-item"><code>(group)</code> 캡처 그룹</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="regex-tester.js"></script>
</body>
</html>
