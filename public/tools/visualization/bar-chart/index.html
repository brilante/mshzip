<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>막대 차트 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="bar-chart.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">막대 차트 생성기</h1>
      <p class="tool-description">데이터를 시각적인 막대 차트로 변환합니다</p>
    </header>

    <main class="tool-content">
      <!-- 차트 미리보기 -->
      <div class="chart-preview">
        <canvas id="barChart"></canvas>
      </div>

      <!-- 데이터 입력 -->
      <div class="data-section">
        <h3 class="section-title">데이터 입력</h3>
        <div class="data-input-area">
          <div class="input-row header-row">
            <span class="col-label">레이블</span>
            <span class="col-value">값</span>
            <span class="col-color">색상</span>
            <span class="col-action"></span>
          </div>
          <div id="dataRows"></div>
          <button class="add-row-btn" onclick="BarChart.addRow()" aria-label="+ 데이터 추가">+ 데이터 추가</button>
        </div>
      </div>

      <!-- 차트 설정 -->
      <div class="settings-section">
        <h3 class="section-title">차트 설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>차트 제목</label>
            <input type="text" id="chartTitle" class="form-input" value="막대 차트" onchange="BarChart.updateChart()">
          </div>
          <div class="setting-item">
            <label>방향</label>
            <select id="chartDirection" class="form-input" onchange="BarChart.updateChart()">
              <option value="vertical">세로</option>
              <option value="horizontal">가로</option>
            </select>
          </div>
          <div class="setting-item">
            <label>범례 표시</label>
            <select id="showLegend" class="form-input" onchange="BarChart.updateChart()">
              <option value="true">표시</option>
              <option value="false">숨김</option>
            </select>
          </div>
          <div class="setting-item">
            <label>애니메이션</label>
            <select id="animation" class="form-input" onchange="BarChart.updateChart()">
              <option value="true">사용</option>
              <option value="false">미사용</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 내보내기 -->
      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="BarChart.exportImage('png')" aria-label="PNG 다운로드">PNG 다운로드</button>
          <button class="export-btn" onclick="BarChart.exportImage('jpg')" aria-label="JPG 다운로드">JPG 다운로드</button>
          <button class="export-btn secondary" onclick="BarChart.exportData()" aria-label="데이터 내보내기">데이터 내보내기</button>
          <button class="export-btn secondary" onclick="BarChart.importData()" aria-label="데이터 가져오기">데이터 가져오기</button>
        </div>
      </div>

      <!-- 프리셋 -->
      <div class="preset-section">
        <h3 class="section-title">프리셋</h3>
        <div class="preset-buttons">
          <button class="preset-btn" onclick="BarChart.loadPreset('sales')" aria-label="매출 데이터">매출 데이터</button>
          <button class="preset-btn" onclick="BarChart.loadPreset('survey')" aria-label="설문 결과">설문 결과</button>
          <button class="preset-btn" onclick="BarChart.loadPreset('monthly')" aria-label="월별 통계">월별 통계</button>
        </div>
      </div>
    </main>
  </div>

  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="BarChart.handleImport(event)">
  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="bar-chart.js"></script>
</body>
</html>
