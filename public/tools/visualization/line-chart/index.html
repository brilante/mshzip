<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라인 차트 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="line-chart.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">라인 차트 생성기</h1>
      <p class="tool-description">시간에 따른 추세를 라인 차트로 시각화합니다</p>
    </header>

    <main class="tool-content">
      <div class="chart-preview">
        <canvas id="lineChart"></canvas>
      </div>

      <div class="data-section">
        <h3 class="section-title">데이터 입력</h3>
        <div class="data-input-area">
          <div class="input-row header-row">
            <span class="col-label">X축 레이블</span>
            <span class="col-value">값</span>
            <span class="col-action"></span>
          </div>
          <div id="dataRows"></div>
          <button class="add-row-btn" onclick="LineChart.addRow()" aria-label="+ 데이터 추가">+ 데이터 추가</button>
        </div>
      </div>

      <div class="settings-section">
        <h3 class="section-title">차트 설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>차트 제목</label>
            <input type="text" id="chartTitle" class="form-input" value="라인 차트" onchange="LineChart.updateChart()">
          </div>
          <div class="setting-item">
            <label>라인 색상</label>
            <input type="color" id="lineColor" class="form-input color" value="#667eea" onchange="LineChart.updateChart()">
          </div>
          <div class="setting-item">
            <label>채우기</label>
            <select id="fill" class="form-input" onchange="LineChart.updateChart()">
              <option value="false">없음</option>
              <option value="true">채우기</option>
            </select>
          </div>
          <div class="setting-item">
            <label>곡선</label>
            <select id="tension" class="form-input" onchange="LineChart.updateChart()">
              <option value="0">직선</option>
              <option value="0.3" selected>부드러운 곡선</option>
              <option value="0.5">더 부드러운 곡선</option>
            </select>
          </div>
          <div class="setting-item">
            <label>포인트 표시</label>
            <select id="showPoints" class="form-input" onchange="LineChart.updateChart()">
              <option value="true">표시</option>
              <option value="false">숨김</option>
            </select>
          </div>
          <div class="setting-item">
            <label>라인 두께</label>
            <select id="lineWidth" class="form-input" onchange="LineChart.updateChart()">
              <option value="1">얇게</option>
              <option value="2" selected>보통</option>
              <option value="3">두껍게</option>
            </select>
          </div>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="LineChart.exportImage('png')" aria-label="PNG 다운로드">PNG 다운로드</button>
          <button class="export-btn" onclick="LineChart.exportImage('jpg')" aria-label="JPG 다운로드">JPG 다운로드</button>
          <button class="export-btn secondary" onclick="LineChart.exportData()" aria-label="데이터 내보내기">데이터 내보내기</button>
          <button class="export-btn secondary" onclick="LineChart.importData()" aria-label="데이터 가져오기">데이터 가져오기</button>
        </div>
      </div>

      <div class="preset-section">
        <h3 class="section-title">프리셋</h3>
        <div class="preset-buttons">
          <button class="preset-btn" onclick="LineChart.loadPreset('growth')" aria-label="성장 추세">성장 추세</button>
          <button class="preset-btn" onclick="LineChart.loadPreset('temperature')" aria-label="기온 변화">기온 변화</button>
          <button class="preset-btn" onclick="LineChart.loadPreset('stock')" aria-label="주가 변동">주가 변동</button>
        </div>
      </div>
    </main>
  </div>

  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="LineChart.handleImport(event)">
  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="line-chart.js"></script>
</body>
</html>
