<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>워드 클라우드 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="word-cloud.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">워드 클라우드 생성기</h1>
      <p class="tool-description">텍스트 데이터를 워드 클라우드로 시각화합니다</p>
    </header>

    <main class="tool-content">
      <div class="chart-preview">
        <div id="wordCloud" class="wordcloud-container"></div>
      </div>

      <div class="data-section">
        <h3 class="section-title">텍스트 입력</h3>
        <div class="data-input-area">
          <textarea id="textInput" class="text-input" placeholder="분석할 텍스트를 입력하거나 단어와 빈도를 입력하세요..."></textarea>
          <div class="input-actions">
            <button class="action-btn" onclick="WordCloud.analyzeText()" aria-label="텍스트 분석">텍스트 분석</button>
            <button class="action-btn secondary" onclick="WordCloud.clearInput()" aria-label="초기화">초기화</button>
          </div>
        </div>
        <div class="word-list-section">
          <h4>또는 단어 목록 직접 입력</h4>
          <div id="wordList" class="word-list"></div>
          <button class="add-word-btn" onclick="WordCloud.addWord()" aria-label="+ 단어 추가">+ 단어 추가</button>
        </div>
      </div>

      <div class="settings-section">
        <h3 class="section-title">설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>최대 단어 수</label>
            <input type="number" id="maxWords" class="form-input" value="50" min="10" max="200" onchange="WordCloud.render()">
          </div>
          <div class="setting-item">
            <label>색상 테마</label>
            <select id="colorTheme" class="form-input" onchange="WordCloud.render()">
              <option value="rainbow">레인보우</option>
              <option value="blue">블루 계열</option>
              <option value="green">그린 계열</option>
              <option value="warm">따뜻한 색</option>
              <option value="cool">차가운 색</option>
            </select>
          </div>
          <div class="setting-item">
            <label>최소 글자 크기</label>
            <input type="number" id="minFontSize" class="form-input" value="12" min="8" max="24" onchange="WordCloud.render()">
          </div>
          <div class="setting-item">
            <label>최대 글자 크기</label>
            <input type="number" id="maxFontSize" class="form-input" value="60" min="24" max="120" onchange="WordCloud.render()">
          </div>
        </div>
      </div>

      <div class="preset-section">
        <h3 class="section-title">프리셋</h3>
        <div class="preset-buttons">
          <button class="preset-btn" onclick="WordCloud.loadPreset('tech')" aria-label="기술 키워드">기술 키워드</button>
          <button class="preset-btn" onclick="WordCloud.loadPreset('marketing')" aria-label="마케팅">마케팅</button>
          <button class="preset-btn" onclick="WordCloud.loadPreset('emotions')" aria-label="감정 분석">감정 분석</button>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="WordCloud.exportImage('png')" aria-label="PNG 저장">PNG 저장</button>
          <button class="export-btn" onclick="WordCloud.exportImage('jpg')" aria-label="JPG 저장">JPG 저장</button>
          <button class="export-btn secondary" onclick="WordCloud.exportData()" aria-label="데이터 내보내기">데이터 내보내기</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="word-cloud.js"></script>
</body>
</html>
