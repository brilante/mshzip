<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>산점도 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="scatter-plot.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">산점도 생성기</h1>
      <p class="tool-description">두 변수 간의 관계를 산점도로 시각화합니다</p>
    </header>

    <main class="tool-content">
      <div class="chart-preview">
        <canvas id="scatterChart"></canvas>
      </div>

      <div class="data-section">
        <h3 class="section-title">데이터 입력</h3>
        <div class="data-input-area">
          <div class="input-row header-row">
            <span>X값</span>
            <span>Y값</span>
            <span></span>
          </div>
          <div id="dataRows"></div>
          <button class="add-row-btn" onclick="ScatterPlot.addRow()" aria-label="+ 데이터 추가">+ 데이터 추가</button>
        </div>
      </div>

      <div class="settings-section">
        <h3 class="section-title">차트 설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>차트 제목</label>
            <input type="text" id="chartTitle" class="form-input" value="산점도" onchange="ScatterPlot.updateChart()">
          </div>
          <div class="setting-item">
            <label>포인트 색상</label>
            <input type="color" id="pointColor" class="form-input color" value="#667eea" onchange="ScatterPlot.updateChart()">
          </div>
          <div class="setting-item">
            <label>포인트 크기</label>
            <select id="pointSize" class="form-input" onchange="ScatterPlot.updateChart()">
              <option value="5">작게</option>
              <option value="8" selected>보통</option>
              <option value="12">크게</option>
            </select>
          </div>
          <div class="setting-item">
            <label>추세선 표시</label>
            <select id="showTrendline" class="form-input" onchange="ScatterPlot.updateChart()">
              <option value="false">숨김</option>
              <option value="true">표시</option>
            </select>
          </div>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="ScatterPlot.exportImage('png')" aria-label="PNG 다운로드">PNG 다운로드</button>
          <button class="export-btn" onclick="ScatterPlot.exportImage('jpg')" aria-label="JPG 다운로드">JPG 다운로드</button>
          <button class="export-btn secondary" onclick="ScatterPlot.exportData()" aria-label="데이터 내보내기">데이터 내보내기</button>
        </div>
      </div>

      <div class="preset-section">
        <h3 class="section-title">프리셋</h3>
        <div class="preset-buttons">
          <button class="preset-btn" onclick="ScatterPlot.loadPreset('positive')" aria-label="양의 상관관계">양의 상관관계</button>
          <button class="preset-btn" onclick="ScatterPlot.loadPreset('negative')" aria-label="음의 상관관계">음의 상관관계</button>
          <button class="preset-btn" onclick="ScatterPlot.loadPreset('random')" aria-label="랜덤 분포">랜덤 분포</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="scatter-plot.js"></script>
</body>
</html>
