<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파이 차트 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="pie-chart.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">파이 차트 생성기</h1>
      <p class="tool-description">비율 데이터를 원형 차트로 시각화합니다</p>
    </header>

    <main class="tool-content">
      <div class="chart-preview">
        <canvas id="pieChart"></canvas>
      </div>

      <div class="data-section">
        <h3 class="section-title">데이터 입력</h3>
        <div class="data-input-area">
          <div class="input-row header-row">
            <span>항목명</span>
            <span>값</span>
            <span>색상</span>
            <span></span>
          </div>
          <div id="dataRows"></div>
          <button class="add-row-btn" onclick="PieChart.addRow()" aria-label="+ 데이터 추가">+ 데이터 추가</button>
        </div>
      </div>

      <div class="settings-section">
        <h3 class="section-title">차트 설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>차트 제목</label>
            <input type="text" id="chartTitle" class="form-input" value="파이 차트" onchange="PieChart.updateChart()">
          </div>
          <div class="setting-item">
            <label>차트 유형</label>
            <select id="chartType" class="form-input" onchange="PieChart.updateChart()">
              <option value="pie">파이 차트</option>
              <option value="doughnut">도넛 차트</option>
            </select>
          </div>
          <div class="setting-item">
            <label>범례 위치</label>
            <select id="legendPosition" class="form-input" onchange="PieChart.updateChart()">
              <option value="top">상단</option>
              <option value="bottom">하단</option>
              <option value="left">좌측</option>
              <option value="right" selected>우측</option>
            </select>
          </div>
          <div class="setting-item">
            <label>퍼센트 표시</label>
            <select id="showPercent" class="form-input" onchange="PieChart.updateChart()">
              <option value="true">표시</option>
              <option value="false">숨김</option>
            </select>
          </div>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="PieChart.exportImage('png')" aria-label="PNG 다운로드">PNG 다운로드</button>
          <button class="export-btn" onclick="PieChart.exportImage('jpg')" aria-label="JPG 다운로드">JPG 다운로드</button>
          <button class="export-btn secondary" onclick="PieChart.exportData()" aria-label="데이터 내보내기">데이터 내보내기</button>
          <button class="export-btn secondary" onclick="PieChart.importData()" aria-label="데이터 가져오기">데이터 가져오기</button>
        </div>
      </div>

      <div class="preset-section">
        <h3 class="section-title">프리셋</h3>
        <div class="preset-buttons">
          <button class="preset-btn" onclick="PieChart.loadPreset('market')" aria-label="시장 점유율">시장 점유율</button>
          <button class="preset-btn" onclick="PieChart.loadPreset('budget')" aria-label="예산 분배">예산 분배</button>
          <button class="preset-btn" onclick="PieChart.loadPreset('traffic')" aria-label="트래픽 소스">트래픽 소스</button>
        </div>
      </div>
    </main>
  </div>

  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="PieChart.handleImport(event)">
  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pie-chart.js"></script>
</body>
</html>
