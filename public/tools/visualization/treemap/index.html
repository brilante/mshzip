<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>트리맵 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="treemap.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">트리맵 생성기</h1>
      <p class="tool-description">계층적 데이터를 트리맵으로 시각화합니다</p>
    </header>

    <main class="tool-content">
      <div class="chart-preview">
        <div id="treemapChart" class="treemap-container"></div>
      </div>

      <div class="data-section">
        <h3 class="section-title">데이터 입력</h3>
        <div class="data-input-area">
          <div class="header-row">
            <span>항목명</span>
            <span>값</span>
            <span>색상</span>
            <span></span>
          </div>
          <div id="dataRows"></div>
          <button class="add-row-btn" onclick="Treemap.addRow()" aria-label="+ 항목 추가">+ 항목 추가</button>
        </div>
      </div>

      <div class="settings-section">
        <h3 class="section-title">설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>차트 제목</label>
            <input type="text" id="chartTitle" class="form-input" value="트리맵 차트" onchange="Treemap.updateChart()">
          </div>
          <div class="setting-item">
            <label>레이블 표시</label>
            <select id="showLabels" class="form-input" onchange="Treemap.updateChart()">
              <option value="both">이름 + 값</option>
              <option value="name">이름만</option>
              <option value="value">값만</option>
              <option value="none">숨김</option>
            </select>
          </div>
          <div class="setting-item">
            <label>테두리 두께</label>
            <input type="number" id="borderWidth" class="form-input" value="2" min="0" max="10" onchange="Treemap.updateChart()">
          </div>
          <div class="setting-item">
            <label>간격</label>
            <input type="number" id="padding" class="form-input" value="4" min="0" max="20" onchange="Treemap.updateChart()">
          </div>
        </div>
      </div>

      <div class="preset-section">
        <h3 class="section-title">프리셋</h3>
        <div class="preset-buttons">
          <button class="preset-btn" onclick="Treemap.loadPreset('storage')" aria-label="저장 용량">저장 용량</button>
          <button class="preset-btn" onclick="Treemap.loadPreset('budget')" aria-label="예산 배분">예산 배분</button>
          <button class="preset-btn" onclick="Treemap.loadPreset('market')" aria-label="시장 점유율">시장 점유율</button>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="Treemap.exportImage('png')" aria-label="PNG 저장">PNG 저장</button>
          <button class="export-btn" onclick="Treemap.exportImage('jpg')" aria-label="JPG 저장">JPG 저장</button>
          <button class="export-btn secondary" onclick="Treemap.exportData()" aria-label="데이터 내보내기">데이터 내보내기</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="treemap.js"></script>
</body>
</html>
