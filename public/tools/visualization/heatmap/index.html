<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>히트맵 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="heatmap.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">히트맵 생성기</h1>
      <p class="tool-description">매트릭스 데이터를 히트맵으로 시각화합니다</p>
    </header>

    <main class="tool-content">
      <div class="chart-preview">
        <div id="heatmapChart" class="heatmap-container"></div>
      </div>

      <div class="data-section">
        <h3 class="section-title">데이터 입력</h3>
        <div class="data-input-area">
          <div class="matrix-controls">
            <div class="control-group">
              <label>행 수</label>
              <input type="number" id="rowCount" class="form-input" value="5" min="2" max="20" onchange="Heatmap.updateMatrix()">
            </div>
            <div class="control-group">
              <label>열 수</label>
              <input type="number" id="colCount" class="form-input" value="7" min="2" max="20" onchange="Heatmap.updateMatrix()">
            </div>
            <button class="action-btn" onclick="Heatmap.randomize()" aria-label="랜덤 데이터">랜덤 데이터</button>
          </div>
          <div id="matrixInput" class="matrix-input"></div>
        </div>
      </div>

      <div class="settings-section">
        <h3 class="section-title">설정</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>차트 제목</label>
            <input type="text" id="chartTitle" class="form-input" value="히트맵 차트" onchange="Heatmap.renderChart()">
          </div>
          <div class="setting-item">
            <label>색상 테마</label>
            <select id="colorTheme" class="form-input" onchange="Heatmap.renderChart()">
              <option value="blue">블루</option>
              <option value="green">그린</option>
              <option value="red">레드</option>
              <option value="purple">퍼플</option>
              <option value="orange">오렌지</option>
            </select>
          </div>
          <div class="setting-item">
            <label>값 표시</label>
            <select id="showValues" class="form-input" onchange="Heatmap.renderChart()">
              <option value="true">표시</option>
              <option value="false">숨김</option>
            </select>
          </div>
          <div class="setting-item">
            <label>셀 간격</label>
            <input type="number" id="cellGap" class="form-input" value="2" min="0" max="10" onchange="Heatmap.renderChart()">
          </div>
        </div>
      </div>

      <div class="preset-section">
        <h3 class="section-title">프리셋</h3>
        <div class="preset-buttons">
          <button class="preset-btn" onclick="Heatmap.loadPreset('weekly')" aria-label="주간 활동">주간 활동</button>
          <button class="preset-btn" onclick="Heatmap.loadPreset('correlation')" aria-label="상관관계">상관관계</button>
          <button class="preset-btn" onclick="Heatmap.loadPreset('sales')" aria-label="매출 분석">매출 분석</button>
        </div>
      </div>

      <div class="export-section">
        <h3 class="section-title">내보내기</h3>
        <div class="export-buttons">
          <button class="export-btn" onclick="Heatmap.exportImage('png')" aria-label="PNG 저장">PNG 저장</button>
          <button class="export-btn" onclick="Heatmap.exportImage('jpg')" aria-label="JPG 저장">JPG 저장</button>
          <button class="export-btn secondary" onclick="Heatmap.exportData()" aria-label="데이터 내보내기">데이터 내보내기</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="heatmap.js"></script>
</body>
</html>
