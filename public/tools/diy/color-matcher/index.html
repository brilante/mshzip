<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>색상 조합 도우미 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diy-container { max-width: 700px; margin: 0 auto; }
    .diy-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .color-picker-section { margin-bottom: 1.5rem; }
    .color-input-row { display: flex; gap: 1rem; align-items: center; }
    .color-preview { width: 60px; height: 60px; border-radius: 12px; border: 2px solid var(--bg-tertiary); }
    .scheme-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .scheme-tab { padding: 0.5rem 1rem; border-radius: 8px; background: var(--bg-primary); border: 2px solid transparent; cursor: pointer; font-size: 0.85rem; }
    .scheme-tab.active { border-color: var(--primary); background: rgba(102, 126, 234, 0.1); }
    .palette-section { margin-top: 1.5rem; }
    .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
    .palette-color { height: 80px; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; padding: 0.5rem; font-size: 0.7rem; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .palette-color:hover { transform: scale(1.05); }
    .room-preview { margin-top: 1.5rem; padding: 1.5rem; background: var(--bg-primary); border-radius: 12px; }
    .room-mockup { height: 200px; border-radius: 8px; position: relative; overflow: hidden; }
    .wall { position: absolute; top: 0; left: 0; right: 0; height: 70%; }
    .floor { position: absolute; bottom: 0; left: 0; right: 0; height: 30%; }
    .accent { position: absolute; right: 20px; top: 20%; width: 60px; height: 100px; border-radius: 4px; }
    .preset-colors { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .preset-color { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .preset-color:hover { border-color: var(--primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">색상 조합 도우미</h1>
          <p class="tool-description">인테리어 색상 조합 추천</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="diy-container">
      <div class="diy-panel">
        <div class="color-picker-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">기준 색상 선택</h3>
          <div class="color-input-row">
            <div class="color-preview" id="colorPreview" style="background: #667eea;"></div>
            <input type="color" id="baseColor" class="tool-input" value="#667eea" style="width: 100px; height: 40px;" onchange="ColorMatcher.generate()">
            <input type="text" id="hexInput" class="tool-input" value="#667eea" style="width: 100px;" oninput="ColorMatcher.updateFromHex()">
          </div>
          <div class="preset-colors">
            <div class="preset-color" style="background: #667eea;" onclick="ColorMatcher.setColor('#667eea')"></div>
            <div class="preset-color" style="background: #48bb78;" onclick="ColorMatcher.setColor('#48bb78')"></div>
            <div class="preset-color" style="background: #ed8936;" onclick="ColorMatcher.setColor('#ed8936')"></div>
            <div class="preset-color" style="background: #e53e3e;" onclick="ColorMatcher.setColor('#e53e3e')"></div>
            <div class="preset-color" style="background: #9f7aea;" onclick="ColorMatcher.setColor('#9f7aea')"></div>
            <div class="preset-color" style="background: #38b2ac;" onclick="ColorMatcher.setColor('#38b2ac')"></div>
            <div class="preset-color" style="background: #f6ad55;" onclick="ColorMatcher.setColor('#f6ad55')"></div>
            <div class="preset-color" style="background: #718096;" onclick="ColorMatcher.setColor('#718096')"></div>
          </div>
        </div>

        <h3 style="font-weight: 600; margin-bottom: 1rem;">조합 방식</h3>
        <div class="scheme-tabs">
          <div class="scheme-tab active" onclick="ColorMatcher.setScheme('complementary')">보색</div>
          <div class="scheme-tab" onclick="ColorMatcher.setScheme('analogous')">유사색</div>
          <div class="scheme-tab" onclick="ColorMatcher.setScheme('triadic')">삼원색</div>
          <div class="scheme-tab" onclick="ColorMatcher.setScheme('splitComplementary')">분리보색</div>
          <div class="scheme-tab" onclick="ColorMatcher.setScheme('monochromatic')">단색조</div>
        </div>

        <div class="palette-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">추천 팔레트</h3>
          <div class="palette-grid" id="paletteGrid"></div>
        </div>

        <div class="room-preview">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">적용 미리보기</h3>
          <div class="room-mockup" id="roomMockup">
            <div class="wall" id="wallColor"></div>
            <div class="floor" id="floorColor"></div>
            <div class="accent" id="accentColor"></div>
          </div>
        </div>

        <div style="background: rgba(102, 126, 234, 0.1); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.9rem;">
          <strong>팁:</strong> 60-30-10 법칙 - 주색(벽) 60%, 보조색(바닥/가구) 30%, 강조색(소품) 10%를 권장합니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="color-matcher.js"></script>
</body>
</html>
