<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가구 배치 도우미 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diy-container { max-width: 900px; margin: 0 auto; }
    .diy-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .planner-layout { display: grid; grid-template-columns: 250px 1fr; gap: 1.5rem; }
    .sidebar { background: var(--bg-primary); border-radius: 12px; padding: 1rem; }
    .furniture-list { max-height: 400px; overflow-y: auto; }
    .furniture-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; margin-bottom: 0.5rem; background: var(--bg-secondary); border-radius: 8px; cursor: grab; }
    .furniture-item:hover { background: var(--bg-tertiary); }
    .furniture-name { font-size: 0.85rem; }
    .furniture-size { font-size: 0.7rem; color: var(--text-secondary); }
    .room-canvas { background: var(--bg-primary); border-radius: 12px; min-height: 400px; position: relative; overflow: hidden; }
    .grid-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(128,128,128,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(128,128,128,0.1) 1px, transparent 1px); pointer-events: none; }
    .placed-furniture { position: absolute; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 4px; cursor: move; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.75rem; text-align: center; user-select: none; }
    .placed-furniture:hover { box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.5); }
    .room-info { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .input-small { width: 80px; }
    .placed-list { margin-top: 1rem; }
    .placed-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.85rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">가구 배치 도우미</h1>
          <p class="tool-description">방 크기에 맞는 가구 배치</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="diy-container">
      <div class="diy-panel">
        <div class="room-info">
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <label style="font-size: 0.85rem;">방 가로:</label>
            <input type="number" id="roomWidth" class="tool-input input-small" value="4" min="1" max="20" step="0.5" onchange="FurniturePlanner.updateRoom()">
            <span>m</span>
          </div>
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <label style="font-size: 0.85rem;">방 세로:</label>
            <input type="number" id="roomHeight" class="tool-input input-small" value="3" min="1" max="20" step="0.5" onchange="FurniturePlanner.updateRoom()">
            <span>m</span>
          </div>
          <button class="tool-btn tool-btn-secondary" onclick="FurniturePlanner.clearAll()" aria-label="초기화">초기화</button>
        </div>

        <div class="planner-layout">
          <div class="sidebar">
            <h3 style="font-weight: 600; margin-bottom: 0.75rem;">가구 목록</h3>
            <div style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">클릭하여 배치</div>
            <div class="furniture-list" id="furnitureList"></div>

            <div class="placed-list">
              <h4 style="font-weight: 600; margin-bottom: 0.5rem;">배치된 가구</h4>
              <div id="placedList">
                <div style="font-size: 0.85rem; color: var(--text-secondary);">가구를 배치하세요</div>
              </div>
            </div>
          </div>

          <div class="room-canvas" id="roomCanvas">
            <div class="grid-overlay" id="gridOverlay"></div>
            <div id="furnitureContainer"></div>
          </div>
        </div>

        <div style="background: rgba(102, 126, 234, 0.1); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.9rem;">
          <strong>사용법:</strong> 가구 목록에서 클릭하면 방에 배치됩니다. 배치된 가구를 드래그하여 위치를 조정하세요.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="furniture-planner.js"></script>
</body>
</html>
