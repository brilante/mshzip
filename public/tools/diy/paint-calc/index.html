<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페인트 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diy-container { max-width: 700px; margin: 0 auto; }
    .diy-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-section { margin-bottom: 1.5rem; }
    .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .wall-list { margin-top: 1rem; }
    .wall-item { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .wall-item input { flex: 1; }
    .result-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
    .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .result-card { text-align: center; padding: 1rem; background: var(--bg-secondary); border-radius: 8px; }
    .result-value { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
    .result-label { font-size: 0.8rem; color: var(--text-secondary); }
    .tip-box { background: rgba(102, 126, 234, 0.1); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">페인트 계산기</h1>
          <p class="tool-description">필요한 페인트 양 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="diy-container">
      <div class="diy-panel">
        <div class="input-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">벽 크기 입력</h3>
          <div class="wall-list" id="wallList">
            <div class="wall-item">
              <input type="number" class="tool-input wall-width" placeholder="가로 (m)" step="0.1" oninput="PaintCalc.calculate()" aria-label="가로 (m)">
              <span>×</span>
              <input type="number" class="tool-input wall-height" placeholder="세로 (m)" step="0.1" oninput="PaintCalc.calculate()" aria-label="세로 (m)">
              <button class="tool-btn tool-btn-secondary" onclick="PaintCalc.removeWall(this)" style="padding: 0.5rem;" aria-label=""></button>
            </div>
          </div>
          <button class="tool-btn tool-btn-secondary" onclick="PaintCalc.addWall()" style="margin-top: 0.5rem;" aria-label="+ 벽 추가">+ 벽 추가</button>
        </div>

        <div class="input-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">창문/문 제외</h3>
          <div class="input-grid">
            <div class="input-group">
              <label>창문 개수</label>
              <input type="number" id="windowCount" class="tool-input" value="0" min="0" oninput="PaintCalc.calculate()">
            </div>
            <div class="input-group">
              <label>창문 평균 크기 (㎡)</label>
              <input type="number" id="windowSize" class="tool-input" value="1.5" step="0.1" oninput="PaintCalc.calculate()">
            </div>
            <div class="input-group">
              <label>문 개수</label>
              <input type="number" id="doorCount" class="tool-input" value="0" min="0" oninput="PaintCalc.calculate()">
            </div>
            <div class="input-group">
              <label>문 평균 크기 (㎡)</label>
              <input type="number" id="doorSize" class="tool-input" value="1.8" step="0.1" oninput="PaintCalc.calculate()">
            </div>
          </div>
        </div>

        <div class="input-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">페인트 정보</h3>
          <div class="input-grid">
            <div class="input-group">
              <label>도포율 (㎡/L)</label>
              <input type="number" id="coverage" class="tool-input" value="10" step="0.5" oninput="PaintCalc.calculate()">
            </div>
            <div class="input-group">
              <label>도포 횟수</label>
              <select id="coats" class="tool-input" onchange="PaintCalc.calculate()">
                <option value="1">1회</option>
                <option value="2" selected>2회</option>
                <option value="3">3회</option>
              </select>
            </div>
          </div>
        </div>

        <div class="result-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">계산 결과</h3>
          <div class="result-grid">
            <div class="result-card">
              <div class="result-value" id="totalArea">0</div>
              <div class="result-label">총 면적 (㎡)</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="paintNeeded">0</div>
              <div class="result-label">필요 페인트 (L)</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="paintCans">0</div>
              <div class="result-label">4L 통 개수</div>
            </div>
          </div>

          <div class="tip-box">
            <strong>팁:</strong> 일반적으로 10~15% 여유분을 추가로 구매하는 것이 좋습니다.
            남은 페인트는 추후 보수용으로 보관하세요.
          </div>
        </div>

        <button class="tool-btn tool-btn-secondary" onclick="PaintCalc.reset()" style="width: 100%; margin-top: 1rem;" aria-label="초기화">초기화</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="paint-calc.js"></script>
</body>
</html>
