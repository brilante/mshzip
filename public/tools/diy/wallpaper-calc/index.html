<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>벽지 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diy-container { max-width: 700px; margin: 0 auto; }
    .diy-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .result-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
    .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .result-card { text-align: center; padding: 1rem; background: var(--bg-secondary); border-radius: 8px; }
    .result-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .result-label { font-size: 0.8rem; color: var(--text-secondary); }
    .preset-section { margin-bottom: 1.5rem; }
    .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .preset-btn { padding: 0.75rem; border-radius: 8px; background: var(--bg-primary); border: 2px solid transparent; cursor: pointer; text-align: center; font-size: 0.85rem; }
    .preset-btn:hover { background: var(--bg-tertiary); }
    .preset-btn.selected { border-color: var(--primary); background: rgba(102, 126, 234, 0.1); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">벽지 계산기</h1>
          <p class="tool-description">필요한 벽지 롤 수 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="diy-container">
      <div class="diy-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">방 크기</h3>
        <div class="input-grid">
          <div class="input-group">
            <label>방 둘레 (m)</label>
            <input type="number" id="roomPerimeter" class="tool-input" placeholder="예: 14" step="0.1" oninput="WallpaperCalc.calculate()" aria-label="예: 14">
          </div>
          <div class="input-group">
            <label>천장 높이 (m)</label>
            <input type="number" id="roomHeight" class="tool-input" value="2.4" step="0.1" oninput="WallpaperCalc.calculate()">
          </div>
        </div>

        <div style="background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem;">
          <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">방 둘레 계산 도우미</div>
          <div class="input-grid" style="margin-bottom: 0;">
            <div class="input-group" style="margin-bottom: 0;">
              <label>가로 (m)</label>
              <input type="number" id="helpWidth" class="tool-input" placeholder="4" step="0.1" oninput="WallpaperCalc.calcPerimeter()" aria-label="4">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
              <label>세로 (m)</label>
              <input type="number" id="helpDepth" class="tool-input" placeholder="3" step="0.1" oninput="WallpaperCalc.calcPerimeter()" aria-label="3">
            </div>
          </div>
        </div>

        <div class="preset-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">벽지 규격</h3>
          <div class="preset-grid">
            <button class="preset-btn selected" data-width="53" data-length="10" onclick="WallpaperCalc.setPreset(53, 10)">
              <div style="font-weight: 600;">표준</div>
              <div style="font-size: 0.75rem; color: var(--text-secondary);">53cm × 10m</div>
            </button>
            <button class="preset-btn" data-width="106" data-length="10" onclick="WallpaperCalc.setPreset(106, 10)">
              <div style="font-weight: 600;">더블폭</div>
              <div style="font-size: 0.75rem; color: var(--text-secondary);">106cm × 10m</div>
            </button>
            <button class="preset-btn" data-width="53" data-length="15" onclick="WallpaperCalc.setPreset(53, 15)">
              <div style="font-weight: 600;">롱롤</div>
              <div style="font-size: 0.75rem; color: var(--text-secondary);">53cm × 15m</div>
            </button>
          </div>
        </div>

        <div class="input-grid">
          <div class="input-group">
            <label>벽지 폭 (cm)</label>
            <input type="number" id="rollWidth" class="tool-input" value="53" oninput="WallpaperCalc.calculate()">
          </div>
          <div class="input-group">
            <label>롤 길이 (m)</label>
            <input type="number" id="rollLength" class="tool-input" value="10" step="0.5" oninput="WallpaperCalc.calculate()">
          </div>
          <div class="input-group">
            <label>패턴 반복 (cm)</label>
            <input type="number" id="patternRepeat" class="tool-input" value="0" placeholder="무지: 0" oninput="WallpaperCalc.calculate()" aria-label="무지: 0">
          </div>
          <div class="input-group">
            <label>여유분 (%)</label>
            <input type="number" id="wastePercent" class="tool-input" value="10" min="0" max="30" oninput="WallpaperCalc.calculate()">
          </div>
        </div>

        <div class="result-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">계산 결과</h3>
          <div class="result-grid">
            <div class="result-card">
              <div class="result-value" id="wallArea">0</div>
              <div class="result-label">벽 면적 (㎡)</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="stripsNeeded">0</div>
              <div class="result-label">필요 폭 수</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="rollsNeeded">0</div>
              <div class="result-label">필요 롤 수</div>
            </div>
          </div>

          <div style="background: rgba(102, 126, 234, 0.1); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.9rem;">
            <strong>팁:</strong> 패턴 벽지는 패턴 맞춤으로 인해 더 많은 여유분이 필요합니다.
            같은 로트 번호로 구매해야 색상 차이가 없습니다.
          </div>
        </div>

        <button class="tool-btn tool-btn-secondary" onclick="WallpaperCalc.reset()" style="width: 100%; margin-top: 1rem;" aria-label="초기화">초기화</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="wallpaper-calc.js"></script>
</body>
</html>
