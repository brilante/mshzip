<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방 면적 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diy-container { max-width: 700px; margin: 0 auto; }
    .diy-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .shape-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .shape-tab { padding: 0.75rem 1rem; border-radius: 8px; background: var(--bg-primary); border: 2px solid transparent; cursor: pointer; text-align: center; }
    .shape-tab.active { border-color: var(--primary); background: rgba(102, 126, 234, 0.1); }
    .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .result-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .result-card { text-align: center; padding: 1rem; background: var(--bg-secondary); border-radius: 8px; }
    .result-value { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
    .result-label { font-size: 0.8rem; color: var(--text-secondary); }
    .conversion-table { margin-top: 1rem; font-size: 0.85rem; }
    .conversion-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--bg-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">방 면적 계산기</h1>
          <p class="tool-description">다양한 형태의 면적 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="diy-container">
      <div class="diy-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">형태 선택</h3>
        <div class="shape-tabs">
          <div class="shape-tab active" onclick="RoomCalc.setShape('rectangle')">직사각형</div>
          <div class="shape-tab" onclick="RoomCalc.setShape('lshape')">ㄱ자형</div>
          <div class="shape-tab" onclick="RoomCalc.setShape('circle')">원형</div>
          <div class="shape-tab" onclick="RoomCalc.setShape('triangle')">삼각형</div>
          <div class="shape-tab" onclick="RoomCalc.setShape('trapezoid')">사다리꼴</div>
        </div>

        <div id="rectangleInputs">
          <div class="input-grid">
            <div class="input-group">
              <label>가로 (m)</label>
              <input type="number" id="rectWidth" class="tool-input" placeholder="4" step="0.01" oninput="RoomCalc.calculate()" aria-label="4">
            </div>
            <div class="input-group">
              <label>세로 (m)</label>
              <input type="number" id="rectHeight" class="tool-input" placeholder="3" step="0.01" oninput="RoomCalc.calculate()" aria-label="3">
            </div>
          </div>
        </div>

        <div id="lshapeInputs" style="display: none;">
          <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">전체 크기에서 잘린 부분을 빼서 계산합니다</div>
          <div class="input-grid">
            <div class="input-group">
              <label>전체 가로 (m)</label>
              <input type="number" id="lFullWidth" class="tool-input" placeholder="5" step="0.01" oninput="RoomCalc.calculate()" aria-label="5">
            </div>
            <div class="input-group">
              <label>전체 세로 (m)</label>
              <input type="number" id="lFullHeight" class="tool-input" placeholder="4" step="0.01" oninput="RoomCalc.calculate()" aria-label="4">
            </div>
            <div class="input-group">
              <label>잘린 가로 (m)</label>
              <input type="number" id="lCutWidth" class="tool-input" placeholder="2" step="0.01" oninput="RoomCalc.calculate()" aria-label="2">
            </div>
            <div class="input-group">
              <label>잘린 세로 (m)</label>
              <input type="number" id="lCutHeight" class="tool-input" placeholder="2" step="0.01" oninput="RoomCalc.calculate()" aria-label="2">
            </div>
          </div>
        </div>

        <div id="circleInputs" style="display: none;">
          <div class="input-grid" style="grid-template-columns: 1fr;">
            <div class="input-group">
              <label>지름 (m)</label>
              <input type="number" id="circleDiameter" class="tool-input" placeholder="4" step="0.01" oninput="RoomCalc.calculate()" aria-label="4">
            </div>
          </div>
        </div>

        <div id="triangleInputs" style="display: none;">
          <div class="input-grid">
            <div class="input-group">
              <label>밑변 (m)</label>
              <input type="number" id="triBase" class="tool-input" placeholder="4" step="0.01" oninput="RoomCalc.calculate()" aria-label="4">
            </div>
            <div class="input-group">
              <label>높이 (m)</label>
              <input type="number" id="triHeight" class="tool-input" placeholder="3" step="0.01" oninput="RoomCalc.calculate()" aria-label="3">
            </div>
          </div>
        </div>

        <div id="trapezoidInputs" style="display: none;">
          <div class="input-grid">
            <div class="input-group">
              <label>윗변 (m)</label>
              <input type="number" id="trapTop" class="tool-input" placeholder="3" step="0.01" oninput="RoomCalc.calculate()" aria-label="3">
            </div>
            <div class="input-group">
              <label>아랫변 (m)</label>
              <input type="number" id="trapBottom" class="tool-input" placeholder="5" step="0.01" oninput="RoomCalc.calculate()" aria-label="5">
            </div>
            <div class="input-group" style="grid-column: span 2;">
              <label>높이 (m)</label>
              <input type="number" id="trapHeight" class="tool-input" placeholder="3" step="0.01" oninput="RoomCalc.calculate()" aria-label="3">
            </div>
          </div>
        </div>

        <div class="result-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">계산 결과</h3>
          <div class="result-grid">
            <div class="result-card">
              <div class="result-value" id="areaSqm">0</div>
              <div class="result-label">㎡ (제곱미터)</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="areaPyeong">0</div>
              <div class="result-label">평</div>
            </div>
          </div>

          <div class="conversion-table">
            <div style="font-weight: 600; margin-bottom: 0.5rem;">단위 변환</div>
            <div class="conversion-row">
              <span>제곱피트 (ft²)</span>
              <span id="areaSqft">0</span>
            </div>
            <div class="conversion-row">
              <span>제곱야드 (yd²)</span>
              <span id="areaSqyd">0</span>
            </div>
            <div class="conversion-row">
              <span>아르 (a)</span>
              <span id="areaAre">0</span>
            </div>
            <div class="conversion-row">
              <span>에이커 (acre)</span>
              <span id="areaAcre">0</span>
            </div>
          </div>
        </div>

        <button class="tool-btn tool-btn-secondary" onclick="RoomCalc.reset()" style="width: 100%; margin-top: 1rem;" aria-label="초기화">초기화</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="room-area-calc.js"></script>
</body>
</html>
