<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>콘크리트 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diy-container { max-width: 700px; margin: 0 auto; }
    .diy-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .shape-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .shape-tab { flex: 1; padding: 0.75rem; border-radius: 8px; background: var(--bg-primary); border: 2px solid transparent; cursor: pointer; text-align: center; }
    .shape-tab.active { border-color: var(--primary); background: rgba(102, 126, 234, 0.1); }
    .shape-icon { font-size: 1.5rem; }
    .shape-label { font-size: 0.8rem; margin-top: 0.25rem; }
    .result-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .result-card { text-align: center; padding: 1rem; background: var(--bg-secondary); border-radius: 8px; }
    .result-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .result-label { font-size: 0.8rem; color: var(--text-secondary); }
    .mix-section { margin-top: 1rem; padding: 1rem; background: var(--bg-secondary); border-radius: 8px; }
    .mix-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; text-align: center; }
    .mix-item { padding: 0.5rem; }
    .mix-label { font-size: 0.75rem; color: var(--text-secondary); }
    .mix-value { font-weight: 600; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">콘크리트 계산기</h1>
          <p class="tool-description">필요한 콘크리트 양 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="diy-container">
      <div class="diy-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">형태 선택</h3>
        <div class="shape-tabs">
          <div class="shape-tab active" onclick="ConcreteCalc.setShape('slab')">
            <div class="shape-icon"></div>
            <div class="shape-label">슬래브/바닥</div>
          </div>
          <div class="shape-tab" onclick="ConcreteCalc.setShape('column')">
            <div class="shape-icon"></div>
            <div class="shape-label">기둥</div>
          </div>
          <div class="shape-tab" onclick="ConcreteCalc.setShape('cylinder')">
            <div class="shape-icon"></div>
            <div class="shape-label">원형 기둥</div>
          </div>
        </div>

        <div id="slabInputs">
          <div class="input-grid">
            <div class="input-group">
              <label>가로 (m)</label>
              <input type="number" id="slabWidth" class="tool-input" placeholder="3" step="0.01" oninput="ConcreteCalc.calculate()" aria-label="3">
            </div>
            <div class="input-group">
              <label>세로 (m)</label>
              <input type="number" id="slabLength" class="tool-input" placeholder="3" step="0.01" oninput="ConcreteCalc.calculate()" aria-label="3">
            </div>
            <div class="input-group">
              <label>두께 (cm)</label>
              <input type="number" id="slabThickness" class="tool-input" placeholder="10" step="0.1" oninput="ConcreteCalc.calculate()" aria-label="10">
            </div>
          </div>
        </div>

        <div id="columnInputs" style="display: none;">
          <div class="input-grid">
            <div class="input-group">
              <label>가로 (cm)</label>
              <input type="number" id="colWidth" class="tool-input" placeholder="30" oninput="ConcreteCalc.calculate()" aria-label="30">
            </div>
            <div class="input-group">
              <label>세로 (cm)</label>
              <input type="number" id="colDepth" class="tool-input" placeholder="30" oninput="ConcreteCalc.calculate()" aria-label="30">
            </div>
            <div class="input-group">
              <label>높이 (m)</label>
              <input type="number" id="colHeight" class="tool-input" placeholder="3" step="0.01" oninput="ConcreteCalc.calculate()" aria-label="3">
            </div>
          </div>
          <div class="input-group" style="width: 150px;">
            <label>개수</label>
            <input type="number" id="colCount" class="tool-input" value="1" min="1" oninput="ConcreteCalc.calculate()">
          </div>
        </div>

        <div id="cylinderInputs" style="display: none;">
          <div class="input-grid">
            <div class="input-group">
              <label>지름 (cm)</label>
              <input type="number" id="cylDiameter" class="tool-input" placeholder="30" oninput="ConcreteCalc.calculate()" aria-label="30">
            </div>
            <div class="input-group">
              <label>높이 (m)</label>
              <input type="number" id="cylHeight" class="tool-input" placeholder="3" step="0.01" oninput="ConcreteCalc.calculate()" aria-label="3">
            </div>
            <div class="input-group">
              <label>개수</label>
              <input type="number" id="cylCount" class="tool-input" value="1" min="1" oninput="ConcreteCalc.calculate()">
            </div>
          </div>
        </div>

        <div class="input-grid" style="grid-template-columns: 1fr 1fr;">
          <div class="input-group">
            <label>여유분 (%)</label>
            <input type="number" id="wastePercent" class="tool-input" value="10" min="0" max="30" oninput="ConcreteCalc.calculate()">
          </div>
          <div class="input-group">
            <label>레미콘 단가 (원/㎥)</label>
            <input type="number" id="pricePerCubic" class="tool-input" placeholder="120000" oninput="ConcreteCalc.calculate()" aria-label="120000">
          </div>
        </div>

        <div class="result-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">계산 결과</h3>
          <div class="result-grid">
            <div class="result-card">
              <div class="result-value" id="volume">0</div>
              <div class="result-label">필요량 (㎥)</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="volumeWithWaste">0</div>
              <div class="result-label">여유분 포함 (㎥)</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="weight">0</div>
              <div class="result-label">예상 무게 (톤)</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="price">0</div>
              <div class="result-label">예상 비용 (원)</div>
            </div>
          </div>

          <div class="mix-section">
            <div style="font-weight: 600; margin-bottom: 0.5rem;">직접 배합 시 재료량 (1㎥ 기준)</div>
            <div class="mix-grid">
              <div class="mix-item">
                <div class="mix-label">시멘트</div>
                <div class="mix-value" id="cement">-</div>
              </div>
              <div class="mix-item">
                <div class="mix-label">모래</div>
                <div class="mix-value" id="sand">-</div>
              </div>
              <div class="mix-item">
                <div class="mix-label">자갈</div>
                <div class="mix-value" id="gravel">-</div>
              </div>
              <div class="mix-item">
                <div class="mix-label">물</div>
                <div class="mix-value" id="water">-</div>
              </div>
            </div>
          </div>
        </div>

        <button class="tool-btn tool-btn-secondary" onclick="ConcreteCalc.reset()" style="width: 100%; margin-top: 1rem;" aria-label="초기화">초기화</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="concrete-calc.js"></script>
</body>
</html>
