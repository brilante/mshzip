<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로젝트 비용 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diy-container { max-width: 700px; margin: 0 auto; }
    .diy-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .project-header { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .category-section { margin-bottom: 1.5rem; }
    .category-title { display: flex; justify-content: space-between; align-items: center; font-weight: 600; margin-bottom: 0.75rem; }
    .category-total { font-size: 0.9rem; color: var(--primary); }
    .item-list { background: var(--bg-primary); border-radius: 12px; padding: 1rem; }
    .item-row { display: grid; grid-template-columns: 1fr 100px 100px auto; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .item-row input { padding: 0.5rem; }
    .add-btn { width: 100%; padding: 0.5rem; background: var(--bg-secondary); border: 2px dashed var(--bg-tertiary); border-radius: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text-secondary); }
    .add-btn:hover { border-color: var(--primary); color: var(--primary); }
    .result-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; margin-top: 1.5rem; }
    .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .result-card { text-align: center; }
    .result-value { font-size: 1.5rem; font-weight: 700; }
    .result-label { font-size: 0.8rem; opacity: 0.9; }
    .budget-bar { height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-top: 1rem; overflow: hidden; }
    .budget-fill { height: 100%; background: white; border-radius: 4px; transition: width 0.3s; }
    .budget-warning { background: #ef4444; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">프로젝트 비용 계산기</h1>
          <p class="tool-description">DIY 프로젝트 예산 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="diy-container">
      <div class="diy-panel">
        <div class="project-header">
          <div style="flex: 1;">
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">프로젝트명</label>
            <input type="text" id="projectName" class="tool-input" placeholder="예: 거실 리모델링" oninput="ProjectCost.save()" aria-label="예: 거실 리모델링">
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">예산</label>
            <input type="number" id="budget" class="tool-input" placeholder="1000000" oninput="ProjectCost.calculate()" aria-label="1000000">
          </div>
        </div>

        <div class="category-section" data-category="materials">
          <div class="category-title">
            <span>재료비</span>
            <span class="category-total" id="materialsTotal">0원</span>
          </div>
          <div class="item-list" id="materialsList"></div>
          <button class="add-btn" onclick="ProjectCost.addItem('materials')" aria-label="+ 재료 추가">+ 재료 추가</button>
        </div>

        <div class="category-section" data-category="tools">
          <div class="category-title">
            <span>공구비</span>
            <span class="category-total" id="toolsTotal">0원</span>
          </div>
          <div class="item-list" id="toolsList"></div>
          <button class="add-btn" onclick="ProjectCost.addItem('tools')" aria-label="+ 공구 추가">+ 공구 추가</button>
        </div>

        <div class="category-section" data-category="labor">
          <div class="category-title">
            <span>인건비</span>
            <span class="category-total" id="laborTotal">0원</span>
          </div>
          <div class="item-list" id="laborList"></div>
          <button class="add-btn" onclick="ProjectCost.addItem('labor')" aria-label="+ 인건비 추가">+ 인건비 추가</button>
        </div>

        <div class="category-section" data-category="other">
          <div class="category-title">
            <span>기타</span>
            <span class="category-total" id="otherTotal">0원</span>
          </div>
          <div class="item-list" id="otherList"></div>
          <button class="add-btn" onclick="ProjectCost.addItem('other')" aria-label="+ 기타 추가">+ 기타 추가</button>
        </div>

        <div class="result-section">
          <div class="result-grid">
            <div class="result-card">
              <div class="result-value" id="totalCost">0</div>
              <div class="result-label">총 비용</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="budgetAmount">0</div>
              <div class="result-label">예산</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="remaining">0</div>
              <div class="result-label">잔액</div>
            </div>
          </div>
          <div class="budget-bar">
            <div class="budget-fill" id="budgetFill" style="width: 0%;"></div>
          </div>
          <div style="text-align: center; margin-top: 0.5rem; font-size: 0.85rem;">
            <span id="budgetPercent">0%</span> 사용
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="ProjectCost.exportData()" style="flex: 1;" aria-label="내보내기">내보내기</button>
          <button class="tool-btn tool-btn-secondary" onclick="ProjectCost.clearAll()" style="flex: 1;" aria-label="초기화">초기화</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="project-cost-calc.js"></script>
</body>
</html>
