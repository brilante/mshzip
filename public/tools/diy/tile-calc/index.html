<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타일 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diy-container { max-width: 700px; margin: 0 auto; }
    .diy-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .tile-preview { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
    .tile-grid-preview { display: inline-grid; gap: 2px; background: var(--bg-tertiary); padding: 2px; border-radius: 4px; max-width: 200px; }
    .tile-cell { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 2px; }
    .result-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; }
    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .result-card { text-align: center; padding: 1rem; background: var(--bg-secondary); border-radius: 8px; }
    .result-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .result-label { font-size: 0.8rem; color: var(--text-secondary); }
    .waste-options { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .waste-btn { padding: 0.5rem 1rem; border-radius: 8px; background: var(--bg-primary); border: none; cursor: pointer; font-size: 0.85rem; }
    .waste-btn.selected { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">타일 계산기</h1>
          <p class="tool-description">필요한 타일 수량 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="diy-container">
      <div class="diy-panel">
        <h3 style="font-weight: 600; margin-bottom: 1rem;">시공 면적</h3>
        <div class="input-grid">
          <div class="input-group">
            <label>가로 길이 (m)</label>
            <input type="number" id="areaWidth" class="tool-input" placeholder="3" step="0.01" oninput="TileCalc.calculate()" aria-label="3">
          </div>
          <div class="input-group">
            <label>세로 길이 (m)</label>
            <input type="number" id="areaHeight" class="tool-input" placeholder="2" step="0.01" oninput="TileCalc.calculate()" aria-label="2">
          </div>
        </div>

        <h3 style="font-weight: 600; margin-bottom: 1rem;">타일 크기</h3>
        <div class="input-grid">
          <div class="input-group">
            <label>타일 가로 (cm)</label>
            <input type="number" id="tileWidth" class="tool-input" placeholder="30" oninput="TileCalc.calculate()" aria-label="30">
          </div>
          <div class="input-group">
            <label>타일 세로 (cm)</label>
            <input type="number" id="tileHeight" class="tool-input" placeholder="30" oninput="TileCalc.calculate()" aria-label="30">
          </div>
          <div class="input-group">
            <label>줄눈 간격 (mm)</label>
            <input type="number" id="groutWidth" class="tool-input" value="3" step="0.5" oninput="TileCalc.calculate()">
          </div>
          <div class="input-group">
            <label>여유분 (로스율)</label>
            <div class="waste-options">
              <button class="waste-btn" data-waste="5" onclick="TileCalc.setWaste(5)" aria-label="5%">5%</button>
              <button class="waste-btn selected" data-waste="10" onclick="TileCalc.setWaste(10)" aria-label="10%">10%</button>
              <button class="waste-btn" data-waste="15" onclick="TileCalc.setWaste(15)" aria-label="15%">15%</button>
            </div>
          </div>
        </div>

        <div class="tile-preview">
          <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">배치 미리보기</div>
          <div class="tile-grid-preview" id="tilePreview"></div>
          <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">
            <span id="colCount">0</span>열 × <span id="rowCount">0</span>행
          </div>
        </div>

        <div class="result-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">계산 결과</h3>
          <div class="result-grid">
            <div class="result-card">
              <div class="result-value" id="totalArea">0</div>
              <div class="result-label">총 면적 (㎡)</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="tileArea">0</div>
              <div class="result-label">타일 면적 (㎠)</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="tilesNeeded">0</div>
              <div class="result-label">필요 타일 수</div>
            </div>
            <div class="result-card">
              <div class="result-value" id="tilesWithWaste">0</div>
              <div class="result-label">여유분 포함</div>
            </div>
          </div>

          <div style="background: rgba(102, 126, 234, 0.1); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.9rem;">
            <strong>팁:</strong> 대각선 시공이나 복잡한 패턴은 15~20% 여유분을 권장합니다.
            같은 로트 번호의 타일을 구매해야 색상 차이가 없습니다.
          </div>
        </div>

        <button class="tool-btn tool-btn-secondary" onclick="TileCalc.reset()" style="width: 100%; margin-top: 1rem;" aria-label="초기화">초기화</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="tile-calc.js"></script>
</body>
</html>
