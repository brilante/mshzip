<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단위 변환기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .diy-container { max-width: 600px; margin: 0 auto; }
    .diy-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .category-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .category-tab { padding: 0.5rem 1rem; border-radius: 8px; background: var(--bg-primary); border: 2px solid transparent; cursor: pointer; font-size: 0.85rem; }
    .category-tab.active { border-color: var(--primary); background: rgba(102, 126, 234, 0.1); }
    .converter-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; }
    .input-row { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
    .input-row input { flex: 1; }
    .swap-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-secondary); border: none; cursor: pointer; font-size: 1.2rem; }
    .result-list { margin-top: 1.5rem; }
    .result-item { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; }
    .result-item:hover { background: var(--bg-tertiary); }
    .result-value { font-weight: 600; }
    .result-unit { color: var(--text-secondary); font-size: 0.9rem; }
    .common-conversions { margin-top: 1.5rem; }
    .common-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .common-item { padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; font-size: 0.85rem; text-align: center; cursor: pointer; }
    .common-item:hover { background: var(--bg-tertiary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">단위 변환기</h1>
          <p class="tool-description">DIY/건축 단위 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="diy-container">
      <div class="diy-panel">
        <div class="category-tabs">
          <div class="category-tab active" onclick="UnitConverter.setCategory('length')">길이</div>
          <div class="category-tab" onclick="UnitConverter.setCategory('area')">면적</div>
          <div class="category-tab" onclick="UnitConverter.setCategory('volume')">부피</div>
          <div class="category-tab" onclick="UnitConverter.setCategory('weight')">무게</div>
        </div>

        <div class="converter-section">
          <div class="input-row">
            <input type="number" id="inputValue" class="tool-input" placeholder="값 입력" oninput="UnitConverter.convert()" aria-label="값 입력">
            <select id="fromUnit" class="tool-input" onchange="UnitConverter.convert()"></select>
          </div>

          <div style="text-align: center;">
            <button class="swap-btn" onclick="UnitConverter.swap()" aria-label="⇅">⇅</button>
          </div>

          <div class="input-row" style="margin-top: 1rem;">
            <input type="number" id="outputValue" class="tool-input" readonly>
            <select id="toUnit" class="tool-input" onchange="UnitConverter.convert()"></select>
          </div>
        </div>

        <div class="result-list" id="resultList"></div>

        <div class="common-conversions">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">자주 쓰는 변환</h3>
          <div class="common-grid" id="commonGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="measurement-converter.js"></script>
</body>
</html>
