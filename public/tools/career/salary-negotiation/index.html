<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연봉 협상 도우미 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .salary-range { display: flex; align-items: center; justify-content: space-around; background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin: 1rem 0; }
    .salary-box { text-align: center; }
    .salary-amount { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
    .salary-label { font-size: 0.8rem; color: var(--text-secondary); }
    .salary-arrow { font-size: 1.5rem; color: var(--text-secondary); }
    .tip-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; border-left: 3px solid var(--primary); }
    .tip-title { font-weight: 600; margin-bottom: 0.5rem; }
    .script-box { background: #fef3c7; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; font-style: italic; }
    .factor-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .factor-label { font-weight: 500; }
    .factor-impact { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; }
    .factor-impact.positive { background: #10b981; color: white; }
    .factor-impact.negative { background: #ef4444; color: white; }
    .factor-impact.neutral { background: #6b7280; color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">연봉 협상 도우미</h1>
          <p class="tool-description">연봉 범위 분석 및 협상 전략</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">기본 정보</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">현재 연봉 (만원)</label>
            <input type="number" id="currentSalary" class="tool-input" placeholder="5000" aria-label="5000">
          </div>
          <div class="form-group">
            <label class="form-label">경력 연수</label>
            <input type="number" id="yearsExp" class="tool-input" placeholder="5" aria-label="5">
          </div>
          <div class="form-group">
            <label class="form-label">직무 분야</label>
            <select id="jobField" class="tool-input">
              <option value="tech">IT/개발</option>
              <option value="finance">금융</option>
              <option value="marketing">마케팅</option>
              <option value="design">디자인</option>
              <option value="sales">영업</option>
              <option value="hr">인사/HR</option>
              <option value="other">기타</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">회사 규모</label>
            <select id="companySize" class="tool-input">
              <option value="startup">스타트업 (50인 미만)</option>
              <option value="medium">중소기업 (50-300인)</option>
              <option value="large">대기업 (300인 이상)</option>
              <option value="conglomerate">대기업 계열사</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">이직 상황</label>
          <select id="situation" class="tool-input">
            <option value="offer">오퍼 받은 상태</option>
            <option value="interviewing">면접 진행 중</option>
            <option value="internal">사내 연봉 협상</option>
            <option value="exploring">탐색 중</option>
          </select>
        </div>
        <button class="tool-btn tool-btn-primary" onclick="SalaryNegotiation.analyze()" style="width: 100%;" aria-label="분석하기">분석하기</button>
      </div>

      <div class="util-panel" id="resultPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">추천 연봉 범위</h3>
        <div class="salary-range">
          <div class="salary-box">
            <div class="salary-amount" id="minSalary">0</div>
            <div class="salary-label">최소 (만원)</div>
          </div>
          <div class="salary-arrow">→</div>
          <div class="salary-box">
            <div class="salary-amount" id="targetSalary" style="color: #10b981;">0</div>
            <div class="salary-label">목표 (만원)</div>
          </div>
          <div class="salary-arrow">→</div>
          <div class="salary-box">
            <div class="salary-amount" id="maxSalary">0</div>
            <div class="salary-label">최대 (만원)</div>
          </div>
        </div>
        <p style="font-size: 0.85rem; color: var(--text-secondary); text-align: center;">* 업계 평균 및 입력 정보 기반 추정치입니다</p>
      </div>

      <div class="util-panel" id="factorsPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">협상력 요소</h3>
        <div id="factorsList"></div>
      </div>

      <div class="util-panel" id="tipsPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">협상 전략</h3>
        <div id="tipsList"></div>
      </div>

      <div class="util-panel" id="scriptsPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">협상 스크립트</h3>
        <div id="scriptsList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="salary-negotiation.js"></script>
</body>
</html>
