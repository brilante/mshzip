<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>면접 준비 도구 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .category-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .category-tab { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .category-tab:hover { border-color: var(--primary); }
    .category-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .question-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .question-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
    .question-text { font-weight: 500; flex: 1; }
    .question-category { font-size: 0.7rem; padding: 0.2rem 0.5rem; background: var(--primary); color: white; border-radius: 4px; }
    .question-tips { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border-color); font-size: 0.85rem; color: var(--text-secondary); display: none; }
    .question-tips.show { display: block; }
    .answer-textarea { margin-top: 0.5rem; }
    .practice-mode { background: #fef3c7; border-radius: 8px; padding: 1rem; text-align: center; }
    .timer-display { font-size: 2rem; font-weight: bold; color: var(--primary); margin: 1rem 0; }
    .saved-answers { max-height: 200px; overflow-y: auto; }
    .saved-answer { padding: 0.5rem; background: var(--bg-primary); border-radius: 6px; margin-bottom: 0.25rem; font-size: 0.85rem; cursor: pointer; }
    .saved-answer:hover { background: var(--border-color); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">면접 준비 도구</h1>
          <p class="tool-description">예상 질문 및 연습</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">질문 카테고리</h3>
        <div class="category-tabs">
          <button class="category-tab active" onclick="InterviewPrep.setCategory('all')" data-cat="all" aria-label="전체">전체</button>
          <button class="category-tab" onclick="InterviewPrep.setCategory('common')" data-cat="common" aria-label="공통">공통</button>
          <button class="category-tab" onclick="InterviewPrep.setCategory('behavioral')" data-cat="behavioral" aria-label="행동">행동</button>
          <button class="category-tab" onclick="InterviewPrep.setCategory('situational')" data-cat="situational" aria-label="상황">상황</button>
          <button class="category-tab" onclick="InterviewPrep.setCategory('technical')" data-cat="technical" aria-label="기술">기술</button>
          <button class="category-tab" onclick="InterviewPrep.setCategory('closing')" data-cat="closing" aria-label="마무리">마무리</button>
        </div>
      </div>

      <div class="util-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">예상 질문</h3>
          <button class="tool-btn tool-btn-secondary" onclick="InterviewPrep.shuffleQuestions()" aria-label="섞기">섞기</button>
        </div>
        <div id="questionList"></div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">연습 모드</h3>
        <div class="practice-mode">
          <p id="practiceQuestion" style="font-weight: 500; margin-bottom: 0.5rem;">질문을 선택하면 연습을 시작합니다</p>
          <div class="timer-display" id="timerDisplay">00:00</div>
          <div style="display: flex; gap: 0.5rem; justify-content: center;">
            <button class="tool-btn tool-btn-primary" onclick="InterviewPrep.startTimer()" aria-label="시작">시작</button>
            <button class="tool-btn tool-btn-secondary" onclick="InterviewPrep.stopTimer()" aria-label="정지">정지</button>
            <button class="tool-btn tool-btn-secondary" onclick="InterviewPrep.resetTimer()" aria-label="리셋">리셋</button>
          </div>
          <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">이상적인 답변 시간: 1-2분</p>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">저장된 답변</h3>
        <div class="saved-answers" id="savedAnswers">
          <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">저장된 답변이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="interview-prep.js"></script>
</body>
</html>
