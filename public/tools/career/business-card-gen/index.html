<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명함 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 900px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .template-card { padding: 1rem; border-radius: 8px; border: 2px solid var(--border-color); cursor: pointer; text-align: center; }
    .template-card:hover { border-color: var(--primary); }
    .template-card.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
    .color-options { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .color-btn { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
    .color-btn.active { border-color: var(--text-primary); }
    .card-preview-container { display: flex; justify-content: center; padding: 2rem; background: #e5e7eb; border-radius: 12px; }
    .business-card { width: 350px; height: 200px; border-radius: 8px; padding: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.15); position: relative; overflow: hidden; }
    .card-name { font-size: 1.25rem; font-weight: bold; margin-bottom: 0.25rem; }
    .card-title { font-size: 0.85rem; opacity: 0.8; margin-bottom: 1rem; }
    .card-contact { font-size: 0.75rem; line-height: 1.6; }
    .card-company { position: absolute; bottom: 1rem; right: 1.5rem; font-size: 0.9rem; font-weight: 600; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">명함 생성기</h1>
          <p class="tool-description">디지털 명함 디자인</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">명함 정보</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">이름 *</label>
            <input type="text" id="cardName" class="tool-input" placeholder="홍길동" oninput="BusinessCardGen.updatePreview()" aria-label="홍길동">
          </div>
          <div class="form-group">
            <label class="form-label">직책</label>
            <input type="text" id="cardTitle" class="tool-input" placeholder="시니어 개발자" oninput="BusinessCardGen.updatePreview()" aria-label="시니어 개발자">
          </div>
          <div class="form-group">
            <label class="form-label">회사/조직</label>
            <input type="text" id="cardCompany" class="tool-input" placeholder="ABC 테크" oninput="BusinessCardGen.updatePreview()" aria-label="ABC 테크">
          </div>
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input type="email" id="cardEmail" class="tool-input" placeholder="email@example.com" oninput="BusinessCardGen.updatePreview()" aria-label="email@example.com">
          </div>
          <div class="form-group">
            <label class="form-label">전화번호</label>
            <input type="tel" id="cardPhone" class="tool-input" placeholder="010-1234-5678" oninput="BusinessCardGen.updatePreview()" aria-label="010-1234-5678">
          </div>
          <div class="form-group">
            <label class="form-label">웹사이트/LinkedIn</label>
            <input type="text" id="cardWebsite" class="tool-input" placeholder="linkedin.com/in/username" oninput="BusinessCardGen.updatePreview()" aria-label="linkedin.com/in/username">
          </div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">디자인 선택</h3>
        <div class="template-grid">
          <div class="template-card active" onclick="BusinessCardGen.setTemplate('classic')" data-template="classic">
            <div style="font-size: 1.5rem;"></div>
            <div style="font-weight: 500; margin-top: 0.5rem;">클래식</div>
          </div>
          <div class="template-card" onclick="BusinessCardGen.setTemplate('modern')" data-template="modern">
            <div style="font-size: 1.5rem;"></div>
            <div style="font-weight: 500; margin-top: 0.5rem;">모던</div>
          </div>
          <div class="template-card" onclick="BusinessCardGen.setTemplate('minimal')" data-template="minimal">
            <div style="font-size: 1.5rem;"></div>
            <div style="font-weight: 500; margin-top: 0.5rem;">미니멀</div>
          </div>
        </div>

        <h4 style="font-weight: 500; margin-bottom: 0.5rem; font-size: 0.9rem;">색상</h4>
        <div class="color-options">
          <button class="color-btn active" style="background: #1f2937;" onclick="BusinessCardGen.setColor('#1f2937')" data-color="#1f2937"></button>
          <button class="color-btn" style="background: #3b82f6;" onclick="BusinessCardGen.setColor('#3b82f6')" data-color="#3b82f6"></button>
          <button class="color-btn" style="background: #10b981;" onclick="BusinessCardGen.setColor('#10b981')" data-color="#10b981"></button>
          <button class="color-btn" style="background: #8b5cf6;" onclick="BusinessCardGen.setColor('#8b5cf6')" data-color="#8b5cf6"></button>
          <button class="color-btn" style="background: #ef4444;" onclick="BusinessCardGen.setColor('#ef4444')" data-color="#ef4444"></button>
          <button class="color-btn" style="background: #f59e0b;" onclick="BusinessCardGen.setColor('#f59e0b')" data-color="#f59e0b"></button>
          <button class="color-btn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" onclick="BusinessCardGen.setColor('gradient1')" data-color="gradient1"></button>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">미리보기</h3>
        <div class="card-preview-container">
          <div class="business-card" id="cardPreview">
            <div class="card-name">이름</div>
            <div class="card-title">직책</div>
            <div class="card-contact">
              <div>email@example.com</div>
              <div>010-0000-0000</div>
              <div>website.com</div>
            </div>
            <div class="card-company">회사명</div>
          </div>
        </div>
        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="BusinessCardGen.copyAsText()" style="flex: 1;" aria-label="텍스트 복사">텍스트 복사</button>
          <button class="tool-btn tool-btn-primary" onclick="BusinessCardGen.download()" style="flex: 1;" aria-label="이미지 다운로드">이미지 다운로드</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="business-card-gen.js"></script>
</body>
</html>
