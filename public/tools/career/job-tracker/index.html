<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>취업 활동 트래커 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 900px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .stat-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-number { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .status-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .status-tab { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .status-tab:hover { border-color: var(--primary); }
    .status-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .job-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; border-left: 4px solid var(--primary); }
    .job-card.applied { border-left-color: #3b82f6; }
    .job-card.interview { border-left-color: #f59e0b; }
    .job-card.offer { border-left-color: #10b981; }
    .job-card.rejected { border-left-color: #ef4444; }
    .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
    .job-title { font-weight: 600; }
    .job-company { color: var(--text-secondary); font-size: 0.9rem; }
    .job-meta { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .status-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
    .status-badge.applied { background: #dbeafe; color: #1d4ed8; }
    .status-badge.interview { background: #fef3c7; color: #b45309; }
    .status-badge.offer { background: #d1fae5; color: #047857; }
    .status-badge.rejected { background: #fee2e2; color: #b91c1c; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">취업 활동 트래커</h1>
          <p class="tool-description">지원 현황 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">전체</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="appliedCount" style="color: #3b82f6;">0</div>
            <div class="stat-label">지원</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="interviewCount" style="color: #f59e0b;">0</div>
            <div class="stat-label">면접</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="offerCount" style="color: #10b981;">0</div>
            <div class="stat-label">오퍼</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="rejectedCount" style="color: #ef4444;">0</div>
            <div class="stat-label">불합격</div>
          </div>
        </div>
      </div>

      <div class="util-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">지원 목록</h3>
          <button class="tool-btn tool-btn-primary" onclick="JobTracker.showAddModal()" aria-label="+ 지원 추가">+ 지원 추가</button>
        </div>

        <div class="status-tabs">
          <button class="status-tab active" onclick="JobTracker.setFilter('all')" data-filter="all" aria-label="전체">전체</button>
          <button class="status-tab" onclick="JobTracker.setFilter('applied')" data-filter="applied" aria-label="지원">지원</button>
          <button class="status-tab" onclick="JobTracker.setFilter('interview')" data-filter="interview" aria-label="면접">면접</button>
          <button class="status-tab" onclick="JobTracker.setFilter('offer')" data-filter="offer" aria-label="오퍼">오퍼</button>
          <button class="status-tab" onclick="JobTracker.setFilter('rejected')" data-filter="rejected" aria-label="불합격">불합격</button>
        </div>

        <div id="jobList"></div>
      </div>
    </div>
  </div>

  <!-- 추가/수정 모달 -->
  <div class="modal" id="jobModal">
    <div class="modal-content">
      <h3 style="font-weight: 600; margin-bottom: 1rem;" id="modalTitle">지원 추가</h3>
      <input type="hidden" id="editIndex">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">회사명 *</label>
          <input type="text" id="jobCompany" class="tool-input" placeholder="ABC 회사" aria-label="ABC 회사">
        </div>
        <div class="form-group">
          <label class="form-label">직책 *</label>
          <input type="text" id="jobTitle" class="tool-input" placeholder="프론트엔드 개발자" aria-label="프론트엔드 개발자">
        </div>
        <div class="form-group">
          <label class="form-label">지원일</label>
          <input type="date" id="jobDate" class="tool-input">
        </div>
        <div class="form-group">
          <label class="form-label">상태</label>
          <select id="jobStatus" class="tool-input">
            <option value="applied">지원</option>
            <option value="interview">면접</option>
            <option value="offer">오퍼</option>
            <option value="rejected">불합격</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">채용 공고 URL</label>
        <input type="url" id="jobUrl" class="tool-input" placeholder="https://..." aria-label="https://...">
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea id="jobNotes" class="tool-input" rows="2" placeholder="메모..."></textarea>
      </div>
      <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
        <button class="tool-btn tool-btn-secondary" onclick="JobTracker.hideModal()" style="flex: 1;" aria-label="취소">취소</button>
        <button class="tool-btn tool-btn-primary" onclick="JobTracker.saveJob()" style="flex: 1;" aria-label="저장">저장</button>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="job-tracker.js"></script>
</body>
</html>
