<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포트폴리오 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 900px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .project-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .template-card { padding: 1rem; border-radius: 8px; border: 2px solid var(--border-color); cursor: pointer; text-align: center; }
    .template-card:hover { border-color: var(--primary); }
    .template-card.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
    .template-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .portfolio-preview { background: white; border-radius: 8px; padding: 2rem; min-height: 500px; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); cursor: pointer; }
    .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">포트폴리오 생성기</h1>
          <p class="tool-description">간편한 포트폴리오 웹페이지 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="tabs">
        <button class="tab active" id="tabEdit" onclick="PortfolioGen.showTab('edit')" aria-label="편집">편집</button>
        <button class="tab" id="tabPreview" onclick="PortfolioGen.showTab('preview')" aria-label="미리보기">미리보기</button>
      </div>

      <div id="editPanel">
        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">기본 정보</h3>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">이름 *</label>
              <input type="text" id="name" class="tool-input" placeholder="홍길동" aria-label="홍길동">
            </div>
            <div class="form-group">
              <label class="form-label">직함/역할 *</label>
              <input type="text" id="title" class="tool-input" placeholder="프론트엔드 개발자" aria-label="프론트엔드 개발자">
            </div>
            <div class="form-group">
              <label class="form-label">이메일</label>
              <input type="email" id="email" class="tool-input" placeholder="email@example.com" aria-label="email@example.com">
            </div>
            <div class="form-group">
              <label class="form-label">GitHub</label>
              <input type="text" id="github" class="tool-input" placeholder="github.com/username" aria-label="github.com/username">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">소개</label>
            <textarea id="bio" class="tool-input" rows="3" placeholder="간단한 자기소개를 작성하세요..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">기술 스택 (쉼표로 구분)</label>
            <input type="text" id="skills" class="tool-input" placeholder="JavaScript, React, Node.js, TypeScript" aria-label="JavaScript, React, Node.js, TypeScript">
          </div>
        </div>

        <div class="util-panel">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
            <h3 style="font-weight: 600;">프로젝트</h3>
            <button class="tool-btn tool-btn-secondary" onclick="PortfolioGen.addProject()" aria-label="+ 추가">+ 추가</button>
          </div>
          <div id="projectList"></div>
        </div>

        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">템플릿 선택</h3>
          <div class="template-grid">
            <div class="template-card active" onclick="PortfolioGen.setTemplate('minimal')" data-template="minimal">
              <div class="template-icon"></div>
              <div style="font-weight: 500;">미니멀</div>
              <div style="font-size: 0.75rem; color: var(--text-secondary);">깔끔하고 심플한</div>
            </div>
            <div class="template-card" onclick="PortfolioGen.setTemplate('modern')" data-template="modern">
              <div class="template-icon"></div>
              <div style="font-weight: 500;">모던</div>
              <div style="font-size: 0.75rem; color: var(--text-secondary);">트렌디한 디자인</div>
            </div>
            <div class="template-card" onclick="PortfolioGen.setTemplate('creative')" data-template="creative">
              <div class="template-icon"></div>
              <div style="font-weight: 500;">크리에이티브</div>
              <div style="font-size: 0.75rem; color: var(--text-secondary);">개성있는 스타일</div>
            </div>
          </div>
          <button class="tool-btn tool-btn-primary" onclick="PortfolioGen.generate()" style="width: 100%;" aria-label="포트폴리오 생성">포트폴리오 생성</button>
        </div>
      </div>

      <div id="previewPanel" style="display: none;">
        <div class="util-panel">
          <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
            <button class="tool-btn tool-btn-secondary" onclick="PortfolioGen.copyCode()" style="flex: 1;" aria-label="HTML 복사">HTML 복사</button>
            <button class="tool-btn tool-btn-primary" onclick="PortfolioGen.download()" style="flex: 1;" aria-label="다운로드">다운로드</button>
          </div>
          <div class="portfolio-preview" id="portfolioPreview"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="portfolio-gen.js"></script>
</body>
</html>
