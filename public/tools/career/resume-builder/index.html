<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이력서 빌더 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 900px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .entry-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; }
    .entry-header { display: flex; justify-content: space-between; align-items: center; }
    .preview-container { background: white; border-radius: 8px; padding: 2rem; font-family: 'Times New Roman', serif; line-height: 1.4; color: #333; }
    .preview-header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 1rem; margin-bottom: 1rem; }
    .preview-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.25rem; }
    .preview-contact { font-size: 0.85rem; color: #666; }
    .preview-section { margin-bottom: 1rem; }
    .preview-section-title { font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 0.5rem; font-size: 1rem; }
    .preview-entry { margin-bottom: 0.75rem; }
    .preview-entry-header { display: flex; justify-content: space-between; }
    .preview-entry-title { font-weight: bold; }
    .preview-entry-date { font-style: italic; color: #666; }
    .preview-bullets { padding-left: 1.5rem; margin: 0.25rem 0; }
    .preview-bullets li { margin-bottom: 0.15rem; }
    .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .template-btn { padding: 0.5rem; border-radius: 6px; border: 2px solid var(--border-color); background: var(--bg-primary); cursor: pointer; text-align: center; font-size: 0.8rem; }
    .template-btn:hover { border-color: var(--primary); }
    .template-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
    .tab-btn { padding: 0.5rem 1rem; border: none; background: var(--bg-primary); cursor: pointer; border-radius: 6px 6px 0 0; }
    .tab-btn.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이력서 빌더</h1>
          <p class="tool-description">ATS 최적화 이력서 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div style="display: flex; gap: 0.25rem; margin-bottom: 1rem;">
        <button class="tab-btn active" onclick="ResumeBuilder.showTab('edit')" id="tabEdit" aria-label="편집">편집</button>
        <button class="tab-btn" onclick="ResumeBuilder.showTab('preview')" id="tabPreview" aria-label="미리보기">미리보기</button>
      </div>

      <div id="editPanel">
        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">기본 정보</h3>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">이름 *</label>
              <input type="text" id="name" class="tool-input" placeholder="홍길동" aria-label="홍길동">
            </div>
            <div class="form-group">
              <label class="form-label">이메일 *</label>
              <input type="email" id="email" class="tool-input" placeholder="email@example.com" aria-label="email@example.com">
            </div>
            <div class="form-group">
              <label class="form-label">전화번호</label>
              <input type="tel" id="phone" class="tool-input" placeholder="010-1234-5678" aria-label="010-1234-5678">
            </div>
            <div class="form-group">
              <label class="form-label">LinkedIn URL</label>
              <input type="url" id="linkedin" class="tool-input" placeholder="linkedin.com/in/username" aria-label="linkedin.com/in/username">
            </div>
            <div class="form-group">
              <label class="form-label">GitHub URL</label>
              <input type="url" id="github" class="tool-input" placeholder="github.com/username" aria-label="github.com/username">
            </div>
            <div class="form-group">
              <label class="form-label">포트폴리오 URL</label>
              <input type="url" id="portfolio" class="tool-input" placeholder="portfolio.com" aria-label="portfolio.com">
            </div>
          </div>
        </div>

        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">자기소개</h3>
          <textarea id="summary" class="tool-input" rows="3" placeholder="경력 요약 및 핵심 역량을 2-3문장으로 작성하세요..."></textarea>
        </div>

        <div class="util-panel">
          <div class="section-header">
            <h3 style="font-weight: 600;">경력사항</h3>
            <button class="tool-btn tool-btn-primary" onclick="ResumeBuilder.addExperience()" aria-label="+ 추가">+ 추가</button>
          </div>
          <div id="experienceList"></div>
        </div>

        <div class="util-panel">
          <div class="section-header">
            <h3 style="font-weight: 600;">학력</h3>
            <button class="tool-btn tool-btn-primary" onclick="ResumeBuilder.addEducation()" aria-label="+ 추가">+ 추가</button>
          </div>
          <div id="educationList"></div>
        </div>

        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">기술 스택</h3>
          <textarea id="skills" class="tool-input" rows="2" placeholder="JavaScript, React, Node.js, Python, SQL..."></textarea>
        </div>
      </div>

      <div id="previewPanel" style="display: none;">
        <div class="util-panel">
          <h3 style="font-weight: 600; margin-bottom: 0.75rem;">템플릿 선택</h3>
          <div class="template-grid">
            <button class="template-btn active" onclick="ResumeBuilder.setTemplate('classic')" data-template="classic" aria-label="클래식">클래식</button>
            <button class="template-btn" onclick="ResumeBuilder.setTemplate('modern')" data-template="modern" aria-label="모던">모던</button>
            <button class="template-btn" onclick="ResumeBuilder.setTemplate('minimal')" data-template="minimal" aria-label="미니멀">미니멀</button>
          </div>
        </div>
        <div class="util-panel">
          <div class="preview-container" id="resumePreview"></div>
        </div>
        <div style="display: flex; gap: 0.5rem;">
          <button class="tool-btn tool-btn-secondary" onclick="ResumeBuilder.copyText()" style="flex: 1;" aria-label="텍스트 복사">텍스트 복사</button>
          <button class="tool-btn tool-btn-primary" onclick="ResumeBuilder.downloadHTML()" style="flex: 1;" aria-label="HTML 다운로드">HTML 다운로드</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="resume-builder.js"></script>
</body>
</html>
