<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스킬 매칭 분석 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .match-meter { height: 20px; background: var(--bg-primary); border-radius: 10px; overflow: hidden; margin: 1rem 0; }
    .match-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
    .match-fill.excellent { background: linear-gradient(90deg, #10b981, #059669); }
    .match-fill.good { background: linear-gradient(90deg, #3b82f6, #2563eb); }
    .match-fill.fair { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .match-fill.poor { background: linear-gradient(90deg, #ef4444, #dc2626); }
    .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .skill-list { background: var(--bg-primary); border-radius: 8px; padding: 1rem; }
    .skill-list h4 { font-weight: 600; margin-bottom: 0.75rem; font-size: 0.9rem; }
    .skill-tag { display: inline-block; padding: 0.25rem 0.75rem; margin: 0.25rem; border-radius: 20px; font-size: 0.8rem; }
    .skill-tag.matched { background: #10b981; color: white; }
    .skill-tag.missing { background: #ef4444; color: white; }
    .skill-tag.extra { background: #6366f1; color: white; }
    .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; text-align: center; margin: 1rem 0; }
    .stat-box { background: var(--bg-primary); padding: 1rem; border-radius: 8px; }
    .stat-number { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .recommendation { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-top: 1rem; border-left: 3px solid var(--primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">스킬 매칭 분석</h1>
          <p class="tool-description">채용 공고와 보유 스킬 비교</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">채용 공고 정보</h3>
        <div class="form-group">
          <label class="form-label">채용 공고 텍스트 (요구 자격/우대 사항 포함)</label>
          <textarea id="jobDescription" class="tool-input" rows="6" placeholder="채용 공고의 자격 요건 부분을 붙여넣으세요...

예:
- React, TypeScript 경험자
- Node.js 백엔드 개발 경험
- AWS 클라우드 환경 경험
- 우대: Docker, Kubernetes"></textarea>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">보유 스킬</h3>
        <div class="form-group">
          <label class="form-label">보유하고 있는 기술/스킬 (쉼표로 구분)</label>
          <textarea id="mySkills" class="tool-input" rows="3" placeholder="JavaScript, React, TypeScript, Node.js, Python, Git, AWS"></textarea>
        </div>
        <button class="tool-btn tool-btn-primary" onclick="SkillMatcher.analyze()" style="width: 100%;" aria-label="매칭 분석">매칭 분석</button>
      </div>

      <div class="util-panel" id="resultPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">분석 결과</h3>

        <div style="text-align: center; margin-bottom: 1rem;">
          <span style="font-size: 2.5rem; font-weight: bold;" id="matchPercent">0%</span>
          <span style="font-size: 1rem; color: var(--text-secondary);">매칭률</span>
        </div>

        <div class="match-meter">
          <div class="match-fill" id="matchFill" style="width: 0%;"></div>
        </div>

        <div class="result-stats">
          <div class="stat-box">
            <div class="stat-number" id="matchedCount">0</div>
            <div class="stat-label">매칭된 스킬</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="missingCount">0</div>
            <div class="stat-label">부족한 스킬</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="extraCount">0</div>
            <div class="stat-label">추가 보유 스킬</div>
          </div>
        </div>

        <div class="skill-grid">
          <div class="skill-list">
            <h4>매칭된 스킬</h4>
            <div id="matchedSkills"></div>
          </div>
          <div class="skill-list">
            <h4>부족한 스킬</h4>
            <div id="missingSkills"></div>
          </div>
        </div>

        <div class="skill-list" style="margin-top: 1rem;">
          <h4>추가 보유 스킬</h4>
          <div id="extraSkills"></div>
        </div>

        <div class="recommendation" id="recommendation"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="skill-matcher.js"></script>
</body>
</html>
