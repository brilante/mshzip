<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>감사 이메일 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .type-card { padding: 1rem; border-radius: 8px; border: 2px solid var(--border-color); cursor: pointer; text-align: center; }
    .type-card:hover { border-color: var(--primary); }
    .type-card.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
    .type-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .email-preview { background: white; border-radius: 8px; padding: 1.5rem; font-family: Georgia, serif; line-height: 1.8; white-space: pre-wrap; min-height: 300px; border: 1px solid var(--border-color); }
    .subject-line { background: #f3f4f6; padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; font-family: sans-serif; }
    .subject-label { font-size: 0.75rem; color: var(--text-secondary); }
    .tip-box { background: #fef3c7; border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.85rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">감사 이메일 생성기</h1>
          <p class="tool-description">면접 후 감사 이메일 작성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">이메일 유형</h3>
        <div class="type-grid">
          <div class="type-card active" onclick="ThankYouEmail.setType('interview')" data-type="interview">
            <div class="type-icon"></div>
            <div style="font-weight: 500;">면접 후</div>
          </div>
          <div class="type-card" onclick="ThankYouEmail.setType('offer')" data-type="offer">
            <div class="type-icon"></div>
            <div style="font-weight: 500;">오퍼 수락</div>
          </div>
          <div class="type-card" onclick="ThankYouEmail.setType('rejection')" data-type="rejection">
            <div class="type-icon"></div>
            <div style="font-weight: 500;">불합격 후</div>
          </div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">정보 입력</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">받는 사람 이름 *</label>
            <input type="text" id="recipientName" class="tool-input" placeholder="김인사" aria-label="김인사">
          </div>
          <div class="form-group">
            <label class="form-label">회사명 *</label>
            <input type="text" id="companyName" class="tool-input" placeholder="ABC 회사" aria-label="ABC 회사">
          </div>
          <div class="form-group">
            <label class="form-label">지원 직책</label>
            <input type="text" id="jobTitle" class="tool-input" placeholder="프론트엔드 개발자" aria-label="프론트엔드 개발자">
          </div>
          <div class="form-group">
            <label class="form-label">면접 날짜</label>
            <input type="date" id="interviewDate" class="tool-input">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">면접에서 인상적이었던 점 (선택)</label>
          <textarea id="highlights" class="tool-input" rows="2" placeholder="예: 팀 문화에 대한 설명, 프로젝트 비전 등"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">본인 이름 *</label>
          <input type="text" id="senderName" class="tool-input" placeholder="홍길동" aria-label="홍길동">
        </div>
        <button class="tool-btn tool-btn-primary" onclick="ThankYouEmail.generate()" style="width: 100%;" aria-label="이메일 생성">이메일 생성</button>
      </div>

      <div class="util-panel" id="resultPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">생성된 이메일</h3>
        <div class="subject-line">
          <div class="subject-label">제목</div>
          <div id="emailSubject" style="font-weight: 500;"></div>
        </div>
        <div class="email-preview" id="emailBody" contenteditable="true"></div>
        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="ThankYouEmail.copySubject()" style="flex: 1;" aria-label="제목 복사">제목 복사</button>
          <button class="tool-btn tool-btn-primary" onclick="ThankYouEmail.copyBody()" style="flex: 1;" aria-label="본문 복사">본문 복사</button>
        </div>
        <div class="tip-box">
          <strong>팁:</strong> 면접 후 24시간 이내에 보내는 것이 가장 효과적입니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="thank-you-email.js"></script>
</body>
</html>
