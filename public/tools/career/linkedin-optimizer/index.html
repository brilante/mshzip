<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn 프로필 최적화 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 800px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .score-container { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1rem; }
    .score-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
    .score-circle.excellent { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .score-circle.good { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
    .score-circle.fair { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .score-circle.poor { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .score-number { font-size: 2rem; }
    .score-label { font-size: 0.85rem; opacity: 0.9; }
    .checklist-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .checklist-icon { font-size: 1.25rem; flex-shrink: 0; }
    .checklist-content { flex: 1; }
    .checklist-title { font-weight: 500; margin-bottom: 0.25rem; }
    .checklist-desc { font-size: 0.85rem; color: var(--text-secondary); }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .keyword-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .keyword-tag { padding: 0.25rem 0.75rem; background: var(--primary); color: white; border-radius: 20px; font-size: 0.8rem; }
    .suggestion-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; border-left: 3px solid var(--primary); }
    .suggestion-title { font-weight: 600; margin-bottom: 0.5rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">LinkedIn 프로필 최적화</h1>
          <p class="tool-description">프로필 점수 및 개선 제안</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">프로필 정보 입력</h3>
        <div class="form-group">
          <label class="form-label">헤드라인 (직책/역할)</label>
          <input type="text" id="headline" class="tool-input" placeholder="예: Senior Software Engineer | React & Node.js Specialist" aria-label="예: Senior Software Engineer | React & Node.js Specialist">
        </div>
        <div class="form-group">
          <label class="form-label">요약 (About)</label>
          <textarea id="summary" class="tool-input" rows="4" placeholder="자신을 소개하는 요약문을 입력하세요..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">경력 수 (개)</label>
          <input type="number" id="experienceCount" class="tool-input" placeholder="3" min="0" aria-label="3">
        </div>
        <div class="form-group">
          <label class="form-label">스킬 수 (개)</label>
          <input type="number" id="skillCount" class="tool-input" placeholder="10" min="0" aria-label="10">
        </div>
        <div class="form-group">
          <label class="form-label">추천서 수 (개)</label>
          <input type="number" id="recommendationCount" class="tool-input" placeholder="0" min="0" aria-label="0">
        </div>
        <div class="form-group">
          <label class="form-label">
            <input type="checkbox" id="hasPhoto"> 프로필 사진 있음
          </label>
        </div>
        <div class="form-group">
          <label class="form-label">
            <input type="checkbox" id="hasBanner"> 배경 이미지 있음
          </label>
        </div>
        <div class="form-group">
          <label class="form-label">
            <input type="checkbox" id="hasCustomUrl"> 커스텀 URL 설정됨
          </label>
        </div>
        <button class="tool-btn tool-btn-primary" onclick="LinkedInOptimizer.analyze()" style="width: 100%;" aria-label="프로필 분석">프로필 분석</button>
      </div>

      <div class="util-panel" id="resultPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">분석 결과</h3>
        <div class="score-container">
          <div class="score-circle" id="scoreCircle">
            <span class="score-number" id="scoreNumber">0</span>
            <span class="score-label">점</span>
          </div>
          <div id="scoreDescription"></div>
        </div>
        <div id="checklist"></div>
      </div>

      <div class="util-panel" id="suggestionsPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">개선 제안</h3>
        <div id="suggestions"></div>
      </div>

      <div class="util-panel" id="keywordsPanel" style="display: none;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">추천 키워드</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem;">헤드라인과 요약에 포함하면 좋은 키워드입니다</p>
        <div class="keyword-tags" id="keywordTags"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="linkedin-optimizer.js"></script>
</body>
</html>
