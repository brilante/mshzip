<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>탄소 발자국 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .category-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; }
    .category-tab { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
    .category-tab.active { background: #22c55e; color: white; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; display: block; }
    .input-hint { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .result-card { background: linear-gradient(135deg, #22c55e, #16a34a); border-radius: 16px; padding: 2rem; color: white; text-align: center; margin-bottom: 1rem; }
    .result-value { font-size: 3rem; font-weight: 700; }
    .result-unit { font-size: 1rem; opacity: 0.9; }
    .result-label { font-size: 0.9rem; opacity: 0.8; margin-top: 0.5rem; }
    .comparison-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 1.5rem; }
    .comparison-item { background: rgba(255,255,255,0.15); padding: 0.75rem; border-radius: 8px; text-align: center; }
    .comparison-icon { font-size: 1.5rem; }
    .comparison-value { font-size: 0.9rem; font-weight: 600; }
    .comparison-label { font-size: 0.7rem; opacity: 0.8; }
    .tips-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .tip-item { display: flex; gap: 0.75rem; align-items: flex-start; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; }
    .tip-icon { font-size: 1.25rem; }
    .tip-text { font-size: 0.9rem; }
    .slider-container { display: flex; align-items: center; gap: 1rem; }
    .slider { flex: 1; }
    .slider-value { min-width: 60px; text-align: right; font-weight: 600; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">탄소 발자국 계산기</h1>
          <p class="tool-description">일상 활동의 CO₂ 배출량 측정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="category-tabs">
        <div class="category-tab active" onclick="CarbonFootprint.setCategory('transport')">교통</div>
        <div class="category-tab" onclick="CarbonFootprint.setCategory('home')">가정</div>
        <div class="category-tab" onclick="CarbonFootprint.setCategory('food')">식품</div>
        <div class="category-tab" onclick="CarbonFootprint.setCategory('shopping')">소비</div>
      </div>

      <div class="util-panel" id="inputPanel">
        <!-- Dynamic inputs -->
      </div>

      <div class="result-card">
        <div class="result-label">예상 CO₂ 배출량</div>
        <div><span class="result-value" id="co2Value">0</span><span class="result-unit"> kg CO₂</span></div>
        <div class="result-label" id="periodLabel">월간 기준</div>
        <div class="comparison-grid">
          <div class="comparison-item">
            <div class="comparison-icon"></div>
            <div class="comparison-value" id="treesNeeded">0</div>
            <div class="comparison-label">나무 (그루)</div>
          </div>
          <div class="comparison-item">
            <div class="comparison-icon"></div>
            <div class="comparison-value" id="carKm">0</div>
            <div class="comparison-label">자동차 (km)</div>
          </div>
          <div class="comparison-item">
            <div class="comparison-icon"></div>
            <div class="comparison-value" id="lightHours">0</div>
            <div class="comparison-label">전구 (시간)</div>
          </div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">줄이는 방법</h3>
        <div class="tips-list" id="tipsList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="carbon-footprint.js"></script>
</body>
</html>
