<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>친환경 팁 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .category-tabs { display: flex; gap: 0.5rem; overflow-x: auto; margin-bottom: 1rem; padding-bottom: 0.5rem; }
    .category-tab { padding: 0.5rem 1rem; background: var(--bg-secondary); border-radius: 20px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; transition: all 0.2s; }
    .category-tab.active { background: #22c55e; color: white; }
    .tip-card { background: var(--bg-secondary); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; border-left: 4px solid #22c55e; }
    .tip-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .tip-icon { font-size: 2rem; }
    .tip-difficulty { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
    .tip-difficulty.easy { background: #dcfce7; color: #166534; }
    .tip-difficulty.medium { background: #fef3c7; color: #92400e; }
    .tip-difficulty.hard { background: #fee2e2; color: #991b1b; }
    .tip-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .tip-description { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.75rem; line-height: 1.6; }
    .tip-impact { display: flex; gap: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border-color); }
    .impact-item { display: flex; align-items: center; gap: 0.25rem; font-size: 0.8rem; }
    .impact-item span { color: var(--text-secondary); }
    .tip-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .btn-action { padding: 0.4rem 0.75rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; transition: transform 0.2s; }
    .btn-action:hover { transform: scale(1.05); }
    .btn-bookmark { background: var(--bg-primary); }
    .btn-bookmark.active { background: #fbbf24; color: #78350f; }
    .btn-done { background: var(--bg-primary); }
    .btn-done.active { background: #22c55e; color: white; }
    .daily-tip { background: linear-gradient(135deg, #22c55e, #16a34a); border-radius: 16px; padding: 1.5rem; color: white; margin-bottom: 1rem; }
    .daily-tip-label { font-size: 0.8rem; opacity: 0.9; margin-bottom: 0.5rem; }
    .daily-tip-text { font-size: 1.1rem; font-weight: 500; }
    .stats-bar { display: flex; justify-content: space-around; background: var(--bg-secondary); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #22c55e; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">친환경 팁</h1>
          <p class="tool-description">일상 속 환경 보호 실천법</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="daily-tip">
        <div class="daily-tip-label">오늘의 친환경 팁</div>
        <div class="daily-tip-text" id="dailyTip">로딩 중...</div>
      </div>

      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-value" id="totalTips">0</div>
          <div class="stat-label">전체 팁</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="completedTips">0</div>
          <div class="stat-label">실천 완료</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="bookmarkedTips">0</div>
          <div class="stat-label">북마크</div>
        </div>
      </div>

      <div class="category-tabs">
        <div class="category-tab active" onclick="EcoTips.setCategory('all')">전체</div>
        <div class="category-tab" onclick="EcoTips.setCategory('energy')">에너지</div>
        <div class="category-tab" onclick="EcoTips.setCategory('water')">물</div>
        <div class="category-tab" onclick="EcoTips.setCategory('waste')">쓰레기</div>
        <div class="category-tab" onclick="EcoTips.setCategory('food')">음식</div>
        <div class="category-tab" onclick="EcoTips.setCategory('transport')">교통</div>
        <div class="category-tab" onclick="EcoTips.setCategory('bookmarked')">북마크</div>
      </div>

      <div id="tipList"></div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="eco-tips.js"></script>
</body>
</html>
