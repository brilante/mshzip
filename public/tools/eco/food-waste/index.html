<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>음식물 쓰레기 관리 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .result-card { background: linear-gradient(135deg, #f97316, #ea580c); border-radius: 16px; padding: 2rem; color: white; text-align: center; margin-bottom: 1rem; }
    .result-value { font-size: 3rem; font-weight: 700; }
    .result-unit { font-size: 1rem; }
    .result-label { font-size: 0.9rem; opacity: 0.9; }
    .stats-row { display: flex; justify-content: space-around; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.2); }
    .stat-item { text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 600; }
    .stat-label { font-size: 0.7rem; opacity: 0.8; }
    .log-form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .category-select { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .category-btn { padding: 0.5rem; background: var(--bg-primary); border-radius: 8px; border: 2px solid transparent; cursor: pointer; text-align: center; font-size: 0.8rem; transition: all 0.2s; }
    .category-btn:hover { border-color: var(--primary); }
    .category-btn.selected { border-color: #f97316; background: rgba(249, 115, 22, 0.1); }
    .category-icon { font-size: 1.25rem; display: block; margin-bottom: 0.25rem; }
    .log-list { max-height: 250px; overflow-y: auto; }
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .log-info { display: flex; align-items: center; gap: 0.75rem; }
    .log-name { font-weight: 500; }
    .log-meta { font-size: 0.75rem; color: var(--text-secondary); }
    .btn-delete { background: #ef4444; color: white; border: none; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .tips-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .tip-card { background: var(--bg-primary); border-radius: 8px; padding: 0.75rem; }
    .tip-icon { font-size: 1.25rem; margin-bottom: 0.25rem; }
    .tip-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .tip-text { font-size: 0.75rem; color: var(--text-secondary); }
    .chart-container { height: 120px; display: flex; align-items: flex-end; gap: 4px; }
    .chart-bar { flex: 1; background: #f97316; border-radius: 4px 4px 0 0; min-height: 4px; position: relative; }
    .chart-bar-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">음식물 쓰레기 관리</h1>
          <p class="tool-description">음식물 쓰레기 추적 및 줄이기</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="result-card">
        <div class="result-label">이번 주 음식물 쓰레기</div>
        <div><span class="result-value" id="weekTotal">0</span><span class="result-unit"> g</span></div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-value" id="co2Impact">0</div>
            <div class="stat-label">CO₂ 배출 (kg)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="costWasted">0</div>
            <div class="stat-label">낭비 비용 (원)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="avgDaily">0</div>
            <div class="stat-label">일 평균 (g)</div>
          </div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">기록 추가</h3>
        <div class="category-select" id="categorySelect"></div>
        <div class="log-form">
          <input type="text" id="foodName" class="tool-input" placeholder="음식명" style="flex: 1;" aria-label="음식명">
          <input type="number" id="foodAmount" class="tool-input" placeholder="양(g)" style="width: 80px;" aria-label="양(g)">
          <button class="tool-btn tool-btn-primary" onclick="FoodWaste.addLog()" aria-label="추가">추가</button>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">주간 추이</h3>
        <div class="chart-container" id="weeklyChart"></div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">최근 기록</h3>
        <div class="log-list" id="logList"></div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">줄이는 방법</h3>
        <div class="tips-grid">
          <div class="tip-card">
            <div class="tip-icon"></div>
            <div class="tip-title">쇼핑 리스트</div>
            <div class="tip-text">필요한 것만 계획적으로 구매</div>
          </div>
          <div class="tip-card">
            <div class="tip-icon"></div>
            <div class="tip-title">유통기한 확인</div>
            <div class="tip-text">먼저 산 것 먼저 소비하기</div>
          </div>
          <div class="tip-card">
            <div class="tip-icon"></div>
            <div class="tip-title">적당량 조리</div>
            <div class="tip-text">인분에 맞게 요리하기</div>
          </div>
          <div class="tip-card">
            <div class="tip-icon"></div>
            <div class="tip-title">냉동 보관</div>
            <div class="tip-text">남은 음식은 바로 냉동</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="food-waste.js"></script>
</body>
</html>
