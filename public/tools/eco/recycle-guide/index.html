<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재활용 가이드 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .search-box { position: relative; margin-bottom: 1rem; }
    .search-box input { padding-left: 2.5rem; font-size: 1rem; }
    .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); }
    .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .category-btn { padding: 0.75rem 0.5rem; background: var(--bg-secondary); border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
    .category-btn:hover { background: var(--bg-primary); }
    .category-btn.active { background: #22c55e; color: white; }
    .category-icon { font-size: 1.5rem; display: block; margin-bottom: 0.25rem; }
    .item-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .item-card { background: var(--bg-secondary); border-radius: 12px; padding: 1rem; cursor: pointer; transition: transform 0.2s; }
    .item-card:hover { transform: translateY(-2px); }
    .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .item-name { font-weight: 600; font-size: 1rem; }
    .item-category { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 4px; }
    .item-category.recyclable { background: #dcfce7; color: #166534; }
    .item-category.general { background: #fef3c7; color: #92400e; }
    .item-category.special { background: #dbeafe; color: #1e40af; }
    .item-category.hazardous { background: #fee2e2; color: #991b1b; }
    .item-method { font-size: 0.9rem; color: var(--text-secondary); }
    .detail-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .detail-modal.show { display: flex; }
    .detail-content { background: var(--bg-primary); border-radius: 16px; max-width: 450px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .detail-header { padding: 1.5rem; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border-radius: 16px 16px 0 0; }
    .detail-title { font-size: 1.5rem; font-weight: 700; }
    .detail-body { padding: 1.5rem; }
    .detail-section { margin-bottom: 1rem; }
    .detail-section-title { font-weight: 600; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .detail-list { padding-left: 1.25rem; }
    .detail-list li { margin-bottom: 0.25rem; font-size: 0.9rem; }
    .close-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">재활용 가이드</h1>
          <p class="tool-description">올바른 분리배출 방법</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="search-box">
        <span class="search-icon"></span>
        <input type="text" id="searchInput" class="tool-input" placeholder="품목 검색 (예: 페트병, 종이컵)..." oninput="RecycleGuide.search(this.value)" aria-label="품목 검색 (예: 페트병, 종이컵)...">
      </div>

      <div class="category-grid">
        <div class="category-btn active" onclick="RecycleGuide.setCategory('all')">
          <span class="category-icon"></span>전체
        </div>
        <div class="category-btn" onclick="RecycleGuide.setCategory('plastic')">
          <span class="category-icon"></span>플라스틱
        </div>
        <div class="category-btn" onclick="RecycleGuide.setCategory('paper')">
          <span class="category-icon"></span>종이
        </div>
        <div class="category-btn" onclick="RecycleGuide.setCategory('glass')">
          <span class="category-icon"></span>유리
        </div>
        <div class="category-btn" onclick="RecycleGuide.setCategory('metal')">
          <span class="category-icon"></span>캔/금속
        </div>
        <div class="category-btn" onclick="RecycleGuide.setCategory('vinyl')">
          <span class="category-icon"></span>비닐
        </div>
        <div class="category-btn" onclick="RecycleGuide.setCategory('food')">
          <span class="category-icon"></span>음식물
        </div>
        <div class="category-btn" onclick="RecycleGuide.setCategory('special')">
          <span class="category-icon"></span>특수폐기물
        </div>
      </div>

      <div class="item-list" id="itemList"></div>
    </div>
  </div>

  <div class="detail-modal" id="detailModal" onclick="RecycleGuide.closeModal(event)">
    <div class="detail-content" onclick="event.stopPropagation()">
      <div class="detail-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span class="detail-title" id="modalTitle">-</span>
          <button class="close-btn" onclick="RecycleGuide.closeModal()" aria-label=""></button>
        </div>
      </div>
      <div class="detail-body" id="modalBody"></div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="recycle-guide.js"></script>
</body>
</html>
