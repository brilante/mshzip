<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>에너지 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .result-card { background: linear-gradient(135deg, #f97316, #ea580c); border-radius: 16px; padding: 2rem; color: white; text-align: center; margin-bottom: 1rem; }
    .result-value { font-size: 3rem; font-weight: 700; }
    .result-unit { font-size: 1rem; }
    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .result-item { background: rgba(255,255,255,0.15); padding: 1rem; border-radius: 8px; text-align: center; }
    .result-item-value { font-size: 1.5rem; font-weight: 600; }
    .result-item-label { font-size: 0.75rem; opacity: 0.9; }
    .appliance-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .appliance-item { display: grid; grid-template-columns: 1fr 80px 80px 60px; gap: 0.5rem; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; }
    .appliance-name { font-size: 0.9rem; }
    .appliance-input { text-align: center; font-size: 0.85rem; }
    .btn-remove { background: #ef4444; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 0.8rem; }
    .add-form { display: grid; grid-template-columns: 1fr 80px 80px auto; gap: 0.5rem; align-items: end; }
    .input-label { font-size: 0.75rem; color: var(--text-secondary); }
    .total-bar { margin-top: 1rem; }
    .bar-container { height: 12px; background: var(--bg-primary); border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
    .bar-legend { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">에너지 계산기</h1>
          <p class="tool-description">가전제품별 전력 소비량 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="result-card">
        <div style="font-size: 0.9rem; opacity: 0.9;">월간 전력 소비량</div>
        <div><span class="result-value" id="totalKwh">0</span><span class="result-unit"> kWh</span></div>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-item-value" id="monthlyCost">0</div>
            <div class="result-item-label">예상 요금 (원)</div>
          </div>
          <div class="result-item">
            <div class="result-item-value" id="co2Emission">0</div>
            <div class="result-item-label">CO₂ 배출 (kg)</div>
          </div>
          <div class="result-item">
            <div class="result-item-value" id="dailyKwh">0</div>
            <div class="result-item-label">일일 사용량 (kWh)</div>
          </div>
          <div class="result-item">
            <div class="result-item-value" id="yearCost">0</div>
            <div class="result-item-label">연간 예상 (만원)</div>
          </div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">가전제품 목록</h3>
        <div class="appliance-list" id="applianceList"></div>

        <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
          <div class="add-form">
            <div>
              <div class="input-label">가전제품</div>
              <select id="newAppliance" class="tool-input" style="font-size: 0.85rem;">
                <option value="에어컨|1500">에어컨 (1500W)</option>
                <option value="냉장고|150">냉장고 (150W)</option>
                <option value="TV|100">TV (100W)</option>
                <option value="세탁기|500">세탁기 (500W)</option>
                <option value="전자레인지|1000">전자레인지 (1000W)</option>
                <option value="컴퓨터|200">컴퓨터 (200W)</option>
                <option value="조명|60">조명 (60W)</option>
                <option value="선풍기|50">선풍기 (50W)</option>
                <option value="헤어드라이어|1200">헤어드라이어 (1200W)</option>
                <option value="전기밥솥|1000">전기밥솥 (1000W)</option>
              </select>
            </div>
            <div>
              <div class="input-label">시간/일</div>
              <input type="number" id="newHours" class="tool-input appliance-input" value="1" min="0" step="0.5">
            </div>
            <div>
              <div class="input-label">일/월</div>
              <input type="number" id="newDays" class="tool-input appliance-input" value="30" min="1" max="31">
            </div>
            <button class="tool-btn tool-btn-primary" onclick="EnergyCalc.addAppliance()" style="height: 38px;" aria-label="추가">추가</button>
          </div>
        </div>

        <div class="total-bar">
          <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.25rem;">
            <span>전력 사용 등급</span>
            <span id="usageLevel">-</span>
          </div>
          <div class="bar-container">
            <div class="bar-fill" id="usageBar" style="width: 0%; background: #22c55e;"></div>
          </div>
          <div class="bar-legend">
            <span>0 kWh</span>
            <span>200 kWh</span>
            <span>400 kWh</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="energy-calc.js"></script>
</body>
</html>
