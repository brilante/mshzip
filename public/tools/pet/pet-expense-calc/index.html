<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>반려동물 비용 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .pet-container { max-width: 700px; margin: 0 auto; }
    .pet-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .expense-section { margin-bottom: 1.5rem; }
    .expense-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .expense-grid { display: grid; grid-template-columns: 1fr 120px; gap: 0.5rem; }
    .expense-item { display: contents; }
    .expense-label { display: flex; align-items: center; padding: 0.5rem; background: var(--bg-primary); border-radius: 8px; font-size: 0.9rem; }
    .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .result-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; text-align: center; }
    .result-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .result-label { font-size: 0.8rem; color: var(--text-secondary); }
    .total-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .total-card .result-value { color: white; }
    .total-card .result-label { color: rgba(255,255,255,0.8); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">반려동물 비용 계산기</h1>
          <p class="tool-description">월간/연간 양육 비용 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="pet-container">
      <div class="pet-panel">
        <div class="expense-section">
          <div class="expense-title">사료/간식</div>
          <div class="expense-grid">
            <div class="expense-label">사료비 (월)</div>
            <input type="number" id="food" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
            <div class="expense-label">간식비 (월)</div>
            <input type="number" id="treats" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
          </div>
        </div>

        <div class="expense-section">
          <div class="expense-title">의료비</div>
          <div class="expense-grid">
            <div class="expense-label">정기 검진 (연)</div>
            <input type="number" id="checkup" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
            <div class="expense-label">예방접종 (연)</div>
            <input type="number" id="vaccine" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
            <div class="expense-label">심장사상충 예방 (월)</div>
            <input type="number" id="heartworm" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
          </div>
        </div>

        <div class="expense-section">
          <div class="expense-title">미용/위생</div>
          <div class="expense-grid">
            <div class="expense-label">미용비 (월)</div>
            <input type="number" id="grooming" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
            <div class="expense-label">위생용품 (월)</div>
            <input type="number" id="hygiene" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
          </div>
        </div>

        <div class="expense-section">
          <div class="expense-title">기타</div>
          <div class="expense-grid">
            <div class="expense-label">장난감/용품 (월)</div>
            <input type="number" id="toys" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
            <div class="expense-label">보험료 (월)</div>
            <input type="number" id="insurance" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
            <div class="expense-label">기타 (월)</div>
            <input type="number" id="other" class="tool-input" placeholder="0" oninput="ExpenseCalc.calculate()" aria-label="0">
          </div>
        </div>

        <div class="result-grid">
          <div class="result-card">
            <div class="result-value" id="monthlyFixed">0</div>
            <div class="result-label">월 고정비</div>
          </div>
          <div class="result-card">
            <div class="result-value" id="monthlyVariable">0</div>
            <div class="result-label">월 변동비</div>
          </div>
          <div class="result-card total-card">
            <div class="result-value" id="monthlyTotal">0</div>
            <div class="result-label">월 총계</div>
          </div>
        </div>

        <div class="result-grid" style="margin-top: 0.5rem;">
          <div class="result-card" style="grid-column: span 2;">
            <div class="result-value" id="yearlyTotal">0</div>
            <div class="result-label">연간 총 비용</div>
          </div>
          <div class="result-card">
            <div class="result-value" id="dailyAvg">0</div>
            <div class="result-label">일 평균</div>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
          <button class="tool-btn tool-btn-secondary" onclick="ExpenseCalc.saveData()" style="flex: 1;" aria-label="저장">저장</button>
          <button class="tool-btn tool-btn-secondary" onclick="ExpenseCalc.exportData()" style="flex: 1;" aria-label="내보내기">내보내기</button>
          <button class="tool-btn tool-btn-secondary" onclick="ExpenseCalc.clearAll()" style="flex: 1;" aria-label="초기화">초기화</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pet-expense-calc.js"></script>
</body>
</html>
