<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>산책 추적기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .pet-container { max-width: 700px; margin: 0 auto; }
    .pet-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .week-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 120px; padding: 1rem; background: var(--bg-primary); border-radius: 12px; margin-bottom: 1.5rem; }
    .week-bar { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .bar-fill { width: 30px; background: linear-gradient(to top, #667eea, #764ba2); border-radius: 4px 4px 0 0; transition: height 0.3s; }
    .bar-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .bar-value { font-size: 0.7rem; margin-bottom: 0.25rem; }
    .add-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .add-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 0.75rem; align-items: end; }
    .history-list { max-height: 250px; overflow-y: auto; }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid var(--bg-secondary); }
    .history-date { font-weight: 500; }
    .history-info { display: flex; gap: 1rem; font-size: 0.9rem; color: var(--text-secondary); }
    .goal-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; color: white; display: flex; justify-content: space-between; align-items: center; }
    .goal-progress { width: 100px; height: 100px; position: relative; }
    .goal-circle { transform: rotate(-90deg); }
    .goal-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .goal-percent { font-size: 1.5rem; font-weight: 700; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">산책 추적기</h1>
          <p class="tool-description">반려동물 산책 기록</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="pet-container">
      <div class="pet-panel">
        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
          <div style="flex: 1;">
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">반려동물 이름</label>
            <input type="text" id="petName" class="tool-input" placeholder="예: 초코" oninput="WalkTracker.save()" aria-label="예: 초코">
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">일일 목표 (분)</label>
            <input type="number" id="dailyGoal" class="tool-input" value="30" min="10" step="5" oninput="WalkTracker.save(); WalkTracker.render();">
          </div>
        </div>

        <div class="goal-section">
          <div>
            <div style="font-size: 0.9rem; opacity: 0.9;">오늘의 산책</div>
            <div style="font-size: 1.5rem; font-weight: 700;" id="todayTotal">0분</div>
            <div style="font-size: 0.8rem; opacity: 0.8;" id="todayGoalText">목표: 30분</div>
          </div>
          <div class="goal-progress">
            <svg class="goal-circle" width="100" height="100">
              <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8"/>
              <circle id="goalCircle" cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-dasharray="251.2" stroke-dashoffset="251.2"/>
            </svg>
            <div class="goal-text">
              <div class="goal-percent" id="goalPercent">0%</div>
            </div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="weekTotal">0</div>
            <div class="stat-label">이번 주 (분)</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="weekAvg">0</div>
            <div class="stat-label">일 평균 (분)</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="streak">0</div>
            <div class="stat-label">연속 산책일</div>
          </div>
        </div>

        <div class="week-chart" id="weekChart"></div>

        <div class="add-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">산책 기록 추가</h3>
          <div class="add-grid">
            <div>
              <label style="font-size: 0.75rem; color: var(--text-secondary);">날짜</label>
              <input type="date" id="walkDate" class="tool-input">
            </div>
            <div>
              <label style="font-size: 0.75rem; color: var(--text-secondary);">시간 (분)</label>
              <input type="number" id="walkDuration" class="tool-input" placeholder="30" min="1" aria-label="30">
            </div>
            <div>
              <label style="font-size: 0.75rem; color: var(--text-secondary);">메모</label>
              <input type="text" id="walkNote" class="tool-input" placeholder="공원 산책" aria-label="공원 산책">
            </div>
            <button class="tool-btn tool-btn-primary" onclick="WalkTracker.addRecord()" aria-label="추가">추가</button>
          </div>
        </div>

        <div>
          <h3 style="font-weight: 600; margin-bottom: 0.5rem;">기록</h3>
          <div class="history-list" id="historyList"></div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="WalkTracker.exportData()" style="flex: 1;" aria-label="내보내기">내보내기</button>
          <button class="tool-btn tool-btn-secondary" onclick="WalkTracker.clearAll()" style="flex: 1;" aria-label="초기화">초기화</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="walk-tracker.js"></script>
</body>
</html>
