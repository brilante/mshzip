<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투약 알림 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .pet-container { max-width: 700px; margin: 0 auto; }
    .pet-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .alert-banner { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; display: none; }
    .alert-banner.show { display: block; }
    .alert-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; }
    .alert-desc { font-size: 0.9rem; opacity: 0.9; }
    .med-list { margin-top: 1.5rem; }
    .med-item { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; }
    .med-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .med-name { font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
    .med-status { font-size: 0.8rem; padding: 0.25rem 0.75rem; border-radius: 12px; }
    .status-due { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .status-today { background: rgba(234, 179, 8, 0.2); color: #eab308; }
    .status-done { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .med-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 0.75rem; font-size: 0.85rem; }
    .med-detail { color: var(--text-secondary); }
    .med-detail span { color: var(--text-primary); font-weight: 500; }
    .med-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .add-section { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .freq-options { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .freq-btn { padding: 0.5rem 1rem; border-radius: 8px; background: var(--bg-secondary); border: none; cursor: pointer; font-size: 0.85rem; }
    .freq-btn.selected { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">투약 알림</h1>
          <p class="tool-description">반려동물 약 복용 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="pet-container">
      <div class="pet-panel">
        <div style="margin-bottom: 1.5rem;">
          <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">반려동물 이름</label>
          <input type="text" id="petName" class="tool-input" placeholder="예: 초코" oninput="MedReminder.save()" aria-label="예: 초코">
        </div>

        <div class="alert-banner" id="alertBanner">
          <div class="alert-title">투약 필요!</div>
          <div class="alert-desc" id="alertText">오늘 투약해야 할 약이 있습니다.</div>
        </div>

        <div class="add-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">약 추가</h3>
          <div class="add-grid">
            <div class="form-group">
              <label>약 이름</label>
              <input type="text" id="medName" class="tool-input" placeholder="예: 심장사상충 예방약" aria-label="예: 심장사상충 예방약">
            </div>
            <div class="form-group">
              <label>용량/복용법</label>
              <input type="text" id="medDosage" class="tool-input" placeholder="예: 1정" aria-label="예: 1정">
            </div>
            <div class="form-group">
              <label>시작일</label>
              <input type="date" id="medStartDate" class="tool-input">
            </div>
            <div class="form-group">
              <label>종료일 (선택)</label>
              <input type="date" id="medEndDate" class="tool-input">
            </div>
          </div>
          <div class="form-group">
            <label>투약 주기</label>
            <div class="freq-options" id="freqOptions">
              <button class="freq-btn selected" data-freq="daily" onclick="MedReminder.setFreq('daily')" aria-label="매일">매일</button>
              <button class="freq-btn" data-freq="weekly" onclick="MedReminder.setFreq('weekly')" aria-label="매주">매주</button>
              <button class="freq-btn" data-freq="monthly" onclick="MedReminder.setFreq('monthly')" aria-label="매월">매월</button>
              <button class="freq-btn" data-freq="custom" onclick="MedReminder.setFreq('custom')" aria-label="직접입력">직접입력</button>
            </div>
            <div id="customFreqInput" style="display: none; margin-top: 0.5rem;">
              <input type="number" id="customDays" class="tool-input" placeholder="일 간격" min="1" style="width: 120px;" aria-label="일 간격">
              <span style="font-size: 0.85rem; color: var(--text-secondary);">일마다</span>
            </div>
          </div>
          <button class="tool-btn tool-btn-primary" onclick="MedReminder.addMed()" style="width: 100%; margin-top: 0.5rem;" aria-label="추가">추가</button>
        </div>

        <div class="med-list" id="medList">
          <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">등록된 약이 없습니다</div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="MedReminder.exportData()" style="flex: 1;" aria-label="내보내기">내보내기</button>
          <button class="tool-btn tool-btn-secondary" onclick="MedReminder.clearAll()" style="flex: 1;" aria-label="초기화">초기화</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="medication-reminder.js"></script>
</body>
</html>
