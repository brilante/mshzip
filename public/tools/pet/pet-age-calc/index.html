<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>반려동물 나이 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .pet-container { max-width: 600px; margin: 0 auto; }
    .pet-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .pet-type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .pet-type { padding: 1.5rem; border-radius: 12px; background: var(--bg-primary); cursor: pointer; text-align: center; border: 3px solid transparent; transition: all 0.2s; }
    .pet-type:hover { border-color: var(--primary); }
    .pet-type.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
    .pet-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .pet-name { font-weight: 600; }
    .result-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 2rem; color: white; text-align: center; margin: 1.5rem 0; }
    .human-age { font-size: 4rem; font-weight: 700; }
    .age-label { font-size: 1rem; opacity: 0.9; }
    .life-stage { margin-top: 1rem; padding: 0.5rem 1rem; background: rgba(255,255,255,0.2); border-radius: 20px; display: inline-block; }
    .size-select { margin-bottom: 1rem; }
    .info-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">반려동물 나이 계산기</h1>
          <p class="tool-description">사람 나이로 환산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="pet-container">
      <div class="pet-panel">
        <div class="pet-type-grid">
          <div class="pet-type selected" data-type="dog" onclick="PetAgeCalc.selectType('dog')">
            <div class="pet-icon"></div>
            <div class="pet-name">강아지</div>
          </div>
          <div class="pet-type" data-type="cat" onclick="PetAgeCalc.selectType('cat')">
            <div class="pet-icon"></div>
            <div class="pet-name">고양이</div>
          </div>
        </div>

        <div class="size-select" id="sizeSelect">
          <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">강아지 크기</label>
          <select id="dogSize" class="tool-input" onchange="PetAgeCalc.calculate()">
            <option value="small">소형 (10kg 미만)</option>
            <option value="medium">중형 (10-25kg)</option>
            <option value="large">대형 (25kg 이상)</option>
          </select>
        </div>

        <div>
          <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">반려동물 나이</label>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            <input type="number" id="petAge" class="tool-input" value="3" min="0" max="30" step="0.5" oninput="PetAgeCalc.calculate()">
            <span>살</span>
          </div>
        </div>

        <div class="result-card">
          <div class="age-label">사람 나이로 환산하면</div>
          <div class="human-age" id="humanAge">28</div>
          <div class="age-label">세</div>
          <div class="life-stage" id="lifeStage">성년기</div>
        </div>

        <div class="info-card" id="infoCard">
          <strong>참고 정보</strong>
          <p id="infoText" style="margin-top: 0.5rem; color: var(--text-secondary);"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pet-age-calc.js"></script>
</body>
</html>
