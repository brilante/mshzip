<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>반려동물 이름 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .pet-container { max-width: 600px; margin: 0 auto; }
    .pet-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .option-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .option-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 1rem; }
    .theme-btn { padding: 0.75rem; border-radius: 8px; background: var(--bg-primary); border: 2px solid transparent; cursor: pointer; text-align: center; transition: all 0.2s; }
    .theme-btn:hover { background: var(--bg-tertiary); }
    .theme-btn.selected { border-color: var(--primary); background: rgba(102, 126, 234, 0.1); }
    .theme-icon { font-size: 1.5rem; }
    .theme-label { font-size: 0.8rem; margin-top: 0.25rem; }
    .result-section { margin-top: 2rem; }
    .name-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .name-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; }
    .name-card:hover { transform: scale(1.02); }
    .name-card.favorite { background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2)); }
    .name-text { font-size: 1.25rem; font-weight: 600; }
    .name-meaning { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .favorite-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: none; border: none; cursor: pointer; font-size: 1rem; opacity: 0.5; }
    .favorite-btn:hover, .name-card.favorite .favorite-btn { opacity: 1; }
    .favorites-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--bg-primary); }
    .favorites-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .favorite-tag { background: var(--bg-primary); padding: 0.5rem 1rem; border-radius: 20px; display: flex; align-items: center; gap: 0.5rem; }
    .remove-fav { background: none; border: none; cursor: pointer; opacity: 0.5; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">이름 생성기</h1>
          <p class="tool-description">반려동물 이름 추천</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="pet-container">
      <div class="pet-panel">
        <div class="option-grid">
          <div class="option-group">
            <label>반려동물 종류</label>
            <select id="petType" class="tool-input">
              <option value="dog">강아지</option>
              <option value="cat">고양이</option>
              <option value="other">기타</option>
            </select>
          </div>
          <div class="option-group">
            <label>성별</label>
            <select id="gender" class="tool-input">
              <option value="any">상관없음</option>
              <option value="male">수컷</option>
              <option value="female">암컷</option>
            </select>
          </div>
        </div>

        <div>
          <label style="font-size: 0.85rem; font-weight: 500;">테마 선택</label>
          <div class="theme-grid" id="themeGrid">
            <div class="theme-btn selected" data-theme="cute" onclick="NameGen.setTheme('cute')">
              <div class="theme-icon"></div>
              <div class="theme-label">귀여운</div>
            </div>
            <div class="theme-btn" data-theme="food" onclick="NameGen.setTheme('food')">
              <div class="theme-icon"></div>
              <div class="theme-label">음식</div>
            </div>
            <div class="theme-btn" data-theme="nature" onclick="NameGen.setTheme('nature')">
              <div class="theme-icon"></div>
              <div class="theme-label">자연</div>
            </div>
            <div class="theme-btn" data-theme="royal" onclick="NameGen.setTheme('royal')">
              <div class="theme-icon"></div>
              <div class="theme-label">고급</div>
            </div>
            <div class="theme-btn" data-theme="unique" onclick="NameGen.setTheme('unique')">
              <div class="theme-icon"></div>
              <div class="theme-label">독특한</div>
            </div>
            <div class="theme-btn" data-theme="korean" onclick="NameGen.setTheme('korean')">
              <div class="theme-icon">🇰🇷</div>
              <div class="theme-label">한국식</div>
            </div>
          </div>
        </div>

        <button class="tool-btn tool-btn-primary" onclick="NameGen.generate()" style="width: 100%; margin-top: 1.5rem;" aria-label="이름 생성하기">
          이름 생성하기
        </button>

        <div class="result-section">
          <h3 style="font-weight: 600; margin-bottom: 1rem;">추천 이름</h3>
          <div class="name-grid" id="nameGrid">
            <div style="grid-column: span 2; text-align: center; color: var(--text-secondary); padding: 2rem;">
              위 옵션을 선택하고 생성 버튼을 눌러주세요
            </div>
          </div>
        </div>

        <div class="favorites-section">
          <h3 style="font-weight: 600;">저장된 이름</h3>
          <div class="favorites-list" id="favoritesList">
            <span style="color: var(--text-secondary); font-size: 0.9rem;">저장된 이름이 없습니다</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pet-name-gen.js"></script>
</body>
</html>
