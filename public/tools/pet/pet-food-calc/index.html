<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>반려동물 사료량 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .pet-container { max-width: 600px; margin: 0 auto; }
    .pet-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .result-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 1.5rem; color: white; text-align: center; margin: 1.5rem 0; }
    .result-main { font-size: 3rem; font-weight: 700; }
    .result-unit { font-size: 1rem; opacity: 0.9; }
    .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1rem; }
    .result-item { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 0.75rem; }
    .result-value { font-size: 1.25rem; font-weight: 600; }
    .result-label { font-size: 0.75rem; opacity: 0.8; }
    .activity-levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .activity-btn { padding: 0.75rem; border-radius: 8px; border: 2px solid transparent; background: var(--bg-primary); cursor: pointer; text-align: center; font-size: 0.85rem; }
    .activity-btn.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
    .tip-card { background: var(--bg-primary); border-radius: 8px; padding: 1rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">사료량 계산기</h1>
          <p class="tool-description">1일 적정 사료량 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="pet-container">
      <div class="pet-panel">
        <div class="input-grid">
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">동물 종류</label>
            <select id="petType" class="tool-input" onchange="PetFoodCalc.calculate()">
              <option value="dog">강아지</option>
              <option value="cat">고양이</option>
            </select>
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">체중 (kg)</label>
            <input type="number" id="weight" class="tool-input" value="10" min="0.5" max="100" step="0.5" oninput="PetFoodCalc.calculate()">
          </div>
        </div>

        <div class="input-grid">
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">나이</label>
            <select id="ageGroup" class="tool-input" onchange="PetFoodCalc.calculate()">
              <option value="puppy">아기 (1세 미만)</option>
              <option value="adult" selected>성견/성묘 (1-7세)</option>
              <option value="senior">노령 (7세 이상)</option>
            </select>
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">상태</label>
            <select id="condition" class="tool-input" onchange="PetFoodCalc.calculate()">
              <option value="normal" selected>일반</option>
              <option value="neutered">중성화</option>
              <option value="overweight">과체중</option>
              <option value="pregnant">임신/수유</option>
            </select>
          </div>
        </div>

        <div>
          <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">활동량</label>
          <div class="activity-levels">
            <div class="activity-btn" data-level="low" onclick="PetFoodCalc.setActivity('low')">
              <div></div>
              <div>낮음</div>
            </div>
            <div class="activity-btn selected" data-level="normal" onclick="PetFoodCalc.setActivity('normal')">
              <div></div>
              <div>보통</div>
            </div>
            <div class="activity-btn" data-level="high" onclick="PetFoodCalc.setActivity('high')">
              <div></div>
              <div>높음</div>
            </div>
          </div>
        </div>

        <div class="result-card">
          <div style="font-size: 0.9rem; opacity: 0.9; margin-bottom: 0.5rem;">1일 권장 사료량</div>
          <div class="result-main" id="dailyAmount">180</div>
          <div class="result-unit">그램 (g)</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-value" id="kcalNeed">720</div>
              <div class="result-label">필요 칼로리</div>
            </div>
            <div class="result-item">
              <div class="result-value" id="mealAmount">90</div>
              <div class="result-label">1회 급여량(g)</div>
            </div>
            <div class="result-item">
              <div class="result-value" id="mealsPerDay">2</div>
              <div class="result-label">1일 급여 횟수</div>
            </div>
          </div>
        </div>

        <div class="tip-card">
          <strong>급여 팁</strong>
          <p id="tipText" style="margin-top: 0.5rem; color: var(--text-secondary);"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pet-food-calc.js"></script>
</body>
</html>
