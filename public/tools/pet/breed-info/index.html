<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>품종 정보 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .pet-container { max-width: 800px; margin: 0 auto; }
    .pet-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .search-section { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .type-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .type-tab { padding: 0.5rem 1rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; border: none; font-size: 0.9rem; }
    .type-tab.active { background: var(--primary); color: white; }
    .breed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .breed-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; cursor: pointer; transition: transform 0.2s; }
    .breed-card:hover { transform: translateY(-2px); }
    .breed-icon { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
    .breed-name { font-weight: 600; text-align: center; font-size: 0.95rem; }
    .breed-origin { font-size: 0.75rem; color: var(--text-secondary); text-align: center; }
    .detail-panel { background: var(--bg-primary); border-radius: 12px; padding: 1.5rem; margin-top: 1rem; display: none; }
    .detail-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .detail-icon { font-size: 3rem; }
    .detail-title { font-size: 1.5rem; font-weight: 700; }
    .detail-subtitle { font-size: 0.9rem; color: var(--text-secondary); }
    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .info-item { background: var(--bg-secondary); padding: 1rem; border-radius: 8px; }
    .info-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .info-value { font-weight: 600; }
    .rating-bar { height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }
    .rating-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; }
    .traits-section { margin-top: 1rem; }
    .traits-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .trait-tag { background: var(--bg-secondary); padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.8rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">품종 정보</h1>
          <p class="tool-description">반려동물 품종별 특성 안내</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="pet-container">
      <div class="pet-panel">
        <div class="type-tabs">
          <button class="type-tab active" onclick="BreedInfo.setType('dog')" aria-label="강아지">강아지</button>
          <button class="type-tab" onclick="BreedInfo.setType('cat')" aria-label="고양이">고양이</button>
        </div>

        <div class="search-section">
          <input type="text" id="searchInput" class="tool-input" placeholder="품종 검색..." oninput="BreedInfo.search(this.value)" style="flex: 1;" aria-label="품종 검색...">
        </div>

        <div class="breed-grid" id="breedGrid"></div>

        <div class="detail-panel" id="detailPanel">
          <div class="detail-header">
            <div class="detail-icon" id="detailIcon"></div>
            <div>
              <div class="detail-title" id="detailTitle"></div>
              <div class="detail-subtitle" id="detailSubtitle"></div>
            </div>
          </div>

          <div class="info-grid" id="infoGrid"></div>

          <div class="traits-section">
            <div style="font-weight: 600;">특성</div>
            <div class="traits-list" id="traitsList"></div>
          </div>

          <div style="margin-top: 1rem; padding: 1rem; background: var(--bg-secondary); border-radius: 8px;">
            <div style="font-weight: 600; margin-bottom: 0.5rem;">참고사항</div>
            <div id="noteText" style="font-size: 0.9rem; color: var(--text-secondary);"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="breed-info.js"></script>
</body>
</html>
