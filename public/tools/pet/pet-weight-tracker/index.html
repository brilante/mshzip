<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체중 추적기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .pet-container { max-width: 700px; margin: 0 auto; }
    .pet-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1.5rem 0; }
    .stat-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .chart-container { background: var(--bg-primary); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; height: 200px; position: relative; }
    .chart-bar { position: absolute; bottom: 40px; background: linear-gradient(to top, #667eea, #764ba2); border-radius: 4px 4px 0 0; min-width: 30px; }
    .chart-label { position: absolute; bottom: 10px; font-size: 0.7rem; color: var(--text-secondary); transform: translateX(-50%); }
    .chart-value { position: absolute; top: -20px; font-size: 0.75rem; font-weight: 500; transform: translateX(-50%); }
    .record-list { max-height: 200px; overflow-y: auto; }
    .record-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid var(--bg-secondary); }
    .add-record { display: flex; gap: 0.5rem; margin-top: 1rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">체중 추적기</h1>
          <p class="tool-description">반려동물 체중 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="pet-container">
      <div class="pet-panel">
        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
          <div style="flex: 1;">
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">반려동물 이름</label>
            <input type="text" id="petName" class="tool-input" placeholder="예: 초코" aria-label="예: 초코">
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem;">목표 체중 (kg)</label>
            <input type="number" id="targetWeight" class="tool-input" placeholder="10" step="0.1" oninput="WeightTracker.save()" aria-label="10">
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="currentWeight">-</div>
            <div class="stat-label">현재 체중</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="weightChange">-</div>
            <div class="stat-label">변화량</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="toGoal">-</div>
            <div class="stat-label">목표까지</div>
          </div>
        </div>

        <div class="chart-container" id="chartContainer">
          <div style="text-align: center; color: var(--text-secondary); padding-top: 80px;">기록을 추가하면 차트가 표시됩니다</div>
        </div>

        <div>
          <h3 style="font-weight: 600; margin-bottom: 0.5rem;">기록</h3>
          <div class="record-list" id="recordList">
            <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">기록이 없습니다</div>
          </div>
        </div>

        <div class="add-record">
          <input type="date" id="newDate" class="tool-input" style="width: 150px;">
          <input type="number" id="newWeight" class="tool-input" placeholder="체중 (kg)" step="0.1" style="flex: 1;" aria-label="체중 (kg)">
          <button class="tool-btn tool-btn-primary" onclick="WeightTracker.addRecord()" aria-label="추가">추가</button>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-secondary" onclick="WeightTracker.exportData()" style="flex: 1;" aria-label="내보내기">내보내기</button>
          <button class="tool-btn tool-btn-secondary" onclick="WeightTracker.clearAll()" style="flex: 1;" aria-label="초기화">초기화</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pet-weight-tracker.js"></script>
</body>
</html>
