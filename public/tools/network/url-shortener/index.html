<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 단축기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .shortener-container { max-width: 700px; margin: 0 auto; }
    .shortener-panel { background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .result-box { background: var(--bg-primary); border-radius: 10px; padding: 1.5rem; margin-top: 1.5rem; display: none; }
    .short-url { font-size: 1.25rem; font-weight: 600; color: var(--primary); word-break: break-all; margin-bottom: 1rem; }
    .action-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .history-list { margin-top: 1.5rem; }
    .history-item { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .history-urls { flex: 1; min-width: 0; }
    .history-original { font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-short { font-weight: 600; color: var(--primary); }
    .server-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1.5rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">URL 단축기</h1>
          <p class="tool-description">긴 URL을 짧게 변환</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="shortener-container">
      <div class="shortener-panel">
        <div class="section-title">URL 입력</div>
        <div style="display: flex; gap: 0.5rem;">
          <input type="text" id="urlInput" class="tool-input" placeholder="https://example.com/very/long/url/path" style="flex: 1;" aria-label="https://example.com/very/long/url/path">
          <button class="tool-btn tool-btn-primary" onclick="UrlShortener.shorten()" aria-label="단축">단축</button>
        </div>

        <div class="result-box" id="resultBox">
          <div class="section-title">단축 URL</div>
          <div class="short-url" id="shortUrl"></div>
          <div class="action-btns">
            <button class="tool-btn tool-btn-secondary" onclick="UrlShortener.copy()" aria-label="복사">복사</button>
            <button class="tool-btn tool-btn-secondary" onclick="UrlShortener.openQR()" aria-label="QR코드">QR코드</button>
          </div>
        </div>

        <div class="history-list" id="historyList">
          <div class="section-title">최근 단축 내역</div>
          <div id="historyItems" style="color: var(--text-secondary); text-align: center; padding: 1rem;">
            단축된 URL이 없습니다
          </div>
        </div>

        <div class="server-notice">
          <strong>데모 모드</strong><br>
          실제 URL 단축은 서버 서비스가 필요합니다. 현재 시뮬레이션 모드로 작동합니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="url-shortener.js"></script>
</body>
</html>
