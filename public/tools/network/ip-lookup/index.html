<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP 조회 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .network-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .input-panel, .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .my-ip-card { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
    .my-ip-label { font-size: 0.9rem; opacity: 0.9; margin-bottom: 0.5rem; }
    .my-ip-value { font-size: 1.5rem; font-weight: 700; font-family: monospace; }
    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .info-card { background: var(--bg-primary); border-radius: 10px; padding: 1rem; }
    .info-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .info-value { font-weight: 600; }
    .map-placeholder { background: var(--bg-primary); border-radius: 10px; height: 200px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); margin-top: 1rem; }
    @media (max-width: 900px) { .network-layout { grid-template-columns: 1fr; } .info-grid { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">IP 조회</h1>
          <p class="tool-description">IP 주소 정보 조회</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="network-layout">
      <div class="input-panel">
        <div class="my-ip-card">
          <div class="my-ip-label">내 IP 주소</div>
          <div class="my-ip-value" id="myIp">조회 중...</div>
        </div>

        <div class="section-title">IP 주소 조회</div>
        <div style="display: flex; gap: 0.5rem;">
          <input type="text" id="ipInput" class="tool-input" placeholder="IP 주소 입력 (예: 8.8.8.8)" style="flex: 1;" aria-label="IP 주소 입력 (예: 8.8.8.8)">
          <button class="tool-btn tool-btn-primary" onclick="IpLookup.lookup()" aria-label="조회">조회</button>
        </div>
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">
          IPv4 또는 IPv6 주소를 입력하세요
        </p>
      </div>

      <div class="result-panel">
        <div class="section-title">조회 결과</div>
        <div id="resultArea">
          <div class="info-grid">
            <div class="info-card">
              <div class="info-label">국가</div>
              <div class="info-value" id="country">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">지역</div>
              <div class="info-value" id="region">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">도시</div>
              <div class="info-value" id="city">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">ISP</div>
              <div class="info-value" id="isp">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">시간대</div>
              <div class="info-value" id="timezone">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">좌표</div>
              <div class="info-value" id="coords">-</div>
            </div>
          </div>
          <div class="map-placeholder" id="mapArea">
            지도 영역 (API 연동 시 표시)
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ip-lookup.js"></script>
</body>
</html>
