<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>링크 체커 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .checker-container { max-width: 900px; margin: 0 auto; }
    .checker-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .url-textarea { width: 100%; height: 150px; padding: 1rem; border: 2px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); color: var(--text-primary); font-family: monospace; resize: vertical; }
    .stats-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .stat-badge { padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; }
    .stat-total { background: var(--bg-primary); }
    .stat-valid { background: #d3f9d8; color: #2f9e44; }
    .stat-broken { background: #ffe3e3; color: #e03131; }
    .stat-redirect { background: #fff3bf; color: #f59f00; }
    .result-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .result-table th, .result-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color); }
    .result-table th { background: var(--bg-primary); font-weight: 600; }
    .result-table td { font-family: monospace; }
    .status-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
    .status-200 { background: #d3f9d8; color: #2f9e44; }
    .status-301, .status-302 { background: #fff3bf; color: #f59f00; }
    .status-404, .status-500 { background: #ffe3e3; color: #e03131; }
    .progress-bar { height: 6px; background: var(--bg-primary); border-radius: 3px; overflow: hidden; margin-bottom: 1rem; display: none; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #8b5cf6); transition: width 0.3s; }
    .server-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">링크 체커</h1>
          <p class="tool-description">URL 유효성 일괄 검사</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="checker-container">
      <div class="checker-panel">
        <div class="section-title">URL 목록 입력 (줄바꿈으로 구분)</div>
        <textarea id="urlsInput" class="url-textarea" placeholder="https://example.com
https://google.com
https://github.com"></textarea>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button class="tool-btn tool-btn-primary" id="checkBtn" onclick="LinkChecker.start()" aria-label="링크 검사">링크 검사</button>
          <button class="tool-btn tool-btn-secondary" onclick="LinkChecker.loadSample()" aria-label="샘플 로드">샘플 로드</button>
        </div>

        <div class="server-notice">
          <strong>서버 기능 필요</strong><br>
          실제 링크 검사는 서버 측 처리가 필요합니다. 현재 시뮬레이션 모드입니다.
        </div>
      </div>

      <div class="checker-panel" id="resultPanel" style="display: none;">
        <div class="section-title">검사 결과</div>

        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>

        <div class="stats-row" id="statsRow">
          <span class="stat-badge stat-total" id="statTotal">전체: 0</span>
          <span class="stat-badge stat-valid" id="statValid">정상: 0</span>
          <span class="stat-badge stat-broken" id="statBroken">깨짐: 0</span>
          <span class="stat-badge stat-redirect" id="statRedirect">리다이렉트: 0</span>
        </div>

        <div style="overflow-x: auto;">
          <table class="result-table">
            <thead>
              <tr>
                <th style="width: 50%;">URL</th>
                <th>상태</th>
                <th>응답시간</th>
                <th>비고</th>
              </tr>
            </thead>
            <tbody id="resultBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="link-checker.js"></script>
</body>
</html>
