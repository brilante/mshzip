<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS 조회 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .network-layout { display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; }
    .input-panel, .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .record-type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-top: 0.5rem; }
    .record-btn { padding: 0.5rem; border: 2px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); cursor: pointer; text-align: center; font-size: 0.85rem; transition: all 0.2s; }
    .record-btn:hover { border-color: var(--primary); }
    .record-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    .dns-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .dns-table th, .dns-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color); }
    .dns-table th { background: var(--bg-primary); font-weight: 600; }
    .dns-table td { font-family: monospace; }
    .server-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1rem; font-size: 0.9rem; }
    @media (max-width: 900px) { .network-layout { grid-template-columns: 1fr; } .record-type-grid { grid-template-columns: repeat(2, 1fr); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">DNS 조회</h1>
          <p class="tool-description">DNS 레코드 조회</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="network-layout">
      <div class="input-panel">
        <div class="section-title">도메인 입력</div>
        <input type="text" id="domainInput" class="tool-input" placeholder="example.com" aria-label="example.com">

        <div class="section-title" style="margin-top: 1rem;">레코드 타입</div>
        <div class="record-type-grid">
          <div class="record-btn active" data-type="A" onclick="DnsLookup.selectType('A')">A</div>
          <div class="record-btn" data-type="AAAA" onclick="DnsLookup.selectType('AAAA')">AAAA</div>
          <div class="record-btn" data-type="CNAME" onclick="DnsLookup.selectType('CNAME')">CNAME</div>
          <div class="record-btn" data-type="MX" onclick="DnsLookup.selectType('MX')">MX</div>
          <div class="record-btn" data-type="NS" onclick="DnsLookup.selectType('NS')">NS</div>
          <div class="record-btn" data-type="TXT" onclick="DnsLookup.selectType('TXT')">TXT</div>
          <div class="record-btn" data-type="SOA" onclick="DnsLookup.selectType('SOA')">SOA</div>
          <div class="record-btn" data-type="ALL" onclick="DnsLookup.selectType('ALL')">전체</div>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1rem;" onclick="DnsLookup.lookup()" aria-label="DNS 조회">
          DNS 조회
        </button>

        <div class="server-notice">
          <strong>서버 기능 필요</strong><br>
          DNS 조회는 서버 측 처리가 필요합니다. 현재 데모 모드로 작동합니다.
        </div>
      </div>

      <div class="result-panel">
        <div class="section-title">DNS 레코드</div>
        <div id="resultArea">
          <div style="text-align: center; color: var(--text-secondary); padding: 3rem;">
            도메인을 입력하고 조회하세요
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="dns-lookup.js"></script>
</body>
</html>
