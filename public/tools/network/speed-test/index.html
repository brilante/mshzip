<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>속도 테스트 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .speed-container { max-width: 600px; margin: 0 auto; }
    .speed-panel { background: var(--bg-secondary); border-radius: 16px; padding: 2rem; text-align: center; }
    .speed-gauge { width: 250px; height: 250px; margin: 2rem auto; position: relative; }
    .gauge-bg { fill: none; stroke: var(--border-color); stroke-width: 20; }
    .gauge-fill { fill: none; stroke: url(#gradient); stroke-width: 20; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
    .speed-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .speed-number { font-size: 3rem; font-weight: 700; color: var(--primary); }
    .speed-unit { font-size: 1rem; color: var(--text-secondary); }
    .speed-label { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 2rem; }
    .result-card { background: var(--bg-primary); border-radius: 12px; padding: 1rem; }
    .result-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .result-value { font-size: 1.5rem; font-weight: 700; }
    .result-label { font-size: 0.8rem; color: var(--text-secondary); }
    .status-text { margin: 1rem 0; color: var(--text-secondary); min-height: 1.5rem; }
    .server-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1.5rem; font-size: 0.9rem; }
    @media (max-width: 600px) { .results-grid { grid-template-columns: 1fr; } .speed-gauge { width: 200px; height: 200px; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">속도 테스트</h1>
          <p class="tool-description">인터넷 속도 측정</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="speed-container">
      <div class="speed-panel">
        <div class="speed-gauge">
          <svg viewBox="0 0 200 200">
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#3b82f6"/>
                <stop offset="100%" style="stop-color:#8b5cf6"/>
              </linearGradient>
            </defs>
            <circle class="gauge-bg" cx="100" cy="100" r="80" transform="rotate(-90, 100, 100)"/>
            <circle class="gauge-fill" id="gaugeFill" cx="100" cy="100" r="80" transform="rotate(-90, 100, 100)"
                    stroke-dasharray="502" stroke-dashoffset="502"/>
          </svg>
          <div class="speed-value">
            <div class="speed-number" id="speedValue">0</div>
            <div class="speed-unit">Mbps</div>
          </div>
        </div>
        <div class="speed-label" id="speedLabel">다운로드 속도</div>
        <div class="status-text" id="statusText">테스트를 시작하려면 버튼을 클릭하세요</div>

        <button class="tool-btn tool-btn-primary" style="padding: 1rem 3rem; font-size: 1.1rem;" id="startBtn" onclick="SpeedTest.start()" aria-label="테스트 시작">
          테스트 시작
        </button>

        <div class="results-grid" id="resultsGrid" style="display: none;">
          <div class="result-card">
            <div class="result-icon"></div>
            <div class="result-value" id="downloadResult">-</div>
            <div class="result-label">다운로드</div>
          </div>
          <div class="result-card">
            <div class="result-icon"></div>
            <div class="result-value" id="uploadResult">-</div>
            <div class="result-label">업로드</div>
          </div>
          <div class="result-card">
            <div class="result-icon"></div>
            <div class="result-value" id="pingResult">-</div>
            <div class="result-label">핑</div>
          </div>
        </div>

        <div class="server-notice">
          <strong>서버 기능 필요</strong><br>
          실제 속도 측정은 전용 서버가 필요합니다. 현재 시뮬레이션 모드입니다.
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="speed-test.js"></script>
</body>
</html>
