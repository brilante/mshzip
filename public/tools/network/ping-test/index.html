<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ping 테스트 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .network-layout { display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; }
    .input-panel, .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .ping-output { font-family: monospace; font-size: 0.85rem; background: #1a1a2e; color: #00ff00; border-radius: 8px; padding: 1rem; height: 350px; overflow-y: auto; line-height: 1.6; }
    .ping-line { margin-bottom: 0.25rem; }
    .ping-line.error { color: #ff6b6b; }
    .ping-line.info { color: #4dabf7; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-top: 1rem; }
    .stat-card { background: var(--bg-primary); border-radius: 8px; padding: 0.75rem; text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .server-notice { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 1rem; border-radius: 10px; margin-top: 1rem; font-size: 0.9rem; }
    @media (max-width: 900px) { .network-layout { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">Ping 테스트</h1>
          <p class="tool-description">호스트 연결 테스트</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="network-layout">
      <div class="input-panel">
        <div class="section-title">호스트 입력</div>
        <input type="text" id="hostInput" class="tool-input" placeholder="google.com 또는 8.8.8.8" aria-label="google.com 또는 8.8.8.8">

        <div class="section-title" style="margin-top: 1rem;">옵션</div>
        <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem;">
          <label style="flex: 1;">Ping 횟수</label>
          <select id="pingCount" class="tool-input" style="width: 100px;">
            <option value="4">4회</option>
            <option value="8">8회</option>
            <option value="16">16회</option>
          </select>
        </div>

        <button class="tool-btn tool-btn-primary" style="width: 100%; margin-top: 1rem;" id="pingBtn" onclick="PingTest.start()" aria-label="Ping 시작">
          Ping 시작
        </button>
        <button class="tool-btn tool-btn-secondary" style="width: 100%; margin-top: 0.5rem; display: none;" id="stopBtn" onclick="PingTest.stop()" aria-label="중지">
          중지
        </button>

        <div class="server-notice">
          <strong>서버 기능 필요</strong><br>
          실제 Ping은 서버 측 처리가 필요합니다. 현재 시뮬레이션 모드입니다.
        </div>
      </div>

      <div class="result-panel">
        <div class="section-title">Ping 결과</div>
        <div class="ping-output" id="pingOutput">
          <div class="ping-line info">호스트를 입력하고 Ping 시작을 클릭하세요.</div>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="statSent">0</div>
            <div class="stat-label">전송</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statReceived">0</div>
            <div class="stat-label">수신</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statLoss">0%</div>
            <div class="stat-label">손실</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statAvg">0ms</div>
            <div class="stat-label">평균</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="ping-test.js"></script>
</body>
</html>
