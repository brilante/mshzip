<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문법 검사 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .check-layout { display: grid; grid-template-columns: 1fr 350px; gap: 1.5rem; }
    .input-panel textarea { min-height: 400px; font-size: 1rem; line-height: 1.8; }
    .results-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .stats-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .stat-item { flex: 1; background: var(--bg-primary); border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: bold; }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .issue-list { max-height: 300px; overflow-y: auto; }
    .issue-item { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; border-left: 4px solid; }
    .issue-item.error { border-color: #ef4444; }
    .issue-item.warning { border-color: #f59e0b; }
    .issue-item.suggestion { border-color: #3b82f6; }
    .issue-type { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 0.25rem; }
    .issue-text { font-size: 0.9rem; margin-bottom: 0.5rem; }
    .issue-suggestion { font-size: 0.85rem; color: var(--text-secondary); }
    .premium-badge { display: inline-block; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-left: 0.5rem; }
    @media (max-width: 900px) { .check-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">문법 검사 <span class="premium-badge">PREMIUM</span></h1>
          <p class="tool-description">AI 기반 문법 및 맞춤법 검사</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="check-layout">
      <div class="input-panel">
        <textarea id="textInput" class="tool-input" placeholder="검사할 텍스트를 입력하세요..."></textarea>
        <button class="tool-btn tool-btn-primary" style="width:100%; margin-top:1rem" onclick="GrammarCheck.check()" aria-label="문법 검사">문법 검사</button>
      </div>

      <div class="results-panel">
        <div class="section-title">검사 결과</div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-value" id="errorCount" style="color:#ef4444">0</div>
            <div class="stat-label">오류</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="warningCount" style="color:#f59e0b">0</div>
            <div class="stat-label">경고</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="suggestionCount" style="color:#3b82f6">0</div>
            <div class="stat-label">제안</div>
          </div>
        </div>

        <div class="section-title">발견된 문제</div>
        <div class="issue-list" id="issueList">
          <div style="color: var(--text-secondary); text-align: center; padding: 2rem;">
            텍스트를 입력하고 검사 버튼을 누르세요
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="grammar-check.js"></script>
</body>
</html>
