<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키워드 밀도 분석 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .kw-layout { display: grid; grid-template-columns: 1fr 400px; gap: 1.5rem; }
    .input-panel textarea { min-height: 300px; }
    .results-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--bg-primary); border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .keyword-list { max-height: 400px; overflow-y: auto; }
    .keyword-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid var(--border-color); }
    .keyword-word { font-weight: 500; }
    .keyword-stats { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-secondary); }
    .keyword-bar { height: 4px; background: var(--primary); border-radius: 2px; margin-top: 0.25rem; }
    .filter-row { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    @media (max-width: 900px) { .kw-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">키워드 밀도 분석</h1>
          <p class="tool-description">텍스트 내 키워드 빈도 분석</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="kw-layout">
      <div class="input-panel">
        <textarea id="textInput" class="tool-input" placeholder="분석할 텍스트를 입력하세요..." oninput="KeywordDensity.analyze()"></textarea>
        <div class="filter-row" style="margin-top: 1rem">
          <label>최소 글자: <input type="number" id="minLength" class="tool-input" style="width:60px" value="2" onchange="KeywordDensity.analyze()"></label>
          <label>최소 빈도: <input type="number" id="minCount" class="tool-input" style="width:60px" value="2" onchange="KeywordDensity.analyze()"></label>
          <label><input type="checkbox" id="excludeStopwords" checked onchange="KeywordDensity.analyze()"> 불용어 제외</label>
        </div>
      </div>

      <div class="results-panel">
        <div class="section-title">통계</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="totalWords">0</div>
            <div class="stat-label">총 단어</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="uniqueWords">0</div>
            <div class="stat-label">고유 단어</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="totalChars">0</div>
            <div class="stat-label">총 문자</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="avgWordLen">0</div>
            <div class="stat-label">평균 단어 길이</div>
          </div>
        </div>

        <div class="section-title">상위 키워드</div>
        <div class="keyword-list" id="keywordList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="keyword-density.js"></script>
</body>
</html>
