<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorem Ipsum 생성 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="lorem-ipsum.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">Lorem Ipsum 생성기</h1>
      <p class="tool-description">더미 텍스트를 생성합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <!-- 생성 옵션 -->
        <div class="options-section">
          <div class="section-title">생성 옵션</div>
          <div class="options-grid">
            <div class="option-group">
              <label class="option-label">단위</label>
              <div class="radio-group">
                <label class="radio-option"><input type="radio" name="unit" value="paragraphs" checked> 문단</label>
                <label class="radio-option"><input type="radio" name="unit" value="sentences"> 문장</label>
                <label class="radio-option"><input type="radio" name="unit" value="words"> 단어</label>
              </div>
            </div>
            <div class="option-group">
              <label class="option-label">수량</label>
              <input type="number" id="quantity" class="option-input" value="3" min="1" max="100">
            </div>
            <div class="option-group">
              <label class="option-label">옵션</label>
              <div class="checkbox-group">
                <label class="checkbox-option"><input type="checkbox" id="startLorem" checked> "Lorem ipsum..."으로 시작</label>
              </div>
            </div>
          </div>
          <button class="tool-btn tool-btn-primary tool-btn-lg generate-btn" onclick="LoremIpsum.generate()" aria-label="생성하기">
            생성하기
          </button>
        </div>

        <!-- 결과 영역 -->
        <div class="result-section">
          <div class="section-header">
            <span class="section-title">생성된 텍스트</span>
            <button class="tool-btn tool-btn-sm tool-btn-primary" onclick="LoremIpsum.copy()" aria-label="복사">복사</button>
          </div>
          <textarea id="outputText" class="text-output" readonly placeholder="생성 버튼을 클릭하세요..."></textarea>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">Lorem Ipsum이란?</div>
          <div class="help-content">
            <p>Lorem Ipsum은 인쇄 및 조판 산업에서 사용되는 표준 더미 텍스트입니다. 1500년대부터 사용되어 왔으며, 실제 콘텐츠 대신 레이아웃과 디자인을 미리 보기 위해 사용됩니다.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="lorem-ipsum.js"></script>
</body>
</html>
