<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>텍스트 요약 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .sum-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .panel-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .panel textarea { min-height: 300px; }
    .options-row { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .length-slider { flex: 1; min-width: 200px; }
    .length-slider input { width: 100%; }
    .length-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .stats-box { display: flex; gap: 1rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-top: 1rem; font-size: 0.85rem; }
    .stat { text-align: center; }
    .stat-value { font-weight: bold; color: var(--primary); }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .premium-badge { display: inline-block; background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-left: 0.5rem; }
    @media (max-width: 900px) { .sum-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">텍스트 요약 <span class="premium-badge">PREMIUM</span></h1>
          <p class="tool-description">AI 기반 텍스트 요약</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="options-row">
      <div class="length-slider">
        <label>요약 길이: <span id="lengthValue">50</span>%</label>
        <input type="range" id="lengthSlider" min="10" max="80" value="50" oninput="Summarize.updateLength()">
        <div class="length-label">
          <span>짧게</span>
          <span>보통</span>
          <span>길게</span>
        </div>
      </div>
      <label><input type="checkbox" id="bulletPoints"> 글머리 기호 형식</label>
    </div>

    <div class="sum-layout">
      <div class="panel">
        <div class="panel-title">원문</div>
        <textarea id="inputText" class="tool-input" placeholder="요약할 텍스트를 입력하세요..." oninput="Summarize.updateStats()"></textarea>
        <div class="stats-box">
          <div class="stat"><span class="stat-value" id="wordCount">0</span> 단어</div>
          <div class="stat"><span class="stat-value" id="charCount">0</span> 글자</div>
          <div class="stat"><span class="stat-value" id="sentenceCount">0</span> 문장</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">요약</div>
        <textarea id="outputText" class="tool-input" placeholder="요약 결과가 여기에 표시됩니다..." readonly></textarea>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" style="flex:1" onclick="Summarize.run()" aria-label="요약">요약</button>
          <button class="tool-btn tool-btn-secondary" onclick="Summarize.copy()" aria-label="복사">복사</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="summarize.js"></script>
</body>
</html>
