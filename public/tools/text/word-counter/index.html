<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글자수 세기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="word-counter.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">글자수 세기</h1>
      <p class="tool-description">텍스트의 글자수, 단어수, 문장수를 분석합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <!-- 입력 영역 -->
        <div class="input-section">
          <div class="section-header">
            <span class="section-title">텍스트 입력</span>
            <div class="section-actions">
              <button class="tool-btn tool-btn-sm" onclick="WordCounter.paste()" aria-label="붙여넣기">붙여넣기</button>
              <button class="tool-btn tool-btn-sm" onclick="WordCounter.clear()" aria-label="지우기">지우기</button>
            </div>
          </div>
          <textarea id="inputText" class="text-input" placeholder="분석할 텍스트를 입력하세요..." oninput="WordCounter.analyze()"></textarea>
        </div>

        <!-- 통계 결과 -->
        <div class="stats-section">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value" id="charCount">0</div>
              <div class="stat-label">전체 글자</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="charNoSpace">0</div>
              <div class="stat-label">공백 제외</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="wordCount">0</div>
              <div class="stat-label">단어</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="sentenceCount">0</div>
              <div class="stat-label">문장</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="paragraphCount">0</div>
              <div class="stat-label">문단</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="lineCount">0</div>
              <div class="stat-label">줄</div>
            </div>
          </div>
        </div>

        <!-- 상세 분석 -->
        <div class="detail-section">
          <div class="section-title">상세 분석</div>
          <div class="detail-grid">
            <div class="detail-item">
              <span class="detail-label">한글</span>
              <span class="detail-value" id="koreanCount">0</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">영문</span>
              <span class="detail-value" id="englishCount">0</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">숫자</span>
              <span class="detail-value" id="numberCount">0</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">특수문자</span>
              <span class="detail-value" id="specialCount">0</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">공백</span>
              <span class="detail-value" id="spaceCount">0</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">예상 읽기 시간</span>
              <span class="detail-value" id="readTime">0초</span>
            </div>
          </div>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">사용 팁</div>
          <div class="help-content">
            <ul>
              <li><strong>단어 기준</strong>: 공백으로 구분된 문자열</li>
              <li><strong>문장 기준</strong>: 마침표(.), 물음표(?), 느낌표(!)로 끝나는 문장</li>
              <li><strong>읽기 시간</strong>: 분당 약 200단어 기준</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="word-counter.js"></script>
</body>
</html>
