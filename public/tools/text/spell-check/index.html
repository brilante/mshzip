<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맞춤법 검사 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .spell-layout { display: grid; grid-template-columns: 1fr 350px; gap: 1.5rem; }
    .editor-panel { position: relative; }
    .editor-panel textarea { min-height: 400px; font-size: 1rem; line-height: 1.8; }
    .results-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .stats-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .stat-badge { padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 500; }
    .stat-badge.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .stat-badge.success { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .error-list { max-height: 350px; overflow-y: auto; }
    .error-item { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s; }
    .error-item:hover { transform: translateX(4px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .error-wrong { color: #ef4444; text-decoration: line-through; margin-right: 0.5rem; }
    .error-correct { color: #22c55e; font-weight: 500; }
    .error-context { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    @media (max-width: 900px) { .spell-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">맞춤법 검사</h1>
          <p class="tool-description">한글 맞춤법 및 띄어쓰기 검사</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="spell-layout">
      <div class="editor-panel">
        <textarea id="textInput" class="tool-input" placeholder="맞춤법을 검사할 텍스트를 입력하세요..."></textarea>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" style="flex:1" onclick="SpellCheck.check()" aria-label="검사하기">검사하기</button>
          <button class="tool-btn tool-btn-secondary" onclick="SpellCheck.applyAll()" aria-label="모두 수정">모두 수정</button>
        </div>
      </div>

      <div class="results-panel">
        <div class="section-title">검사 결과</div>
        <div class="stats-row">
          <span class="stat-badge" id="errorBadge">오류 0개</span>
        </div>

        <div class="section-title">발견된 오류</div>
        <div class="error-list" id="errorList">
          <div style="color: var(--text-secondary); text-align: center; padding: 2rem;">
            텍스트를 입력하고 검사 버튼을 누르세요
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="spell-check.js"></script>
</body>
</html>
