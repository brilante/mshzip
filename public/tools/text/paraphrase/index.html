<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>패러프레이즈 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .para-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .panel-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .panel textarea { min-height: 300px; }
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .mode-tab { flex: 1; padding: 0.75rem; text-align: center; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .mode-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .mode-desc { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .premium-badge { display: inline-block; background: linear-gradient(135deg, #ec4899, #be185d); color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-left: 0.5rem; }
    @media (max-width: 900px) { .para-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">패러프레이즈 <span class="premium-badge">PREMIUM</span></h1>
          <p class="tool-description">AI 기반 문장 재작성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="standard" onclick="Paraphrase.setMode(this)" aria-label="표준">표준</button>
      <button class="mode-tab" data-mode="fluent" onclick="Paraphrase.setMode(this)" aria-label="자연스러운">자연스러운</button>
      <button class="mode-tab" data-mode="formal" onclick="Paraphrase.setMode(this)" aria-label="격식체">격식체</button>
      <button class="mode-tab" data-mode="simple" onclick="Paraphrase.setMode(this)" aria-label="간결하게">간결하게</button>
    </div>
    <div class="mode-desc" id="modeDesc">원문의 의미를 유지하면서 다르게 표현합니다.</div>

    <div class="para-layout">
      <div class="panel">
        <div class="panel-title">원문</div>
        <textarea id="inputText" class="tool-input" placeholder="변환할 텍스트를 입력하세요..."></textarea>
      </div>

      <div class="panel">
        <div class="panel-title">결과</div>
        <textarea id="outputText" class="tool-input" placeholder="결과가 여기에 표시됩니다..." readonly></textarea>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" style="flex:1" onclick="Paraphrase.run()" aria-label="변환">변환</button>
          <button class="tool-btn tool-btn-secondary" onclick="Paraphrase.copy()" aria-label="복사">복사</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="paraphrase.js"></script>
</body>
</html>
