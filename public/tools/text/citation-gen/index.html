<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인용 생성기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .cite-layout { display: grid; grid-template-columns: 400px 1fr; gap: 1.5rem; }
    .form-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .format-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .format-tab { padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .format-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .source-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .source-tab { flex: 1; padding: 0.5rem; text-align: center; font-size: 0.85rem; }
    .source-tab.active { background: var(--primary); color: white; }
    .result-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .citation-result { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; font-family: serif; line-height: 1.8; min-height: 100px; }
    .citation-result .hanging { padding-left: 2rem; text-indent: -2rem; }
    .btn-row { display: flex; gap: 0.5rem; }
    @media (max-width: 900px) { .cite-layout { grid-template-columns: 1fr; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">인용 생성기</h1>
          <p class="tool-description">APA, MLA, Chicago 등 형식으로 인용 생성</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="cite-layout">
      <div class="form-panel">
        <div class="section-title">인용 형식</div>
        <div class="format-tabs">
          <button class="format-tab active" data-format="apa" onclick="CitationGen.setFormat(this)" aria-label="APA 7">APA 7</button>
          <button class="format-tab" data-format="mla" onclick="CitationGen.setFormat(this)" aria-label="MLA 9">MLA 9</button>
          <button class="format-tab" data-format="chicago" onclick="CitationGen.setFormat(this)" aria-label="Chicago">Chicago</button>
          <button class="format-tab" data-format="harvard" onclick="CitationGen.setFormat(this)" aria-label="Harvard">Harvard</button>
        </div>

        <div class="section-title">자료 유형</div>
        <div class="source-tabs">
          <button class="tool-btn tool-btn-secondary source-tab active" data-type="book" onclick="CitationGen.setType(this)" aria-label="책">책</button>
          <button class="tool-btn tool-btn-secondary source-tab" data-type="article" onclick="CitationGen.setType(this)" aria-label="논문">논문</button>
          <button class="tool-btn tool-btn-secondary source-tab" data-type="website" onclick="CitationGen.setType(this)" aria-label="웹사이트">웹사이트</button>
        </div>

        <div id="formFields">
          <div class="control-group">
            <label>저자 (성, 이름)</label>
            <input type="text" id="author" class="tool-input" placeholder="홍길동" oninput="CitationGen.generate()" aria-label="홍길동">
          </div>
          <div class="control-group">
            <label>제목</label>
            <input type="text" id="title" class="tool-input" placeholder="책 제목" oninput="CitationGen.generate()" aria-label="책 제목">
          </div>
          <div class="control-group">
            <label>출판사</label>
            <input type="text" id="publisher" class="tool-input" placeholder="출판사명" oninput="CitationGen.generate()" aria-label="출판사명">
          </div>
          <div class="control-group">
            <label>출판 연도</label>
            <input type="number" id="year" class="tool-input" placeholder="2024" oninput="CitationGen.generate()" aria-label="2024">
          </div>
          <div class="control-group" id="urlGroup" style="display:none">
            <label>URL</label>
            <input type="text" id="url" class="tool-input" placeholder="https://..." oninput="CitationGen.generate()" aria-label="https://...">
          </div>
          <div class="control-group" id="accessDateGroup" style="display:none">
            <label>접근일</label>
            <input type="date" id="accessDate" class="tool-input" oninput="CitationGen.generate()">
          </div>
        </div>
      </div>

      <div class="result-panel">
        <div class="section-title">인용 결과</div>
        <div class="citation-result" id="citationResult">
          <div class="hanging">정보를 입력하면 인용이 생성됩니다.</div>
        </div>
        <div class="btn-row">
          <button class="tool-btn tool-btn-primary" onclick="CitationGen.copy()" aria-label="복사">복사</button>
          <button class="tool-btn tool-btn-secondary" onclick="CitationGen.clear()" aria-label="초기화">초기화</button>
        </div>

        <div class="section-title" style="margin-top: 2rem">형식별 예시</div>
        <div id="formatExamples"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="citation-gen.js"></script>
</body>
</html>
