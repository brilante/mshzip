<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대소문자 변환 - MyMind3 도구</title>
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <link rel="stylesheet" href="case-converter.css">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1 class="tool-title">대소문자 변환</h1>
      <p class="tool-description">텍스트를 다양한 케이스로 변환합니다</p>
    </header>

    <main class="tool-content">
      <div class="tool-panel">
        <!-- 입력 영역 -->
        <div class="input-section">
          <div class="section-header">
            <span class="section-title">텍스트 입력</span>
            <button class="tool-btn tool-btn-sm" onclick="CaseConverter.clear()" aria-label="지우기">지우기</button>
          </div>
          <textarea id="inputText" class="text-input" placeholder="변환할 텍스트를 입력하세요..."></textarea>
        </div>

        <!-- 변환 옵션 -->
        <div class="convert-options">
          <button class="convert-btn" onclick="CaseConverter.convert('upper')">
            <span class="btn-icon">ABC</span>
            <span class="btn-label">대문자</span>
          </button>
          <button class="convert-btn" onclick="CaseConverter.convert('lower')">
            <span class="btn-icon">abc</span>
            <span class="btn-label">소문자</span>
          </button>
          <button class="convert-btn" onclick="CaseConverter.convert('title')">
            <span class="btn-icon">Abc</span>
            <span class="btn-label">제목형</span>
          </button>
          <button class="convert-btn" onclick="CaseConverter.convert('sentence')">
            <span class="btn-icon">Abc.</span>
            <span class="btn-label">문장형</span>
          </button>
          <button class="convert-btn" onclick="CaseConverter.convert('camel')">
            <span class="btn-icon">aBC</span>
            <span class="btn-label">camelCase</span>
          </button>
          <button class="convert-btn" onclick="CaseConverter.convert('pascal')">
            <span class="btn-icon">ABC</span>
            <span class="btn-label">PascalCase</span>
          </button>
          <button class="convert-btn" onclick="CaseConverter.convert('snake')">
            <span class="btn-icon">a_b</span>
            <span class="btn-label">snake_case</span>
          </button>
          <button class="convert-btn" onclick="CaseConverter.convert('kebab')">
            <span class="btn-icon">a-b</span>
            <span class="btn-label">kebab-case</span>
          </button>
          <button class="convert-btn" onclick="CaseConverter.convert('toggle')">
            <span class="btn-icon">aBc</span>
            <span class="btn-label">토글</span>
          </button>
        </div>

        <!-- 결과 영역 -->
        <div class="result-section" id="resultSection" style="display: none;">
          <div class="section-header">
            <span class="section-title">변환 결과</span>
            <button class="tool-btn tool-btn-sm tool-btn-primary" onclick="CaseConverter.copy()" aria-label="복사">복사</button>
          </div>
          <textarea id="outputText" class="text-output" readonly></textarea>
        </div>

        <!-- 도움말 -->
        <div class="tool-help">
          <div class="help-title">케이스 설명</div>
          <div class="help-content">
            <ul>
              <li><strong>대문자/소문자</strong>: 모든 문자를 대문자 또는 소문자로</li>
              <li><strong>제목형</strong>: 각 단어의 첫 글자만 대문자 (Title Case)</li>
              <li><strong>문장형</strong>: 문장의 첫 글자만 대문자</li>
              <li><strong>camelCase</strong>: 첫 단어 소문자, 나머지 단어 첫글자 대문자</li>
              <li><strong>PascalCase</strong>: 모든 단어 첫글자 대문자</li>
              <li><strong>snake_case</strong>: 모두 소문자, 단어 사이 언더스코어</li>
              <li><strong>kebab-case</strong>: 모두 소문자, 단어 사이 하이픈</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="case-converter.js"></script>
</body>
</html>
