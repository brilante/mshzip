<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 미리보기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <style>
    .md-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; height: calc(100vh - 200px); min-height: 500px; }
    .panel { display: flex; flex-direction: column; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-weight: 600; }
    .md-input { flex: 1; font-family: 'Monaco', 'Menlo', monospace; font-size: 0.9rem; line-height: 1.6; resize: none; }
    .md-preview { flex: 1; background: var(--bg-secondary); border-radius: 8px; padding: 1.5rem; overflow: auto; }
    .md-preview h1 { font-size: 2rem; font-weight: bold; margin: 1rem 0 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
    .md-preview h2 { font-size: 1.5rem; font-weight: bold; margin: 1rem 0 0.5rem; }
    .md-preview h3 { font-size: 1.25rem; font-weight: bold; margin: 0.75rem 0 0.5rem; }
    .md-preview p { margin: 0.5rem 0; line-height: 1.6; }
    .md-preview ul, .md-preview ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .md-preview li { margin: 0.25rem 0; }
    .md-preview code { background: var(--bg-primary); padding: 0.125rem 0.375rem; border-radius: 4px; font-family: monospace; font-size: 0.875rem; }
    .md-preview pre { background: var(--bg-primary); padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; }
    .md-preview pre code { background: none; padding: 0; }
    .md-preview blockquote { border-left: 4px solid var(--primary); padding-left: 1rem; margin: 0.5rem 0; color: var(--text-secondary); }
    .md-preview a { color: var(--primary); text-decoration: underline; }
    .md-preview table { border-collapse: collapse; margin: 0.5rem 0; }
    .md-preview th, .md-preview td { border: 1px solid var(--border-color); padding: 0.5rem; }
    .md-preview img { max-width: 100%; }
    .toolbar { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .toolbar button { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
    @media (max-width: 768px) { .md-layout { grid-template-columns: 1fr; height: auto; } .panel { min-height: 300px; } }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">Markdown 미리보기</h1>
          <p class="tool-description">실시간 Markdown 렌더링</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="toolbar">
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.insert('**', '**')" aria-label="B">B</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.insert('*', '*')" aria-label="I">I</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.insert('# ')" aria-label="H1">H1</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.insert('## ')" aria-label="H2">H2</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.insert('- ')" aria-label="List">List</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.insert('[', '](url)')" aria-label="Link">Link</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.insert('`', '`')" aria-label="Code">Code</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.insert('```\\n', '\\n```')" aria-label="Block">Block</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.loadSample()" aria-label="샘플">샘플</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.copyHtml()" aria-label="HTML 복사">HTML 복사</button>
      <button class="tool-btn tool-btn-secondary" onclick="MdPreview.download()" aria-label="다운로드">다운로드</button>
    </div>

    <div class="md-layout">
      <div class="panel">
        <div class="panel-header">Markdown</div>
        <textarea id="mdInput" class="tool-input md-input" placeholder="Markdown을 입력하세요..." oninput="MdPreview.render()"></textarea>
      </div>
      <div class="panel">
        <div class="panel-header">미리보기</div>
        <div id="mdPreview" class="md-preview"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="markdown-preview.js"></script>
</body>
</html>
