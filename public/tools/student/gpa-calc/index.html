<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학점 계산기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .result-display { text-align: center; padding: 2rem; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: 16px; color: white; margin: 1rem 0; }
    .result-value { font-size: 3rem; font-weight: 700; }
    .result-label { font-size: 0.9rem; opacity: 0.9; }
    .grade-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    .grade-row input, .grade-row select { padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-primary); }
    .remove-btn { width: 32px; height: 32px; border-radius: 50%; background: #ef4444; color: white; border: none; cursor: pointer; font-size: 1.2rem; }
    .add-btn { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 0.5rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .scale-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .scale-tab { padding: 0.5rem 1rem; border-radius: 8px; background: var(--bg-primary); cursor: pointer; font-size: 0.85rem; }
    .scale-tab.active { background: var(--primary); color: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">학점 계산기</h1>
          <p class="tool-description">GPA 및 평균 학점 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="scale-tabs">
        <div class="scale-tab active" data-scale="4.5" onclick="GpaCalc.setScale(4.5)">4.5 만점</div>
        <div class="scale-tab" data-scale="4.3" onclick="GpaCalc.setScale(4.3)">4.3 만점</div>
        <div class="scale-tab" data-scale="4.0" onclick="GpaCalc.setScale(4.0)">4.0 만점</div>
      </div>

      <div class="result-display">
        <div class="result-label">총 평점</div>
        <div class="result-value" id="totalGpa">0.00</div>
        <div style="margin-top: 0.5rem; font-size: 0.9rem;" id="gpaScale">/ 4.5</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalCredits">0</div>
          <div class="stat-label">총 학점</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalSubjects">0</div>
          <div class="stat-label">과목 수</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="gradeLevel">-</div>
          <div class="stat-label">등급</div>
        </div>
      </div>

      <div class="util-panel">
        <div class="grade-row" style="font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">
          <span>과목명</span>
          <span>학점</span>
          <span>성적</span>
          <span></span>
        </div>
        <div id="gradeList"></div>
        <button class="add-btn" onclick="GpaCalc.addRow()" aria-label="+ 과목 추가">+ 과목 추가</button>
      </div>

      <div class="util-panel" style="margin-top: 1rem;">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">성적 기준표</h3>
        <div id="gradeTable" style="font-size: 0.85rem; color: var(--text-secondary);"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="gpa-calc.js"></script>
</body>
</html>
