<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플래시카드 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .deck-selector { display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; }
    .deck-tab { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
    .deck-tab.active { background: var(--primary); color: white; }
    .flashcard { perspective: 1000px; height: 250px; margin: 1rem 0; cursor: pointer; }
    .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; align-items: center; justify-content: center; padding: 2rem; text-align: center; font-size: 1.25rem; }
    .flashcard-front { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; }
    .flashcard-back { background: linear-gradient(135deg, #10b981, #059669); color: white; transform: rotateY(180deg); }
    .card-controls { display: flex; justify-content: center; gap: 1rem; margin: 1rem 0; }
    .card-btn { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-size: 1rem; }
    .btn-prev { background: var(--bg-secondary); }
    .btn-next { background: var(--primary); color: white; }
    .btn-know { background: #22c55e; color: white; }
    .btn-dont-know { background: #ef4444; color: white; }
    .progress-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); margin: 1rem 0; }
    .add-card-form { margin-top: 1rem; }
    .input-group { margin-bottom: 0.75rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; display: block; }
    .stats-mini { display: flex; gap: 1rem; justify-content: center; margin: 1rem 0; }
    .stat-mini { text-align: center; }
    .stat-mini-value { font-size: 1.5rem; font-weight: 700; }
    .stat-mini-label { font-size: 0.75rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">플래시카드</h1>
          <p class="tool-description">암기 학습용 카드</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="deck-selector" id="deckSelector"></div>

      <div class="stats-mini">
        <div class="stat-mini">
          <div class="stat-mini-value" id="knownCount" style="color: #22c55e;">0</div>
          <div class="stat-mini-label">알고 있음</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-value" id="unknownCount" style="color: #ef4444;">0</div>
          <div class="stat-mini-label">모르는 것</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-value" id="totalCount" style="color: var(--primary);">0</div>
          <div class="stat-mini-label">전체</div>
        </div>
      </div>

      <div class="flashcard" id="flashcard" onclick="Flashcard.flip()">
        <div class="flashcard-inner">
          <div class="flashcard-front" id="cardFront">카드를 추가하세요</div>
          <div class="flashcard-back" id="cardBack">정답</div>
        </div>
      </div>

      <div class="progress-info">
        <span id="progressText">0 / 0</span>
        <span>클릭하여 뒤집기</span>
      </div>

      <div class="card-controls">
        <button class="card-btn btn-dont-know" onclick="Flashcard.markUnknown()" aria-label="모름">모름</button>
        <button class="card-btn btn-prev" onclick="Flashcard.prev()" aria-label="이전">이전</button>
        <button class="card-btn btn-next" onclick="Flashcard.next()" aria-label="다음 ">다음 </button>
        <button class="card-btn btn-know" onclick="Flashcard.markKnown()" aria-label="알음">알음</button>
      </div>

      <div class="util-panel add-card-form">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">카드 추가</h3>
        <div class="input-group">
          <label class="input-label">앞면 (질문)</label>
          <input type="text" id="cardQuestion" class="tool-input" placeholder="예: Apple의 뜻은?" aria-label="예: Apple의 뜻은?">
        </div>
        <div class="input-group">
          <label class="input-label">뒷면 (정답)</label>
          <input type="text" id="cardAnswer" class="tool-input" placeholder="예: 사과" aria-label="예: 사과">
        </div>
        <div style="display: flex; gap: 0.5rem;">
          <button class="tool-btn tool-btn-primary" onclick="Flashcard.addCard()" style="flex: 1;" aria-label="카드 추가">카드 추가</button>
          <button class="tool-btn tool-btn-secondary" onclick="Flashcard.shuffle()" aria-label="섞기">섞기</button>
          <button class="tool-btn tool-btn-secondary" onclick="Flashcard.reset()" aria-label="↺ 리셋">↺ 리셋</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="flashcard.js"></script>
</body>
</html>
