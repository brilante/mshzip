<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노트 정리 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 700px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .subject-tabs { display: flex; gap: 0.5rem; overflow-x: auto; margin-bottom: 1rem; padding-bottom: 0.5rem; }
    .subject-tab { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; border: 2px solid transparent; }
    .subject-tab.active { border-color: var(--primary); background: var(--primary); color: white; }
    .subject-tab:hover:not(.active) { background: var(--bg-secondary); }
    .note-editor { display: flex; flex-direction: column; gap: 0.75rem; }
    .note-title-input { font-size: 1.1rem; font-weight: 600; padding: 0.75rem; }
    .note-content-input { min-height: 200px; resize: vertical; font-family: inherit; line-height: 1.6; }
    .note-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .note-tag { background: var(--primary); color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .note-list { margin-top: 1rem; }
    .note-item { background: var(--bg-primary); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; cursor: pointer; transition: transform 0.2s; }
    .note-item:hover { transform: translateX(4px); }
    .note-item-title { font-weight: 600; margin-bottom: 0.25rem; }
    .note-item-preview { font-size: 0.85rem; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .note-item-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem; display: flex; justify-content: space-between; }
    .note-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .btn-action { padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; }
    .btn-save { background: var(--primary); color: white; }
    .btn-delete { background: #ef4444; color: white; }
    .btn-new { background: #22c55e; color: white; }
    .search-box { position: relative; margin-bottom: 1rem; }
    .search-box input { padding-left: 2.5rem; }
    .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">노트 정리</h1>
          <p class="tool-description">과목별 노트 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="subject-tabs" id="subjectTabs"></div>

      <div class="search-box">
        <span class="search-icon"></span>
        <input type="text" id="searchInput" class="tool-input" placeholder="노트 검색..." oninput="NoteOrganizer.search(this.value)" aria-label="노트 검색...">
      </div>

      <div class="util-panel note-editor" id="noteEditor">
        <input type="text" id="noteTitle" class="tool-input note-title-input" placeholder="노트 제목" aria-label="노트 제목">
        <textarea id="noteContent" class="tool-input note-content-input" placeholder="내용을 입력하세요..."></textarea>
        <div class="input-group">
          <input type="text" id="noteTags" class="tool-input" placeholder="태그 (쉼표로 구분)" aria-label="태그 (쉼표로 구분)">
        </div>
        <div class="note-actions">
          <button class="btn-action btn-new" onclick="NoteOrganizer.newNote()" aria-label="새 노트">새 노트</button>
          <button class="btn-action btn-save" onclick="NoteOrganizer.saveNote()" aria-label="저장">저장</button>
          <button class="btn-action btn-delete" onclick="NoteOrganizer.deleteNote()" id="deleteBtn" style="display: none;" aria-label="삭제">삭제</button>
        </div>
      </div>

      <div class="util-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">노트 목록</h3>
          <button class="tool-btn tool-btn-secondary" onclick="NoteOrganizer.addSubject()" style="font-size: 0.8rem;" aria-label="+ 과목 추가">+ 과목 추가</button>
        </div>
        <div class="note-list" id="noteList"></div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="note-organizer.js"></script>
</body>
</html>
