<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공부 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 500px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; }
    .timer-display { text-align: center; padding: 3rem 2rem; background: linear-gradient(135deg, #10b981, #059669); border-radius: 20px; color: white; margin: 1rem 0; }
    .timer-time { font-size: 4rem; font-weight: 700; font-family: monospace; }
    .timer-label { font-size: 1rem; opacity: 0.9; margin-top: 0.5rem; }
    .timer-subject { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .control-btns { display: flex; gap: 1rem; justify-content: center; margin: 1.5rem 0; }
    .control-btn { padding: 1rem 2rem; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; }
    .btn-start { background: #22c55e; color: white; }
    .btn-pause { background: #f59e0b; color: white; }
    .btn-stop { background: #ef4444; color: white; }
    .btn-disabled { opacity: 0.5; cursor: not-allowed; }
    .subject-input { margin-bottom: 1rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: var(--bg-primary); padding: 1rem; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .history-item { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.9rem; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">공부 타이머</h1>
          <p class="tool-description">학습 시간 측정 및 기록</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel subject-input">
        <label style="font-size: 0.85rem; color: var(--text-secondary); display: block; margin-bottom: 0.5rem;">공부 과목</label>
        <input type="text" id="subjectName" class="tool-input" placeholder="예: 수학, 영어, 프로그래밍..." aria-label="예: 수학, 영어, 프로그래밍...">
      </div>

      <div class="timer-display">
        <div class="timer-subject" id="currentSubject">과목을 선택하세요</div>
        <div class="timer-time" id="timerDisplay">00:00:00</div>
        <div class="timer-label" id="timerStatus">대기 중</div>
      </div>

      <div class="control-btns">
        <button class="control-btn btn-start" id="startBtn" onclick="StudyTimer.start()" aria-label="시작">시작</button>
        <button class="control-btn btn-pause btn-disabled" id="pauseBtn" onclick="StudyTimer.pause()" disabled aria-label="일시정지">일시정지</button>
        <button class="control-btn btn-stop btn-disabled" id="stopBtn" onclick="StudyTimer.stop()" disabled aria-label="완료">완료</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="todayTotal">0분</div>
          <div class="stat-label">오늘 공부 시간</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="weekTotal">0시간</div>
          <div class="stat-label">이번 주 총합</div>
        </div>
      </div>

      <div class="util-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
          <h3 style="font-weight: 600;">오늘의 기록</h3>
          <button class="tool-btn tool-btn-secondary" onclick="StudyTimer.clearToday()" style="font-size: 0.75rem; padding: 0.25rem 0.5rem;" aria-label="초기화">초기화</button>
        </div>
        <div id="historyList">
          <div style="text-align: center; color: var(--text-secondary); padding: 1rem;">아직 기록이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="study-timer.js"></script>
</body>
</html>
