<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뽀모도로 타이머 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 450px; margin: 0 auto; }
    .timer-card { background: linear-gradient(135deg, #ef4444, #dc2626); border-radius: 24px; padding: 2.5rem; color: white; text-align: center; margin-bottom: 1rem; transition: background 0.5s; }
    .timer-card.break { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .timer-card.long-break { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .timer-mode { font-size: 1rem; opacity: 0.9; margin-bottom: 0.5rem; }
    .timer-display { font-size: 5rem; font-weight: 700; font-family: monospace; line-height: 1; }
    .timer-progress { width: 100%; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; margin: 1.5rem 0; overflow: hidden; }
    .timer-progress-bar { height: 100%; background: white; border-radius: 3px; transition: width 1s linear; }
    .timer-controls { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
    .timer-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 1.5rem; cursor: pointer; transition: transform 0.2s, background 0.2s; }
    .timer-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.3); }
    .timer-btn.primary { background: white; color: #ef4444; }
    .timer-card.break .timer-btn.primary { color: #22c55e; }
    .timer-card.long-break .timer-btn.primary { color: #3b82f6; }
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .mode-tab { flex: 1; padding: 0.75rem; background: var(--bg-secondary); border-radius: 8px; cursor: pointer; text-align: center; font-size: 0.85rem; transition: all 0.2s; }
    .mode-tab.active { background: var(--primary); color: white; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .stat-card { background: var(--bg-secondary); border-radius: 12px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .settings-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1rem; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; }
    .setting-label { font-size: 0.9rem; }
    .setting-input { width: 80px; text-align: center; }
    .session-dots { display: flex; justify-content: center; gap: 0.5rem; margin: 1rem 0; }
    .session-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.3); }
    .session-dot.completed { background: white; }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">뽀모도로 타이머</h1>
          <p class="tool-description">집중과 휴식의 균형</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="mode-tabs">
        <div class="mode-tab active" onclick="Pomodoro.setMode('focus')">집중</div>
        <div class="mode-tab" onclick="Pomodoro.setMode('break')">휴식</div>
        <div class="mode-tab" onclick="Pomodoro.setMode('longBreak')">긴 휴식</div>
      </div>

      <div class="timer-card" id="timerCard">
        <div class="timer-mode" id="timerMode">집중 시간</div>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="session-dots" id="sessionDots"></div>
        <div class="timer-progress">
          <div class="timer-progress-bar" id="progressBar" style="width: 100%;"></div>
        </div>
        <div class="timer-controls">
          <button class="timer-btn" onclick="Pomodoro.reset()" aria-label="↺">↺</button>
          <button class="timer-btn primary" id="playBtn" onclick="Pomodoro.toggle()" aria-label=""></button>
          <button class="timer-btn" onclick="Pomodoro.skip()" aria-label=""></button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="todayPomodoros">0</div>
          <div class="stat-label">오늘 완료</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="todayMinutes">0</div>
          <div class="stat-label">집중 시간(분)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalPomodoros">0</div>
          <div class="stat-label">총 완료</div>
        </div>
      </div>

      <div class="settings-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">설정</h3>
        <div class="setting-row">
          <span class="setting-label">집중 시간 (분)</span>
          <input type="number" id="focusTime" class="tool-input setting-input" value="25" min="1" max="60" onchange="Pomodoro.updateSettings()">
        </div>
        <div class="setting-row">
          <span class="setting-label">짧은 휴식 (분)</span>
          <input type="number" id="breakTime" class="tool-input setting-input" value="5" min="1" max="30" onchange="Pomodoro.updateSettings()">
        </div>
        <div class="setting-row">
          <span class="setting-label">긴 휴식 (분)</span>
          <input type="number" id="longBreakTime" class="tool-input setting-input" value="15" min="1" max="60" onchange="Pomodoro.updateSettings()">
        </div>
        <div class="setting-row">
          <span class="setting-label">긴 휴식까지</span>
          <input type="number" id="sessionsUntilLong" class="tool-input setting-input" value="4" min="2" max="10" onchange="Pomodoro.updateSettings()">
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="pomodoro.js"></script>
</body>
</html>
