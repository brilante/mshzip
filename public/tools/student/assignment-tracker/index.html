<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 관리 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 600px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .add-form { display: flex; flex-direction: column; gap: 0.75rem; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .input-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.25rem; display: block; }
    .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .filter-tab { padding: 0.5rem 1rem; background: var(--bg-primary); border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .filter-tab.active { background: var(--primary); color: white; }
    .assignment-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .assignment-item { background: var(--bg-primary); border-radius: 12px; padding: 1rem; border-left: 4px solid var(--primary); }
    .assignment-item.urgent { border-left-color: #ef4444; }
    .assignment-item.soon { border-left-color: #f97316; }
    .assignment-item.completed { opacity: 0.6; border-left-color: #22c55e; }
    .assignment-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
    .assignment-title { font-weight: 600; font-size: 1rem; }
    .assignment-subject { font-size: 0.8rem; color: var(--primary); background: rgba(59, 130, 246, 0.1); padding: 0.2rem 0.5rem; border-radius: 4px; }
    .assignment-meta { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .assignment-dday { font-weight: 700; }
    .assignment-dday.urgent { color: #ef4444; }
    .assignment-dday.soon { color: #f97316; }
    .assignment-dday.safe { color: #22c55e; }
    .assignment-actions { display: flex; gap: 0.5rem; }
    .btn-sm { padding: 0.4rem 0.75rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; }
    .btn-complete { background: #22c55e; color: white; }
    .btn-delete { background: #ef4444; color: white; }
    .btn-undo { background: #6b7280; color: white; }
    .stats-bar { display: flex; justify-content: space-around; padding: 1rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 1rem; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .priority-select { display: flex; gap: 0.5rem; }
    .priority-option { padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; border: 2px solid transparent; }
    .priority-option.selected { border-color: currentColor; }
    .priority-high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .priority-medium { background: rgba(249, 115, 22, 0.2); color: #f97316; }
    .priority-low { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">과제 관리</h1>
          <p class="tool-description">과제 일정 및 진행 관리</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-value" id="pendingCount" style="color: #f97316;">0</div>
          <div class="stat-label">진행 중</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="urgentCount" style="color: #ef4444;">0</div>
          <div class="stat-label">긴급</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="completedCount" style="color: #22c55e;">0</div>
          <div class="stat-label">완료</div>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">과제 추가</h3>
        <div class="add-form">
          <div>
            <label class="input-label">과제명</label>
            <input type="text" id="assignmentTitle" class="tool-input" placeholder="예: 미적분 레포트" aria-label="예: 미적분 레포트">
          </div>
          <div class="input-row">
            <div>
              <label class="input-label">과목</label>
              <input type="text" id="assignmentSubject" class="tool-input" placeholder="예: 수학" aria-label="예: 수학">
            </div>
            <div>
              <label class="input-label">마감일</label>
              <input type="datetime-local" id="assignmentDue" class="tool-input">
            </div>
          </div>
          <div>
            <label class="input-label">우선순위</label>
            <div class="priority-select" id="prioritySelect">
              <div class="priority-option priority-high" onclick="AssignmentTracker.selectPriority('high')">높음</div>
              <div class="priority-option priority-medium selected" onclick="AssignmentTracker.selectPriority('medium')">보통</div>
              <div class="priority-option priority-low" onclick="AssignmentTracker.selectPriority('low')">낮음</div>
            </div>
          </div>
          <button class="tool-btn tool-btn-primary" onclick="AssignmentTracker.addAssignment()" aria-label="추가하기">추가하기</button>
        </div>
      </div>

      <div class="filter-tabs">
        <div class="filter-tab active" onclick="AssignmentTracker.setFilter('all')">전체</div>
        <div class="filter-tab" onclick="AssignmentTracker.setFilter('pending')">진행 중</div>
        <div class="filter-tab" onclick="AssignmentTracker.setFilter('completed')">완료</div>
      </div>

      <div class="assignment-list" id="assignmentList"></div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="assignment-tracker.js"></script>
</body>
</html>
