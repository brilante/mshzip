<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성적 예측기 - MyMind3 도구</title>
  <link rel="stylesheet" href="/css/tailwind-output.css">
  <link rel="stylesheet" href="/tools/common/tools-common.css?v=20260113">
  <style>
    .util-container { max-width: 550px; margin: 0 auto; }
    .util-panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .input-group { margin-bottom: 0.75rem; }
    .input-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; display: block; }
    .input-row { display: grid; grid-template-columns: 1fr 80px; gap: 0.75rem; align-items: end; }
    .grade-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px; margin-bottom: 0.5rem; }
    .grade-info { display: flex; flex-direction: column; }
    .grade-name { font-weight: 600; }
    .grade-detail { font-size: 0.8rem; color: var(--text-secondary); }
    .result-card { background: linear-gradient(135deg, #8b5cf6, #6366f1); border-radius: 16px; padding: 2rem; color: white; text-align: center; }
    .result-grade { font-size: 4rem; font-weight: 700; }
    .result-label { font-size: 1rem; opacity: 0.9; }
    .result-breakdown { margin-top: 1.5rem; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .breakdown-item { background: rgba(255,255,255,0.15); padding: 0.75rem; border-radius: 8px; }
    .breakdown-value { font-size: 1.25rem; font-weight: 600; }
    .breakdown-label { font-size: 0.75rem; opacity: 0.8; }
    .btn-delete { background: #ef4444; color: white; border: none; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .target-input { background: var(--bg-primary); padding: 1rem; border-radius: 8px; margin-top: 1rem; }
    .needed-score { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
  
  /* 다크모드 지원 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #1a1a2e; color: #eee; }
    .tool-container { background-color: #16213e; }
    input, textarea, select { background-color: #0f3460; color: #eee; border-color: #444; }
    button { background-color: #e94560; }
  }
  [data-theme="dark"] {
    background-color: #1a1a2e; color: #eee;
  }
  [data-theme="dark"] .tool-container { background-color: #16213e; }
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background-color: #0f3460; color: #eee; border-color: #444;
  }


  /* 로딩 표시 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center;
    align-items: center; z-index: 9999;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px; border: 4px solid #f3f3f3;
    border-top: 4px solid #e94560; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay" role="alert" aria-busy="true">
    <div class="loading-spinner"></div>
  </div>

  <div class="tool-container">
    <div class="tool-header">
      <div class="tool-header-left">
        <div class="tool-icon"></div>
        <div>
          <h1 class="tool-title">성적 예측기</h1>
          <p class="tool-description">최종 성적 예측 및 목표 점수 계산</p>
        </div>
      </div>
      <div class="tool-header-right">
        <button class="tool-btn tool-btn-secondary" onclick="goBack()" aria-label="← 뒤로">← 뒤로</button>
      </div>
    </div>
    <script>

  // 공통 유틸리티 함수
  function showLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showError(message) {
    alert(message || '오류가 발생했습니다. 다시 시도해주세요.');
    console.error(message);
  }
  function safeExecute(fn) {
    return async function(...args) {
      try {
        showLoading();
        const result = await fn.apply(this, args);
        return result;
      } catch (error) {
        showError(error.message);
        throw error;
      } finally {
        hideLoading();
      }
    };
  }
  // 다크모드 자동 감지
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }


      if (window.self !== window.top) document.querySelector('.tool-header').style.display = 'none';
      function goBack() { window.self !== window.top ? window.parent.postMessage('tools:back', '*') : window.history.back(); }
    </script>

    <div class="util-container">
      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">성적 항목 추가</h3>
        <div class="input-row">
          <div class="input-group" style="margin-bottom: 0;">
            <label class="input-label">항목명</label>
            <input type="text" id="itemName" class="tool-input" placeholder="예: 중간고사, 과제1" aria-label="예: 중간고사, 과제1">
          </div>
          <div class="input-group" style="margin-bottom: 0;">
            <label class="input-label">비중(%)</label>
            <input type="number" id="itemWeight" class="tool-input" value="20" min="1" max="100">
          </div>
        </div>
        <div class="input-row" style="margin-top: 0.75rem;">
          <div class="input-group" style="margin-bottom: 0;">
            <label class="input-label">받은 점수</label>
            <input type="number" id="itemScore" class="tool-input" placeholder="0~100" aria-label="0~100">
          </div>
          <button class="tool-btn tool-btn-primary" onclick="GradePredictor.addItem()" style="height: 42px;" aria-label="추가">추가</button>
        </div>
      </div>

      <div class="util-panel">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">입력된 성적</h3>
        <div id="gradeList"></div>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result-label">예상 최종 성적</div>
        <div class="result-grade" id="predictedGrade">-</div>
        <div class="result-breakdown">
          <div class="breakdown-item">
            <div class="breakdown-value" id="totalWeight">0%</div>
            <div class="breakdown-label">입력된 비중</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-value" id="currentAvg">-</div>
            <div class="breakdown-label">현재 평균</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-value" id="remainWeight">100%</div>
            <div class="breakdown-label">남은 비중</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-value" id="gradeEstimate">-</div>
            <div class="breakdown-label">예상 학점</div>
          </div>
        </div>
      </div>

      <div class="util-panel target-input">
        <h3 style="font-weight: 600; margin-bottom: 0.75rem;">목표 점수 계산</h3>
        <div class="input-row">
          <div class="input-group" style="margin-bottom: 0;">
            <label class="input-label">목표 최종 점수</label>
            <input type="number" id="targetScore" class="tool-input" placeholder="예: 90" oninput="GradePredictor.calcNeeded()" aria-label="예: 90">
          </div>
          <div style="text-align: center;">
            <div class="input-label">필요 점수</div>
            <div class="needed-score" id="neededScore">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tools/common/tools-common.js?v=20260113"></script>
  <script src="grade-predictor.js"></script>
</body>
</html>
