        <section id="content-ai" class="content-section">
          <h2 class="section-title" data-i18n="aiTitle">AI 설정</h2>
          <p class="section-description" data-i18n="aiDescription">AI 서비스 연동을 설정합니다.</p>

          <!-- 기본 AI 및 크레딧 설정 -->
          <div class="setting-group">
            <h3 class="group-title"><span data-icon="robot" data-icon-size="16"></span> <span data-i18n="aiSettingsBasicTitle">기본 AI 설정</span></h3>

            <div class="setting-item">
              <div class="setting-label">
                <label for="defaultAIService" data-i18n="defaultAIServiceLabel">기본 AI 서비스</label>
                <p class="setting-description" data-i18n="defaultAIServiceDesc">질문 시 사용할 기본 AI 서비스</p>
              </div>
              <div class="setting-control">
                <select id="defaultAIService">
                  <option value="gpt" selected>GPT (OpenAI)</option>
                  <option value="grok">Grok (xAI)</option>
                  <option value="claude">Claude (Anthropic)</option>
                  <option value="gemini">Gemini (Google)</option>
                  <option value="local">Local AI (LM Studio)</option>
                </select>
              </div>
            </div>

            <div class="setting-item">
              <div class="setting-label">
                <label for="multiAIEnabled" data-i18n="multiAIEnabledLabel">다중 AI 사용</label>
                <p class="setting-description" data-i18n="multiAIEnabledDesc">여러 AI에 동시 질의 기능 활성화</p>
              </div>
              <div class="setting-control">
                <label class="toggle-switch">
                  <input type="checkbox" id="multiAIEnabled">
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>

            <div class="setting-item">
              <div class="setting-label">
                <label data-i18n="treeGenAILabel">노드재구성</label>
                <p class="setting-description" data-i18n="treeGenAIDesc">마인드맵 노드 재구성 시 사용할 AI 모델</p>
              </div>
              <div class="setting-control tree-gen-ai-control-v3">
                <!-- 주 AI (Primary AI) -->
                <div class="tree-gen-ai-row">
                  <span class="tree-gen-ai-label" data-i18n="primaryAILabel">주AI</span>
                  <select id="treeGenService" class="tree-gen-select">
                    <option value="gpt">GPT</option>
                    <option value="grok">Grok</option>
                    <option value="claude">Claude</option>
                    <option value="gemini">Gemini</option>
                  </select>
                  <select id="treeGenModel" class="tree-gen-select tree-gen-model-select">
                    <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
                  </select>
                </div>
                <!-- 보조 AI (Secondary AI) - v3 추가 -->
                <div class="tree-gen-ai-row">
                  <span class="tree-gen-ai-label" data-i18n="secondaryAILabel">보조AI</span>
                  <select id="treeGenSecondaryService" class="tree-gen-select">
                    <option value="gpt">GPT</option>
                    <option value="grok">Grok</option>
                    <option value="claude">Claude</option>
                    <option value="gemini">Gemini</option>
                  </select>
                  <select id="treeGenSecondaryModel" class="tree-gen-select tree-gen-model-select">
                    <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- AI별 설정 -->
          <div class="setting-group ai-services-group">
            <h3 class="group-title"><span data-icon="settings" data-icon-size="16"></span> <span data-i18n="aiServicesTitle">AI 서비스별 설정</span></h3>

            <!-- GPT 설정 -->
            <div class="ai-service-card" data-service="gpt">
              <div class="ai-service-header">
                <div class="ai-service-info">
                  <span class="ai-icon" data-icon="openai" data-icon-size="18"></span>
                  <span class="ai-name">GPT (OpenAI)</span>
                  <button type="button" class="ai-service-status-btn" id="gptStatusBtn" data-service="gpt" data-enabled="true">
                    <span class="status-text" data-i18n="statusEnabled">사용</span>
                  </button>
                </div>
                <label class="toggle-switch">
                  <input type="checkbox" id="gptEnabled" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="ai-service-body">
                <div class="ai-setting-row api-key-row">
                  <label data-i18n="apiKeyLabel">API Key</label>
                  <div class="api-key-wrapper">
                    <input type="password" id="gptApiKey" placeholder="sk-proj-xxxxx..." class="api-key-input">
                    <button type="button" class="btn-verify-key" id="gptVerifyBtn" title="API Key 검증" data-i18n-title="apiKeyVerifyTitle" data-i18n="verifyBtn">검증</button>
                  </div>
                </div>
                <div class="ai-setting-row model-payment-row">
                  <div class="model-select-wrapper">
                    <label data-i18n="defaultModelLabel">기본 모델</label>
                    <select id="gptModel" class="model-select">
                      <option value="" data-i18n="modelLoading">모델 로딩 중...</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Grok 설정 -->
            <div class="ai-service-card" data-service="grok">
              <div class="ai-service-header">
                <div class="ai-service-info">
                  <span class="ai-icon" data-icon="grok" data-icon-size="18"></span>
                  <span class="ai-name">Grok (xAI)</span>
                  <button type="button" class="ai-service-status-btn" id="grokStatusBtn" data-service="grok" data-enabled="false">
                    <span class="status-text" data-i18n="statusDisabled">미사용</span>
                  </button>
                </div>
                <label class="toggle-switch">
                  <input type="checkbox" id="grokEnabled">
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="ai-service-body">
                <div class="ai-setting-row api-key-row">
                  <label data-i18n="apiKeyLabel">API Key</label>
                  <div class="api-key-wrapper">
                    <input type="password" id="grokApiKey" placeholder="xai-xxxxx..." class="api-key-input">
                    <button type="button" class="btn-verify-key" id="grokVerifyBtn" title="API Key 검증" data-i18n-title="apiKeyVerifyTitle" data-i18n="verifyBtn">검증</button>
                  </div>
                </div>
                <div class="ai-setting-row model-payment-row">
                  <div class="model-select-wrapper">
                    <label data-i18n="defaultModelLabel">기본 모델</label>
                    <select id="grokModel" class="model-select">
                      <option value="" data-i18n="modelLoading">모델 로딩 중...</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Claude 설정 -->
            <div class="ai-service-card" data-service="claude">
              <div class="ai-service-header">
                <div class="ai-service-info">
                  <span class="ai-icon" data-icon="claude" data-icon-size="18"></span>
                  <span class="ai-name">Claude (Anthropic)</span>
                  <button type="button" class="ai-service-status-btn" id="claudeStatusBtn" data-service="claude" data-enabled="false">
                    <span class="status-text" data-i18n="statusDisabled">미사용</span>
                  </button>
                </div>
                <label class="toggle-switch">
                  <input type="checkbox" id="claudeEnabled">
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="ai-service-body">
                <div class="ai-setting-row api-key-row">
                  <label data-i18n="apiKeyLabel">API Key</label>
                  <div class="api-key-wrapper">
                    <input type="password" id="claudeApiKey" placeholder="sk-ant-xxxxx..." class="api-key-input">
                    <button type="button" class="btn-verify-key" id="claudeVerifyBtn" title="API Key 검증" data-i18n-title="apiKeyVerifyTitle" data-i18n="verifyBtn">검증</button>
                  </div>
                </div>
                <div class="ai-setting-row model-payment-row">
                  <div class="model-select-wrapper">
                    <label data-i18n="defaultModelLabel">기본 모델</label>
                    <select id="claudeModel" class="model-select">
                      <option value="" data-i18n="modelLoading">모델 로딩 중...</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Gemini 설정 -->
            <div class="ai-service-card" data-service="gemini">
              <div class="ai-service-header">
                <div class="ai-service-info">
                  <span class="ai-icon" data-icon="gemini" data-icon-size="18"></span>
                  <span class="ai-name">Gemini (Google)</span>
                  <button type="button" class="ai-service-status-btn" id="geminiStatusBtn" data-service="gemini" data-enabled="false">
                    <span class="status-text" data-i18n="statusDisabled">미사용</span>
                  </button>
                </div>
                <label class="toggle-switch">
                  <input type="checkbox" id="geminiEnabled">
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="ai-service-body">
                <div class="ai-setting-row api-key-row">
                  <label data-i18n="apiKeyLabel">API Key</label>
                  <div class="api-key-wrapper">
                    <input type="password" id="geminiApiKey" placeholder="AIzaSyxxxxx..." class="api-key-input">
                    <button type="button" class="btn-verify-key" id="geminiVerifyBtn" title="API Key 검증" data-i18n-title="apiKeyVerifyTitle" data-i18n="verifyBtn">검증</button>
                  </div>
                </div>
                <div class="ai-setting-row model-payment-row">
                  <div class="model-select-wrapper">
                    <label data-i18n="defaultModelLabel">기본 모델</label>
                    <select id="geminiModel" class="model-select">
                      <option value="" data-i18n="modelLoading">모델 로딩 중...</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Local AI 설정 -->
            <div class="ai-service-card" data-service="local">
              <div class="ai-service-header">
                <div class="ai-service-info">
                  <span class="ai-icon" data-icon="monitor" data-icon-size="18"></span>
                  <span class="ai-name">Local AI (LM Studio)</span>
                  <button type="button" class="ai-service-status-btn" id="localStatusBtn" data-service="local" data-enabled="false">
                    <span class="status-text" data-i18n="statusDisabled">미사용</span>
                  </button>
                </div>
                <label class="toggle-switch">
                  <input type="checkbox" id="localEnabled">
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="ai-service-body">
                <div class="ai-setting-row">
                  <label>URL</label>
                  <div class="api-key-wrapper">
                    <input type="text" id="localUrl" placeholder="http://localhost:8080" class="api-key-input" value="http://localhost:8080">
                    <button type="button" class="btn-verify-key" id="localVerifyBtn" title="연결 테스트" data-i18n-title="connectionTestTitle" data-i18n="verifyBtn">검증</button>
                  </div>
                </div>
                <div class="ai-setting-row">
                  <label data-i18n="defaultModelLabel">기본 모델</label>
                  <select id="localModel" class="model-select">
                    <option value="" data-i18n="modelLoading">모델 로딩 중...</option>
                  </select>
                </div>
                <div class="local-free-notice">
                  <p><span data-icon="lightbulb" data-icon-size="14"></span> <span data-i18n="localFreeNotice">Local AI는 크레딧 차감 없이 무료로 사용 가능합니다</span></p>
                </div>
              </div>
            </div>
          </div>

        </section>
