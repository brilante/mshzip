        <section id="content-security" class="content-section">
          <h2 class="section-title" data-i18n="securityTitle"><span data-icon="shield" data-icon-size="16"></span> 보안</h2>
          <p class="section-description" data-i18n="securityDescription">2차 인증 및 계정 보안을 관리합니다.</p>

          <!-- 2FA 상태 표시 -->
          <div class="setting-group">
            <h3 class="group-title" data-i18n="twoFactorAuthTitle"><span data-icon="smartphone" data-icon-size="16"></span> 2차 인증 (TOTP)</h3>

            <div class="setting-item">
              <div class="setting-label">
                <label data-i18n="twoFactorStatusLabel">2FA 상태</label>
                <p class="setting-description" data-i18n="twoFactorStatusDesc">Google Authenticator 2차 인증</p>
              </div>
              <div class="setting-control">
                <span id="twoFactorStatus" class="status-badge disconnected" data-i18n="twoFactorDisabled"><span data-icon="x-circle" data-icon-size="14"></span> 비활성화</span>
              </div>
            </div>

            <!-- 2FA 활성화 버튼 (비활성화 상태일 때) -->
            <div id="twoFactorEnableSection" class="setting-item">
              <div class="setting-label">
                <label data-i18n="enable2FALabel">2FA 활성화</label>
                <p class="setting-description" data-i18n="enable2FADesc">Google Authenticator로 계정을 보호합니다</p>
              </div>
              <div class="setting-control">
                <button class="btn-primary" id="enable2FABtn" data-i18n="enable2FABtn"><span data-icon="shield" data-icon-size="14"></span> 2FA 설정</button>
              </div>
            </div>

            <!-- 2FA 관리 버튼 (활성화 상태일 때) -->
            <div id="twoFactorManageSection" style="display: none;">
              <div class="setting-item">
                <div class="setting-label">
                  <label data-i18n="backupCodesLabel">백업 코드</label>
                  <p class="setting-description" data-i18n="backupCodesDesc">인증 앱 사용 불가 시 사용</p>
                </div>
                <div class="setting-control">
                  <span id="backupCodeCount" class="info-text">0개 남음</span>
                  <button class="btn-secondary" id="regenerateBackupCodesBtn" data-i18n="regenerateBtn"><span data-icon="refresh-cw" data-icon-size="14"></span> 재생성</button>
                </div>
              </div>

              <div class="setting-item">
                <div class="setting-label">
                  <label data-i18n="disable2FALabel">2FA 비활성화</label>
                  <p class="setting-description" data-i18n="disable2FADesc">2차 인증을 끕니다</p>
                </div>
                <div class="setting-control">
                  <button class="btn-danger" id="disable2FABtn" data-i18n="disable2FABtn"><span data-icon="unlock" data-icon-size="14"></span> 2FA 해제</button>
                </div>
              </div>
            </div>

            <div class="security-info">
              <p data-i18n="twoFactorInfo"><span data-icon="lightbulb" data-icon-size="14"></span> 2차 인증을 활성화하면 로그인 시 Google Authenticator 코드가 필요합니다. 분실 시 백업 코드로 복구할 수 있습니다.</p>
            </div>
          </div>

          <!-- 2FA 사용 불가 안내 (TOTP_ENCRYPTION_KEY 미설정 시) -->
          <div id="twoFactorUnavailable" class="setting-group" style="display: none;">
            <div class="alert alert-warning">
              <p data-i18n="twoFactorUnavailableMsg"><span data-icon="alert-triangle" data-icon-size="16"></span> 2차 인증 기능이 현재 사용할 수 없습니다. 관리자에게 문의하세요.</p>
            </div>
          </div>
        </section>
