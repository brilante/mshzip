        <section id="content-feature-settings" class="content-section admin-only">
          <h2 class="section-title" data-i18n="featureSettingsTitle"><span data-icon="sliders" data-icon-size="16"></span> 기능설정</h2>
          <p class="section-description" data-i18n="featureSettingsDesc">시스템 기능을 설정합니다.</p>

          <div class="feature-settings-container">
            <!-- 노드재구성 기능 설정 -->
            <div class="setting-group" id="nodeRestructureSettings">
              <h3 class="group-title" data-i18n="nodeRestructureTitle"><span data-icon="refresh-cw" data-icon-size="16"></span> 노드재구성 기능</h3>
              <p class="setting-description" data-i18n="nodeRestructureDesc">AI를 활용한 노드재구성 버튼 표시 여부를 설정합니다.</p>

              <div class="feature-checkbox-group">
                <div class="feature-checkbox-item">
                  <label class="checkbox-wrapper">
                    <input type="checkbox" id="enableNodeRestructureFeature" checked>
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-label">
                      <span class="feature-icon" data-icon="refresh-cw" data-icon-size="16"></span>
                      <span class="feature-name" data-i18n="featureNodeRestructure">노드재구성</span>
                    </span>
                  </label>
                  <p class="feature-description" data-i18n="featureNodeRestructureDesc">AI가 마인드맵 구조를 분석하여 최적의 형태로 재구성합니다.</p>
                </div>
              </div>
            </div>

            <!-- 문서 생성 기능 설정 -->
            <div class="setting-group" id="documentFeatureSettings">
              <h3 class="group-title" data-i18n="documentFeaturesTitle"><span data-icon="file" data-icon-size="16"></span> 문서 생성 기능</h3>
              <p class="setting-description" data-i18n="documentFeaturesDesc">PPT/PDF 버튼 표시 여부를 설정합니다.</p>

              <div class="feature-checkbox-group">
                <div class="feature-checkbox-item">
                  <label class="checkbox-wrapper">
                    <input type="checkbox" id="enablePptFeature" checked>
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-label">
                      <span class="feature-icon" data-icon="bar-chart" data-icon-size="16"></span>
                      <span class="feature-name" data-i18n="featurePpt">PPT 생성</span>
                    </span>
                  </label>
                  <p class="feature-description" data-i18n="featurePptDesc">마인드맵을 PowerPoint 프레젠테이션으로 변환합니다.</p>
                </div>

                <div class="feature-checkbox-item">
                  <label class="checkbox-wrapper">
                    <input type="checkbox" id="enablePdfFeature" checked>
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-label">
                      <span class="feature-icon" data-icon="book" data-icon-size="16"></span>
                      <span class="feature-name" data-i18n="featurePdf">PDF 생성</span>
                    </span>
                  </label>
                  <p class="feature-description" data-i18n="featurePdfDesc">마인드맵을 PDF 문서로 변환합니다.</p>
                </div>
              </div>
            </div>

            <!-- 저장 버튼 -->
            <div class="feature-settings-actions">
              <button type="button" id="saveFeatureSettingsBtn" class="btn btn-primary" data-i18n="saveFeatureSettings">
                <span data-icon="save" data-icon-size="14"></span> 설정 저장
              </button>
              <span id="featureSettingsSaveStatus" class="save-status"></span>
            </div>
          </div>
        </section>
