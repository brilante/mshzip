<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 테마 플래시 방지: 최우선 실행 스크립트 -->
  <script>
  (function() {
    var theme = localStorage.getItem('mymind3-theme');
    if (!theme) {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
    if (theme === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
    document.documentElement.classList.add('theme-loaded');
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구독 캐시 초기화</title>
  <!-- 공통 CSS 변수 및 테마 -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/theme-base.css">
  <link rel="stylesheet" href="/css/themes/light.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    h1 {
      margin-bottom: 20px;
    }
    .btn {
      padding: 15px 30px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
      background: var(--accent-blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .result {
      margin-top: 20px;
      padding: 20px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }
    .result h3, .result h4 {
      color: var(--text-primary);
    }
    .result p, .result li {
      color: var(--text-secondary);
    }
    pre {
      background: #1a1a2e;
      color: #0f0;
      padding: 15px;
      overflow: auto;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>구독 데이터 캐시 초기화</h1>

  <button class="btn" onclick="showCurrent()">현재 localStorage 확인</button>
  <button class="btn" onclick="clearCache()">구독 캐시 초기화</button>
  <button class="btn" onclick="location.href='/'">메인으로 이동</button>

  <div class="result" id="result"></div>

  <script>
    function showCurrent() {
      const subscription = localStorage.getItem('mymind3_subscription');
      const userInfo = localStorage.getItem('userInfo');

      document.getElementById('result').innerHTML = `
        <h3>현재 localStorage 상태:</h3>
        <h4>mymind3_subscription:</h4>
        <pre>${subscription ? JSON.stringify(JSON.parse(subscription), null, 2) : '없음'}</pre>
        <h4>userInfo:</h4>
        <pre>${userInfo ? JSON.stringify(JSON.parse(userInfo), null, 2) : '없음'}</pre>
      `;
    }

    function clearCache() {
      // 구독 관련 캐시 삭제
      localStorage.removeItem('mymind3_subscription');
      localStorage.removeItem('userInfo');

      // 결과 표시
      document.getElementById('result').innerHTML = `
        <h3 style="color: var(--accent-success, green);">초기화 완료!</h3>
        <p>다음 항목이 삭제되었습니다:</p>
        <ul>
          <li>mymind3_subscription</li>
          <li>userInfo</li>
        </ul>
        <p><strong>메인으로 이동 버튼을 클릭하여 새로고침하세요.</strong></p>
      `;
    }

    // 페이지 로드 시 현재 상태 표시
    showCurrent();
  </script>
</body>
</html>
