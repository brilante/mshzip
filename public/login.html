<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 테마 플래시 방지: 최우선 실행 스크립트 -->
    <script>
    (function() {
      // 테마 즉시 적용 (localStorage 또는 시스템 설정)
      var theme = localStorage.getItem('mymind3-theme');
      if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      // 테마 로드 완료 표시
      document.documentElement.classList.add('theme-loaded');
    })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="loginPageTitle">Login - MyMind3</title>
    <!-- 공통 CSS 변수 및 테마 기본 스타일 (중복 제거) -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/theme-base.css">
    <link rel="stylesheet" href="/css/themes/light.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        /* 로그인 페이지 전용 스타일 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* 모달 배경 - 독립 페이지에서는 단순 배경색 사용 */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: var(--z-modal-backdrop, 1);
        }

        /* 로딩 스피너 (공통 애니메이션 사용) */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        /* 모달 애니메이션 */
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 로그인 카드 */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            animation: modalIn 0.3s ease;
        }

        /* 닫기 버튼 */
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }
        .modal-close:hover { color: var(--text-primary); }

        /* 로고 섹션 */
        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .logo-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 폼 스타일 */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .form-input::placeholder { color: var(--text-muted); }

        /* 버튼 스타일 */
        .btn-primary {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .divider span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Google 로그인 버튼 */
        .btn-google {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: #fff;
            color: #333;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-decoration: none;
        }
        .btn-google:hover {
            background: #f5f5f5;
            border-color: #999;
        }

        /* Apple 로그인 버튼 */
        .btn-apple {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #000;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 0.75rem;
            cursor: pointer;
        }
        .btn-apple:hover {
            background: #f5f5f5;
            border-color: #999;
        }
        .btn-apple svg {
            fill: currentColor;
        }

        /* Facebook 로그인 버튼 */
        .btn-facebook {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #1877F2;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 0.75rem;
            cursor: pointer;
        }
        .btn-facebook:hover {
            background: #f5f5f5;
            border-color: #999;
        }
        .btn-facebook svg {
            fill: #1877F2;
        }

        /* 에러 메시지 */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: none;
        }
        .error-message.show { display: block; }

        /* 푸터 */
        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 2FA 섹션 */
        .twofa-icon {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .twofa-title {
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .twofa-desc {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        /* 체크박스 */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .checkbox-group input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            accent-color: var(--accent-blue);
        }
        .checkbox-group label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .hidden { display: none !important; }

        /* 다크모드: 소셜 로그인 버튼 */
        [data-theme="dark"] .btn-google {
            background: #1a1a1a;
            color: #e0e0e0;
        }
        [data-theme="dark"] .btn-google:hover {
            background: #222;
            border-color: #555;
        }

        [data-theme="dark"] .btn-apple {
            background: #1a1a1a;
            color: #e0e0e0;
        }
        [data-theme="dark"] .btn-apple:hover {
            background: #222;
            border-color: #555;
        }

        [data-theme="dark"] .btn-facebook {
            background: #1a1a1a;
            color: #5b9bd5;
        }
        [data-theme="dark"] .btn-facebook:hover {
            background: #222;
            border-color: #555;
        }
        [data-theme="dark"] .btn-facebook svg {
            fill: #5b9bd5;
        }
    </style>
  <script defer src="/js/modules/features/i18n-init.js?v=20260212"></script>
</head>
<body>
    <!-- 로그인 카드 -->
    <div class="login-card">
        <!-- 닫기 버튼 -->
        <button class="modal-close" onclick="window.location.href='/'">&times;</button>

        <!-- 로고 섹션 -->
        <div class="logo-section">
            <h1 class="logo-title">MyMind3</h1>
            <p class="logo-subtitle" data-i18n="loginSubtitle">마인드맵과 AI가 만나다</p>
        </div>

        <!-- 에러 메시지 -->
        <div id="errorMessage" class="error-message"></div>

        <!-- 로그인 폼 -->
        <form id="loginForm">
            <!-- 사용자 이름 -->
            <div class="form-group">
                <label for="username" class="form-label" data-i18n="loginUsernameLabel">사용자 이름</label>
                <input type="text" id="username" name="username" required
                       autocomplete="username" data-i18n-placeholder="loginUsernamePlaceholder" placeholder="사용자 이름을 입력하세요"
                       class="form-input">
            </div>

            <!-- 비밀번호 -->
            <div class="form-group">
                <label for="password" class="form-label" data-i18n="loginPasswordLabel">비밀번호</label>
                <input type="password" id="password" name="password" required
                       autocomplete="current-password" data-i18n-placeholder="loginPasswordPlaceholder" placeholder="비밀번호를 입력하세요"
                       class="form-input">
            </div>

            <!-- 로그인 버튼 -->
            <button type="submit" id="loginBtn" class="btn-primary" data-i18n="loginBtn">로그인</button>
        </form>

        <!-- 2FA 인증 폼 (숨김 상태로 시작) -->
        <div id="twoFactorForm" class="hidden">
            <!-- 2FA 안내 -->
            <div class="twofa-icon"></div>
            <h2 class="twofa-title" data-i18n="loginTwoFaTitle">2차 인증</h2>
            <p class="twofa-desc" data-i18n="loginTwoFaDesc">Google Authenticator 앱에서<br>6자리 코드를 입력하세요</p>

            <!-- 2FA 코드 입력 -->
            <div class="form-group">
                <label for="twoFactorCode" class="form-label" data-i18n="loginTwoFaCodeLabel">인증 코드</label>
                <input type="text" id="twoFactorCode" name="twoFactorCode"
                       maxlength="8" autocomplete="one-time-code" inputmode="numeric"
                       data-i18n-placeholder="loginTwoFaCodePlaceholder" placeholder="6자리 코드 입력"
                       class="form-input" style="text-align:center;font-family:monospace;letter-spacing:0.25em;">
            </div>

            <!-- 백업 코드 사용 체크박스 -->
            <div class="checkbox-group">
                <input type="checkbox" id="useBackupCode">
                <label for="useBackupCode" data-i18n="loginUseBackupCode">백업 코드 사용</label>
            </div>

            <!-- 2FA 확인 버튼 -->
            <button type="button" id="verify2FABtn" class="btn-primary" style="margin-bottom:0.75rem;" data-i18n="loginVerifyBtn">인증하기</button>

            <!-- 취소 버튼 -->
            <button type="button" id="cancel2FABtn" class="btn-secondary" data-i18n="cancelBtn">취소</button>
        </div>

        <!-- 구분선 -->
        <div id="dividerSection" class="divider">
            <span data-i18n="loginOrDivider">또는</span>
        </div>

        <!-- Google 로그인 -->
        <a href="/api/auth/google" id="googleLoginBtn" class="btn-google">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            <span data-i18n="loginWithGoogle">Google로 로그인</span>
        </a>

        <!-- Apple 로그인 -->
        <a href="/api/auth/apple" id="appleLoginBtn" class="btn-apple">
            <svg width="27" height="27" viewBox="0 0 384 512">
                <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
            </svg>
            <span data-i18n="loginWithApple">Apple로 로그인</span>
        </a>

        <!-- Facebook 로그인 -->
        <a href="/api/auth/facebook" id="facebookLoginBtn" class="btn-facebook">
            <svg width="18" height="18" viewBox="0 0 512 512">
                <path d="M512 256C512 114.6 397.4 0 256 0S0 114.6 0 256C0 376 82.7 476.8 194.2 504.5V334.2H141.4V256h52.8V222.3c0-87.1 39.4-127.5 125-127.5c16.2 0 44.2 3.2 55.7 6.4V172c-6-.6-16.5-1-29.6-1c-42 0-58.2 15.9-58.2 57.2V256h83.6l-14.4 78.2H287V510.1C413.8 494.8 512 386.9 512 256h0z"/>
            </svg>
            <span data-i18n="loginWithFacebook">Facebook으로 로그인</span>
        </a>

        <!-- 회원가입 링크 -->
        <div style="text-align:center;margin-top:1.5rem;font-size:0.9rem;">
            <span style="color:var(--text-muted);" data-i18n="loginNoAccount">계정이 없으신가요?</span>
            <a href="javascript:void(0)" onclick="window.location.href='/?signup=1'" style="color:var(--accent-blue);font-weight:600;margin-left:0.5rem;text-decoration:none;cursor:pointer;" data-i18n="loginSignupLink">회원가입</a>
        </div>

        <!-- 푸터 -->
        <div class="footer">© 2025 MyMind3. All rights reserved.</div>
    </div>

    <script>
        const t = window.t || ((k, fb) => fb);
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // 2FA 관련 요소
        const twoFactorForm = document.getElementById('twoFactorForm');
        const twoFactorCodeInput = document.getElementById('twoFactorCode');
        const useBackupCodeCheckbox = document.getElementById('useBackupCode');
        const verify2FABtn = document.getElementById('verify2FABtn');
        const cancel2FABtn = document.getElementById('cancel2FABtn');
        const dividerSection = document.getElementById('dividerSection');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const appleLoginBtn = document.getElementById('appleLoginBtn');
        const facebookLoginBtn = document.getElementById('facebookLoginBtn');

        // CSRF 토큰 저장
        let csrfToken = null;

        // CSRF 토큰 가져오기
        async function fetchCsrfToken() {
            try {
                const response = await fetch('/api/csrf-token', {
                    method: 'GET',
                    credentials: 'include'
                });
                const data = await response.json();
                csrfToken = data.csrfToken;
                console.log('[Login] CSRF 토큰 획득 완료');
            } catch (error) {
                console.error('[Login] CSRF 토큰 획득 실패:', error);
            }
        }

        // 페이지 로드 시 CSRF 토큰 가져오기
        fetchCsrfToken();

        // 에러 메시지 표시
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // 에러 메시지 숨기기
        function hideError() {
            errorMessage.classList.remove('show');
        }

        // 로그인 버튼 상태 변경
        function setLoading(loading, btn = loginBtn, text = t('loginBtn', '로그인')) {
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = `<span class="loading-spinner"></span>${text} ${t('loginLoading', '중...')}`;
            } else {
                btn.disabled = false;
                btn.innerHTML = text;
            }
        }

        // 2FA 폼 표시
        function showTwoFactorForm() {
            loginForm.classList.add('hidden');
            twoFactorForm.classList.remove('hidden');
            dividerSection.classList.add('hidden');
            googleLoginBtn.classList.add('hidden');
            appleLoginBtn.classList.add('hidden');
            facebookLoginBtn.classList.add('hidden');
            twoFactorCodeInput.value = '';
            useBackupCodeCheckbox.checked = false;
            twoFactorCodeInput.focus();
            hideError();
        }

        // 로그인 폼 표시 (2FA 취소 시)
        function showLoginForm() {
            loginForm.classList.remove('hidden');
            twoFactorForm.classList.add('hidden');
            dividerSection.classList.remove('hidden');
            googleLoginBtn.classList.remove('hidden');
            appleLoginBtn.classList.remove('hidden');
            facebookLoginBtn.classList.remove('hidden');
            hideError();
        }

        // 로그인 폼 제출
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showError(t('loginFieldsRequired', '사용자 이름과 비밀번호를 입력하세요.'));
                return;
            }

            // CSRF 토큰이 없으면 다시 가져오기
            if (!csrfToken) {
                await fetchCsrfToken();
            }

            setLoading(true);

            try {
                const headers = {
                    'Content-Type': 'application/json'
                };

                // CSRF 토큰 헤더 추가
                if (csrfToken) {
                    headers['x-csrf-token'] = csrfToken;
                }

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: headers,
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    if (data.requiresTwoFactor) {
                        // 2FA 필요 - 2FA 폼 표시
                        setLoading(false);
                        showTwoFactorForm();
                    } else {
                        // 로그인 성공 - 메인 앱으로 이동
                        window.location.href = '/app';
                    }
                } else {
                    // 로그인 실패
                    showError(data.message || t('loginFailed', '로그인에 실패했습니다.'));
                    setLoading(false);
                    // CSRF 토큰 갱신 (실패 시 토큰이 만료됐을 수 있음)
                    fetchCsrfToken();
                }

            } catch (error) {
                console.error('Login error:', error);
                showError(t('loginProcessError', '로그인 처리 중 오류가 발생했습니다.'));
                setLoading(false);
                // CSRF 토큰 갱신
                fetchCsrfToken();
            }
        });

        // 2FA 검증
        verify2FABtn.addEventListener('click', async () => {
            hideError();

            const code = twoFactorCodeInput.value.trim();
            const isBackupCode = useBackupCodeCheckbox.checked;

            if (!code) {
                showError(t('twoFaCodeRequired', '인증 코드를 입력하세요.'));
                return;
            }

            // TOTP 코드는 6자리, 백업 코드는 8자리
            if (!isBackupCode && code.length !== 6) {
                showError(t('twoFaCodeInvalid', '6자리 인증 코드를 입력하세요.'));
                return;
            }

            // CSRF 토큰이 없으면 다시 가져오기
            if (!csrfToken) {
                await fetchCsrfToken();
            }

            setLoading(true, verify2FABtn, t('loginVerifyBtn', '인증하기'));

            try {
                const headers = {
                    'Content-Type': 'application/json'
                };

                if (csrfToken) {
                    headers['x-csrf-token'] = csrfToken;
                }

                const response = await fetch('/api/auth/login-2fa', {
                    method: 'POST',
                    headers: headers,
                    credentials: 'include',
                    body: JSON.stringify({ code, isBackupCode })
                });

                const data = await response.json();

                if (data.success) {
                    // 2FA 인증 성공 - 메인 앱으로 이동
                    window.location.href = '/app';
                } else {
                    // 2FA 인증 실패
                    showError(data.message || t('twoFaFailed', '인증에 실패했습니다.'));
                    setLoading(false, verify2FABtn, t('loginVerifyBtn', '인증하기'));
                    twoFactorCodeInput.value = '';
                    twoFactorCodeInput.focus();
                }

            } catch (error) {
                console.error('2FA verify error:', error);
                showError(t('twoFaProcessError', '인증 처리 중 오류가 발생했습니다.'));
                setLoading(false, verify2FABtn, t('loginVerifyBtn', '인증하기'));
            }
        });

        // 2FA 취소
        cancel2FABtn.addEventListener('click', () => {
            showLoginForm();
        });

        // 2FA 코드 입력 필드에서 숫자만 허용 (백업 코드 제외)
        twoFactorCodeInput.addEventListener('input', (e) => {
            if (!useBackupCodeCheckbox.checked) {
                e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
            }
        });

        // 백업 코드 체크박스 변경 시 입력 필드 조정
        useBackupCodeCheckbox.addEventListener('change', () => {
            if (useBackupCodeCheckbox.checked) {
                twoFactorCodeInput.placeholder = t('loginBackupCodePlaceholder', '백업 코드 입력');
                twoFactorCodeInput.maxLength = 14;  // 백업 코드: XXXX-XXXX-XXXX (14자)
            } else {
                twoFactorCodeInput.placeholder = t('loginTwoFaCodePlaceholder', '6자리 코드 입력');
                twoFactorCodeInput.maxLength = 6;
            }
            twoFactorCodeInput.value = '';
            twoFactorCodeInput.focus();
        });

        // 2FA 코드 입력 필드에서 엔터키로 인증
        twoFactorCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verify2FABtn.click();
            }
        });

        // 엔터키로 로그인
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
