<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 테마 플래시 방지: 최우선 실행 스크립트 -->
  <script>
  (function() {
    var theme = localStorage.getItem('mymind3-theme');
    if (!theme) {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
    if (theme === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
    document.documentElement.classList.add('theme-loaded');
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 완료 - MyMind3</title>
  <!-- 공통 CSS 변수 및 테마 -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/theme-base.css">
  <link rel="stylesheet" href="/css/themes/light.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: var(--bg-card, white);
      border-radius: 20px;
      padding: 40px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
      70% { box-shadow: 0 0 0 20px rgba(76, 175, 80, 0); }
      100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
    }

    .success-icon svg {
      width: 50px;
      height: 50px;
      fill: white;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary, #333);
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-secondary, #666);
      margin-bottom: 30px;
    }

    .info-box {
      background: var(--bg-secondary, #f8f9fa);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-color, #e9ecef);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: var(--text-muted, #666);
      font-size: 14px;
    }

    .info-value {
      color: var(--text-primary, #333);
      font-weight: 600;
      font-size: 14px;
    }

    .credits-highlight {
      color: #4CAF50;
      font-size: 24px;
      font-weight: 700;
    }

    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .loading {
      display: none;
      margin: 20px 0;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border-color, #f3f3f3);
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-message {
      color: #dc3545;
      background: #f8d7da;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .footer {
      margin-top: 30px;
      color: var(--text-muted, #999);
      font-size: 12px;
    }

    /* 다크모드 오버라이드 */
    [data-theme="dark"] body {
      background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 100%);
    }

    [data-theme="dark"] .loading p {
      color: #999;
    }

    [data-theme="dark"] .error-message {
      color: #fca5a5;
      background: #991b1b33;
    }

    [data-theme="dark"] .credits-highlight {
      color: #66bb6a;
    }

    /* 결제 검증 알림 배너 */
    .payment-alert-banner {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: slideUp 0.4s ease-out;
    }
    .payment-alert-banner .alert-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      margin-top: 1px;
    }
    .payment-alert-banner .alert-body {
      flex: 1;
    }
    .payment-alert-banner .alert-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .payment-alert-banner .alert-message {
      font-size: 12px;
      opacity: 0.85;
    }
    .payment-alert-banner .alert-dismiss {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      opacity: 0.6;
      padding: 0 4px;
    }
    .payment-alert-banner .alert-dismiss:hover {
      opacity: 1;
    }
    .alert-info {
      background: #dbeafe;
      border: 1px solid #93c5fd;
      color: #1e40af;
    }
    .alert-warning {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      color: #92400e;
    }
    .alert-error {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }
    .alert-critical {
      background: #fce4ec;
      border: 1px solid #ef9a9a;
      color: #b71c1c;
    }
    [data-theme="dark"] .alert-info {
      background: #1e3a5f;
      border-color: #2563eb55;
      color: #93c5fd;
    }
    [data-theme="dark"] .alert-warning {
      background: #422006;
      border-color: #f59e0b55;
      color: #fcd34d;
    }
    [data-theme="dark"] .alert-error {
      background: #450a0a;
      border-color: #ef444455;
      color: #fca5a5;
    }
    [data-theme="dark"] .alert-critical {
      background: #4a0e0e;
      border-color: #dc262655;
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">
      <svg viewBox="0 0 24 24">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
      </svg>
    </div>

    <h1 class="title" data-i18n="paymentCompleteTitle">결제가 완료되었습니다!</h1>
    <p class="subtitle" data-i18n="paymentCompleteSubtitle">MyMind3 크레딧이 충전되었습니다.</p>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 12px; color: var(--text-muted, #666);" data-i18n="paymentChecking">결제 정보 확인 중...</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div class="info-box" id="infoBox" style="display: none;">
      <div class="info-row">
        <span class="info-label" data-i18n="paymentStatusLabel">결제 상태</span>
        <span class="info-value" id="paymentStatus" data-i18n="checking">확인 중...</span>
      </div>
      <div class="info-row">
        <span class="info-label" data-i18n="chargedCredits">충전된 크레딧</span>
        <span class="info-value credits-highlight" id="creditsAmount">-</span>
      </div>
      <div class="info-row">
        <span class="info-label" data-i18n="packageLabel">패키지</span>
        <span class="info-value" id="packageName">-</span>
      </div>
    </div>

    <div id="alertContainer"></div>

    <a href="/" class="btn" data-i18n="returnToMain">메인으로 돌아가기</a>

    <div class="footer">
      <p data-i18n="contactSupport">문의사항이 있으시면 고객센터로 연락해 주세요.</p>
    </div>
  </div>

  <!-- i18n 다국어 지원 -->
  <script src="/js/modules/features/i18n-init.js?v=20260212"></script>
  <script>
    (async function() {
      // i18n 초기화 대기
      if (window.initI18n) {
        await initI18n();
      }

      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');

      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('errorMessage');
      const infoBox = document.getElementById('infoBox');
      const statusEl = document.getElementById('paymentStatus');
      const creditsEl = document.getElementById('creditsAmount');
      const packageEl = document.getElementById('packageName');

      if (!sessionId) {
        showError(t('paymentNoSession', '세션 ID가 없습니다. 올바른 결제 링크로 접근해 주세요.'));
        return;
      }

      // 로딩 표시
      loadingEl.classList.add('show');

      // 결제 상태 확인
      checkPaymentStatus(sessionId);

      async function checkPaymentStatus(id) {
        try {
          const response = await fetch(`/api/credits/payment-status/${id}`, {
            credentials: 'include'
          });

          const result = await response.json();

          loadingEl.classList.remove('show');

          if (result.success) {
            // API 응답: { success, status, packageType, credits, subscriptionData }
            // (flat 구조 - data 래퍼 없음)
            const status = result.status;
            const packageType = result.packageType;
            const credits = result.credits || 0;

            infoBox.style.display = 'block';

            // 상태 표시
            statusEl.textContent = getStatusText(status);

            // 크레딧 표시
            creditsEl.textContent = credits > 0 ? Number(credits).toLocaleString() : '-';

            // 패키지 표시
            packageEl.textContent = getPackageName(packageType) || '-';

            // 완료 판정: 'completed' 또는 'paid'
            if (status === 'completed' || status === 'paid') {
              console.log('[Payment Success] 결제 완료 확인');
              // 메인 화면에서 크레딧 즉시 반영을 위한 플래그 저장
              sessionStorage.setItem('paymentJustCompleted', Date.now().toString());

              // 구독 정보를 localStorage에 저장 (설정 페이지에서 즉시 반영)
              if (result.subscriptionData) {
                localStorage.setItem('mymind3_subscription', JSON.stringify(result.subscriptionData));
                console.log('[Payment Success] 구독 정보 localStorage 저장:', result.subscriptionData.subscriptionType);
              } else if (packageType) {
                // subscriptionData가 없는 경우 기본 구독 정보 저장
                const existingSub = JSON.parse(localStorage.getItem('mymind3_subscription') || '{}');
                const subData = {
                  ...existingSub,
                  isSubscribed: true,
                  subscriptionStatus: 'active',
                  subscriptionType: packageType,
                  credits: {
                    ...(existingSub.credits || {}),
                    total: credits
                  }
                };
                localStorage.setItem('mymind3_subscription', JSON.stringify(subData));
                console.log('[Payment Success] 기본 구독 정보 localStorage 저장:', packageType);
              }

              // userInfo에도 구독 상태 업데이트
              try {
                const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
                userInfo.subscriptionStatus = 'active';
                userInfo.subscriptionType = packageType;
                localStorage.setItem('userInfo', JSON.stringify(userInfo));
              } catch (e) { /* 무시 */ }

              // 결제 완료 후 검증 알림 확인
              checkPaymentAlerts();
            } else {
              // 아직 처리 중이면 5초 후 재확인
              setTimeout(() => checkPaymentStatus(id), 5000);
            }
          } else {
            showError(result.error || t('paymentInfoUnavailable', '결제 정보를 확인할 수 없습니다.'));
          }
        } catch (error) {
          loadingEl.classList.remove('show');
          console.error('결제 상태 확인 실패:', error);

          // 네트워크 에러 시에도 기본 정보 표시
          infoBox.style.display = 'block';
          statusEl.textContent = t('processing', '처리 중');

          // 5초 후 재시도
          setTimeout(() => checkPaymentStatus(id), 5000);
        }
      }

      function getStatusText(status) {
        const statusMap = {
          'completed': t('paymentStatusCompleted', '완료'),
          'paid': t('paymentStatusCompleted', '완료'),
          'pending': t('paymentStatusProcessing', '처리 중'),
          'failed': t('paymentStatusFailed', '실패'),
          'cancelled': t('paymentStatusCancelled', '취소됨'),
          'unpaid': t('paymentStatusUnpaid', '미결제')
        };
        return statusMap[status] || status || '-';
      }

      function getPackageName(type) {
        if (!type) return null;
        const names = {
          'lite': t('packageLiteFullName', 'Lite (라이트)'),
          'standard': t('packageStandardFullName', 'Standard (스탠다드)'),
          'pro': t('packageProFullName', 'Pro (프로)'),
          'max': t('packageMaxFullName', 'Max (맥스)'),
          'credit_purchase': t('creditPurchaseLabel', '크레딧 충전')
        };
        return names[type] || type;
      }

      function showError(message) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
        loadingEl.classList.remove('show');
      }

      // 결제 검증 알림 확인 및 표시
      async function checkPaymentAlerts() {
        try {
          const res = await fetch('/api/credits/payment-alerts', { credentials: 'include' });
          const data = await res.json();
          if (!data.success || !Array.isArray(data.data) || data.data.length === 0) return;

          const container = document.getElementById('alertContainer');
          data.data.forEach(alert => {
            const severityClass = 'alert-' + (alert.severity || 'warning');
            const iconSvg = getAlertIcon(alert.severity);
            const div = document.createElement('div');
            div.className = 'payment-alert-banner ' + severityClass;
            div.innerHTML = `
              <span class="alert-icon">${iconSvg}</span>
              <div class="alert-body">
                <div class="alert-title">${escapeHtml(alert.title)}</div>
                ${alert.message ? '<div class="alert-message">' + escapeHtml(alert.message) + '</div>' : ''}
              </div>
              <button class="alert-dismiss" data-alert-id="${alert.id}" title="확인">&times;</button>
            `;
            container.appendChild(div);

            // 확인 버튼 클릭 → 알림 제거
            div.querySelector('.alert-dismiss').addEventListener('click', async function() {
              const alertId = this.dataset.alertId;
              try {
                await fetch('/api/credits/payment-alerts/' + alertId + '/acknowledge', {
                  method: 'POST', credentials: 'include'
                });
              } catch (e) { /* 무시 */ }
              div.style.animation = 'slideUp 0.3s reverse';
              setTimeout(() => div.remove(), 300);
            });
          });
        } catch (e) {
          console.warn('[Payment Success] 알림 확인 실패:', e);
        }
      }

      function getAlertIcon(severity) {
        switch (severity) {
          case 'info':
            return '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>';
          case 'error':
          case 'critical':
            return '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
          default:
            return '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>';
        }
      }

      function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }
    })();
  </script>
</body>
</html>
