<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="audioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#5DADE2"/>
    </linearGradient>
    <filter id="audioShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- 배경 원 -->
  <circle cx="32" cy="32" r="28" fill="url(#audioGrad)" filter="url(#audioShadow)"/>
  <!-- 스피커 본체 -->
  <rect x="16" y="26" width="12" height="14" rx="2" fill="white" opacity="0.95"/>
  <!-- 스피커 콘 -->
  <polygon points="28,24 42,14 42,52 28,42" fill="white" opacity="0.95"/>
  <!-- 사운드 웨이브 -->
  <path d="M46,24 Q52,32 46,40" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M50,20 Q58,32 50,44" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- 귀여운 하이라이트 -->
  <circle cx="20" cy="28" r="3" fill="white" opacity="0.6"/>
</svg>