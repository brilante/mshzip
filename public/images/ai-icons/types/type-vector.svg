<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="vectorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9E79F"/>
      <stop offset="100%" style="stop-color:#F7DC6F"/>
    </linearGradient>
    <filter id="vectorShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- 배경 원 -->
  <circle cx="32" cy="32" r="28" fill="url(#vectorGrad)" filter="url(#vectorShadow)"/>
  <!-- 3D 큐브 -->
  <polygon points="32,12 50,22 50,42 32,52 14,42 14,22" fill="white" opacity="0.95"/>
  <polygon points="32,12 50,22 32,32 14,22" fill="#F7DC6F" opacity="0.7"/>
  <polygon points="32,32 50,22 50,42 32,52" fill="#D4AC0D" opacity="0.5"/>
  <polygon points="32,32 14,22 14,42 32,52" fill="#F4D03F" opacity="0.6"/>
  <!-- 연결점 -->
  <circle cx="32" cy="12" r="3" fill="white"/>
  <circle cx="50" cy="22" r="3" fill="white"/>
  <circle cx="14" cy="22" r="3" fill="white"/>
  <circle cx="32" cy="52" r="3" fill="white"/>
  <!-- 귀여운 하이라이트 -->
  <circle cx="22" cy="18" r="3" fill="white" opacity="0.5"/>
</svg>