<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="imageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FF8FAB"/>
    </linearGradient>
    <filter id="imageShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- 배경 원 -->
  <circle cx="32" cy="32" r="28" fill="url(#imageGrad)" filter="url(#imageShadow)"/>
  <!-- 사진 프레임 -->
  <rect x="14" y="18" width="36" height="28" rx="4" fill="white" opacity="0.95"/>
  <!-- 산 풍경 -->
  <polygon points="14,46 26,32 34,40 46,28 50,46" fill="#A8E6CF"/>
  <polygon points="22,46 32,36 42,46" fill="#88D8B0"/>
  <!-- 태양 -->
  <circle cx="40" cy="26" r="5" fill="#FFD93D"/>
  <!-- 귀여운 하이라이트 -->
  <circle cx="18" cy="22" r="3" fill="white" opacity="0.6"/>
</svg>