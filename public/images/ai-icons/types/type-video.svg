<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="videoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DDA0DD"/>
      <stop offset="100%" style="stop-color:#BA68C8"/>
    </linearGradient>
    <filter id="videoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- 배경 원 -->
  <circle cx="32" cy="32" r="28" fill="url(#videoGrad)" filter="url(#videoShadow)"/>
  <!-- 비디오 화면 -->
  <rect x="12" y="18" width="40" height="28" rx="4" fill="white" opacity="0.95"/>
  <!-- 필름 스트립 상단 -->
  <rect x="12" y="18" width="40" height="6" rx="2" fill="#333" opacity="0.8"/>
  <circle cx="18" cy="21" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="24" cy="21" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="30" cy="21" r="1.5" fill="white" opacity="0.6"/>
  <!-- 재생 버튼 -->
  <circle cx="32" cy="35" r="10" fill="#BA68C8" opacity="0.9"/>
  <polygon points="29,30 29,40 38,35" fill="white"/>
  <!-- 귀여운 하이라이트 -->
  <circle cx="16" cy="22" r="2" fill="white" opacity="0.4"/>
</svg>