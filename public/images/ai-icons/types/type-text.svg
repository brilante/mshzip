<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8E6CF"/>
      <stop offset="100%" style="stop-color:#88D8B0"/>
    </linearGradient>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- 배경 원 -->
  <circle cx="32" cy="32" r="28" fill="url(#textGrad)" filter="url(#textShadow)"/>
  <!-- 문서 아이콘 -->
  <rect x="18" y="14" width="28" height="36" rx="4" fill="white" opacity="0.95"/>
  <!-- 텍스트 라인들 -->
  <rect x="23" y="22" width="18" height="3" rx="1.5" fill="#88D8B0"/>
  <rect x="23" y="29" width="14" height="3" rx="1.5" fill="#A8E6CF"/>
  <rect x="23" y="36" width="16" height="3" rx="1.5" fill="#88D8B0"/>
  <rect x="23" y="43" width="12" height="3" rx="1.5" fill="#A8E6CF"/>
  <!-- 귀여운 하이라이트 -->
  <circle cx="22" cy="20" r="3" fill="white" opacity="0.6"/>
</svg>