<svg width="113" height="113" viewBox="0 0 113 113" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow20">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Abstract circular frame -->
  <circle cx="56.5" cy="56.5" r="50" fill="none" stroke="url(#grad20)" stroke-width="3" opacity="0.3"/>
  <circle cx="56.5" cy="56.5" r="42" fill="none" stroke="url(#grad20)" stroke-width="2" opacity="0.5"/>
  <!-- Stylized M -->
  <path d="M25 80 L25 35 L40 55 L56.5 30 L73 55 L88 35 L88 80"
        fill="none" stroke="url(#grad20)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow20)"/>
  <!-- 3 indicator dots -->
  <circle cx="35" cy="88" r="5" fill="#3b82f6"/>
  <circle cx="56.5" cy="88" r="5" fill="#8b5cf6"/>
  <circle cx="78" cy="88" r="5" fill="#ec4899"/>
  <!-- Neural connection accents -->
  <circle cx="56.5" cy="30" r="4" fill="white" opacity="0.8"/>
  <circle cx="40" cy="55" r="3" fill="white" opacity="0.6"/>
  <circle cx="73" cy="55" r="3" fill="white" opacity="0.6"/>
  <!-- Orbiting particles -->
  <circle cx="15" cy="40" r="3" fill="#60a5fa" opacity="0.7"/>
  <circle cx="98" cy="40" r="3" fill="#a78bfa" opacity="0.7"/>
  <circle cx="56.5" cy="8" r="3" fill="#f472b6" opacity="0.7"/>
</svg>
